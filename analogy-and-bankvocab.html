dioms/phrases: 'Weal and Woe'","opts":{"A":"Joy and sorrow","B":"Out and out","C":"To and fro","D":"Kith and kin"},"ans":"A","exp":"'Weal and woe' means good times and bad times, i.e., joy and sorrow.","src":null,"vocab":[]},{"id":"bank-929","q":"Fill in the gap(s) appropriately: The tiger was killed _____ a stick.","opts":{"A":"by","B":"from","C":"of","D":"with"},"ans":"D","exp":"When an action is performed using a tool/instrument, 'with' is the correct preposition.","src":null,"vocab":[]},{"id":"bank-930","q":"Fill in the gap(s) appropriately: You will have to speak louder Robin; he is as deaf as a _____.","opts":{"A":"brick","B":"post","C":"mummy","D":"dog"},"ans":"B","exp":"'As deaf as a post' is a standard simile for complete deafness.","src":null,"vocab":[]},{"id":"bank-931","q":"Fill in the gap(s) appropriately: The bag is not heavy; it is as light as _____.","opts":{"A":"feather","B":"flea","C":"lamp","D":"lamb"},"ans":"A","exp":"'As light as a feather' is a standard simile for something very lightweight.","src":null,"vocab":[]},{"id":"bank-932","q":"Fill in the gap(s) appropriately: The young wrestler _____ when his opponent caught him in a hold from which he could not escape.","opts":{"A":"came about","B":"call off","C":"gave in","D":"gave onto"},"ans":"C","exp":"'Give in' means to yield/admit defeat, fitting the wrestler unable to escape the hold.","src":null,"vocab":[]},{"id":"bank-933","q":"Fill in the blanks with appropriate word/words: The recent rains that filled our empty reservoirs were a _____ to the whole community.","opts":{"A":"boon","B":"bane","C":"brawn","D":"broach"},"ans":"A","exp":"Rain that benefits the whole community by filling reservoirs is a 'boon' (a great benefit/blessing).","src":null,"vocab":[]},{"id":"bank-934","q":"Fill in the blanks with appropriate word/words: Come _____ to my house for dinner sometime.","opts":{"A":"over","B":"on","C":"in","D":"by"},"ans":"A","exp":"'Come over' is the phrasal verb for visiting someone's home casually.","src":null,"vocab":[]},{"id":"bank-935","q":"Fill in the blanks with appropriate word/words: Let us not be too _____ about the outcome; something could go wrong.","opts":{"A":"sanguine","B":"serene","C":"scrupulous","D":"scuttle"},"ans":"A","exp":"Being overly confident/optimistic about a risky outcome is described as being too 'sanguine.'","src":null,"vocab":[]},{"id":"bank-936","q":"Fill in the blanks with appropriate word/words: By their use of the internet, people are able to _____ their opinion to new audiences across the globe.","opts":{"A":"direct","B":"distribute","C":"dissuade","D":"disseminate"},"ans":"D","exp":"Spreading information/opinions widely via the internet is called 'disseminating' them.","src":null,"vocab":[]},{"id":"bank-937","q":"Fill in the blanks with appropriate word/words: You must have an _____ motive for your behavior, since there is no obvious reason for it.","opts":{"A":"utmost","B":"uncanny","C":"ulterior","D":"underlying"},"ans":"C","exp":"A hidden, often selfish motive behind unexplained behavior is called an 'ulterior motive.'","src":null,"vocab":[]},{"id":"bank-938","q":"Fill in the blanks with appropriate word/words: Neither Sharmeen nor her friend _____ present last week.","opts":{"A":"were","B":"was","C":"have been","D":"is"},"ans":"B","exp":"With 'neither...nor,' the verb agrees with the subject nearest to it ('her friend,' singular); 'last week' requires past tense, so 'was' is correct.","src":null,"vocab":[]},{"id":"bank-939","q":"Fill in the blanks with appropriate word/words: The murderer felt no _____ for his crime.","opts":{"A":"rescind","B":"relevance","C":"remorse","D":"repress"},"ans":"C","exp":"Lack of guilt/regret for a crime is described as feeling no 'remorse.'","src":null,"vocab":[]},{"id":"bank-940","q":"Identify the proper SYNONYM of the words: 'ADMONISH'","opts":{"A":"To warn","B":"Encourage","C":"Abdicate","D":"Abolish"},"ans":"A","exp":"'Admonish' means to warn/reprove mildly, matching 'to warn.'","src":null,"vocab":[]},{"id":"bank-941","q":"Identify the proper SYNONYM of the words: 'IMPEDE'","opts":{"A":"Articulate","B":"Recover","C":"Detect","D":"Hinder"},"ans":"D","exp":"'Impede' means to obstruct progress, matching 'hinder.'","src":null,"vocab":[]},{"id":"bank-942","q":"Identify the proper SYNONYM of the words: 'DESTITUTE'","opts":{"A":"Insolvent","B":"Desperate","C":"Insolent","D":"Pessimistic"},"ans":"A","exp":"'Destitute' means extremely poor, closest synonym is 'insolvent' (bankrupt).","src":null,"vocab":[]},{"id":"bank-943","q":"Identify the proper SYNONYM of the words: 'MELANCHOLY'","opts":{"A":"Peaceful","B":"Depressed","C":"Orthodox","D":"Youthful"},"ans":"B","exp":"'Melancholy' means a deep, persistent sadness, matching 'depressed.'","src":null,"vocab":[]},{"id":"bank-944","q":"Identify the proper SYNONYM of the words: 'CONCUR'","opts":{"A":"Drive away","B":"Discourage","C":"Certain","D":"Agree"},"ans":"D","exp":"'Concur' means to agree, matching 'agree.'","src":null,"vocab":[]},{"id":"bank-945","q":"Fill in the blanks with the correct option: According to corporate circles Bengal corporation is pushing through the merger to create a financially _____ company.","opts":{"A":"acceptable","B":"powerful","C":"leading","D":"straight"},"ans":"B","exp":"Mergers are typically pursued to create a financially 'powerful' (stronger) company.","src":null,"vocab":[]},{"id":"bank-946","q":"Fill in the blanks with the correct option: Irony can, after a fashion, become a mode of escape; to laugh at the terrors of life is in some sense to _____ them.","opts":{"A":"overstate","B":"revitalize","C":"corroborate","D":"evade"},"ans":"D","exp":"If irony is a mode of escape, laughing at life's terrors means in some sense to 'evade' (avoid) them.","src":null,"vocab":[]},{"id":"bank-947","q":"Fill in the blanks with the correct option: Scientists _____ a new planet.","opts":{"A":"had just discover","B":"just discover","C":"have just discover","D":"have just discovered"},"ans":"D","exp":"With 'just,' Present Perfect Tense (have/has + past participle) is required: 'have just discovered.'","src":null,"vocab":[]},{"id":"bank-948","q":"Fill in the blanks with the correct option: The miser gazed _____ at the pile of gold coins in front of him.","opts":{"A":"avidly","B":"admiringly","C":"thoughtfully","D":"earnestly"},"ans":"A","exp":"A miser's characteristic greed for gold is best expressed as gazing 'avidly' (eagerly/greedily).","src":null,"vocab":[]},{"id":"bank-949","q":"Fill in the blanks with the correct option: At one point, it looked as if an area of agreement would _____ specially over the issue of productivity linked wages.","opts":{"A":"develop","B":"come out","C":"emerge","D":"grow"},"ans":"C","exp":"An area of agreement coming into being/appearing through discussion is best described as it would 'emerge.'","src":null,"vocab":[]},{"id":"bank-950","q":"Identify the correct substitution: A name adopted by an author in his writings:","opts":{"A":"Nickname","B":"Pseudonym","C":"Nomenclature","D":"Title"},"ans":"B","exp":"A 'pseudonym' is a fictitious name an author adopts for their writings (a pen name).","src":null,"vocab":[]},{"id":"bank-951","q":"Identify the correct substitution: That which cannot be corrected:","opts":{"A":"Unintelligible","B":"Indelible","C":"Illegible","D":"Incorrigible"},"ans":"D","exp":"'Incorrigible' specifically means unable to be corrected/reformed.","src":null,"vocab":[]},{"id":"bank-952","q":"Identify the correct substitution: A small shop that sells fashionable clothes, cosmetics, etc.","opts":{"A":"Store","B":"Boutique","C":"Stall","D":"Booth"},"ans":"B","exp":"A 'boutique' is specifically a small shop selling fashionable clothing and accessories.","src":null,"vocab":[]},{"id":"bank-953","q":"Identify the correct substitution: Habitually silent or talks less:","opts":{"A":"Taciturn","B":"Servile","C":"Unequivocal","D":"Synoptic"},"ans":"A","exp":"'Taciturn' describes someone who habitually says little.","src":null,"vocab":[]},{"id":"bank-954","q":"Identify the correct substitution: Be the embodiment or perfect example of:","opts":{"A":"Characterise","B":"Personify","C":"Idol","D":"Signify"},"ans":"B","exp":"'Personify' means to embody a quality in a concrete form, fitting 'be the perfect example of.'","src":null,"vocab":[]},{"id":"bank-955","q":"Choose the pair with a similar relationship: Earnest : Immoral :: _____ : _____","opts":{"A":"Land : Evil","B":"Dissolute : Lascivious","C":"Restrained : Wanton","D":"Shore : Reef"},"ans":"C","exp":"Earnest (sincere/moral) is opposite to immoral; similarly, restrained (controlled) is opposite to wanton (unrestrained) — both pairs show opposite moral/behavioral traits.","src":null,"vocab":[]},{"id":"bank-956","q":"Choose the pair with a similar relationship: Cloud : Storm :: _____ : _____","opts":{"A":"Container : Contained","B":"Portent : Disaster","C":"Cumulus : Gale","D":"Thunder : Lightning"},"ans":"B","exp":"Clouds can be a sign preceding a storm; similarly, a portent is a sign preceding a disaster — both pairs show a precursor sign and the event it foretells.","src":null,"vocab":[]},{"id":"bank-957","q":"Choose the pair with a similar relationship: Debate : Forensic :: _____ : _____","opts":{"A":"Drama : Histrionic","B":"Opera : Spoken","C":"Concerto : Harmonising","D":"Argument : Domestic"},"ans":"A","exp":"Skills related to formal debate are called 'forensic'; similarly, skills related to drama/theatrical performance are called 'histrionic.'","src":null,"vocab":[]},{"id":"bank-958","q":"Choose the pair with a similar relationship: Promise : Fulfill :: _____ : _____","opts":{"A":"Pawn : Redeem","B":"Pledge : Deny","C":"Law : Enforce","D":"Confession : Hedge"},"ans":"C","exp":"A promise is meant to be fulfilled; similarly, a law is meant to be enforced — both pairs show an obligation and its implementation.","src":null,"vocab":[]},{"id":"bank-959","q":"Choose the pair with a similar relationship: Notable : Notorious :: _____ : _____","opts":{"A":"Philanthropic : Benevolent","B":"Philandering : Pleasant","C":"Nefarious : Secret","D":"Philanthropic : Miserly"},"ans":"D","exp":"Notable (positive renown) is opposite to notorious (negative renown); similarly, philanthropic (generous) is opposite to miserly (stingy) — both pairs contrast a positive trait with a negative one.","src":null,"vocab":[]},{"id":"bank-960","q":"Select the opposite of the word in capitals: 'PUNCTILIOUS'","opts":{"A":"former","B":"careless","C":"observant","D":"moderate"},"ans":"B","exp":"'Punctilious' means extremely attentive to detail/correctness; its opposite is 'careless.'","src":null,"vocab":[]},{"id":"bank-961","q":"Select the opposite of the word in capitals: 'MOISTURE'","opts":{"A":"dryness","B":"delicate","C":"dampness","D":"defect"},"ans":"A","exp":"'Moisture' means wetness; its opposite is 'dryness.'","src":null,"vocab":[]},{"id":"bank-962","q":"Select the opposite of the word in capitals: 'DISCORDANT'","opts":{"A":"harsh","B":"different","C":"harmonious","D":"separate"},"ans":"C","exp":"'Discordant' means disagreeing/clashing; its opposite is 'harmonious.'","src":null,"vocab":[]},{"id":"bank-963","q":"Select the opposite of the word in capitals: 'APPLAUD'","opts":{"A":"request","B":"criticise","C":"pray","D":"flatter"},"ans":"B","exp":"'Applaud' means to express approval; its opposite is 'criticise.'","src":null,"vocab":[]},{"id":"bank-964","q":"Select the opposite of the word in capitals: 'PROFOUND'","opts":{"A":"superficial","B":"obscure","C":"intense","D":"hidden"},"ans":"A","exp":"'Profound' means deep/thorough; its opposite is 'superficial' (shallow).","src":null,"vocab":[]},{"id":"bank-965","q":"Identify the word nearest in meaning to the capitalized word: 'RECKLESS'","opts":{"A":"rude","B":"uncontrolled","C":"adventurous","D":"strong"},"ans":"B","exp":"'Reckless' means acting without thinking of danger/consequences, closest to 'uncontrolled.'","src":null,"vocab":[]},{"id":"bank-966","q":"Identify the word nearest in meaning to the capitalized word: 'MELEE'","opts":{"A":"kindness","B":"brawl","C":"simple song","D":"primitive dance"},"ans":"B","exp":"'Melee' means a confused, disorderly fight, matching 'brawl.'","src":null,"vocab":[]},{"id":"bank-967","q":"Identify the word nearest in meaning to the capitalized word: 'PRECARIOUS'","opts":{"A":"temporal","B":"dangerous","C":"heavy","D":"unstable"},"ans":"D","exp":"'Precarious' means not securely held/likely to fall, matching 'unstable.'","src":null,"vocab":[]},{"id":"bank-968","q":"Identify the word nearest in meaning to the capitalized word: 'TORTUOUS'","opts":{"A":"extreme","B":"indirect","C":"uneven","D":"incidental"},"ans":"B","exp":"'Tortuous' means full of twists and turns, closest to 'indirect.'","src":null,"vocab":[]},{"id":"bank-969","q":"Identify the word nearest in meaning to the capitalized word: 'SUNDRY'","opts":{"A":"complex","B":"express","C":"unmatched","D":"various"},"ans":"D","exp":"'Sundry' means various/of several kinds, matching 'various.'","src":null,"vocab":[]},{"id":"bank-970","q":"Identify the word nearest in meaning to the capitalized word: 'PERPETUAL'","opts":{"A":"everlasting","B":"firm","C":"equable","D":"Steady"},"ans":"A","exp":"'Perpetual' means continuing forever, matching 'everlasting.'","src":null,"vocab":[]},{"id":"bank-971","q":"Identify the word nearest in meaning to the capitalized word: 'TORTUOUS'","opts":{"A":"extreme","B":"indirect","C":"uneven","D":"incidental"},"ans":"B","exp":"'Tortuous' means winding/full of twists, closest to 'indirect.'","src":null,"vocab":[]},{"id":"bank-972","q":"Identify the word nearest in meaning to the capitalized word: 'APPLAUD'","opts":{"A":"rebuke","B":"slam","C":"praise","D":"condemn"},"ans":"C","exp":"'Applaud' means to express strong approval, matching 'praise.'","src":null,"vocab":[]},{"id":"bank-973","q":"Identify the word nearest in meaning to the capitalized word: 'LIMPID'","opts":{"A":"moist","B":"dear","C":"transparent","D":"dark"},"ans":"C","exp":"'Limpid' means clear/transparent, especially of liquid.","src":null,"vocab":[]},{"id":"bank-974","q":"Identify the word nearest in meaning to the capitalized word: 'MELEE'","opts":{"A":"kindness","B":"brawl","C":"simple song","D":"primitive dance"},"ans":"B","exp":"'Melee' means a confused fight, matching 'brawl.'","src":null,"vocab":[]},{"id":"bank-975","q":"Pick the opposite of the capitalized word: 'SAVORY'","opts":{"A":"sad","B":"hidden","C":"lost","D":"unpalatable"},"ans":"D","exp":"'Savory' means having a pleasant taste; its opposite is 'unpalatable' (unpleasant to taste).","src":null,"vocab":[]},{"id":"bank-976","q":"Pick the opposite of the capitalized word: 'COURTEOUS'","opts":{"A":"flaccid","B":"emollient","C":"insolent","D":"scrupulous"},"ans":"C","exp":"'Courteous' means polite; its opposite is 'insolent' (rude/disrespectful).","src":null,"vocab":[]},{"id":"bank-977","q":"Pick the opposite of the capitalized word: 'ANOMALOUS'","opts":{"A":"capacious","B":"vicious","C":"connected","D":"usual"},"ans":"D","exp":"'Anomalous' means deviating from the norm; its opposite is 'usual' (normal).","src":null,"vocab":[]},{"id":"bank-978","q":"Pick the opposite of the capitalized word: 'CAPRICIOUS'","opts":{"A":"redoubtable","B":"constant","C":"phlegmatic","D":"solitary"},"ans":"B","exp":"'Capricious' means changing mood/behavior unpredictably; its opposite is 'constant' (steady/unchanging).","src":null,"vocab":[]},{"id":"bank-979","q":"Pick the opposite of the capitalized word: 'AMELIORATE'","opts":{"A":"increase","B":"worsen","C":"clasp","D":"dissemble"},"ans":"B","exp":"'Ameliorate' means to make better; its opposite is 'worsen' (to make worse).","src":null,"vocab":[]},{"id":"bank-980","q":"Choose the best one-word substitute: A religious discourse","opts":{"A":"preach","B":"stanza","C":"sanctorum","D":"sermon"},"ans":"D","exp":"A 'sermon' is a talk on a religious/moral subject, typically delivered by a religious leader.","src":null,"vocab":[]},{"id":"bank-981","q":"Choose the best one-word substitute: Official misconduct","opts":{"A":"malefactor","B":"malfeasance","C":"maltreatment","D":"maladministration"},"ans":"B","exp":"'Malfeasance' specifically means wrongdoing/misconduct by a public official.","src":null,"vocab":[]},{"id":"bank-982","q":"Choose the best one-word substitute: A place for sick people who need long periods for recovery","opts":{"A":"clinic","B":"hospital","C":"sanatorium","D":"asylum"},"ans":"C","exp":"A 'sanatorium' is a specialized facility for long-term treatment/recovery, especially for chronic illnesses like tuberculosis.","src":null,"vocab":[]},{"id":"bank-983","q":"Choose the best one-word substitute: A person who eats too much","opts":{"A":"glutton","B":"reveler","C":"sensualist","D":"omnivorous"},"ans":"A","exp":"A 'glutton' is a person who eats excessively.","src":null,"vocab":[]},{"id":"bank-984","q":"Choose the best one-word substitute: Animals that eat flesh","opts":{"A":"herbivorous","B":"omnivorous","C":"carnivorous","D":"vegetarian"},"ans":"C","exp":"'Carnivorous' describes animals that eat the flesh of other animals.","src":null,"vocab":[]},{"id":"bank-985","q":"Select the misspell word:","opts":{"A":"diarrhoea","B":"chauffeur","C":"typhoid","D":"dysentery"},"ans":"C","exp":"All four words are actually correctly spelled in standard usage; however, per the source key, 'typhoid' is marked as the misspelled choice among standard medical terms in this set.","src":null,"vocab":[]},{"id":"bank-986","q":"Select the misspell word:","opts":{"A":"mortgage","B":"bouquet","C":"pursue","D":"privelege"},"ans":"D","exp":"The correct spelling is 'privilege' (i before l, then e), making 'privelege' the misspelled word.","src":null,"vocab":[]},{"id":"bank-987","q":"Choose the pair with a similar relationship: 'MUSTER : CREW'","opts":{"A":"Convene : committee","B":"Demobilize : troops","C":"Cheer : team","D":"Dismiss : jury"},"ans":"A","exp":"To muster a crew means to formally assemble them; similarly, to convene a committee means to formally assemble it — both pairs show a formal-gathering relationship.","src":null,"vocab":[]},{"id":"bank-988","q":"Choose the pair with a similar relationship: 'STICKLER : INSIST'","opts":{"A":"Trickster : risk","B":"Haggler : concede","C":"Braggard : boast","D":"Laggard : outlast"},"ans":"C","exp":"A stickler is characterized by insisting on something; similarly, a braggart is characterized by boasting — both pairs show a type of person and their defining behavior.","src":null,"vocab":[]},{"id":"bank-989","q":"Choose the pair with a similar relationship: 'PERJURY : OATH'","opts":{"A":"Plagiarism : authority","B":"Embezzlement : trust","C":"Disrespect : age","D":"Jury : vow"},"ans":"B","exp":"Perjury is a violation of an oath; similarly, embezzlement is a violation of trust — both pairs show a wrongdoing and the commitment it breaks.","src":null,"vocab":[]},{"id":"bank-990","q":"Choose the pair with a similar relationship: 'TIRADE : ABUSIVE'","opts":{"A":"Monologue : lengthy","B":"Aphorism : boring","C":"Encomium : laudatory","D":"Critique : insolent"},"ans":"C","exp":"A tirade is defined by being abusive; similarly, an encomium is defined by being laudatory (praising) — both pairs link a noun to its inherent defining quality.","src":null,"vocab":[]},{"id":"bank-991","q":"Choose the pair with a similar relationship: 'DELICATE : FASTIDIOUS'","opts":{"A":"Hardworking : diligent","B":"Altruistic : mercenary","C":"Demonstrative : effusive","D":"Deceptive : false"},"ans":"C","exp":"Fastidious is an extreme/intensified form of delicate; similarly, effusive is an extreme/intensified form of demonstrative — both pairs show a degree-of-intensity relationship.","src":null,"vocab":[]},{"id":"bank-992","q":"Fill in the blanks with the correct alternatives: The _____ of evidence was on the side of plaintiff since all but one witness testified that his story was _____.","opts":{"A":"paucity, accurate","B":"propensity, far-fetched","C":"accuracy, insufficient","D":"preponderance, correct"},"ans":"D","exp":"Since most witnesses supported him, the evidence's 'preponderance' (majority) favored the plaintiff, and his story was deemed 'correct.'","src":null,"vocab":[]},{"id":"bank-993","q":"Fill in the blanks with the correct alternatives: The child was so _____ by her indulgent parents that she pouted and became _____ when she did not receive all their attention.","opts":{"A":"spoiled, sullen","B":"protected, insecure","C":"Sheltered, elated","D":"pampered, tranquil"},"ans":"A","exp":"Indulgent parenting leads to a child being 'spoiled'; not getting full attention then causes her to become 'sullen' (resentfully sulky).","src":null,"vocab":[]},{"id":"bank-994","q":"Fill in the blanks with the correct alternatives: The _____ pittance that the destitute receive from the government cannot keep them from _____.","opts":{"A":"indulgent, desolation","B":"meticulous, despair","C":"meager, poverty","D":"small, crime"},"ans":"C","exp":"A 'pittance' is inherently small, so 'meager' fits; a tiny amount cannot lift the destitute out of 'poverty.'","src":null,"vocab":[]},{"id":"bank-995","q":"Fill in the blanks with the correct alternatives: We were amused that a man who had so far been the most _____ of public speakers could _____ the audience and bring them cheering to their feet.","opts":{"A":"enthralling, anger","B":"accomplished, humour","C":"pedestrian, electrify","D":"masterful, bore"},"ans":"C","exp":"Being 'amused' implies surprise: an unremarkable ('pedestrian') speaker unexpectedly managed to 'electrify' (excite) the audience.","src":null,"vocab":[]},{"id":"bank-996","q":"Fill in the blanks with the correct alternatives: The _____ of time had left the castle _____, it towered high, looking much the same as it must have done centuries ago.","opts":{"A":"repairs, destroyed","B":"lack, defended","C":"ravages, untouched","D":"status, lonely"},"ans":"C","exp":"Despite the destructive 'ravages' (damage) of time elsewhere, the castle remained 'untouched' (intact), looking the same as centuries ago.","src":null,"vocab":[]},{"id":"bank-997","q":"Pick the opposite for the capitalized word: 'METICULOUS'","opts":{"A":"careless","B":"particular","C":"calculated","D":"planned"},"ans":"A","exp":"'Meticulous' means extremely careful; its opposite is 'careless.'","src":null,"vocab":[]},{"id":"bank-998","q":"Pick the opposite for the capitalized word: 'AMBIVALENT'","opts":{"A":"submissive","B":"misleading","C":"suspect","D":"decisive"},"ans":"D","exp":"'Ambivalent' means having mixed/conflicting feelings; its opposite is 'decisive' (certain/resolved).","src":null,"vocab":[]},{"id":"bank-999","q":"Pick the opposite for the capitalized word: 'REVEALED'","opts":{"A":"bare","B":"open","C":"concealed","D":"naked"},"ans":"C","exp":"'Revealed' means made known/uncovered; its opposite is 'concealed' (hidden).","src":null,"vocab":[]},{"id":"bank-1000","q":"Pick the opposite for the capitalized word: 'DISSEMINATED'","opts":{"A":"network","B":"interact","C":"concentrated","D":"acquaint"},"ans":"C","exp":"'Disseminated' means spread widely; its opposite is 'concentrated' (gathered into one place).","src":null,"vocab":[]}]},{"id":"bank-11","title":"Bank Vocabulary [1001-1100]","questions":[{"id":"bank-1001","q":"Pick the opposite for the capitalized word: 'PLETHORA'","opts":{"A":"profusion","B":"current","C":"balance","D":"shortage"},"ans":"D","exp":"'Plethora' means an excess/abundance; its opposite is 'shortage.'","src":null,"vocab":[]},{"id":"bank-1002","q":"Choose the word that best matches the capitalized term: 'COPIOUS'","opts":{"A":"liberal","B":"abundant","C":"heavy","D":"broad"},"ans":"B","exp":"'Copious' means abundant/plentiful, matching 'abundant.'","src":null,"vocab":[]},{"id":"bank-1003","q":"Choose the word that best matches the capitalized term: 'DESICCATED'","opts":{"A":"dry","B":"drain","C":"clear","D":"fade"},"ans":"A","exp":"'Desiccated' means thoroughly dried out, matching 'dry.'","src":null,"vocab":[]},{"id":"bank-1004","q":"Choose the word that best matches the capitalized term: 'BIFURCATION'","opts":{"A":"discontinue","B":"bend","C":"division","D":"radiate"},"ans":"C","exp":"'Bifurcation' means division into two branches, matching 'division.'","src":null,"vocab":[]},{"id":"bank-1005","q":"Choose the word that best matches the capitalized term: 'WRECK'","opts":{"A":"afraid","B":"destroy","C":"expire","D":"nervous"},"ans":"B","exp":"'Wreck' means to destroy/ruin, matching 'destroy.'","src":null,"vocab":[]},{"id":"bank-1006","q":"Choose the word that best matches the capitalized term: 'ERRANT'","opts":{"A":"sinful","B":"unreliable","C":"shifting","D":"confusing"},"ans":"A","exp":"'Errant' means straying from the correct/moral path, matching 'sinful.'","src":null,"vocab":[]},{"id":"bank-1007","q":"Choose the pair with a relationship similar to: 'RESTAURANT : MENU'","opts":{"A":"Library : catalogue","B":"Journal : newspaper","C":"Book : encyclopedia","D":"College : account"},"ans":"A","exp":"A restaurant's menu lists the items available there; similarly, a library's catalogue lists the items available there — both pairs show a place and its inventory list.","src":null,"vocab":[]},{"id":"bank-1008","q":"Choose the pair with a relationship similar to: 'HEART : CARDIOLOGY'","opts":{"A":"Brain : Psychology","B":"History : Histology","C":"Civics : polity","D":"Fossils : paleontology"},"ans":"D","exp":"Cardiology is the scientific study of the heart; similarly, paleontology is the scientific study of fossils — both pairs show a field of study and its subject.","src":null,"vocab":[]},{"id":"bank-1009","q":"Choose the pair with a relationship similar to: 'ASHES : FIRE'","opts":{"A":"Building : debris","B":"Current : bygone","C":"Relics : civilization","D":"Bottle : stopper"},"ans":"C","exp":"Ashes are the remnant left after fire; similarly, relics are the remnant left from a civilization — both pairs show a remnant and its original source.","src":null,"vocab":[]},{"id":"bank-1010","q":"Choose the pair with a relationship similar to: 'LOVE : ADORE'","opts":{"A":"Affection : indifference","B":"Fight : war","C":"Pride : prejudice","D":"Hit : suffer"},"ans":"B","exp":"Adore is an intensified form of love; similarly, war is an intensified form of fight — both pairs show a degree-of-intensity relationship.","src":null,"vocab":[]},{"id":"bank-1011","q":"Choose the pair with a relationship similar to: 'NEEDLE : THREAD'","opts":{"A":"Leader : follower","B":"Prick : sew","C":"Bat : ball","D":"Pin : cushion"},"ans":"C","exp":"A needle and thread work together as complementary tools for sewing; similarly, a bat and ball work together as complementary tools for the sport.","src":null,"vocab":[]},{"id":"bank-1012","q":"Select the correct meaning of the underlined word: Lax intellectual property rights penalize cutting-edge research.","opts":{"A":"Laborious","B":"Stringent","C":"Unambiguous","D":"Innovative"},"ans":"D","exp":"'Cutting-edge' research refers to the most advanced, recently developed research, matching 'innovative.'","src":null,"vocab":[]},{"id":"bank-1013","q":"Select the correct meaning of the underlined word: When he was not invited to the wedding, he considered it a personal slur.","opts":{"A":"Disgrace","B":"Veneration","C":"Assuage","D":"Tenacity"},"ans":"A","exp":"A 'slur' is an insulting remark/action damaging someone's reputation, matching 'disgrace.'","src":null,"vocab":[]},{"id":"bank-1014","q":"Select the correct meaning of the underlined word: The advent of television has had a profound effect upon people's lives.","opts":{"A":"Widespread","B":"Consequence","C":"Induction","D":"Prevalent"},"ans":"C","exp":"'Advent' means the arrival/introduction of something new, closest among options to 'induction' (introduction).","src":null,"vocab":[]},{"id":"bank-1015","q":"Select the correct meaning of the underlined word: The government has failed to articulate the ideal regional order.","opts":{"A":"Initiate","B":"Reverberate","C":"Resolve","D":"Enunciate"},"ans":"D","exp":"'Articulate' means to express clearly, matching 'enunciate.'","src":null,"vocab":[]},{"id":"bank-1016","q":"Select the correct meaning of the underlined word: The mystery has never been conclusively solved.","opts":{"A":"Drastically","B":"Decisively","C":"Disgracefully","D":"Eventually"},"ans":"B","exp":"'Conclusively' means in a way that settles doubt completely, matching 'decisively.'","src":null,"vocab":[]},{"id":"bank-1017","q":"The word 'lucrative' means","opts":{"A":"good looking","B":"professional","C":"profitable","D":"ridiculous"},"ans":"C","exp":"'Lucrative' means producing substantial profit, matching 'profitable.'","src":null,"vocab":[]},{"id":"bank-1018","q":"Termination means","opts":{"A":"continuation","B":"beginning","C":"ending","D":"starting"},"ans":"C","exp":"'Termination' means the act of ending something, matching 'ending.'","src":null,"vocab":[]},{"id":"bank-1019","q":"Provide the appropriate Synonym: 'Distant'","opts":{"A":"Remote","B":"Nearby","C":"Offshore","D":"Abroad"},"ans":"A","exp":"'Distant' means far away, matching 'remote.'","src":null,"vocab":[]},{"id":"bank-1020","q":"Provide the appropriate Synonym: 'Informal'","opts":{"A":"Informed","B":"Casual","C":"Solemn","D":"Appropriate"},"ans":"B","exp":"'Informal' means relaxed/not formal, matching 'casual.'","src":null,"vocab":[]},{"id":"bank-1021","q":"The opposite of 'wholesale' is-","opts":{"A":"detail","B":"retail","C":"push sale","D":"discount"},"ans":"B","exp":"'Wholesale' (bulk selling) is the opposite of 'retail' (selling in small quantities to consumers).","src":null,"vocab":[]},{"id":"bank-1022","q":"Provide an appropriate antonym: 'Joy'","opts":{"A":"Dismay","B":"Happiness","C":"Satisfaction","D":"Indifference"},"ans":"A","exp":"'Joy' means great happiness; its opposite is 'dismay' (distress/disappointment).","src":null,"vocab":[]},{"id":"bank-1023","q":"Provide an appropriate antonym: 'Lazy'","opts":{"A":"Active","B":"Quarrelsome","C":"Slothful","D":"Slow"},"ans":"A","exp":"'Lazy' means unwilling to work; its opposite is 'active' (energetic/diligent).","src":null,"vocab":[]},{"id":"bank-1024","q":"Find out the odd pair","opts":{"A":"Accept, Reject","B":"Straight, Curved","C":"Short, Long","D":"Happy, Pleased"},"ans":"D","exp":"Accept/Reject, Straight/Curved, and Short/Long are all antonym pairs; Happy/Pleased are synonyms, making it the odd pair.","src":null,"vocab":[]},{"id":"bank-1025","q":"'To do away with' means","opts":{"A":"to repeat","B":"to start","C":"to get rid of","D":"to drive off"},"ans":"C","exp":"'Do away with' is an idiom meaning to abolish or eliminate something, matching 'get rid of.'","src":null,"vocab":[]},{"id":"bank-1026","q":"Complete the sentences: The first forty years of life give us the text: the next thirty supply the _____.","opts":{"A":"abridgement","B":"bibliography","C":"commentary","D":"epitaph"},"ans":"C","exp":"Following Schopenhauer's analogy, life's experiences are the 'text,' and later years provide the 'commentary' (interpretation) on them.","src":null,"vocab":[]},{"id":"bank-1027","q":"Complete the sentences: Some students are _____ and want to take only the courses for which they see immediate value.","opts":{"A":"theoretical","B":"impartial","C":"pragmatic","D":"idealistic"},"ans":"C","exp":"Valuing only immediately useful courses reflects a 'pragmatic' (practical) mindset.","src":null,"vocab":[]},{"id":"bank-1028","q":"Complete the sentences: Although he did not consider himself _____, he felt that the inconsistencies in her story _____ a certain degree of incredulity on his part.","opts":{"A":"an apostate ... justified","B":"an optimist ... intimated","C":"a hypocrite ... demonstrated","D":"a skeptic ... warranted"},"ans":"D","exp":"Inconsistencies in her story made his disbelief reasonable, i.e., 'warranted' his incredulity, even though he wasn't normally a 'skeptic.'","src":null,"vocab":[]},{"id":"bank-1029","q":"Choose the pair with a relationship similar to: 'INDIGENT : WEALTH'","opts":{"A":"contented : happiness","B":"aristocratic : stature","C":"smug : complacency","D":"emaciated : nourishment"},"ans":"D","exp":"Someone indigent lacks wealth; similarly, someone emaciated lacks nourishment — both pairs show a state defined by the absence of something.","src":null,"vocab":[]},{"id":"bank-1030","q":"Choose the pair with a relationship similar to: 'ANNOTATE : TEXT'","opts":{"A":"enact : law","B":"prescribe : medication","C":"caption : photograph","D":"abridge : novel"},"ans":"C","exp":"To annotate is to add explanatory notes to a text; similarly, to caption is to add explanatory text to a photograph.","src":null,"vocab":[]},{"id":"bank-1031","q":"'Prima facie' means","opts":{"A":"at first view","B":"main cause","C":"prime figure","D":"prime accused"},"ans":"A","exp":"'Prima facie' is a legal Latin term meaning 'at first sight/view' — accepted as true until proven otherwise.","src":null,"vocab":[]},{"id":"bank-1032","q":"Renal failure means","opts":{"A":"kidney failure","B":"heart failure","C":"collapse of the lungs","D":"severe low blood pressure"},"ans":"A","exp":"'Renal' relates to the kidneys, so 'renal failure' means kidney failure.","src":null,"vocab":[]},{"id":"bank-1033","q":"The word 'subterfuge' means","opts":{"A":"subtlety","B":"cunning","C":"simplicity","D":"trickery"},"ans":"D","exp":"'Subterfuge' means a deceptive trick/strategy used to avoid something, matching 'trickery.'","src":null,"vocab":[]},{"id":"bank-1034","q":"Find word meaning in sentence: Drink only tepid water.","opts":{"A":"cold","B":"slightly warm","C":"slightly cold","D":"hot"},"ans":"B","exp":"'Tepid' means moderately warm, matching 'slightly warm.'","src":null,"vocab":[]},{"id":"bank-1035","q":"Find word meaning in sentence: Some felt the law would impinge on the rights of others.","opts":{"A":"change","B":"trespass","C":"enlarge","D":"facilitate"},"ans":"B","exp":"'Impinge on' (rights) means to encroach upon, matching 'trespass' (upon).","src":null,"vocab":[]},{"id":"bank-1036","q":"Provide the appropriate Synonym: 'Frugal'","opts":{"A":"Careful","B":"Profligate","C":"Economical","D":"Ideal"},"ans":"C","exp":"'Frugal' means thrifty/sparing in spending, matching 'economical.'","src":null,"vocab":[]},{"id":"bank-1037","q":"Provide the appropriate Synonym: 'Intermittent'","opts":{"A":"Continuous","B":"Irregular","C":"Immediate","D":"Constant"},"ans":"B","exp":"'Intermittent' means occurring at irregular intervals, matching 'irregular.'","src":null,"vocab":[]},{"id":"bank-1038","q":"Transferring part of management responsibility to a third party is called","opts":{"A":"brokering","B":"outsourcing","C":"merchandizing","D":"forwarding"},"ans":"B","exp":"Transferring part of a business function to an external party is called 'outsourcing.'","src":null,"vocab":[]},{"id":"bank-1039","q":"A person who writes plays is called a","opts":{"A":"play-write","B":"play wrighter","C":"playwright","D":"player"},"ans":"C","exp":"A person who writes plays is correctly called a 'playwright' (using 'wright,' meaning maker/builder).","src":null,"vocab":[]},{"id":"bank-1040","q":"Provide the correct antonym: 'Permanent'","opts":{"A":"Evanescent","B":"Temporal","C":"Persistent","D":"Short"},"ans":"A","exp":"'Permanent' means lasting forever; its strongest opposite is 'evanescent' (quickly fading).","src":null,"vocab":[]},{"id":"bank-1041","q":"Provide the correct antonym: 'Destitute'","opts":{"A":"Affected","B":"Wealthy","C":"Indifferent","D":"Indigent"},"ans":"B","exp":"'Destitute' means extremely poor; its opposite is 'wealthy.'","src":null,"vocab":[]},{"id":"bank-1042","q":"Find the correct analogy:","opts":{"A":"Farmer : Village","B":"Chef : Kitchen","C":"Water : Reservoir","D":"Plumber : Wrench"},"ans":"B","exp":"A chef's primary workplace is the kitchen, matching a Person : Workplace relationship most precisely among the options.","src":null,"vocab":[]},{"id":"bank-1043","q":"Find the correct analogy:","opts":{"A":"Teacher : Library","B":"Bee : Flower","C":"Patient : Dispensary","D":"Teller : Bank"},"ans":"D","exp":"A teller's primary workplace is the bank, a precise Person : Workplace relationship.","src":null,"vocab":[]},{"id":"bank-1044","q":"Find Fill in the Blank: The fire in the museum resulted in _____ damage.","opts":{"A":"intensive","B":"expensive","C":"abrasive","D":"extensive"},"ans":"D","exp":"Widespread damage caused by a fire is best described as 'extensive' (covering a large area).","src":null,"vocab":[]},{"id":"bank-1045","q":"Find Fill in the Blank: He _____ that he's a millionaire, but I don't believe him.","opts":{"A":"admits","B":"attempts","C":"screams","D":"claims"},"ans":"D","exp":"Stating something as true without proof, especially when doubted, is to 'claim' it.","src":null,"vocab":[]},{"id":"bank-1046","q":"Identify the pair that expresses the same relationship: 'Communication : Message'","opts":{"A":"humour : amusement","B":"expression : words","C":"clarification : doubt","D":"radiation : cosmic"},"ans":"B","exp":"A message is the medium of communication; similarly, words are the medium of expression — both pairs show a process and its medium.","src":null,"vocab":[]},{"id":"bank-1047","q":"Identify the pair that expresses the same relationship: 'Fulsome : Praise'","opts":{"A":"hansom : cab","B":"noisome : smell","C":"lissome : movement","D":"handsome : appearance"},"ans":"B","exp":"'Fulsome' describes an excessive/unpleasant type of praise; similarly, 'noisome' describes an unpleasant type of smell — both show a negative-intensity adjective paired with its noun.","src":null,"vocab":[]},{"id":"bank-1048","q":"Identify the pair that expresses the same relationship: 'Plenitude : Abundance'","opts":{"A":"augury : divination","B":"indurate : harden","C":"perspicacity : clarity","D":"mulct : muzzle"},"ans":"A","exp":"'Plenitude' and 'abundance' are synonyms (both mean great quantity); similarly, 'augury' and 'divination' are synonyms (both mean foretelling).","src":null,"vocab":[]},{"id":"bank-1049","q":"Identify the pair that expresses the same relationship: 'Key : Piano'","opts":{"A":"wind : flute","B":"oboe : saxophone","C":"beat : drum","D":"String : guitar"},"ans":"D","exp":"A key is a functional part of a piano; similarly, a string is a functional part of a guitar — both pairs show an instrument and its essential component.","src":null,"vocab":[]},{"id":"bank-1050","q":"Fill in the blank(s) with the most appropriate alternative(s): In his short story, the author _____ the complexity of modern life and the _____ of modern man.","opts":{"A":"portrays, picture","B":"delineates, inclinations","C":"depicts, predicament","D":"pictures, life"},"ans":"C","exp":"An author 'depicts' complexity in fiction, and modern man's difficult situation is best described as his 'predicament.'","src":null,"vocab":[]},{"id":"bank-1051","q":"Fill in the blank(s) with the most appropriate alternative(s): I could not _____ him to attend the meeting.","opts":{"A":"prevail over","B":"prevail upon","C":"prevail about","D":"prevail in"},"ans":"B","exp":"'Prevail upon' (someone) means to persuade them to do something.","src":null,"vocab":[]},{"id":"bank-1052","q":"Fill in the blank(s) with the most appropriate alternative(s): Genetic engineering in humans should be used to _____ diseases, not to _____ genetic uniformity.","opts":{"A":"treat, foster","B":"eradicate, cater","C":"cure, generate","D":"avoid, promote"},"ans":"A","exp":"Genetic engineering should 'treat' diseases, not 'foster' (encourage) uniformity — an ethical contrast.","src":null,"vocab":[]},{"id":"bank-1053","q":"Identify the Synonym that best matches the italicized word: Bengalis are innate poets.","opts":{"A":"excellent","B":"romantic","C":"dull","D":"inborn"},"ans":"D","exp":"'Innate' means inborn/natural from birth, matching 'inborn.'","src":null,"vocab":[]},{"id":"bank-1054","q":"Identify the Syn that best matches the italicized word: It became an instant truism that politics meant selfishness.","opts":{"A":"universal belief","B":"quick judgement","C":"obvious truth","D":"immediate guess"},"ans":"C","exp":"A 'truism' is a statement so obviously true it requires no debate, matching 'obvious truth.'","src":null,"vocab":[]},{"id":"bank-1055","q":"Select the opposite of the capitalized word: 'EXTANT'","opts":{"A":"existing","B":"fashionable","C":"dynamic","D":"lost"},"ans":"D","exp":"'Extant' means still existing; its opposite is 'lost' (no longer existing).","src":null,"vocab":[]},{"id":"bank-1056","q":"Select the opposite of the capitalized word: 'INADVERTENTLY'","opts":{"A":"fearful","B":"impartial","C":"divide","D":"purposely"},"ans":"D","exp":"'Inadvertently' means unintentionally; its opposite is 'purposely' (intentionally).","src":null,"vocab":[]},{"id":"bank-1057","q":"Select the opposite of the capitalized word: 'AUDACIOUS'","opts":{"A":"manifest","B":"obvious","C":"venture","D":"cowardly"},"ans":"D","exp":"'Audacious' means boldly daring; its opposite is 'cowardly.'","src":null,"vocab":[]},{"id":"bank-1058","q":"Select the pair with a relationship similar to the original bolded pair: Morphine : Sedate ::","opts":{"A":"Drug : Addicts","B":"Liquor : Intoxicate","C":"Medicine : Soothed","D":"Oil : Smear"},"ans":"B","exp":"Morphine's function is to sedate; similarly, liquor's function is to intoxicate — both pairs match a substance (noun) to its characteristic effect (verb).","src":null,"vocab":[]},{"id":"bank-1059","q":"Select the pair with a relationship similar to the original bolded pair: Naive : Ingenuous ::","opts":{"A":"Ordinary : Ingenious","B":"Old : Wise","C":"Simple : Kind","D":"Sophisticated : Urbane"},"ans":"D","exp":"'Naive' and 'ingenuous' are synonyms (both mean innocent/unworldly); similarly, 'sophisticated' and 'urbane' are synonyms (both mean refined/cultured).","src":null,"vocab":[]},{"id":"bank-1060","q":"Select the pair with a relationship similar to the original bolded pair: Doctor : Disease ::","opts":{"A":"Psychiatrist : Maladjustment","B":"Teacher : Pupils","C":"Scholar : Knowledge","D":"Judge : Crime"},"ans":"A","exp":"A doctor treats disease; similarly, a psychiatrist treats maladjustment — both pairs match a professional to the problem they address.","src":null,"vocab":[]},{"id":"bank-1061","q":"Fill in the blanks with appropriate given below: Education is a strong _____ of poverty status.","opts":{"A":"requirement","B":"predictor","C":"discolor","D":"exposure"},"ans":"B","exp":"Education level reliably forecasts poverty status, making it a strong 'predictor.'","src":null,"vocab":[]},{"id":"bank-1062","q":"Fill in the blanks with appropriate given below: He _____ the gathering in impressive English.","opts":{"A":"directed","B":"approached","C":"undertaken","D":"addressed"},"ans":"D","exp":"Giving a speech to an assembled group is to 'address' the gathering.","src":null,"vocab":[]},{"id":"bank-1063","q":"Select the most appropriate word or phrase to fill in the blank(s): The hypocrite _____ feeling which s/he does not _____ but which s/he feels s/he should display.","opts":{"A":"shows - apprehend","B":"depicts - possess","C":"decries - hold","D":"simulates - admire"},"ans":"D","exp":"A hypocrite 'simulates' (fakes) feeling something they don't genuinely 'admire' (value), but feel they should show.","src":null,"vocab":[]},{"id":"bank-1064","q":"Select the most appropriate word or phrase to fill in the blank(s): Small investors who are _____ of the sponsors and directors' intents, consequently _____ their hard-earned money in the stock market.","opts":{"A":"aware ... recoup","B":"ignorant ... loss","C":"oblivious ... lose","D":"unmindful ... retrieve"},"ans":"C","exp":"Being 'oblivious' (unaware) of manipulative intent leads to investors losing money — 'lose' completes the cause-effect grammatically and logically.","src":null,"vocab":[]},{"id":"bank-1065","q":"Select the most appropriate word or phrase to fill in the blank(s): Early sailing ships, _____ in uncharted seas, at times faced many _____ in reaching their destination.","opts":{"A":"were navigated ... problems","B":"navigating ... hazards","C":"has navigated ... adversities","D":"being navigated ... perils"},"ans":"B","exp":"Ships 'navigating' unknown seas would face 'hazards' (dangers) — grammatically and contextually fitting.","src":null,"vocab":[]},{"id":"bank-1066","q":"Select the most appropriate word or phrase to fill in the blank(s): The merger will eliminate _____ and provide more _____ cross training to staff.","opts":{"A":"paperwork ... or less","B":"loss ... aggressive","C":"duplication ... effective","D":"competitors ... directed"},"ans":"C","exp":"Mergers aim to eliminate 'duplication' (redundant overlap) and provide more 'effective' staff training.","src":null,"vocab":[]},{"id":"bank-1067","q":"Select the most appropriate word or phrase to fill in the blank(s): Given the existence of so many _____ in the field, it was unrealistic of Moin to expect any _____ of opinion.","opts":{"A":"sections ... integration","B":"conflicts ... assessment","C":"divergences ... formation","D":"factions ... uniformity"},"ans":"D","exp":"With many competing 'factions' (groups), expecting 'uniformity' (sameness) of opinion is unrealistic.","src":null,"vocab":[]},{"id":"bank-1068","q":"Choose the option that matches the meaning of the capitalized word: It was a 'SCURRILOUS' attack on him.","opts":{"A":"serious","B":"unjustified","C":"insulting","D":"justified"},"ans":"C","exp":"'Scurrilous' means making scandalous/abusive claims, matching 'insulting.'","src":null,"vocab":[]},{"id":"bank-1069","q":"Choose the option that matches the meaning of the capitalized word: We have sanctioned his leave on 'COMPASSIONATE' ground.","opts":{"A":"as an exception","B":"legal","C":"merciful","D":"deserving"},"ans":"C","exp":"'Compassionate' means showing sympathy/kindness, matching 'merciful.'","src":null,"vocab":[]},{"id":"bank-1070","q":"Choose the option that matches the meaning of the capitalized word: He was 'ENGROSSED' in day's office routine.","opts":{"A":"involved","B":"tired","C":"fully occupied","D":"lost"},"ans":"C","exp":"'Engrossed' means totally absorbed in something, matching 'fully occupied.'","src":null,"vocab":[]},{"id":"bank-1071","q":"Identify the meaning of the given idiom/phrase: I have come to know of your hole-and-corner methods of dealing with people.","opts":{"A":"suspicious","B":"secret","C":"servile","D":"strict"},"ans":"B","exp":"'Hole-and-corner' means done secretly/underhandedly, matching 'secret.'","src":null,"vocab":[]},{"id":"bank-1072","q":"Identify the meaning of the given idiom/phrase: They are sure to steal a march upon their competitors.","opts":{"A":"outshine","B":"defy","C":"challenge","D":"resist"},"ans":"A","exp":"'Steal a march' means to gain an advantage by acting before others, matching 'outshine' (surpass).","src":null,"vocab":[]},{"id":"bank-1073","q":"Identify the meaning of the given idiom/phrase: He was in a brown study and did not seem to catch my point.","opts":{"A":"in his study room","B":"absorbed in reading","C":"absent-minded","D":"in a state of shock"},"ans":"C","exp":"'Brown study' means deep, gloomy thought/daydreaming, matching 'absent-minded.'","src":null,"vocab":[]},{"id":"bank-1074","q":"Select the MISSPELT word from the options below:","opts":{"A":"amateur","B":"antagonism","C":"anticipated","D":"bureaucracy"},"ans":"C","exp":"Per the source's intended answer key, 'anticipated' is flagged as the misspelled choice in this set.","src":null,"vocab":[]},{"id":"bank-1075","q":"Select the MISSPELT word from the options below:","opts":{"A":"delirious","B":"delusive","C":"hefty","D":"Heinous"},"ans":"D","exp":"'Heinous' is correctly spelled (h-e-i-n-o-u-s), but per the source's key it is flagged here as the intended misspelled answer; learners should note 'ei' after 'h' as the tricky part.","src":null,"vocab":[]},{"id":"bank-1076","q":"Select the MISSPELT word from the options below:","opts":{"A":"ferment","B":"introvert","C":"inveigle","D":"all correct"},"ans":"D","exp":"All listed words (ferment, introvert, inveigle) are correctly spelled, so the answer is 'all correct.'","src":null,"vocab":[]},{"id":"bank-1077","q":"Select the MISSPELT word from the options below:","opts":{"A":"fragrous","B":"monopoly","C":"rational","D":"demolish"},"ans":"A","exp":"The correct spelling is 'fragrant,' making 'fragrous' the misspelled word.","src":null,"vocab":[]},{"id":"bank-1078","q":"Select the opposite of the capitalized word: 'EXTANT'","opts":{"A":"existing","B":"dynamic","C":"fashionable","D":"lost"},"ans":"D","exp":"'Extant' means still in existence; its opposite is 'lost.'","src":null,"vocab":[]},{"id":"bank-1079","q":"Select the opposite of the capitalized word: 'HYPERBOLE'","opts":{"A":"exaggeration","B":"understatement","C":"distortion","D":"impression"},"ans":"B","exp":"'Hyperbole' means exaggerated statement; its opposite is 'understatement' (downplaying).","src":null,"vocab":[]},{"id":"bank-1080","q":"Select the opposite of the capitalized word: 'GARRULOUS'","opts":{"A":"talkative","B":"frank","C":"enlightening","D":"taciturn"},"ans":"D","exp":"'Garrulous' means excessively talkative; its opposite is 'taciturn' (saying little).","src":null,"vocab":[]},{"id":"bank-1081","q":"Einstein's theory of relativity seemed incredible at the time that he first introduced it.","opts":{"A":"unbelievable","B":"complicated","C":"brilliant","D":"famous"},"ans":"A","exp":"'Incredible' means hard to believe, matching 'unbelievable.'","src":null,"vocab":[]},{"id":"bank-1082","q":"It is difficult to discern the sample that is on the slide unless the microscope is adjusted.","opts":{"A":"discard","B":"arrange","C":"determine","D":"debate"},"ans":"C","exp":"'Discern' means to perceive clearly, closest among options to 'determine' (identify).","src":null,"vocab":[]},{"id":"bank-1083","q":"The remnants of the Roman Empire can be found in many countries in Asia, Europe and Africa.","opts":{"A":"effects","B":"small pieces","C":"buildings","D":"destruction"},"ans":"B","exp":"'Remnants' means surviving small portions/fragments, matching 'small pieces.'","src":null,"vocab":[]},{"id":"bank-1084","q":"Select the best interpretation for the following idiom or proverb: To smell a rat-","opts":{"A":"To detect bad smell","B":"To misunderstand","C":"To suspect a trick or deceit","D":"To see hidden meaning"},"ans":"C","exp":"'Smell a rat' is an idiom meaning to sense that something is wrong or deceptive.","src":null,"vocab":[]},{"id":"bank-1085","q":"Select the best interpretation for the following idiom or proverb: To take a leap in the dark-","opts":{"A":"To take risk","B":"To hazard oneself","C":"To do a task secretly","D":"To do a hazardous thing without any idea of the result"},"ans":"D","exp":"'Leap in the dark' means to act without knowing the outcome — a risky action with an unknown result.","src":null,"vocab":[]},{"id":"bank-1086","q":"Select the best interpretation for the following idiom or proverb: To get into hot waters-","opts":{"A":"To be impatient","B":"To suffer a huge financial loss","C":"To get into trouble","D":"To be in a confused state of mind"},"ans":"C","exp":"'Get into hot water' is an idiom meaning to get into trouble or a difficult situation.","src":null,"vocab":[]},{"id":"bank-1087","q":"Select the best interpretation for the following idiom or proverb: To be in abeyance-","opts":{"A":"To be in trouble","B":"Dual minded","C":"In a fighting mood","D":"In suspense"},"ans":"D","exp":"'In abeyance' means temporarily suspended/inactive, matching 'in suspense' (pending resolution).","src":null,"vocab":[]},{"id":"bank-1088","q":"Select the correct substitution for the following words: One who collects postage stamps-","opts":{"A":"Stamp Collector","B":"Philatelist","C":"Lexicographer","D":"Vendor"},"ans":"B","exp":"A 'philatelist' is the technical term for someone who collects and studies postage stamps.","src":null,"vocab":[]},{"id":"bank-1089","q":"Select the correct substitution for the following words: One who hates mankind-","opts":{"A":"Lover","B":"Philanthropist","C":"Misanthrope","D":"Hatter"},"ans":"C","exp":"A 'misanthrope' is someone who dislikes/distrusts humankind in general.","src":null,"vocab":[]},{"id":"bank-1090","q":"Select the correct substitution for the following words: A person claiming to be superior in culture and intellect to others-","opts":{"A":"Highbrow","B":"Aristocrat","C":"Elite","D":"Intellectual"},"ans":"A","exp":"A 'highbrow' is someone who regards themselves as superior in taste/intellect compared to others.","src":null,"vocab":[]},{"id":"bank-1091","q":"Select the correct substitution for the following words: The plants and vegetation of a region-","opts":{"A":"Fauna","B":"Climate","C":"Landscape","D":"Flora"},"ans":"D","exp":"'Flora' refers to all the plant life of a particular region, as distinguished from 'fauna' (animal life).","src":null,"vocab":[]},{"id":"bank-1092","q":"Identify the pair that expresses the same relationship as the capitalized pair: 'EXPAND : VOLUME'","opts":{"A":"ascend : flight","B":"proliferate : number","C":"bend : flexibility","D":"deflect : heading"},"ans":"B","exp":"To expand is to increase in volume; similarly, to proliferate is to increase in number — both show an action and the quantity it raises.","src":null,"vocab":[]},{"id":"bank-1093","q":"Identify the pair that expresses the same relationship as the capitalized pair: 'COWARD : BRAVE'","opts":{"A":"philanthropist : selfish","B":"martyr : impatient","C":"traitor : careful","D":"hero : cynical"},"ans":"A","exp":"A coward is the opposite of being brave; similarly, a philanthropist is the opposite of being selfish — both pairs contrast a person type with an opposing trait.","src":null,"vocab":[]},{"id":"bank-1094","q":"Identify the pair that expresses the same relationship as the capitalized pair: 'SYMPHONY : COMPOSER'","opts":{"A":"rain : flood","B":"light : switch","C":"novel : author","D":"song : music"},"ans":"C","exp":"A symphony is created by a composer; similarly, a novel is created by an author — both pairs show a creative work and its creator.","src":null,"vocab":[]},{"id":"bank-1095","q":"Identify the pair that expresses the same relationship as the capitalized pair: 'UNEQUIVOCAL : CLEAR'","opts":{"A":"gloss : agile","B":"genuine : invisible","C":"excuse : barrier","D":"frisky : playful"},"ans":"D","exp":"'Unequivocal' and 'clear' are synonyms (both mean unambiguous); similarly, 'frisky' and 'playful' are synonyms (both mean lively/spirited).","src":null,"vocab":[]},{"id":"bank-1096","q":"Choose the word opposite in meaning to the given word: 'PARALLELISM'","opts":{"A":"Divergence","B":"Obliquity","C":"Disparity","D":"Contrast"},"ans":"A","exp":"'Parallelism' means running side by side at equal distance; its opposite is 'divergence' (moving apart).","src":null,"vocab":[]},{"id":"bank-1097","q":"Choose the word opposite in meaning to the given word: 'DEBONAIR'","opts":{"A":"Good-looking","B":"Balmy","C":"Awkward","D":"Windy"},"ans":"C","exp":"'Debonair' means confident and elegant in manner; its opposite is 'awkward' (clumsy/socially uncomfortable).","src":null,"vocab":[]},{"id":"bank-1098","q":"Choose the word opposite in meaning to the given word: 'VENERATE'","opts":{"A":"Severe","B":"Respect","C":"Condemn","D":"Inculcate"},"ans":"C","exp":"'Venerate' means to deeply respect; its opposite is 'condemn' (to express strong disapproval).","src":null,"vocab":[]},{"id":"bank-1099","q":"Choose the word opposite in meaning to the given word: 'EULOGISTIC'","opts":{"A":"Brief","B":"Pretty","C":"Stern","D":"Critical"},"ans":"D","exp":"'Eulogistic' means full of praise; its opposite is 'critical' (faultfinding).","src":null,"vocab":[]},{"id":"bank-1100","q":"Choose the word opposite in meaning to the given word: 'Craven'","opts":{"A":"greedy","B":"generous","C":"coward","D":"brave"},"ans":"D","exp":"'Craven' means cowardly; its opposite is 'brave.'","src":null,"vocab":[]}]},{"id":"bank-12","title":"Bank Vocabulary [1101-1200]","questions":[{"id":"bank-1101","q":"Choose the word opposite in meaning to the given word: 'Ulterior'","opts":{"A":"tipped","B":"sparkling","C":"stated","D":"rampaging"},"ans":"C","exp":"'Ulterior' means hidden/undisclosed (motive); its opposite is 'stated' (openly declared).","src":null,"vocab":[]},{"id":"bank-1102","q":"Choose the word opposite in meaning to the given word: 'Euphonious'","opts":{"A":"strident","B":"significant","C":"lethargic","D":"distasteful"},"ans":"A","exp":"'Euphonious' means pleasant-sounding; its opposite is 'strident' (harsh-sounding).","src":null,"vocab":[]},{"id":"bank-1103","q":"Choose the word opposite in meaning to the given word: 'Laconic'","opts":{"A":"wicked","B":"verbose","C":"milky","D":"fragrance"},"ans":"B","exp":"'Laconic' means using very few words; its opposite is 'verbose' (using too many words).","src":null,"vocab":[]},{"id":"bank-1104","q":"Complete each sentence with the most appropriate word: The bureaucrat was _____ for his role in the scam.","opts":{"A":"reinstated","B":"criticized","C":"indicted","D":"identified"},"ans":"C","exp":"Being formally accused of involvement in a scam means being 'indicted.'","src":null,"vocab":[]},{"id":"bank-1105","q":"Complete each sentence with the most appropriate word: He is usually calm, but today he appears rather _____.","opts":{"A":"disturbed","B":"restless","C":"unwell","D":"ill"},"ans":"B","exp":"Contrasted with 'usually calm,' the appropriate opposite state is 'restless' (agitated).","src":null,"vocab":[]},{"id":"bank-1106","q":"Select the correct substitution for the following words: A speech made without preparation","opts":{"A":"Prepared","B":"Debate","C":"Extempore","D":"Elocution"},"ans":"C","exp":"'Extempore' describes a speech delivered without prior preparation.","src":null,"vocab":[]},{"id":"bank-1107","q":"Select the correct substitution for the following words: A sneering person who always finds faults","opts":{"A":"Cynic","B":"Cupid","C":"Kleptomaniac","D":"Crone"},"ans":"A","exp":"A 'cynic' is someone who believes the worst about people's motives and frequently finds fault.","src":null,"vocab":[]},{"id":"bank-1108","q":"Select the correct substitution for the following words: An instrument for measuring the force of the wind","opts":{"A":"Manometer","B":"Micrometer","C":"Hydrometer","D":"Anemometer"},"ans":"D","exp":"An 'anemometer' measures wind speed/force.","src":null,"vocab":[]},{"id":"bank-1109","q":"Select the correct substitution for the following words: A short journey for pleasure","opts":{"A":"Jaunt","B":"Voyage","C":"Travelling","D":"Walking"},"ans":"A","exp":"A 'jaunt' is a short trip taken for pleasure.","src":null,"vocab":[]},{"id":"bank-1110","q":"Identify the pair that expresses the same relationship as the question pair: 'Doubt : Faith'","opts":{"A":"Atheist : Religion","B":"Skeptic : Pious","C":"Iconoclast : Idol","D":"Apostate : State"},"ans":"B","exp":"Doubt is opposite to faith; similarly, a skeptic (doubter) is opposite to being pious (faithful) — both pairs contrast skepticism with belief.","src":null,"vocab":[]},{"id":"bank-1111","q":"Identify the pair that expresses the same relationship as the question pair: 'Sail : Ship'","opts":{"A":"Propeller : Aeroplane","B":"Radar : Satellite","C":"Hydrogen : Balloon","D":"Accelerator : Car"},"ans":"A","exp":"A sail propels a ship; similarly, a propeller propels an aeroplane — both pairs show a propulsion mechanism for a vehicle.","src":null,"vocab":[]},{"id":"bank-1112","q":"Identify the pair that expresses the same relationship as the question pair: 'Food : Gourmet'","opts":{"A":"Book : Critic","B":"Art : Connoisseur","C":"Sports : Fan","D":"Craft : Skill"},"ans":"B","exp":"A gourmet is an expert judge of fine food; similarly, a connoisseur is an expert judge of fine art — both pairs show a subject and its expert judge.","src":null,"vocab":[]},{"id":"bank-1113","q":"Identify the pair that expresses the same relationship as the question pair: 'Just : Arbitrary'","opts":{"A":"Order : Chaos","B":"Bare : Clothed","C":"Hope : Surprise","D":"Proper : Improper"},"ans":"A","exp":"'Just' (rule-based/fair) is opposite to 'arbitrary' (lacking system); similarly, 'order' is opposite to 'chaos' — both pairs contrast structure with its absence.","src":null,"vocab":[]},{"id":"bank-1114","q":"Identify the pair that expresses the same relationship as the question pair: 'Divide : Unite'","opts":{"A":"Split : Apart","B":"Marriage : Divorce","C":"Fission : Fusion","D":"Chasm : Gap"},"ans":"C","exp":"Divide is opposite to unite; similarly, fission (splitting) is opposite to fusion (merging), with the same sequence/order maintained.","src":null,"vocab":[]},{"id":"bank-1115","q":"Select the best option to complete the sentence: You need _____ shoes for walking in the hills.","opts":{"A":"good","B":"comfortable","C":"satisfactory","D":"sturdy"},"ans":"D","exp":"Hilly walking requires durable, robust shoes, best described as 'sturdy.'","src":null,"vocab":[]},{"id":"bank-1116","q":"Select the best option to complete the sentence: Authority _____ when it is not supported by the moral purity of its user.","opts":{"A":"crumbles","B":"waits","C":"empowers","D":"prevails"},"ans":"A","exp":"Authority without moral grounding 'crumbles' (collapses).","src":null,"vocab":[]},{"id":"bank-1117","q":"Select the best option to complete the sentence: No one likes to be forced into _____ situations.","opts":{"A":"humble","B":"insulting","C":"humiliating","D":"infuriating"},"ans":"C","exp":"'Humiliating situations' is the standard collocation for embarrassing circumstances people avoid.","src":null,"vocab":[]},{"id":"bank-1118","q":"Select the best option to complete the sentence: The reward is a _____ of her service to mankind.","opts":{"A":"memento","B":"memorial","C":"witness","D":"recognition"},"ans":"D","exp":"A reward fundamentally represents 'recognition' (acknowledgment) of one's contribution.","src":null,"vocab":[]},{"id":"bank-1119","q":"Select the best option to complete the sentence: Though they did not speak to each other much, there was a _____ understanding between them.","opts":{"A":"placid","B":"contractual","C":"tacit","D":"verbal"},"ans":"C","exp":"An unspoken mutual understanding is 'tacit' (implied without words).","src":null,"vocab":[]},{"id":"bank-1120","q":"Choose the most appropriate word to fill in the blank: These essays are intellectually _____ and represent various levels of complexity.","opts":{"A":"revealing","B":"modern","C":"superior","D":"persistent"},"ans":"A","exp":"Essays that uncover/expose deeper layers of complexity are best described as 'revealing.'","src":null,"vocab":[]},{"id":"bank-1121","q":"Choose the most appropriate word to fill in the blank: Success comes to those who are vigilant not to permit _____ from the chosen path.","opts":{"A":"deviation","B":"diversion","C":"obstruction","D":"alienation"},"ans":"A","exp":"Staying focused means avoiding 'deviation' (straying) from one's chosen path.","src":null,"vocab":[]},{"id":"bank-1122","q":"Choose the most appropriate word to fill in the blank: Sahin's behaviour is worthy of _____ by all the youngsters.","opts":{"A":"trial","B":"emulation","C":"following","D":"exploration"},"ans":"B","exp":"Behavior worth imitating to match its excellence is worthy of 'emulation.'","src":null,"vocab":[]},{"id":"bank-1123","q":"Choose the most appropriate word to fill in the blank: On his sudden demise, my emotions were so complicated that it was _____ how I felt.","opts":{"A":"unreasonable","B":"inexplicable","C":"intolerable","D":"unimaginable"},"ans":"B","exp":"Complicated emotions that cannot be put into words are 'inexplicable.'","src":null,"vocab":[]},{"id":"bank-1124","q":"Choose the most appropriate word to fill in the blank: He is so _____ of his own idea that he will not entertain any suggestion from others.","opts":{"A":"hopeful","B":"possessed","C":"Jealous","D":"enamoured"},"ans":"D","exp":"Being infatuated with one's own idea, refusing other input, is described as being 'enamoured' of it.","src":null,"vocab":[]},{"id":"bank-1125","q":"Identify the correct meaning of the following idioms: Castles in the air","opts":{"A":"Romantic designs","B":"Ideal Projects","C":"Fanciful schemes","D":"Visionary projects"},"ans":"C","exp":"'Castles in the air' means impractical, unrealistic plans, matching 'fanciful schemes.'","src":null,"vocab":[]},{"id":"bank-1126","q":"Identify the correct meaning of the following idioms: A snake in the grass","opts":{"A":"Secret or hidden enemy","B":"Unrecognizable danger","C":"Unforeseen happening","D":"Unreliable person"},"ans":"A","exp":"'A snake in the grass' is a hidden danger/treacherous person disguised as a friend.","src":null,"vocab":[]},{"id":"bank-1127","q":"Identify the correct meaning of the following idioms: To blow hot and cold","opts":{"A":"To be inconsistent","B":"To be untrustworthy","C":"Changing weather","D":"To be rich and poor frequently"},"ans":"A","exp":"'Blow hot and cold' means to keep changing one's opinion/attitude — being inconsistent.","src":null,"vocab":[]},{"id":"bank-1128","q":"Identify the correct meaning of the following idioms: To blaze trail","opts":{"A":"To set on fire","B":"To vehemently oppose","C":"To be annoyed","D":"To initiate work in a movement"},"ans":"D","exp":"'Blaze a trail' means to be a pioneer, initiating new work/methods in a field.","src":null,"vocab":[]},{"id":"bank-1129","q":"Identify the correct meaning of the following idioms: A green horn","opts":{"A":"An envious lady","B":"A trainee","C":"An inexperienced man","D":"A soft-hearted man"},"ans":"C","exp":"'Greenhorn' refers to an inexperienced, naive newcomer.","src":null,"vocab":[]},{"id":"bank-1130","q":"Complete the sentences using the most suitable option(s): The new owners of the paper changed the _____ completely.","opts":{"A":"outlay","B":"layout","C":"outlet","D":"outlook"},"ans":"B","exp":"Changing a newspaper's design/arrangement means changing its 'layout.'","src":null,"vocab":[]},{"id":"bank-1131","q":"Complete the sentences using the most suitable option(s): Patriotism, like so many other objects of this imperfect world, is a _____ web of good and evil.","opts":{"A":"complicated","B":"intricate","C":"tangled","D":"entangled"},"ans":"B","exp":"'Intricate web' is the standard collocation for something complexly interwoven, matching this context of mixed good and evil.","src":null,"vocab":[]},{"id":"bank-1132","q":"Complete the sentences using the most suitable option(s): During the _____ many buildings were _____ to the ground.","opts":{"A":"riots, collapsed","B":"fire, razed","C":"floods, extremely","D":"disturbances, brought"},"ans":"B","exp":"'Razed to the ground' is the standard idiom for buildings completely destroyed, fitting with 'fire' as the cause.","src":null,"vocab":[]},{"id":"bank-1133","q":"Complete the sentences using the most suitable option(s): In a changing and _____ unstructured business environment, creativity and innovations are being _____ demanded of executives.","opts":{"A":"excessively, rapidly","B":"highly, extremely","C":"increasingly, moderately","D":"progressively, increasingly"},"ans":"D","exp":"A 'changing' environment becoming 'progressively' unstructured matches a demand that is 'increasingly' growing.","src":null,"vocab":[]},{"id":"bank-1134","q":"Complete the sentences using the most suitable option(s): He deals _____ foreign goods only, but our firm deals _____ several leading merchants who trade _____ variety _____ goods.","opts":{"A":"in, with, in, of","B":"with, with, with, of","C":"with, in, of, with","D":"in, in, with, of"},"ans":"A","exp":"'Deal in' (goods), 'deal with' (people/merchants), 'trade in' (goods), and 'a variety of' are the correct prepositional collocations.","src":null,"vocab":[]},{"id":"bank-1135","q":"Select the opposite of the capitalized word: 'ACRIMONIOUS'","opts":{"A":"legal","B":"severe","C":"harmonious","D":"cursive"},"ans":"C","exp":"'Acrimonious' means bitter/sharp-tongued; its opposite is 'harmonious' (peaceful/agreeable).","src":null,"vocab":[]},{"id":"bank-1136","q":"Select the opposite of the capitalized word: 'ANOMALOUS'","opts":{"A":"usual","B":"vicious","C":"connected","D":"capacious"},"ans":"A","exp":"'Anomalous' means deviating from the norm; its opposite is 'usual' (normal).","src":null,"vocab":[]},{"id":"bank-1137","q":"Select the opposite of the capitalized word: 'INTRACTABLE'","opts":{"A":"wayward","B":"easygoing","C":"bleak","D":"abstinent"},"ans":"B","exp":"'Intractable' means hard to control/manage; its opposite is 'easygoing' (flexible/agreeable).","src":null,"vocab":[]},{"id":"bank-1138","q":"Select the opposite of the capitalized word: 'SEGREGATE'","opts":{"A":"abolish","B":"confuse","C":"darken","D":"compile"},"ans":"D","exp":"'Segregate' means to separate into groups; its opposite is 'compile' (to gather together).","src":null,"vocab":[]},{"id":"bank-1139","q":"Select the opposite of the capitalized word: 'RECLUSIVE'","opts":{"A":"gregarious","B":"obscure","C":"joined","D":"urban"},"ans":"A","exp":"'Reclusive' means avoiding others/solitary; its opposite is 'gregarious' (sociable).","src":null,"vocab":[]},{"id":"bank-1140","q":"Identify the meaning of the given idiom/phrase: Sunita has bitten off more than she can chew.","opts":{"A":"trying to do too much","B":"over and above","C":"beyond her capacity","D":"bad fall"},"ans":"A","exp":"'Bite off more than one can chew' means to undertake more than one's capacity allows — i.e., trying to do too much.","src":null,"vocab":[]},{"id":"bank-1141","q":"Identify the meaning of the given idiom/phrase: I have a bone to pick with you in this matter.","opts":{"A":"desire","B":"selfish motive","C":"selfless motive","D":"am angry"},"ans":"D","exp":"'Have a bone to pick' means to have a grievance/complaint with someone — i.e., to be angry about something.","src":null,"vocab":[]},{"id":"bank-1142","q":"Identify the meaning of the given idiom/phrase: So far as hazards of pollution are concerned, the traffic policeman bear the brunt.","opts":{"A":"face the consequences","B":"are exposed to the danger","C":"suffer the most","D":"have to run the risk"},"ans":"C","exp":"'Bear the brunt' means to suffer the worst/main impact of something — i.e., suffer the most.","src":null,"vocab":[]},{"id":"bank-1143","q":"Identify the meaning of the given idiom/phrase: His most trusted friend proved to be a snake in the grass.","opts":{"A":"an unreliable person","B":"low and mean","C":"a hidden enemy","D":"cowardly and brutal"},"ans":"C","exp":"'A snake in the grass' refers to a hidden enemy disguised as a friend.","src":null,"vocab":[]},{"id":"bank-1144","q":"Identify the meaning of the given idiom/phrase: You cannot have your cake and eat it too.","opts":{"A":"enjoy for ever","B":"enjoy without payment","C":"absolve yourself of guilt","D":"have it both ways"},"ans":"D","exp":"'Have your cake and eat it too' means trying to enjoy two incompatible benefits at once — i.e., have it both ways.","src":null,"vocab":[]},{"id":"bank-1145","q":"Choose the option that matches the meaning of the capitalized word: 'KNOTTY'","opts":{"A":"terrible","B":"mysterious","C":"difficult","D":"confusing"},"ans":"C","exp":"'Knotty' (problem) means complex/hard to solve, matching 'difficult.'","src":null,"vocab":[]},{"id":"bank-1146","q":"Choose the option that matches the meaning of the capitalized word: 'ERRANT'","opts":{"A":"unreliable","B":"sinful","C":"shifting","D":"confusing"},"ans":"B","exp":"'Errant' means straying from acceptable/moral behavior, matching 'sinful.'","src":null,"vocab":[]},{"id":"bank-1147","q":"Choose the option that matches the meaning of the capitalized word: 'BUCOLIC'","opts":{"A":"rural","B":"simple","C":"hidebound","D":"quite"},"ans":"A","exp":"'Bucolic' describes pleasant rural/pastoral life, matching 'rural.'","src":null,"vocab":[]},{"id":"bank-1148","q":"Choose the option that matches the meaning of the capitalized word: 'CASTIGATE'","opts":{"A":"delegate","B":"criticise","C":"evaluate","D":"enforce"},"ans":"B","exp":"'Castigate' means to severely reprimand, matching 'criticise' (a stronger form).","src":null,"vocab":[]},{"id":"bank-1149","q":"Choose the option that matches the meaning of the capitalized word: 'CORROBORATE'","opts":{"A":"disprove","B":"refute","C":"verify","D":"disapprove"},"ans":"C","exp":"'Corroborate' means to confirm/support with evidence, matching 'verify.'","src":null,"vocab":[]},{"id":"bank-1150","q":"Choose the pair that best expresses the relationship existing between the given pair: 'Contradict : Contravene'","opts":{"A":"profane : vulgarity","B":"confuse : satisfy","C":"compensate : damage","D":"deny : refute"},"ans":"D","exp":"'Contradict' and 'contravene' are synonyms (both mean to oppose/go against); similarly, 'deny' and 'refute' are synonyms (both mean to declare untrue).","src":null,"vocab":[]},{"id":"bank-1151","q":"Choose the pair that best expresses the relationship existing between the given pair: 'Deprecate : Credit'","opts":{"A":"unfair : biased","B":"bait : heckle","C":"enhance : disparage","D":"discourage : force"},"ans":"C","exp":"'Deprecate' (belittle) is opposite to 'credit' (praise); similarly, 'enhance' (improve) is opposite to 'disparage' (belittle) — both pairs show a positive-negative opposition.","src":null,"vocab":[]},{"id":"bank-1152","q":"Choose the pair that best expresses the relationship existing between the given pair: 'Blurred : Confused'","opts":{"A":"dangerous : adequate","B":"muddled : unclear","C":"scam : clarity","D":"abatement : significant"},"ans":"B","exp":"'Blurred' and 'confused' both relate to a lack of clarity; similarly, 'muddled' and 'unclear' both relate to a lack of clarity — both pairs are near-synonymous.","src":null,"vocab":[]},{"id":"bank-1153","q":"Choose the pair that best expresses the relationship existing between the given pair: 'Harm : Damage'","opts":{"A":"injure : incapacitate","B":"sweet : sour","C":"stout : weak","D":"hook : crook"},"ans":"A","exp":"'Harm' and 'damage' are synonyms with a degree relationship; similarly, 'injure' can lead to being 'incapacitated' — both show a related progression of harm.","src":null,"vocab":[]},{"id":"bank-1154","q":"Choose the pair that best expresses the relationship existing between the given pair: 'Biased : Partial'","opts":{"A":"built-in : included","B":"axle : wheel","C":"partisan : prejudiced","D":"leaning : yield"},"ans":"C","exp":"'Biased' and 'partial' are synonyms (both mean favoring one side unfairly); similarly, 'partisan' and 'prejudiced' are synonyms (both mean favoring one side).","src":null,"vocab":[]},{"id":"bank-1155","q":"What is the Synonym for the word 'FIDELITY'?","opts":{"A":"Injurious","B":"Repent","C":"Praise","D":"Loyalty"},"ans":"D","exp":"'Fidelity' means faithfulness/loyalty, matching 'loyalty.'","src":null,"vocab":[]},{"id":"bank-1156","q":"The Antonym for 'INGENIOUS' is:","opts":{"A":"Crafty","B":"Inane","C":"Incompetent","D":"Skillful"},"ans":"B","exp":"'Ingenious' means cleverly inventive; its opposite is 'inane' (silly/lacking sense).","src":null,"vocab":[]},{"id":"bank-1157","q":"Find the misspelt word:","opts":{"A":"Commitee","B":"Enthusiasm","C":"Recession","D":"Extroversion"},"ans":"A","exp":"The correct spelling is 'Committee' (double m, double t, double e), making 'Commitee' the misspelled word.","src":null,"vocab":[]},{"id":"bank-1158","q":"REPTILE is to LIZARD as FLOWER is to","opts":{"A":"PETAL","B":"STEM","C":"ALLIGATOR","D":"DAISY"},"ans":"D","exp":"A lizard is a specific type of reptile; similarly, a daisy is a specific type of flower — both pairs show a category and a specific example.","src":null,"vocab":[]},{"id":"bank-1159","q":"Choose the best alternative: A thing kept in the memory of a person","opts":{"A":"memento","B":"epitaph","C":"elegy","D":"gift"},"ans":"A","exp":"A 'memento' is kept to remember a person, place, or event.","src":null,"vocab":[]},{"id":"bank-1160","q":"Choose the best alternative: A place where everything is perfect","opts":{"A":"Heaven","B":"Platoon","C":"Cosmos","D":"Utopia"},"ans":"D","exp":"'Utopia' is an imagined ideal place where everything is perfect.","src":null,"vocab":[]},{"id":"bank-1161","q":"Choose the best alternative: A person who speaks for other","opts":{"A":"Reporter","B":"Spokesman","C":"Alien","D":"Supporter"},"ans":"B","exp":"A 'spokesman' formally speaks on behalf of others.","src":null,"vocab":[]},{"id":"bank-1162","q":"Choose the best alternative: A person who rarely speaks the truth","opts":{"A":"Liar","B":"Scoundrel","C":"Crook","D":"Hypocrite"},"ans":"A","exp":"Someone who rarely tells the truth is simply a 'liar.'","src":null,"vocab":[]},{"id":"bank-1163","q":"Choose the best alternative: A man who pays too much attention to his clothes and personal appearance","opts":{"A":"Snob","B":"Duffer","C":"Dandy","D":"Licentious"},"ans":"C","exp":"A 'dandy' is a man excessively concerned with fashionable clothes and appearance.","src":null,"vocab":[]},{"id":"bank-1164","q":"Select the correct meaning of the following idioms: To smell a rat","opts":{"A":"To detect bad smell","B":"To misunderstand","C":"To suspect a trick or deceit","D":"To see hidden meaning"},"ans":"C","exp":"'Smell a rat' means to suspect something is wrong/deceptive.","src":null,"vocab":[]},{"id":"bank-1165","q":"Select the correct meaning of the following idioms: To take a leap in the dark","opts":{"A":"To take risk","B":"To hazard one self","C":"To do a task secretly","D":"To do a hazardous thing without any idea of the result"},"ans":"D","exp":"'Leap in the dark' means acting without knowing the outcome.","src":null,"vocab":[]},{"id":"bank-1166","q":"Select the correct meaning of the following idioms: By the rule of thumb","opts":{"A":"By the use of force","B":"By practical experience which is rather rough","C":"By cheating and deception","D":"By the use of trickery"},"ans":"B","exp":"'Rule of thumb' refers to a practical, roughly approximate method based on experience rather than precise calculation.","src":null,"vocab":[]},{"id":"bank-1167","q":"Select the correct meaning of the following idioms: Bird's eye View","opts":{"A":"To view something closely","B":"To view suspiciously","C":"To view in general from above","D":"To look from a different angle"},"ans":"C","exp":"'Bird's eye view' means a general overview seen from above, without detail.","src":null,"vocab":[]},{"id":"bank-1168","q":"Select the correct meaning of the following idioms: A fool's paradise","opts":{"A":"Paradise of Idiot","B":"To have happy dreams","C":"To live in the past","D":"To live in illusions"},"ans":"D","exp":"'A fool's paradise' means a state of happiness based on false hope/illusion rather than reality.","src":null,"vocab":[]},{"id":"bank-1169","q":"Identify the word with the incorrect prefix or suffix:","opts":{"A":"Equilateral","B":"Equiradial","C":"Equilibrate","D":"Equidistribute"},"ans":"D","exp":"'Equidistribute' is not a standard English word, unlike the other correctly formed 'equi-' words.","src":null,"vocab":[]},{"id":"bank-1170","q":"Identify the word with the incorrect prefix or suffix:","opts":{"A":"Qualify","B":"Simplify","C":"Exemplify","D":"Redemnify"},"ans":"D","exp":"The correct word for compensating for loss is 'Indemnify,' making 'Redemnify' an incorrectly formed word.","src":null,"vocab":[]},{"id":"bank-1171","q":"Identify the word with the incorrect prefix or suffix:","opts":{"A":"Disenthrall","B":"Disaccordant","C":"Discolored","D":"Discreate"},"ans":"D","exp":"The correct negation of 'create' is 'Uncreate,' making 'Discreate' an incorrectly formed word.","src":null,"vocab":[]},{"id":"bank-1172","q":"Identify the word with the incorrect prefix or suffix:","opts":{"A":"Irreversible","B":"Irregular","C":"Irresponsible","D":"Irrepeatable"},"ans":"D","exp":
