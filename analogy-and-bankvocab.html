/* ============================================================
   DESIGN TOKENS
   Palette: warm paper background, deep ink-blue accent (academic,
   not corporate-Material-purple), muted semantic colors.
   ============================================================ */
:root{
  --paper:#FAF8F4;
  --paper-raised:#FFFFFF;
  --ink:#1A2331;
  --ink-soft:#5B6473;
  --ink-faint:#8B92A0;
  --line:#E4E0D8;
  --accent:#1E3A5F;
  --accent-mid:#2D5F8A;
  --accent-pale:#E8EEF4;
  --accent-soft:#D7E3EE;
  --correct:#2F6B4F;
  --correct-bg:#E7F1EB;
  --wrong:#A23B3B;
  --wrong-bg:#F7E9E8;
  --bookmark:#C28A1E;
  --bookmark-bg:#FBF1DD;
  --visited:#2D5F8A;
  --not-visited:#C7C2B6;
  --shadow-sm:0 1px 2px rgba(26,35,49,0.06), 0 1px 1px rgba(26,35,49,0.04);
  --shadow-md:0 2px 8px rgba(26,35,49,0.08), 0 1px 2px rgba(26,35,49,0.06);
  --shadow-lg:0 8px 24px rgba(26,35,49,0.12), 0 2px 6px rgba(26,35,49,0.06);
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --header-h:60px;
}
:root[data-theme="dark"]{
  --paper:#14181F;
  --paper-raised:#1C212B;
  --ink:#EDEFF2;
  --ink-soft:#A7AEBA;
  --ink-faint:#6E7685;
  --line:#2A2F3A;
  --accent:#6FA3D8;
  --accent-mid:#8FBCE8;
  --accent-pale:#1E2A3A;
  --accent-soft:#243347;
  --correct:#5FB98A;
  --correct-bg:#1B2E24;
  --wrong:#E08585;
  --wrong-bg:#2E1C1C;
  --bookmark:#E8B84E;
  --bookmark-bg:#332A14;
  --visited:#6FA3D8;
  --not-visited:#3A4150;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.5);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Lexend',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-weight:400;
  line-height:1.5;
  min-height:100vh;
  transition:background-color .25s ease, color .25s ease;
}
button{font-family:inherit;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
:focus-visible{outline:2px solid var(--accent-mid);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
}

#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  position:sticky;top:0;z-index:40;
  height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:var(--paper-raised);
  border-bottom:1px solid var(--line);
}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0;}
.topbar-brand{display:flex;align-items:center;gap:8px;cursor:pointer;background:none;border:none;padding:4px;color:var(--ink);}
.topbar-mark{
  width:30px;height:30px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.topbar-mark svg{width:17px;height:17px;}
.topbar-title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-title small{display:block;font-weight:400;font-size:11px;color:var(--ink-faint);}
.topbar-right{display:flex;align-items:center;gap:6px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);
  transition:background .15s ease, color .15s ease;
}
.icon-btn:hover{background:var(--accent-pale);color:var(--accent);}
.icon-btn svg{width:20px;height:20px;}

main{flex:1;width:100%;}
.container{max-width:1080px;margin:0 auto;padding:20px 16px 48px;}
.container-narrow{max-width:720px;margin:0 auto;padding:20px 16px 48px;}

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-sm);
}
.card-pad{padding:20px;}
.section-title{
  font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ink-faint);margin:0 0 12px;
}
.h1{font-size:26px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em;}
.h2{font-size:19px;font-weight:600;margin:0 0 4px;letter-spacing:-.005em;}
.subtle{color:var(--ink-soft);font-size:14px;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:14px;font-weight:600;font-family:inherit;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease, opacity .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm);}
.btn-primary:hover:not(:disabled){background:var(--accent-mid);box-shadow:var(--shadow-md);}
.btn-secondary{background:var(--accent-pale);color:var(--accent);}
.btn-secondary:hover:not(:disabled){background:var(--accent-soft);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn-ghost:hover:not(:disabled){background:var(--accent-pale);color:var(--accent);border-color:var(--accent-soft);}
.btn-block{width:100%;}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;}
.btn-danger{background:var(--wrong-bg);color:var(--wrong);}
.btn-danger:hover:not(:disabled){opacity:.85;}

.dash-grid{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:760px){.dash-grid{grid-template-columns:1.3fr 1fr;}}

.rank-card{
  background:linear-gradient(135deg,var(--accent) 0%, var(--accent-mid) 100%);
  color:#fff;border-radius:var(--radius-lg);padding:22px;
  display:flex;align-items:center;gap:18px;box-shadow:var(--shadow-md);
  position:relative;overflow:hidden;
}
.rank-card::after{
  content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,255,255,0.07);
}
.rank-stamp{
  width:74px;height:74px;flex-shrink:0;position:relative;z-index:1;
  clip-path:polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
  background:rgba(255,255,255,0.16);
  border:2px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;text-align:center;letter-spacing:.03em;
  text-transform:uppercase;line-height:1.15;padding:4px;
}
.rank-info{position:relative;z-index:1;min-width:0;}
.rank-info .label{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.rank-info .name{font-size:24px;font-weight:700;margin:2px 0 6px;}
.rank-bar-track{width:100%;max-width:220px;height:6px;background:rgba(255,255,255,0.25);border-radius:4px;overflow:hidden;}
.rank-bar-fill{height:100%;background:#fff;border-radius:4px;transition:width .4s ease;}
.rank-info .progress-label{font-size:11px;opacity:.75;margin-top:4px;}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
.stat-tile{
  background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 12px;text-align:left;
}
.stat-tile .num{font-size:22px;font-weight:700;line-height:1.1;letter-spacing:-.01em;}
.stat-tile .lbl{font-size:11.5px;color:var(--ink-faint);margin-top:3px;font-weight:500;}
.stat-tile.correct .num{color:var(--correct);}
.stat-tile.wrong .num{color:var(--wrong);}
.stat-tile.accent .num{color:var(--accent);}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.mode-grid{grid-template-columns:1fr;}}
.mode-card{
  border-radius:var(--radius-md);padding:18px;cursor:pointer;border:1.5px solid var(--line);
  background:var(--paper-raised);text-align:left;transition:border-color .15s ease, box-shadow .15s ease, transform .12s ease;
  display:flex;flex-direction:column;gap:8px;
}
.mode-card:hover{border-color:var(--accent-mid);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.mode-card:active{transform:translateY(0) scale(.99);}
.mode-card .mc-icon{
  width:38px;height:38px;border-radius:10px;background:var(--accent-pale);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.mode-card .mc-icon svg{width:20px;height:20px;}
.mode-card .mc-title{font-weight:600;font-size:15px;}
.mode-card .mc-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}

.utility-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
@media(max-width:560px){.utility-row{grid-template-columns:1fr 1fr;}}
.utility-card{
  border-radius:var(--radius-sm);padding:14px;border:1px solid var(--line);background:var(--paper-raised);
  cursor:pointer;text-align:left;transition:border-color .15s ease, transform .12s ease;
  display:flex;flex-direction:column;gap:6px;
}
.utility-card:hover{border-color:var(--accent-mid);transform:translateY(-1px);}
.utility-card .uc-top{display:flex;align-items:center;justify-content:space-between;}
.utility-card svg{width:18px;height:18px;color:var(--accent);}
.utility-card .uc-count{font-size:11px;background:var(--accent-pale);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600;}
.utility-card .uc-title{font-size:13.5px;font-weight:600;}

.subject-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.subject-tab{
  padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--paper-raised);
  font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .15s ease;
}
.subject-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.subject-tab .count{opacity:.7;font-weight:400;margin-left:4px;}

.chapter-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;padding-right:4px;}
.chapter-row{
  display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:var(--paper-raised);cursor:pointer;transition:all .12s ease;
}
.chapter-row:hover{border-color:var(--accent-mid);}
.chapter-row.selected{border-color:var(--accent);background:var(--accent-pale);}
.chapter-row .chk{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .12s ease;
}
.chapter-row.selected .chk{background:var(--accent);border-color:var(--accent);}
.chapter-row.selected .chk svg{width:13px;height:13px;color:#fff;}
.chapter-row .ch-name{font-size:14px;font-weight:500;flex:1;min-width:0;}
.chapter-row .ch-meta{font-size:12px;color:var(--ink-faint);flex-shrink:0;}
.select-all-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.link-btn{background:none;border:none;color:var(--accent-mid);font-size:13px;font-weight:600;cursor:pointer;padding:4px;}

.setup-footer{
  position:sticky;bottom:0;background:var(--paper-raised);border-top:1px solid var(--line);
  padding:14px 16px;margin:20px -16px -48px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
@media(min-width:760px){.setup-footer{margin:20px 0 0;border-radius:var(--radius-md);border:1px solid var(--line);position:static;}}

.quiz-shell{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:880px){.quiz-shell{grid-template-columns:1fr 280px;}}

.quiz-header-bar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;
}
.q-progress-wrap{flex:1;min-width:160px;}
.q-counter{font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.progress-track{width:100%;height:6px;background:var(--line);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s ease;}

.timer-pill{
  display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;
  background:var(--accent-pale);color:var(--accent);font-weight:700;font-size:14.5px;
  font-variant-numeric:tabular-nums;
}
.timer-pill svg{width:16px;height:16px;}
.timer-pill.warn{background:var(--wrong-bg);color:var(--wrong);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}

.palette-toggle-btn{display:none;}
@media(max-width:879px){.palette-toggle-btn{display:flex;}}

.question-card{padding:24px;}
@media(max-width:560px){.question-card{padding:18px;}}
.q-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;}
.q-chapter-tag{font-size:11.5px;font-weight:600;color:var(--accent);background:var(--accent-pale);padding:4px 10px;border-radius:12px;}
.q-text{font-size:18px;font-weight:500;line-height:1.55;margin:0 0 22px;letter-spacing:-.005em;}
@media(max-width:560px){.q-text{font-size:16.5px;}}

.options-list{display:flex;flex-direction:column;gap:10px;}
.option-row{
  display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:var(--paper-raised);cursor:pointer;text-align:left;
  transition:all .12s ease;font-size:14.5px;line-height:1.45;width:100%;color:var(--ink);
}
.option-row:hover:not(.locked){border-color:var(--accent-mid);background:var(--accent-pale);}
.option-row .opt-label{
  width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;color:var(--ink-soft);
  transition:all .12s ease;
}
.option-row.selected:not(.locked){border-color:var(--accent);background:var(--accent-pale);}
.option-row.selected:not(.locked) .opt-label{background:var(--accent);border-color:var(--accent);color:#fff;}

.option-row.locked{cursor:default;}
.option-row.correct-answer{border-color:var(--correct);background:var(--correct-bg);}
.option-row.correct-answer .opt-label{background:var(--correct);border-color:var(--correct);color:#fff;}
.option-row.wrong-answer{border-color:var(--wrong);background:var(--wrong-bg);}
.option-row.wrong-answer .opt-label{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.option-row .opt-icon{margin-left:auto;flex-shrink:0;width:18px;height:18px;}
.option-row .opt-icon svg{width:18px;height:18px;}

.q-actions-row{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.bookmark-toggle{
  display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:var(--paper-raised);cursor:pointer;font-size:13px;font-weight:600;
  color:var(--ink-soft);transition:all .12s ease;
}
.bookmark-toggle svg{width:16px;height:16px;}
.bookmark-toggle.active{border-color:var(--bookmark);background:var(--bookmark-bg);color:var(--bookmark);}

.feedback-panel{
  margin-top:18px;padding:18px;border-radius:var(--radius-sm);background:var(--accent-pale);
  border-left:4px solid var(--accent);animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.feedback-panel.is-correct{background:var(--correct-bg);border-left-color:var(--correct);}
.feedback-panel.is-wrong{background:var(--wrong-bg);border-left-color:var(--wrong);}
.feedback-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;margin-bottom:8px;}
.feedback-head.txt-correct{color:var(--correct);}
.feedback-head.txt-wrong{color:var(--wrong);}
.feedback-head svg{width:18px;height:18px;}
.feedback-body{font-size:14px;line-height:1.6;color:var(--ink);}
.feedback-section{margin-top:12px;}
.feedback-section-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-bottom:6px;}
.source-tag{font-size:12px;color:var(--ink-faint);margin-top:10px;font-style:italic;}

.vocab-chip-list{display:flex;flex-direction:column;gap:8px;}
.vocab-chip{background:var(--paper-raised);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.vocab-chip .vw{font-weight:700;font-size:14px;color:var(--accent);}
.vocab-chip .vm{font-size:13px;color:var(--ink);margin-top:2px;}
.vocab-chip .vs{font-size:12px;color:var(--ink-faint);margin-top:3px;}
.vocab-chip .vs b{color:var(--ink-soft);font-weight:600;}

.quiz-nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:10px;}

.palette-card{padding:16px;}
.palette-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-size:11.5px;color:var(--ink-soft);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
@media(min-width:880px){.palette-grid{grid-template-columns:repeat(4,1fr);}}
.palette-cell{
  aspect-ratio:1;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;position:relative;
  transition:transform .1s ease;
}
.palette-cell:hover{transform:scale(1.08);}
.palette-cell.current{box-shadow:0 0 0 2px var(--paper-raised), 0 0 0 4px var(--accent);}
.palette-cell.pc-notvisited{background:var(--not-visited);color:var(--ink);}
.palette-cell.pc-visited{background:var(--visited);}
.palette-cell.pc-correct{background:var(--correct);}
.palette-cell.pc-wrong{background:var(--wrong);}
.palette-cell .bm-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--bookmark);border:1.5px solid var(--paper-raised);}

.palette-drawer-overlay{display:none;}
@media(max-width:879px){
  .palette-drawer-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:60;
  }
  .palette-drawer-overlay.open{display:block;}
  .palette-drawer{
    position:fixed;right:0;top:0;bottom:0;width:min(320px,85vw);background:var(--paper-raised);
    z-index:61;transform:translateX(100%);transition:transform .25s ease;padding:18px;overflow-y:auto;
    box-shadow:var(--shadow-lg);
  }
  .palette-drawer.open{transform:translateX(0);}
  .palette-drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
}
@media(min-width:880px){.palette-drawer{display:block;}}

.result-hero{text-align:center;padding:32px 20px;}
.result-ring-wrap{position:relative;width:160px;height:160px;margin:0 auto 16px;}
.result-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.result-ring-track{fill:none;stroke:var(--line);stroke-width:10;}
.result-ring-fill{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.result-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-ring-center .pct{font-size:32px;font-weight:700;}
.result-ring-center .lbl{font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

.result-stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px;}
@media(min-width:520px){.result-stats-grid{grid-template-columns:repeat(4,1fr);}}

.analytics-section{margin-bottom:24px;}
.bar-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;}
.bar-chart-label{width:130px;flex-shrink:0;color:var(--ink-soft);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-chart-track{flex:1;height:18px;background:var(--accent-pale);border-radius:5px;overflow:hidden;}
.bar-chart-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .5s ease;}
.bar-chart-val{width:42px;text-align:right;font-weight:700;font-size:12.5px;color:var(--ink-soft);}

canvas.analytics-canvas{width:100%;max-width:100%;}

.search-input-wrap{position:relative;margin-bottom:18px;}
.search-input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-faint);}
.search-input{
  width:100%;padding:13px 14px 13px 42px;border-radius:var(--radius-sm);border:1.5px solid var(--line);
  font-size:15px;font-family:inherit;background:var(--paper-raised);color:var(--ink);
}
.search-input:focus{border-color:var(--accent-mid);}
.vocab-result-card{padding:16px;margin-bottom:10px;}
.vocab-result-word{font-size:17px;font-weight:700;color:var(--accent);}
.vocab-result-meaning{font-size:14px;margin-top:4px;}
.vocab-result-meta{display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--ink-faint);flex-wrap:wrap;}
.vocab-result-meta b{color:var(--ink-soft);}
.empty-state{text-align:center;padding:50px 20px;color:var(--ink-faint);}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.5;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(20,20,25,0.5);z-index:80;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-box{
  background:var(--paper-raised);border-radius:var(--radius-lg);padding:26px;max-width:420px;width:100%;
  box-shadow:var(--shadow-lg);text-align:center;
}
.modal-box .modal-icon{width:48px;height:48px;margin:0 auto 14px;color:var(--accent);}
.modal-box h3{font-size:18px;margin:0 0 8px;}
.modal-box p{font-size:14px;color:var(--ink-soft);margin:0 0 20px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:center;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:30px;font-size:13.5px;
  font-weight:600;box-shadow:var(--shadow-lg);z-index:100;transition:transform .25s ease;
  display:flex;align-items:center;gap:8px;max-width:90vw;
}
.toast.show{transform:translateX(-50%) translateY(0);}
:root[data-theme="dark"] .toast{background:var(--paper-raised);color:var(--ink);border:1px solid var(--line);}

.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tab-row{display:flex;gap:6px;background:var(--accent-pale);border-radius:12px;padding:4px;margin-bottom:18px;}
.tab-row button{
  flex:1;padding:9px;border-radius:9px;border:none;background:transparent;font-size:13.5px;font-weight:600;
  color:var(--ink-soft);cursor:pointer;transition:all .15s ease;font-family:inherit;
}
.tab-row button.active{background:var(--paper-raised);color:var(--accent);box-shadow:var(--shadow-sm);}

.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:13.5px;font-weight:600;
  background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:8px;}
.back-link svg{width:16px;height:16px;}
.back-link:hover{color:var(--accent);}

.divider{height:1px;background:var(--line);margin:20px 0;}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>

<script>
const DB = {"subjects":[{"id":"bank","name":"Bank Vocabulary (Sentence Completion)","chapters":[{"id":"bank-1","title":"Bank Vocabulary [001-100]","questions":[{"id":"bank-1","q":"We lost confidence in him because he never _____ the grandiose promises he had made.","opts":{"A":"forgot about","B":"reneged on","C":"tired of","D":"delivered on"},"ans":"D","exp":"To 'deliver on' a promise means to fulfill it. The sentence needs a word meaning he never fulfilled his promises. Mnemonic: 'Home delivery' = delivering on what was promised.","src":null,"vocab":[]},{"id":"bank-2","q":"If you are trying to make a strong impression on your audience, you cannot do so by being understated, tentative, or _____.","opts":{"A":"hyperbolic","B":"restrained","C":"argumentative","D":"authoritative"},"ans":"B","exp":"'Restrained' (controlled/reserved) fits the list of weak, unconfident traits (understated, tentative) that prevent a strong impression. Mnemonic: a 'restraint' system holds you back, just as restrained behavior holds back impact.","src":null,"vocab":[]},{"id":"bank-3","q":"The reasoning in this editorial is so _____ that we cannot see how anyone can be deceived by it.","opts":{"A":"coherent","B":"astute","C":"cogent","D":"specious"},"ans":"D","exp":"'Specious' means seemingly true but actually false/misleading — exactly the kind of reasoning that deceives people. Mnemonic: specious sounds like 'suspicious'.","src":null,"vocab":[]},{"id":"bank-4","q":"If you are seeking _____ that will resolve all our ailments, you are undertaking an impossible task.","opts":{"A":"a precedent","B":"a panacea","C":"an abstraction","D":"a direction"},"ans":"B","exp":"A 'panacea' is a cure-all / universal remedy, matching 'resolve all our ailments.' Mnemonic: Greek root 'pan' = all (as in pandemic, panorama).","src":null,"vocab":[]},{"id":"bank-5","q":"The young man was quickly promoted when his employers saw how _____ he was.","opts":{"A":"indigent","B":"indifferent","C":"assiduous","D":"lethargic"},"ans":"C","exp":"'Assiduous' means hard-working/diligent — the quality that earns quick promotion. Mnemonic: think of an industrious 'ass' (donkey) working hard.","src":null,"vocab":[]},{"id":"bank-6","q":"Because it arrives so early in the season before many other birds, the robin has been called the _____ of spring.","opts":{"A":"hostage","B":"autocrat","C":"harbinger","D":"newcomer"},"ans":"C","exp":"A 'harbinger' is something that signals the imminent arrival of something else — here, the robin signals spring's arrival. Mnemonic: harbinger relates to 'bring' (it brings news of what's coming).","src":null,"vocab":[]},{"id":"bank-7","q":"Although the economy suffers downturns, it also has strong _____ and self-correction tendencies.","opts":{"A":"unstable","B":"recidivist","C":"inauspicious","D":"recuperative"},"ans":"D","exp":"'Although' signals contrast with 'downturns,' so a positive recovery-related word is needed. 'Recuperative' means able to recover, fitting with 'self-correction.' Mnemonic: relates to 'recover/recuperate.'","src":null,"vocab":[]},{"id":"bank-8","q":"Choose the word most opposite in meaning - The opposite of the word 'untenable' is:","opts":{"A":"false","B":"precise","C":"defensible","D":"hypothetical"},"ans":"C","exp":"'Untenable' means indefensible/cannot be supported; its opposite is 'defensible' (able to be justified or supported).","src":null,"vocab":[]},{"id":"bank-9","q":"Choose the word most opposite in meaning - The opposite of the word 'terminate' is:","opts":{"A":"depart","B":"prevent","C":"begin","D":"change"},"ans":"C","exp":"'Terminate' means to end; its direct opposite is 'begin' (to start). Root: Latin 'terminus' = end.","src":null,"vocab":[]},{"id":"bank-10","q":"The word 'evasive' means:","opts":{"A":"elusive","B":"serene","C":"pensive","D":"mistaken"},"ans":"A","exp":"'Evasive' (avoiding directness) is closest in meaning to 'elusive' (hard to pin down/catch). Mnemonic: evasive relates to 'evade/escape.'","src":null,"vocab":[]},{"id":"bank-11","q":"The word 'plethora' means:","opts":{"A":"despair","B":"aversion","C":"excess","D":"scarcity"},"ans":"C","exp":"'Plethora' means an excessive amount/abundance. Mnemonic: think 'plenty' — the opposite of scarcity.","src":null,"vocab":[]},{"id":"bank-12","q":"The word 'disregard' means:","opts":{"A":"admit","B":"evade","C":"ignore","D":"improve"},"ans":"C","exp":"'Disregard' means to ignore or pay no attention to something. Mnemonic: 'dis-' (not) + 'regard' (consider) = not consider, i.e., ignore.","src":null,"vocab":[]},{"id":"bank-13","q":"I don't know how you can _____ so much noise?","opts":{"A":"put away","B":"put off","C":"put up with","D":"put back"},"ans":"C","exp":"'Put up with' means to tolerate/endure something unpleasant — fitting for tolerating noise.","src":null,"vocab":[]},{"id":"bank-14","q":"Such an _____ act of hostility can lead to war.","opts":{"A":"overt","B":"isolated","C":"erratic","D":"occasional"},"ans":"A","exp":"'Overt' means open/obvious; an open act of hostility (rather than a hidden or minor one) is what plausibly leads to war. Mnemonic: overt = open (opposite of 'covert' = hidden).","src":null,"vocab":[]},{"id":"bank-15","q":"Choose the word most opposite in meaning - The opposite meaning of the word 'ALLEVIATE' is:","opts":{"A":"Scatter","B":"Approve","C":"Aggravate","D":"Alter"},"ans":"C","exp":"'Alleviate' means to relieve/ease (e.g., pain); its opposite is 'aggravate' (to make worse).","src":null,"vocab":[]},{"id":"bank-16","q":"Choose the word that is nearest in the meaning to the word 'economize'.","opts":{"A":"Accumulate","B":"Minimize","C":"Save","D":"Reduce"},"ans":"C","exp":"'Economize' means to be thrifty/spend less in order to save money — closest synonym is 'save,' which captures the purpose (not just reduction) behind economizing.","src":null,"vocab":[]},{"id":"bank-17","q":"Fill in the blank with the best word: Her _____ should not be confused with miserliness; as long as I have known her, she has always been willing to assist those who are in need.","opts":{"A":"intemperance","B":"intolerance","C":"apprehension","D":"frugality"},"ans":"D","exp":"'Frugality' (being thrifty without being stingy) fits — she's careful with money but still generous, distinguishing it from miserliness.","src":null,"vocab":[]},{"id":"bank-18","q":"Fill in the blank with the best word: Natural selection tends to eliminate genes that cause inherited diseases... consequently, hereditary diseases that are _____ would be expected to be very _____, but surprisingly, they are not.","opts":{"A":"lethal, rare","B":"untreated, dangerous","C":"unusual, refractory","D":"new, perplexing"},"ans":"A","exp":"Natural selection eliminates lethal (deadly) genetic diseases over time, so they should become rare — yet surprisingly they aren't, creating the contrast in the sentence.","src":null,"vocab":[]},{"id":"bank-19","q":"Fill in the blank with the best word: For centuries animals have been used as _____ for people in experiments to assess the effects of therapeutic and other agents that might later be used in humans.","opts":{"A":"examples","B":"surrogates","C":"companions","D":"benefactors"},"ans":"B","exp":"Animals act as substitutes/stand-ins ('surrogates') for humans in experiments, since testing directly on humans would be risky.","src":null,"vocab":[]},{"id":"bank-20","q":"Select the pair with a similar relationship - ADULT : CHILD","opts":{"A":"horse : mare","B":"cat : kitten","C":"swine : sow","D":"human : animal"},"ans":"B","exp":"Adult:Child is a mature-vs-young-form relationship; cat:kitten matches this (kitten is a young cat), unlike horse:mare (male:female) or human:animal (classification).","src":null,"vocab":[]},{"id":"bank-21","q":"Select the pair with a similar relationship - GLOSSARY : TEXT","opts":{"A":"bibliography : source","B":"abstract : dissertation","C":"legend : map","D":"index : catalog"},"ans":"C","exp":"A glossary explains terms within a text; similarly, a legend explains symbols within a map — both are explanatory-key-to-main-body relationships.","src":null,"vocab":[]},{"id":"bank-22","q":"Select the pair with a similar relationship - CLOT : DISSOLVED","opts":{"A":"crowd : dispersed","B":"chain : disengaged","C":"disciple : inspired","D":"carton : distorted"},"ans":"A","exp":"A clot is a dense mass that is broken up by dissolving; similarly, a crowd is a dense group broken up by dispersing.","src":null,"vocab":[]},{"id":"bank-23","q":"Select the pair with a similar relationship - APPLE : FRUIT","opts":{"A":"egg : chicken","B":"wool : fabric","C":"wick : candle","D":"fuse : head"},"ans":"B","exp":"An apple is a type of fruit (example:category); similarly, wool is a type of fabric.","src":null,"vocab":[]},{"id":"bank-24","q":"Select the pair with a similar relationship - ENVELOPE : LETTER","opts":{"A":"scarf : hat","B":"box : bag","C":"crate : produce","D":"blood : head"},"ans":"C","exp":"An envelope is a container used to hold/transport a letter; similarly, a crate is a container used to hold/transport produce.","src":null,"vocab":[]},{"id":"bank-25","q":"Select the pair with a similar relationship - SOUND : AIR","opts":{"A":"oil : tanker","B":"signal : wave","C":"electricity : copper","D":"light : camera"},"ans":"C","exp":"Sound travels through air as its medium; similarly, electricity travels through copper as its medium.","src":null,"vocab":[]},{"id":"bank-26","q":"Which of the following is not a Synonym of the word 'repercussion'?","opts":{"A":"consequence","B":"aftermath","C":"influence","D":"ramification/situation"},"ans":"D","exp":"'Repercussion' means an indirect consequence/effect. 'Situation' (mere state of affairs) is not a synonym, unlike consequence, aftermath, influence, and ramification.","src":null,"vocab":[]},{"id":"bank-27","q":"'Be that as it may' means-","opts":{"A":"but","B":"and","C":"as well as","D":"however"},"ans":"D","exp":"This idiom is used to concede a point before introducing a contrasting idea, equivalent to 'however/nevertheless.'","src":null,"vocab":[]},{"id":"bank-28","q":"He died _____ over eating. Fill in the blank.","opts":{"A":"from","B":"of","C":"by","D":"with"},"ans":"A","exp":"'Die from' is used for external/indirect causes (overeating, wounds), while 'die of' is used for diseases (e.g., die of cancer).","src":null,"vocab":[]},{"id":"bank-29","q":"The student was run _____ by a truck. Fill in the blank.","opts":{"A":"over","B":"down","C":"out","D":"into"},"ans":"A","exp":"'Run over' is the phrasal verb meaning a vehicle passes over and crushes someone.","src":null,"vocab":[]},{"id":"bank-30","q":"Choose the best word(s) for the blank: Neither the ideas of philosophers nor the practices of ordinary people can, by themselves, _____ reality... and landless revolution is the _____ of the two.","opts":{"A":"Constitute, divergence","B":"Affect, aim","C":"Transform, interplay","D":"Alter, intervention"},"ans":"C","exp":"Neither alone can 'transform' reality; real change comes from the 'interplay' (interaction) between ideas and practice.","src":null,"vocab":[]},{"id":"bank-31","q":"Choose the best word(s) for the blank: Employees had become so inured to the caprices of top management's personnel policies that they greeted the announcement of a company-wide dress code with _____.","opts":{"A":"Astonishment","B":"Impassivity","C":"Confusion","D":"Resentment"},"ans":"B","exp":"'Inured' means accustomed/desensitized — having grown used to erratic policies, employees would react with indifference ('impassivity'), not surprise.","src":null,"vocab":[]},{"id":"bank-32","q":"Choose the best word(s) for the blank: Although providing wild chimpanzees with food makes them less _____ and easier to study, it is also known to their normal social patterns.","opts":{"A":"interesting, reinforce","B":"manageable, upset","C":"shy, disrupt","D":"poised, inhibit"},"ans":"C","exp":"Feeding makes wild chimps less 'shy' (easier to study) but 'disrupts' their normal social patterns — a contrast set up by 'although.'","src":null,"vocab":[]},{"id":"bank-33","q":"Choose the best word(s) for the blank: There has been a tendency among art historians not so much to revise as to eliminate the concept of the Renaissance to _____ not only its uniqueness, but its very existence.","opts":{"A":"Explain","B":"Contest","C":"Regret","D":"Extol"},"ans":"B","exp":"To eliminate a concept means challenging/disputing ('contest') both its uniqueness and its existence.","src":null,"vocab":[]},{"id":"bank-34","q":"Choose the best word(s) for the blank: There is something _____ about the way the building of monasteries proliferated in eighteenth century Bavaria, while in the rest of the Western world religious ardor was _____ and church building was consequently declining.","opts":{"A":"Enigmatic, coalescing","B":"Destructive, changing","C":"Immutable, dissipating","D":"Incongruous, diminishing"},"ans":"D","exp":"Monastery-building rising in Bavaria while the rest of the world saw declining church building is an inconsistency ('incongruous'), and religious fervor elsewhere was 'diminishing' (decreasing) — matching the decline in church building.","src":null,"vocab":[]},{"id":"bank-35","q":"Choose the pair with a similar relationship: 'Damp, Vibration'","opts":{"A":"Drench, moisture","B":"Stanch, flow","C":"Seal, perforation","D":"Boil, liquid"},"ans":"B","exp":"To 'damp' is to reduce/stop vibration; similarly, to 'stanch' is to stop a flow (e.g., of blood).","src":null,"vocab":[]},{"id":"bank-36","q":"Choose the pair with a similar relationship: 'Prune, Hedge'","opts":{"A":"Shuck, corn","B":"Trim, hair","C":"Cut, bouquet","D":"Shave, mustache"},"ans":"B","exp":"To prune a hedge is to trim it neatly without destroying it; similarly, to trim hair keeps it neat without removing it entirely.","src":null,"vocab":[]},{"id":"bank-37","q":"Choose the pair with a similar relationship: 'Antibiotic, Infection'","opts":{"A":"Hormone, modification","B":"Enzyme, digestion","C":"Narcotic, dependency","D":"Coagulant, bleeding"},"ans":"D","exp":"An antibiotic is used to stop/counteract infection; similarly, a coagulant is used to stop/counteract bleeding.","src":null,"vocab":[]},{"id":"bank-38","q":"Choose the pair with a similar relationship: 'Abraded, Friction'","opts":{"A":"Refined, distillate","B":"Vaporized, heat","C":"Diluted, gas","D":"Anodized, metal"},"ans":"B","exp":"Something becomes abraded (worn away) as a result of friction; similarly, something becomes vaporized as a result of heat — both are effect:cause pairs.","src":null,"vocab":[]},{"id":"bank-39","q":"Choose the pair with a similar relationship: 'Photograph, Light'","opts":{"A":"Script, scene","B":"Film, negative","C":"Recording, sound","D":"Concert, song"},"ans":"C","exp":"A photograph is a captured form of light; similarly, a recording is a captured form of sound — both are product:essential-raw-input pairs.","src":null,"vocab":[]},{"id":"bank-40","q":"Choose the word or phrase most opposite in meaning: 'PITH'","opts":{"A":"Untimely action","B":"Superficial action","C":"Routine treatment","D":"Rigid formulation"},"ans":"B","exp":"'Pith' means the core/essential part of something; its opposite is 'superficial' (shallow, not going to the core).","src":null,"vocab":[]},{"id":"bank-41","q":"Choose the word or phrase most opposite in meaning: 'AVER'","opts":{"A":"Resign indignantly","B":"Condemn unjustly","C":"Deny","D":"Refuse"},"ans":"C","exp":"'Aver' means to assert firmly as true; its opposite is 'deny' (to declare untrue).","src":null,"vocab":[]},{"id":"bank-42","q":"Choose the word or phrase most opposite in meaning: 'ADHERE'","opts":{"A":"Detach","B":"Cleanse","C":"Engulf","D":"Contain"},"ans":"A","exp":"'Adhere' means to stick to; its opposite is 'detach' (to separate from).","src":null,"vocab":[]},{"id":"bank-43","q":"Choose the word or phrase most opposite in meaning: 'SUPINE'","opts":{"A":"Vigilant","B":"Distorted","C":"Brittle","D":"Awkward"},"ans":"A","exp":"'Supine' means passive/lethargic (literally lying on one's back); its opposite is 'vigilant' (alert, watchful).","src":null,"vocab":[]},{"id":"bank-44","q":"Choose the word or phrase most opposite in meaning: 'OUTSET'","opts":{"A":"Regression","B":"Series","C":"Termination","D":"Interruption"},"ans":"C","exp":"'Outset' means the beginning; its opposite is 'termination' (the end).","src":null,"vocab":[]},{"id":"bank-45","q":"Select a word with a similar meaning for the underlined word: His explanations were considered inadequate.","opts":{"A":"deemed","B":"thought","C":"careful","D":"discussed"},"ans":"A","exp":"'Considered' (regarded/judged as) is closest to 'deemed,' which also means regarded or judged to be.","src":null,"vocab":[]},{"id":"bank-46","q":"Select a word with a similar meaning for the underlined word: I could barely make out the traffic signs through the rain.","opts":{"A":"discern","B":"violate","C":"obey","D":"wait for"},"ans":"A","exp":"'Make out' here means to perceive with difficulty, closest to 'discern' (to detect or recognize something not obvious).","src":null,"vocab":[]},{"id":"bank-47","q":"Select a word with a similar meaning for the underlined word: We kept notes of everything that transpired at the meeting.","opts":{"A":"Decided","B":"recorded","C":"happened","D":"finished"},"ans":"C","exp":"'Transpired' means occurred/happened, so it's synonymous with 'happened.'","src":null,"vocab":[]},{"id":"bank-48","q":"Select a word with a similar meaning for the underlined word: He leapt at the opportunity to serve his country.","opts":{"A":"refused","B":"ridiculed","C":"forfeited","D":"seized"},"ans":"D","exp":"'Leapt at' an opportunity means he eagerly took/seized it.","src":null,"vocab":[]},{"id":"bank-49","q":"Select a word with a similar meaning for the underlined word: A congenial work environment enables a worker to perform without any inhibition.","opts":{"A":"productive","B":"cordial","C":"solitary","D":"easy"},"ans":"B","exp":"'Congenial' means pleasant/agreeable, closest to 'cordial' (warm and friendly).","src":null,"vocab":[]},{"id":"bank-50","q":"Select a word with a similar meaning for the underlined word: We had to put up with the inconvenience.","opts":{"A":"remove","B":"create","C":"enjoy","D":"endure"},"ans":"D","exp":"'Put up with' means to tolerate/endure something unpleasant.","src":null,"vocab":[]},{"id":"bank-51","q":"The young boy aspires to be like his famous father.","opts":{"A":"regrets","B":"qualifies","C":"wishes","D":"fails"},"ans":"C","exp":"'Aspires' means to have a strong desire/ambition, closest to 'wishes' (to desire).","src":null,"vocab":[]},{"id":"bank-52","q":"The sweets were distributed among the schoolgirls.","opts":{"A":"collected","B":"apportioned","C":"diminished","D":"exhausted"},"ans":"B","exp":"'Distributed' means divided and given out, closest to 'apportioned' (divided into shares).","src":null,"vocab":[]},{"id":"bank-53","q":"He showed great enthusiasm contrary to what his supervisor had expected.","opts":{"A":"according to","B":"guided by","C":"opposite to","D":"instead of"},"ans":"C","exp":"'Contrary to' means in opposition to, matching 'opposite to.'","src":null,"vocab":[]},{"id":"bank-54","q":"A commotion broke out during the meeting.","opts":{"A":"applause","B":"vote","C":"disorder","D":"discussion"},"ans":"C","exp":"'Commotion' means a sudden noisy disturbance, closest to 'disorder.'","src":null,"vocab":[]},{"id":"bank-55","q":"Choose a word opposite in meaning to: 'Offending'","opts":{"A":"Delinquent","B":"Hasty","C":"Next","D":"Obedient"},"ans":"D","exp":"'Offending' means rule-breaking; its opposite is 'obedient' (compliant, rule-following).","src":null,"vocab":[]},{"id":"bank-56","q":"Choose a word opposite in meaning to: 'SUSTAIN'","opts":{"A":"Discontinue","B":"Maintain","C":"Nourish","D":"Suffer"},"ans":"A","exp":"'Sustain' means to keep going/maintain; its opposite is 'discontinue' (to stop).","src":null,"vocab":[]},{"id":"bank-57","q":"Choose a word opposite in meaning to: 'MURKY'","opts":{"A":"Clear","B":"Large","C":"Dark","D":"Small"},"ans":"A","exp":"'Murky' means cloudy/unclear; its opposite is 'clear.'","src":null,"vocab":[]},{"id":"bank-58","q":"Choose a word opposite in meaning to: 'INCONSIDERATE'","opts":{"A":"Reasonable","B":"Thoughtful","C":"Exclude","D":"Omit"},"ans":"B","exp":"'Inconsiderate' means not thinking of others' feelings; its opposite is 'thoughtful' (considerate).","src":null,"vocab":[]},{"id":"bank-59","q":"Choose a word opposite in meaning to: 'YIELD'","opts":{"A":"Surrender","B":"Resist","C":"Conform","D":"Attract"},"ans":"B","exp":"'Yield' (in the sense of giving in) is opposite to 'resist' (to oppose, stand firm).","src":null,"vocab":[]},{"id":"bank-60","q":"Choose a word similar in meaning to: 'CREDIBLE'","opts":{"A":"Unstable","B":"Reliable","C":"Amazing","D":"Fearsome"},"ans":"B","exp":"'Credible' means believable/trustworthy, closest to 'reliable.'","src":null,"vocab":[]},{"id":"bank-61","q":"Choose a word similar in meaning to: 'RAPPORT'","opts":{"A":"Relationship","B":"Build","C":"Statement","D":"Against"},"ans":"A","exp":"'Rapport' means a close, harmonious relationship between people.","src":null,"vocab":[]},{"id":"bank-62","q":"Choose a word similar in meaning to: 'APPRAISE'","opts":{"A":"Admire","B":"Recommend","C":"Evaluate","D":"Catch"},"ans":"C","exp":"'Appraise' means to assess the value/quality of something, closest to 'evaluate.' Note: not to be confused with 'appreciate' (to praise).","src":null,"vocab":[]},{"id":"bank-63","q":"Choose a word similar in meaning to: 'ASCENT'","opts":{"A":"Odor","B":"Decline","C":"Agree","D":"Climb"},"ans":"D","exp":"'Ascent' means the act of climbing/rising. Distinguish from 'assent' (agree) and 'accent' (way of speaking).","src":null,"vocab":[]},{"id":"bank-64","q":"Choose a word similar in meaning to: 'ACQUISITION'","opts":{"A":"Purchase","B":"Distribute","C":"Surrender","D":"Inquiry"},"ans":"A","exp":"'Acquisition' means the act of acquiring/gaining something, closest to 'purchase.'","src":null,"vocab":[]},{"id":"bank-65","q":"Choose the word most similar in meaning to: 'INDUSTRIOUS'","opts":{"A":"laid-back","B":"large","C":"active","D":"lethargic"},"ans":"C","exp":"'Industrious' means hard-working/diligent, closest among the options to 'active.'","src":null,"vocab":[]},{"id":"bank-66","q":"Choose the word most similar in meaning to: 'IMPULSE'","opts":{"A":"desire","B":"revulsion","C":"disgust","D":"dislike"},"ans":"A","exp":"'Impulse' means a sudden strong urge, closest to 'desire.'","src":null,"vocab":[]},{"id":"bank-67","q":"Choose the word most similar in meaning to: 'TRANSITORY'","opts":{"A":"lucid","B":"transient","C":"relevant","D":"clear"},"ans":"B","exp":"'Transitory' means short-lived/temporary, a direct synonym of 'transient.'","src":null,"vocab":[]},{"id":"bank-68","q":"Choose the word most similar in meaning to: 'FRUGAL'","opts":{"A":"waste","B":"wild","C":"economical","D":"hasty"},"ans":"C","exp":"'Frugal' means thrifty/careful with money, closest to 'economical.'","src":null,"vocab":[]},{"id":"bank-69","q":"Choose the word most similar in meaning to: 'ELUCIDATE'","opts":{"A":"confuse","B":"perplex","C":"extreme","D":"expound"},"ans":"D","exp":"'Elucidate' means to explain clearly, closest to 'expound' (to explain in detail).","src":null,"vocab":[]},{"id":"bank-70","q":"Choose the best alternative for the idiom: I cannot understand why she did that, it really does not add up.","opts":{"A":"does not calculate","B":"is not mathematics","C":"does not make sense","D":"makes the wrong addition"},"ans":"C","exp":"'Add up' (in this idiomatic sense) means to make logical sense.","src":null,"vocab":[]},{"id":"bank-71","q":"Choose the best alternative for the idiom: The manager dismissed the new proposal out of hand and it was not at all practical.","opts":{"A":"quickly","B":"utterly","C":"directly","D":"simply"},"ans":"C","exp":"'Out of hand' means immediately and without consideration — i.e., directly/outright rejected.","src":null,"vocab":[]},{"id":"bank-72","q":"Choose the best alternative for the idiom: She never stops talking about herself and is full of herself.","opts":{"A":"is very fat","B":"is too fat","C":"is very full","D":"is very conceited"},"ans":"D","exp":"'Full of herself' is an idiom meaning excessively self-important/conceited.","src":null,"vocab":[]},{"id":"bank-73","q":"Choose the best alternative for the idiom: I would give my right arm if I could get tickets for that concert.","opts":{"A":"do absolutely anything","B":"do something stupid","C":"do something dangerous","D":"do nothing"},"ans":"A","exp":"'Give my right arm' is an idiom expressing willingness to make any sacrifice to get something.","src":null,"vocab":[]},{"id":"bank-74","q":"Choose the best alternative for the idiom: I prefer to talk to people face to face rather than to talk on the phone.","opts":{"A":"in person","B":"watching them","C":"facing them","D":"looking at them"},"ans":"A","exp":"'Face to face' means meeting someone directly/in person rather than remotely.","src":null,"vocab":[]},{"id":"bank-75","q":"What is the correct antonym of 'Panic'?","opts":{"A":"sit","B":"laugh","C":"dance","D":"relax"},"ans":"D","exp":"'Panic' means sudden uncontrollable fear; its opposite is 'relax' (to be calm).","src":null,"vocab":[]},{"id":"bank-76","q":"What is the antonym of 'Gentle'?","opts":{"A":"Clever","B":"Modest","C":"Harsh","D":"Rude"},"ans":"C","exp":"'Gentle' means mild/soft in manner; its most fitting opposite among the options is 'harsh' (rough/severe).","src":null,"vocab":[]},{"id":"bank-77","q":"The following is the antonym of 'Abandon'","opts":{"A":"desert","B":"drop","C":"support","D":"waive"},"ans":"C","exp":"'Abandon' means to give up/leave behind; its opposite is 'support' (to back/take care of).","src":null,"vocab":[]},{"id":"bank-78","q":"Find the Synonym of the word 'Myopic'","opts":{"A":"Evenhanded","B":"Unprejudiced","C":"Tolerant","D":"Short-sighted"},"ans":"D","exp":"'Myopic' literally means near-sighted, and figuratively means lacking foresight, i.e., 'short-sighted.'","src":null,"vocab":[]},{"id":"bank-79","q":"To replicate means-","opts":{"A":"To understand","B":"To enunciate","C":"To be serious","D":"To copy"},"ans":"D","exp":"'Replicate' means to make an exact copy or reproduce something.","src":null,"vocab":[]},{"id":"bank-80","q":"Choose the word that is opposite to the word 'Consolidation'","opts":{"A":"instigation","B":"fragmentation","C":"restriction","D":"opposition"},"ans":"B","exp":"'Consolidation' means combining into one solid whole; its opposite is 'fragmentation' (breaking into pieces).","src":null,"vocab":[]},{"id":"bank-81","q":"A Synonym for 'hindrance' is:","opts":{"A":"Solution","B":"barrier","C":"answer","D":"criticize"},"ans":"B","exp":"'Hindrance' means an obstacle, synonymous with 'barrier.'","src":null,"vocab":[]},{"id":"bank-82","q":"Find the correct Synonym of the word 'discontented':","opts":{"A":"contented","B":"happy","C":"satisfied","D":"miserable"},"ans":"D","exp":"'Discontented' means dissatisfied/unhappy, closest among the options to 'miserable.'","src":null,"vocab":[]},{"id":"bank-83","q":"Find the antonym of the word 'Myopic':","opts":{"A":"Bigoted","B":"Prejudiced","C":"Intolerant","D":"Broadminded"},"ans":"D","exp":"'Myopic' (narrow-minded/short-sighted) is opposite to 'broadminded' (open and far-seeing in thinking).","src":null,"vocab":[]},{"id":"bank-84","q":"Find the antonym of the word in capital letter: 'ASSERT'","opts":{"A":"affirm","B":"declare","C":"insist","D":"deny"},"ans":"D","exp":"'Assert' means to state firmly as true; its opposite is 'deny.' The other options are near-synonyms of assert.","src":null,"vocab":[]},{"id":"bank-85","q":"Find Synonym: 'VELOCITY'","opts":{"A":"speed","B":"wind","C":"money","D":"doctrine"},"ans":"A","exp":"'Velocity' means speed (with direction), and is commonly used as a synonym for speed.","src":null,"vocab":[]},{"id":"bank-86","q":"Find Synonym: 'EXPOUND'","opts":{"A":"confound","B":"perplex","C":"explain","D":"obscure"},"ans":"C","exp":"'Expound' means to explain something in detail.","src":null,"vocab":[]},{"id":"bank-87","q":"Find Synonym: 'MULTIPLE'","opts":{"A":"compound","B":"few","C":"little","D":"many"},"ans":"D","exp":"'Multiple' means more than one/numerous, synonymous with 'many.'","src":null,"vocab":[]},{"id":"bank-88","q":"Find Synonym: 'BARTER'","opts":{"A":"transient","B":"proxy","C":"relevant","D":"exchange"},"ans":"D","exp":"'Barter' means to trade goods directly, synonymous with 'exchange.'","src":null,"vocab":[]},{"id":"bank-89","q":"Find Synonym: 'ENLARGE'","opts":{"A":"shrink","B":"large","C":"contract","D":"expand"},"ans":"D","exp":"'Enlarge' (verb: to make bigger) is synonymous with 'expand.' Note 'large' is an adjective, not a matching part of speech.","src":null,"vocab":[]},{"id":"bank-90","q":"Choose a word similar in meaning to the underlined word: He showed great enthusiasm contrary to what his supervisor had expected.","opts":{"A":"According to","B":"Guided by","C":"Opposite to","D":"Instead of"},"ans":"C","exp":"'Contrary to' means in opposition to, matching 'opposite to.'","src":null,"vocab":[]},{"id":"bank-91","q":"Choose a word similar in meaning to: 'AMBIGUOUS'","opts":{"A":"Large","B":"Increase","C":"Unclear","D":"Eager"},"ans":"C","exp":"'Ambiguous' means having more than one possible meaning, i.e., unclear.","src":null,"vocab":[]},{"id":"bank-92","q":"Choose a word similar in meaning to: 'SOLICIT'","opts":{"A":"Legal","B":"Give","C":"Bright","D":"Seek"},"ans":"D","exp":"'Solicit' means to ask for/request earnestly, closest to 'seek.'","src":null,"vocab":[]},{"id":"bank-93","q":"Choose a word similar in meaning to: 'COUNSEL'","opts":{"A":"cabinet","B":"Meeting","C":"Advice","D":"Trade"},"ans":"C","exp":"'Counsel' means advice/guidance. Distinguish from 'council' (a meeting/assembly).","src":null,"vocab":[]},{"id":"bank-94","q":"Choose a word similar in meaning to: 'RELENT'","opts":{"A":"Link","B":"Borrow","C":"Succumb","D":"Yield"},"ans":"D","exp":"'Relent' means to become less harsh/give in, closest to 'yield.'","src":null,"vocab":[]},{"id":"bank-95","q":"Choose a word similar in meaning to: 'ARDENT'","opts":{"A":"Large","B":"Eager","C":"Convinced","D":"Unnecessary"},"ans":"B","exp":"'Ardent' means passionately enthusiastic, closest to 'eager.'","src":null,"vocab":[]},{"id":"bank-96","q":"No one can _____ that he is clever.","opts":{"A":"defy","B":"admire","C":"deny","D":"denounce"},"ans":"C","exp":"'No one can deny' is a common phrase meaning everyone agrees/accepts it as true.","src":null,"vocab":[]},{"id":"bank-97","q":"If a substance is Cohesive, it tends to _____.","opts":{"A":"retain heat","B":"bend without much difficulty","C":"stick together","D":"break easily"},"ans":"C","exp":"'Cohesive' describes molecules that attract and hold together, i.e., stick together.","src":null,"vocab":[]},{"id":"bank-98","q":"Choose the pair with a similar relationship to the given pair: 'Conscious, Careless'","opts":{"A":"Careful, Indifferent","B":"Graceful, Ugly","C":"Generous, Unkind","D":"Well-informed, knowing little"},"ans":"A","exp":"Lack of consciousness/attentiveness leads to carelessness; similarly, lack of carefulness leads to indifference — both pairs show an antonym relationship based on attentiveness.","src":null,"vocab":[]},{"id":"bank-99","q":"Choose the pair with a similar relationship to the given pair: 'Submission, Yielding'","opts":{"A":"Subjection, Liberation","B":"Restrain, Indulge","C":"Complaint, Acquiescent","D":"Restriction, Relaxation"},"ans":"C","exp":"'Submission' and 'yielding' are synonyms (both mean giving in); similarly, 'complaint' (in the sense of compliance) and 'acquiescent' are synonymous, unlike the other antonym pairs.","src":null,"vocab":[]},{"id":"bank-100","q":"Choose the pair with a similar relationship to the given pair: 'Distort, Twist'","opts":{"A":"Straighten, Bend","B":"Deform, Return","C":"Harmonize, Balance","D":"Observe, Bhir"},"ans":"C","exp":"'Distort' and 'twist' are synonyms (both involve changing shape negatively); similarly, 'harmonize' and 'balance' are synonyms, unlike the other antonym pairs.","src":null,"vocab":[]}]},{"id":"bank-2","title":"Bank Vocabulary [101-200]","questions":[{"id":"bank-101","q":"Choose the pair with a similar relationship to the given pair: Eager, Indifferent","opts":{"A":"Concerned, Careful","B":"Anxious, nervous","C":"enthusiastic, halfhearted","D":"devoted, dedicated"},"ans":"C","exp":"'Eager' and 'indifferent' are direct antonyms; similarly, 'enthusiastic' and 'halfhearted' are direct antonyms, unlike the other near-synonym pairs.","src":null,"vocab":[]},{"id":"bank-102","q":"Choose the pair with a similar relationship to the given pair: Delay, Retard","opts":{"A":"Postpone, promote","B":"Adjourn, Start","C":"Slow down, hold up","D":"defer, accelerate"},"ans":"C","exp":"'Delay' and 'retard' are synonyms (both mean to slow something down); similarly, 'slow down' and 'hold up' are synonyms.","src":null,"vocab":[]},{"id":"bank-103","q":"Choose the closest meaning: 'PROLIFERATION'","opts":{"A":"Protection","B":"Transmission","C":"Transaction","D":"Increase"},"ans":"D","exp":"'Proliferation' means rapid increase in number.","src":null,"vocab":[]},{"id":"bank-104","q":"Choose the closest meaning: 'GENERIC'","opts":{"A":"Common","B":"Gentle","C":"Benevolent","D":"Genre"},"ans":"A","exp":"'Generic' means belonging to a general class/not specific to one brand, closest to 'common.'","src":null,"vocab":[]},{"id":"bank-105","q":"Choose the closest meaning: 'INDISPENSABLE'","opts":{"A":"Inconsiderate","B":"Inefficient","C":"Crucial","D":"Unimportant"},"ans":"C","exp":"'Indispensable' means absolutely necessary, closest to 'crucial.'","src":null,"vocab":[]},{"id":"bank-106","q":"Choose the closest meaning: 'WRATH'","opts":{"A":"Warm","B":"Prompt","C":"Divine","D":"Anger"},"ans":"D","exp":"'Wrath' means intense anger.","src":null,"vocab":[]},{"id":"bank-107","q":"Choose the closest meaning: 'MEAGER'","opts":{"A":"Scanty","B":"Proportionate","C":"Unstable","D":"Adequate"},"ans":"A","exp":"'Meager' means small/scant in amount, closest to 'scanty.'","src":null,"vocab":[]},{"id":"bank-108","q":"Select the opposite meaning of the word 'EXPOSE'-","opts":{"A":"Reveal","B":"Uncover","C":"Unearth","D":"Conceal"},"ans":"D","exp":"'Expose' means to reveal/uncover; its opposite is 'conceal' (to hide).","src":null,"vocab":[]},{"id":"bank-109","q":"Select the opposite meaning of the word 'INADVERTENT'-","opts":{"A":"Unintentional","B":"Unintended","C":"Accidental","D":"Intentional"},"ans":"D","exp":"'Inadvertent' means unintentional; its opposite is 'intentional' (done on purpose).","src":null,"vocab":[]},{"id":"bank-110","q":"Select the similar meaning of the word 'GRATIS'-","opts":{"A":"Gratifying","B":"Free","C":"Gracious","D":"With Charge"},"ans":"B","exp":"'Gratis' means without charge, i.e., free.","src":null,"vocab":[]},{"id":"bank-111","q":"Select the opposite meaning of the word 'GLORIOUS'-","opts":{"A":"Superb","B":"Splendid","C":"Disgraceful","D":"Wonderful"},"ans":"C","exp":"'Glorious' means having great honor/splendor; its opposite is 'disgraceful' (shameful).","src":null,"vocab":[]},{"id":"bank-112","q":"The designer window treatments in her house, installed 17 years ago, were outmoded.","opts":{"A":"unnecessary","B":"pointless","C":"out-of-date","D":"worthless"},"ans":"C","exp":"'Outmoded' means no longer fashionable, i.e., out-of-date.","src":null,"vocab":[]},{"id":"bank-113","q":"The baseball player's malice toward the referee was revealed in his spiteful remarks to the media, which almost ruined the referee's career.","opts":{"A":"vindictive","B":"crazy","C":"rude","D":"unpleasant"},"ans":"A","exp":"'Malice' (intent to harm) combined with damaging someone's career closely matches 'vindictive' (seeking revenge).","src":null,"vocab":[]},{"id":"bank-114","q":"Although Zahid is too much inexperienced for the managerial position, he is a willful young man and obdurately refuses to withdraw his application.","opts":{"A":"foolishly","B":"reluctantly","C":"constantly","D":"stubbornly"},"ans":"D","exp":"'Obdurately' means stubbornly/unyieldingly, matching the description of a 'willful' person who refuses to budge.","src":null,"vocab":[]},{"id":"bank-115","q":"You cannot become a certified teacher without completing the prerequisite student teaching assignment.","opts":{"A":"required","B":"optional","C":"preferred","D":"advisable"},"ans":"A","exp":"'Prerequisite' means a required condition that must be met beforehand.","src":null,"vocab":[]},{"id":"bank-116","q":"Excited about winning the award, Mariam walked up to the podium and delivered an animated acceptance speech.","opts":{"A":"abbreviated","B":"courteous","C":"reserved","D":"lively"},"ans":"D","exp":"'Animated' means full of life/energetic, matching 'lively,' consistent with her excitement.","src":null,"vocab":[]},{"id":"bank-117","q":"The intermittent rain soaked the garden many different times during the day.","opts":{"A":"protracted","B":"periodic","C":"incredulous","D":"light"},"ans":"B","exp":"'Intermittent' means occurring at irregular intervals (stopping and starting), matching 'periodic.'","src":null,"vocab":[]},{"id":"bank-118","q":"The doctors were pleased that their theory had been fortified by the new research.","opts":{"A":"reinforced","B":"altered","C":"disputed","D":"developed"},"ans":"A","exp":"'Fortified' means strengthened, matching 'reinforced.'","src":null,"vocab":[]},{"id":"bank-119","q":"The news about toxic waste dumping aroused the anger of the many listeners of a news broadcast.","opts":{"A":"informed","B":"appeased","C":"provoked","D":"deceived"},"ans":"C","exp":"'Aroused' (in the context of anger) means stirred up/incited, matching 'provoked.'","src":null,"vocab":[]},{"id":"bank-120","q":"The spokesperson must articulate the philosophy of an entire company so that outsiders can understand it completely.","opts":{"A":"trust","B":"refine","C":"verify","D":"express"},"ans":"D","exp":"'Articulate' means to express clearly in words.","src":null,"vocab":[]},{"id":"bank-121","q":"The air in the rainforest was humid, making the heat seem even more smothering than before.","opts":{"A":"hot","B":"damp","C":"hazy","D":"volatile"},"ans":"B","exp":"'Humid' means containing a lot of water vapor, matching 'damp.'","src":null,"vocab":[]},{"id":"bank-122","q":"The mayor tailored his speech to suit the crowd of homeless people gathered outside his office.","opts":{"A":"intoned","B":"expanded","C":"faltered","D":"shortened"},"ans":"D","exp":"'Tailored' means adjusted to fit a specific audience; in context the closest fit is 'shortened' (made concise and specific for the crowd).","src":null,"vocab":[]},{"id":"bank-123","q":"That she seemed to prefer _____ to concentrated effort is undeniable; nevertheless the impressive quality of her finished paintings suggests that her actual relationship to her art was anything but _____.","opts":{"A":"preparation----passionate","B":"artfulness----disengaged","C":"dabbling----superficial","D":"caprice----considered"},"ans":"C","exp":"She seemed to prefer casual dabbling over focused effort, yet her finished work shows her relationship to art was not superficial — a contrast signaled by 'nevertheless' and 'anything but.'","src":null,"vocab":[]},{"id":"bank-124","q":"Because of the excellent preservation of the fossil, anatomical details of early horseshoe crabs were _____ for the first time, enabling experts to _____ the evolution of the horseshoe crab.","opts":{"A":"scrutinized...ensure","B":"verified... advance","C":"identified...distort","D":"clarified...reassess"},"ans":"D","exp":"Excellent preservation meant details were 'clarified' for the first time, allowing experts to 'reassess' (re-evaluate) prior understanding of evolution.","src":null,"vocab":[]},{"id":"bank-125","q":"The philosopher claimed that a person who must consciously _____ his or her own indifference before helping another is behaving more nobly than one whose basic disposition allows such an act to be performed without _____.","opts":{"A":"feign...enthusiasm","B":"censure...comment","C":"embrace...duplicity","D":"overcome...deliberation"},"ans":"D","exp":"Someone who must consciously 'overcome' indifference to help is nobler than someone who helps naturally, without needing 'deliberation' (conscious thought).","src":null,"vocab":[]},{"id":"bank-126","q":"The senator's attempt to convince the public that he is not interested in running for a second term is _____ given the extremely _____ fund-raising activities of his campaign committee.","opts":{"A":"futile...clandestine","B":"sincere...visible","C":"specious...apathetic","D":"disingenuous...public"},"ans":"D","exp":"His claim of disinterest is 'disingenuous' (insincere) because his committee's fund-raising is openly 'public,' contradicting his stated disinterest.","src":null,"vocab":[]},{"id":"bank-127","q":"Although a change in management may appear to _____ a shift in a company's fortunes, more often than not its impact is _____.","opts":{"A":"hinder...measurable","B":"promote...demonstrable","C":"accelerate...profound","D":"augur...inconsiderable"},"ans":"D","exp":"A management change may seem to 'augur' (foretell) a shift in fortunes, but 'although' signals contrast — its actual impact is often 'inconsiderable' (negligible).","src":null,"vocab":[]},{"id":"bank-128","q":"The skeleton of _____ bird that was recently discovered indicated that this ancient creature _____ today's birds in that, unlike earlier birds and unlike reptilian ancestors, it had not a tooth in its head.","opts":{"A":"a primeval...obscured","B":"a unique...preempted","C":"a primitive...anticipated","D":"a contemporary...foreshadowed"},"ans":"C","exp":"The fossil is of 'a primitive' (ancient) bird that, lacking teeth like modern birds, 'anticipated' (foreshadowed) a key feature of today's birds.","src":null,"vocab":[]},{"id":"bank-129","q":"While many people utilize homeopathic remedies to treat health problems, other people do not _____ such alternative treatments, _____ conventional medical treatments instead.","opts":{"A":"distrust...employing","B":"embrace...eschewing","C":"reject...envisioning","D":"countenance...relying on"},"ans":"D","exp":"'While' signals contrast: some use homeopathy, while others do not 'countenance' (approve of) it, instead 'relying on' conventional medicine.","src":null,"vocab":[]},{"id":"bank-130","q":"Choose the word pair that best matches the relationship in the original pair - PROGRAM : CONCERT ::","opts":{"A":"bibliography : book","B":"menu : entree","C":"questionnaire : poll","D":"agenda : meeting"},"ans":"D","exp":"A program outlines the planned events of a concert; similarly, an agenda outlines the planned topics of a meeting.","src":null,"vocab":[]},{"id":"bank-131","q":"Choose the word pair that best matches the relationship in the original pair - EMBRACE : AFFECTION ::","opts":{"A":"prediction : memory","B":"innuendo : secrecy","C":"shrug : indifference","D":"conversation : familiarity"},"ans":"C","exp":"An embrace is a physical gesture used to express affection; similarly, a shrug is a physical gesture used to express indifference.","src":null,"vocab":[]},{"id":"bank-132","q":"Choose the word pair that best matches the relationship in the original pair - ENTHUSIASM : MANIA ::","opts":{"A":"idea : inspiration","B":"nightmare : hallucination","C":"failure : disgust","D":"suspicion : paranoia"},"ans":"D","exp":"Mania is an extreme/excessive form of enthusiasm; similarly, paranoia is an extreme/irrational form of suspicion.","src":null,"vocab":[]},{"id":"bank-133","q":"Choose the word pair that best matches the relationship in the original pair - ANONYMOUS : IDENTITY ::","opts":{"A":"nonchalant : excite","B":"repressed : constrain","C":"misled : trust","D":"annoying : assist"},"ans":"A","exp":"Someone anonymous lacks an identity; similarly, someone nonchalant lacks excitement (is not easily excited).","src":null,"vocab":[]},{"id":"bank-134","q":"Choose the word pair that best matches the relationship in the original pair - CARTOGRAPHER : MAP ::","opts":{"A":"astronomer : stars","B":"carpenter : wood","C":"lumberjack : saw","D":"tailor : clothing"},"ans":"D","exp":"A cartographer's job is to create a map; similarly, a tailor's job is to create clothing.","src":null,"vocab":[]},{"id":"bank-135","q":"Choose the word pair that best matches the relationship in the original pair - EXEMPLARY : IMITATION ::","opts":{"A":"venerable : denigration","B":"novel : duplication","C":"redoubtable : regard","D":"challenging : determination"},"ans":"C","exp":"Something exemplary deserves imitation; similarly, someone redoubtable (formidable) deserves regard/respect.","src":null,"vocab":[]},{"id":"bank-136","q":"Choose the word pair that best matches the relationship in the original pair - INSENSITIVE : BOOR ::","opts":{"A":"spontaneous : extrovert","B":"mischievous : imp","C":"conformist : ally","D":"officious : zealot"},"ans":"B","exp":"A boor is characterized by being insensitive; similarly, an imp is characterized by being mischievous.","src":null,"vocab":[]},{"id":"bank-137","q":"Find the Antonyms of the following words: 'LETHARGY'","opts":{"A":"flexibility","B":"adequacy","C":"toughness","D":"vigor"},"ans":"D","exp":"'Lethargy' means sluggishness/lack of energy; its opposite is 'vigor' (energy, vitality).","src":null,"vocab":[]},{"id":"bank-138","q":"Find the Antonyms of the following words: 'TANTAMOUNT'","opts":{"A":"insignificant","B":"ignoramus","C":"unequal","D":"underground"},"ans":"C","exp":"'Tantamount' means equivalent/equal in effect; its opposite is 'unequal.'","src":null,"vocab":[]},{"id":"bank-139","q":"Find the Antonyms of the following words - 'SEVERITY'","opts":{"A":"security","B":"celebrity","C":"mildness","D":"separation"},"ans":"C","exp":"'Severity' means harshness/intensity; its opposite is 'mildness' (gentleness).","src":null,"vocab":[]},{"id":"bank-140","q":"Pick the most suitable Synonym: 'PITFALL'","opts":{"A":"opportunity","B":"shortcoming","C":"artistic","D":"profligacy"},"ans":"B","exp":"'Pitfall' means a hidden danger or flaw in a plan, closest to 'shortcoming.'","src":null,"vocab":[]},{"id":"bank-141","q":"Pick the most suitable Synonym: 'PERPLEXED'","opts":{"A":"angry","B":"annoyed","C":"aroused","D":"puzzled"},"ans":"D","exp":"'Perplexed' means confused/unable to understand, synonymous with 'puzzled.'","src":null,"vocab":[]},{"id":"bank-142","q":"Pick the most suitable Synonym: 'POSTULATE'","opts":{"A":"false","B":"lie","C":"claim","D":"question"},"ans":"C","exp":"'Postulate' means to assume/take as true without proof, closest to 'claim.'","src":null,"vocab":[]},{"id":"bank-143","q":"'Ball to the wall' means-","opts":{"A":"in full force","B":"arbitrary","C":"hit the target","D":"useless argument"},"ans":"A","exp":"'Balls to the wall' is an idiom meaning at maximum speed/effort, i.e., in full force.","src":null,"vocab":[]},{"id":"bank-144","q":"Find the Synonym of the word 'Radiant'.","opts":{"A":"Serenity","B":"Complacency","C":"Victory","D":"Luminous"},"ans":"D","exp":"'Radiant' means emitting light/shining brightly, synonymous with 'luminous.'","src":null,"vocab":[]},{"id":"bank-145","q":"Find the Synonym of the word 'Postulate'.","opts":{"A":"Assume","B":"Prove","C":"Supplement","D":"Dispatch"},"ans":"A","exp":"'Postulate' means to assume something as true without proof, synonymous with 'assume.'","src":null,"vocab":[]},{"id":"bank-146","q":"Indicate the word that expresses 'cannot be resisted'","opts":{"A":"Incredible","B":"Invisible","C":"Inaudible","D":"Irresistible"},"ans":"D","exp":"'Irresistible' literally means cannot be resisted.","src":null,"vocab":[]},{"id":"bank-147","q":"The _____ criminal still denies that he is _____ for the robbery.","opts":{"A":"arrested, part","B":"notorious, cursory","C":"ominous, demur","D":"convicted, culpable"},"ans":"D","exp":"A 'convicted' criminal denying he is 'culpable' (responsible) for the crime makes logical sense together.","src":null,"vocab":[]},{"id":"bank-148","q":"Your classmate insulted you to _____.","opts":{"A":"pay off old scores","B":"host in himself","C":"worth yours","D":"hang in balance"},"ans":"A","exp":"'Pay off old scores' is an idiom meaning to take revenge for a past grievance.","src":null,"vocab":[]},{"id":"bank-149","q":"Find the alien word (the word that doesn't belong with the others): Venturesome, Plucky, Pusillanimous, Valorous, Spunky","opts":{"A":"Venturesome","B":"Plucky","C":"Pusillanimous","D":"Valorous"},"ans":"C","exp":"Venturesome, Plucky, Valorous, and Spunky all mean brave/courageous. 'Pusillanimous' means cowardly — the odd one out.","src":null,"vocab":[]},{"id":"bank-150","q":"Find the alien word (the word that doesn't belong with the others): Reproach, Commend, Chide, Rebuke, Scold","opts":{"A":"Reproach","B":"Commend","C":"Chide","D":"Rebuke"},"ans":"B","exp":"Reproach, Chide, Rebuke, and Scold all mean to criticize. 'Commend' means to praise — the odd one out.","src":null,"vocab":[]},{"id":"bank-151","q":"Find the alien word (the word that doesn't belong with the others): Tranquil, Serene, Halcyon, Placid, Bustling","opts":{"A":"Bustling","B":"Tranquil","C":"Serene","D":"Halcyon"},"ans":"A","exp":"Tranquil, Serene, Halcyon, and Placid all mean calm/peaceful. 'Bustling' means busy/noisy — the odd one out.","src":null,"vocab":[]},{"id":"bank-152","q":"Find the alien word (the word that doesn't belong with the others): Thrifty, Parsimonious, Niggardly, Skinflint, Prodigal","opts":{"A":"Thrifty","B":"Parsimonious","C":"Niggardly","D":"Prodigal"},"ans":"D","exp":"Thrifty, Parsimonious, Niggardly, and Skinflint all relate to being stingy/careful with money. 'Prodigal' means wastefully extravagant — the odd one out.","src":null,"vocab":[]},{"id":"bank-153","q":"Find the alien word (the word that doesn't belong with the others): Sage, Cretin, Imbecile, Dullard, Ninny","opts":{"A":"Sage","B":"Cretin","C":"Imbecile","D":"Dullard"},"ans":"A","exp":"Cretin, Imbecile, Dullard, and Ninny all mean a foolish/stupid person. 'Sage' means a wise person — the odd one out.","src":null,"vocab":[]},{"id":"bank-154","q":"In each question, choose the meaning of the underlined part: The man did the work in the nick of time.","opts":{"A":"right on time","B":"after deadline","C":"long before deadline","D":"very last minute"},"ans":"D","exp":"'In the nick of time' means at the very last possible moment, just before it would be too late.","src":null,"vocab":[]},{"id":"bank-155","q":"In each question, choose the meaning of the underlined part: The watch costs a pretty penny.","opts":{"A":"expensive","B":"cheap","C":"very expensive","D":"very cheap"},"ans":"C","exp":"'A pretty penny' is an idiom meaning a large sum of money, i.e., very expensive.","src":null,"vocab":[]},{"id":"bank-156","q":"In each question, choose the meaning of the underlined part: They were on their toes before entering the campus.","opts":{"A":"in good mood","B":"alert","C":"well dressed","D":"very worried"},"ans":"B","exp":"'On their toes' is an idiom meaning alert and ready to act.","src":null,"vocab":[]},{"id":"bank-157","q":"In each question, choose the meaning of the underlined part: Why do you toot your own horn?","opts":{"A":"self destruction","B":"boast","C":"possessive","D":"talks a lot"},"ans":"B","exp":"'Toot your own horn' is an idiom meaning to boast about one's own achievements.","src":null,"vocab":[]},{"id":"bank-158","q":"In each question, choose the meaning of the underlined part: Raj and Riaz have never seen eye to eye on politics.","opts":{"A":"sharing the same view","B":"disagreement partly","C":"intimacy","D":"enmity"},"ans":"A","exp":"'See eye to eye' means to agree with someone / share the same view.","src":null,"vocab":[]},{"id":"bank-159","q":"Find One word Substitution: Highly attractive and able to arouse hope or desire =","opts":{"A":"Alluring","B":"Elusiveness","C":"Tenacity","D":"Knotty"},"ans":"A","exp":"'Alluring' means highly attractive/tempting.","src":null,"vocab":[]},{"id":"bank-160","q":"Find One word Substitution: Money or property brought by a woman to her husband at marriage =","opts":{"A":"Ornament","B":"Honorary","C":"Adornment","D":"Dowry"},"ans":"D","exp":"'Dowry' is money/property given by a bride's family to the groom at marriage.","src":null,"vocab":[]},{"id":"bank-161","q":"Find One word Substitution: A person with the same name as another =","opts":{"A":"Nickname","B":"Namesake","C":"Anonymous","D":"Pseudonym"},"ans":"B","exp":"A 'namesake' is a person sharing the same name as another.","src":null,"vocab":[]},{"id":"bank-162","q":"Find One word Substitution: An act of mass destruction and loss of life =","opts":{"A":"Oregon","B":"Cannibal","C":"Holocaust","D":"Homicide"},"ans":"C","exp":"'Holocaust' refers to mass destruction/large-scale slaughter of life.","src":null,"vocab":[]},{"id":"bank-163","q":"Find One word Substitution: The right and power to interpret and apply the law =","opts":{"A":"Nugatory","B":"Jurisdiction","C":"Lawrence","D":"Judiciary"},"ans":"B","exp":"'Jurisdiction' is the official power/authority to interpret and apply the law within a certain area.","src":null,"vocab":[]},{"id":"bank-164","q":"Find analogy: 'Hungry' is to 'Famished' as 'Extensive' is to","opts":{"A":"Congenial","B":"Keen","C":"Endless","D":"Amenable"},"ans":"C","exp":"'Famished' is an extreme/intensified form of 'hungry'; similarly, 'endless' is an extreme/intensified form of 'extensive' — a degree relationship.","src":null,"vocab":[]},{"id":"bank-165","q":"Find analogy: 'Pact' is to 'Covenant' as 'Tract' is to","opts":{"A":"Letter","B":"Summons","C":"Treatise","D":"Subpoena/Warrant"},"ans":"C","exp":"'Pact' and 'covenant' are synonyms (formal agreements); similarly, 'tract' (a short pamphlet) and 'treatise' (a longer formal essay) are synonymous types of written works.","src":null,"vocab":[]},{"id":"bank-166","q":"Find analogy: 'Acute' is to 'Chronic' as 'Sudden' is to","opts":{"A":"Ditty","B":"Facile","C":"Impute","D":"Constant"},"ans":"D","exp":"'Acute' (short-term) is opposite to 'chronic' (long-term); similarly, 'sudden' is opposite to 'constant' (ongoing).","src":null,"vocab":[]},{"id":"bank-167","q":"The meaning of 'maiden' in 'maiden speech' is:","opts":{"A":"first","B":"late","C":"delivered by a lady","D":"meaningful"},"ans":"A","exp":"'Maiden' before a noun (e.g., maiden speech, maiden voyage) means 'first.'","src":null,"vocab":[]},{"id":"bank-168","q":"The meaning of the word 'complacent' is:","opts":{"A":"satisfied","B":"austere","C":"simple","D":"unhappy"},"ans":"A","exp":"'Complacent' means self-satisfied/contented, often to an excessive or unwise degree.","src":null,"vocab":[]},{"id":"bank-169","q":"Find the antonym of the bold word: 'ANCILLARY'","opts":{"A":"auxiliary","B":"subsidiary","C":"compulsory","D":"ordinary"},"ans":"C","exp":"'Ancillary' means supplementary/supporting (optional addition); its opposite is 'compulsory' (mandatory).","src":null,"vocab":[]},{"id":"bank-170","q":"Find the antonym of the bold word: 'DOCILE'","opts":{"A":"harsh","B":"fragile","C":"biased","D":"unruly"},"ans":"D","exp":"'Docile' means easily controlled/obedient; its opposite is 'unruly' (disobedient, hard to control).","src":null,"vocab":[]},{"id":"bank-171","q":"Find the antonym of the bold word: 'SALIENT'","opts":{"A":"common","B":"dear","C":"shove","D":"visible/error"},"ans":"A","exp":"'Salient' means prominent/notable; its opposite is 'common' (ordinary, unremarkable).","src":null,"vocab":[]},{"id":"bank-172","q":"I expect that Selim will come round in a week. Here 'come round' means.","opts":{"A":"come back","B":"complete the tour","C":"recover","D":"get married"},"ans":"C","exp":"'Come round' (with a time frame) means to recover from illness.","src":null,"vocab":[]},{"id
