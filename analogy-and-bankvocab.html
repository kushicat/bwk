ty : renegade","E":"convention : maverick"},"ans":"E","exp":"Relationship: Target Belief/Standard : Person Who Defies It. An iconoclast breaks established dogma; a maverick breaks established convention (social norms). (A) A subordinate typically FOLLOWS authority - the opposite of defying it. (B) A coward avoids danger out of fear, not specifically by rejecting patriotism as a belief system. (C) This is close, but a 'rebel' can be defined by active resistance/fighting, while maverick and iconoclast are defined more by intellectually rejecting an established 'standard' or 'convention' - a cleaner match. (D) A renegade abandons their own group/beliefs, but that's not strictly about 'defying responsibility' as a standard. Both Dogma and Convention are rules society imposes, and Iconoclast/Maverick are the people who break free of them.","src":"-","vocab":[{"word":"Iconoclast","meaning":"One who attacks established beliefs","synonyms":"-"},{"word":"Maverick","meaning":"One who doesn't follow convention","synonyms":"-"}]}]}]}]};

<script>

  bookmarkFilled: `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M6 4.5C6 3.67 6.67 3 7.5 3H16.5C17.33 3 18 3.67 18 4.5V21L12 17L6 21V4.5Z"/></svg>`,

/* ----------------------------- 2. STORAGE -------------------------------- */
const STORAGE_KEY = 'ballpoint_exam_engine_v1';

const Storage = {
  _cache: null,
  defaultState() {
    return {
      theme: 'light',
      attempts: {},        // qid -> {correct:bool, lastAnswerKey, timesAttempted, timesCorrect}
      bookmarks: {},        // qid -> true
      sessionHistory: [],   // [{type:'practice'|'exam', subject, chapters, total, correct, wrong, accuracy, timeSpentSec, date}]
      lastVisited: {}        // qid -> true  (for palette "visited" state persistence isn't required across sessions, kept in-memory per session)
    };
  },
  load() {
    if (this._cache) return this._cache;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { this._cache = this.defaultState(); return this._cache; }
      const parsed = JSON.parse(raw);
      this._cache = Object.assign(this.defaultState(), parsed);
    } catch (e) {
      console.warn('Storage load failed, using defaults', e);
      this._cache = this.defaultState();
    }
    return this._cache;
  },
  save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._cache));
    } catch (e) {
      console.warn('Storage save failed (quota or disabled)', e);
    }
  },
  recordAttempt(qid, isCorrect, answerKey) {
    const s = this.load();
    const prev = s.attempts[qid] || { timesAttempted: 0, timesCorrect: 0 };
    prev.timesAttempted += 1;
    if (isCorrect) prev.timesCorrect += 1;
    prev.correct = isCorrect;
    prev.lastAnswerKey = answerKey;
    s.attempts[qid] = prev;
    this.save();
  },
  toggleBookmark(qid) {
    const s = this.load();
    if (s.bookmarks[qid]) delete s.bookmarks[qid];
    else s.bookmarks[qid] = true;
    this.save();
    return !!s.bookmarks[qid];
  },
  isBookmarked(qid) {
    return !!this.load().bookmarks[qid];
  },
  addSession(record) {
    const s = this.load();
    s.sessionHistory.push(record);
    if (s.sessionHistory.length > 200) s.sessionHistory.shift();
    this.save();
  },
  setTheme(theme) {
    const s = this.load();
    s.theme = theme;
    this.save();
  },
  resetAll() {
    this._cache = this.defaultState();
    this.save();
  },
  resetWrongAndStats() {
    const s = this.load();
    s.attempts = {};
    s.sessionHistory = [];
    this.save();
  }
};


/* ----------------------------- 3. DATA HELPERS --------------------------- */
/* DB is injected as a global const at build time: window.DB = {...} */

const Data = {
  getSubject(subjectId) {
    return DB.subjects.find(s => s.id === subjectId);
  },
  getChapter(subjectId, chapterId) {
    const subj = this.getSubject(subjectId);
    return subj ? subj.chapters.find(c => c.id === chapterId) : null;
  },
  getQuestionById(qid) {
    for (const s of DB.subjects) {
      for (const c of s.chapters) {
        const q = c.questions.find(q => q.id === qid);
        if (q) return { question: q, subject: s, chapter: c };
      }
    }
    return null;
  },
  totalQuestionCount() {
    return DB.subjects.reduce((sum, s) => sum + s.chapters.reduce((s2, c) => s2 + c.questions.length, 0), 0);
  },
  subjectQuestionCount(subjectId) {
    const subj = this.getSubject(subjectId);
    if (!subj) return 0;
    return subj.chapters.reduce((sum, c) => sum + c.questions.length, 0);
  },
  chapterQuestionCount(subjectId, chapterId) {
    const c = this.getChapter(subjectId, chapterId);
    return c ? c.questions.length : 0;
  },
  /* Build a flat pool of question objects (with subject/chapter context attached)
     from a list of chapterIds within a subject. */
  buildPool(subjectId, chapterIds) {
    const subj = this.getSubject(subjectId);
    if (!subj) return [];
    const pool = [];
    subj.chapters.forEach(c => {
      if (chapterIds.includes(c.id)) {
        c.questions.forEach(q => pool.push({ q, subjectId: subj.id, subjectName: subj.name, chapterId: c.id, chapterTitle: c.title }));
      }
    });
    return pool;
  },
  shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },
  /* Shuffle a question's options, remapping the correct-answer key so
     it still points at the right option text after reshuffling. Returns
     a NEW lightweight object; never mutates the source DB question. */
  shuffleQuestionOptions(q) {
    const keys = Object.keys(q.opts);
    const entries = this.shuffleArray(keys.map(k => [k, q.opts[k]]));
    const labels = ['A','B','C','D','E'].slice(0, entries.length);
    const newOpts = {};
    let newAnsKey = null;
    entries.forEach(([origKey, text], idx) => {
      const label = labels[idx];
      newOpts[label] = text;
      if (origKey === q.ans) newAnsKey = label;
    });
    return Object.assign({}, q, { opts: newOpts, ans: newAnsKey });
  },
  /* Build the global vocabulary index once. Only includes entries from
     questions that actually carry a non-empty vocab array. */
  _vocabIndexCache: null,
  buildVocabIndex() {
    if (this._vocabIndexCache) return this._vocabIndexCache;
    const idx = [];
    DB.subjects.forEach(s => {
      s.chapters.forEach(c => {
        c.questions.forEach(q => {
          (q.vocab || []).forEach(v => {
            idx.push({
              word: v.word,
              meaning: v.meaning,
              synonyms: v.synonyms,
              subjectId: s.id,
              subjectName: s.name,
              chapterTitle: c.title,
              qid: q.id,
              qText: q.q
            });
          });
        });
      });
    });
    this._vocabIndexCache = idx;
    return idx;
  },
  searchVocab(query) {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    const idx = this.buildVocabIndex();
    return idx.filter(v => v.word.toLowerCase().includes(q)).slice(0, 100);
  }
};

/* ----------------------------- 4. STATS / RANK ENGINE --------------------- */
const Rank = {
  thresholds: [
    { min: 0,  max: 40, name: 'Noob' },
    { min: 40, max: 60, name: 'Beginner' },
    { min: 60, max: 75, name: 'Intermediate' },
    { min: 75, max: 90, name: 'Advanced' },
    { min: 90, max: 100.0001, name: 'Expert' },
  ],
  fromAccuracy(accuracy) {
    for (const t of this.thresholds) {
      if (accuracy >= t.min && accuracy < t.max) return t.name;
    }
    return 'Expert';
  },
  /* Returns { name, progressPct, nextName } describing where the user sits
     within their current rank band, for the progress bar. */
  progressWithinRank(accuracy) {
    const idx = this.thresholds.findIndex(t => accuracy >= t.min && accuracy < t.max);
    const band = idx === -1 ? this.thresholds[this.thresholds.length - 1] : this.thresholds[idx];
    const next = this.thresholds[idx + 1];
    const span = band.max - band.min;
    const pct = Math.max(0, Math.min(100, ((accuracy - band.min) / span) * 100));
    return { name: band.name, progressPct: pct, nextName: next ? next.name : null };
  }
};

const Stats = {
  /* Overall stats across ALL attempted questions ever (from Storage.attempts) */
  overall() {
    const s = Storage.load();
    const attempts = Object.values(s.attempts);
    const attempted = attempts.length;
    const correct = attempts.filter(a => a.correct).length;
    const wrong = attempted - correct;
    const accuracy = attempted > 0 ? (correct / attempted) * 100 : 0;
    return {
      totalQuestions: Data.totalQuestionCount(),
      attempted, correct, wrong,
      accuracy: Math.round(accuracy * 10) / 10
    };
  },
  /* Per-chapter accuracy across both subjects, for analytics */
  chapterBreakdown() {
    const s = Storage.load();
    const rows = [];
    DB.subjects.forEach(subj => {
      subj.chapters.forEach(c => {
        let attempted = 0, correct = 0;
        c.questions.forEach(q => {
          const a = s.attempts[q.id];
          if (a) { attempted++; if (a.correct) correct++; }
        });
        if (attempted > 0) {
          rows.push({
            subjectId: subj.id,
            chapterId: c.id,
            title: c.title,
            attempted,
            correct,
            wrong: attempted - correct,
            accuracy: Math.round((correct / attempted) * 1000) / 10
          });
        }
      });
    });
    return rows;
  },
  bookmarkCount() {
    return Object.keys(Storage.load().bookmarks).length;
  },
  wrongQuestionIds() {
    const s = Storage.load();
    return Object.keys(s.attempts).filter(qid => s.attempts[qid].correct === false);
  },
  bookmarkedQuestionIds() {
    return Object.keys(Storage.load().bookmarks);
  }
};

   APP.JS — Router, state, shared UI helpers

const App = {
  state: {
    route: 'dashboard',      // dashboard | setup | quiz | result | analytics | vocab | review
    routeParams: {},
    session: null,            // active quiz session object (see Session below)
  },

  init() {
    const stored = Storage.load();
    document.documentElement.setAttribute('data-theme', stored.theme || 'light');
    this.render();
  },

  navigate(route, params = {}) {
    this.state.route = route;
    this.state.routeParams = params;
    window.scrollTo(0, 0);
    this.render();
  },

  render() {
    const root = document.getElementById('app');
    root.innerHTML = '';
    root.appendChild(this.renderTopbar());
    const main = document.createElement('main');
    main.className = 'fade-in';
    const container = document.createElement('div');
    container.className = (this.state.route === 'quiz') ? 'container' : 'container';

    switch (this.state.route) {
      case 'dashboard': container.appendChild(Screens.dashboard()); break;
      case 'setup': container.appendChild(Screens.setup(this.state.routeParams)); break;
      case 'quiz': container.appendChild(Screens.quiz()); break;
      case 'result': container.appendChild(Screens.result()); break;
      case 'analytics': container.appendChild(Screens.analytics()); break;
      case 'vocab': container.appendChild(Screens.vocabSearch()); break;
      case 'review': container.appendChild(Screens.reviewLanding()); break;
      default: container.appendChild(Screens.dashboard());
    }
    main.appendChild(container);
    root.appendChild(main);
  },

  renderTopbar() {
    const bar = document.createElement('div');
    bar.className = 'topbar';

    const left = document.createElement('div');
    left.className = 'topbar-left';
    const brand = document.createElement('button');
    brand.className = 'topbar-brand';
    brand.innerHTML = `
      <span class="topbar-mark">${ICONS.logo}</span>
      <span class="topbar-title">Ballpoint with Kushal<small>Exam Prep Engine</small></span>
    `;
    brand.onclick = () => App.navigate('dashboard');
    left.appendChild(brand);

    const right = document.createElement('div');
    right.className = 'topbar-right';

    if (this.state.route !== 'dashboard') {
      const homeBtn = document.createElement('button');
      homeBtn.className = 'icon-btn';
      homeBtn.title = 'Dashboard';
      homeBtn.innerHTML = ICONS.home;
      homeBtn.onclick = () => {
        if (this.state.route === 'quiz' && this.state.session && !this.state.session.finished) {
          UI.confirmModal({
            title: 'Leave this session?',
            body: 'Your progress in this session will be lost if you leave now.',
            confirmLabel: 'Leave',
            danger: true,
            onConfirm: () => { App.state.session = null; App.navigate('dashboard'); }
          });
        } else {
          App.navigate('dashboard');
        }
      };
      right.appendChild(homeBtn);
    }

    const themeBtn = document.createElement('button');
    themeBtn.className = 'icon-btn';
    themeBtn.title = 'Toggle theme';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeBtn.innerHTML = isDark ? ICONS.sun : ICONS.moon;
    themeBtn.onclick = () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      Storage.setTheme(next);
      this.render();
    };
    right.appendChild(themeBtn);

    bar.appendChild(left);
    bar.appendChild(right);
    return bar;
  }
};

/* ----------------------------- SHARED UI HELPERS -------------------------- */
const UI = {
  toast(msg, opts = {}) {
    const root = document.getElementById('toast-root');
    root.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    root.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, opts.duration || 1800);
  },

  confirmModal({ title, body, confirmLabel = 'Confirm', cancelLabel = 'Cancel', danger = false, onConfirm }) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-icon">${ICONS.alert}</div>
        <h3>${title}</h3>
        <p>${body}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">${cancelLabel}</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="modal-confirm">${confirmLabel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#modal-cancel').onclick = () => document.body.removeChild(overlay);
    overlay.querySelector('#modal-confirm').onclick = () => {
      document.body.removeChild(overlay);
      onConfirm();
    };
    overlay.onclick = (e) => { if (e.target === overlay) document.body.removeChild(overlay); };
  },

  el(tag, className, html) {
    const e = document.createElement(tag);
    if (className) e.className = className;
    if (html !== undefined) e.innerHTML = html;
    return e;
  },

  formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },

  escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
};

  const card = UI.el('div', 'card card-pad');
  wrap.appendChild(card);

  const subjTabs = UI.el('div', 'subject-tabs');
  card.appendChild(subjTabs);

  const selectAllRow = UI.el('div', 'select-all-row');
  const selectAllLabel = UI.el('div', 'section-title', 'Select Chapters');
  selectAllLabel.style.margin = '0';
  const selectAllBtn = UI.el('button', 'link-btn', 'Select All');
  selectAllRow.appendChild(selectAllLabel);
  selectAllRow.appendChild(selectAllBtn);
  card.appendChild(selectAllRow);

  const chapterList = UI.el('div', 'chapter-list');
  card.appendChild(chapterList);

  function chapterKey(subjectId, chapterId) { return `${subjectId}::${chapterId}`; }

  function renderChapters() {
    chapterList.innerHTML = '';
    const subj = Data.getSubject(setupState.subjectId);
    subj.chapters.forEach(c => {
      const key = chapterKey(subj.id, c.id);
      const row = UI.el('button', 'chapter-row' + (setupState.selectedChapters[key] ? ' selected' : ''));
      row.innerHTML = `
        <span class="chk">${setupState.selectedChapters[key] ? ICONS.check : ''}</span>
        <span class="ch-name">${UI.escapeHtml(c.title)}</span>
        <span class="ch-meta">${c.questions.length} Q</span>
      `;
      row.onclick = () => {
        if (setupState.selectedChapters[key]) delete setupState.selectedChapters[key];
        else setupState.selectedChapters[key] = true;
        renderChapters();
        updateFooter();
      };
      chapterList.appendChild(row);
    });
    const allSelected = subj.chapters.every(c => setupState.selectedChapters[chapterKey(subj.id, c.id)]);
    selectAllBtn.textContent = allSelected ? 'Deselect All' : 'Select All';
    selectAllBtn.onclick = () => {
      if (allSelected) {
        subj.chapters.forEach(c => delete setupState.selectedChapters[chapterKey(subj.id, c.id)]);
      } else {
        subj.chapters.forEach(c => setupState.selectedChapters[chapterKey(subj.id, c.id)] = true);
      }
      renderChapters();
      updateFooter();
    };
  }

  function renderTabs() {
    subjTabs.innerHTML = '';
    DB.subjects.forEach(s => {
      const tab = UI.el('button', 'subject-tab' + (s.id === setupState.subjectId ? ' active' : ''));
      tab.innerHTML = `${UI.escapeHtml(s.name)} <span class="count">${Data.subjectQuestionCount(s.id)}</span>`;
      tab.onclick = () => {
        setupState.subjectId = s.id;
        renderTabs();
        renderChapters();
        updateFooter();
      };
      subjTabs.appendChild(tab);
    });
  }

  const footer = UI.el('div', 'setup-footer');
  wrap.appendChild(footer);

  function selectedChapterIdsForSubject(subjectId) {
    return Object.keys(setupState.selectedChapters)
      .filter(k => k.startsWith(subjectId + '::'))
      .map(k => k.split('::')[1]);
  }

  function updateFooter() {
    const chosenIds = selectedChapterIdsForSubject(setupState.subjectId);
    const pool = Data.buildPool(setupState.subjectId, chosenIds);
    footer.innerHTML = '';
    const info = UI.el('div', 'subtle', `<b style="color:var(--ink)">${pool.length}</b> question${pool.length===1?'':'s'} selected`);
    footer.appendChild(info);
    const startBtn = UI.el('button', 'btn btn-primary', isExam ? 'Start Exam' : 'Start Practice');
    const minNeeded = isExam ? 1 : 1;
    startBtn.disabled = pool.length < minNeeded;
    startBtn.onclick = () => {
      if (isExam) {
        Session.startExam(setupState.subjectId, chosenIds);
      } else {
        Session.startPractice(setupState.subjectId, chosenIds);
      }
      App.navigate('quiz');
    };
    footer.appendChild(startBtn);
  }

  renderTabs();
  renderChapters();
  updateFooter();

  return wrap;
};


/* ==========================================================================
   SESSION — manages the active quiz run (practice / exam / review)
   ========================================================================== */
const Session = {
  EXAM_QUESTION_COUNT: 30,
  EXAM_DURATION_SEC: 15 * 60,

  _build(questions, type, meta = {}) {
    // questions: array of {q, subjectId, subjectName, chapterId, chapterTitle}
    const shuffled = Data.shuffleArray(questions).map(item => ({
      ...item,
      q: Data.shuffleQuestionOptions(item.q)
    }));
    App.state.session = {
      type,                       // 'practice' | 'exam' | 'bookmark' | 'wrong'
      meta,
      items: shuffled,            // fixed order for this session
      current: 0,
      answers: {},                 // index -> { selectedKey, isCorrect }
      visited: {},                  // index -> true
      bookmarksThisSession: {},      // index -> true (mirrors Storage but for quick palette lookup)
      startTime: Date.now(),
      durationSec: type === 'exam' ? Session.EXAM_DURATION_SEC : null,
      timeUp: false,
      finished: false,
      paletteOpen: false
    };
    App.state.session.visited[0] = true;
  },

  startPractice(subjectId, chapterIds) {
    const pool = Data.buildPool(subjectId, chapterIds);
    this._build(pool, 'practice', { subjectId, chapterIds });
  },

  startExam(subjectId, chapterIds) {
    const pool = Data.buildPool(subjectId, chapterIds);
    const count = Math.min(this.EXAM_QUESTION_COUNT, pool.length);
    const picked = Data.shuffleArray(pool).slice(0, count);
    this._build(picked, 'exam', { subjectId, chapterIds });
  },

  startBookmarkReview() {
    const ids = Stats.bookmarkedQuestionIds();
    const items = ids.map(qid => {
      const found = Data.getQuestionById(qid);
      if (!found) return null;
      return { q: found.question, subjectId: found.subject.id, subjectName: found.subject.name, chapterId: found.chapter.id, chapterTitle: found.chapter.title };
    }).filter(Boolean);
    this._build(items, 'bookmark', {});
  },

  startWrongReview() {
    const ids = Stats.wrongQuestionIds();
    const items = ids.map(qid => {
      const found = Data.getQuestionById(qid);
      if (!found) return null;
      return { q: found.question, subjectId: found.subject.id, subjectName: found.subject.name, chapterId: found.chapter.id, chapterTitle: found.chapter.title };
    }).filter(Boolean);
    this._build(items, 'wrong', {});
  },

  current() {
    const s = App.state.session;
    return s ? s.items[s.current] : null;
  },

  answerCurrent(selectedKey) {
    const s = App.state.session;
    const item = s.items[s.current];
    const isCorrect = selectedKey === item.q.ans;
    s.answers[s.current] = { selectedKey, isCorrect };
    Storage.recordAttempt(item.q.id, isCorrect, selectedKey);
    return isCorrect;
  },

  goTo(index) {
    const s = App.state.session;
    if (index < 0 || index >= s.items.length) return;
    s.current = index;
    s.visited[index] = true;
  },

  next() { const s = App.state.session; if (s.current < s.items.length - 1) this.goTo(s.current + 1); },
  prev() { const s = App.state.session; if (s.current > 0) this.goTo(s.current - 1); },

  toggleBookmark() {
    const s = App.state.session;
    const item = s.items[s.current];
    return Storage.toggleBookmark(item.q.id);
  },

  elapsedSec() {
    const s = App.state.session;
    return Math.floor((Date.now() - s.startTime) / 1000);
  },

  remainingSec() {
    const s = App.state.session;
    if (s.durationSec === null) return null;
    return Math.max(0, s.durationSec - this.elapsedSec());
  },

  isAnswered(index) {
    return App.state.session.answers.hasOwnProperty(index);
  },

  allAnswered() {
    const s = App.state.session;
    return s.items.every((_, i) => s.answers.hasOwnProperty(i));
  },

  finish() {
    const s = App.state.session;
    s.finished = true;
    s.endTime = Date.now();
    const total = s.items.length;
    const correctCount = Object.values(s.answers).filter(a => a.isCorrect).length;
    const attemptedCount = Object.keys(s.answers).length;
    const wrongCount = attemptedCount - correctCount;
    const accuracy = attemptedCount > 0 ? (correctCount / attemptedCount) * 100 : 0;
    const timeSpentSec = Math.floor((s.endTime - s.startTime) / 1000);
    const record = {
      type: s.type,
      subject: s.meta.subjectId || null,
      chapters: s.meta.chapterIds || null,
      total, attempted: attemptedCount, correct: correctCount, wrong: wrongCount,
      accuracy: Math.round(accuracy * 10) / 10,
      timeSpentSec,
      date: new Date().toISOString()
    };
    Storage.addSession(record);
    s.resultRecord = record;
  }
};


/* ==========================================================================
   SCREENS — Quiz (practice / exam / bookmark-review / wrong-review)
   ========================================================================== */

let _examTimerInterval = null;

Screens.quiz = function() {
  const s = App.state.session;
  if (!s || s.items.length === 0) {
    const empty = UI.el('div', 'empty-state');
    empty.innerHTML = `${ICONS.empty}<div class="h2">Nothing to show here</div><div class="subtle">There are no questions available for this session.</div>`;
    const btn = UI.el('button', 'btn btn-primary', 'Back to dashboard');
    btn.style.marginTop = '16px';
    btn.onclick = () => App.navigate('dashboard');
    empty.appendChild(btn);
    return empty;
  }

  if (s.finished) {
    App.navigate('result');
    return UI.el('div');
  }

  const wrap = UI.el('div', 'quiz-shell');
  const left = UI.el('div');
  wrap.appendChild(left);

  /* ---- header bar: progress + timer + palette toggle ---- */
  const header = UI.el('div', 'quiz-header-bar');
  const progWrap = UI.el('div', 'q-progress-wrap');
  const pct = Math.round(((s.current + 1) / s.items.length) * 100);
  progWrap.innerHTML = `
    <div class="q-counter">Question ${s.current + 1} of ${s.items.length}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
  header.appendChild(progWrap);

  if (s.type === 'exam') {
    const timerPill = UI.el('div', 'timer-pill', `${ICONS.timer} <span id="timer-display">--:--</span>`);
    timerPill.id = 'timer-pill';
    header.appendChild(timerPill);
  }

  const paletteToggle = UI.el('button', 'icon-btn palette-toggle-btn', ICONS.grid);
  paletteToggle.title = 'Question palette';
  paletteToggle.onclick = () => {
    document.getElementById('palette-drawer-overlay').classList.add('open');
    document.getElementById('palette-drawer').classList.add('open');
  };
  header.appendChild(paletteToggle);
  left.appendChild(header);

  /* ---- question card ---- */
  const item = s.items[s.current];
  const q = item.q;
  const answered = Session.isAnswered(s.current);
  const userAns = answered ? s.answers[s.current] : null;

  const qCard = UI.el('div', 'card question-card');
  const isBookmarked = Storage.isBookmarked(q.id);

  qCard.innerHTML = `
    <div class="q-meta-row">
      <span class="q-chapter-tag">${UI.escapeHtml(item.chapterTitle)}</span>
    </div>
    <div class="q-text">${UI.escapeHtml(q.q)}</div>
    <div class="options-list" id="options-list"></div>
  `;
  left.appendChild(qCard);

  const optionsList = qCard.querySelector('#options-list');
  const revealCorrectness = answered && s.type !== 'exam';
  Object.keys(q.opts).forEach(key => {
    const row = UI.el('button', 'option-row');
    if (answered) row.classList.add('locked');
    let extraClass = '';
    let iconHtml = '';
    if (revealCorrectness) {
      if (key === q.ans) { extraClass = 'correct-answer'; iconHtml = `<span class="opt-icon" style="color:var(--correct)">${ICONS.check}</span>`; }
      else if (key === userAns.selectedKey) { extraClass = 'wrong-answer'; iconHtml = `<span class="opt-icon" style="color:var(--wrong)">${ICONS.cross}</span>`; }
    } else if (answered && key === userAns.selectedKey) {
      // Exam mode: answer is locked in, but correctness is withheld until submission.
      extraClass = 'selected';
    } else if (userAns && userAns.selectedKey === key) {
      extraClass = 'selected';
    }
    row.className += extraClass ? ' ' + extraClass : '';
    row.innerHTML = `<span class="opt-label">${key}</span><span>${UI.escapeHtml(q.opts[key])}</span>${iconHtml}`;
    row.onclick = () => {
      if (answered) return;
      Session.answerCurrent(key);
      App.render();
    };
    optionsList.appendChild(row);
  });

  // actions row: bookmark
  const actionsRow = UI.el('div', 'q-actions-row');
  const bmBtn = UI.el('button', 'bookmark-toggle' + (isBookmarked ? ' active' : ''),
    `${isBookmarked ? ICONS.bookmarkFilled : ICONS.bookmark} ${isBookmarked ? 'Bookmarked' : 'Bookmark'}`);
  bmBtn.onclick = () => {
    const nowBookmarked = Session.toggleBookmark();
    UI.toast(nowBookmarked ? 'Question bookmarked' : 'Bookmark removed');
    App.render();
  };
  actionsRow.appendChild(bmBtn);
  qCard.appendChild(actionsRow);

  // feedback panel (only in practice-like modes with instant feedback; exam mode also shows
  // feedback per requirements: "Instant feedback should be enabled" is listed under Practice,
  // exam mode shows correctness only after submit — but selecting in exam still locks the option
  // and we surface feedback immediately after locking for practice/bookmark/wrong; for exam we
  // still lock the option (so user can't change answer) but defer full explanation reveal until
  // after exam submission to preserve mock-test integrity. See result/review screens.)
  if (answered && s.type !== 'exam') {
    qCard.appendChild(buildFeedbackPanel(q, userAns, item));
  }

  /* ---- nav row: prev / next / submit ---- */
  const navRow = UI.el('div', 'quiz-nav-row');
  const prevBtn = UI.el('button', 'btn btn-ghost', `${ICONS.back} Previous`);
  prevBtn.disabled = s.current === 0;
  prevBtn.onclick = () => { Session.prev(); App.render(); };
  navRow.appendChild(prevBtn);

  const isLast = s.current === s.items.length - 1;
  if (s.type === 'exam') {
    if (isLast) {
      const submitBtn = UI.el('button', 'btn btn-primary', 'Submit Exam');
      submitBtn.onclick = () => confirmSubmitExam();
      navRow.appendChild(submitBtn);
    } else {
      const nextBtn = UI.el('button', 'btn btn-primary', `Next ${ICONS.chevronRight}`);
      nextBtn.onclick = () => { Session.next(); App.render(); };
      navRow.appendChild(nextBtn);
    }
  } else {
    if (isLast) {
      const finishBtn = UI.el('button', 'btn btn-primary', 'Finish Session');
      finishBtn.onclick = () => { Session.finish(); App.navigate('result'); };
      navRow.appendChild(finishBtn);
    } else {
      const nextBtn = UI.el('button', 'btn btn-primary', `Next ${ICONS.chevronRight}`);
      nextBtn.onclick = () => { Session.next(); App.render(); };
      navRow.appendChild(nextBtn);
    }
  }
  left.appendChild(navRow);

  if (s.type === 'exam') {
    const submitRow = UI.el('div', 'quiz-nav-row');
    submitRow.style.marginTop = '4px';
    const submitBtn2 = UI.el('button', 'btn btn-secondary btn-block', 'Submit Exam Now');
    submitBtn2.onclick = () => confirmSubmitExam();
    submitRow.appendChild(submitBtn2);
    left.appendChild(submitRow);
  }

  /* ---- palette (sidebar on desktop, drawer on mobile) ---- */
  wrap.appendChild(buildPaletteDrawer());

  // Start/refresh exam timer
  if (s.type === 'exam') {
    setupExamTimer();
  } else if (_examTimerInterval) {
    clearInterval(_examTimerInterval);
    _examTimerInterval = null;
  }

  return wrap;
};

function buildFeedbackPanel(q, userAns, item) {
  const panel = UI.el('div', 'feedback-panel ' + (userAns.isCorrect ? 'is-correct' : 'is-wrong'));
  const headHtml = userAns.isCorrect
    ? `<div class="feedback-head txt-correct">${ICONS.check} Correct!</div>`
    : `<div class="feedback-head txt-wrong">${ICONS.cross} Not quite</div>`;
  panel.innerHTML = headHtml;

  const body = UI.el('div', 'feedback-body');
  if (q.exp) {
    body.innerHTML = UI.escapeHtml(q.exp).replace(/\n/g, '<br>');
  }
  panel.appendChild(body);

  if (q.src) {
    const srcTag = UI.el('div', 'source-tag', `Source: ${UI.escapeHtml(q.src)}`);
    panel.appendChild(srcTag);
  }

  if (q.vocab && q.vocab.length > 0) {
    const vocabSection = UI.el('div', 'feedback-section');
    vocabSection.innerHTML = `<div class="feedback-section-title">Vocabulary & Synonyms</div>`;
    const list = UI.el('div', 'vocab-chip-list');
    q.vocab.forEach(v => {
      const chip = UI.el('div', 'vocab-chip');
      chip.innerHTML = `
        <div class="vw">${UI.escapeHtml(v.word)}</div>
        <div class="vm">${UI.escapeHtml(v.meaning)}</div>
        ${v.synonyms && v.synonyms !== '-' ? `<div class="vs"><b>Synonyms:</b> ${UI.escapeHtml(v.synonyms)}</div>` : ''}
      `;
      list.appendChild(chip);
    });
    vocabSection.appendChild(list);
    panel.appendChild(vocabSection);
  }

  return panel;
}

function paletteCellState(index) {
  const s = App.state.session;
  const answer = s.answers[index];
  const canRevealCorrectness = s.type !== 'exam' || s.finished;
  if (answer && canRevealCorrectness) return answer.isCorrect ? 'pc-correct' : 'pc-wrong';
  if (answer || s.visited[index]) return 'pc-visited';
  return 'pc-notvisited';
}

function buildPaletteContent() {
  const s = App.state.session;
  const card = UI.el('div', 'palette-card');
  card.innerHTML = `
    <div class="section-title" style="margin-bottom:10px;">Question Palette</div>
    <div class="palette-legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--not-visited)"></span>Not visited</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--visited)"></span>Visited</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--correct)"></span>Correct</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--wrong)"></span>Wrong</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--bookmark)"></span>Bookmarked</span>
    </div>
    <div class="palette-grid" id="palette-grid"></div>
  `;
  const grid = card.querySelector('#palette-grid');
  s.items.forEach((item, i) => {
    const cell = UI.el('button', 'palette-cell ' + paletteCellState(i) + (i === s.current ? ' current' : ''));
    cell.textContent = i + 1;
    if (Storage.isBookmarked(item.q.id)) {
      cell.appendChild(UI.el('span', 'bm-dot'));
    }
    cell.onclick = () => {
      Session.goTo(i);
      closeMobilePalette();
      App.render();
    };
    grid.appendChild(cell);
  });
  return card;
}

function buildPaletteDrawer() {
  const frag = document.createDocumentFragment ? document.createElement('div') : null;
  const container = UI.el('div');
  container.style.display = 'contents';

  const overlay = UI.el('div', 'palette-drawer-overlay');
  overlay.id = 'palette-drawer-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeMobilePalette(); };

  const drawer = UI.el('div', 'palette-drawer');
  drawer.id = 'palette-drawer';
  const drawerHead = UI.el('div', 'palette-drawer-head');
  drawerHead.innerHTML = `<div class="h2" style="margin:0;font-size:16px;">Palette</div>`;
  const closeBtn = UI.el('button', 'icon-btn', ICONS.close);
  closeBtn.onclick = closeMobilePalette;
  drawerHead.appendChild(closeBtn);

  const mobileDrawerInner = UI.el('div');
  mobileDrawerInner.appendChild(drawerHead);
  mobileDrawerInner.appendChild(buildPaletteContent());

  const desktopWrap = UI.el('div');
  desktopWrap.className = 'card';
  desktopWrap.style.position = 'sticky';
  desktopWrap.style.top = '76px';
  // Render the palette twice: once for the always-visible desktop sidebar slot,
  // once inside the mobile drawer. They're separate DOM nodes so clicks work independently.
  const desktopPaletteHolder = UI.el('div');
  desktopPaletteHolder.appendChild(buildPaletteContent());

  container.appendChild(overlay);
  container.appendChild(drawer);
  drawer.innerHTML = '';
  drawer.appendChild(drawerHead);
  drawer.appendChild(buildPaletteContent());

  // For desktop (>=880px) .palette-drawer is shown statically via CSS; reuse same #palette-drawer
  // node — CSS media queries toggle between fixed-drawer (mobile) and static sidebar (desktop).
  return container;
}

function closeMobilePalette() {
  const overlay = document.getElementById('palette-drawer-overlay');
  const drawer = document.getElementById('palette-drawer');
  if (overlay) overlay.classList.remove('open');
  if (drawer) drawer.classList.remove('open');
}

function setupExamTimer() {
  if (_examTimerInterval) clearInterval(_examTimerInterval);
  updateTimerDisplay();
  _examTimerInterval = setInterval(() => {
    const remaining = Session.remainingSec();
    updateTimerDisplay();
    if (remaining <= 0) {
      clearInterval(_examTimerInterval);
      _examTimerInterval = null;
      handleTimeUp();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const remaining = Session.remainingSec();
  if (remaining === null) return;
  const display = document.getElementById('timer-display');
  const pill = document.getElementById('timer-pill');
  if (display) display.textContent = UI.formatTime(remaining);
  if (pill) {
    if (remaining <= 60) pill.classList.add('warn');
    else pill.classList.remove('warn');
  }
}

function handleTimeUp() {
  const s = App.state.session;
  if (!s || s.timeUp || s.finished) return;
  s.timeUp = true;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-icon" style="color:var(--wrong)">${ICONS.alert}</div>
      <h3>Time's up!</h3>
      <p>Your 15-minute exam timer has ended. You can submit now, or continue for a little longer to finish remaining questions.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="continue-anyway">Continue</button>
        <button class="btn btn-primary" id="submit-now">Submit Exam</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#continue-anyway').onclick = () => {
    document.body.removeChild(overlay);
  };
  overlay.querySelector('#submit-now').onclick = () => {
    document.body.removeChild(overlay);
    Session.finish();
    App.navigate('result');
  };
}

function confirmSubmitExam() {
  const s = App.state.session;
  const unanswered = s.items.length - Object.keys(s.answers).length;
  UI.confirmModal({
    title: 'Submit exam?',
    body: unanswered > 0
      ? `You have ${unanswered} unanswered question${unanswered === 1 ? '' : 's'}. Submitting now will count ${unanswered === 1 ? 'it' : 'them'} as wrong. Continue?`
      : 'You have answered all questions. Ready to see your results?',
    confirmLabel: 'Submit',
    onConfirm: () => {
      if (_examTimerInterval) { clearInterval(_examTimerInterval); _examTimerInterval = null; }
      Session.finish();
      App.navigate('result');
    }
  });
}


/* ==========================================================================
   SCREENS — Result (post-session summary + full review)
   ========================================================================== */

Screens.result = function() {
  const s = App.state.session;
  if (!s || !s.finished) {
    App.navigate('dashboard');
    return UI.el('div');
  }
  const r = s.resultRecord;
  const wrap = UI.el('div');

  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (r.accuracy / 100) * circumference;

  const isExam = s.type === 'exam';
  const titleText = isExam ? 'Exam Complete' : 'Session Complete';

  const hero = UI.el('div', 'card result-hero');
  hero.innerHTML = `
    <div class="h2" style="font-size:14px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;">${titleText}</div>
    <div class="result-ring-wrap">
      <svg viewBox="0 0 160 160">
        <circle class="result-ring-track" cx="80" cy="80" r="70"/>
        <circle class="result-ring-fill" cx="80" cy="80" r="70"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="result-ring-center">
        <div class="pct">${r.accuracy}%</div>
        <div class="lbl">Accuracy</div>
      </div>
    </div>
    <div class="h1" style="font-size:20px;">${r.correct} / ${r.total} correct</div>
    <div class="subtle">Time spent: ${UI.formatTime(r.timeSpentSec)}</div>
    <div class="result-stats-grid">
      <div class="stat-tile correct"><div class="num">${r.correct}</div><div class="lbl">Correct</div></div>
      <div class="stat-tile wrong"><div class="num">${r.wrong}</div><div class="lbl">Wrong</div></div>
      <div class="stat-tile"><div class="num">${r.total - r.attempted}</div><div class="lbl">Skipped</div></div>
      <div class="stat-tile accent"><div class="num">${r.accuracy}%</div><div class="lbl">Accuracy</div></div>
    </div>
  `;
  wrap.appendChild(hero);

  const actionsRow = UI.el('div', 'quiz-nav-row');
  actionsRow.style.marginTop = '16px';
  const dashBtn = UI.el('button', 'btn btn-ghost', 'Back to Dashboard');
  dashBtn.onclick = () => { App.state.session = null; App.navigate('dashboard'); };
  const retryBtn = UI.el('button', 'btn btn-primary', isExam ? 'Take Another Exam' : 'Practice Again');
  retryBtn.onclick = () => App.navigate('setup', { mode: s.type === 'exam' ? 'exam' : 'practice' });
  actionsRow.appendChild(dashBtn);
  actionsRow.appendChild(retryBtn);
  wrap.appendChild(actionsRow);

  wrap.appendChild(UI.el('div', 'divider'));
  wrap.appendChild(UI.el('div', 'section-title', 'Full Review'));

  const reviewList = UI.el('div');
  s.items.forEach((item, i) => {
    const q = item.q;
    const ans = s.answers[i];
    reviewList.appendChild(buildReviewCard(q, ans, item, i));
  });
  wrap.appendChild(reviewList);

  return wrap;
};

function buildReviewCard(q, ans, item, index) {
  const card = UI.el('div', 'card card-pad');
  card.style.marginBottom = '12px';
  const answered = !!ans;
  const statusHtml = !answered
    ? `<span class="q-chapter-tag" style="background:var(--accent-pale);color:var(--ink-faint)">Skipped</span>`
    : ans.isCorrect
      ? `<span class="q-chapter-tag" style="background:var(--correct-bg);color:var(--correct)">${ICONS.check} Correct</span>`
      : `<span class="q-chapter-tag" style="background:var(--wrong-bg);color:var(--wrong)">${ICONS.cross} Wrong</span>`;

  card.innerHTML = `
    <div class="q-meta-row">
      <span class="q-chapter-tag">${UI.escapeHtml(item.chapterTitle)}</span>
      ${statusHtml}
    </div>
    <div class="q-text" style="font-size:15.5px;">${index + 1}. ${UI.escapeHtml(q.q)}</div>
    <div class="options-list" id="rev-opts-${index}"></div>
  `;
  const optsList = card.querySelector(`#rev-opts-${index}`);
  Object.keys(q.opts).forEach(key => {
    const row = UI.el('div', 'option-row locked');
    let extraClass = '', iconHtml = '';
    if (key === q.ans) { extraClass = 'correct-answer'; iconHtml = `<span class="opt-icon" style="color:var(--correct)">${ICONS.check}</span>`; }
    else if (answered && key === ans.selectedKey) { extraClass = 'wrong-answer'; iconHtml = `<span class="opt-icon" style="color:var(--wrong)">${ICONS.cross}</span>`; }
    row.className += extraClass ? ' ' + extraClass : '';
    row.innerHTML = `<span class="opt-label">${key}</span><span>${UI.escapeHtml(q.opts[key])}</span>${iconHtml}`;
    optsList.appendChild(row);
  });

  if (answered) {
    card.appendChild(buildFeedbackPanel(q, ans, item));
  } else if (q.exp) {
    const panel = UI.el('div', 'feedback-panel');
    panel.innerHTML = `<div class="feedback-head">Explanation</div><div class="feedback-body">${UI.escapeHtml(q.exp)}</div>`;
    card.appendChild(panel);
  }

  return card;
}


/* ==========================================================================
   SCREENS — Review landing (Bookmarks / Wrong Answers)
   ========================================================================== */

Screens.reviewLanding = function() {
  const { type } = App.state.routeParams;
  const isBookmark = type === 'bookmark';
  const wrap = UI.el('div', 'container-narrow-wrap');

  const back = UI.el('button', 'back-link', `${ICONS.back} Back to dashboard`);
  back.onclick = () => App.navigate('dashboard');
  wrap.appendChild(back);

  const ids = isBookmark ? Stats.bookmarkedQuestionIds() : Stats.wrongQuestionIds();

  wrap.appendChild(UI.el('div', 'h1', isBookmark ? 'Bookmarked Questions' : 'Review Wrong Answers'));
  wrap.appendChild(UI.el('div', 'subtle', isBookmark
    ? 'Revisit the questions you flagged for later.'
    : 'Reattempt questions you got wrong before, and track your improvement.'));
  wrap.appendChild(UI.el('div', 'divider'));

  if (ids.length === 0) {
    const empty = UI.el('div', 'empty-state');
    empty.innerHTML = `${isBookmark ? ICONS.bookmark : ICONS.refresh}
      <div class="h2">${isBookmark ? 'No bookmarks yet' : 'No wrong answers yet'}</div>
      <div class="subtle">${isBookmark ? 'Bookmark questions during practice to revisit them here.' : 'Questions you answer incorrectly will show up here for revision.'}</div>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const card = UI.el('div', 'card card-pad');
  card.innerHTML = `
    <div class="flex-between">
      <div>
        <div class="h2">${ids.length} question${ids.length === 1 ? '' : 's'}</div>
        <div class="subtle">Ready to review</div>
      </div>
    </div>
  `;
  const startBtn = UI.el('button', 'btn btn-primary btn-block', `Start Review`);
  startBtn.style.marginTop = '16px';
  startBtn.onclick = () => {
    if (isBookmark) Session.startBookmarkReview();
    else Session.startWrongReview();
    App.navigate('quiz');
  };
  card.appendChild(startBtn);
  wrap.appendChild(card);

  return wrap;
};


/* ==========================================================================
   SCREENS — Vocabulary Search
   ========================================================================== */

Screens.vocabSearch = function() {
  const wrap = UI.el('div', 'container-narrow-wrap');

  const back = UI.el('button', 'back-link', `${ICONS.back} Back to dashboard`);
  back.onclick = () => App.navigate('dashboard');
  wrap.appendChild(back);

  wrap.appendChild(UI.el('div', 'h1', 'Vocabulary Explorer'));
  wrap.appendChild(UI.el('div', 'subtle', `Search across ${Data.buildVocabIndex().length} words pulled from the GRE Analogy question bank.`));
  wrap.appendChild(UI.el('div', 'divider'));

  const searchWrap = UI.el('div', 'search-input-wrap');
  searchWrap.innerHTML = `${ICONS.search}`;
  const input = UI.el('input', 'search-input');
  input.type = 'text';
  input.placeholder = 'Type a word, e.g. "sedative"...';
  input.autocomplete = 'off';
  searchWrap.appendChild(input);
  wrap.appendChild(searchWrap);

  const resultsHolder = UI.el('div');
  wrap.appendChild(resultsHolder);

  function renderResults(query) {
    resultsHolder.innerHTML = '';
    if (!query.trim()) {
      const empty = UI.el('div', 'empty-state');
      empty.innerHTML = `${ICONS.search}<div class="h2">Start typing to search</div><div class="subtle">Find meanings, synonyms, and the question each word came from.</div>`;
      resultsHolder.appendChild(empty);
      return;
    }
    const results = Data.searchVocab(query);
    if (results.length === 0) {
      const empty = UI.el('div', 'empty-state');
      empty.innerHTML = `${ICONS.empty}<div class="h2">No matches</div><div class="subtle">No vocabulary entries match "${UI.escapeHtml(query)}".</div>`;
      resultsHolder.appendChild(empty);
      return;
    }
    results.forEach(v => {
      const card = UI.el('div', 'card vocab-result-card');
      card.innerHTML = `
        <div class="vocab-result-word">${UI.escapeHtml(v.word)}</div>
        <div class="vocab-result-meaning">${UI.escapeHtml(v.meaning)}</div>
        ${v.synonyms && v.synonyms !== '-' ? `<div class="vocab-result-meta"><span><b>Synonyms:</b> ${UI.escapeHtml(v.synonyms)}</span></div>` : ''}
        <div class="vocab-result-meta">
          <span><b>Chapter:</b> ${UI.escapeHtml(v.chapterTitle)}</span>
        </div>
        <div class="subtle" style="margin-top:8px;font-size:13px;font-style:italic;">From: "${UI.escapeHtml(v.qText)}"</div>
      `;
      resultsHolder.appendChild(card);
    });
  }

  input.addEventListener('input', () => renderResults(input.value));
  renderResults('');
  setTimeout(() => input.focus(), 50);

  return wrap;
};


/* ==========================================================================
   SCREENS — Analytics (vanilla canvas charts, no external libraries)
   ========================================================================== */

Screens.analytics = function() {
  const wrap = UI.el('div');

  const back = UI.el('button', 'back-link', `${ICONS.back} Back to dashboard`);
  back.onclick = () => App.navigate('dashboard');
  wrap.appendChild(back);

  wrap.appendChild(UI.el('div', 'h1', 'Analytics'));
  wrap.appendChild(UI.el('div', 'subtle', 'Your performance breakdown across chapters and over time.'));
  wrap.appendChild(UI.el('div', 'divider'));

  const overall = Stats.overall();
  const rankInfo = Rank.progressWithinRank(overall.accuracy);
  const breakdown = Stats.chapterBreakdown();
  const bookmarkCount = Stats.bookmarkCount();
  const wrongCount = Stats.wrongQuestionIds().length;

  // ---- top summary tiles ----
  const summaryGrid = UI.el('div', 'stats-grid');
  summaryGrid.innerHTML = `
    <div class="stat-tile accent"><div class="num">${overall.accuracy}%</div><div class="lbl">Overall Accuracy</div></div>
    <div class="stat-tile"><div class="num">${rankInfo.name}</div><div class="lbl">Current Rank</div></div>
    <div class="stat-tile"><div class="num">${overall.attempted}</div><div class="lbl">Attempted</div></div>
    <div class="stat-tile"><div class="num">${bookmarkCount}</div><div class="lbl">Bookmarks</div></div>
    <div class="stat-tile wrong"><div class="num">${wrongCount}</div><div class="lbl">Wrong Questions</div></div>
    <div class="stat-tile"><div class="num">${breakdown.length}</div><div class="lbl">Chapters Touched</div></div>
  `;
  wrap.appendChild(summaryGrid);
  wrap.appendChild(UI.el('div', 'divider'));

  if (breakdown.length === 0) {
    const empty = UI.el('div', 'empty-state');
    empty.innerHTML = `${ICONS.chartBar}<div class="h2">No data yet</div><div class="subtle">Start practicing to see your analytics here.</div>`;
    wrap.appendChild(empty);
    return wrap;
  }

  // ---- Chapter Accuracy (canvas bar chart) ----
  const accSection = UI.el('div', 'analytics-section card card-pad');
  accSection.innerHTML = `<div class="section-title">Chapter Accuracy</div>`;
  const accCanvas = document.createElement('canvas');
  accCanvas.className = 'analytics-canvas';
  accCanvas.height = Math.max(160, breakdown.length * 34);
  accSection.appendChild(accCanvas);
  wrap.appendChild(accSection);

  // ---- Most Incorrect Chapters ----
  const incorrectSorted = breakdown.slice().sort((a, b) => b.wrong - a.wrong).slice(0, 8);
  const incSection = UI.el('div', 'analytics-section card card-pad');
  incSection.innerHTML = `<div class="section-title">Most Incorrect Chapters</div>`;
  incorrectSorted.forEach(row => {
    incSection.appendChild(buildBarRow(row.title, row.wrong, Math.max(...incorrectSorted.map(r => r.wrong), 1), 'var(--wrong)'));
  });
  wrap.appendChild(incSection);

  // ---- Most Attempted Chapters ----
  const attemptedSorted = breakdown.slice().sort((a, b) => b.attempted - a.attempted).slice(0, 8);
  const attSection = UI.el('div', 'analytics-section card card-pad');
  attSection.innerHTML = `<div class="section-title">Most Attempted Chapters</div>`;
  attemptedSorted.forEach(row => {
    attSection.appendChild(buildBarRow(row.title, row.attempted, Math.max(...attemptedSorted.map(r => r.attempted), 1), 'var(--accent)'));
  });
  wrap.appendChild(attSection);

  // ---- Rank Progress ----
  const rankSection = UI.el('div', 'analytics-section card card-pad');
  rankSection.innerHTML = `<div class="section-title">Rank Progress</div>`;
  const rankCanvas = document.createElement('canvas');
  rankCanvas.className = 'analytics-canvas';
  rankCanvas.height = 90;
  rankSection.appendChild(rankCanvas);
  wrap.appendChild(rankSection);

  // Defer canvas drawing until elements are attached & sized
  requestAnimationFrame(() => {
    drawBarChart(accCanvas, breakdown.map(r => ({ label: r.title, value: r.accuracy })), { max: 100, suffix: '%', color: getCss('--accent') });
    drawRankProgress(rankCanvas, Rank.thresholds, overall.accuracy);
  });

  return wrap;
};

function buildBarRow(label, value, max, color) {
  const row = UI.el('div', 'bar-chart-row');
  const pct = max > 0 ? (value / max) * 100 : 0;
  row.innerHTML = `
    <div class="bar-chart-label" title="${UI.escapeHtml(label)}">${UI.escapeHtml(label)}</div>
    <div class="bar-chart-track"><div class="bar-chart-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bar-chart-val">${value}</div>
  `;
  return row;
}

function getCss(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

/* Vanilla canvas horizontal bar chart, DPI-aware, redraws cleanly on theme change
   since it's re-invoked every render() call. */
function drawBarChart(canvas, data, opts = {}) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const width = rect.width || canvas.parentElement.clientWidth;
  const rowH = 30;
  const height = Math.max(opts.heightOverride || data.length * rowH + 10, 60);
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.height = height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, width, height);

  const max = opts.max || Math.max(...data.map(d => d.value), 1);
  const labelW = Math.min(150, width * 0.32);
  const barAreaW = width - labelW - 50;
  const ink = getCss('--ink');
  const inkSoft = getCss('--ink-soft');
  const track = getCss('--accent-pale');
  const color = opts.color || getCss('--accent');

  ctx.font = '12px Lexend, sans-serif';
  ctx.textBaseline = 'middle';

  data.forEach((d, i) => {
    const y = i * rowH + rowH / 2 + 5;
    // label
    ctx.fillStyle = inkSoft;
    ctx.textAlign = 'left';
    let label = d.label;
    // truncate label to fit
    while (ctx.measureText(label).width > labelW - 8 && label.length > 3) {
      label = label.slice(0, -2);
    }
    if (label !== d.label) label = label.slice(0, -1) + '…';
    ctx.fillText(label, 0, y);

    // track
    ctx.fillStyle = track;
    roundRect(ctx, labelW, y - 8, barAreaW, 16, 4);
    ctx.fill();

    // fill
    const w = Math.max(2, (d.value / max) * barAreaW);
    ctx.fillStyle = color;
    roundRect(ctx, labelW, y - 8, w, 16, 4);
    ctx.fill();

    // value label
    ctx.fillStyle = ink;
    ctx.textAlign = 'left';
    ctx.fillText(`${d.value}${opts.suffix || ''}`, labelW + barAreaW + 8, y);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* Draws the 5-band rank ladder with a marker at the user's current accuracy. */
function drawRankProgress(canvas, thresholds, accuracy) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const width = rect.width || canvas.parentElement.clientWidth;
  const height = 80;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.height = height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, width, height);

  const trackY = 38;
  const trackH = 14;
  const colors = ['#C7C2B6', '#D8A6A6', '#E0C27A', '#9DBF9E', '#5C9270'];
  const accentColor = getCss('--accent');
  const ink = getCss('--ink');
  const inkFaint = getCss('--ink-faint');

  thresholds.forEach((t, i) => {
    const x1 = (t.min / 100) * width;
    const x2 = (Math.min(t.max, 100) / 100) * width;
    ctx.fillStyle = colors[i] || accentColor;
    ctx.fillRect(x1, trackY, Math.max(1, x2 - x1), trackH);

    ctx.fillStyle = inkFaint;
    ctx.font = '10px Lexend, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(t.name, x1 + 3, trackY + trackH + 14);
  });

  // marker
  const markerX = Math.max(2, Math.min(width - 2, (accuracy / 100) * width));
  ctx.fillStyle = ink;
  ctx.beginPath();
  ctx.moveTo(markerX, trackY - 14);
  ctx.lineTo(markerX - 6, trackY - 4);
  ctx.lineTo(markerX + 6, trackY - 4);
  ctx.closePath();
  ctx.fill();
  ctx.font = 'bold 11px Lexend, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${accuracy}%`, markerX, trackY - 18);
}


window.addEventListener('DOMContentLoaded', () => {
  App.init();
});
