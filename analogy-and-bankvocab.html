gue/ambiguous speech","synonyms":"Vagueness"},{"word":"Platitude","meaning":"A cliché remark","synonyms":"Cliché"},{"word":"Banal","meaning":"Commonplace, trite","synonyms":"Commonplace"},{"word":"Peremptory","meaning":"Final, not open to question","synonyms":"-"}]},{"id":"ana-C2Q9","q":"VOLATILE : TEMPER","opts":{"A":"prominent : notoriety","B":"ready : wait","C":"catastrophic : disaster","D":"gentle : heart","E":"expressive : song"},"ans":"C","exp":"Relationship: Adjective : Noun (Defining Characteristic). The first word describes an extreme state of the second. Verification sentence: 'A volatile person has an unpredictable temper.' Logic: Just as 'volatile' expresses an intense and negative form of temper, 'catastrophic' expresses the intensity/severity of a disaster. Option elimination: (A) prominent : notoriety - being prominent doesn't necessarily mean having notoriety; these can be opposites. (B) ready : wait are two different states. (D) gentle : heart - a heart may be gentle, but this isn't an extreme defined state like 'volatile temper.' (E) expressive : song - a song may be expressive, but this doesn't denote an intense or negative type. Tip: This kind of analogy is called 'Degree of Intensity' or 'Characteristic Adjective' - when the first word expresses a special quality or intensity of the second, look for the same intensity in the answer.","src":"-","vocab":[{"word":"Volatile","meaning":"Unpredictable, explosive","synonyms":"Unpredictable"},{"word":"Catastrophic","meaning":"Disastrous, ruinous","synonyms":"Disastrous"},{"word":"Notoriety","meaning":"Being famous for something bad","synonyms":"-"}]},{"id":"ana-C2Q10","q":"SURGEON : DEXTERITY","opts":{"A":"engineer : clarity","B":"sailor : navigation","C":"magistrate : precedent","D":"industrial : capital","E":"acrobat : agility"},"ans":"E","exp":"Relationship: Professional : Essential Quality. Verification sentence: 'A surgeon must possess dexterity to perform their job effectively.' Logic: Just as a surgeon needs manual dexterity, an acrobat needs agility (nimbleness). Option elimination: (A) engineer : clarity - clarity may be needed, but it isn't a specialized physical skill like dexterity. (B) sailor : navigation - navigation is a sailor's task/subject, not a personal 'quality.' (C) magistrate : precedent - a magistrate follows precedent when ruling, but this isn't their professional characteristic quality. (D) industrial : capital relates industry to capital, unrelated to a profession. Tip: Note whether the second word is an action or a quality. If it's a quality, the answer should also pair a profession with a quality.","src":"-","vocab":[{"word":"Dexterity","meaning":"Skill in using the hands","synonyms":"-"},{"word":"Acrobat","meaning":"A performer of physical feats","synonyms":"-"},{"word":"Agility","meaning":"Nimbleness","synonyms":"Nimbleness"},{"word":"Precedent","meaning":"A prior ruling/example","synonyms":"-"}]},{"id":"ana-C2Q11","q":"PRUNE : HEDGE","opts":{"A":"shuck : corn","B":"trim : hair","C":"cut : bouquet","D":"reap : crop","E":"shave : mustache"},"ans":"B","exp":"Relationship: Action : Object (Grooming/Maintenance). Verification sentence: 'One must prune a hedge to keep it neat and well-groomed.' Logic: The first word is an action to trim the second object to keep it neat/well-groomed. Just as a hedge is trimmed to stay neat, hair, once it grows long, is trimmed to keep it tidy. Nothing is destroyed entirely - the surplus part is removed for the sake of appearance. Option elimination: (A) shuck : corn - shucking corn (removing the husk) makes it edible, not groomed for appearance. (C) cut : bouquet - flowers aren't cut FROM a bouquet; rather flowers are cut TO make a bouquet. (D) reap : crop - reaping means harvesting the crop, not a grooming/trimming process. (E) shave : mustache could fit superficially, but isn't the closest grooming-trim match. Tip: Word order/sequence matters a great deal in this kind of analogy.","src":"Bank ASIA-2017","vocab":[{"word":"Prune","meaning":"To trim/lop branches","synonyms":"Trim, Lop"},{"word":"Hedge","meaning":"A fence of bushes","synonyms":"-"},{"word":"Shuck","meaning":"To remove a husk","synonyms":"-"},{"word":"Reap","meaning":"To harvest","synonyms":"Harvest"}]},{"id":"ana-C2Q12","q":"PHOTOGRAPH : LIGHT","opts":{"A":"script : scene","B":"film : negative","C":"recording : sound","D":"rehearsal : sound","E":"concert : song"},"ans":"C","exp":"Relationship: Product : Essential Medium/Input. Verification sentence: 'A photograph is a captured representation of light.' Logic: Just as a photograph cannot be captured without light, a recording cannot be made without sound. Light is photography's raw material; sound is recording's raw material. Option elimination: (A) script : scene - a script helps create a scene, but a scene isn't the raw material stored in a script. (B) film : negative - film and negative are complementary parts of each other, but a negative isn't a 'natural medium.' (D) rehearsal : sound - rehearsal is a practice process, not a permanent recording/storage medium. (E) concert : song - a song is performed at a concert, but a song isn't raw material, it's an artistic creation. Tip: When dealing with a 'Technological Product' or when the first word denotes 'stored information,' check whether the second word is the 'source' of that information.","src":"-","vocab":[{"word":"Recording","meaning":"A captured audio/video","synonyms":"-"},{"word":"Negative","meaning":"The reversed image on film","synonyms":"-"},{"word":"Rehearsal","meaning":"A practice session","synonyms":"-"}]},{"id":"ana-C2Q13","q":"ANTIBIOTIC : INFECTION","opts":{"A":"hormone : modification","B":"enzyme : digestion","C":"narcotic : dependency","D":"coagulant : bleeding","E":"stimulant : relaxation"},"ans":"D","exp":"Relationship: Remedy : Negative Condition. Verification sentence: 'An antibiotic is used to stop or counteract an infection.' Logic: Just as an antibiotic halts infection, a coagulant helps stop bleeding by clotting blood. Option elimination: (A) hormone : modification - hormones bring change in the body, this isn't a 'remedy for a problem' relationship. (B) enzyme : digestion - an enzyme aids digestion, a normal physiological process, not a problem-removal. (C) narcotic : dependency - narcotics create dependency; this is cause-effect, not a cure. (E) stimulant : relaxation - a stimulant makes one alert, not relaxed; this is an oppositional relationship. Tip: When a medicine or chemical name appears, check whether it 'helps/promotes' the second word or 'blocks/counteracts' it. Since 'antibiotic' blocks infection, the answer should also be a blocking pair.","src":"-","vocab":[{"word":"Coagulant","meaning":"An agent that clots blood","synonyms":"-"},{"word":"Bleeding","meaning":"Loss of blood","synonyms":"-"},{"word":"Dependency","meaning":"Reliance/addiction","synonyms":"-"}]},{"id":"ana-C2Q14","q":"EULOGY : PRAISE","opts":{"A":"comedy : laughter","B":"epic : contempt","C":"tirade : awe","D":"elegy : lament","E":"parody : respect"},"ans":"D","exp":"Relationship: Genre : Purpose/Content. The first word is a type of writing, and the second is the core emotion expressed through it. Verification sentence: 'The purpose of a eulogy is to express praise for someone.' Logic: Just as a eulogy is an expression of praise, an elegy is an expression of lament/grief (often for the dead). Option elimination: (A) comedy : laughter - comedy causes laughter (an effect/reaction), but laughter itself isn't comedy's content; that's 'humor.' This is Product : Reaction. (B) epic : contempt - epics are usually about heroism, not contempt. (C) tirade : awe - a tirade is never meant to inspire awe/reverence; this is oppositional. (E) parody : respect - parody is done for comic/mocking effect, not to show respect. Tip: For literature/art-related analogies, always check whether the first word denotes a 'type of writing,' and whether the second word must be that writing's 'core emotion' or subject matter.","src":"-","vocab":[{"word":"Eulogy","meaning":"A speech of high praise","synonyms":"-"},{"word":"Elegy","meaning":"A poem of mourning/lament","synonyms":"-"},{"word":"Lament","meaning":"An expression of grief","synonyms":"-"},{"word":"Tirade","meaning":"A long angry critical speech","synonyms":"-"}]},{"id":"ana-C2Q15","q":"DAMP : VIBRATION","opts":{"A":"drench : moisture","B":"concentrate : extraction","C":"boil : liquid","D":"seal : perforation","E":"stanch : flow"},"ans":"E","exp":"Relationship: Action : Object of Restriction. Verification sentence: 'To damp is to reduce or stop the intensity of vibration.' Logic: Just as stopping/reducing vibration is called damping, stopping the flow of a liquid is called stanching. In both, the first action restricts the second from continuing or increasing. Option elimination: (A) drench : moisture - drenching means soaking with moisture, an increase relationship, not a decrease. (B) concentrate : extraction - concentrating is done to gather an extract; this is a processing relationship. (C) boil : liquid - boiling a liquid isn't an act of stopping it. (D) seal : perforation - sealing closes a perforation, which is close but more about closing a hole than specifically stopping a 'flow.' Stanch is the more fitting word for liquid flow specifically. Tip: This kind of analogy is called 'Checking or Stopping an Action.' Check whether the Verb 'starts' or 'stops/ends' the Noun.","src":"-","vocab":[{"word":"Stanch","meaning":"To stop the flow of liquid","synonyms":"-"},{"word":"Perforation","meaning":"A hole/puncture","synonyms":"-"},{"word":"Drench","meaning":"To soak thoroughly","synonyms":"-"}]},{"id":"ana-C2Q16","q":"ABRADED : FRICTION","opts":{"A":"refined : distillate","B":"anodized : metal","C":"diluted : gas","D":"strengthened : pressure","E":"vaporized : heat"},"ans":"E","exp":"Relationship: Effect : Cause. Verification sentence: 'Something becomes abraded as a result of friction.' Logic: Just as friction causes abrasion (wearing away), heat causes vaporization. Option elimination: (A) refined : distillate - refining happens through distillation, but 'distillate' is itself a result/product, not a 'cause.' (B) anodized : metal - metal is anodized, but metal isn't a process or cause. (C) diluted : gas - dilution is typically done with liquid, not gas. (D) strengthened : pressure - applying pressure doesn't always strengthen something; it can also break or compress it. Tip: This type of analogy is called 'Cause and Effect.' Notice that both the question and the correct answer (E) describe a physical change.","src":"JnU-E Unit (BBA) 2015-2016","vocab":[{"word":"Abraded","meaning":"Worn away by friction","synonyms":"-"},{"word":"Vaporized","meaning":"Turned into vapor","synonyms":"-"},{"word":"Anodized","meaning":"Electrolytically coated metal","synonyms":"-"}]},{"id":"ana-C2Q17","q":"QUARRY : STONE","opts":{"A":"fell : timber","B":"dredge : canal","C":"assay : gold","D":"bale : hay","E":"mold : clay"},"ans":"A","exp":"Relationship: Action : Object (Extraction of Resource). Verification sentence: 'To quarry is to extract stone from its natural source.' Logic: Just as stone is cut and extracted from a quarry, cutting down trees from a forest for wood/timber is called felling. In both, the first action is the primary step of directly extracting the second natural resource from its source. Option elimination: (B) dredge : canal - dredging a canal is done to clean or deepen it, not to extract a resource like stone. (C) assay : gold - this is the process of testing gold's purity, not extracting it from a mine. (D) bale : hay - hay is baled after it's already been cut; this is a step after collection, not the primary extraction act. (E) mold : clay - molding gives clay shape; this is a transformation action, not a collection-from-source action. Tip: When a natural resource (e.g., Stone, Timber, Coal) appears, check whether the first word is the primary method of 'collecting' it. Questions like 'Mine : Coal' or 'Extract : Oil' follow the same logic in BCS exams.","src":"-","vocab":[{"word":"Quarry","meaning":"To extract stone from a pit","synonyms":"-"},{"word":"Fell","meaning":"To cut down a tree","synonyms":"-"},{"word":"Timber","meaning":"Wood for construction","synonyms":"-"},{"word":"Dredge","meaning":"To clear out a channel","synonyms":"-"},{"word":"Assay","meaning":"To test purity of a metal","synonyms":"-"}]},{"id":"ana-C2Q18","q":"CREDULOUS : DUPE","opts":{"A":"wealthy : monarch","B":"insensitive : boor","C":"argumentative : lawyer","D":"spontaneous : extrovert","E":"extravagant : miser"},"ans":"B","exp":"Relationship: Characteristic : Person (Defining Trait). The first word is an adjective expressing the defining characteristic trait of the second person/noun. Verification sentence: 'A credulous person is easily made a dupe.' Logic: Just as 'credulous' is a defining trait of someone who becomes a dupe, 'insensitive' is the defining trait of someone called a boor (a rude/ill-mannered person). A person who isn't sensitive to others' feelings or social etiquette is called a boor. Option elimination: (A) wealthy : monarch - a monarch may be wealthy, but that isn't their sole or primary defining trait; their primary identity is power/rule. (C) argumentative : lawyer - not all lawyers are argumentative, and this isn't a negative defining trait either. (D) spontaneous : extrovert - an extrovert may be spontaneous, but this doesn't express any defining weakness/flaw like the credulous-dupe pair. (E) extravagant : miser are mutual opposites; a miser is never extravagant. Tip: When a person (noun) is referenced in an analogy, check whether the first word is some 'flaw' or 'quality' of that person. Questions like 'Liar : Mendacious' or 'Glutton : Greedy' follow this same logic in BCS exams.","src":"-","vocab":[{"word":"Credulous","meaning":"Gullible, overly trusting","synonyms":"Gullible"},{"word":"Dupe","meaning":"A victim of deception","synonyms":"-"},{"word":"Insensitive","meaning":"Callous, unfeeling","synonyms":"Callous"},{"word":"Boor","meaning":"A rude/ill-mannered person","synonyms":"-"}]}]},{"id":"ana-3","title":"GRE Analogy Test-3","questions":[{"id":"ana-C3Q1","q":"ANIMAL : CAT","opts":{"A":"apple : pear","B":"club : player","C":"furniture : chair","D":"landscape : tree","E":"body : toe"},"ans":"C","exp":"Relationship: General Category : Specific Example. Verification sentence: 'A cat is a specific type of animal.' Logic: Just as a cat is one member of the broad animal kingdom, a chair is a specific member of the furniture category. In both, the first word denotes a larger group, and the second word is an example/member of that group. Option elimination: (A) apple : pear - both are fruits; this is Example : Example (co-members of a category), not Category : Example. (B) club : player is an Organization : Member relationship, i.e., a membership relationship. (D) landscape : tree - trees exist within a landscape, but a tree isn't a 'type' of landscape; this is contextual. (E) body : toe is a Whole : Part relationship (body parts/organs). Tip: This type of analogy is called 'Class and Member.' Check whether the second word is a 'type' of the first word.","src":"-","vocab":[{"word":"Furniture","meaning":"Movable household items","synonyms":"-"}]},{"id":"ana-C3Q2","q":"CURTAIN : STAGE","opts":{"A":"footlight : orchestra","B":"lid : jar","C":"upholstery : sofa","D":"veil : face","E":"screen : film"},"ans":"D","exp":"Relationship: Object : Object Covered (Protective/Concealing Cover). The first word is used to cover or conceal the second object. Verification sentence: 'A curtain is used to cover or conceal a stage.' Logic: Just as a curtain hides the stage, a veil hides the face. In both, the first object is used to fully or partially cover the second. Option elimination: (A) footlight : orchestra - footlights are at the front of a stage, but they don't hide the orchestra; they're a light source. (B) lid : jar - a lid is mainly used to seal a jar (preserve contents), not merely to conceal it like a curtain. (C) upholstery : sofa - upholstery is the sofa's permanent padding/covering, not something temporarily opened/closed like a curtain. (E) screen : film - a film is displayed ON a screen; the screen doesn't hide the film, it's a Medium : Content relationship. Tip: This kind of analogy is called 'Functional Covering.' Note that both curtain and veil are designed to be easily opened or closed, with the main purpose of keeping something out of view.","src":"-","vocab":[{"word":"Veil","meaning":"A covering for the face","synonyms":"-"},{"word":"Upholstery","meaning":"Padding/covering of furniture","synonyms":"-"},{"word":"Footlight","meaning":"Stage-front lighting","synonyms":"-"}]},{"id":"ana-C3Q3","q":"INSOMNIA : SLEEP","opts":{"A":"dyslexia : read","B":"hemophilia : bleed","C":"hyperactivity : move","D":"paranoia : hallucinate","E":"malnutrition : eat"},"ans":"A","exp":"Relationship: Condition : Lack of Ability/Function. Verification sentence: 'A person with insomnia is unable to sleep normally.' Logic: Just as insomnia is a deficiency/problem in the ability to sleep, dyslexia is a deficiency/problem in the ability to read normally. Option elimination: (B) hemophilia : bleed - hemophilia doesn't stop bleeding, it increases it; this is the opposite of a 'lack,' it's more about 'lack of control' or 'increase.' (C) hyperactivity : move - hyperactive people move much more, not a 'lack of ability' relationship. (D) paranoia : hallucinate - paranoia is a mental state of suspicion; hallucination isn't its necessary absence. (E) malnutrition : eat - malnutrition isn't always caused by not eating; rather it's a lack of proper nutrition, not a specific 'Functional Disability' like insomnia's relation to sleep. Tip: This type of analogy is called 'Disorder and Affected Function.' Check whether the first word makes the second word impossible or hindered - if yes, that's the correct answer.","src":"-","vocab":[{"word":"Insomnia","meaning":"Inability to sleep","synonyms":"-"},{"word":"Dyslexia","meaning":"A reading-related learning disorder","synonyms":"-"},{"word":"Hemophilia","meaning":"A blood-clotting disorder","synonyms":"-"},{"word":"Malnutrition","meaning":"Poor nutrition","synonyms":"-"}]},{"id":"ana-C3Q4","q":"JEER : DERISION","opts":{"A":"fidget : restraint","B":"cower : menace","C":"slouch : vigilance","D":"Reprimand : Censure","E":"frown : adversity"},"ans":"D","exp":"Relationship: Action : Purpose/Expression. The first word is an outward action, and the second is the core emotion/intent expressed through it. Verification sentence: 'A jeer is an outward expression of derision.' Logic: Just as jeering means mocking someone (an expression of derision), reprimanding someone means censuring (harshly criticizing/blaming) them. The first action is a direct and formal manifestation of the second feeling. Option elimination: (A) fidget : restraint - fidgeting is a sign of a LACK of restraint, it doesn't express restraint. (B) cower : menace - when someone cowers from fear, that expresses fear itself, not menace (threat) - cowering is the response to a menace, not an expression of it. (C) slouch : vigilance - slouching is a sign of carelessness, the opposite of vigilance. (E) frown : adversity - frowning may express anger, but it isn't necessarily an expression of a state called 'adversity.' Tip: This type of analogy is called 'Action and its Intent.' Check whether the two words are nearly synonymous in pattern.","src":"-","vocab":[{"word":"Jeer","meaning":"A mocking remark","synonyms":"Mocking"},{"word":"Derision","meaning":"Contemptuous ridicule","synonyms":"-"},{"word":"Reprimand","meaning":"A formal expression of disapproval","synonyms":"-"},{"word":"Censure","meaning":"Strong expression of disapproval","synonyms":"-"}]},{"id":"ana-C3Q5","q":"HUMILITY : SUPPLICANT","opts":{"A":"espionage : felon","B":"dilettantism : connoisseur","C":"dogmatism : scholar","D":"gregariousness : teammate","E":"resistance : adversary"},"ans":"E","exp":"Relationship: Characteristic : Person (Defining Trait). The first word is a special quality, and the second denotes a person for whom having this quality is essential or defines their identity. Verification sentence: 'A supplicant is characterized by humility.' Logic: Just as humility is necessary/defining for a supplicant (one who pleads), resistance (opposition) is the defining trait/action of an adversary (opponent). Option elimination: (A) espionage : felon - a felon may commit espionage, but this isn't their defining characteristic trait; it's one type of crime among others. (B) dilettantism : connoisseur is completely opposite - a connoisseur is never an amateur (dilettante); they are an expert. (C) dogmatism : scholar - a scholar is usually rational; dogmatism (stubborn close-mindedness) can't be their defining positive trait. (D) gregariousness : teammate - a teammate may be sociable, but this isn't their only or primary defining trait; whereas an adversary's defining job is always to offer resistance. Tip: It's essential to identify the 'Inherent Quality' in this type of analogy.","src":"-","vocab":[{"word":"Supplicant","meaning":"One who pleads/petitions","synonyms":"-"},{"word":"Adversary","meaning":"An opponent","synonyms":"Opponent"},{"word":"Dilettantism","meaning":"Superficial/amateur engagement","synonyms":"-"},{"word":"Connoisseur","meaning":"An expert/discerning judge","synonyms":"-"},{"word":"Dogmatism","meaning":"Stubborn assertion of opinion","synonyms":"-"},{"word":"Gregariousness","meaning":"Sociability","synonyms":"-"}]},{"id":"ana-C3Q6","q":"INTEREST : INVEIGLE","opts":{"A":"evaluate : suggest","B":"foresee : predict","C":"plan : scheme","D":"interpret : examine","E":"neglect : persecute"},"ans":"C","exp":"Relationship: Degree of Intensity / Negative Connotation. The second word is a deceptive or negative version of the first, ordinary action. Verification sentence: 'To inveigle is to interest someone using deception or flattery.' Logic: The relationship between Interest and Inveigle exists equally between Plan and Scheme. An ordinary plan is just a 'plan,' but when that plan is made dishonestly or secretly, it's called a 'scheme.' In both pairs, the second word expresses a 'dishonest' or 'negative' degree of the first. Option elimination: (A) evaluate : suggest may be a procedural relationship, but there's no deceptive element like 'inveigle' here. (B) foresee : predict both deal with predicting the future, and both carry a neutral/positive image. (D) interpret : examine - explaining and examining may complement each other, but neither carries a negative form. (E) neglect : persecute - neglecting something doesn't lead to persecution; these are two entirely separate negative actions. Tip: In analogies, first build the relationship type - synonym, antonym, cause-effect, degree, function - then options become quick to eliminate.","src":"-","vocab":[{"word":"Inveigle","meaning":"To entice/persuade through deception","synonyms":"-"},{"word":"Scheme","meaning":"A secret/dishonest plan","synonyms":"-"}]},{"id":"ana-C3Q7","q":"BARTER : COMMODITIES","opts":{"A":"arbitrate : suggest","B":"invade : boundaries","C":"debate : issues","D":"correspond : letters","E":"promote : ranks"},"ans":"D","exp":"Relationship: Action : Object (Exchange Medium). The first word is a process of exchange, and the second is the medium of that exchange. Verification sentence: 'To barter is to exchange commodities.' Logic: Just as bartering happens through exchanging commodities, communicating via exchanging letters is called corresponding. Option elimination: (A) arbitrate : suggest - arbitrating means resolving a dispute, not giving suggestions; this isn't an exchange relationship. (B) invade : boundaries - invading means crossing a boundary by force, not a medium of exchange. (C) debate : issues - debate happens over issues, but an issue isn't the 'object' or 'medium' of any exchange. (E) promote : ranks - promotion means an increase in rank, not an exchange of anything. Tip: This type of analogy is called 'Action and its Medium.' Barter = exchange of goods; Correspond = exchange of letters - once you grasp this 'exchange relation,' the answer comes easily.","src":"JnU-E Unit(BBA) 2015-16; Pubali Bank (SO)-2011; IBA-MBA Admission: 2001-02; RU EMBA-2007","vocab":[{"word":"Barter","meaning":"Exchange of goods","synonyms":"-"},{"word":"Correspond","meaning":"To exchange letters/communicate","synonyms":"-"},{"word":"Arbitrate","meaning":"To settle a dispute","synonyms":"-"}]},{"id":"ana-C3Q8","q":"PARRY : QUESTION","opts":{"A":"return : affection","B":"shirk : duty","C":"confront : dread","D":"hurl : insult","E":"surrender : temptation"},"ans":"B","exp":"Relationship: Action : Object (Avoidance of Responsibility/Directness). The first word is an action meaning to dodge or evade the second item. Verification sentence: 'To parry is to cleverly avoid answering a question.' Logic: Just as a question is dodged (parry), avoiding one's duty/responsibility is called shirking. Option elimination: (A) return : affection is about reciprocating, not avoiding. (C) confront : dread means directly facing something, which is the opposite of 'parry.' (D) hurl : insult means attacking someone, not avoiding anything. (E) surrender : temptation means giving in to something, i.e., accepting it, not avoiding it. Tip: This type of analogy is called 'Avoidance Relationship.' Notice that both parrying and shirking mean deviating or stepping away from a specific target or duty.","src":"-","vocab":[{"word":"Parry","meaning":"To deflect/evade cleverly","synonyms":"-"},{"word":"Shirk","meaning":"To avoid a duty","synonyms":"-"},{"word":"Hurl","meaning":"To throw forcefully","synonyms":"-"}]},{"id":"ana-C3Q9","q":"DISGUISE : IDENTIFICATION","opts":{"A":"equivocation : ambiguity","B":"façade : decoration","C":"forgery : wealth","D":"camouflage : detection","E":"manipulation : advantage"},"ans":"D","exp":"Relationship: Action/Object : Prevention of Discovery. Verification sentence: 'The purpose of a disguise is to prevent identification.' Logic: Just as a disguise is used to avoid identification, camouflage is used to avoid detection. The first word is a technique/disguise that blocks the second item (identification/detection). Option elimination: (A) equivocation : ambiguity - equivocal speech creates ambiguity, it doesn't block it; this is cause-effect. (B) façade : decoration - a façade may be part of decoration, but it doesn't block decoration. (C) forgery : wealth - forgery may be used to gain wealth, but forgery doesn't block wealth. (E) manipulation : advantage - manipulation is done to gain advantage, a purposive relationship, not a preventive one. Tip: This type of analogy is called 'Prevention Relationship.' Check whether the first word functions as an 'impenetrable wall' for the second word.","src":"-","vocab":[{"word":"Camouflage","meaning":"Concealment by blending in","synonyms":"-"},{"word":"Detection","meaning":"Discovery","synonyms":"Discovery"},{"word":"Façade","meaning":"An outward appearance/front","synonyms":"-"}]},{"id":"ana-C3Q10","q":"BIRD : FEATHERS","opts":{"A":"mammal : spine","B":"hand : fingers","C":"branch : fruit","D":"limb : fur","E":"fish : scales"},"ans":"E","exp":"Relationship: Organism : Outer Body Covering. Verification sentence: 'A bird is naturally covered with feathers.' Logic: Just as a bird's body covering is feathers, a fish's natural body covering is scales. In both cases, the second word protects the organism's skin and is a unique identifying characteristic of that organism. Option elimination: (A) mammal : spine - the spine is internal, not an outer 'covering.' (B) hand : fingers - fingers are a part (Part) of the hand, not a natural covering; this is Part-Whole. (C) branch : fruit - fruit grows on a branch, but isn't the branch's covering; this is a Production or Support relationship. (D) limb : fur - fur may exist on a limb, but fur is mainly the body covering of a mammal specifically, not a 'limb' as a category. Tip: This type of analogy is called 'Biological Anatomy' or 'Protective Covering.'","src":"DU-C Unit 2015-16; IBA-MBA Admission Test 2002-03; Pubali Bank-2005; IFIC Bank Ltd-2008","vocab":[{"word":"Scales","meaning":"Protective plates on fish skin","synonyms":"-"},{"word":"Spine","meaning":"Backbone","synonyms":"Backbone"}]},{"id":"ana-C3Q11","q":"ELBOW : JOINT","opts":{"A":"cell : tissue","B":"corpuscle : blood","C":"muscle : bone","D":"skull : skeleton","E":"heart : organ"},"ans":"E","exp":"Relationship: Specific Example : Category. Verification sentence: 'An elbow is a specific type of joint.' Logic: Just as elbow is an example of a joint, the heart is an example of a specific organ in the human body. In both, the first is a specific name and the second is its general category/identity. Option elimination: (A) cell : tissue - many cells together form a tissue; this is not a 'type' relationship but a 'structural component' relationship. (B) corpuscle : blood - a corpuscle is a component of blood, not a 'type of blood.' (C) muscle : bone - muscle and bone are two separate things that mechanically assist each other; there's no categorical similarity between them. (D) skull : skeleton - the skull is merely a part of the skeleton, but the skull itself isn't a 'skeleton'; this is Part-Whole. Tip: This type of analogy is called 'Class Membership.' When solving, check whether the question fits the logical format 'A is a type of B.'","src":"-","vocab":[{"word":"Joint","meaning":"A point where bones meet","synonyms":"-"},{"word":"Corpuscle","meaning":"A blood cell","synonyms":"-"}]},{"id":"ana-C3Q12","q":"ENDOW : INCOME","opts":{"A":"emit : signal","B":"endorse : approval","C":"enchant : magic","D":"embark : voyage","E":"endure : hardships"},"ans":"B","exp":"Relationship: Action : Result of Giving (To Provide/Give). Verification sentence: 'To endow someone is to provide them with an income.' Logic: Just as endowing someone gives them income, endorsing something means giving it your approval. In both cases, performing the first action transfers/effects the second item. Option elimination: (A) emit : signal - a machine may emit a signal, but this isn't a relationship of granting a lasting benefit/right like 'endow.' (C) enchant : magic - one is enchanted using magic; this is a Tool : Action relationship. (D) embark : voyage - to embark means to begin a voyage; this denotes the start of an action, not 'giving' something. (E) endure : hardships - enduring hardships means coping with a situation, not giving something. Tip: This type of analogy is called 'Action and its Consequence' or 'Granting Relationship.'","src":"-","vocab":[{"word":"Endow","meaning":"To provide income/a permanent benefit","synonyms":"-"},{"word":"Endorse","meaning":"To approve/support","synonyms":"-"},{"word":"Embark","meaning":"To begin a journey","synonyms":"-"}]},{"id":"ana-C3Q13","q":"BOMBAST : POMPOUS","opts":{"A":"prose : economical","B":"circumlocution : patient","C":"prattle : succinct","D":"verbiage : mundane","E":"tirade : critical"},"ans":"E","exp":"Relationship: Noun : Defining Adjective (Characteristic). Verification sentence: 'A bombast is characterized by being pompous.' Logic: Just as bombast is pompous (showy, grandiose speech), a tirade (a long, angry critical speech) is always critical. In both, the first noun is incomplete without the second defining quality. Option elimination: (A) prose : economical - prose isn't always economical/concise; it can be elaborate too. (B) circumlocution : patient - speaking in circumlocution (roundabout speech) isn't a patient act; it may actually irritate listeners. (C) prattle : succinct are contradictory; meaningless chatter (prattle) is never succinct (brief and meaningful). (D) verbiage : mundane - excessive wordiness may be tiresome, but it isn't necessarily 'mundane' (ordinary/dull). Tip: This type of analogy is called 'Characteristic Trait.' In vocabulary analogies, when the noun denotes some type of speech/behavior, look for that speech's characteristic adjective in the options.","src":"-","vocab":[{"word":"Bombast","meaning":"Pompous, high-sounding language","synonyms":"-"},{"word":"Tirade","meaning":"A long angry critical speech","synonyms":"-"},{"word":"Circumlocution","meaning":"Roundabout speech","synonyms":"-"},{"word":"Verbiage","meaning":"Excessive use of words","synonyms":"-"},{"word":"Succinct","meaning":"Brief and clear","synonyms":"-"}]},{"id":"ana-C3Q14","q":"CARET : INSERTION","opts":{"A":"pound : heaviness","B":"tongs : extraction","C":"comma : pause","D":"quotation : agreement","E":"clip : attachment"},"ans":"C","exp":"Relationship: Symbol : Symbol's Purpose/Function. Verification sentence: 'A caret is a symbol used to indicate an insertion.' Logic: Just as a caret is a sign to insert something, a comma is a sign for a brief pause in writing. In both, the first is a writing-style symbol and the second is that symbol's specific grammatical function. Option elimination: (A) pound : heaviness - a pound is a unit of weight, not a specific symbol or function relationship. (B) tongs : extraction - tongs are a physical tool for extracting something; a caret isn't a physical tool, it's a symbol. (D) quotation : agreement - quotation marks aren't a symbol of agreement; they're used to express someone's exact words. (E) clip : attachment - a clip is also a Physical Tool used for attachment, similar mismatch as tongs. Caret and comma are both abstract writing/punctuation symbols. Tip: This type of analogy is called 'Symbol and Significance.' If the first word is a punctuation mark/symbol, the answer should generally also be a punctuation mark/symbol.","src":"-","vocab":[{"word":"Caret","meaning":"A proofreading mark for insertion","synonyms":"-"},{"word":"Insertion","meaning":"Adding something in","synonyms":"-"},{"word":"Tongs","meaning":"A gripping tool","synonyms":"-"}]},{"id":"ana-C3Q15","q":"OPAQUE : LIGHT","opts":{"A":"inaudible : sound","B":"unbreakable : plastic","C":"reflective : mirror","D":"nonporous : liquid","E":"viscous : fluid"},"ans":"D","exp":"Relationship: Property : Barrier. Verification sentence: 'An opaque substance does not allow light to pass through it.' Logic: Just as opacity blocks light, being nonporous blocks a liquid from entering or seeping through. In both, the first word is a physical state that obstructs the flow of the second substance. Option elimination: (A) inaudible : sound - 'inaudible' refers to sound that cannot be heard, which is about the LIMIT of hearing ability, not a physical 'blocking' relationship of passing through something. (B) unbreakable : plastic may be a characteristic of plastic, but it doesn't block plastic from anything. (C) reflective : mirror - a mirror reflects light, it doesn't block/absorb it. (E) viscous : fluid - viscosity is a state of a liquid's thickness; it slows a liquid's flow but doesn't completely stop it. Tip: Whenever you see 'Opaque,' think 'does not allow to pass,' then look for that same pattern in the options.","src":"-","vocab":[{"word":"Nonporous","meaning":"Not having pores; impermeable","synonyms":"-"},{"word":"Viscous","meaning":"Thick, sticky (of a liquid)","synonyms":"-"},{"word":"Inaudible","meaning":"Cannot be heard","synonyms":"-"}]},{"id":"ana-C3Q16","q":"FEARLESS : DAUNT","opts":{"A":"perplexed : enlighten","B":"nondescript : neglect","C":"avaricious : motivate","D":"impassive : perturb","E":"tranquil : pacify"},"ans":"D","exp":"Relationship: Trait : Resistance to Action. Verification sentence: 'A person who is fearless cannot be daunted.' Logic: Just as a fearless person cannot be made to feel fear, someone impassive (emotionless/calm) cannot easily be perturbed (disturbed/upset). Option elimination: (A) perplexed : enlighten - someone confused (perplexed) CAN be enlightened to remove their confusion; this is a 'solution' relationship, not 'resistance.' (B) nondescript : neglect - it's easy to neglect something nondescript (lacking distinctive features); this doesn't block anything. (C) avaricious : motivate - it's easy to motivate a greedy person with some incentive; also not a resistance relationship. (E) tranquil : pacify - pacifying someone already tranquil (calm) is meaningless/redundant, a near-synonym action, not the 'cannot be affected' relationship we need. Tip: This type of analogy is called 'Incapability of being affected.' Check whether the first word is directly 'denying' or 'resisting' the second word's action.","src":"-","vocab":[{"word":"Daunt","meaning":"To intimidate/discourage","synonyms":"-"},{"word":"Impassive","meaning":"Showing no emotion, calm","synonyms":"-"},{"word":"Perturb","meaning":"To disturb/upset","synonyms":"-"}]},{"id":"ana-C3Q17","q":"QUERULOUS : COMPLAIN","opts":{"A":"humble : fawn","B":"prodigal : spend","C":"treacherous : trust","D":"laconic : talk","E":"culpable : blame"},"ans":"B","exp":"Relationship: Characteristic : Action (Habitual Behavior). Verification sentence: 'A querulous person is someone who tends to complain habitually.' Logic: Just as a querulous (constantly complaining) person habitually complains, a prodigal (wasteful/extravagant) person's defining action/habit is to spend lavishly. Option elimination: (A) humble : fawn - fawning (flattering) is a negative action that isn't the natural habit of a humble person. (C) treacherous : trust - a treacherous (deceitful) person BREAKS trust; this is an oppositional relationship. (D) laconic : talk - laconic means speaking very little, the opposite of the habitual action of 'talk.' (E) culpable : blame - someone culpable (guilty) is blamed BY OTHERS; blaming isn't their own habitual action, it's someone else's action toward them. Tip: This type of analogy is called 'Defining Action.'","src":"-","vocab":[{"word":"Querulous","meaning":"Habitually complaining","synonyms":"-"},{"word":"Prodigal","meaning":"Wastefully extravagant","synonyms":"-"},{"word":"Laconic","meaning":"Using few words","synonyms":"-"},{"word":"Culpable","meaning":"Deserving blame","synonyms":"-"}]}]},{"id":"ana-4","title":"GRE Analogy Test-4","questions":[{"id":"ana-C4Q1","q":"DRAWBRIDGE : CASTLE","opts":{"A":"lawn : house","B":"gangway : ship","C":"aisle : stage","D":"hallway : building","E":"sidewalk : garage"},"ans":"B","exp":"Relationship: Specific Entrance : Structure. Verification sentence: 'A drawbridge is the movable entrance used to board or enter a castle.' Logic: Just as a drawbridge is used to enter a castle, a gangway (a temporary stairway/path) is used to board a ship. Option elimination: (A) lawn : house - a lawn may be part of a house's grounds, but it isn't a means or bridge of entry. (C) aisle : stage - this is a path inside a theater; the specific entry relationship a drawbridge has with a castle is absent here. (D) hallway : building - a hallway is the inside walkway of a building, not a special or temporary entry structure like a drawbridge. (E) sidewalk : garage - you don't enter a garage via a sidewalk; it's simply a walking path beside a road. Tip: This type of analogy is called 'Specific Access Way.'","src":"-","vocab":[{"word":"Drawbridge","meaning":"A bridge that can be raised/lowered","synonyms":"-"},{"word":"Gangway","meaning":"A passage for boarding a ship","synonyms":"-"},{"word":"Aisle","meaning":"A walkway between seating rows","synonyms":"-"}]},{"id":"ana-C4Q2","q":"INSULIN : PANCREAS","opts":{"A":"bile : liver","B":"menthol : eucalyptus","C":"oxygen : heart","D":"honey : bee","E":"vanilla : bean"},"ans":"A","exp":"Relationship: Secretion : Organ. Verification sentence: 'Insulin is secreted by the pancreas.' Logic: Just as insulin is produced by the pancreas, bile is secreted by the liver. Option elimination: (B) menthol : eucalyptus - menthol is usually obtained from peppermint, and this also isn't a relationship of a human organ and its secretion. (C) oxygen : heart - the heart doesn't produce oxygen; rather it pumps oxygenated blood. (D) honey : bee - a bee produces honey, but a bee isn't an 'organ,' it's an entire organism. (E) vanilla : bean - vanilla comes from a vanilla bean, a plant product, not a physiological secretion. Tip: This type of analogy is called 'Source and Product' or 'Biological Secretion.'","src":"-","vocab":[{"word":"Bile","meaning":"A digestive fluid from the liver","synonyms":"-"},{"word":"Pancreas","meaning":"An organ producing insulin","synonyms":"-"}]},{"id":"ana-C4Q3","q":"EAGLE : TALON","opts":{"A":"fang : snake","B":"hoof : horse","C":"quill : porcupine","D":"tusk : elephant","E":"claw : panther"},"ans":"E","exp":"Relationship: Animal : Predatory Body Part. Verification sentence: 'An eagle uses its talons to catch its prey.' Logic: Just as an eagle has talons, a panther (a predatory cat) has sharp claws on its paws for hunting. In both, the first is a predatory animal and the second is its primary offensive/hunting body part. Option elimination: (A) fang : snake - a snake does have fangs, but here the order is reversed (body part first, animal second), unlike the original sequence (animal first, body part second). (B) hoof : horse - a horse's hoof isn't a predatory or offensive organ; it's used for movement. (C) quill : porcupine - a porcupine's quills are mainly used for defense, not for hunting prey. (D) tusk : elephant - an elephant's tusk isn't a predatory claw. Tip: This type of analogy is called 'Specialized Anatomy.' Check whether the animal is a 'predator' - if yes, look for a predatory animal and its claw/fang in the answer too.","src":"-","vocab":[{"word":"Talon","meaning":"A bird of prey's sharp claw","synonyms":"-"},{"word":"Quill","meaning":"A porcupine's spine","synonyms":"-"},{"word":"Tusk","meaning":"A long pointed tooth","synonyms":"-"}]},{"id":"ana-C4Q4","q":"ARTICULATE : CLEARLY","opts":{"A":"orate : strongly","B":"shout : loudly","C":"lecture : willfully","D":"malign : incoherently","E":"jest : belligerently"},"ans":"B","exp":"Relationship: Action : Manner. Verification sentence: 'To articulate is to speak clearly.' Logic: Just as the inherent manner of articulating is clarity, the inherent and essential manner of shouting is loudness. Option elimination: (A) orate : strongly - delivering a speech (orate) isn't always 'strongly'; it can be emotional or calm too. (C) lecture : willfully - giving a lecture may be willful/intentional, but this isn't the lecturer's inherent manner/method. (D) malign : incoherently - maligning (defaming) someone isn't done incoherently; defamation is usually quite deliberate and coherent. (E) jest : belligerently - jesting (joking) is never done in a hostile/belligerent manner; it's done playfully. Tip: This type of analogy is called 'Definition or Synonymous Manner.' Check whether the second word is part of the first word's definition or core characteristic.","src":"IBA-MBA Admission Test-2001-02","vocab":[{"word":"Articulate","meaning":"To express clearly","synonyms":"-"},{"word":"Malign","meaning":"To speak ill of/defame","synonyms":"-"},{"word":"Belligerently","meaning":"In a hostile manner","synonyms":"-"}]},{"id":"ana-C4Q5","q":"NUANCE : DISTINCTION","opts":{"A":"remnant : preservation","B":"shade : spectrum","C":"hint : suggestion","D":"trace : existence","E":"splinter : disintegration"},"ans":"C","exp":"Relationship: Degree of Intensity. Verification sentence: 'A nuance is a subtle or slight distinction.' Logic: Just as a nuance is a subtle distinction, a hint is a subtle or indirect suggestion. In both, the first word expresses a faint or preliminary degree of the second word. Option elimination: (A) remnant : preservation - a remnant may exist because of preservation, but this isn't a relationship of subtlety. (B) shade : spectrum - shade is a Part : Whole of the spectrum, not a subtle form of intensity. (D) trace : existence - a trace is evidence OF existence; this is an 'Evidence' relationship. (E) splinter : disintegration - a splinter is produced AS A RESULT of disintegration (breaking); this is a 'Result' relationship. Tip: This type of analogy is called 'Subtle Form' or 'Diminutive Relationship.' Check whether the first word is a 'lighter' or 'smaller' version of the second: subtle distinction = nuance; subtle suggestion = hint.","src":"-","vocab":[{"word":"Nuance","meaning":"A subtle distinction","synonyms":"-"},{"word":"Splinter","meaning":"A small broken fragment","synonyms":"-"},{"word":"Disintegration","meaning":"Breaking apart","synonyms":"-"}]},{"id":"ana-C4Q6","q":"URBANE : GAUCHERIE","opts":{"A":"confident : coterie","B":"calculating : imposture","C":"diffident : goodwill","D":"fearful : destruction","E":"guileless : chicanery"},"ans":"E","exp":"Relationship: Trait : Lack of Quality (Opposite Characteristic). Verification sentence: 'An urbane person is characterized by a lack of gaucherie.' Logic: Just as a refined (urbane) person lacks awkwardness (gaucherie), a guileless (sincere/innocent) person lacks chicanery (deceit/trickery). In both, the first quality directly negates the second negative trait. Option elimination: (A) confident : coterie - being confident has no opposition with belonging to a specific group (coterie). (B) calculating : imposture - a calculating person MAY resort to imposture (deception); this isn't an opposite of the trait, but rather supportive of it. (C) diffident : goodwill - a shy (diffident) person can also have goodwill; there's no logical tension between these. (D) fearful : destruction - a fearful person may fear destruction, but this isn't their characteristic opposite state. Tip: This type of analogy is called 'Antonymous Trait.' Check whether the first word is a 'Positive' quality and the second a 'Negative' action/state.","src":"-","vocab":[{"word":"Urbane","meaning":"Refined, sophisticated","synonyms":"-"},{"word":"Gaucherie","meaning":"Awkwardness, tactlessness","synonyms":"-"},{"word":"Guileless","meaning":"Sincere, without deceit","synonyms":"-"},{"word":"Chicanery","meaning":"Trickery, deception","synonyms":"-"},{"word":"Diffident","meaning":"Shy, lacking confidence","synonyms":"-"}]},{"id":"ana-C4Q7","q":"VOTING : ROLL CALL","opts":{"A":"termination : cloture","B":"amendment : constitution","C":"majority : concession","D":"quorum : filibuster","E":"investigation : legislation"},"ans":"A","exp":"Relationship: Action : Formal Procedure. Logic: Just as roll call is a method/procedure for conducting voting, cloture is a formal procedure for bringing about the termination (ending) of a parliamentary debate. Roll Call is a method of conducting Voting; Cloture is a method of ending a Debate. Option elimination: (B) amendment : constitution - a constitution may be amended, but an amendment isn't a 'procedure,' it's a change/modification. (C) majority : concession - there's no procedural connection between having a majority and granting a concession. (D) quorum : filibuster - a quorum is the required member count, and a filibuster is a stalling tactic; their relationship may be oppositional but not procedural in this sense. (E) investigation : legislation - investigation and law-making are two separate administrative tasks. Tip: This type of analogy is called 'Parliamentary Terms' or 'Technical Procedures.'","src":"-","vocab":[{"word":"Cloture","meaning":"A procedure to end debate and force a vote","synonyms":"-"},{"word":"Quorum","meaning":"The minimum members needed","synonyms":"-"},{"word":"Filibuster","meaning":"A delaying tactic in debate","synonyms":"-"}]},{"id":"ana-C4Q8","q":"DEMUR : QUALMS","opts":{"A":"placate : pique","B":"obligate : benevolence","C":"atrophy : rehabilitation","D":"manipulate : experience","E":"waver : irresoluteness"},"ans":"E","exp":"Relationship: Action : Internal State. The first word is an outward action and the second is the mental state behind that behavior/cause. Verification sentence: 'One tends to demur because of their qualms.' Logic: Just as someone objects (demurs) because of qualms (hesitation/doubt) in their mind, someone wavers (becomes indecisive/wobbly) because of irresoluteness (indecisiveness) in their mind. In both, the second word is the core psychological cause of the first action. Option elimination: (A) placate : pique is an oppositional relationship; a piqued (irritated) person is calmed/placated. (B) obligate : benevolence - obligation doesn't arise from benevolence (kindness); benevolence is voluntary. (C) atrophy : rehabilitation - when atrophy (wasting of an organ) occurs, rehabilitation is needed; this is a 'remedy'/'treatment' relationship. (D) manipulate : experience - experience may be needed to manipulate, but it isn't a direct manifestation of a mental state. Tip: This type of analogy is called 'Manifestation of a State.' Check whether the first action is a result of the second mental state.","src":"-","vocab":[{"word":"Demur","meaning":"To raise an objection","synonyms":"-"},{"word":"Qualms","meaning":"Doubts/misgivings","synonyms":"-"},{"word":"Waver","meaning":"To become indecisive","synonyms":"-"},{"word":"Irresoluteness","meaning":"Indecisiveness","synonyms":"-"},{"word":"Atrophy","meaning":"Wasting away of body tissue","synonyms":"-"}]},{"id":"ana-C4Q9","q":"MISER : THRIFT","opts":{"A":"performer : artistry","B":"chauvinist : patriotism","C":"mimic : ridicule","D":"politician : compromise","E":"scientist : discovery"},"ans":"B","exp":"Relationship: Extreme Representation : Normal Trait. Verification sentence: 'A miser is someone who shows an extreme and excessive form of thrift.' Logic: Just as the extreme form of thrift (economy) is miserliness, the extreme, blind, or excessive form of patriotism (love of country) is called chauvinism (extreme nationalism). In both, the first word denotes an 'excessive and negative' version of the second. Option elimination: (A) performer : artistry - a performer has artistry; this is a normal relationship, not an extreme/distorted form of a quality. (C) mimic : ridicule - a mimic may ridicule others, but this isn't an excess of any quality. (D) politician : compromise - politicians make compromises, but this isn't the extreme form of any quality. (E) scientist : discovery - this is a profession-and-work relationship. Tip: This type of analogy is called 'Excessive Degree' or 'Positive to Negative Extreme.' Very popular in bank exams (e.g., Enthusiast : Fanatic).","src":"-","vocab":[{"word":"Thrift","meaning":"Economical use of resources","synonyms":"-"},{"word":"Chauvinist","meaning":"An extreme/blind nationalist","synonyms":"-"},{"word":"Patriotism","meaning":"Love of one's country","synonyms":"-"}]},{"id":"ana-C4Q10","q":"FORGERY : COUNTERFEIT","opts":{"A":"duplicity : testimony","B":"arson : insurance","C":"embezzlement : fraud","D":"theft : punishment","E":"murder : life"},"ans":"C","exp":"Relationship: Specific Example : General Category. Verification sentence: 'Forgery is a specific type of counterfeit activity involving illegal imitation.' Logic: Just as forgery is a specific kind of counterfeiting, embezzlement is a specific kind of fraud. In both pairs, the first word is a specific economic/legal crime, and the second word indicates its broader category or general nature. Option elimination: (A) duplicity : testimony - testimony and duplicity (deceitfulness) aren't synonymous; testimony can be true or false, but it isn't a 'category' of crime. (B) arson : insurance - arson is a crime, but insurance isn't a crime; it's a commercial service. (D) theft : punishment - theft leads to punishment; this is a Crime : Result relationship. (E) murder : life - murder and life relate as a crime and the thing the crime is committed against. Tip: This type of analogy is called 'Synonymous Crimes' or 'Class Membership.'","src":"Agrani Bank (SO)-2013","vocab":[{"word":"Embezzlement","meaning":"Theft of entrusted funds","synonyms":"-"},{"word":"Duplicity","meaning":"Deceitfulness","synonyms":"-"},{"word":"Arson","meaning":"The crime of deliberately setting fire","synonyms":"-"}]},{"id":"ana-C4Q11","q":"NICOTINE : TOBACCO","opts":{"A":"calcium : bone","B":"iodine : salt","C":"protein : meat","D":"pulp : fruit","E":"caffeine : coffee"},"ans":"E","exp":"Relationship: Natural Stimulant : Source. Verification sentence: 'Nicotine is the primary stimulant found naturally in tobacco.' Logic: Just as tobacco naturally contains nicotine, coffee's main natural stimulant compound is caffeine. In both, the first word is a specific chemical compound, and the second is the plant source from which it's obtained. Option elimination: (A) calcium : bone - calcium is a structural building component of bone, but unlike nicotine or caffeine, it isn't a 'stimulant'; this is a 'Nutrient : Structure' relationship. (B) iodine : salt - iodine is artificially added to salt (fortification), whereas nicotine is an inseparable natural part of tobacco. (C) protein : meat - this is a general nutrition relationship; though protein is meat's main component, the 'addictive' or 'stimulant' logic of tobacco and nicotine doesn't match here. (D) pulp : fruit - pulp is a physical part of fruit, not a chemical compound or stimulant. Tip: This type of analogy is called 'Active Ingredient : Source.' This 'Chemistry in Nature' type question often appears in BIBM and bank job exams.","src":"BIBM-Evening MBM 19th Batch-2010","vocab":[{"word":"Nicotine","meaning":"The stimulant compound in tobacco","synonyms":"-"},{"word":"Caffeine","meaning":"The stimulant compound in coffee","synonyms":"-"}]},{"id":"ana-C4Q12","q":"CANDLE : WAX","opts":{"A":"metal : corrosion","B":"leather : vinyl","C":"curtain : pleat","D":"tire : rubber","E":"wood : ash"},"ans":"D","exp":"Relationship: Object : Raw Material. Verification sentence: 'A candle is made of wax.' Logic: Just as a candle is made from wax, a tire is made from rubber. In both, the first is a usable object, and the second is its fundamental raw material. Option elimination: (A) metal : corrosion - metal corrodes (decays), but corrosion isn't created FROM metal as a product; this isn't a manufacturing relationship. (B) leather : vinyl - leather and vinyl can be substitutes for each other, but one isn't made FROM the other. (C) curtain : pleat - a pleat is a design feature/part of a curtain, not the curtain's primary raw material (such as fabric). (E) wood : ash - ash is indeed produced from wood, but ash isn't a usable 'finished product'; rather it's waste/residue. Tip: This type of analogy is called 'Composition' or 'Material Source.'","src":"Bank ASIA-2017","vocab":[{"word":"Corrosion","meaning":"Gradual destruction of metal","synonyms":"-"},{"word":"Pleat","meaning":"A fold in fabric","synonyms":"-"}]},{"id":"ana-C4Q13","q":"BIT : DRILL","opts":{"A":"nut : bolt","B":"nail : hammer","C":"blade : razor","D":"stapler : paper","E":"chisel : stone"},"ans":"C","exp":"Relationship: Component : Tool. Verification sentence: 'A bit is the functional cutting or boring part of a drill.' Logic: Just as the bit is the main functional part of a drill, the blade is the main functional part of a razor. Without the blade, the razor can't do its job, just as without the bit, the drill can't bore a hole. In both, the first word is a replaceable component that gives the tool its primary functionality. Option elimination: (A) nut : bolt - these connect together to fasten something, but a nut isn't a 'cutting/functional part' of a bolt. (B) nail : hammer - a hammer strikes a nail; this is an Action relationship, but a nail isn't a permanent or functional 'part' of the hammer. (D) stapler : paper - this is a Tool and Material (object worked on) relationship. (E) chisel : stone - a chisel works on stone; this is also a Tool and Material relationship. But just as the bit is a 'part' of the drill machine, the chisel isn't a part of the stone. Tip: This type of analogy is called 'Functional Part of a Tool.' Check whether the first word is doing the main work from 'inside' or at the 'head' of the second tool - e.g., Nib : Pen.","src":"-","vocab":[{"word":"Bit","meaning":"The cutting tip of a drill","synonyms":"-"},{"word":"Blade","meaning":"The cutting edge of a razor","synonyms":"-"},{"word":"Chisel","meaning":"A tool for carving","synonyms":"-"}]},{"id":"ana-C4Q14","q":"MISJUDGE : ASSESS","opts":{"A":"misconstrue : interpret","B":"misconduct : rehearse","C":"misinform : design","D":"misguide : duplicate","E":"misperceive : explain"},"ans":"A","exp":"Relationship: Error in Action : Action. Verification sentence: 'To misjudge is to assess something incorrectly.' Logic: Just as misjudging means making an error while assessing, misconstruing means making an error while interpreting (explaining/understanding the meaning of something). In both, the first word is the result of doing the second action incorrectly. Option elimination: (B) misconduct : rehearse - rehearsing has no direct logical or 'error' connection with misconduct. (C) misinform : design - the error of designing something isn't called 'misinform'; rather, giving incorrect information is called misinform. (D) misguide : duplicate - the error of duplicating (copying) something has no relationship with misguiding (leading astray). (E) misperceive : explain - the error of explaining something isn't called 'misperceive'; rather, the error of seeing/understanding is called misperceive. The error of explaining would be 'misinterpret' or 'misconstrue.' Tip: This type of analogy is called 'Faulty Execution of an Action.' Check whether the 'Mis-' prefix on the first word expresses a 'negative' or 'incorrect' form of the second word's action.","src":"-","vocab":[{"word":"Misjudge","meaning":"To judge incorrectly","synonyms":"-"},{"word":"Misconstrue","meaning":"To interpret incorrectly","synonyms":"-"}]},{"id":"ana-C4Q15","q":"COMPLIANT : SERVILE","opts":{"A":"trusting : gullible","B":"cringing : fawning","C":"pleasant : effortless","D":"adventurous : courageous","E":"arduous : futile"},"ans":"A","exp":"Relationship: Positive Trait : Negative Extreme. Verification sentence: 'To be compliant is normal, but to be excessively compliant is to be servile.' Logic: Trusting someone is a good quality, but when trust goes too far and a person loses judgment and believes everything blindly, they become gullible (overly credulous/easily deceived). In both, the first word is a normal trait and the second is its negative excess. Option elimination: (B) cringing : fawning - both words are already negative; there's no 'good-to-bad' transformation here. (C) pleasant : effortless - these have no relationship of excess. (D) adventurous : courageous - being adventurous doesn't necessarily mean being reckless; both are essentially positive qualities here, with no 'Excessive' negative meaning. (E) arduous : futile - a task being difficult (arduous) doesn't mean it will be futile (useless). Tip: This type of analogy is called 'Degrees of Intensity' or 'Positive to Negative Extreme.' This pattern appears frequently in exams, e.g., Economical : Stingy or Confident : Arrogant.","src":"-","vocab":[{"word":"Compliant","meaning":"Willing to obey","synonyms":"-"},{"word":"Servile","meaning":"Excessively submissive","synonyms":"-"},{"word":"Gullible","meaning":"Easily deceived","synonyms":"-"}]},{"id":"ana-C4Q16","q":"ASTRINGENT : CONTRACTION","opts":{"A":"Anesthetic : Insensibility","B":"analgesic : pain","C":"coagulant : euphoria","D":"stimulant : drowsiness","E":"emollient : irritation"},"ans":"A","exp":"Relationship: Cause : Effect. Verification sentence: 'An astringent causes contraction of body tissues.' Logic: Just as an astringent causes contraction, using an anesthetic (numbing medicine) creates insensibility (loss of sensation) in the body. In both, the first is a specific medicinal agent, and the second is its definite effect/result. Option elimination: (B) analgesic : pain - an analgesic reduces pain, it isn't pain's 'cause.' Our original question was about 'what it causes,' not 'what it removes.' (C) coagulant : euphoria - a coagulant clots blood; it has no relationship with euphoria (mental elation). (D) stimulant : drowsiness - a stimulant removes drowsiness, but its result is alertness, which is the opposite effect. (E) emollient : irritation - an emollient reduces or soothes irritation, it doesn't create irritation. Tip: This type of analogy is called 'Agent and its Function/Effect.'","src":"-","vocab":[{"word":"Astringent","meaning":"An agent causing tissue contraction","synonyms":"-"},{"word":"Insensibility","meaning":"Loss of feeling/sensation","synonyms":"-"},{"word":"Emollient","meaning":"A soothing/softening agent","synonyms":"-"}]},{"id":"ana-C4Q17","q":"NOMINAL : FIGUREHEAD","opts":{"A":"absolute : autocrat","B":"cloistered : bishop","C":"military : tribunal","D":"statutory : defendant","E":"monolithic : legislature"},"ans":"A","exp":"Relationship: Defining Characteristic : Role. Verification sentence: 'A figurehead is someone who holds a nominal position of power.' Logic: Just as a figurehead is someone who holds power only in name, an autocrat (a tyrant/despot) always holds absolute (unlimited) power. In both, the first word fully defines the nature or degree of the second person's power. Option elimination: (B) cloistered : bishop - being cloistered (secluded) may be a trait of monks, but a bishop is usually engaged in administrative and social work. (C) military : tribunal - a tribunal may be military, but this doesn't indicate the 'type' of power (unlimited or nominal). (D) statutory : defendant - a defendant may be subject to statutory law, but this isn't a relationship about the nature of power and role. (E) monolithic : legislature - this describes a form of political organization, but doesn't express the degree of power held by a role. Tip: This type of analogy is called 'Essential Property' or 'Nature of Power.' Check whether the second word is a role/position and the first word describes the 'scope of power' for that role - Figurehead means power is 'zero' (nominal), while Autocrat means power is 'full' (absolute).","src":"-","vocab":[{"word":"Figurehead","meaning":"A nominal leader with no real power","synonyms":"-"},{"word":"Autocrat","meaning":"A ruler with absolute power","synonyms":"-"},{"word":"Cloistered","meaning":"Secluded, isolated","synonyms":"-"}]},{"id":"ana-C4Q18","q":"PHILOSOPHER : COGITATE","opts":{"A":"linguist : prevaricate","B":"politician : capitulate","C":"scholar : extemporize","D":"misanthrope : repeat","E":"iconoclast : attack"},"ans":"E","exp":"Relationship: Person : Defining Action. Verification sentence: 'A philosopher is someone who tends to cogitate deeply.' Logic: Just as a philosopher's defining action is to cogitate (think deeply), an iconoclast's (a person who breaks with tradition/established beliefs) primary action or nature is to attack (oppose) established customs, traditions, or idols. In both, the second word denotes the first person's core defining or professional action. Option elimination: (A) linguist : prevaricate - prevaricating (speaking evasively/lying) isn't a linguist's defining job. (B) politician : capitulate - capitulating (surrendering) cannot be a politician's defining action. (C) scholar : extemporize - extemporizing (speaking without preparation) doesn't match a scholar's core defining trait. (D) misanthrope : repeat - repeating something isn't a misanthrope's (hater of humanity) defining behavior; rather, hating people is their core trait. Tip: This type of analogy is called 'Characteristic Action.' Check what action the person is known for - a philosopher is known by 'thought,' an iconoclast is known by 'attacking tradition.'","src":"-","vocab":[{"word":"Cogitate","meaning":"To think deeply","synonyms":"-"},{"word":"Iconoclast","meaning":"One who attacks established beliefs","synonyms":"-"},{"word":"Prevaricate","meaning":"To speak evasively","synonyms":"-"},{"word":"Extemporize","meaning":"To speak without preparation","synonyms":"-"},{"word":"Misanthrope","meaning":"One who hates humanity","synonyms":"-"}]}]},{"id":"ana-5","title":"GRE Analogy Test-5","questions":[{"id":"ana-C5Q1","q":"PEDIATRICS : CHILDREN","opts":{"A":"dermatology : skin","B":"pathology : medicine","C":"meteorology : forecasts","D":"neurology : psychologists","E":"ecology : environmentalists"},"ans":"A","exp":"Relationship: Branch of Medicine : Subject Studied. Verification sentence: 'Pediatrics is the branch of medicine dealing with the health and medical care of children,' and similarly, 'Dermatology is the branch of medicine dealing with the health and medical care of the skin.' Logic: Pediatrics is the branch of medicine that handles children's diseases and treatment. Just as there's a specialized division for treating children, there's a specific medical division for treating skin (Dermatology). Option elimination: (B) pathology : medicine - pathology is itself a part of medicine that diagnoses disease, not the name of a specific organ or patient category. (C) meteorology : forecasts - meteorologists research weather to give forecasts, but this isn't a medical branch. (D) neurology : psychologists - neurology is the field of nerve-related doctors, but psychologists aren't generally neurologists; the categories don't match. (E) ecology : environmentalists - ecology deals with environment, but it isn't a branch of medicine, and environmentalists are researchers, not patients. Tip: When a word ends in '-ics' or '-logy,' it generally denotes a field or branch of study. Check whether the second word is the Target Object of that field.","src":"-","vocab":[{"word":"Pediatrics","meaning":"The medical branch dealing with children","synonyms":"-"},{"word":"Dermatology","meaning":"The medical branch dealing with skin","synonyms":"-"}]},{"id":"ana-C5Q2","q":"CREASE : FOLDING","opts":{"A":"hole : perforating","B":"serration : braiding","C":"dent : weakening","D":"break : setting","E":"gouge : cracking"},"ans":"A","exp":"Relationship: Result : Action. Verification sentence: 'Folding something creates a crease,' and similarly, 'Perforating something creates a hole.' Logic: Folding an object creates a mark or crease. Similarly, perforating (punching holes in) an object creates a hole. The second word is an action, and the first word is the result of that action. Option elimination: (B) serration : braiding - braiding doesn't create serration (notches). (C) dent : weakening - weakening doesn't create a dent. (D) break : setting - breaking something doesn't result in setting it. (E) gouge : cracking - cracking doesn't typically create a gouge (a cut made with a tool). Tip: When a verb and a noun are given, check whether performing the action actually creates that object.","src":"-","vocab":[{"word":"Crease","meaning":"A line/mark from folding","synonyms":"-"},{"word":"Perforate","meaning":"To make holes through","synonyms":"-"},{"word":"Gouge","meaning":"A groove/cut made with a tool","synonyms":"-"}]},{"id":"ana-C5Q3","q":"DAGGER : SCABBARD","opts":{"A":"bow : quiver","B":"pistol : holster","C":"lasso : saddle","D":"rifle : sight","E":"spear : shaft"},"ans":"B","exp":"Relationship: Object : Container/Case. Verification sentence: 'A dagger is kept or carried in a scabbard,' and similarly, 'A pistol is kept or carried in a holster.' Logic: A scabbard is the case used to hold a small bladed weapon (a dagger). Just as a dagger has a specific leather or metal case for storage, a pistol has a specific case (holster) for carrying it. Note that in both, the weapon goes entirely inside the case. Option elimination: (A) bow : quiver - many mistake this, but a quiver holds arrows, not the bow itself; bows typically use a 'case.' (C) lasso : saddle - a lasso rope may be hung on a saddle, but a saddle isn't a 'case' or specific holder for rope. (D) rifle : sight - a sight is a part of a rifle used for aiming; it isn't a case for storing the rifle. Tip: When a small weapon's relationship to its holder/case is given, look for the same type of small weapon in the options.","src":"-","vocab":[{"word":"Scabbard","meaning":"A sheath for a blade","synonyms":"-"},{"word":"Holster","meaning":"A case for carrying a pistol","synonyms":"-"},{"word":"Quiver","meaning":"A case for holding arrows","synonyms":"-"}]},{"id":"ana-C5Q4","q":"SUBPOENA : WITNESS","opts":{"A":"suborn : judge","B":"tax : worker","C":"elect : officer","D":"conscript : soldier","E":"hire : laborer"},"ans":"D","exp":"Relationship: Legal/Mandatory Action : Person Recruited. Verification sentence: 'A subpoena is a legal order that forces a witness to appear in court,' and similarly, 'A conscript is a legal order or system that forces a person to serve as a soldier.' Logic: A subpoena is a legal court order that compels a witness to appear in court. The first word is a 'Mandatory Call,' and the second is the person assigned to a specific duty through that call. Just as conscription forcibly recruits a person into the military, a subpoena forcibly compels a witness's appearance. Option elimination: (A) suborn : judge - suborning a judge (bribing them to act improperly) isn't a legal or lawful process; it's a criminal act. (B) tax : worker - tax is levied on workers, but it isn't an order forcing them to work. (C) elect : officer - officers are appointed through election, but this isn't a 'mandatory force'-type matter. (E) hire : laborer - hiring a laborer is a voluntary contract; no legal compulsion is imposed on the laborer. Tip: When legal terminology appears, look for the same kind of legal or state-mandated compulsion in the answer.","src":"-","vocab":[{"word":"Subpoena","meaning":"A legal order to appear in court","synonyms":"-"},{"word":"Conscript","meaning":"To compulsorily enlist","synonyms":"-"},{"word":"Suborn","meaning":"To bribe into wrongdoing","synonyms":"-"}]},{"id":"ana-C5Q5","q":"LUBRICATE : ABRASION","opts":{"A":"burnish : decomposition","B":"vent : distillation","C":"tamp : adhesion","D":"seal : leakage","E":"irrigate : drainage"},"ans":"D","exp":"Relationship: Action : Prevention. Verification sentence: 'Lubricating is done to prevent abrasion,' and similarly, 'Sealing is done to prevent leakage.' Logic: We use lubricant to reduce abrasion (friction). Similarly, we seal something to stop leakage of air or gas through a hole. Option elimination: (A) burnish : decomposition - burnishing (polishing) doesn't prevent decomposition; rather it adds shine. (B) vent : distillation - a vent may be part of the distillation process, but it doesn't 'prevent' distillation. (C) tamp : adhesion - tamping (packing down firmly) might create adhesion, but it isn't a preventive relationship. (E) irrigate : drainage - irrigating and draining may complement each other, but irrigating isn't 'preventing' anything. Tip: When one action relates to preventing a state, check whether the action 'creates' or 'stops' that state. Since lubricating stops abrasion, the answer should also be something that stops/prevents a problem.","src":"-","vocab":[{"word":"Lubricate","meaning":"To apply oil to reduce friction","synonyms":"-"},{"word":"Abrasion","meaning":"Wearing away by friction","synonyms":"-"},{"word":"Leakage","meaning":"Escape of fluid/gas through a gap","synonyms":"-"}]},{"id":"ana-C5Q6","q":"ASTROLOGY : ASTRONOMY","opts":{"A":"alchemy : chemistry","B":"homeopathy : zoology","C":"mythology : classics","D":"pedagogy : philosophy","E":"phenomenology : linguistics"},"ans":"A","exp":"Relationship: Original to Modern Transformation; Pseudoscience : Modern Science. Verification sentence: 'Astrology is the ancient precursor to the modern science of astronomy,' and similarly, 'Alchemy is the ancient precursor to the modern science of chemistry.' Logic: Astrology, the attempt to predict fate through celestial influence, later transformed into the science-based modern field of astronomy. Similarly, modern chemistry was born from alchemy. Option elimination: (B) homeopathy : zoology - homeopathy is a treatment method and zoology a science, but there's no original-to-modern transformation relationship between them. (C) mythology : classics - mythology and classical literature may be related, but one hasn't scientifically evolved into the other. (D) pedagogy : philosophy - pedagogy may be a branch of philosophy, but it doesn't follow the 'Pseudoscience to Science' pattern. (E) phenomenology : linguistics - this is a philosophical doctrine and a language science; there's no original-modern scientific link between them. Tip: Watch for the 'Precursor' or 'ancient-to-modern' relationship and transformation. If the order changes, the proportion of the answer should change too.","src":"-","vocab":[{"word":"Alchemy","meaning":"The medieval precursor to chemistry","synonyms":"-"},{"word":"Pedagogy","meaning":"The method/practice of teaching","synonyms":"-"}]},{"id":"ana-C5Q7","q":"MALAPROPISM : VERBAL","opts":{"A":"heresy : moral","B":"hoax : cognitive","C":"gaffe : social","D":"feint : martial","E":"perjury : legislative"},"ans":"C","exp":"Relationship: Specific Error : Domain of Error. Verification sentence: 'A malapropism is a verbal error,' and similarly, 'A gaffe is a social error.' Logic: Using a wrong word while speaking is a 'verbal error.' Similarly, behaving inappropriately or making a mistake at a social occasion is a 'social error,' called a gaffe. Option elimination: (A) heresy : moral - heresy may be a religious or doctrinal error, but it isn't solely confined to the moral domain. (B) hoax : cognitive - a hoax is a deliberate act, not an unintentional 'error.' (D) feint : martial - a feint is a tactical move in combat, not an error or mistake. (E) perjury : legislative - perjury is a legal/judicial error or crime, not related to legislature. Tip: For this type of analogy, identifying the 'error' and the 'domain of the error' is crucial. Malapropism and gaffe are both unintentional blunders.","src":"-","vocab":[{"word":"Malapropism","meaning":"Comic misuse of words","synonyms":"-"},{"word":"Gaffe","meaning":"A social blunder","synonyms":"Blunder"},{"word":"Perjury","meaning":"Lying under oath","synonyms":"-"}]},{"id":"ana-C5Q8","q":"PLUCK : QUIT","opts":{"A":"verve : flinch","B":"gall : skimp","C":"pride : grovel","D":"charm : smile","E":"poise : waver"},"ans":"E","exp":"Relationship: Quality : Lack of that Quality. (Note: some sources alternatively list 'pride : grovel' as a possible answer, reasoning that a proud person typically does not grovel; however, this doesn't as directly express the lack-of-trait relationship as poise/waver does.) Verification sentence: 'A person with pluck does not quit,' and similarly, 'A person with poise does not waver.' Logic: Lacking courage (pluck), a person quits. Similarly, lacking mental composure or self-confidence (poise), a person becomes indecisive or wavers. This is a 'Negative Correlation' or oppositional-behavior relationship. Tip: When a character trait is given, check whether the second word is the 'opposite action' of that trait. If you have pluck, you don't quit; similarly, if you have poise, you don't waver.","src":"-","vocab":[{"word":"Pluck","meaning":"Courage, spirited bravery","synonyms":"-"},{"word":"Poise","meaning":"Composure, self-assured calm","synonyms":"-"},{"word":"Waver","meaning":"To become indecisive","synonyms":"-"},{"word":"Grovel","meaning":"To behave submissively/abjectly","synonyms":"-"}]},{"id":"ana-C5Q9","q":"PARENTHESIS : EXPLANATION","opts":{"A":"synopsis : affection","B":"apostrophe : annotation","C":"synthesis : interpolation","D":"ellipsis : omission","E":"asterisk : exaggeration"},"ans":"D","exp":"Relationship: Punctuation Mark : Function. Verification sentence: 'A parenthesis is used to indicate an explanation or extra information,' and similarly, 'An ellipsis is used to indicate an omission of words.' Logic: A parenthesis is typically used to give extra explanation within a sentence. When we leave out or omit part of a sentence, we use an ellipsis (...) to indicate that. In other words, an ellipsis is used to denote omission. Option elimination: (A) synopsis : affection - synopsis means summary, and affection means fondness; there's no punctuation or function relationship between them. (B) apostrophe : annotation - an apostrophe is used to denote possession or contraction, not for annotation. (C) synthesis : interpolation - synthesis means combination; it isn't a punctuation mark. (E) asterisk : exaggeration - an asterisk (*) is used to reference some information, not to denote exaggeration.","src":"Pubali Bank (SO)-2012","vocab":[{"word":"Ellipsis","meaning":"A mark (...) indicating omission","synonyms":"-"},{"word":"Omission","meaning":"Something left out","synonyms":"-"},{"word":"Apostrophe","meaning":"A punctuation mark for possession/contraction","synonyms":"-"}]},{"id":"ana-C5Q10","q":"CENSUS : POPULATION","opts":{"A":"itinerary : journeys","B":"inventory : merchandise","C":"roster : audience","D":"slate : incumbents","E":"manifest : debts"},"ans":"B","exp":"Relationship: Process : Subject of Counting. Verification sentence: 'A census is an official count of a population,' and similarly, 'An inventory is an official count of merchandise or goods.' Logic: Just as a census is taken to count a country's people, an inventory is taken to count the quantity of goods/merchandise in a shop or warehouse. Option elimination: (A) itinerary : journeys - this is a travel plan, not a 'count' of journeys. (C) roster : audience - a roster is a duty/work list (e.g., a list of teachers); it isn't a count of an audience. (D) slate : incumbents - a slate is a list of election candidates; it isn't a specific process for counting incumbents. (E) manifest : debts - a manifest is a list of cargo or passengers, not an accounting of debts. Tip: Keep these list/count-related pairs in mind: Census : Population, Inventory : Merchandise, and Manifest : Cargo/Passengers.","src":"Pubali Bank (SO)-2012; Pubali Bank (SO)-2011; Islami Bank A.O(G-3)-2011, IBA (MBA): 2001-02","vocab":[{"word":"Inventory","meaning":"A detailed list of goods/stock","synonyms":"-"},{"word":"Manifest","meaning":"A list of cargo/passengers","synonyms":"-"},{"word":"Slate","meaning":"A list of election candidates","synonyms":"-"}]},{"id":"ana-C5Q11","q":"INEVITABLE : CHANCE","opts":{"A":"absolute : variability","B":"candid : openness","C":"certain : regularity","D":"relaxed : diligence","E":"sincere : hesitancy"},"ans":"A","exp":"Relationship: Antonym/Opposite Relationship. Verification sentence: 'Something that is inevitable does not happen by chance,' and similarly, 'Something that is absolute does not have variability.' Logic: Inevitable means something that will certainly happen, with no 'if, but' or element of chance/luck. Similarly, absolute means something fixed and unchangeable, with no variability. The first word denotes something certain, and the second denotes its opposite state (uncertainty). Option elimination: (B) candid : openness - candid means openness; this is a synonym relationship, not opposite. (C) certain : regularity - certainty and regularity can complement each other, but they aren't opposites of each other. (D) relaxed : diligence - relaxed means lax, and diligence means hard work; though they seem somewhat opposite, this isn't quite the same kind of opposite as 'inevitable : chance.' (E) sincere : hesitancy - sincerity and hesitancy aren't directly opposite in the same structural way. Tip: When an adjective and a noun are given with an opposite relationship between them, look for the same pattern in the options.","src":"-","vocab":[{"word":"Inevitable","meaning":"Certain to happen","synonyms":"-"},{"word":"Variability","meaning":"Tendency to change","synonyms":"-"},{"word":"Candid","meaning":"Frank, open","synonyms":"-"}
