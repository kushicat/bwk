rate : sustenance","D":"standardize : disconfirmation","E":"dilate : contraction"},"ans":"B","exp":"Relationship: Action : State It Produces. Refining produces purification; attenuating (thinning/weakening density) produces rarefaction (the state of being less dense). Both pairs show a process leading directly to its resulting state. (A) Deflecting and conforming have no result relationship - they're nearly opposite ideas. (C) Regenerating might support sustenance, but it's not a direct synonymous process-result pair like refine/purification. (D) Standardizing and being disconfirmed are opposite directions, not cause-and-result. (E) Dilating and contracting are direct opposites of each other, not a process-and-its-own-result.","src":"-","vocab":[{"word":"Attenuate","meaning":"To reduce in force/density","synonyms":"-"},{"word":"Rarefaction","meaning":"The state of reduced density","synonyms":"-"}]},{"id":"ana-C12Q8","q":"MELODRAMA : SUBTLETY","opts":{"A":"chimera : authenticity","B":"parody : wit","C":"war : strategy","D":"brief : abstract","E":"hypothesis : theory"},"ans":"A","exp":"Relationship: Thing : Quality It Lacks. Melodrama lacks subtlety (it's exaggerated); a chimera (a fantastical, imaginary thing) lacks authenticity (it isn't real). (B) Parody often REQUIRES wit to create - a quality present, not absent. (C) War requires strategy to be conducted - again present, not lacking. (D) Brief and abstract are both types of summaries, near-synonymous, not a lack relationship. (E) A hypothesis that's proven becomes a theory - that's an upgrade/evolution, not a lack relationship. Similar 'lacks' pairs: Bombast:Modesty, Bigot:Tolerance.","src":"-","vocab":[{"word":"Chimera","meaning":"An unrealistic, fantastical idea","synonyms":"-"}]},{"id":"ana-C12Q9","q":"UNTENABLE : DEFENDED","opts":{"A":"satiated : satisfied","B":"heretical : considered","C":"fragile : touched","D":"inevitable : avoided","E":"suspicious : doubted"},"ans":"D","exp":"Relationship: Quality : Action Made Impossible. Something untenable cannot be defended; something inevitable cannot be avoided. (A) Satiated and satisfied are near-synonyms, no impossibility relationship. (B) A heretical idea CAN still be considered by people - no blocking relationship. (C) A fragile object CAN be touched (just not roughly handled) - touching itself isn't blocked. (E) Something suspicious naturally GETS doubted - that's a normal cause-effect, not an impossibility. Similar 'cannot be...' pairs: Infallible:Error (cannot err), Indelible:Erased (cannot be erased).","src":"-","vocab":[{"word":"Untenable","meaning":"Unable to be defended/maintained","synonyms":"-"}]},{"id":"ana-C12Q10","q":"PLEASURE : ECSTASY","opts":{"A":"complacence : envy","B":"surprise : astonishment","C":"anxiety : curiosity","D":"pride : vexation","E":"pity : dread"},"ans":"B","exp":"Relationship: Degree of Intensity. Ecstasy is an extreme/heightened form of pleasure; astonishment is an extreme/heightened form of surprise. (A) Complacence and envy are entirely different emotions, with no intensity scale between them. (C) Anxiety and curiosity are separate mental states - more anxiety doesn't equal curiosity. (D) Pride and vexation are unrelated emotions. (E) Pity and dread share no intensity progression. Other intensity examples: Cool:Cold:Frozen, Anger:Rage:Fury, Dislike:Hate:Abhorrence, Mistake:Error:Blunder.","src":"-","vocab":[{"word":"Ecstasy","meaning":"Extreme happiness/elation","synonyms":"-"}]},{"id":"ana-C12Q11","q":"LIMERICK : POEM","opts":{"A":"lampoon : satire","B":"setting : play","C":"fable : moral","D":"material : collage","E":"plot : character"},"ans":"A","exp":"Relationship: Specific Type : General Category. A limerick is a specific type of poem; a lampoon is a specific type of satire. (B) Setting is just a PART of a play, not a type/category of it. (C) A fable contains a moral - that's a Part relationship, not Type. (D) Material is used to make a collage - a raw-material relationship, not a categorical one. (E) Plot and character are both separate components of a story, neither a type of the other. Common literary classifications: Sonnet:Poem, Biography:Non-fiction, Farce:Comedy, Ballad:Song.","src":"-","vocab":[{"word":"Limerick","meaning":"A short humorous five-line poem","synonyms":"-"},{"word":"Lampoon","meaning":"A satirical piece mocking someone","synonyms":"-"}]},{"id":"ana-C12Q12","q":"SOUND : AIR","opts":{"A":"oil : tanker","B":"signal : wave","C":"electricity : copper","D":"light : camera","E":"x-ray : lead"},"ans":"C","exp":"Relationship: Phenomenon : Medium It Travels Through. Sound travels through air; electricity travels through copper. (A) A tanker carries oil, but it's a vehicle/container, not a 'medium' the way air or copper conducts something. (B) A wave can carry a signal, but the wave IS essentially a form of the signal, not a separate transmission medium. (D) A camera doesn't transmit light through itself the way a medium does - light enters it for capture, not transit. (E) Lead actually BLOCKS x-rays (it's a barrier/insulator), the opposite of a conducting medium. Other medium examples: Light:Glass, Water:Pipe, Electricity:Wire.","src":"-","vocab":[{"word":"Conduit","meaning":"A medium/channel for transmission","synonyms":"-"}]},{"id":"ana-C12Q13","q":"INDELIBILITY : ERASURE","opts":{"A":"impermeability : passage","B":"enumeration : ordering","C":"illegibility : writing","D":"reactiveness : stimulation","E":"reflectivity : visibility"},"ans":"A","exp":"Relationship: Quality : Action It Blocks. Indelibility means something cannot be erased; impermeability means something (e.g. air or water) cannot pass through. Both describe a property that makes a specific action impossible. (B) Enumeration and ordering can complement each other, but neither blocks the other. (C) Illegibility means writing is hard to READ, but it doesn't prevent the writing from existing - mismatched logic. (D) Reactiveness is CAUSED by stimulation, the reverse of a blocking relationship. (E) Reflectivity actually HELPS visibility, the opposite of blocking it. Similar 'cannot be...' pairs: Invulnerable:Injured/Conquered, Insoluble:Dissolved, Impermeable:Penetrated.","src":"-","vocab":[{"word":"Indelibility","meaning":"The quality of being unable to be erased","synonyms":"-"},{"word":"Impermeability","meaning":"The quality of not allowing passage through","synonyms":"-"}]},{"id":"ana-C12Q14","q":"EXPIATE : GUILT","opts":{"A":"canvass : support","B":"adorn : appearance","C":"testify : conviction","D":"correct : error","E":"preach : conversion"},"ans":"D","exp":"Relationship: Action that Removes/Nullifies a Negative State. To expiate is to make amends and remove guilt; to correct is to fix and remove an error. (A) Canvassing is done TO GAIN support, not to remove a negative state. (B) Adorning improves appearance but doesn't fix or remove anything negative. (C) Testifying may lead to conviction, but it's not an act of removing/correcting that conviction. (E) Preaching may lead to conversion, but conversion isn't a negative state being removed. Similar 'remedy' pairs: Amnesty:Crime, Medication:Disease, Apology:Regret.","src":"DU (C-unit): 2011-12","vocab":[{"word":"Expiate","meaning":"To make amends for guilt","synonyms":"-"}]},{"id":"ana-C12Q15","q":"INFILTRATE : ENTER","opts":{"A":"comply : index","B":"invade : assault","C":"allege : prove","D":"insinuate : say","E":"disclose : announce"},"ans":"D","exp":"Relationship: Sneaky/Indirect Version : Direct Action. To infiltrate is to enter secretly/cunningly; to insinuate is to say something indirectly/cunningly. Both pairs show the direct action's sly, roundabout version. (A) Comply and index have no meaningful relationship at all. (B) Invading and assaulting are both direct, forceful actions - no sneakiness involved. (C) Alleging doesn't automatically prove anything - opposite outcome, not a manner-of-action match. (E) Disclosing and announcing are both near-synonymous direct actions, with no secrecy involved. Similar 'stealth' pairs: Lurk:Wait, Prowl:Move.","src":"-","vocab":[{"word":"Insinuate","meaning":"To suggest indirectly/slyly","synonyms":"-"}]},{"id":"ana-C12Q16","q":"OVERTURE : OPERA","opts":{"A":"preamble : statute","B":"gambit : move","C":"climax : story","D":"actor : cast","E":"commencement : graduate"},"ans":"A","exp":"Relationship: Introductory Part : Whole Work. An overture is the introductory section of an opera; a preamble is the introductory section of a statute (law). (B) A gambit is a specific type of move, not specifically the opening part of all moves. (C) A climax is the peak near the END of a story, the opposite position of an introduction. (D) An actor is just one member of a cast (Member:Group), not an introductory part. (E) Commencement is a ceremony marking the END of a degree, not an introduction to it. Other 'introduction' pairs: Preface:Book, Prologue:Play, Foreword:Text.","src":"-","vocab":[{"word":"Overture","meaning":"An introductory orchestral piece","synonyms":"-"},{"word":"Preamble","meaning":"An introductory statement to a law","synonyms":"-"}]},{"id":"ana-C12Q17","q":"PUNGENT : ODOR","opts":{"A":"caustic : comment","B":"durable : substances","C":"constant : period","D":"ominous : threat","E":"excessive : responsibility"},"ans":"A","exp":"Relationship: Characteristic Adjective : Subject Described. Pungent describes a sharp, biting odor; caustic describes a sharp, biting comment/remark. Both adjectives mean 'harshly sharp' applied to different subjects. (B) Durable is a possible quality of substances, but doesn't carry the specific 'sharp/biting' sense pungent does. (C) Constant and period is just a generic descriptive pairing, no sharpness implied. (D) Ominous threat is negative, but doesn't carry the specific sensory 'sharpness' of pungent. (E) Excessive responsibility is about quantity, not sharpness/intensity in the same sense. Note: 'Caustic' literally means corrosive in chemistry but means 'sharply sarcastic' in literary usage - similarly, Vitriolic:Remark follows this same pattern.","src":"-","vocab":[{"word":"Pungent","meaning":"Sharp/strong-smelling","synonyms":"-"},{"word":"Caustic","meaning":"Sharply critical/sarcastic","synonyms":"-"}]},{"id":"ana-C12Q18","q":"ATTACK : VANQUISHED","opts":{"A":"woo : adored","B":"smother : choked","C":"spy : investigated","D":"goad : provoked","E":"guess : calculated"},"ans":"D","exp":"Relationship: Action : Its Direct Result. A successful attack results in the enemy being vanquished; goading (provoking) someone results in them being provoked. Both pairs show an action and its natural, direct consequence. (A) Wooing someone doesn't guarantee they become adored - that's a hoped-for, not automatic, outcome. (B) Smothering does directly cause choking - this is plausible, but 'goad:provoked' is the cleanest direct verb-result match with matching word roots. (C) Spying doesn't automatically result in 'investigated' status - different scale of action. (E) Guessing doesn't produce a 'calculated' result - opposite methods entirely.","src":"-","vocab":[{"word":"Goad","meaning":"To provoke/prod into action","synonyms":"-"},{"word":"Vanquished","meaning":"Defeated","synonyms":"-"}]}]},{"id":"ana-13","title":"GRE Analogy Test-13","questions":[{"id":"ana-C13Q1","q":"ATHLETE : TROPHY","opts":{"A":"detective : badge","B":"presenter : award","C":"soldier : medal","D":"bettor : stake","E":"musician : instrument"},"ans":"C","exp":"Relationship: Person : Recognition for Achievement. An athlete wins a trophy for excellence; a soldier wins a medal for bravery/service. Both are top honors for outstanding performance. (A) A badge identifies a detective's role/authority, not a reward for a specific achievement. (B) A presenter HANDS OUT awards, but doesn't win one for their own personal achievement in this context. (D) A stake is money put at risk, not a reward earned through skill. (E) An instrument is a musician's tool, not a recognition of achievement.","src":"-","vocab":[{"word":"Trophy","meaning":"An award for achievement","synonyms":"-"}]},{"id":"ana-C13Q2","q":"ARTICULATE : UNCLEAR","opts":{"A":"assign : unencumbered","B":"elaborate : sketchy","C":"explain : lucid","D":"grieve : somber","E":"march : planned"},"ans":"B","exp":"Relationship: Antonym pair. Articulate (clearly expressed) is the opposite of unclear; elaborate (detailed) is the opposite of sketchy (incomplete/vague). (A) Assign and unencumbered have no opposite relationship. (C) Explain and lucid are actually SIMILAR/synonymous (explaining usually produces clarity), not opposite. (D) Grieve and somber are cause-and-trait related, not opposites. (E) March and planned aren't opposites either - marches are typically planned. When the original pair is a clear antonym, the answer must also be a clear antonym pair.","src":"-","vocab":[{"word":"Sketchy","meaning":"Incomplete, vague","synonyms":"-"}]},{"id":"ana-C13Q3","q":"INVENTORY : STOCK","opts":{"A":"calculation : ledger","B":"poll : balloting","C":"survey : territory","D":"census : population","E":"petition : names"},"ans":"D","exp":"Relationship: Official Count : What's Counted. An inventory is an official count of stock; a census is an official count of population. (A) A ledger is where calculations get recorded, not an official count of a single category of entity. (B) Poll and balloting are both about voting itself, not a counting-list relationship like inventory/census. (C) A survey of territory gathers many kinds of information, not just a numerical count. (E) A petition contains names but isn't itself an official counting process. Remember: Inventory counts goods, Census counts people - both are formal counting procedures.","src":"Bangladesh Commerce Bank-2006; Eastern Bank-2005","vocab":[{"word":"Census","meaning":"An official population count","synonyms":"-"}]},{"id":"ana-C13Q4","q":"LOGIC : REASONING","opts":{"A":"sensitivity : morality","B":"arrogance : leadership","C":"ethics : behavior","D":"creativity : enthusiasm","E":"bravery : charisma"},"ans":"C","exp":"Relationship: Governing Principles : What They Govern. Logic governs reasoning (how we think); ethics governs behavior (how we act). (A) Having sensitivity doesn't necessarily make someone moral - no governing relationship. (B) Arrogance isn't a guiding principle for leadership; it's a flaw, not a governing framework. (D) Creativity and enthusiasm can complement each other but neither governs the other. (E) Bravery and charisma are separate traits with no governance relationship. The key word is 'governs': Logic governs Reasoning, Ethics governs Behavior.","src":"IFIC Bank (PO)-2011; Warid Telecom-2006","vocab":[{"word":"Ethics","meaning":"Moral principles governing behavior","synonyms":"-"}]},{"id":"ana-C13Q5","q":"MIMICRY : CAMOUFLAGE","opts":{"A":"photosynthesis : pollination","B":"territoriality : migration","C":"hibernation : generation","D":"mutation : variation","E":"digestion : rumination"},"ans":"D","exp":"Relationship: Biological Process : Its Direct Result. Mimicry results in camouflage (concealment); genetic mutation results in variation (diversity) among offspring. Both pairs show a biological cause producing a specific observable result. (A) Photosynthesis doesn't cause pollination - they're two unrelated plant processes. (B) Protecting territory and migrating away from it aren't cause-and-effect of each other. (C) Hibernation doesn't cause new generations to form. (E) Rumination (re-chewing) is actually PART of the digestion process, not its separate result.","src":"IFIC Bank (PO)-2011","vocab":[{"word":"Mutation","meaning":"A genetic change","synonyms":"-"},{"word":"Rumination","meaning":"Re-chewing of regurgitated food","synonyms":"-"}]},{"id":"ana-C13Q6","q":"APPREHENSION : TERROR","opts":{"A":"interest : conspiracy","B":"affection : adoration","C":"indifference : animosity","D":"reluctance : termination","E":"anxiety : faith"},"ans":"B","exp":"Relationship: Degree of Intensity. Terror is an extreme form of apprehension (mild fear); adoration is an extreme form of affection (mild fondness). (A) Interest escalating into conspiracy doesn't fit - conspiracy is a planned scheme, not simply 'more interest.' (C) Indifference and animosity are entirely different emotions, not the same feeling at different intensities. (D) Reluctance doesn't naturally escalate into termination - unrelated outcomes. (E) Anxiety and faith are opposite-feeling states, not a single emotion scaled up. Other intensity pairs: Mist:Fog, Cool:Cold, Sad:Miserable.","src":"-","vocab":[{"word":"Apprehension","meaning":"Mild fear/unease","synonyms":"-"},{"word":"Adoration","meaning":"Intense love/admiration","synonyms":"-"}]},{"id":"ana-C13Q7","q":"LUMBER : GRACE","opts":{"A":"dissemble : pretense","B":"relent : energy","C":"castigate : justice","D":"waver : resolution","E":"insinuate : subtlety"},"ans":"D","exp":"Relationship: Action : Quality It Lacks. To lumber (walk heavily/clumsily) is to move without grace; to waver (be indecisive) is to act without resolution (firm decisiveness). (A) Dissembling and pretense are actually synonymous/supportive - dissembling IS pretending, not lacking it. (B) Relenting (softening) has no direct logical link to a lack of energy. (C) Castigating (scolding) and justice don't show a lack relationship. (E) Insinuating actually REQUIRES subtlety to pull off - a supportive relationship, not a lack. Try building the sentence 'X lacks Y' to test each option: 'Lumber lacks Grace' ✓, 'Waver lacks Resolution' ✓.","src":"-","vocab":[{"word":"Lumber","meaning":"To move heavily/clumsily","synonyms":"-"},{"word":"Waver","meaning":"To be indecisive","synonyms":"-"}]},{"id":"ana-C13Q8","q":"CAUSTIC : EAT AWAY","opts":{"A":"hormone : inhibit","B":"reagent : bind","C":"explosive : destroy","D":"synthetic : substitute","E":"desiccant : dry"},"ans":"E","exp":"Relationship: Substance : Its Characteristic Function. A caustic substance's function is to eat away/corrode; a desiccant's function is to dry things out. Both pairs match a chemical agent to its defining action. (A) Not all hormones inhibit - many actually stimulate, so this isn't a reliable defining function. (B) A reagent's purpose is to trigger a chemical reaction, not specifically to bind. (C) Explosive:destroy is plausible, but it's a sudden, violent action, unlike the steady chemical action both caustic and desiccant share. (D) 'Synthetic' just describes how something is made, not a functional action like eating away or drying. Tip: a small white packet in shoe boxes or medicine bottles is a desiccant, whose job is absorbing moisture to keep things dry.","src":"-","vocab":[{"word":"Desiccant","meaning":"A drying agent","synonyms":"-"},{"word":"Caustic","meaning":"Corrosive, able to burn/eat away","synonyms":"-"}]},{"id":"ana-C13Q9","q":"MALINGERER : DUTY","opts":{"A":"scholar : pedantry","B":"recluse : humanity","C":"rebel : responsibility","D":"miser : wealth","E":"patron : criticism"},"ans":"B","exp":"Relationship: Person : What They Habitually Avoid. A malingerer (someone faking illness) always avoids duty; a recluse always avoids humanity/society. (A) A scholar may display pedantry, but that's not something they avoid. (C) A rebel disobeys rules, but 'avoiding responsibility' isn't as deep or defining as a recluse's deliberate avoidance of all society. (D) A miser doesn't avoid wealth - they HOARD it, the opposite. (E) There's no fixed rule that patrons avoid criticism. Remember: a malingerer fakes illness to dodge duty; a recluse deliberately withdraws from people.","src":"-","vocab":[{"word":"Malingerer","meaning":"One who fakes illness to avoid work","synonyms":"-"},{"word":"Recluse","meaning":"One who avoids society","synonyms":"-"}]},{"id":"ana-C13Q10","q":"TEACHER : CERTIFICATION","opts":{"A":"driver : license","B":"officer : handcrafts","C":"librarian : book","D":"mechanic : tool","E":"architect : blueprint"},"ans":"A","exp":"Relationship: Profession : Required Official Credential. A teacher needs certification to teach; a driver needs a license to drive. Both are legally required documents to practice that role. (B) An officer has no specific relationship with handcrafts as a credential. (C) A book is what a librarian works WITH, not a credential proving their qualification. (D) Tools are equipment a mechanic uses, not a legal certification. (E) A blueprint is the OUTPUT of an architect's work, not their professional credential. Key credential words: Certification, License, Diploma, Degree, Warrant - all are legal permissions to practice a profession.","src":"-","vocab":[{"word":"Certification","meaning":"Official credential proving qualification","synonyms":"-"}]},{"id":"ana-C13Q11","q":"FOOD : NOURISH","opts":{"A":"organ : secrete","B":"fluids : circulate","C":"cells : degenerate","D":"antibodies : protect","E":"fats : saturate"},"ans":"D","exp":"Relationship: Object : Its Main Function. Food's main function is to nourish the body; antibodies' main function is to protect the body. (A) Not all organs secrete (e.g., bone doesn't), so this isn't a reliable main function. (B) Circulating is a fluid's state/behavior, not really its 'purpose.' (C) Cell degeneration is a negative biological process, not a main function. (E) Saturation describes a fat's chemical state, not its function. The pattern here is a thing's defining, primary purpose in the body.","src":"-","vocab":[{"word":"Antibodies","meaning":"Proteins that fight infection","synonyms":"-"}]},{"id":"ana-C13Q12","q":"HACK : CARVE","opts":{"A":"grind : polish","B":"snip : mince","C":"hew : fell","D":"whet : blunt","E":"gouge : engrave"},"ans":"E","exp":"Relationship: Crude/Rough Action : Precise/Fine Action. To hack is to cut roughly; to carve is to cut with skill and precision. To gouge is to dig out roughly; to engrave is to cut with fine, precise detail. Both pairs go from rough to precise. (A) Grinding then polishing is a sequential process, not a rough-vs-precise contrast of the same basic action. (B) Snip and mince differ in TOOL (scissors vs. knife), not in roughness vs. precision. (C) Hew and fell are nearly synonymous (both about cutting down a tree), no precision contrast. (D) Whet (sharpen) and blunt are direct opposites, not a roughness scale.","src":"-","vocab":[{"word":"Gouge","meaning":"To dig out roughly","synonyms":"-"},{"word":"Engrave","meaning":"To cut a design precisely","synonyms":"-"}]},{"id":"ana-C13Q13","q":"DETOXIFY : POISON","opts":{"A":"determine : certainty","B":"destabilize : deviance","C":"disguise : costume","D":"dissolve : liquid","E":"dehydrate : water"},"ans":"E","exp":"Relationship: Action that Removes a Substance. To detoxify is to remove poison; to dehydrate is to remove water. (A) Determining produces certainty (a result), not a removal. (B) Destabilizing and deviance don't show a clean removal logic. (C) Disguise uses a costume - that's a using relationship, not removing. (D) Dissolving means becoming mixed INTO a liquid, the opposite of removing it. The 'De-' prefix here clearly means 'remove/away,' as in De-toxify, De-hydrate, De-forest.","src":"-","vocab":[{"word":"Dehydrate","meaning":"To remove water from","synonyms":"-"}]},{"id":"ana-C13Q14","q":"SUPERIMPOSE : ABOVE","opts":{"A":"permeate : beside","B":"focus : around","C":"insert : between","D":"splice : below","E":"fuse : behind"},"ans":"C","exp":"Relationship: Action : Spatial Location It Implies. To superimpose is to place something ABOVE another; to insert is to place something BETWEEN two things. Both pairs match an action to the specific location word it implies. (A) Permeate means spreading through something entirely, not specifically 'beside' it. (B) Focus means concentrating AT a point, not 'around' it. (D) Splice means joining ends together, with no specific 'below' positioning. (E) Fuse means merging into one, with no specific 'behind' positioning. Visualize each verb: Superimpose=a layer ABOVE another; Insert=something placed BETWEEN/INTO.","src":"-","vocab":[{"word":"Superimpose","meaning":"To place on top of","synonyms":"-"}]},{"id":"ana-C13Q15","q":"TAMPER : ADJUST","opts":{"A":"misrepresent : communicate","B":"warp : deform","C":"confess : tell","D":"mar : deface","E":"undermine : stop"},"ans":"A","exp":"Relationship: Dishonest Version : Neutral Version of Same Action. Adjusting is neutral; tampering is adjusting dishonestly/harmfully. Communicating is neutral; misrepresenting is communicating dishonestly/falsely. (B) Warp and deform are near-synonyms, with no honest-vs-dishonest contrast. (C) Confessing and telling are both honest acts - no dishonesty angle. (D) Mar and deface are also near-synonyms, both already negative, with no neutral-to-negative contrast. (E) Undermining and stopping don't share Tamper/Adjust's specific dishonest-intent logic. The pattern is 'Ethical vs Unethical' - check whether the first word adds a malicious intent to the second's neutral action.","src":"-","vocab":[{"word":"Misrepresent","meaning":"To communicate falsely/misleadingly","synonyms":"-"}]},{"id":"ana-C13Q16","q":"METAPHOR : LITERAL","opts":{"A":"biography : accurate","B":"melody : spoken","C":"poem : rhythmic","D":"anthem : patriotic","E":"ballet : intricate"},"ans":"B","exp":"Relationship: By Definition, Cannot Be. A metaphor by definition is never literal; a melody by definition is never simply spoken (it's sung/played). (A) A biography typically SHOULD be accurate - that's a desirable trait, not an impossibility. (C) Rhythm IS a typical, expected feature of poems - a supporting trait, not contradictory. (D) Anthems usually ARE patriotic - again supportive, not contradictory. (E) Ballet often IS intricate - supportive, not contradictory. The logic: if something IS one thing, it logically CANNOT also be the contradictory other thing - exactly like Metaphor/Literal and Melody/Spoken.","src":"-","vocab":[{"word":"Literal","meaning":"Following the exact/plain meaning","synonyms":"-"}]},{"id":"ana-C13Q17","q":"COURAGE : RASHNESS","opts":{"A":"generosity : prodigality","B":"temperance : modesty","C":"mettle : spirit","D":"honor : humility","E":"compassion : contempt"},"ans":"A","exp":"Relationship: Virtue : Its Excessive/Negative Form. Rashness is courage taken to an excessive, reckless extreme; prodigality is generosity taken to an excessive, wasteful extreme. (B) Temperance and modesty are both positive virtues with no excess relationship between them. (C) Mettle and spirit are near-synonyms at the same level, no excess involved. (D) Honor and humility can complement each other, but neither is an excess of the other. (E) Compassion and contempt are direct opposites, not virtue-and-its-excess. This follows Aristotle's 'Golden Mean': too much of a good virtue becomes a vice.","src":"-","vocab":[{"word":"Rashness","meaning":"Excessive, reckless boldness","synonyms":"-"},{"word":"Prodigality","meaning":"Excessive/wasteful spending","synonyms":"-"}]},{"id":"ana-C13Q18","q":"PRESCIENCE : FUTURE","opts":{"A":"irrationality : sanity","B":"predictability : past","C":"irascibility : emotions","D":"erudition : esoterica","E":"talkativeness : loquacity"},"ans":"D","exp":"Relationship: Special Knowledge : Its Subject Matter. Prescience is special knowledge about the future; erudition is deep scholarly knowledge about esoterica (obscure/difficult subjects). (A) Irrationality and sanity are direct opposites, not a knowledge-and-subject pair. (B) Predictability is about FORESEEING events, but the past has already happened - logically mismatched. (C) Irascibility (short temper) is itself an emotion, not knowledge about a subject. (E) Talkativeness and loquacity are synonyms, with no knowledge-subject relationship.","src":"-","vocab":[{"word":"Prescience","meaning":"Foreknowledge of the future","synonyms":"-"},{"word":"Erudition","meaning":"Deep scholarly knowledge","synonyms":"-"},{"word":"Esoterica","meaning":"Obscure/specialized subjects","synonyms":"-"}]}]},{"id":"ana-14","title":"GRE Analogy Test-14","questions":[{"id":"ana-C14Q1","q":"HAMMER : CARPENTER","opts":{"A":"brick : mason","B":"road : driver","C":"kitchen : cook","D":"letter : secretary","E":"knife : butcher"},"ans":"E","exp":"Relationship: Tool : User. A hammer is the tool a carpenter uses; a knife is the tool a butcher uses. (A) A brick is a mason's raw MATERIAL, not their tool - different relationship type. (B) A road is a driver's workplace/location, not a tool they use. (C) A kitchen is a cook's workplace, not a tool. (D) A letter is a secretary's work output, not a tool. A tool is something you work WITH and that remains intact after use - brick and paper are raw materials, consumed or transformed by the work.","src":"-","vocab":[{"word":"-","meaning":"-","synonyms":"-"}]},{"id":"ana-C14Q2","q":"EMBRACE : AFFECTION","opts":{"A":"jeer : sullenness","B":"glower : ridicule","C":"frown : displeasure","D":"cooperation : respect","E":"flattery : love"},"ans":"C","exp":"Relationship: Physical Gesture : Emotion Expressed. An embrace physically expresses affection; a frown physically expresses displeasure. Both are universal non-verbal signals of an inner feeling. (A) Jeering already IS the action of mocking, not specifically tied to sullenness as its expressed emotion. (B) Glowering (an angry stare) expresses anger, not ridicule. (D) Cooperation is an action/policy, not a direct physical gesture of emotion. (E) Flattery doesn't necessarily mean love - it's often insincere. Compare: a smile signals happiness, just as embrace signals affection and frown signals displeasure.","src":"-","vocab":[{"word":"Glower","meaning":"To stare angrily","synonyms":"-"}]},{"id":"ana-C14Q3","q":"PLUMMET : FALL","opts":{"A":"radiate : glow","B":"converge : attract","C":"flounder : move","D":"swerve : turn","E":"flow : ebb"},"ans":"D","exp":"Relationship: Sudden/Extreme Version : General Action. To plummet is to fall very suddenly and fast; to swerve is to turn very suddenly and sharply. Both pairs show an intense, abrupt version of the general action. (A) Radiating is gentle/glowing light, the opposite of an intense, sudden event. (B) Converging and attracting are nearly synonymous, with no suddenness factor. (C) Floundering means struggling to move, not a fast or sudden version of moving. (E) Flow and ebb are opposites (rising vs. falling tide), not intensity-related.","src":"-","vocab":[{"word":"Swerve","meaning":"To turn suddenly","synonyms":"-"}]},{"id":"ana-C14Q4","q":"GRAZING : FORAGERS","opts":{"A":"skipping : readers","B":"strolling : prisoners","C":"weeding : gardeners","D":"stalking : hunters","E":"resting : pickers"},"ans":"D","exp":"Relationship: Characteristic Action : Person Who Does It. Grazing/foraging for food is foragers' characteristic way of finding food; stalking is hunters' characteristic way of finding prey. Both describe the instinctive method of searching tied to that role. (A) Skipping parts while reading isn't a core survival or professional method for readers. (B) Strolling isn't prisoners' defining or purposeful method of doing anything. (C) Weeding is just routine maintenance, not an instinctive 'searching' method like foraging or hunting. (E) Resting isn't pickers' method of working - it's the absence of work. This analogy is rooted in survival/searching instincts tied to a role.","src":"-","vocab":[{"word":"Foragers","meaning":"Those who search for food","synonyms":"-"},{"word":"Stalking","meaning":"Pursuing prey stealthily","synonyms":"-"}]},{"id":"ana-C14Q5","q":"TEXT : EXTEMPORIZE","opts":{"A":"score : improvise","B":"style : create","C":"exhibit : demonstrate","D":"diagram : realize","E":"sketch : outline"},"ans":"A","exp":"Relationship: Absence of. To extemporize is to speak without a written text; to improvise is to perform music without a written score. Both pairs show performing skillfully without the normally-required written guide. (B) Style isn't a 'written guide' the way text or score is, so there's no absence-relationship here. (C) Exhibit and demonstrate are near-synonyms, with no missing-guide logic. (D) A diagram helps you 'realize' (understand) something - not about performing without a guide. (E) Sketch and outline are both preliminary drafts, near-synonymous, no absence relationship. What text is to a speech, score is to music - both are the written guide one performs WITHOUT when improvising.","src":"-","vocab":[{"word":"Extemporize","meaning":"To speak without preparation","synonyms":"-"},{"word":"Score","meaning":"Written musical notation","synonyms":"-"}]},{"id":"ana-C14Q6","q":"PERTINENT : RELEVANCE","opts":{"A":"insistent : rudeness","B":"benevolent : perfection","C":"redundant : superfluity","D":"prevalent : universality","E":"aberrant : uniqueness"},"ans":"C","exp":"Relationship: Adjective : Matching Noun (synonym pair). Being pertinent means having relevance; being redundant means having superfluity (excess). Both pairs match an adjective to its exact defining noun. (A) Being insistent doesn't define rudeness - those are separate, unrelated traits. (B) Being benevolent (kind) doesn't require perfection - no defining link. (D) Prevalent (common) and universality (true everywhere/always) differ in scale - prevalent things aren't necessarily universal. (E) Being aberrant (abnormal) doesn't equal uniqueness - abnormality is usually viewed negatively, unlike the neutral/positive sense of unique. Redundant and Superfluity both express the exact same idea: unnecessary excess.","src":"Janata Bank Ltd (EO(EEE); Engr-Civil)-2017, Warid Telecom-2006","vocab":[{"word":"Redundant","meaning":"Unnecessary, excessive","synonyms":"-"},{"word":"Superfluity","meaning":"Excess, surplus","synonyms":"-"}]},{"id":"ana-C14Q7","q":"ASSERT : BELABOR","opts":{"A":"tend : fuss","B":"refine : temper","C":"describe : demean","D":"resemble : portray","E":"contaminate : purge"},"ans":"A","exp":"Relationship: Action : Its Excessive Version. To assert is to state firmly; to belabor is to over-state the same point excessively. To tend (care for) is normal; to fuss is to over-care excessively. Both pairs go from a normal action to its annoying excess. (B) Refine and temper are both about improving quality, with no clear excess relationship. (C) Describing and demeaning are unrelated - one is neutral, one is insulting, not normal-vs-excessive. (D) Resemble and portray are nearly synonymous, no excess relationship. (E) Contaminate and purge are direct opposites, not normal-vs-excessive of the same action.","src":"-","vocab":[{"word":"Belabor","meaning":"To discuss excessively","synonyms":"-"},{"word":"Fuss","meaning":"To worry/attend to excessively","synonyms":"-"}]},{"id":"ana-C14Q8","q":"TRANSGRESSION : MORALITY","opts":{"A":"mistake : probity","B":"invitation : hospitality","C":"gift : generosity","D":"presumption : propriety","E":"misconception : curiosity"},"ans":"D","exp":"Relationship: Violation : Standard Violated. A transgression violates morality's standards; a presumption (overstepping boundaries) violates propriety's standards (social etiquette). (A) Having probity (integrity) doesn't logically prevent mistakes - no direct violation link. (B) Invitation is a positive expression OF hospitality, not a violation of it. (C) A gift positively expresses generosity, not a violation. (E) Misconception may arise from curiosity, but curiosity isn't a 'standard' that gets violated. Propriety means what society considers proper; presumption is the violation of overstepping that.","src":"-","vocab":[{"word":"Presumption","meaning":"Overstepping with unwarranted boldness","synonyms":"-"},{"word":"Propriety","meaning":"Conformity to accepted standards","synonyms":"-"}]},{"id":"ana-C14Q9","q":"BLOWHARD : BOASTFUL","opts":{"A":"cynic : perspicacious","B":"highbrow : grandiloquent","C":"exhibitionist : embarrassed","D":"misanthrope : affected","E":"toady : obsequious"},"ans":"E","exp":"Relationship: Person : Their Defining Trait. A blowhard is by definition boastful; a toady (a flatterer) is by definition obsequious (excessively submissive/fawning). (A) A cynic might be perspicacious (sharp-witted), but that's a coincidental quality, not their defining trait the way boastful defines a blowhard. (B) Not all highbrow/intellectual people are grandiloquent (pompous speakers) - not a strict definition. (C) Exhibitionists are typically NOT embarrassed - that's actually the opposite of their nature. (D) A misanthrope (people-hater) isn't defined by being 'affected' (artificial) - mismatched trait. Words like Sycophant/Toady/Flatterer are typically paired with Obsequious/Fawning/Servile.","src":"-","vocab":[{"word":"Toady","meaning":"A servile flatterer","synonyms":"Sycophant"},{"word":"Obsequious","meaning":"Excessively submissive/eager to please","synonyms":"Fawning, Servile"}]},{"id":"ana-C14Q10","q":"SHOULDER : ROADWAY","opts":{"A":"margin : page","B":"cord : weaving","C":"socket : bulb","D":"curtain : scenery","E":"handle : pitcher"},"ans":"A","exp":"Relationship: Edge/Border : Main Object. A shoulder is the bordering edge of a roadway; a margin is the bordering edge of a page. (B) A cord may be part of weaving, but it's not specifically a border/edge of it. (C) A socket holds a bulb (Container:Object), not a border relationship. (D) A curtain covers scenery, but isn't the scenery's edge/boundary. (E) A handle is a part (Part-Whole) of a pitcher, not its surrounding border. Words for 'edge/border' include Margin, Shoulder, Rim, Brink, Verge.","src":"Warid Telecom-2006","vocab":[{"word":"Shoulder","meaning":"The edge area of a road","synonyms":"-"},{"word":"Margin","meaning":"The blank border of a page","synonyms":"-"}]},{"id":"ana-C14Q11","q":"TADPOLE : FROG","opts":{"A":"worm : beetle","B":"caterpillar : butterfly","C":"carrion : vulture","D":"calf : horse","E":"drone : honeybee"},"ans":"B","exp":"Relationship: Immature Stage : Mature Stage (metamorphosis). A tadpole is the immature stage of a frog; a caterpillar is the immature stage of a butterfly. (A) A beetle's larval stage is usually called a 'grub,' not a 'worm' - mismatched terminology. (C) Carrion is dead flesh that a vulture eats - a food relationship, not a life-stage relationship. (D) 'Calf' is specifically a baby cow, with no relationship to a baby horse (which is a 'foal'). (E) A drone is a male bee/class of bee, not a life-cycle stage. Similar metamorphosis pairs: Larva:Mosquito, Cygnet:Swan, Lamb:Sheep.","src":"-","vocab":[{"word":"Tadpole","meaning":"The larval stage of a frog","synonyms":"-"}]},{"id":"ana-C14Q12","q":"CIRCUMFERENCE : CIRCLE","opts":{"A":"degree : angle","B":"area : cube","C":"perimeter : rectangle","D":"height : cylinder","E":"arc : ellipse"},"ans":"C","exp":"Relationship: Boundary Measurement : Shape. Circumference is the boundary of a circle; perimeter is the boundary of a rectangle. (A) A degree is a UNIT for measuring angles, not the boundary measurement itself. (B) Area measures the SPACE inside a shape, not its boundary length. (D) Height is just one dimension of a cylinder, not its full boundary. (E) An arc is only a PART of a boundary, not the whole boundary. For circles it's 'Circumference'; for any other polygon it's 'Perimeter.'","src":"-","vocab":[{"word":"Perimeter","meaning":"The total boundary length of a shape","synonyms":"-"}]},{"id":"ana-C14Q13","q":"HEDONIST : PLEASURE","opts":{"A":"humanist : pride","B":"ascetic : tolerance","C":"stoic : sacrifice","D":"recluse : privacy","E":"idealist : compromise"},"ans":"D","exp":"Relationship: Person : Their Driving Goal. A hedonist's life goal is pleasure; a recluse's driving goal is privacy/solitude. (A) A humanist's main goal is human welfare, not pride. (B) An ascetic practices restraint, but tolerance isn't their defining single goal - their goal is closer to self-denial. (C) A stoic endures hardship, but 'sacrifice' isn't quite their defining philosophy - it's closer to 'detachment.' (E) This is the opposite: idealists typically REFUSE to compromise, not pursue it. Knowing each type's core driving philosophy (Hedonist, Ascetic, Stoic, Recluse, Epicurean) makes this fast to answer.","src":"-","vocab":[{"word":"Hedonist","meaning":"One who seeks pleasure as life's goal","synonyms":"-"},{"word":"Recluse","meaning":"One who withdraws from society","synonyms":"-"}]},{"id":"ana-C14Q14","q":"NONCONFORMIST : NORM","opts":{"A":"pessimist : rule","B":"extremist : conviction","C":"criminal : motive","D":"deviant : dogma","E":"heretic : orthodoxy"},"ans":"E","exp":"Relationship: Person : Standard They Oppose. A nonconformist goes against societal norms; a heretic goes against established orthodoxy (official religious belief). (A) Being pessimistic doesn't necessarily mean opposing rules - unrelated traits. (B) An extremist HOLDS strong convictions - they're over-believers, not opponents of conviction itself. (C) A criminal's motive is the reason behind their crime, not a standard they're opposing. (D) 'Deviant' usually describes behavioral departure, while 'Nonconformist' and 'Heretic' describe ideological/belief-based rebellion - a more precise match than this option offers. The theme here is Society vs. Individual rebellion against an established standard.","src":"-","vocab":[{"word":"Heretic","meaning":"One who opposes established belief","synonyms":"-"},{"word":"Orthodoxy","meaning":"Established, accepted belief","synonyms":"-"}]},{"id":"ana-C14Q15","q":"INVEST: CAPITAL","opts":{"A":"gamble : stake","B":"tax : income","C":"play : sport","D":"race : record","E":"create : product"},"ans":"A","exp":"Relationship: Risk-Taking Action : Resource Risked. To invest, you risk capital; to gamble, you risk a stake. Both pairs involve putting a resource at risk for potential gain. (B) Tax is taken FROM income, not a risk-resource relationship - it's mandatory, not voluntary risk. (C) Play and sport is an Action:Category relationship, with no risk/resource involved. (D) A record is a result of racing, not a resource put at risk beforehand. (E) Creating produces a product, but there's no specific 'risked resource' like capital or a stake involved. Both Investment and Gambling share the core concept of Risk and Return.","src":"Warid Telecom-2006, Eastern Bank-2005","vocab":[{"word":"Stake","meaning":"Money risked in a bet","synonyms":"-"}]},{"id":"ana-C14Q16","q":"PREEN : SELF-SATISFACTION","opts":{"A":"fume : anger","B":"inhibit : spontaneity","C":"regret : guilt","D":"result : cooperation","E":"brood : resolution"},"ans":"A","exp":"Relationship: Action : Emotion It Expresses. To preen is to display self-satisfaction; to fume is to display anger. Both are outward behaviors showing an inner emotional state. (B) Inhibiting suppresses spontaneity, rather than expressing any emotion outward. (C) Regret might follow from guilt, but 'regret' itself is an emotion, not a physical/behavioral expression of guilt the way preen/fume are behaviors. (D) Result and cooperation share no emotional-expression relationship. (E) Brooding (sulking) doesn't produce resolution - if anything it deepens indecision, the opposite outcome. Similar body-language-to-emotion pairs: Wince:Pain, Smirk:Smugness.","src":"-","vocab":[{"word":"Preen","meaning":"To display self-satisfied pride","synonyms":"-"},{"word":"Fume","meaning":"To show silent anger","synonyms":"-"}]},{"id":"ana-C14Q17","q":"DIGRESSIVE : STATEMENT","opts":{"A":"connotative : definition","B":"slanderous : slur","C":"tangential : presupposition","D":"biased : opinion","E":"circuitous : route"},"ans":"E","exp":"Relationship: Characteristic Adjective : Object Described. A digressive statement wanders off-topic; a circuitous route wanders indirectly instead of going straight. Both describe something that takes an indirect, roundabout path. (A) Definitions are normally direct/clear; 'connotative' (implied meaning) isn't really a defining trait of definitions in general. (B) Slanderous and slur are near-synonyms (a slur often IS slanderous), not a wandering-path relationship. (D) Opinions CAN be biased, but that doesn't describe a roundabout/indirect path. (C) Tangential does mean 'off the main point,' similar in spirit, but its pairing with 'presupposition' doesn't match as cleanly as circuitous:route does. When something is 'indirect' rather than 'direct,' think Digressive, Circuitous, Meandering, Sinuous.","src":"-","vocab":[{"word":"Digressive","meaning":"Wandering off the main topic","synonyms":"-"},{"word":"Circuitous","meaning":"Roundabout, indirect","synonyms":"-"}]},{"id":"ana-C14Q18","q":"CHICANERY : CLEVER","opts":{"A":"expertise : knowledge","B":"certainly : doubtful","C":"gullibility : skeptical","D":"machination : heedless","E":"tactlessness : truthful"},"ans":"E","exp":"Relationship: Negative Outcome : Positive Quality Taken Too Far. Excessive cleverness can curdle into chicanery (trickery/deceit); excessive truthfulness, said without tact, can curdle into tactlessness. Both pairs show a good quality misapplied or overdone into something negative. (A) Knowledge producing expertise is a positive cause-effect, not a quality turning negative. (B) Certainly and doubtful are direct opposites, not a quality-turning-negative relationship. (C) Gullibility and skeptical are also opposites. (D) Plotting (machination) actually requires being CAREFUL/alert, the opposite of heedless. The logic here: 'telling the truth is good, but stating unpleasant truth too bluntly becomes tactlessness.'","src":"-","vocab":[{"word":"Chicanery","meaning":"Trickery, deception","synonyms":"-"},{"word":"Tactlessness","meaning":"Lack of sensitivity in speech/action","synonyms":"-"}]}]},{"id":"ana-15","title":"GRE Analogy Test-15","questions":[{"id":"ana-C15Q1","q":"SOLDIER : ARMY","opts":{"A":"gas : vapor","B":"music : harmony","C":"ruler : height","D":"negative : exposure","E":"element : compound"},"ans":"E","exp":"Relationship: Individual Unit : Collective Whole. Many soldiers form an army; many elements combine to form a compound. Both pairs show the smallest unit and the larger entity built from many of those units. (A) Gas and vapor are just two names for similar states of matter, not a unit-to-collection relationship. (B) Music having harmony is a trait, not 'many musics forming a harmony.' (C) A ruler measures height (Tool:Purpose), unrelated to a collective. (D) A negative produces an exposure in photography, but that's not a many-units-form-one-whole relationship. Other Part-to-Whole pairs: Tree:Forest, Star:Galaxy, Member:Committee.","src":"-","vocab":[{"word":"Compound","meaning":"A substance formed from combined elements","synonyms":"-"}]},{"id":"ana-C15Q2","q":"SLUR : SPEECH","opts":{"A":"erase : drawing","B":"smudge : writing","C":"confuse : puzzle","D":"crumble : construction","E":"decrease : volume"},"ans":"B","exp":"Relationship: Action that Makes Something Unclear. To slur is to make speech unclear/blurred; to smudge is to make writing unclear/blurred. (A) Erasing completely removes a drawing, not just blurring it - a stronger, different action. (C) Confuse and puzzle are near-synonyms, not an unclear-making relationship. (D) Crumbling destroys a construction entirely, not a blurring effect. (E) Decreasing volume is about quantity, with no connection to unclear/blurred. Match the medium: Static (sound), Blur (image), Smudge (writing).","src":"-","vocab":[{"word":"Slur","meaning":"To speak unclearly/run words together","synonyms":"-"},{"word":"Smudge","meaning":"To blur/smear","synonyms":"-"}]},{"id":"ana-C15Q3","q":"LOCOMOTIVE : FLATCAR","opts":{"A":"bus : passenger","B":"airplane : cargo","C":"bicycle : frame","D":"tugboat : barge","E":"automobile : chassis"},"ans":"D","exp":"Relationship: Power Source : Vehicle It Pulls/Tows. A locomotive pulls a flatcar; a tugboat pulls/tows a barge. (A) A bus carries passengers inside it, not towing a separate vehicle. (B) A cargo plane carries cargo INSIDE itself, not towing a separate cargo vehicle. (C) A frame is a structural PART of a bicycle (Part-Whole), not a separate vehicle being towed. (E) A chassis is a car's own structural body, not a separate towed vehicle. Watch for towing/pulling words: Tow, Pull, Carry, Drag.","src":"-","vocab":[{"word":"Flatcar","meaning":"A flat railway freight car","synonyms":"-"},{"word":"Barge","meaning":"A flat-bottomed cargo boat","synonyms":"-"}]},{"id":"ana-C15Q4","q":"TRICKLE : GUSH","opts":{"A":"breath : exhale","B":"amble : move","C":"stain : blotch","D":"warm : sear","E":"teach : educate"},"ans":"D","exp":"Relationship: Degree of Intensity. A trickle is a small flow, a gush is a large/forceful flow; warm is mild heat, sear is intense/burning heat. (A) Breath and exhale are simply the same basic process, no intensity scale. (B) Amble is a Type:Category relationship with 'move' (a type of moving, not an intensity scale). (C) Stain and blotch are near-synonyms with no clear sky-high intensity jump. (E) Teach and educate are near-synonyms at roughly the same level. Ask: 'is the first word a mild version of the second?' Similar: Drizzle:Downpour, Miffed:Infuriated.","src":"-","vocab":[{"word":"Sear","meaning":"To burn intensely","synonyms":"-"}]},{"id":"ana-C15Q5","q":"CHARADE : WORD","opts":{"A":"symbol : algebra","B":"joke : riddle","C":"sign : direction","D":"mime : story","E":"lie : truth"},"ans":"D","exp":"Relationship: Wordless Performance Style : Content Conveyed. In charades, gestures convey a word; in mime, gestures convey a story. Both use silent acting to communicate content. (A) A symbol is part of algebra's notation system, not a wordless performance. (B) Joke and riddle are both verbal/written forms, with no silent-acting element. (C) A sign gives direction, but isn't itself a performance style. (E) Lie and truth are opposites, unrelated to performance. Words for wordless performance: Mime, Charade, Pantomime, Gesture.","src":"-","vocab":[{"word":"Mime","meaning":"Acting without words","synonyms":"Pantomime"}]},{"id":"ana-C15Q6","q":"EPAULET : SHOULDER","opts":{"A":"ring : finger","B":"tassel : wrist","C":"cravat : waist","D":"sash : neck","E":"poncho : arm"},"ans":"A","exp":"Relationship: Ornament : Body Location Worn. An epaulet is worn on the shoulder; a ring is worn on the finger. (B) A tassel typically decorates fabric or a hat, not specifically the wrist. (C) A cravat is worn at the neck/throat, not the waist - location mismatch. (D) A sash is worn diagonally across the body/waist, not specifically the neck - location mismatch. (E) A poncho is a full garment, not a specific ornament for one body part. Other ornament:location pairs: Tiara:Head, Bracelet:Wrist, Glove:Hand.","src":"-","vocab":[{"word":"Epaulet","meaning":"A shoulder ornament on a uniform","synonyms":"-"},{"word":"Cravat","meaning":"A necktie/scarf","synonyms":"-"}]},{"id":"ana-C15Q7","q":"VERNACULAR : PLACE","opts":{"A":"landmark : tradition","B":"code : solution","C":"fingerprint : identity","D":"symptom : disease","E":"jargon : profession"},"ans":"E","exp":"Relationship: Specialized Language : Context It Belongs To. Vernacular is the everyday speech of a particular place; jargon is the specialized language of a particular profession. (A) A landmark may represent tradition, but it isn't a 'language' relationship. (B) Code might be solved to find a solution, but that's not a language-context pairing. (C) A fingerprint confirms identity (Sign:Meaning), not a language-context relationship. (D) A symptom reveals disease (Sign:Condition), not a language type tied to a context. Remember: Vernacular/Dialect for a region, Jargon for a profession.","src":"-","vocab":[{"word":"Vernacular","meaning":"The native language of a region","synonyms":"Dialect"},{"word":"Jargon","meaning":"Specialized terms of a profession","synonyms":"-"}]},{"id":"ana-C15Q8","q":"HEAT : CALORIES","opts":{"A":"liquid : gallons","B":"exercise : energy","C":"steam : pressure","D":"lamp : watts","E":"thermometer : degrees"},"ans":"A","exp":"Relationship: Quantity : Its Unit of Measurement. Heat is measured in calories; liquid (volume) is measured in gallons. (B) Exercise consumes energy, but that's not a unit-measurement relationship - it's cause-and-effect. (C) Steam creates pressure, but pressure isn't steam's measuring unit. (D) A lamp is an object, not a measurable quantity itself - watts measure power, not the lamp. (E) A thermometer is the INSTRUMENT used to measure degrees, not the quantity itself - a subtle trap, since 'Heat' here is the quantity, matching 'Liquid' as a quantity, not an instrument like thermometer.","src":"-","vocab":[{"word":"Calories","meaning":"Units of heat/energy","synonyms":"-"}]},{"id":"ana-C15Q9","q":"MARTIAL : MILITARY","opts":{"A":"basic : simplistic","B":"classic : musical","C":"cosmic : planetary","D":"runic : mysterious","E":"endemic : patriotic"},"ans":"D","exp":"Relationship: Synonymous adjective pair. Martial means relating to the military; runic means relating to mysterious/secret symbols (from ancient runes). (A) Basic and simplistic aren't fully synonymous - simplistic implies an oversimplification, a negative spin basic doesn't have. (B) Classical music exists, but 'classic' alone doesn't mean 'musical.' (C) Cosmic refers to the whole universe; planetary refers only to planets - different scope, not synonyms. (E) Endemic is a medical/biological term, unrelated to patriotism. 'Martial' derives from Mars (the god of war); 'Runic' derives from ancient runes connected to mystery/secrecy.","src":"-","vocab":[{"word":"Runic","meaning":"Relating to ancient mysterious symbols","synonyms":"-"}]},{"id":"ana-C15Q10","q":"DERMATOLOGIST : SKIN","opts":{"A":"dentist : organs","B":"optometrist : nerves","C":"oncologist : joints","D":"cardiologist : bones","E":"podiatrist : feet"},"ans":"E","exp":"Relationship: Specialist : Body Part They Treat. A dermatologist treats skin; a podiatrist treats feet. (A) A dentist treats teeth, not general organs. (B) An optometrist examines vision; nerve specialists are neurologists. (C) An oncologist treats cancer broadly, not specifically joints (that's an orthopedist/rheumatologist's domain). (D) A cardiologist treats the heart, not bones (an orthopedist's domain). Key specialists to remember: Ophthalmologist (eyes), Pediatrician (children), Dermatologist (skin), Podiatrist (feet), Hematologist (blood).","src":"-","vocab":[{"word":"Podiatrist","meaning":"A foot specialist","synonyms":"-"}]},{"id":"ana-C15Q11","q":"UNDERSTUDY : STAR","opts":{"A":"patient : surgeon","B":"deputy : sheriff","C":"secretary : executive","D":"clerk : judge","E":"groom : jockey"},"ans":"B","exp":"Relationship: Authorized Substitute : Principal Person. An understudy is authorized to step in for the star if needed; a deputy is authorized to take over the sheriff's duties if needed. (A) Patient and surgeon is a receiver/giver relationship, not substitute/principal. (C) A secretary assists an executive but doesn't formally take over their decision-making role if absent. (D) A clerk assists a judge but doesn't sit in the judge's seat in their absence. (E) A groom cares for a horse; if the jockey is absent, the groom doesn't race in their place. Look for Deputy, Substitute, Surrogate, Alternate, Understudy when one person is authorized to fill in for another.","src":"-","vocab":[{"word":"Understudy","meaning":"A substitute performer","synonyms":"-"}]},{"id":"ana-C15Q12","q":"SUSPICIOUS : PARANOID","opts":{"A":"envious : proud","B":"admiring : idolatrous","C":"joyous : virtuous","D":"furtive : forthright","E":"vicious : deceptive"},"ans":"B","exp":"Relationship: Degree of Intensity. Paranoid is suspicion taken to an extreme; idolatrous is admiration taken to an extreme (blind worship). (A) Envy and pride are two different emotions, not the same feeling scaled up. (C) Joyous and virtuous have no intensity relationship. (D) Furtive and forthright are direct opposites (secretive vs. open). (E) Vicious and deceptive are different traits, with no intensity progression between them. Build the sentence: 'Excessive suspicion = Paranoid,' 'Excessive admiration = Idolatrous.' Other examples: Angry:Furious, Small:Microscopic.","src":"-","vocab":[{"word":"Idolatrous","meaning":"Excessively/blindly admiring","synonyms":"-"}]},{"id":"ana-C15Q13","q":"GREENHOUSE : PLANT","opts":{"A":"refrigerator : milk","B":"well : water","C":"orchard : fruit","D":"incubator : infant","E":"tank : fuel"},"ans":"D","exp":"Relationship: Controlled Environment for Growth/Protection : Living Subject. A greenhouse provides controlled conditions for plant growth; an incubator provides controlled conditions for infant growth/safety. (A) A refrigerator preserves milk but doesn't promote its growth - storage, not growth. (B) A well simply holds water; it doesn't create growth conditions. (C) An orchard is where fruit naturally grows, but it's not an artificial, climate-controlled chamber. (E) A tank stores fuel; it's not a life-sustaining or growth-promoting environment. The key is 'artificial, controlled environment for living growth' - exactly matching Incubator and Greenhouse.","src":"-","vocab":[{"word":"Incubator","meaning":"A controlled chamber for infant care","synonyms":"-"}]},{"id":"ana-C15Q14","q":"ANACHRONISTIC : TIME","opts":{"A":"discordant : sound","B":"dilapidated : construction","C":"disreputable : personality","D":"contagious : illness","E":"nauseating : odor"},"ans":"A","exp":"Relationship: Out of Harmony With. Anachronistic means out of harmony with time (the wrong era); discordant means out of harmony with sound (clashing notes). (B) Dilapidated describes age/disrepair of a structure, not a 'mismatch' with anything else. (C) Disreputable is a personality trait, not a mismatch-with-context idea. (D) Contagious is simply a quality of disease (Type:Quality), not a harmony-mismatch. (E) Nauseating describes odor's intensity, not a mismatch concept. The core logic: Anachronistic = no harmony with time; Discordant = no harmony with sound.","src":"-","vocab":[{"word":"Anachronistic","meaning":"Out of its proper time period","synonyms":"-"},{"word":"Discordant","meaning":"Clashing, not harmonious","synonyms":"-"}]},{"id":"ana-C15Q15","q":"RIVER : GORGE","opts":{"A":"glacier : ice","B":"rain : cloud","C":"wind : dune","D":"delta : swamp","E":"lava : island"},"ans":"C","exp":"Relationship: Natural Agent : Landform It Creates. A river's flow erodes land to create a gorge; wind blows sand to create a dune. Both pairs show a natural force creating a specific landform. (A) Ice composes a glacier (Part-Whole), not a separate landform the glacier creates. (B) Rain comes FROM clouds (Source:Result reversed), but rain doesn't create clouds. (D) A delta and swamp are both wetland-adjacent features, but a delta doesn't specifically 'create' a swamp - not a clean causal link. (E) Lava can create an island, but river-erosion-creates-gorge and wind-deposit-creates-dune are far more standard, parallel geological processes. Key force:landform pairs: Water:Canyon, Glacier:Valley, Wind:Erosion.","src":"-","vocab":[{"word":"Gorge","meaning":"A deep ravine carved by water","synonyms":"-"},{"word":"Dune","meaning":"A mound of sand shaped by wind","synonyms":"-"}]},{"id":"ana-C15Q16","q":"STIPPLE : DOT","opts":{"A":"striate : band","B":"camouflage : target","C":"inscribe : drawing","D":"freckle : face","E":"wrinkle : angel"},"ans":"A","exp":"Relationship: Technique : Its Basic Unit. Stippling is done using dots; striating (marking with lines) is done using bands/stripes. Both pairs match an artistic technique to the unit-shape it's built from. (B) Camouflage conceals a target; it isn't a technique built from a specific repeated unit-shape. (C) Inscribing means engraving; it's not the smallest unit of a drawing. (D) Freckles appear on a face (Location), but a face isn't constructed FROM freckles - reversed logic. (E) Wrinkles and angels have no meaningful relationship at all. In craft/art analogies, focus on the smallest repeated unit: Mosaic:Tile (many tiles make a mosaic), Stipple:Dot (many dots make a stippled image).","src":"-","vocab":[{"word":"Stipple","meaning":"To create texture using small dots","synonyms":"-"},{"word":"Striate","meaning":"To mark with parallel lines/bands","synonyms":"-"}]},{"id":"ana-C15Q17","q":"GOURMAND : APPETITE","opts":{"A":"pedant : simplicity","B":"skinflint : thrift","C":"prodigal : energy","D":"daredevil : strength","E":"egotist : honesty"},"ans":"B","exp":"Relationship: Person : Their Defining Excessive Trait. A gourmand is defined by an excessive appetite; a skinflint (miser) is defined by excessive thrift (stinginess). (A) A pedant loves complexity/showing off knowledge, the opposite of valuing simplicity. (C) A prodigal wastes money/resources, not energy specifically - their defining trait is 'Extravagance,' not energy use. (D) A daredevil's defining trait is courage/recklessness, not physical strength - you can be a daredevil without being strong. (E) An egotist's defining trait is self-importance/conceit, not honesty. Watch character-trait words like Miser, Glutton, Spendthrift, Hermit - when a positive-sounding quality (like Thrift) pairs with a negative character type (like Skinflint), it signals 'taken to excess.'","src":"-","vocab":[{"word":"Gourmand","meaning":"One devoted to eating well/excessively","synonyms":"-"},{"word":"Skinflint","meaning":"An extremely stingy person","synonyms":"-"}]},{"id":"ana-C15Q18","q":"ROYALTY : PAYMENT","opts":{"A":"manuscript : page","B":"gratuity : check","C":"dividend : debt","D":"subpoena : writ","E":"client : fee"},"ans":"D","exp":"Relationship: Specific Type : General Category. A royalty is a specific type of payment; a subpoena is a specific type of writ (legal order). (A) A page is a part of a manuscript (Part-Whole), not a type/category relationship. (B) A gratuity could be a type of payment, but a check is a payment INSTRUMENT, not a payment category itself - mismatched logic. (C) A dividend is profit-sharing, not a type of debt. (E) A client pays a fee, but a client isn't a type/category of fee. The pattern is 'X is a specific type of Y' - context can differ (finance vs. law) as long as the relation (type-of) stays the same.","src":"Dutch Bangla Bank-2009, Eastern Bank-2005","vocab":[{"word":"Subpoena","meaning":"A legal order to appear in court","synonyms":"-"},{"word":"Writ","meaning":"A formal legal document/order","synonyms":"-"}]}]},{"id":"ana-16","title":"GRE Analogy Test-16","questions":[{"id":"ana-C16Q1","q":"REFLECTION : LIGHT","opts":{"A":"emotion : feeling","B":"echo : sound","C":"film : scene","D":"microscope : hearing","E":"iris : vision"},"ans":"B","exp":"Relationship: Effect : Cause (bouncing-back phenomenon). When light bounces back off a surface, it's called reflection; when sound bounces back, it's called echo. Both light and sound are waves, so they both produce this same bounce-back effect. (A) Emotion and feeling are near-synonyms, with no bounce-back relationship. (C) A scene is part of a film (Part-Whole), unrelated to reflection. (D) A microscope is for seeing, not hearing - a mismatched pairing. (E) The iris is an eye part needed for vision, but it isn't itself a reflection-type phenomenon. When a scientific principle appears, check if the options share that same underlying law - here, both light and sound are waves that reflect/echo.","src":"INU (BBA-Marketing) Set-1: 2009-10, Pubali Bank-2006, Warid Telecom-2006, Bangladesh Commerce Bank-2006, Mercantile Bank-2006, Eastern Bank-2005","vocab":[{"word":"Echo","meaning":"Repetition of sound by reflection","synonyms":"-"}]},{"id":"ana-C16Q2","q":"CARVE : TURKEY","opts":{"A":"slice : cake","B":"peel : peach","C":"mince : onion","D":"core : apple","E":"stew : prune"},"ans":"A","exp":"Relationship: Specific Cutting Action : Object Being Served. You carve a turkey to divide it into portions for serving; you slice a cake to divide it into portions for serving. Both are presentation-style cuts done specifically to serve food to guests. (B) Peeling removes a peach's skin - not a portion-dividing serving action. (C) Mincing chops onion into tiny bits - food prep, not a serving-style cut of a whole dish. (D) Coring removes an apple's center - not a serving-portion action. (E) Stewing is a cooking METHOD, not a cutting style. Carve and Slice both turn a 'whole' food into 'portions' ready for guests.","src":"-","vocab":[{"word":"Carve","meaning":"To cut into portions for serving","synonyms":"-"}]},{"id":"ana-C16Q3","q":"GEM : TURQUOISE","opts":{"A":"stone : magenta","B":"flower : violet","C":"pear : orange","D":"lettuce : green","E":"vine : cherry"},"ans":"B","exp":"Relationship: Category : Specific Member that Doubles as a Color Name. Turquoise is a type of gem that's also a color name; violet is a type of flower that's also a color name. (A) Magenta is a color, but it isn't the name of any specific stone. (C) A pear is a fruit and orange is a fruit/color, but a pear is never orange-colored - mismatched, unlike turquoise/violet which directly ARE their own color. (D) Lettuce is a green vegetable, but 'green' isn't a specific named type of lettuce. (E) A cherry grows on a tree, not a vine - factually wrong, and no color-naming angle either. Both Turquoise and Violet are simultaneously an object AND a recognized color name.","src":"Pubali Bank S.O-2012","vocab":[{"word":"Turquoise","meaning":"A blue-green gemstone/color","synonyms":"-"}]},{"id":"ana-C16Q4","q":"PARQUET : WOOD","opts":{"A":"potpourri : medley","B":"collage : tapestry","C":"color : painting","D":"linoleum : marble","E":"mosaic : glass"},"ans":"E","exp":"Relationship: Decorative Pattern : Raw Material Pieces Used. Parquet flooring is a decorative pattern made from small pieces of wood; mosaic is a decorative pattern made from small pieces of glass or stone. (A) Potpourri IS a medley/mixture itself - near-synonymous, not a pattern-and-raw-material relationship. (B) Collage and tapestry are both finished art forms, neither being the other's raw material. (C) Color is an ingredient of a painting, but not specifically a 'small piece' technique like parquet/mosaic. (D) Linoleum is a cheap SUBSTITUTE for marble flooring, not made FROM marble pieces. Both Parquet and Mosaic use the technique of inlaying small pieces to build a larger decorative pattern.","src":"-","vocab":[{"word":"Parquet","meaning":"Wood flooring laid in a geometric pattern","synonyms":"-"},{"word":"Mosaic","meaning":"A pattern made from small glass/stone pieces","synonyms":"-"}]},{"id":"ana-C16Q5","q":"IMPLACABLE : APPEASE","opts":{"A":"impregnable : defy","B":"inconsistent : persuade","C":"indomitable : subdue","D":"imperturbable : mollify","E":"intractable : understand"},"ans":"C","exp":"Relationship: Quality : Action That's Impossible Against It. Someone implacable cannot be appeased; someone indomitable cannot be subdued. (A) Impregnable means cannot be captured, but DEFYING it is still possible - the verb doesn't match the impossibility logic as cleanly. (B) An inconsistent person actually CAN be persuaded - not impossible. (D) Calming (mollify) someone already imperturbable (unshakeable) is redundant rather than impossible - weaker logic fit. (E) An intractable (stubborn) person may be hard, but not strictly impossible, to understand. The core pattern is 'impossible to X' - Implacable:Appease and Indomitable:Subdue both fit this perfectly.","src":"-","vocab":[{"word":"Implacable","meaning":"Unable to be appeased/calmed","synonyms":"-"},{"word":"Indomitable","meaning":"Unable to be subdued","synonyms":"-"}]},{"id":"ana-C16Q6","q":"HOMOGENIZATION : UNIFORM","opts":{"A":"coagulation : brittle","B":"combustion : flammable","C":"digestion : edible","D":"putrefaction : rotten","E":"fermentation : liquid"},"ans":"D","exp":"Relationship: Process : Its Guaranteed Result. Homogenization always makes something uniform; putrefaction (decay) always makes something rotten. (A) Coagulation might make something firm, but 'brittle' isn't its guaranteed specific result. (B) Combustion requires something to ALREADY be flammable beforehand - reversed cause-and-effect. (C) Digestion requires food to ALREADY be edible beforehand - same reversed logic problem. (E) Fermentation's main result is chemical change (alcohol/acid), not simply 'becoming liquid.' The test is: 'A causes B' / 'A always results in B' - Homogenization guarantees Uniform, Putrefaction guarantees Rotten.","src":"-","vocab":[{"word":"Putrefaction","meaning":"The process of decay/rotting","synonyms":"-"}]},{"id":"ana-C16Q7","q":"SELFLESSNESS : ALTRUIST","opts":{"A":"pragmatism : philanthropist","B":"expertise : connoisseur","C":"indiscretion : misanthrope","D":"enthusiasm : dilettante","E":"imperviousness : fanatic"},"ans":"B","exp":"Relationship: Trait : Person Defined by It. Selflessness defines an altruist; expertise defines a connoisseur (a knowledgeable judge of quality, e.g. in art or food). (A) A philanthropist's defining trait is generosity, not pragmatism. (C) A misanthrope is defined by hating people, not by indiscretion. (D) A dilettante (a dabbler) actually LACKS depth/expertise - enthusiasm without skill is closer to the opposite of their issue. (E) A fanatic's defining trait is extreme zeal, not imperviousness (being unaffected). Altruist and Connoisseur are both defined precisely by their core named trait.","src":"-","vocab":[{"word":"Connoisseur","meaning":"An expert judge of quality","synonyms":"-"},{"word":"Altruist","meaning":"One devoted to others' welfare","synonyms":"-"}]},{"id":"ana-C16Q8","q":"AESTHETICS : BEAUTY","opts":{"A":"ethics : etiquette","B":"epistemology : knowledge","C":"logistical : truth","D":"rhetoric : reasoning","E":"theology : morals"},"ans":"B","exp":"Relationship: Field of Philosophy : Its Subject Matter. Aesthetics is the philosophical study of beauty; epistemology is the philosophical study of knowledge. (A) Ethics is mainly about morality, not etiquette (etiquette is only a minor sub-topic). (C) 'Logistical' is about management/planning, with no real philosophical link to truth. (D) Rhetoric is the art of persuasive speech; reasoning is a different field (logic). (E) Theology is the study of God/religion - morals are relevant but are really ethics' core subject, not theology's. Match each philosophy branch to its true subject: Aesthetics=Beauty, Epistemology=Knowledge, Ethics=Morality, Logic=Reasoning.","src":"-","vocab":[{"word":"Epistemology","meaning":"The philosophical study of knowledge","synonyms":"-"}]},{"id":"ana-C16Q9","q":"CORNUCOPIA : ABUNDANCE","opts":{"A":"fortune : success","B":"mace : authority","C":"ensign : ship","D":"unicorn : myth","E":"medal : badge"},"ans":"B","exp":"Relationship: Symbol : What It Represents. A cornucopia is the classic symbol of abundance; a mace (ceremonial staff) is the classic symbol of authority. (A) Fortune may cause success, but fortune isn't a physical 'symbol' representing it. (C) An ensign (flag) is located ON a ship (Object:Location), not a symbol FOR 'ship' as a concept. (D) A unicorn IS itself a myth, not a symbol representing some separate quality. (E) Medal and badge are both similar honor-objects, with no symbol-and-meaning depth between them. Other symbol:meaning pairs to know: Dove:Peace, Scales:Justice.","src":"-","vocab":[{"word":"Cornucopia","meaning":"A horn-shaped symbol of abundance","synonyms":"-"},{"word":"Mace","meaning":"A ceremonial staff symbolizing authority","synonyms":"-"}]},{"id":"ana-C16Q10","q":"OATH : PROMISE","opts":{"A":"contract : agreement","B":"deed : attorney","C":"title : estate","D":"job : loyalty","E":"truce : warfare"},"ans":"A","exp":"Relationship: Formal/Legal Version : Ordinary Version of Same Thing. An oath is the formal, solemn version of a promise; a contract is the formal, legal version of an agreement. (B) Deed and attorney is an object-and-person relationship, with no formal/informal scale. (C) A title is property-ownership paperwork, not a formal version of a promise. (D) Loyalty might be expected at a job, but a job isn't a formal version of loyalty itself. (E) Truce and warfare are opposites (stopping war vs. war), not a formal-informal scale of the same concept. This is a 'Formal vs Informal' upgrade pattern, common in bank/BCS exams.","src":"Mutual Trust Bank (MTO)-2011, RJ(BBA) Set 1: 2009-10, Dutch Bangla Bank-2009, Eastern Bank-2005","vocab":[{"word":"Oath","meaning":"A formal, solemn promise","synonyms":"-"}]},{"id":"ana-C16Q11","q":"NEEDLE : KNIT","opts":{"A":"loom : weave","B":"soap : wash","C":"bed : sleep","D":"bait : fish","E":"match : fire"},"ans":"A","exp":"Relationship: Tool : Action It's Used For. A needle is the tool used to knit; a loom is the tool used to weave. (B) Soap is used for washing, but it's a CLEANING agent, not a tool that creates/builds something the way needle/loom do. (C) A bed is a location for sleeping, not a tool for creating something. (D) Bait is used to catch fish - a hunting technique, not a construction/creation tool like a needle or loom. (E) A match starts fire via a chemical reaction, not through skilled crafting/weaving. Needle and Loom are both tools that use thread/yarn to create something new through skilled handiwork.","src":"Pubali Bank SO-2012, Islami Bank PO-2011, AO-2011, Warid Telecom-2006, Eastern Bank-2005","vocab":[{"word":"Loom","meaning":"A device for weaving fabric","synonyms":"-"}]},{"id":"ana-C16Q12","q":"MAIL : MAILBOX","opts":{"A":"medicine : treatment","B":"laundry : hamper","C":"gasoline : pump","D":"coat : factory","E":"toothpaste : cleanliness"},"ans":"B","exp":"Relationship: Object : Its Storage Container. Mail is placed in a mailbox for collection; laundry is placed in a hamper for collection. (A) Medicine and treatment is a means-and-action relationship, not object-and-container. (C) Gasoline sits in a pump's reservoir, but a pump is mainly a delivery MECHANISM, not a simple holding container like a mailbox/hamper. (D) Coats are MADE in a factory; a factory isn't a coat's storage container. (E) Toothpaste serves cleanliness (Object:Purpose), not an object-container relationship. Both Mailbox and Hamper are everyday temporary-storage containers for household items awaiting collection.","src":"Eastern Bank-2005","vocab":[{"word":"Hamper","meaning":"A basket for storing laundry","synonyms":"-"}]},{"id":"ana-C16Q13","q":"ASTRINGENT : PUCKER","opts":{"A":"speed : collision","B":"consolation : sorrow","C":"proposition : solution","D":"sparker : ignition","E":"texture : surface"},"ans":"D","exp":"Relationship: Cause : Direct Triggered Effect. An astringent substance causes a pucker (skin/mouth contraction); a sparker (device producing a spark) causes ignition. (A) Speed alone doesn't guarantee a collision - that requires another factor (two objects meeting), so it's not a direct, automatic effect. (B) Consolation reduces sorrow rather than triggering/creating it - opposite direction. (C) A proposition doesn't automatically produce a solution - that requires further thought, not an automatic trigger. (E) Texture is simply a property a surface has, not a cause-and-triggered-effect relationship. Check whether the first item directly and reliably TRIGGERS the second physical reaction.","src":"-","vocab":[{"word":"Astringent","meaning":"A substance causing tissue to contract","synonyms":"-"},{"word":"Pucker","meaning":"To contract/wrinkle","synonyms":"-"}]},{"id":"ana-C16Q14","q":"HEMORRHAGE : BLEEDING","opts":{"A":"vertigo : dizziness","B":"asthma : respiration","C":"obesity : food","D":"anemia : vitality","E":"tension : pain"},"ans":"A","exp":"Relationship: Medical/Technical Term : Common Everyday Term (synonyms). Hemorrhage is the medical term for severe bleeding; vertigo is the medical term for a type of dizziness. (B) Asthma is a breathing-related CONDITION, but it doesn't simply MEAN 'respiration' - mismatched, not synonymous. (C) Obesity can result from food intake (Cause:Effect), not a synonym pair. (D) Anemia can reduce vitality (Cause:Effect again), not a synonym relationship. (E) Tension can cause pain, but tension doesn't simply MEAN 'pain' - again Cause:Effect, not synonymous. Medical analogies often pair a technical term with its plain-English meaning, like Cephalgia:Headache - check if the two words are truly interchangeable synonyms.","src":"-","vocab":[{"word":"Vertigo","meaning":"A sensation of dizziness/spinning","synonyms":"-"},{"word":"Hemorrhage","meaning":"Severe/uncontrolled bleeding","synonyms":"-"}]},{"id":"ana-C16Q15","q":"INDULGE : ASCETIC","opts":{"A":"adapt : mutineer","B":"restrain : libertine","C":"sacrifice : politician","D":"defy : traitor","E":"stint : benefactor"},"ans":"B","exp":"Relationship: Action : Person Who Never Does It. An ascetic never indulges in worldly pleasure; a libertine (a person of unrestrained morals) never restrains their desires. Both pairs show a person defined by NOT doing the paired action. (A) A mutineer doesn't have a strong defining link to 'adapting' specifically. (C) Sacrifice and politician have no fixed, defining never-do relationship. (D) A traitor defies, rather than never defying - this is actually what defines them, the opposite of the 'never does X' pattern. (E) A benefactor (a generous giver) is the opposite of someone who 'stints' (gives sparingly) - mismatched trait, not a clean never-does relationship. Ascetic and Libertine sit at opposite moral poles, each defined by what they refuse to do.","src":"-","vocab":[{"word":"Ascetic","meaning":"One who practices strict self-denial","synonyms":"-"},{"word":"Libertine","meaning":"One unrestrained by morals","synonyms":"-"}]},{"id":"ana-C16Q16","q":"LURK : WAIT","opts":{"A":"abscond : depart","B":"bilk : cheat","C":"topple : stabilize","D":"deplete : drain","E":"boost : elevate"},"ans":"A","exp":"Relationship: Secretive/Sneaky Version : Neutral Version of Same Action. To lurk is to wait secretively/with bad intent; to abscond is to depart secretively/with bad intent. (B) Bilk and cheat are both already negative/deceptive, but they don't describe a specific sneaky type of MOVEMENT the way lurk/abscond do. (C) Topple and stabilize are direct opposites, not a secrecy-based pair. (D) Deplete and drain are near-synonyms about reducing something, with no secrecy angle. (E) Boost and elevate are near-synonyms about increasing something, also no secrecy angle. The theme is 'Sneakiness' - whenever the original pair implies a secretive, harmful version of a normal action, look for the same hidden-intent logic in the answer.","src":"Islami Bank PO-2011","vocab":[{"word":"Lurk","meaning":"To wait secretively, often with bad intent","synonyms":"-"},{"word":"Abscond","meaning":"To depart secretly/illegally","synonyms":"-"}]},{"id":"ana-C16Q17","q":"INTERESTED : AGOG","opts":{"A":"persistent : daunted","B":"careful : meticulous","C":"curious : questioning","D":"blithe : willful","E":"occupied : engaged"},"ans":"B","exp":"Relationship: Degree of Intensity. Agog means extremely interested/eager; meticulous means extremely careful. (A) Persistent and daunted are actually opposites (a persistent person is NOT easily daunted), not an intensity scale. (C) Curious people DO ask questions, but questioning is just an outward behavior, not curiosity's 'extreme version.' (D) Blithe (carefree) and willful (stubborn) share no intensity relationship - they're unrelated traits. (E) Occupied and engaged are near-synonyms at the same level, with no notable intensity jump. Other intensity pairs: Mist:Fog, Cool:Cold, Like:Love - always check if the second word is clearly STRONGER than the first.","src":"-","vocab":[{"word":"Agog","meaning":"Extremely eager/excited","synonyms":"-"},{"word":"Meticulous","meaning":"Extremely careful/precise","synonyms":"-"}]},{"id":"ana-C16Q18","q":"DOGMA : ICONOCLAST","opts":{"A":"authority : subordinate","B":"patriotism : coward","C":"ideology : rebel","D":"responsibili
