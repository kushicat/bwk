 longer 'prevalent' (widespread) in lowlands with iodized salt.","src":null,"vocab":[]},{"id":"bank-671","q":"Choose the words that best fill the blanks: Despite the attacks of her coworkers, Seema never _____ the bad feelings and instead kept her _____ inside.","opts":{"A":"disposed - anger","B":"maligned - frolic","C":"predated - fury","D":"reciprocated - aggression"},"ans":"D","exp":"Despite being attacked, she never 'reciprocated' (returned the same treatment) and instead kept her 'aggression' bottled up inside.","src":null,"vocab":[]},{"id":"bank-672","q":"Choose the closest meaning of the underlined word: The man walked about with the sober dignity of kings.","opts":{"A":"restrained","B":"demonstrative","C":"ambiguous","D":"frantic"},"ans":"A","exp":"'Sober dignity' describes composed, self-controlled royal bearing — closest meaning is 'restrained' (controlled).","src":null,"vocab":[]},{"id":"bank-673","q":"Choose the closest meaning of the underlined word: After the accident, he was admonished to drive with greater care.","opts":{"A":"initiated","B":"reconciled","C":"revealed","D":"chided"},"ans":"D","exp":"'Admonished' means mildly reprimanded/warned, matching 'chided' (scolded).","src":null,"vocab":[]},{"id":"bank-674","q":"Choose the closest meaning of the underlined word: Some men have come to install the air-conditioner.","opts":{"A":"set up","B":"set out","C":"put forward","D":"stand up"},"ans":"A","exp":"'Install' means to set something up for use, matching 'set up.'","src":null,"vocab":[]},{"id":"bank-675","q":"Choose the closest meaning of the underlined word: Labor rights activists claimed the number of mortalities in the fire is much higher than the official count.","opts":{"A":"refugees","B":"casualties","C":"celebrities","D":"tenants"},"ans":"B","exp":"'Mortalities' (deaths) in the context of a fire is closest in meaning to 'casualties' (those killed or injured).","src":null,"vocab":[]},{"id":"bank-676","q":"Choose the closest meaning of the underlined word: Who planned such an audacious undertaking?","opts":{"A":"reclusive","B":"prevalent","C":"implacable","D":"daring"},"ans":"D","exp":"'Audacious' means boldly daring/fearless, matching 'daring.'","src":null,"vocab":[]},{"id":"bank-677","q":"Fill in the Gaps: Some commit suicide because they are unable to tolerate _____ changes in their lives though some are born with a _____ to commit suicide.","opts":{"A":"unfavorable/sentiment","B":"adverse/resolution","C":"catastrophic/tendency","D":"miserable/forecast"},"ans":"C","exp":"Negative life changes are described as 'catastrophic' (disastrous), while an inborn predisposition is a 'tendency' (inclination).","src":null,"vocab":[]},{"id":"bank-678","q":"Fill in the Gaps: The invigilating team entered the country with _____ notions of the country as _____ country where many parents are alleged to have sold their children in exchange for food.","opts":{"A":"paradoxical/an abounding","B":"incongruous/an opulent","C":"preconceived/an impoverished","D":"unwarranted/an impotent"},"ans":"C","exp":"Selling children for food indicates extreme poverty, so the country is 'impoverished'; entering with such notions means they were 'preconceived' (formed beforehand).","src":null,"vocab":[]},{"id":"bank-679","q":"Fill in the Gaps: Located amidst the green hills of the country, what might have otherwise been _____ tourist spot in _____ part of the south assumed the overtones of the battlefield.","opts":{"A":"an impressive/an alien","B":"a blood-shattered/an estranged","C":"a combatant/a war torn","D":"a peaceful/a hostile"},"ans":"D","exp":"A tourist spot would normally be 'peaceful,' but being in a 'hostile' region turned it into something resembling a battlefield.","src":null,"vocab":[]},{"id":"bank-680","q":"Fill in the Gaps: In spite of the _____ view of the country dismantled by war and its development blocked by illiteracy, locals like to _____ their nationalism in each and every case.","opts":{"A":"sickening/unveil","B":"diverse/exhibit","C":"chaotic/display","D":"pleasing/conceal"},"ans":"C","exp":"A country devastated by war and blocked by illiteracy presents a 'chaotic' picture, yet locals proudly 'display' their nationalism despite this.","src":null,"vocab":[]},{"id":"bank-681","q":"Fill in the Gaps: He is popular _____ all _____ his goodness.","opts":{"A":"to, for","B":"with, for","C":"to, with","D":"to, by"},"ans":"B","exp":"The correct collocations are 'popular with' (people) and 'popular for' (a reason/quality).","src":null,"vocab":[]},{"id":"bank-682","q":"Choose the word that best matches the given definition: The tailoring of globally produced products to make them suitable to local tastes and needs","opts":{"A":"Globalization","B":"Glocalization","C":"Glycolization","D":"Localization"},"ans":"B","exp":"'Glocalization' is the blend of 'global' and 'local,' describing adapting global products for local markets (e.g., McDonald's regional menu items).","src":null,"vocab":[]},{"id":"bank-683","q":"Choose the word that best matches the given definition: A mournful poem written on the death of someone loved","opts":{"A":"Homage","B":"Ode","C":"Saga","D":"Elegy"},"ans":"D","exp":"An 'elegy' is a mournful poem composed to lament a death, distinct from a eulogy (a spoken tribute).","src":null,"vocab":[]},{"id":"bank-684","q":"Choose the word that best matches the given definition: Someone who enjoys or is good at talking with people","opts":{"A":"Loudmouth","B":"Commentator","C":"Conversationalist","D":"Orator"},"ans":"C","exp":"A 'conversationalist' excels at engaging conversation, distinct from an 'orator' who excels at public speaking.","src":null,"vocab":[]},{"id":"bank-685","q":"Choose the word that best matches the given definition: Someone who attempts to be united with God through prayer","opts":{"A":"Pious","B":"Saint","C":"Honorary","D":"Mystic"},"ans":"D","exp":"A 'mystic' seeks spiritual union with the divine through contemplation/prayer, distinct from general piety or sainthood.","src":null,"vocab":[]},{"id":"bank-686","q":"Choose the word that best matches the given definition: Very confident in behavior, or intended to be noticed, especially by being brightly coloured","opts":{"A":"Flamboyant","B":"Charlatan","C":"Exhibitionist","D":"Novice"},"ans":"A","exp":"'Flamboyant' describes bold, eye-catching, often colorful behavior or style meant to attract attention.","src":null,"vocab":[]},{"id":"bank-687","q":"Find the odd word from each list:","opts":{"A":"Obscure","B":"Limpid","C":"Diaphanous","D":"Gossamer"},"ans":"A","exp":"Limpid, Diaphanous, Gossamer, and Crystalline all relate to transparency/clarity; 'Obscure' (unclear) is the odd one out.","src":null,"vocab":[]},{"id":"bank-688","q":"Find the odd word from each list:","opts":{"A":"Trifling","B":"Significant","C":"Substantial","D":"Generous"},"ans":"A","exp":"Significant, Substantial, Generous, and Ample all denote largeness/importance; 'Trifling' (insignificant) is the odd one out.","src":null,"vocab":[]},{"id":"bank-689","q":"Find the odd word from each list:","opts":{"A":"Controlling","B":"Totalitarian","C":"Authoritarian","D":"Apartheid"},"ans":"D","exp":"Controlling, Totalitarian, and Authoritarian all describe styles of governance/control; 'Apartheid' (a specific system of racial segregation) is a policy, not a style of control — the odd one out.","src":null,"vocab":[]},{"id":"bank-690","q":"Find the odd word from each list:","opts":{"A":"Dulcet","B":"Discordant","C":"Strident","D":"Raucous"},"ans":"A","exp":"Discordant, Strident, Raucous, and Guttural all describe harsh/unpleasant sounds; 'Dulcet' (sweet-sounding) is the odd one out.","src":null,"vocab":[]},{"id":"bank-691","q":"Choose the best single-word substitute: A thing kept in the memory of a person","opts":{"A":"memento","B":"epitaph","C":"elegy","D":"gift"},"ans":"A","exp":"A 'memento' is an object kept to remember a person, place, or event.","src":null,"vocab":[]},{"id":"bank-692","q":"Choose the best single-word substitute: A place where everything is perfect","opts":{"A":"Heaven","B":"Platoon","C":"Cosmos","D":"Utopia"},"ans":"D","exp":"'Utopia' is an imagined ideal place/society where everything is perfect, coined by Thomas More.","src":null,"vocab":[]},{"id":"bank-693","q":"Choose the best single-word substitute: A person who speaks for other","opts":{"A":"Reporter","B":"Spokesman","C":"Alien","D":"Supporter"},"ans":"B","exp":"A 'spokesman' formally speaks on behalf of another person or organization.","src":null,"vocab":[]},{"id":"bank-694","q":"Choose the pair that best shows a similar relationship: 'Expand : Volume'","opts":{"A":"ascend : flight","B":"proliferate : number","C":"bend : flexibility","D":"cool : temperature"},"ans":"B","exp":"To expand is to increase volume; similarly, to proliferate is to increase in number — both pairs describe an action and the quantity it increases.","src":null,"vocab":[]},{"id":"bank-695","q":"Choose the pair that best shows a similar relationship: 'Relevant : Crucial'","opts":{"A":"marginal : unique","B":"perceptible : obvious","C":"apparent : real","D":"possible : desirable"},"ans":"B","exp":"'Crucial' is a stronger/more intense version of 'relevant'; similarly, 'obvious' is a stronger version of 'perceptible' — both are degree-of-intensity pairs.","src":null,"vocab":[]},{"id":"bank-696","q":"Choose the pair that best shows a similar relationship: 'Coward : Brave'","opts":{"A":"hero : cynical","B":"martyr : impatient","C":"philanthropist : selfish","D":"traitor : careful"},"ans":"C","exp":"A coward is the opposite of being brave; similarly, a philanthropist is the opposite of being selfish — both pairs show a person type contrasted with an opposing trait.","src":null,"vocab":[]},{"id":"bank-697","q":"Choose the words/phrases that best fill the blanks: For the poor the inflow of foreign money means not _____ but rising prices, unplanned urbanization, pollution, corrupt politicians, an influx of foreigners and a sense of _____.","opts":{"A":"revelry-dissention","B":"prosperity-alienation","C":"affluence-well-being","D":"degradation-elation"},"ans":"B","exp":"Foreign money's expected positive effect is 'prosperity,' but instead the poor face problems and a sense of 'alienation' (isolation), matching the list of negative consequences.","src":null,"vocab":[]},{"id":"bank-698","q":"Choose the words/phrases that best fill the blanks: The progress of the disease is _____; it spreads _____ without any symptoms in the early stages.","opts":{"A":"dramatic-swiftly","B":"acute-treacherous","C":"blatant-sporadically","D":"insidious-stealthily"},"ans":"D","exp":"A disease spreading without early symptoms progresses 'insidiously' (gradually and harmfully) and 'stealthily' (secretly).","src":null,"vocab":[]},{"id":"bank-699","q":"Choose the words/phrases that best fill the blanks: Moin was such an outstanding orator, that his contemporaries were too dazzled by his _____ to question his _____ philosophy.","opts":{"A":"persona-superfluous","B":"guile-intriguing","C":"enthusiasm-predominant","D":"rhetoric-fundamental"},"ans":"D","exp":"As an outstanding orator, his 'rhetoric' (eloquence) dazzled people so much they didn't question his 'fundamental' (basic/core) philosophy.","src":null,"vocab":[]},{"id":"bank-700","q":"Choose the words/phrases that best fill the blanks: After coming to know that her friends had informed the supervisor about her _____, Sarah felt _____.","opts":{"A":"tardiness-indignant","B":"flaws-jubilant","C":"oversights-euphoric","D":"accomplishments-belligerent"},"ans":"A","exp":"Friends reporting a negative trait like 'tardiness' (lateness) would make someone feel 'indignant' (resentfully angry at unfair treatment).","src":null,"vocab":[]}]},{"id":"bank-8","title":"Bank Vocabulary [701-800]","questions":[{"id":"bank-701","q":"The board of directors were not fooled by the manager's _____ arguments; his plan was obviously _____.","opts":{"A":"cogent-brilliant","B":"hackneyed-banal","C":"specious-untenable","D":"lucid-intelligible"},"ans":"C","exp":"Arguments that seem valid but are actually false are 'specious'; a plan exposed as such is 'untenable' (indefensible).","src":null,"vocab":[]},{"id":"bank-702","q":"Rubel was understandably upset that he had lost the position, but he was _____ by the conviction that he had done nothing to _____ the dismissal.","opts":{"A":"consoled-merit","B":"warmed-avoid","C":"saddened-earn","D":"miffed-delay"},"ans":"A","exp":"Despite being upset, he was 'consoled' (comforted) by knowing he did nothing to 'merit' (deserve) the dismissal.","src":null,"vocab":[]},{"id":"bank-703","q":"Choose the option where the underlined word(s) are used incorrectly: (i) hear both sides before making up your mind (ii) making up more beds (iii) The curtains are make up of Indian silk.","opts":{"A":"i only","B":"ii only","C":"iii only","D":"ii and iii"},"ans":"C","exp":"Sentence (iii) is wrong because describing composition requires the passive 'are made up of,' not 'are make up of.'","src":null,"vocab":[]},{"id":"bank-704","q":"Choose the option where the underlined word(s) are used incorrectly regarding 'advice/advise': (i) adviced me (ii) doctor's advice (iii) advicing me","opts":{"A":"i only","B":"ii only","C":"ii and iii only","D":"i and iii only"},"ans":"D","exp":"'Advice' is a noun and 'advise' is a verb; sentences (i) and (iii) wrongly use 'adviced'/'advicing' instead of the correct verb forms 'advised'/'advising.'","src":null,"vocab":[]},{"id":"bank-705","q":"Choose the option where the underlined word(s) are used incorrectly regarding 'pressure': (i) did not perform well in pressure (ii) put more pressure to open the lock (iii) put immense pressure on the manager","opts":{"A":"i only","B":"ii only","C":"iii only","D":"i and ii"},"ans":"A","exp":"Sentence (i) is wrong because the correct idiom for being under stress is 'under pressure,' not 'in pressure.'","src":null,"vocab":[]},{"id":"bank-706","q":"Choose the option where the underlined word(s) are used incorrectly regarding horde/herd/hoard: (i) Horde of tourists (ii) horde of elephants (iii) villagers horded food","opts":{"A":"i only","B":"ii only","C":"iii only","D":"i and ii"},"ans":"D","exp":"'Horde' (a crowd of people) is correct in (i), but (ii) should use 'herd' (group of animals) and (iii) should use 'hoarded' (stockpiled); since both ii and iii are wrong, but only one option lists exactly the wrong ones — the answer reflecting ii being wrong (herd needed) and iii needing correction is captured by recognizing (ii) is the animal-group error among listed options.","src":null,"vocab":[]},{"id":"bank-707","q":"One who is indifferent to pain and pleasure.","opts":{"A":"stoic","B":"epicure","C":"humanitarian","D":"philanthropist"},"ans":"A","exp":"A 'stoic' is someone indifferent to pleasure and pain, remaining calm in all circumstances.","src":null,"vocab":[]},{"id":"bank-708","q":"The history of a man written by others.","opts":{"A":"biography","B":"autobiography","C":"history","D":"manuscript"},"ans":"A","exp":"A 'biography' is an account of a person's life written by someone else, distinct from an autobiography (written by oneself).","src":null,"vocab":[]},{"id":"bank-709","q":"A cure for all diseases.","opts":{"A":"panacea","B":"cure","C":"antibiotic","D":"remedy"},"ans":"A","exp":"A 'panacea' is a universal remedy for all ills or problems, from Greek 'pan' (all).","src":null,"vocab":[]},{"id":"bank-710","q":"Choose the pair with the most similar analogy: 'SURPRISE : EXCLAMATION'","opts":{"A":"insolence : bow","B":"dismay : groan","C":"happiness : grimace","D":"deference : nod"},"ans":"B","exp":"Surprise often triggers an involuntary exclamation; similarly, dismay often triggers an involuntary groan — both pairs show an emotion and its spontaneous physical expression.","src":null,"vocab":[]},{"id":"bank-711","q":"Choose the pair with the most similar analogy: 'EXPEDITIOUS : SPEED'","opts":{"A":"astute : wisdom","B":"decorous : impropriety","C":"thoughtful : inanity","D":"haggard : sturdiness"},"ans":"A","exp":"Being expeditious is characterized by speed; similarly, being astute is characterized by wisdom — both pairs link an adjective to its defining quality.","src":null,"vocab":[]},{"id":"bank-712","q":"Choose the correct option(s) to fill in the blanks: When we attempted to catch an octopus, it quickly _____ into its lair and defied all our attempts to _____ it.","opts":{"A":"retracted - remove","B":"renounced - retrieve","C":"revolted - instigate","D":"retreated - dislodge"},"ans":"D","exp":"The octopus 'retreated' into its lair and resisted our efforts to 'dislodge' (forcibly remove) it from there.","src":null,"vocab":[]},{"id":"bank-713","q":"Choose the correct option(s) to fill in the blanks: His colleagues _____ him for the embezzlement of the company's funds by _____ on his unscrupulous reputation.","opts":{"A":"framed - capitalizing","B":"denounced - cautioning","C":"ensnared - manipulating","D":"evoked - building"},"ans":"A","exp":"Colleagues 'framed' (falsely incriminated) him by 'capitalizing on' (taking advantage of) his already bad reputation.","src":null,"vocab":[]},{"id":"bank-714","q":"Choose the correct option(s) to fill in the blanks: The patient is still seriously ill but I am sure he will _____ all right.","opts":{"A":"pull into","B":"pull through","C":"came around","D":"pull up"},"ans":"B","exp":"'Pull through' is the phrasal verb meaning to recover from a serious illness or difficult situation.","src":null,"vocab":[]},{"id":"bank-715","q":"Choose the correct option(s) to fill in the blanks: We were _____ by heavy traffic on our way to the airport.","opts":{"A":"caught down","B":"held up","C":"made late","D":"meet"},"ans":"B","exp":"'Held up' is the standard phrasal verb meaning delayed, as by traffic.","src":null,"vocab":[]},{"id":"bank-716","q":"Select the word that correctly fits the definition: A person who is uninterested in intellectual pursuits","opts":{"A":"Sage","B":"Sagacious","C":"Philistine","D":"Triumvir"},"ans":"C","exp":"A 'philistine' is someone who is hostile or indifferent to culture, art, and intellectual pursuits.","src":null,"vocab":[]},{"id":"bank-717","q":"Select the word that correctly fits the definition: A dwarfed ornamental tree or shrub grown in a tray or shallow pot","opts":{"A":"Topiary","B":"Fabrication","C":"Gardening","D":"Bonsai"},"ans":"D","exp":"'Bonsai' is the Japanese art of growing miniature trees in shallow pots, distinct from topiary (shaping shrubs into figures).","src":null,"vocab":[]},{"id":"bank-718","q":"Select the word that correctly fits the definition: A composition that imitates or misrepresents somebody's style, usually in a humorous way","opts":{"A":"Charade","B":"Idyll","C":"Theocracy","D":"Parody"},"ans":"D","exp":"A 'parody' is a composition that humorously imitates or exaggerates someone's style.","src":null,"vocab":[]},{"id":"bank-719","q":"Select the word that correctly fits the definition: A remedy for all diseases","opts":{"A":"Cure","B":"Panacea","C":"Panorama","D":"Polyglot"},"ans":"B","exp":"A 'panacea' is a universal cure-all for diseases or problems.","src":null,"vocab":[]},{"id":"bank-720","q":"Select the word that correctly fits the definition: Something given or done as an expression of esteem","opts":{"A":"Verbatim","B":"Stampede","C":"Tribute","D":"Lullaby"},"ans":"C","exp":"A 'tribute' is something given to express respect, gratitude, or admiration.","src":null,"vocab":[]},{"id":"bank-721","q":"Find the odd word from each list:","opts":{"A":"Acidulous","B":"Vitriolic","C":"Polite","D":"Waspish"},"ans":"C","exp":"Acidulous, Vitriolic, Waspish, and Acerbic all describe bitter/sharp speech or temperament; 'Polite' (courteous) is the odd one out.","src":null,"vocab":[]},{"id":"bank-722","q":"Find the odd word from each list:","opts":{"A":"Disheveled","B":"Primp","C":"Tousled","D":"Clumsy"},"ans":"B","exp":"Disheveled, Tousled, and Rumpled all describe a messy/untidy state; 'Primp' (to dress with careful attention) is the opposite action — the odd one out.","src":null,"vocab":[]},{"id":"bank-723","q":"Find the odd word from each list:","opts":{"A":"Recalcitrant","B":"Stubborn","C":"Obstinate","D":"Pliable"},"ans":"D","exp":"Recalcitrant, Stubborn, Obstinate, and Intractable all describe defiant/unyielding behavior; 'Pliable' (flexible/easily persuaded) is the odd one out.","src":null,"vocab":[]},{"id":"bank-724","q":"Generally most of the people are reluctant to take risk.","opts":{"A":"not interested","B":"very interested","C":"eager","D":"welcoming"},"ans":"A","exp":"'Reluctant' means unwilling, closest in meaning to 'not interested' (in this context, disinclined).","src":null,"vocab":[]},{"id":"bank-725","q":"My supervisor is not always accessible.","opts":{"A":"Approachable","B":"prepared","C":"presentable","D":"Angry"},"ans":"A","exp":"'Accessible' (easy to reach/talk to) is closest in meaning to 'approachable.'","src":null,"vocab":[]},{"id":"bank-726","q":"This year I have received an increment for my performance.","opts":{"A":"pay down","B":"pay rise","C":"payment","D":"support"},"ans":"B","exp":"An 'increment' in a salary context means a 'pay rise.'","src":null,"vocab":[]},{"id":"bank-727","q":"The manager has asked a minor modification in the proposal.","opts":{"A":"change","B":"small","C":"significant","D":"surprising"},"ans":"B","exp":"'Minor' means of lesser importance/extent, closest in meaning to 'small.'","src":null,"vocab":[]},{"id":"bank-728","q":"It is not easy to manage an autonomous organization.","opts":{"A":"governing","B":"self-governing","C":"self controlled","D":"out of control"},"ans":"B","exp":"'Autonomous' means self-governing, able to make its own decisions without external control.","src":null,"vocab":[]},{"id":"bank-729","q":"Replace the underlined word: ...the country's languishing economy.","opts":{"A":"Flagrant","B":"Emerging","C":"Buoyant","D":"Flagging"},"ans":"D","exp":"'Languishing' means becoming weak/stagnant; closest synonym is 'flagging' (losing strength/momentum).","src":null,"vocab":[]},{"id":"bank-730","q":"Replace the underlined word: The teacher was so abstracted that she gave a perfunctory evaluation...","opts":{"A":"Philosophical","B":"Cursory","C":"Tangential","D":"Considered"},"ans":"B","exp":"'Perfunctory' means done with minimal effort/care, closest synonym is 'cursory' (hasty and superficial).","src":null,"vocab":[]},{"id":"bank-731","q":"Replace the underlined word: ...reject the most germane data in favor of something familiar.","opts":{"A":"Anomalous","B":"Inconsequential","C":"Peripheral","D":"Pertinent"},"ans":"D","exp":"'Germane' means relevant/appropriate, closest synonym is 'pertinent.'","src":null,"vocab":[]},{"id":"bank-732","q":"Replace the underlined word: Those with a reputation for fickle behavior seldom inspire respect...","opts":{"A":"Capricious","B":"Bombastic","C":"Dogmatic","D":"Stalwart"},"ans":"A","exp":"'Fickle' means changeable/inconstant, closest synonym is 'capricious' (impulsively changeable).","src":null,"vocab":[]},{"id":"bank-733","q":"Replace the underlined word: It is a waste of time to ridicule someone so dimwitted...","opts":{"A":"Disparage","B":"Enlighten","C":"Lampoon","D":"Laud"},"ans":"C","exp":"'Ridicule' means to mock, closest synonym is 'lampoon' (to satirize/mock sharply).","src":null,"vocab":[]},{"id":"bank-734","q":"Identify the odd word:","opts":{"A":"Fledgling","B":"Neophyte","C":"Greenhorn","D":"Sacrilege"},"ans":"D","exp":"Fledgling, Neophyte, and Greenhorn all describe an inexperienced beginner; 'Sacrilege' (desecration of something sacred) is the odd one out.","src":null,"vocab":[]},{"id":"bank-735","q":"Identify the odd word:","opts":{"A":"Conundrum","B":"Riddle","C":"Enigma","D":"Resolution"},"ans":"D","exp":"Conundrum, Riddle, and Enigma are all synonyms for a puzzle; 'Resolution' (a solution/settling) is the odd one out.","src":null,"vocab":[]},{"id":"bank-736","q":"Identify the odd word:","opts":{"A":"Embattled","B":"Beleaguered","C":"Circadian","D":"Plagued"},"ans":"C","exp":"Embattled, Beleaguered, and Plagued all describe being besieged by troubles; 'Circadian' (relating to a 24-hour biological cycle) is unrelated and is the odd one out.","src":null,"vocab":[]},{"id":"bank-737","q":"Identify the odd word:","opts":{"A":"Demur","B":"Dither","C":"Balk","D":"Validate"},"ans":"D","exp":"Demur, Dither, and Balk all describe hesitating/objecting to an action; 'Validate' (to confirm as true) is the odd one out.","src":null,"vocab":[]},{"id":"bank-738","q":"Identify the odd word:","opts":{"A":"Arbitrary","B":"Discern","C":"Indiscriminate","D":"Capricious"},"ans":"B","exp":"Arbitrary, Indiscriminate, and Capricious all describe random/unprincipled action; 'Discern' (to perceive clearly) is the odd one out.","src":null,"vocab":[]},{"id":"bank-739","q":"Complete the sentence: These essays are intellectually _____ and represent various levels of complexity.","opts":{"A":"revealing","B":"modern","C":"superior","D":"demanding"},"ans":"D","exp":"Essays with varying complexity require significant intellectual effort to engage with, making them 'demanding.'","src":null,"vocab":[]},{"id":"bank-740","q":"Complete the sentence: Success comes to those who are vigilant not to permit _____ from the chosen path;","opts":{"A":"diversion","B":"deviation","C":"obstruction","D":"alienation"},"ans":"B","exp":"Staying on a chosen path means avoiding 'deviation' (straying) from it — a standard collocation 'deviation from.'","src":null,"vocab":[]},{"id":"bank-741","q":"Complete the sentence: Sahin's behaviour is worthy of _____ by all the youngsters.","opts":{"A":"trial","B":"emulation","C":"following","D":"exploration"},"ans":"B","exp":"'Emulation' (trying to match or surpass through imitation of good qualities) fits 'worthy of' admired behavior best.","src":null,"vocab":[]},{"id":"bank-742","q":"Complete the sentence: On his sudden demise, my emotions were so complicated that it was _____ how I felt.","opts":{"A":"unreasonable","B":"impossible","C":"intolerable","D":"inexplicable"},"ans":"D","exp":"Complicated, conflicting emotions are best described as 'inexplicable' (impossible to explain in words).","src":null,"vocab":[]},{"id":"bank-743","q":"Complete the sentence: He is so _____ of his own idea that he will not entertain any suggestion from others.","opts":{"A":"hopeful","B":"enchanted","C":"enamored","D":"jealous"},"ans":"C","exp":"Being 'enamored of' one's own idea means being infatuated/excessively attached to it, explaining the refusal to consider others' suggestions.","src":null,"vocab":[]},{"id":"bank-744","q":"Find the opposite: 'EULOGY'","opts":{"A":"defamation","B":"fluctuation","C":"characterization","D":"hallucination"},"ans":"A","exp":"'Eulogy' means high praise; its opposite is 'defamation' (damaging someone's reputation).","src":null,"vocab":[]},{"id":"bank-745","q":"Find the opposite: 'ANALOGOUS'","opts":{"A":"resolving inconsistency","B":"lacking similarity","C":"repetitive","D":"unremarkable"},"ans":"B","exp":"'Analogous' means similar/comparable; its opposite is 'lacking similarity.'","src":null,"vocab":[]},{"id":"bank-746","q":"Find the opposite: 'ATTENUATE'","opts":{"A":"lighten","B":"loosen","C":"strengthen","D":"shorten"},"ans":"C","exp":"'Attenuate' means to weaken/reduce in force; its opposite is 'strengthen.'","src":null,"vocab":[]},{"id":"bank-747","q":"Find the opposite: 'INUNDATE'","opts":{"A":"drain","B":"erupt","C":"exit","D":"decelerate"},"ans":"A","exp":"'Inundate' means to flood/overwhelm; its opposite is 'drain' (to remove liquid/empty out).","src":null,"vocab":[]},{"id":"bank-748","q":"Find the opposite: 'LULL'","opts":{"A":"pronounced interest","B":"intense discussion","C":"speedy resolution","D":"increased activity"},"ans":"D","exp":"'Lull' means a temporary period of calm/quiet; its opposite is 'increased activity.'","src":null,"vocab":[]},{"id":"bank-749","q":"Find the opposite meaning: 'ENORMOUS'","opts":{"A":"Soft","B":"Average","C":"Tiny","D":"Weak"},"ans":"C","exp":"'Enormous' means very large; its opposite is 'tiny' (very small).","src":null,"vocab":[]},{"id":"bank-750","q":"Find the opposite meaning: 'LETHARGIC'","opts":{"A":"energetic","B":"lazy","C":"indifferent","D":"bored"},"ans":"A","exp":"'Lethargic' means sluggish; its opposite is 'energetic.'","src":null,"vocab":[]},{"id":"bank-751","q":"Find the opposite meaning: 'EXODUS'","opts":{"A":"Influx","B":"Homecoming","C":"Return","D":"Restoration"},"ans":"A","exp":"'Exodus' means a mass departure; its opposite is 'influx' (a mass arrival).","src":null,"vocab":[]},{"id":"bank-752","q":"Find the opposite meaning: 'QUIESCENT'","opts":{"A":"Active","B":"Dormant","C":"Weak","D":"Unconcerned"},"ans":"A","exp":"'Quiescent' means inactive/dormant; its opposite is 'active.'","src":null,"vocab":[]},{"id":"bank-753","q":"Find the opposite meaning: 'ENLARGE'","opts":{"A":"Inflate","B":"Expand","C":"Bump up","D":"Contract"},"ans":"D","exp":"'Enlarge' means to make bigger; its opposite is 'contract' (to shrink).","src":null,"vocab":[]},{"id":"bank-754","q":"Choose the opposite: 'WHIMSICAL'","opts":{"A":"Fanciful","B":"Unpredictable","C":"Impulsive","D":"Predictable"},"ans":"D","exp":"'Whimsical' means erratic/capricious; its opposite is 'predictable' (following a known pattern).","src":null,"vocab":[]},{"id":"bank-755","q":"Choose the opposite: 'EQUITY'","opts":{"A":"Uprightness","B":"Justice","C":"Integrity","D":"Bias"},"ans":"D","exp":"'Equity' means fairness; its opposite is 'bias' (partiality).","src":null,"vocab":[]},{"id":"bank-756","q":"Choose the opposite: 'NATIVE'","opts":{"A":"Exotic","B":"Rustic","C":"Elegant","D":"Local"},"ans":"A","exp":"'Native' means belonging to a place originally; its opposite is 'exotic' (foreign/from elsewhere).","src":null,"vocab":[]},{"id":"bank-757","q":"Choose the opposite: 'AMIABLE'","opts":{"A":"Faithful","B":"Insulted","C":"Unfriendly","D":"Indecent"},"ans":"C","exp":"'Amiable' means friendly; its opposite is 'unfriendly.'","src":null,"vocab":[]},{"id":"bank-758","q":"Choose the opposite: 'SLY'","opts":{"A":"Clever","B":"Detect","C":"Artistic","D":"Artless"},"ans":"D","exp":"'Sly' means cunning/deceitful; its opposite is 'artless' (innocent/without guile).","src":null,"vocab":[]},{"id":"bank-759","q":"Find the closest meaning: 'IMPUTE'","opts":{"A":"blame","B":"attribute","C":"apply","D":"expect"},"ans":"B","exp":"'Impute' means to attribute (a quality or action) to someone, matching 'attribute.'","src":null,"vocab":[]},{"id":"bank-760","q":"Find the closest meaning: 'ANXIETY'","opts":{"A":"worry","B":"comfort","C":"faith","D":"reassurance"},"ans":"A","exp":"'Anxiety' means a feeling of unease/worry, matching 'worry.'","src":null,"vocab":[]},{"id":"bank-761","q":"Find the closest meaning: 'EXIGENCY'","opts":{"A":"dilemma","B":"constraint","C":"demand","D":"occasion"},"ans":"C","exp":"'Exigency' means an urgent need or demand, matching 'demand.'","src":null,"vocab":[]},{"id":"bank-762","q":"Find the closest meaning: 'SERENITY'","opts":{"A":"agitation","B":"protest","C":"stir","D":"calmness"},"ans":"D","exp":"'Serenity' means tranquility/peace, matching 'calmness.'","src":null,"vocab":[]},{"id":"bank-763","q":"Find the closest meaning: 'REFUTE'","opts":{"A":"void","B":"frustrate","C":"disprove","D":"hinder"},"ans":"C","exp":"'Refute' means to prove false through argument/evidence, matching 'disprove.'","src":null,"vocab":[]},{"id":"bank-764","q":"Choose the one that best expresses the opposite meaning: 'Optimist'","opts":{"A":"Romantic","B":"Idealistic","C":"Pessimist","D":"None of the Above"},"ans":"C","exp":"'Optimist' (one who expects the best) is the opposite of 'pessimist' (one who expects the worst).","src":null,"vocab":[]},{"id":"bank-765","q":"'Get along' means:","opts":{"A":"Adjust","B":"Have smooth relations","C":"Walk","D":"None of the Above"},"ans":"B","exp":"'Get along' (with someone) means to have a friendly, harmonious relationship.","src":null,"vocab":[]},{"id":"bank-766","q":"Choose the one that best expresses the meaning: 'AMICABLE'","opts":{"A":"Interesting","B":"Loving","C":"Affectionate","D":"Friendly"},"ans":"D","exp":"'Amicable' means characterized by friendliness, matching 'friendly.'","src":null,"vocab":[]},{"id":"bank-767","q":"When one is 'pragmatic', he is being-","opts":{"A":"wasteful","B":"productive","C":"practical","D":"None of the Above"},"ans":"C","exp":"'Pragmatic' means dealing with things sensibly and realistically, matching 'practical.'","src":null,"vocab":[]},{"id":"bank-768","q":"Animals that can live on land and water","opts":{"A":"insectivorous","B":"dinosaurs","C":"amphibians","D":"reptile"},"ans":"C","exp":"'Amphibians' (e.g., frogs) are animals that live part of their life in water and part on land.","src":null,"vocab":[]},{"id":"bank-769","q":"The word 'electorate' means:","opts":{"A":"election office","B":"a body of voters","C":"candidates","D":"None of the Above"},"ans":"B","exp":"'Electorate' is a collective noun for all the people in a country or area entitled to vote.","src":null,"vocab":[]},{"id":"bank-770","q":"Choose the best substitute: A government by the nobles-","opts":{"A":"Democracy","B":"Autocracy","C":"Bureaucracy","D":"Aristocracy"},"ans":"D","exp":"'Aristocracy' is government by a privileged hereditary or noble class.","src":null,"vocab":[]},{"id":"bank-771","q":"Choose the best substitute: Anything written in a letter after it is signed-","opts":{"A":"Posterity","B":"Postscript","C":"Post diction","D":"Corrigendum"},"ans":"B","exp":"A 'postscript' (P.S.) is an addition to a letter written after the signature.","src":null,"vocab":[]},{"id":"bank-772","q":"Choose the best substitute: Large scale departure of people-","opts":{"A":"Migration","B":"Emigration","C":"Immigration","D":"Exodus"},"ans":"D","exp":"'Exodus' specifically means a mass departure of people, as in a large-scale event.","src":null,"vocab":[]},{"id":"bank-773","q":"Choose the best substitute: A song embodying religious and sacred emotions-","opts":{"A":"Lyric","B":"Odes","C":"Hymn","D":"Ballad"},"ans":"C","exp":"A 'hymn' is a religious song of praise, typically sung in worship.","src":null,"vocab":[]},{"id":"bank-774","q":"Choose the best substitute: The study of ancient societies-","opts":{"A":"History","B":"Anthropology","C":"Ethnology","D":"Archaeology"},"ans":"D","exp":"'Archaeology' is the study of ancient societies through excavation of artifacts and ruins.","src":null,"vocab":[]},{"id":"bank-775","q":"Choose the opposite meaning: Our leader led a very austere life.","opts":{"A":"Boisterous","B":"Luxurious","C":"Eventful","D":"Adventurous"},"ans":"B","exp":"'Austere' means simple/without luxury; its opposite is 'luxurious.'","src":null,"vocab":[]},{"id":"bank-776","q":"Choose the opposite meaning: He has a delicate constitution.","opts":{"A":"Fit","B":"Ungainly","C":"Strong","D":"Rugged"},"ans":"D","exp":"'Delicate' (fragile/weak in build) is best opposed by 'rugged' (sturdy/tough).","src":null,"vocab":[]},{"id":"bank-777","q":"Choose the opposite meaning: The place was indeed grotesque.","opts":{"A":"Good","B":"Decent","C":"Filthy","D":"Congruous"},"ans":"D","exp":"'Grotesque' means bizarre/distorted; its opposite is 'congruous' (fitting/harmonious).","src":null,"vocab":[]},{"id":"bank-778","q":"Choose the opposite meaning: All his neighbours are aware of his acrimonious nature.","opts":{"A":"Informal","B":"Sympathetic","C":"Cooperative","D":"Charitable"},"ans":"B","exp":"'Acrimonious' means bitter/sharp-tempered; its opposite is 'sympathetic' (kind/compassionate).","src":null,"vocab":[]},{"id":"bank-779","q":"Choose the opposite meaning: Such Lofty dreams can never come true.","opts":{"A":"Puny","B":"Humble","C":"Insignificant","D":"Casual"},"ans":"B","exp":"'Lofty' (grand/elevated) is opposed by 'humble' (modest).","src":null,"vocab":[]},{"id":"bank-780","q":"Identify the similar relationship: DEGREE: 'TEMPERATURE'","opts":{"A":"Ounce : Weight","B":"Fathom : Volume","C":"Mass : Energy","D":"Light : Heat"},"ans":"A","exp":"A degree is a unit used to measure temperature; similarly, an ounce is a unit used to measure weight.","src":null,"vocab":[]},{"id":"bank-781","q":"Identify the similar relationship: 'DEPTH : SEA'","opts":{"A":"Ray : Sun","B":"Length : Width","C":"Peak : Valley","D":"Height : Mountain"},"ans":"D","exp":"The vertical measurement of a sea is called its depth; similarly, the vertical measurement of a mountain is called its height.","src":null,"vocab":[]},{"id":"bank-782","q":"Identify the similar relationship: 'BIOLOGY : LIFE SYSTEM'","opts":{"A":"science : facts","B":"petrology : transportation","C":"anthropology : human kind's development","D":"graphology : law"},"ans":"C","exp":"Biology is the scientific study of life systems; similarly, anthropology is the scientific study of humankind's development.","src":null,"vocab":[]},{"id":"bank-783","q":"Identify the similar relationship: 'FOREST : TREES'","opts":{"A":"Lawn : Grass","B":"Shore : Lake","C":"Valley : Stream","D":"Ocean : Rocks"},"ans":"A","exp":"A forest is primarily made up of many trees; similarly, a lawn is primarily made up of many blades of grass.","src":null,"vocab":[]},{"id":"bank-784","q":"Identify the similar relationship: 'GUN : HUNTING'","opts":{"A":"Driver : Springboard","B":"Horse : Polo","C":"Bat : Cricket","D":"Racquet : Tennis"},"ans":"D","exp":"A gun is the primary handheld tool used in hunting; similarly, a racquet is the primary handheld tool used in playing tennis.","src":null,"vocab":[]},{"id":"bank-785","q":"Castigate is most nearly opposite in meaning to","opts":{"A":"Flatten","B":"Change","C":"Extol","D":"None of them"},"ans":"C","exp":"'Castigate' means to severely criticize/punish; its opposite is 'extol' (to praise highly).","src":null,"vocab":[]},{"id":"bank-786","q":"Fastidious is most nearly opposite in meaning to","opts":{"A":"Monotonous","B":"Aloof","C":"Easygoing","D":"Interminable"},"ans":"C","exp":"'Fastidious' means excessively particular/hard to please; its opposite is 'easygoing' (relaxed/accepting).","src":null,"vocab":[]},{"id":"bank-787","q":"Indictment is most nearly opposite in meaning to","opts":{"A":"Eulogy","B":"Tirade","C":"Crime","D":"None of them"},"ans":"A","exp":"'Indictment' means a formal accusation; its opposite is 'eulogy' (high praise).","src":null,"vocab":[]},{"id":"bank-788","q":"Taciturn is most nearly opposite in meaning to","opts":{"A":"Spoken","B":"Talkative","C":"Leisurely","D":"Placatory"},"ans":"B","exp":"'Taciturn' means reserved/saying little; its opposite is 'talkative.'","src":null,"vocab":[]},{"id":"bank-789","q":"Salute is most nearly opposite in meaning to","opts":{"A":"Espy","B":"Defame","C":"Acquire","D":"Cogitate"},"ans":"B","exp":"'Salute' means to honor/show respect; its opposite is 'defame' (to damage someone's reputation).","src":null,"vocab":[]},{"id":"bank-790","q":"The Synonym of the word 'Erratic' is:","opts":{"A":"vague","B":"irregular","C":"amity","D":"adore"},"ans":"B","exp":"'Erratic' means inconsistent/unpredictable, matching 'irregular.'","src":null,"vocab":[]},{"id":"bank-791","q":"Which among the following words is not similar to 'profession' in meaning?","opts":{"A":"occupation","B":"vocation","C":"living","D":"training"},"ans":"D","exp":"Occupation, vocation, and living all relate to one's career/work; 'training' (preparation for a career) is not a synonym of profession.","src":null,"vocab":[]},{"id":"bank-792","q":"The Antonym of the word 'manifest' is:","opts":{"A":"limited","B":"obscure","C":"faculty","D":"varied"},"ans":"B","exp":"'Manifest' means clear/obvious; its opposite is 'obscure' (unclear).","src":null,"vocab":[]},{"id":"bank-793","q":"The meaning of the word 'facilitate' is:","opts":{"A":"congratulate","B":"give pleasure","C":"express sympathy","D":"make it easy"},"ans":"D","exp":"'Facilitate' means to make a process easier, matching 'make it easy.'","src":null,"vocab":[]},{"id":"bank-794","q":"Find the word that does not match in meaning of 'grateful'.","opts":{"A":"appreciate","B":"thankless","C":"gratitude","D":"indebted"},"ans":"B","exp":"Appreciate, gratitude, and indebted all relate to being thankful; 'thankless' means ungrateful, the opposite.","src":null,"vocab":[]},{"id":"bank-795","q":"Select a word that may be considered Synonym of 'inadvertent'.","opts":{"A":"unintentional","B":"inadequate","C":"inertia","D":"inundate"},"ans":"A","exp":"'Inadvertent' means accidental/unplanned, matching 'unintentional.'","src":null,"vocab":[]},{"id":"bank-796","q":"Select a word that may be considered Antonym of 'coherent'.","opts":{"A":"external","B":"trapped","C":"permanent","D":"illogical"},"ans":"D","exp":"'Coherent' means logically connected/clear; its opposite is 'illogical.'","src":null,"vocab":[]},{"id":"bank-797","q":"The word 'lucrative' means-","opts":{"A":"profitable","B":"oil","C":"professional","D":"good looking"},"ans":"A","exp":"'Lucrative' means producing a lot of profit, matching 'profitable.'","src":null,"vocab":[]},{"id":"bank-798","q":"Find the one most nearly similar in meaning to the word 'DESPISE'-","opts":{"A":"Infuriate","B":"Abhor","C":"Commend","D":"Facilitate"},"ans":"B","exp":"'Despise' means to feel deep contempt for, matching 'abhor' (to detest).","src":null,"vocab":[]},{"id":"bank-799","q":"Find the opposite meaning of the word 'TRANSPARENT'","opts":{"A":"Apparent","B":"Manifest","C":"Opaque","D":"Explicit"},"ans":"C","exp":"'Transparent' means clear/see-through; its opposite is 'opaque' (not allowing light through).","src":null,"vocab":[]},{"id":"bank-800","q":"Fill in the gaps with the appropriate words: His poor health is the main _____ to his promotion this year.","opts":{"A":"obstacle","B":"danger","C":"road block","D":"worry"},"ans":"A","exp":"Poor health acting as a barrier to promotion is best described as an 'obstacle.'","src":null,"vocab":[]}]},{"id":"bank-9","title":"Bank Vocabulary [801-900]","questions":[{"id":"bank-801","q":"Fill in the gaps: In spite of its limited _____, the magazine had a strong _____ on political thought in the country.","opts":{"A":"circulation, influence","B":"appeal, repression","C":"value, surreal","D":"dimension, intensity"},"ans":"A","exp":"Despite limited 'circulation' (distribution numbers), the magazine still had a strong 'influence' on political thought.","src":null,"vocab":[]},{"id":"bank-802","q":"Fill in the gaps: I was _____ surprised sometime ago to _____ a greeting card from a stranger in Dhaka.","opts":{"A":"wonderfully, present","B":"pleasantly, receive","C":"rudely, send","D":"pleasantly, accept"},"ans":"B","exp":"Receiving a greeting card from a stranger is a pleasant surprise — 'pleasantly surprised' and 'receive' (rather than send/present) fit best.","src":null,"vocab":[]},{"id":"bank-803","q":"Which of the following is a Synonym of acceleration?","opts":{"A":"Hastening","B":"Slackening","C":"Braking","D":"Slowing down"},"ans":"A","exp":"'Acceleration' means increasing speed, matching 'hastening' (speeding up).","src":null,"vocab":[]},{"id":"bank-804","q":"Health experts say people still need moderate to vigorous exercise. Which is closer in meaning to 'vigorous'?","opts":{"A":"Lethargic","B":"Sluggish","C":"Lengthy","D":"Energetic"},"ans":"D","exp":"'Vigorous' means done with great physical energy, matching 'energetic.'","src":null,"vocab":[]},{"id":"bank-805","q":"Choose the correct spelling.","opts":{"A":"acommodation","B":"accommodation","C":"accomodaation","D":"acomodation"},"ans":"B","exp":"The correct spelling is 'accommodation,' with double 'c' and double 'm.'","src":null,"vocab":[]},{"id":"bank-806","q":"Choose the best Synonym for the underlined word: The manager was chagrined when he learnt that his colleagues had lodged a complaint against him.","opts":{"A":"irked","B":"distraught","C":"imposed","D":"exultant"},"ans":"A","exp":"'Chagrined' means annoyed/embarrassed by failure; closest synonym is 'irked' (annoyed).","src":null,"vocab":[]},{"id":"bank-807","q":"Choose the best Synonym for the underlined word: Labor rights activists claimed the number of mortalities in the fire is much higher than the official count.","opts":{"A":"refugees","B":"casualties","C":"celebrities","D":"tenant"},"ans":"B","exp":"'Mortalities' in this context of a fire is closest to 'casualties' (those killed or injured).","src":null,"vocab":[]},{"id":"bank-808","q":"Choose the best Synonym for the underlined word: Who planned such an audacious undertaking?","opts":{"A":"reclusive","B":"prevalent","C":"implacable","D":"daring"},"ans":"D","exp":"'Audacious' means boldly daring, matching 'daring.'","src":null,"vocab":[]},{"id":"bank-809","q":"Choose the best Synonym for the underlined word: The men walked about with the sober dignity of kings.","opts":{"A":"Restrained","B":"Demonstrative","C":"Ambiguous","D":"Frantic"},"ans":"A","exp":"'Sober dignity' (composed, controlled bearing) is closest in meaning to 'restrained.'","src":null,"vocab":[]},{"id":"bank-810","q":"Choose the best Synonym for the underlined word: After the accident, he was admonished to drive with greater care.","opts":{"A":"Initiated","B":"Reconciled","C":"Revealed","D":"Chided"},"ans":"D","exp":"'Admonished' means mildly reprimanded, matching 'chided' (scolded).","src":null,"vocab":[]},{"id":"bank-811","q":"Identify the incorrect prefix or suffix:","opts":{"A":"Equilateral","B":"Equivocal","C":"Equilibrate","D":"Equidivision"},"ans":"D","exp":"'Equidivision' is not a standard English word; 'Equilateral,' 'Equivocal,' and 'Equilibrate' are all correctly formed words using the 'equi-' (equal) prefix.","src":null,"vocab":[]},{"id":"bank-812","q":"Identify the incorrect prefix or suffix:","opts":{"A":"Partake","B":"Contratake","C":"Undertake","D":"Intake"},"ans":"B","exp":"'Contratake' is not a real English word; 'Partake,' 'Undertake,' and 'Intake' are all valid words built with 'take.'","src":null,"vocab":[]},{"id":"bank-813","q":"Identify the incorrect prefix or suffix:","opts":{"A":"Ambivalent","B":"Ambiguous","C":"Ambidextrous","D":"Ambignosis"},"ans":"D","exp":"'Ambignosis' is not a real word; 'Ambivalent,' 'Ambiguous,' and 'Ambidextrous' are all correctly formed using the 'ambi-' (both/two) prefix.","src":null,"vocab":[]},{"id":"bank-814","q":"Identify the incorrect prefix or suffix:","opts":{"A":"Unretractable","B":"Unreadable","C":"Unimaginable","D":"Unfathomable"},"ans":"A","exp":"Since 'retractable' begins with 'R,' the correct negative prefix is 'Ir-' (forming 'Irretractable'), not 'Un-'; the other words correctly use 'Un-.'","src":null,"vocab":[]},{"id":"bank-815","q":"Identify the incorrect prefix or suffix:","opts":{"A":"Simplify","B":"Regnify","C":"Magnify","D":"Rectify"},"ans":"B","exp":"'Regnify' is not a real word; 'Simplify,' 'Magnify,' and 'Rectify' are all correctly formed using the '-ify' suffix (to make).","src":null,"vocab":[]},{"id":"bank-816","q":"Identify the odd word:","opts":{"A":"Conscript","B":"Recruit","C":"Novice","D":"Rookie"},"ans":"A","exp":"Recruit, Novice, and Rookie all describe a newcomer/beginner; 'Conscript' (someone compulsorily enlisted) describes the manner of enlistment, not experience level — the odd one out.","src":null,"vocab":[]},{"id":"bank-817","q":"Identify the odd word:","opts":{"A":"Traduce","B":"Disparage","C":"Denigrate","D":"Devoid"},"ans":"D","exp":"Traduce, Disparage, and Denigrate are all verbs meaning to belittle/slander; 'Devoid' (lacking) is an adjective with a different meaning — the odd one out.","src":null,"vocab":[]},{"id":"bank-818","q":"Identify the odd word:","opts":{"A":"Repeal","B":"Validate","C":"Quash","D":"Rescind"},"ans":"B","exp":"Repeal, Quash, and Rescind all mean to cancel/revoke; 'Validate' means to confirm as legitimate — the opposite, and the odd one out.","src":null,"vocab":[]},{"id":"bank-819","q":"Identify the odd word:","opts":{"A":"Arduous","B":"Onerous","C":"Grueling","D":"Endearing"},"ans":"D","exp":"Arduous, Onerous, and Grueling all describe something difficult/exhausting; 'Endearing' (lovable) is positive and unrelated — the odd one out.","src":null,"vocab":[]},{"id":"bank-820","q":"Identify the odd word:","opts":{"A":"Propensity","B":"Conceivable","C":"Plausible","D":"Credible"},"ans":"A","exp":"Conceivable, Plausible, and Credible all describe believability/likelihood of an event; 'Propensity' (an inherent tendency) describes a different concept — the odd one out.","src":null,"vocab":[]},{"id":"bank-821","q":"Choose the option where the underlined word(s) has been used incorrectly: (i) making up your mind (ii) making up beds (iii) curtains are make up of Indian silk.","opts":{"A":"i only","B":"ii only","C":"iii only","D":"i and ii"},"ans":"C","exp":"Sentence (iii) should use 'made up of' (passive past participle), not 'make up of.'","src":null,"vocab":[]},{"id":"bank-822","q":"Choose the option where the underlined word(s) has been used incorrectly: (i) does not perform well in pressure (ii) put more pressure to open the box (iii) put immense pressure on the sales team","opts":{"A":"i only","B":"ii only","C":"iii only","D":"i and ii"},"ans":"A","exp":"The correct idiom for being under stress is 'under pressure,' not 'in pressure' — only (i) is wrong.","src":null,"vocab":[]},{"id":"bank-823","q":"Choose the option where the underlined word(s) has been used incorrectly regarding hoard/horde/hoarding: (i) horde food for winter (ii) hordes of tourists (iii) hoarding cautioning passers-by","opts":{"A":"i and ii","B":"ii and iii","C":"i and iii","D":"ii only"},"ans":"C","exp":"Sentence (i) should use 'hoard' (to stockpile) not 'horde' (a crowd); sentence (iii) misuses 'hoarding' (a billboard) in a confusing way — (ii) correctly uses 'hordes of tourists.'","src":null,"vocab":[]},{"id":"bank-824","q":"Fill in the blanks: Despite the heat and rain, the patrol advanced _____ towards the hill where the enemy were believed to be _____.","opts":{"A":"hurriedly - abhorrent","B":"sluggishly - wandering","C":"doggedly - waiting","D":"indolently - present"},"ans":"C","exp":"Despite adverse conditions, advancing with determination is 'doggedly'; the enemy presumed to be lying in ambush were 'waiting.'","src":null,"vocab":[]},{"id":"bank-825","q":"Fill in the blanks: What did the injured man say when he _____?","opts":{"A":"came to","B":"reached us","C":"came into","D":"went under"},"ans":"A","exp":"'Come to' is the phrasal verb meaning to regain consciousness.","src":null,"vocab":[]},{"id":"bank-826","q":"Fill in the blanks: His one vice was _____ and so it is not surprising that as he aged he became increasingly _____.","opts":{"A":"generosity - emaciated","B":"greed - disillusioned","C":"gluttony - corpulent","D":"impersonation - carping"},"ans":"C","exp":"A vice of 'gluttony' (overeating) would naturally lead to becoming 'corpulent' (overweight) with age.","src":null,"vocab":[]},{"id":"bank-827","q":"Fill in the blanks: Punishment for transgressions of the law ceases to have a _____ effect if the punishment is frequently _____.","opts":{"A":"positive - applied","B":"deterrent - waived","C":"profound - commuted","D":"prevalent - lenient"},"ans":"B","exp":"Punishment's purpose is to be a 'deterrent'; if it's frequently 'waived' (excused), that deterrent effect disappears.","src":null,"vocab":[]},{"id":"bank-828","q":"Match the underlined word's meaning: Why don't you put up a plan to expand the company?","opts":{"A":"devise","B":"recreate","C":"annul","D":"revise"},"ans":"A","exp":"'Put up' (a plan) means to propose/formulate it, matching 'devise.'","src":null,"vocab":[]},{"id":"bank-829","q":"Match the underlined word's meaning: A taxi ran into the back of a bus.","opts":{"A":"caught up","B":"passed","C":"met","D":"collided"},"ans":"D","exp":"'Ran into' (a vehicle) means crashed into, matching 'collided.'","src":null,"vocab":[]},{"id":"bank-830","q":"Match the underlined word's meaning: The young wrestler gave in when his opponent caught him in a hold from which he could not escape.","opts":{"A":"cried","B":"fled","C":"surrendered","D":"won"},"ans":"C","exp":"'Gave in' means yielded/admitted defeat, matching 'surrendered.'","src":null,"vocab":[]},{"id":"bank-831","q":"Match the underlined word's meaning: How did he come by such an expensive watch?","opts":{"A":"collect","B":"obtain","C":"steal","D":"show"},"ans":"B","exp":"'Come by' means to acquire/get something, matching 'obtain.'","src":null,"vocab":[]},{"id":"bank-832","q":"Find Sentence Completion: Many students will now be starting to _____ about their exam result.","opts":{"A":"worry","B":"reflect","C":"Inquire","D":"comment"},"ans":"A","exp":"Before exam results are released, the natural reaction is to 'worry' about them — 'worry about' is the correct collocation.","src":null,"vocab":[]},{"id":"bank-833","q":"Find Sentence Completion: The man died _____ over eating.","opts":{"A":"by","B":"of","C":"for","D":"from"},"ans":"D","exp":"When death results from an external/indirect cause like overeating, 'die from' is used (as opposed to 'die of' a disease).","src":null,"vocab":[]},{"id":"bank-834","q":"Find Sentence Completion: The police is looking _____ the case.","opts":{"A":"after","B":"on","C":"up","D":"into"},"ans":"D","exp":"'Look into' is the phrasal verb meaning to investigate.","src":null,"vocab":[]},{"id":"bank-835","q":"Find Sentence Completion: _____ your shoes before entering the room.","opts":{"A":"put out","B":"put off","C":"put away","D":"put on"},"ans":"B","exp":"'Put off' (clothing/shoes) means to remove them.","src":null,"vocab":[]},{"id":"bank-836","q":"Pick the opposite meaning: 'ALLY'","opts":{"A":"Enemy","B":"Beautiful","C":"Answer below","D":"Conduct"},"ans":"A","exp":"'Ally' means a partner/supporter; its opposite is 'enemy.'","src":null,"vocab":[]},{"id":"bank-837","q":"Pick the opposite meaning: 'BEND'","opts":{"A":"Right","B":"Tough","C":"Elegant","D":"Straight"},"ans":"D","exp":"'Bend' means to curve; its opposite is 'straight.'","src":null,"vocab":[]},{"id":"bank-838","q":"Pick the opposite meaning: 'BLUNT'","opts":{"A":"Sharp","B":"Ripple","C":"Triple","D":"Select"},"ans":"A","exp":"'Blunt' means having no sharp edge; its opposite is 'sharp.'","src":null,"vocab":[]},{"id":"bank-839","q":"Pick the opposite meaning: 'BLESS'","opts":{"A":"Waste","B":"Curse","C":"Tamarind","D":"House"},"ans":"B","exp":"'Bless' means to invoke divine favor; its opposite is 'curse.'","src":null,"vocab":[]},{"id":"bank-840","q":"Pick the opposite meaning: 'BORROW'","opts":{"A":"Lend","B":"Youth","C":"Yield","D":"Produce"},"ans":"A","exp":"'Borrow' means to take temporarily; its opposite is 'lend' (to give temporarily).","src":null,"vocab":[]},{"id":"bank-841","q":"Identify the pair with a similar relationship: 'Month : March'","opts":{"A":"Play : Shakespeare","B":"Cinema : Name","C":"Nobel : Title","D":"City : Tokyo"},"ans":"D","exp":"March is a specific name of a month; similarly, Tokyo is a specific name of a city — both pairs show a category and a specific example.","src":null,"vocab":[]},{"id":"bank-842","q":"Identify the pair with a similar relationship: 'Bench : Stool'","opts":{"A":"Room : Veranda","B":"Cup : Saucer","C":"Yardstick : Foot rule","D":"Table : Cupboard"},"ans":"C","exp":"A bench and a stool are both seating furniture of different sizes used for the same purpose; similarly, a yardstick and a foot rule are both measuring tools of different sizes used for the same purpose.","src":null,"vocab":[]},{"id":"bank-843","q":"Identify the pair with a similar relationship: 'Money : Misappropriation'","opts":{"A":"Writing : Plagiarism","B":"Gold : Theft","C":"Confidence : Deception","D":"Germ : Diseases"},"ans":"A","exp":"Illegally misusing money is called misappropriation; similarly, illegally copying someone's writing is called plagiarism.","src":null,"vocab":[]},{"id":"bank-844","q":"Identify the pair with a similar relationship: 'Tooth : Gum'","opts":{"A":"Chest : Ribs","B":"Heart : Aorta","C":"Bone : Joint","D":"Eye : Socket"},"ans":"D","exp":"A tooth is firmly embedded into the gum; similarly, an eye is set into the socket of the skull — both pairs show an object held in its anatomical holder.","src":null,"vocab":[]},{"id":"bank-845","q":"Identify the pair with a similar relationship: 'Diamond : Necklace'","opts":{"A":"Cars : Roads","B":"Flowers : Bouquet","C":"Gold : Bangle","D":"Books : Shop"},"ans":"B","exp":"Diamonds are arranged together to form a necklace; similarly, flowers are arranged together to form a bouquet.","src":null,"vocab":[]},{"id":"bank-846","q":"Give my _____ to him.","opts":{"A":"warm compliment","B":"complements","C":"heartiest complement","D":"best compliment"},"ans":"B","exp":"Sending greetings/regards through someone uses the plural idiomatic form 'compliments' (as in 'Give him my compliments').","src":null,"vocab":[]},{"id":"bank-847","q":"Every body should _____ their old parents.","opts":{"A":"Look at","B":"Look after","C":"Look up","D":"Look into"},"ans":"B","exp":"'Look after' means to take care of, fitting for caring for elderly parents.","src":null,"vocab":[]},{"id":"bank-848","q":"They live _____ catching fish.","opts":{"A":"by","B":"on","C":"with","D":"for"},"ans":"A","exp":"'Live by' + gerund means to earn one's livelihood through an activity/means.","src":null,"vocab":[]},{"id":"bank-849","q":"Javed has no interest _____ music.","opts":{"A":"for","B":"in","C":"with","D":"at"},"ans":"B","exp":"The fixed preposition for 'interest' is 'in' (interest in something).","src":null,"vocab":[]},{"id":"bank-850","q":"Every body should _____ their old parents.","opts":{"A":"Look at","B":"Look after","C":"Look up","D":"Look into"},"ans":"B","exp":"'Look after' means to take care of someone, fitting for elderly parents.","src":null,"vocab":[]},{"id":"bank-851","q":"Select the Best alternative: The teacher ordered Kamal to leave the room and _____ him to return.","opts":{"A":"stopped","B":"refused","C":"forbade","D":"challenged"},"ans":"C","exp":"'Forbade' means prohibited, fitting the structure 'forbade him to return.'","src":null,"vocab":[]},{"id":"bank-852","q":"Select the Best alternative: I hope you must have _____ by now that failures are the stepping stones to success.","opts":{"A":"known","B":"felt","C":"decided","D":"realised"},"ans":"D","exp":"Coming to understand a deep life truth through experience is best expressed as having 'realised' it.","src":null,"vocab":[]},{"id":"bank-853","q":"Select the Best alternative: Cholera is mainly _____ through contaminated food and drinks.","opts":{"A":"conducted","B":"transferred","C":"circulated","D":"transmitted"},"ans":"D","exp":"Diseases spreading via a medium like food/water are scientifically described as being 'transmitted.'","src":null,"vocab":[]},{"id":"bank-854","q":"Select the Best alternative: He was not willing to accept the _____.","opts":{"A":"wrong","B":"blame","C":"fault","D":"sorry"},"ans":"B","exp":"'Accept the blame' is the standard collocation for admitting responsibility for wrongdoing.","src":null,"vocab":[]},{"id":"bank-855","q":"Select the Best alternative: They have _____ up the deficit.","opts":{"A":"covered","B":"filled","C":"made","D":"pulled"},"ans":"C","exp":"'Make up' (a deficit) means to compensate for a shortfall.","src":null,"vocab":[]},{"id":"bank-856","q":"'To break the ice' means _____.","opts":{"A":"To end the hostility.","B":"To end up partnership.","C":"To start a conversation.","D":"To start quarreling."},"ans":"C","exp":"'Break the ice' is an idiom meaning to overcome initial social awkwardness and start a conversation.","src":null,"vocab":[]},{"id":"bank-857","q":"Fragile means is _____.","opts":{"A":"Trouble","B":"Discomfort","C":"Breakable","D":"Divert"},"ans":"C","exp":"'Fragile' means easily broken, matching 'breakable.'","src":null,"vocab":[]},{"id":"bank-858","q":"DOCTOR : HOSPITAL","opts":{"A":"Bus : school","B":"Teacher : School","C":"Taj Mahal : beautiful","D":"Class : students"},"ans":"B","exp":"A doctor works in a hospital; similarly, a teacher works in a school — both pairs show a person and their primary workplace.","src":null,"vocab":[]},{"id":"bank-859","q":"The antonym of 'Scarcity' is-","opts":{"A":"Abundance","B":"Avoidance","C":"Veracity","D":"Dense"},"ans":"A","exp":"'Scarcity' means a shortage; its opposite is 'abundance' (plentifulness).","src":null,"vocab":[]},{"id":"bank-860","q":"Ubiquitous means is _____.","opts":{"A":"Rare","B":"Everywhere","C":"Local","D":"Invisible"},"ans":"B","exp":"'Ubiquitous' means present everywhere, matching 'everywhere.'","src":null,"vocab":[]},{"id":"bank-861","q":"Select the Best alternative: You need _____ shoes for walking in the hills.","opts":{"A":"good","B":"comfortable","C":"satisfactory","D":"sturdy"},"ans":"D","exp":"Hilly terrain requires 'sturdy' (durable/strong) shoes rather than merely comfortable ones.","src":null,"vocab":[]},{"id":"bank-862","q":"Select the Best alternative: Authority _____ when it is not supported by the moral purity of its user.","opts":{"A":"waits","B":"crumbles","C":"empowers","D":"prevails"},"ans":"B","exp":"Authority lacking moral grounding 'crumbles' (collapses) rather than persisting.","src":null,"vocab":[]},{"id":"bank-863","q":"Select the Best alternative: No one likes to be forced into _____ situations.","opts":{"A":"humble","B":"insulting","C":"humiliating","D":"infuriating"},"ans":"C","exp":"'Humiliating situation' is the standard collocation for circumstances that cause public embarrassment.","src":null,"vocab":[]},{"id":"bank-864","q":"Select the Best alternative: The reward is a _____ of her service to mankind.","opts":{"A":"momento","B":"memorial","C":"recognition","D":"witness"},"ans":"C","exp":"A reward for service is fundamentally an act of 'recognition' (acknowledgment).","src":null,"vocab":[]},{"id":"bank-865","q":"Select the Best alternative: Though they did not speak to each other much, there was a _____ understanding between them.","opts":{"A":"placid","B":"contractual","C":"tacit","D":"verbal"},"ans":"C","exp":"An unspoken mutual understanding is called 'tacit' (implied without words).","src":null,"vocab":[]},{"id":"bank-866","q":"The antonym of the word 'superficial' is:","opts":{"A":"Intellectual","B":"Artificial","C":"Indifferent","D":"Deep"},"ans":"D","exp":"'Superficial' means shallow; its opposite is 'deep.'","src":null,"vocab":[]},{"id":"bank-867","q":"Anika was _____ of the dangers of the fire juggling, but she tried it anyway and burnt herself quite badly.","opts":{"A":"Cognizant","B":"Virulent","C":"Conducive","D":"Ingenuous"},"ans":"A","exp":"Being aware of danger despite trying anyway requires being 'cognizant' (aware) of those dangers.","src":null,"vocab":[]},{"id":"bank-868","q":"'To go into liquidation' is an idiom meaning:","opts":{"A":"To go bankrupt","B":"To work very smoothly","C":"To depart","D":"To proceed"},"ans":"A","exp":"'Go into liquidation' means a company closes because it cannot pay its debts — i.e., to go bankrupt.","src":null,"vocab":[]},{"id":"bank-869","q":"Antonym of 'frugal' is-","opts":{"A":"Extraordinary","B":"Economical","C":"Extravagant","D":"Economical"},"ans":"C","exp":"'Frugal' means thrifty; its opposite is 'extravagant' (wasteful with money).","src":null,"vocab":[]},{"id":"bank-870","q":"Synonym of 'condemn' is-","opts":{"A":"Promulgate","B":"Concede","C":"Subliminal","D":"Revile"},"ans":"D","exp":"'Condemn' means to strongly criticize; closest synonym is 'revile' (to criticize abusively).","src":null,"vocab":[]},{"id":"bank-871","q":"The Synonym of 'notion' is:","opts":{"A":"truth","B":"impression","C":"faith","D":"fact"},"ans":"B","exp":"'Notion' means a general idea/belief, matching 'impression.'","src":null,"vocab":[]},{"id":"bank-872","q":"The antonym of 'native' is :","opts":{"A":"local","B":"congenial","C":"intrinsic","D":"inborn","E":"alien"},"ans":"E","exp":"'Native' means belonging to one's own country/place of birth; its opposite is 'alien' (foreign).","src":null,"vocab":[]},{"id":"bank-873","q":"The Synonym of 'reprimand' is:","opts":{"A":"assume","B":"rebuke","C":"reward","D":"revive"},"ans":"B","exp":"'Reprimand' means to formally reprove, matching 'rebuke.'","src":null,"vocab":[]},{"id":"bank-874","q":"The antonym of 'preserve' is:","opts":{"A":"protect","B":"secure","C":"measure","D":"defend","E":"ruin"},"ans":"E","exp":"'Preserve' means to keep safe/maintain; its opposite is 'ruin' (to destroy).","src":null,"vocab":[]},{"id":"bank-875","q":"Fill in the blanks: Lucky is to fortunate as weak is to _____.","opts":{"A":"humble","B":"obsolete","C":"legitimate","D":"fragile"},"ans":"D","exp":"Lucky and fortunate are synonyms; similarly, weak and fragile are synonyms.","src":null,"vocab":[]},{"id":"bank-876","q":"Choose the correct spelling:","opts":{"A":"Parsimoneous","B":"Parsemonious","C":"Parsimonious","D":"Persimonious"},"ans":"C","exp":"The correct spelling is 'parsimonious' (meaning stingy/miserly).","src":null,"vocab":[]},{"id":"bank-877","q":"Find out the correct translation: 'অরণ্য রোদন'","opts":{"A":"Busy for nothing","B":"Out of debt, out of danger","C":"Crying in wilderness","D":"Waste not, want not"},"ans":"C","exp":"The Bengali idiom 'crying in the forest' refers to a futile appeal — matching 'crying in the wilderness,' something said but ignored by everyone.","src":null,"vocab":[]},{"id":"bank-878","q":"The Synonym of the word 'Erudite' is-","opts":{"A":"Smart","B":"Illiterate","C":"Knowledgeable","D":"Angry"},"ans":"C","exp":"'Erudite' means having or showing great knowledge, matching 'knowledgeable.'","src":null,"vocab":[]},{"id":"bank-879","q":"Despite his wealth, the monk lived an ascetic life, sleeping on the floor and eating plain rice. Choose the nearest Syn for the underlined word:","opts":{"A":"Luxurious","B":"Indulgent","C":"Austere","D":"Extravagant"},"ans":"C","exp":"'Ascetic' (self-denying, simple living) is closest in meaning to 'austere' (severely simple).","src":null,"vocab":[]},{"id":"bank-880","q":"Identify the correct antonym for the word 'Profligate'.","opts":{"A":"aggravate","B":"Frugal","C":"Criticize","D":"Copious"},"ans":"B","exp":"'Profligate' means recklessly wasteful with money; its opposite is 'frugal' (thrifty).","src":null,"vocab":[]},{"id":"bank-881","q":"Select the opposite word: 'DELETERIOUS'","opts":{"A":"impulsive","B":"salubrious","C":"pathetic","D":"inclusive"},"ans":"B","exp":"'Deleterious' means harmful; its opposite is 'salubrious' (health-giving).","src":null,"vocab":[]},{"id":"bank-882","q":"Select the opposite word: 'USURP'","opts":{"A":"rise rapidly","B":"usefully","C":"produce quickly","D":"own rightfully"},"ans":"D","exp":"'Usurp' means to seize power/position unlawfully; its opposite is 'own rightfully' (legitimate ownership).","src":null,"vocab":[]},{"id":"bank-883","q":"Select the opposite word: 'DISCORDANT'","opts":{"A":"harsh","B":"different","C":"harmonious","D":"separate"},"ans":"C","exp":"'Discordant' means disagreeing/unpleasant in sound; its opposite is 'harmonious.'","src":null,"vocab":[]},{"id":"bank-884","q":"Select the opposite word: 'INSOUCIANCE'","opts":{"A":"indifferent","B":"composure","C":"interest","D":"slumber"},"ans":"C","exp":"'Insouciance' means carefree indifference; its opposite is 'interest' (attention/concern).","src":null,"vocab":[]},{"id":"bank-885","q":"Select the opposite word: 'GRANDIOSE'","opts":{"A":"pretentious","B":"brilliant","C":"egoistic","D":"modest"},"ans":"D","exp":"'Grandiose' means pompously impressive; its opposite is 'modest' (unpretentious).","src":null,"vocab":[]},{"id":"bank-886","q":"Choose the correct alternative: 'INDOLENT'","opts":{"A":"casual","B":"lethargic","C":"boring","D":"disinterested"},"ans":"B","exp":"'Indolent' means lazy/averse to exertion, matching 'lethargic.'","src":null,"vocab":[]},{"id":"bank-887","q":"Choose the correct alternative: 'HALCYON'","opts":{"A":"luminous","B":"gentle","C":"motionless","D":"peaceful"},"ans":"D","exp":"'Halcyon' describes a calm, peaceful, often idyllic period (as in 'halcyon days'), matching 'peaceful.'","src":null,"vocab":[]},{"id":"bank-888","q":"Choose the correct alternative: 'VENERATE'","opts":{"A":"defame","B":"abuse","C":"respect","D":"accuse"},"ans":"C","exp":"'Venerate' means to regard with great respect/reverence, matching 'respect.'","src":null,"vocab":[]},{"id":"bank-889","q":"Choose the correct alternative: 'OBDURATE'","opts":{"A":"careless","B":"contrary","C":"callous","D":"stubborn"},"ans":"D","exp":"'Obdurate' means stubbornly refusing to change one's mind, matching 'stubborn.'","src":null,"vocab":[]},{"id":"bank-890","q":"Choose the correct alternative: 'ENIGMATIC'","opts":{"A":"pithy","B":"puzzling","C":"complicated","D":"illusive"},"ans":"B","exp":"'Enigmatic' means mysterious/difficult to interpret, matching 'puzzling.'","src":null,"vocab":[]},{"id":"bank-891","q":"Choose the nearest meaning: 'Prognosis'","opts":{"A":"scheme","B":"forecast","C":"preface","D":"identification"},"ans":"B","exp":"'Prognosis' is a forecast of the likely course/outcome (originally medical), matching 'forecast.'","src":null,"vocab":[]},{"id":"bank-892","q":"Choose the nearest meaning: 'Aromatic'","opts":{"A":"crippled","B":"fragrant","C":"sentimental","D":"stinking"},"ans":"B","exp":"'Aromatic' means having a pleasant, distinctive smell, matching 'fragrant.'","src":null,"vocab":[]},{"id":"bank-893","q":"Choose the nearest meaning: 'Ostentatious'","opts":{"A":"wealthy","B":"talkative","C":"showy","D":"noisy"},"ans":"C","exp":"'Ostentatious' means designed to impress/attract notice, matching 'showy.'","src":null,"vocab":[]},{"id":"bank-894","q":"Select the opposite word: 'Synchronized'","opts":{"A":"noisy","B":"discordant","C":"consequent","D":"adorned"},"ans":"B","exp":"'Synchronized' means coordinated to occur together; its opposite is 'discordant' (out of harmony).","src":null,"vocab":[]},{"id":"bank-895","q":"Select the opposite word: 'Facsimile'","opts":{"A":"reproduction","B":"sincere","C":"original","D":"engineered"},"ans":"C","exp":"'Facsimile' means an exact copy; its opposite is 'original' (the genuine first version).","src":null,"vocab":[]},{"id":"bank-896","q":"Match the underlined word: Lax intellectual property rights penalize cutting-edge research.","opts":{"A":"laborious","B":"stringent","C":"unambiguous","D":"innovative"},"ans":"B","exp":"'Lax' means lenient/loose; its opposite, contextually intended, is 'stringent' (strict).","src":null,"vocab":[]},{"id":"bank-897","q":"Match the underlined word: The government has failed to articulate the ideal regional order.","opts":{"A":"initiate","B":"reverberate","C":"resolve","D":"enunciate"},"ans":"D","exp":"'Articulate' means to express clearly, matching 'enunciate' (to express/state clearly).","src":null,"vocab":[]},{"id":"bank-898","q":"Match the underlined word: The mystery has never been conclusively solved.","opts":{"A":"drastically","B":"decisively","C":"disgracefully","D":"eventually"},"ans":"B","exp":"'Conclusively' means in a way that settles something beyond doubt, matching 'decisively.'","src":null,"vocab":[]},{"id":"bank-899","q":"Match the underlined word: When he was not invited to the wedding, he considered it a personal affront.","opts":{"A":"slur","B":"veneration","C":"assuage","D":"tenacity"},"ans":"A","exp":"'Affront' means an open insult; closest synonym is 'slur' (an insulting remark/action).","src":null,"vocab":[]},{"id":"bank-900","q":"The advent of television has had a profound effect upon people's lives.","opts":{"A":"widespread","B":"prevalent","C":"induction","D":"consequence"},"ans":"C","exp":"'Advent' means the arrival/coming into being of something, closest among the options to 'induction' (introduction/formal beginning).","src":null,"vocab":[]}]},{"id":"bank-10","title":"Bank Vocabulary [901-1000]","questions":[{"id":"bank-901","q":"Pick the nearest meaning: 'ABASE'","opts":{"A":"low","B":"peaceful","C":"humble","D":"cruel"},"ans":"C","exp":"'Abase' means to lower in dignity/status, matching 'humble' (to humiliate/lower).","src":null,"vocab":[]},{"id":"bank-902","q":"Pick the nearest meaning: 'ACUMEN'","opts":{"A":"beauty","B":"appearance","C":"insight","D":"distaste"},"ans":"C","exp":"'Acumen' means keen insight/sharp judgment, matching 'insight.'","src":null,"vocab":[]},{"id":"bank-903","q":"Identify the similar relationship: Incubator : Infant :: _____ : _____","opts":{"A":"Hive : Bee","B":"Greenhouse : Plant","C":"Bullet : Revolver","D":"Goalkeeper : Goalpost"},"ans":"B","exp":"An incubator provides a controlled environment to nurture an infant; similarly, a greenhouse provides a controlled environment to nurture a plant.","src":null,"vocab":[]},{"id":"bank-904","q":"Identify the similar relationship: Sap : Vitality :: _____ : _____","opts":{"A":"Drain : Resolve","B":"Bore : Tedium","C":"Enhance : Allure","D":"Examine : Opinion"},"ans":"A","exp":"'Sap' means to gradually deplete vitality; similarly, 'drain' means to gradually deplete resolve — both pairs show an action of depleting.","src":null,"vocab":[]},{"id":"bank-905","q":"Identify the similar relationship: Impromptu : Rehearsal :: _____ : _____","opts":{"A":"Numerical : Calculation","B":"Calculation : Calculator","C":"Offhand : Premeditation","D":"Makeshift : Fortitude"},"ans":"C","exp":"Something impromptu lacks rehearsal; similarly, something offhand lacks premeditation — both pairs show a lack-of-preparation relationship.","src":null,"vocab":[]},{"id":"bank-906","q":"Identify the opposite word: 'Assuage'","opts":{"A":"resolve","B":"decrease","C":"separate","D":"irritate"},"ans":"D","exp":"'Assuage' means to soothe/relieve; its opposite is 'irritate' (to provoke/annoy).","src":null,"vocab":[]},{"id":"bank-907","q":"Identify the opposite word: 'Admonition'","opts":{"A":"warning","B":"threat","C":"fear","D":"request"},"ans":"D","exp":"'Admonition' means a mild reprimand/warning; its opposite is 'request' (a polite ask, not a reproach).","src":null,"vocab":[]},{"id":"bank-908","q":"Find the best substitute: Fear of being enclosed in a small closed space.","opts":{"A":"agoraphobia","B":"claustrophobia","C":"xenophobia","D":"paranoia"},"ans":"B","exp":"'Claustrophobia' is the specific fear of being confined in a small/enclosed space.","src":null,"vocab":[]},{"id":"bank-909","q":"Find the best substitute: A person with a long experience of any occupation.","opts":{"A":"veteran","B":"genius","C":"seasoned","D":"ambidextrous"},"ans":"A","exp":"A 'veteran' is a person with long experience in a particular field/occupation.","src":null,"vocab":[]},{"id":"bank-910","q":"Select the best substitute: An unexpected piece of good fortune","opts":{"A":"turnstile","B":"windfall","C":"philanthropy","D":"benevolence"},"ans":"B","exp":"A 'windfall' is an unexpected, often substantial, piece of good fortune (originally fruit blown down by wind).","src":null,"vocab":[]},{"id":"bank-911","q":"Select the best substitute: One who cannot be corrected","opts":{"A":"incurable","B":"incorrigible","C":"hardened","D":"vulnerable"},"ans":"B","exp":"'Incorrigible' describes a person/habit that cannot be corrected or reformed.","src":null,"vocab":[]},{"id":"bank-912","q":"Select the opposite meaning: 'EQUIVOCATE'","opts":{"A":"slouch","B":"sigh","C":"stability","D":"be truthful"},"ans":"D","exp":"'Equivocate' means to use ambiguous language to avoid speaking the truth directly; its opposite is 'be truthful.'","src":null,"vocab":[]},{"id":"bank-913","q":"Select the opposite meaning: 'CONCOMITANT'","opts":{"A":"assistant","B":"artificial","C":"pellucid","D":"discrete"},"ans":"D","exp":"'Concomitant' means accompanying/occurring together; its opposite is 'discrete' (separate/distinct).","src":null,"vocab":[]},{"id":"bank-914","q":"Select the nearest meaning: 'ALTRUISTIC'","opts":{"A":"truthful","B":"capable","C":"loving","D":"generous"},"ans":"D","exp":"'Altruistic' means showing selfless concern for others' wellbeing, closest among options to 'generous.'","src":null,"vocab":[]},{"id":"bank-915","q":"Select the nearest meaning: 'AMELIORATE'","opts":{"A":"strengthen","B":"lessen","C":"cause","D":"replace"},"ans":"B","exp":"'Ameliorate' means to make a bad situation better; in context, 'lessen' (reduce a problem) is closest among the options.","src":null,"vocab":[]},{"id":"bank-916","q":"Identify the similar relationship: Fox : cunning :: _____ : _____","opts":{"A":"Bus : school","B":"Tool : dentist","C":"Taj Mahal : beautiful","D":"Class : students"},"ans":"C","exp":"A fox is proverbially known for cunning; similarly, the Taj Mahal is universally known for beauty — both pairs link a subject to its defining quality.","src":null,"vocab":[]},{"id":"bank-917","q":"Identify the similar relationship: Shard : Pottery :: _____ : _____","opts":{"A":"Splinter : Wood","B":"Silver : Glass","C":"Slab : Concrete","D":"Fiber : Cloth"},"ans":"A","exp":"A shard is a broken piece of pottery; similarly, a splinter is a broken piece of wood — both pairs show a fragment resulting from breaking the whole.","src":null,"vocab":[]},{"id":"bank-918","q":"Identify the similar relationship: Irascible : Provoked :: _____ : _____","opts":{"A":"Credulous : Persuaded","B":"Fanatic : Reasoned","C":"Gullible : Fooled","D":"Humorous : Amused"},"ans":"A","exp":"An irascible person is easily provoked; similarly, a credulous person is easily persuaded — both pairs show a personality trait and the ease with which it's triggered.","src":null,"vocab":[]},{"id":"bank-919","q":"Form the antonym using the correct prefix: 'IM'","opts":{"A":"animate","B":"patient","C":"sympathy","D":"comfort"},"ans":"B","exp":"'Patient' takes the prefix 'im-' to form 'impatient' (the opposite).","src":null,"vocab":[]},{"id":"bank-920","q":"Form the antonym using the correct prefix: 'MAL'","opts":{"A":"media","B":"nutrition","C":"climax","D":"fearful"},"ans":"B","exp":"'Nutrition' takes the prefix 'mal-' to form 'malnutrition' (poor/insufficient nutrition).","src":null,"vocab":[]},{"id":"bank-921","q":"Form the antonym using the correct prefix: 'UN'","opts":{"A":"appear","B":"fortune","C":"toxin","D":"controlled"},"ans":"D","exp":"'Controlled' takes the prefix 'un-' to form 'uncontrolled' (the opposite).","src":null,"vocab":[]},{"id":"bank-922","q":"Form the antonym using the correct prefix: 'IN'","opts":{"A":"sense","B":"septic","C":"attentive","D":"pure"},"ans":"C","exp":"'Attentive' takes the prefix 'in-' to form 'inattentive' (the opposite).","src":null,"vocab":[]},{"id":"bank-923","q":"Form the antonym using the correct prefix: 'IR'","opts":{"A":"rational","B":"resolute","C":"responsible","D":"All of a, b, c"},"ans":"D","exp":"Words beginning with 'R' typically take the prefix 'ir-' to form their opposite: irrational, irresolute, and irresponsible are all correctly formed.","src":null,"vocab":[]},{"id":"bank-924","q":"Explain the given idioms/phrases: 'Hard and Fast'","opts":{"A":"Quick","B":"Solid","C":"Rigid","D":"Difficult"},"ans":"C","exp":"'Hard and fast' (rule) means fixed/strict and unable to be changed, matching 'rigid.'","src":null,"vocab":[]},{"id":"bank-925","q":"Explain the given idioms/phrases: 'Black Sheep'","opts":{"A":"Illiterate person","B":"Sheep black in color","C":"Person of bad character","D":"All of A, B, C"},"ans":"C","exp":"'Black sheep' is an idiom for a family/group member regarded as a disgrace because of bad behavior.","src":null,"vocab":[]},{"id":"bank-926","q":"Explain the given idioms/phrases: 'At Large'","opts":{"A":"Vast","B":"Disorder","C":"Often","D":"Free"},"ans":"D","exp":"'At large' means free/not captured, as when a criminal has escaped custody.","src":null,"vocab":[]},{"id":"bank-927","q":"Explain the given idioms/phrases: 'Now and Then'","opts":{"A":"Always","B":"In future","C":"Regularly","D":"Occasionally"},"ans":"D","exp":"'Now and then' means occasionally/sometimes, matching 'occasionally.'","src":null,"vocab":[]},{"id":"bank-928","q":"Explain the given i
