":"bank-173","q":"The idiom 'hit upon' means:","opts":{"A":"find","B":"fall down","C":"suddenly meet","D":"get injured"},"ans":"A","exp":"'Hit upon' means to discover/find something suddenly (often an idea or solution).","src":null,"vocab":[]},{"id":"bank-174","q":"The opposite of the word 'terminate' is","opts":{"A":"depart","B":"prevent","C":"begin","D":"change/conclude"},"ans":"C","exp":"'Terminate' means to end; its opposite is 'begin' (to start).","src":null,"vocab":[]},{"id":"bank-175","q":"The Synonym of the word 'honorary' is","opts":{"A":"part-time","B":"optional","C":"voluntary","D":"elective"},"ans":"C","exp":"'Honorary' describes a position held for honor without pay, closest to 'voluntary' (unpaid).","src":null,"vocab":[]},{"id":"bank-176","q":"The term 'cereal' is used to mean","opts":{"A":"fish","B":"series","C":"order","D":"grain"},"ans":"D","exp":"'Cereal' refers to edible grain crops. (Not to be confused with 'serial,' meaning a series.)","src":null,"vocab":[]},{"id":"bank-177","q":"The meaning of the word 'craft' is","opts":{"A":"skill","B":"moral","C":"fabric","D":"sketch/outline"},"ans":"A","exp":"'Craft' means skill, especially in a trade or art.","src":null,"vocab":[]},{"id":"bank-178","q":"Choose the best word(s) for each blank: The significance of the Magna Carta lies not in its _____ provisions, but in its broader impact: it made the king subject to the law.","opts":{"A":"Specific","B":"Revolutionary","C":"Implicit","D":"Controversial"},"ans":"A","exp":"The contrast 'not in its ___ provisions, but in its broader impact' calls for 'specific' (individual details) versus the larger overall significance.","src":null,"vocab":[]},{"id":"bank-179","q":"Choose the best word(s) for each blank: This poetry is not _____; it is more likely to appeal to an international audience than is poetry with strictly regional themes.","opts":{"A":"Familiar","B":"Provincial","C":"Technical","D":"Democratic"},"ans":"B","exp":"Since the poetry appeals internationally rather than being tied to regional themes, it is not 'provincial' (narrow/regional in outlook).","src":null,"vocab":[]},{"id":"bank-180","q":"Choose the best word(s) for each blank: Experienced employers recognize that business students who can _____ different points of view are ultimately more effective as managers than are the brilliant and original students who _____ dogmatically to their own formulations.","opts":{"A":"Discredit-revert","B":"Assimilate-adhere","C":"Impose-refer","D":"Advocate-relate"},"ans":"B","exp":"Managers who can 'assimilate' (absorb/incorporate) different viewpoints are more effective than those who rigidly 'adhere' (stick) to only their own ideas.","src":null,"vocab":[]},{"id":"bank-181","q":"FRAGILE : BREAK ::","opts":{"A":"Invisible : See","B":"Erratic : Control","C":"Flammable : Burn","D":"Industrial : Manufacture"},"ans":"C","exp":"Something fragile is easy to break; similarly, something flammable is easy to burn.","src":null,"vocab":[]},{"id":"bank-182","q":"EXPAND : VOLUME ::","opts":{"A":"Ascend : Flight","B":"Proliferate : Number","C":"Bend : Flexibility","D":"Cool : Temperature"},"ans":"B","exp":"To expand is to increase in volume; similarly, to proliferate is to increase in number.","src":null,"vocab":[]},{"id":"bank-183","q":"TREE : FORESTRY ::","opts":{"A":"tractor : agriculture","B":"experiment : laboratory","C":"fuel : combustion","D":"flower : horticulture"},"ans":"D","exp":"Forestry is the science of growing/managing trees; similarly, horticulture is the science of growing/managing flowers and plants.","src":null,"vocab":[]},{"id":"bank-184","q":"Select the Synonym of the given word: 'Hindrance'","opts":{"A":"Solution","B":"Opportunity","C":"Answer","D":"Barrier"},"ans":"D","exp":"'Hindrance' means an obstacle, synonymous with 'barrier.'","src":null,"vocab":[]},{"id":"bank-185","q":"Select the Synonym of the given word: 'Mutiny'","opts":{"A":"Malignity","B":"Revolt","C":"Plane","D":"Demise"},"ans":"B","exp":"'Mutiny' means an open rebellion against authority (often military), synonymous with 'revolt.'","src":null,"vocab":[]},{"id":"bank-186","q":"The meaning of the phrase 'Pros and Cons' is","opts":{"A":"Good and Bad","B":"Light and Dark","C":"In and Out","D":"Advantage and disadvantage"},"ans":"D","exp":"'Pros and cons' means the advantages and disadvantages of something.","src":null,"vocab":[]},{"id":"bank-187","q":"Choose the word opposite in meaning: 'ASSET'","opts":{"A":"duty","B":"qualification","C":"denial","D":"liability"},"ans":"D","exp":"'Asset' means something of value owned; its opposite is 'liability' (a debt or obligation owed).","src":null,"vocab":[]},{"id":"bank-188","q":"Choose the word opposite in meaning: 'CONCUR'","opts":{"A":"expose","B":"incite","C":"forgive","D":"dissent"},"ans":"D","exp":"'Concur' means to agree; its opposite is 'dissent' (to disagree).","src":null,"vocab":[]},{"id":"bank-189","q":"Choose the word opposite in meaning: 'AMALGAMATE'","opts":{"A":"congregate","B":"insulate","C":"isolate","D":"layer"},"ans":"C","exp":"'Amalgamate' means to combine/merge into one; its opposite is 'isolate' (to separate).","src":null,"vocab":[]},{"id":"bank-190","q":"Choose the word opposite in meaning: 'MOBILE'","opts":{"A":"fixed","B":"moving","C":"portable","D":"divided"},"ans":"A","exp":"'Mobile' means able to move/be moved; its opposite is 'fixed' (stationary).","src":null,"vocab":[]},{"id":"bank-191","q":"'en route' means-","opts":{"A":"through the route","B":"through the way","C":"on the way","D":"in the way"},"ans":"C","exp":"'En route' (French loanword) means on the way to a destination.","src":null,"vocab":[]},{"id":"bank-192","q":"The word 'Lucrative' means-","opts":{"A":"good looking","B":"oily","C":"professional","D":"profitable"},"ans":"D","exp":"'Lucrative' means producing a lot of profit/financially rewarding.","src":null,"vocab":[]},{"id":"bank-193","q":"'Blue chips' are-","opts":{"A":"securities issued by the government","B":"industrial shares considered to be a safe investment","C":"industrial shares considered to be a risky investment","D":"a component of computer"},"ans":"B","exp":"'Blue chip' stocks are shares of large, well-established, financially sound companies considered a safe/reliable investment.","src":null,"vocab":[]},{"id":"bank-194","q":"The match was called _____ because the weather was bad.","opts":{"A":"out","B":"in","C":"off","D":"after"},"ans":"C","exp":"'Call off' is a phrasal verb meaning to cancel.","src":null,"vocab":[]},{"id":"bank-195","q":"I have no confidence _____ him.","opts":{"A":"on","B":"at","C":"in","D":"upon"},"ans":"C","exp":"The correct preposition collocation is 'confidence in' (someone/something).","src":null,"vocab":[]},{"id":"bank-196","q":"Early rising is beneficial _____ health.","opts":{"A":"to","B":"for","C":"on","D":"of"},"ans":"A","exp":"The correct collocation is 'beneficial to' (something), not 'beneficial for.'","src":null,"vocab":[]},{"id":"bank-197","q":"They live _____ catching fish.","opts":{"A":"by","B":"on","C":"with","D":"for"},"ans":"A","exp":"'Live by' + gerund means to earn one's livelihood through a means/activity.","src":null,"vocab":[]},{"id":"bank-198","q":"Choose the word most nearly opposite in meaning to: 'ASSET'","opts":{"A":"duty","B":"qualification","C":"denial","D":"liability"},"ans":"D","exp":"'Asset' means something of value owned; its opposite is 'liability' (a debt owed).","src":null,"vocab":[]},{"id":"bank-199","q":"Choose the word most nearly opposite in meaning to: 'CONCUR'","opts":{"A":"expose","B":"incite","C":"forgive","D":"dissent"},"ans":"D","exp":"'Concur' means to agree; its opposite is 'dissent' (to disagree).","src":null,"vocab":[]},{"id":"bank-200","q":"Choose the word most nearly opposite in meaning to: 'AMALGAMATE'","opts":{"A":"congregate","B":"insulated","C":"isolate","D":"layer"},"ans":"C","exp":"'Amalgamate' means to combine/merge into one; its opposite is 'isolate' (to separate).","src":null,"vocab":[]}]},{"id":"bank-3","title":"Bank Vocabulary [201-300]","questions":[{"id":"bank-201","q":"Choose the correct word(s) to complete the sentence: A computer program can provide information in ways that force students to _____ learning instead of being merely _____ of knowledge.","opts":{"A":"shore up....... reservoirs","B":"accede to....... consumers","C":"participate in........ recipients","D":"compensate for....... custodians"},"ans":"C","exp":"Modern learning should make students actively 'participate in' learning rather than be passive 'recipients' of knowledge.","src":null,"vocab":[]},{"id":"bank-202","q":"Choose the correct word(s) to complete the sentence: The form and physiology of leaves vary according to the _____ in which they develop: for example, leaves display a wide range of adaptations to different degrees of light and moisture.","opts":{"A":"relationship","B":"species","C":"sequence","D":"environment"},"ans":"D","exp":"Light and moisture are environmental factors, so leaves vary according to the 'environment' in which they develop.","src":null,"vocab":[]},{"id":"bank-203","q":"Choose the correct word(s) to complete the sentence: One theory about intelligence sees _____ as the logical structure underlying thinking and insists that since animals are mute, they must be _____ as well.","opts":{"A":"behavior, inactive","B":"instinct, cooperative","C":"heredity, thoughtful","D":"language, mindless"},"ans":"D","exp":"If 'language' is seen as the basis of thought, then mute (speechless) animals would logically be considered 'mindless' under this theory.","src":null,"vocab":[]},{"id":"bank-204","q":"Choose the correct word(s) to complete the sentence: Though _____ in her personal life, Edna St. Vincent Millay was nonetheless _____ about her work, usually producing several pages of complicated rhyme in a day.","opts":{"A":"jaded ... feckless","B":"verbose ... ascetic","C":"vain ... humble","D":"impulsive ... disciplined"},"ans":"D","exp":"'Though...nonetheless' signals contrast: she was 'impulsive' personally but 'disciplined' in her prolific daily writing output.","src":null,"vocab":[]},{"id":"bank-205","q":"Select the pair of words that best reflects the relationship: VINDICTIVE : MERCY ::","opts":{"A":"insightful : hope","B":"modest : dignity","C":"skeptical : truthfulness","D":"pathetic : sympathy"},"ans":"C","exp":"A vindictive person lacks mercy; similarly, a skeptical person lacks (belief in) truthfulness.","src":null,"vocab":[]},{"id":"bank-206","q":"Select the pair of words that best reflects the relationship: CONSPICUOUS : SEE ::","opts":{"A":"repulsive : forget","B":"prohibited : discount","C":"deceptive : delude","D":"transparent : understand"},"ans":"D","exp":"Something conspicuous is easy to see; similarly, something transparent is easy to understand.","src":null,"vocab":[]},{"id":"bank-207","q":"Select the pair of words that best reflects the relationship: IMMATURE : DEVELOPED ::","opts":{"A":"accessible : exposed","B":"theoretical : conceived","C":"tangible : identified","D":"incipient : realized"},"ans":"D","exp":"Immature is the early stage before becoming developed; similarly, incipient (just beginning) is the early stage before becoming realized.","src":null,"vocab":[]},{"id":"bank-208","q":"Select the pair of words that best reflects the relationship: YOLK : EGG ::","opts":{"A":"rind : melon","B":"nucleus : cell","C":"stalk : corn","D":"web : spider"},"ans":"B","exp":"The yolk is the central, essential part of an egg; similarly, the nucleus is the central, essential part of a cell.","src":null,"vocab":[]},{"id":"bank-209","q":"Select the pair of words that best reflects the relationship: WOOD : SAND ::","opts":{"A":"coal : burn","B":"brick : lay","C":"oil : polish","D":"metal : burnish"},"ans":"D","exp":"You sand wood to make it smooth; similarly, you burnish metal to make it smooth/shiny.","src":null,"vocab":[]},{"id":"bank-210","q":"Choose the word that is closest in meaning to the opposite of the given word: DEMISE","opts":{"A":"integrity","B":"irritation","C":"birth","D":"excess"},"ans":"C","exp":"'Demise' means death/end; its opposite is 'birth' (origin/beginning).","src":null,"vocab":[]},{"id":"bank-211","q":"Choose the word that is closest in meaning to the opposite of the given word: ADULTERATED","opts":{"A":"solid","B":"immature","C":"exalted","D":"pure"},"ans":"D","exp":"'Adulterated' means mixed with inferior substances; its opposite is 'pure' (unmixed, genuine).","src":null,"vocab":[]},{"id":"bank-212","q":"Choose the word that is closest in meaning to the opposite of the given word: TRANSIENT","opts":{"A":"steady","B":"desultory","C":"spontaneous","D":"subterranean"},"ans":"A","exp":"'Transient' means short-lived/temporary; its opposite is 'steady' (stable, permanent).","src":null,"vocab":[]},{"id":"bank-213","q":"Choose the word that is closest in meaning to the opposite of the given word: CONDONE","opts":{"A":"denounce","B":"endure","C":"imagine","D":"remember"},"ans":"A","exp":"'Condone' means to overlook/forgive wrongdoing; its opposite is 'denounce' (to publicly condemn).","src":null,"vocab":[]},{"id":"bank-214","q":"Choose the word that is closest in meaning to the opposite of the given word: HAMPER","opts":{"A":"feed","B":"animate","C":"facilitate","D":"treat lightly"},"ans":"C","exp":"'Hamper' means to hinder/obstruct; its opposite is 'facilitate' (to make easier).","src":null,"vocab":[]},{"id":"bank-215","q":"Choose the pair of words that shows a similar relationship to the given pair: WALK : LEGS","opts":{"A":"blink : eyes","B":"chew : mouth","C":"dress : hem","D":"cover : book"},"ans":"B","exp":"You use your legs to walk; similarly, you use your mouth to chew.","src":null,"vocab":[]},{"id":"bank-216","q":"Choose the pair of words that shows a similar relationship to the given pair: TOPAZ : YELLOW","opts":{"A":"diamond : carat","B":"jeweler : clarity","C":"sapphire : red","D":"amethyst : purple"},"ans":"D","exp":"The natural color of topaz is yellow; similarly, the natural color of amethyst is purple.","src":null,"vocab":[]},{"id":"bank-217","q":"Choose the pair of words that shows a similar relationship to the given pair: LUMEN : BRIGHTNESS","opts":{"A":"candle : light","B":"density : darkness","C":"nickel : metal","D":"inches : length"},"ans":"D","exp":"Lumen is a unit used to measure brightness; similarly, inches is a unit used to measure length.","src":null,"vocab":[]},{"id":"bank-218","q":"Choose the word closest in meaning to the capitalized word: 'INGENUOUS'","opts":{"A":"sophisticated","B":"clever","C":"cunning","D":"devious","E":"None of these"},"ans":"E","exp":"'Ingenuous' means simple/sincere/naive, the opposite of the cunning/clever options given; no listed option matches, so 'None of these' is correct.","src":null,"vocab":[]},{"id":"bank-219","q":"Choose the word closest in meaning to the capitalized word: 'DILIGENT'","opts":{"A":"laid-back","B":"large","C":"industrious","D":"lethargic","E":"None of these"},"ans":"C","exp":"'Diligent' means hard-working/careful, synonymous with 'industrious.'","src":null,"vocab":[]},{"id":"bank-220","q":"Choose the word closest in meaning to the capitalized word: 'HYPOTHETICAL'","opts":{"A":"logical","B":"alternative","C":"assumed","D":"reasonable","E":"None of these"},"ans":"C","exp":"'Hypothetical' means based on a supposition, closest to 'assumed.'","src":null,"vocab":[]},{"id":"bank-221","q":"Choose the word closest in meaning to the capitalized word: 'ENHANCE'","opts":{"A":"doubt","B":"improve","C":"indolent","D":"agree","E":"None of these"},"ans":"B","exp":"'Enhance' means to intensify/increase the quality of something, closest to 'improve.'","src":null,"vocab":[]},{"id":"bank-222","q":"Choose the word closest in meaning to the capitalized word: 'INFLATED'","opts":{"A":"exorbitant","B":"reasonable","C":"sensible","D":"low","E":"None of these"},"ans":"A","exp":"'Inflated' (prices) means excessively/unreasonably high, closest to 'exorbitant.'","src":null,"vocab":[]},{"id":"bank-223","q":"Choose the pair that best shows a similar relationship: CLOTHES : LUGGAGE","opts":{"A":"Baggage : Train","B":"Package : post office","C":"Documents : Briefcase","D":"Airmail : mail carrier","E":"None of these"},"ans":"C","exp":"Clothes are kept/carried in luggage; similarly, documents are kept/carried in a briefcase.","src":null,"vocab":[]},{"id":"bank-224","q":"Choose the pair that best shows a similar relationship: RACQUET : TENNIS","opts":{"A":"Driver : Springboard","B":"Horse : Polo","C":"Bat : Cricket","D":"Gun : Hunting","E":"None of these"},"ans":"C","exp":"A racquet is the primary equipment used to play tennis; similarly, a bat is the primary equipment used to play cricket.","src":null,"vocab":[]},{"id":"bank-225","q":"Choose the pair that best shows a similar relationship: GOVERNMENT : TAX","opts":{"A":"Student : fees","B":"Orange : price","C":"Company : profit","D":"Chairman : parliament","E":"None of these"},"ans":"C","exp":"A government's core income source is tax; similarly, a company's core income source/objective is profit.","src":null,"vocab":[]},{"id":"bank-226","q":"Choose the pair that best shows a similar relationship: SQUARE : CUBE","opts":{"A":"triangle : hexagon","B":"trapezoid : quadrangle","C":"circle : sphere","D":"addition : substraction","E":"None of these"},"ans":"C","exp":"A cube is the three-dimensional version of a square; similarly, a sphere is the three-dimensional version of a circle.","src":null,"vocab":[]},{"id":"bank-227","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'BONA-FIDE'","opts":{"A":"honest","B":"pure","C":"similar","D":"spurious","E":"None of these"},"ans":"D","exp":"'Bona-fide' means genuine; its opposite is 'spurious' (fake, not genuine).","src":null,"vocab":[]},{"id":"bank-228","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'LETHARGIC'","opts":{"A":"energetic","B":"Lazy","C":"indifferent","D":"bored","E":"None of these"},"ans":"A","exp":"'Lethargic' means sluggish/lacking energy; its opposite is 'energetic' (full of energy).","src":null,"vocab":[]},{"id":"bank-229","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'UNTENABLE'","opts":{"A":"indefensible","B":"weak","C":"maintainable","D":"shaky","E":"None of these"},"ans":"C","exp":"'Untenable' means indefensible/cannot be maintained; its opposite is 'maintainable.'","src":null,"vocab":[]},{"id":"bank-230","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'DEBACLE'","opts":{"A":"decide","B":"success","C":"discord","D":"debate","E":"None of these"},"ans":"B","exp":"'Debacle' means a sudden, complete failure/disaster; its opposite is 'success.'","src":null,"vocab":[]},{"id":"bank-231","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'EXPEDITE'","opts":{"A":"accelerate","B":"advance","C":"rush","D":"impede","E":"None of these"},"ans":"D","exp":"'Expedite' means to speed up a process; its opposite is 'impede' (to slow down/hinder).","src":null,"vocab":[]},{"id":"bank-232","q":"In each question, choose the word that best replaces the given words: One who pretends illness to escape duty","opts":{"A":"Truant","B":"Malingerer","C":"Hypocrite","D":"Concubine"},"ans":"B","exp":"'Malingerer' refers to someone who fakes illness to avoid work/duty.","src":null,"vocab":[]},{"id":"bank-233","q":"In each question, choose the word that best replaces the given words: The power of reading the thoughts of others","opts":{"A":"Psychopathy","B":"Telecommunication","C":"Psychology","D":"Telepathy"},"ans":"D","exp":"'Telepathy' is the supposed power of perceiving others' thoughts without any physical means of communication.","src":null,"vocab":[]},{"id":"bank-234","q":"In each question, choose the word that best replaces the given words: A poem written on the death of someone loved and lost","opts":{"A":"Ode","B":"Elegy","C":"Sonnet","D":"Epic"},"ans":"B","exp":"An 'elegy' is a poem of mourning, typically for someone who has died.","src":null,"vocab":[]},{"id":"bank-235","q":"In each question, choose the word that best replaces the given words: A place of ideal peace and happiness","opts":{"A":"Elysium","B":"Utopia","C":"El Dorado","D":"Asylum"},"ans":"A","exp":"'Elysium' (per Greek mythology) refers to a place of ideal peace and happiness. (Note: 'Utopia' refers more to an ideal society/state.)","src":null,"vocab":[]},{"id":"bank-236","q":"In each question, choose the word that best replaces the given words: A political leader who tries to stir up people","opts":{"A":"Statesman","B":"Dictator","C":"Demagogue","D":"Martinet"},"ans":"C","exp":"A 'demagogue' is a political leader who stirs up people's emotions/prejudices to gain power.","src":null,"vocab":[]},{"id":"bank-237","q":"Choose the word that is opposite in meaning to the italicized word: He has a superficial knowledge of the subject.","opts":{"A":"shallow","B":"profound","C":"sufficient","D":"excessive"},"ans":"B","exp":"'Superficial' means shallow/not deep; its opposite is 'profound' (deep, thorough).","src":null,"vocab":[]},{"id":"bank-238","q":"Choose the word that is opposite in meaning to the italicized word: The dinner set she presented to me was durable enough.","opts":{"A":"worn out","B":"light","C":"fragile","D":"long-lasting"},"ans":"C","exp":"'Durable' means long-lasting/sturdy; its opposite is 'fragile' (easily broken).","src":null,"vocab":[]},{"id":"bank-239","q":"Choose the word that is opposite in meaning to the italicized word: The influence of political broadcasts on election is considerable.","opts":{"A":"inadequate","B":"uninfluential","C":"negligible","D":"insignificant"},"ans":"C","exp":"'Considerable' means significant in amount; its most precise opposite for measuring impact/quantity is 'negligible' (so small as to be unimportant).","src":null,"vocab":[]},{"id":"bank-240","q":"Choose the word that is opposite in meaning to the italicized word: The principal hardly managed to give the papers a cursory glance.","opts":{"A":"superficial","B":"thorough","C":"though","D":"curious"},"ans":"B","exp":"'Cursory' means quick/superficial; its opposite is 'thorough' (detailed, careful).","src":null,"vocab":[]},{"id":"bank-241","q":"Choose the word that is opposite in meaning to the italicized word: He was exonerated of the charge of theft when the woman gave evidence in his favor.","opts":{"A":"imprisoned","B":"complained","C":"expelled","D":"accused"},"ans":"D","exp":"'Exonerated' means cleared of blame/charge; its opposite is 'accused' (charged with wrongdoing).","src":null,"vocab":[]},{"id":"bank-242","q":"In each question, choose the option that best expresses the meaning of the bolded part: His craven behavior makes him an object of mockery.","opts":{"A":"indecent","B":"Cowardly","C":"mean","D":"silly"},"ans":"B","exp":"'Craven' means cowardly.","src":null,"vocab":[]},{"id":"bank-243","q":"In each question, choose the option that best expresses the meaning of the bolded part: The opposition made a strident demand for putting the bill to vote.","opts":{"A":"courageous","B":"brave","C":"vociferous","D":"powerful"},"ans":"C","exp":"'Strident' means loud and harsh-sounding, closest to 'vociferous' (loud and forceful in expression).","src":null,"vocab":[]},{"id":"bank-244","q":"In each question, choose the option that best expresses the meaning of the bolded part: During negotiations, the Managing Director remained obdurate.","opts":{"A":"adamant","B":"tough","C":"co-operative","D":"flexible"},"ans":"A","exp":"'Obdurate' means stubbornly refusing to change, closest to 'adamant.'","src":null,"vocab":[]},{"id":"bank-245","q":"In each question, choose the option that best expresses the meaning of the bolded part: As long as he remained in the office, he maintained his hegemony","opts":{"A":"predominance","B":"poverty","C":"subordination","D":"chaos"},"ans":"A","exp":"'Hegemony' means dominance/leadership, closest to 'predominance.'","src":null,"vocab":[]},{"id":"bank-246","q":"In each question, choose the option that best expresses the opposite meaning of the bolded part: The last show of the concert at the Theatre was a fiasco.","opts":{"A":"success","B":"victory","C":"fruitful","D":"triumph"},"ans":"C","exp":"'Fiasco' means a complete failure; among the given options, 'fruitful' (productive/successful) most directly represents the opposite, though success/victory/triumph also work as antonyms here.","src":null,"vocab":[]},{"id":"bank-247","q":"In each question, choose the option that best expresses the meaning of the bolded part: Self-reliance has been adopted as an important objective of economic planning in modern Bangladesh.","opts":{"A":"discarded","B":"denied","C":"accepted","D":"refused"},"ans":"C","exp":"'Adopted' means taken up/embraced, closest to 'accepted.'","src":null,"vocab":[]},{"id":"bank-248","q":"Choose the Synonym of the underlined word: 'KUDOS'","opts":{"A":"oriental spot","B":"penalty","C":"praise","D":"antelope"},"ans":"C","exp":"'Kudos' means praise/recognition for achievement.","src":null,"vocab":[]},{"id":"bank-249","q":"Choose the Synonym of the underlined word: 'GRATIS'","opts":{"A":"gratifying","B":"free","C":"gracious","D":"with charge"},"ans":"B","exp":"'Gratis' means without payment, i.e., free.","src":null,"vocab":[]},{"id":"bank-250","q":"Choose the Synonym of the underlined word: 'OPAQUE'","opts":{"A":"famous","B":"obscure","C":"illiterate","D":"immature"},"ans":"B","exp":"'Opaque' (literally not transparent) figuratively means unclear/hard to understand, closest to 'obscure.'","src":null,"vocab":[]},{"id":"bank-251","q":"Choose the antonym of the underlined word: 'Misconstrue'","opts":{"A":"watch patiently","B":"follow closely","C":"assemble carefully","D":"grasp accurately"},"ans":"D","exp":"'Misconstrue' means to misinterpret; its opposite is to accurately understand, i.e., 'grasp accurately.'","src":null,"vocab":[]},{"id":"bank-252","q":"Choose the antonym of the underlined word: Everything about him, his talkative nature, proclaims his 'effeminacy'.","opts":{"A":"boorishness","B":"manliness","C":"aggressiveness","D":"attractiveness"},"ans":"B","exp":"'Effeminacy' refers to feminine qualities in a man; its opposite is 'manliness.'","src":null,"vocab":[]},{"id":"bank-253","q":"Choose the antonym of the underlined word: 'Celibacy'","opts":{"A":"chastity","B":"misogyny","C":"matrimony","D":"divorce"},"ans":"C","exp":"'Celibacy' means staying unmarried/abstaining from marriage; its opposite is 'matrimony' (marriage).","src":null,"vocab":[]},{"id":"bank-254","q":"'Nip in the bud' means-","opts":{"A":"destroy at the very beginning","B":"rare-up","C":"damp the spirits","D":"very costly possession"},"ans":"A","exp":"'Nip in the bud' means to stop something at an early stage before it can develop further.","src":null,"vocab":[]},{"id":"bank-255","q":"Match the word or phrase with its best meaning: One whose attitude is: 'eat drink and be merry'.","opts":{"A":"epicurean","B":"cynic","C":"materialistic","D":"stoic"},"ans":"A","exp":"An 'epicurean' is someone devoted to sensual pleasure, especially enjoying food and drink.","src":null,"vocab":[]},{"id":"bank-256","q":"Match the word or phrase with its best meaning: As this is his first job he will have to put up with the inconvenience","opts":{"A":"endure","B":"adapt","C":"overcome","D":"avoid"},"ans":"A","exp":"'Put up with' means to tolerate/endure.","src":null,"vocab":[]},{"id":"bank-257","q":"Changing one's mind too quickly means-","opts":{"A":"changeableness","B":"vacillation","C":"versatility","D":"instability"},"ans":"B","exp":"'Vacillation' refers to repeatedly changing one's mind/being indecisive.","src":null,"vocab":[]},{"id":"bank-258","q":"Fill in the blanks with suitable words: The bank cashier's _____ of the funds was not discovered until the auditors examined the accounts.","opts":{"A":"extradition","B":"embezzlement","C":"patronage","D":"an ingenious"},"ans":"B","exp":"'Embezzlement' means misappropriating funds entrusted to one's care — exactly what an auditor would uncover.","src":null,"vocab":[]},{"id":"bank-259","q":"The poetry of Malarme is not clear and easily accessible but rather vague and _____","opts":{"A":"opaque","B":"redundant","C":"lucid","D":"hasty"},"ans":"A","exp":"Since the poetry is 'not clear,' the blank needs a word similar to 'vague,' i.e., 'opaque' (unclear/difficult to understand).","src":null,"vocab":[]},{"id":"bank-260","q":"Choose the opposite of the underlined word: 'Bankrupt'","opts":{"A":"solvent","B":"insolvent","C":"rich","D":"corrupt"},"ans":"A","exp":"'Bankrupt' means financially ruined/unable to pay debts; its opposite is 'solvent' (financially sound).","src":null,"vocab":[]},{"id":"bank-261","q":"Choose the opposite of the underlined word: 'Unwitting'","opts":{"A":"intentional","B":"unintentional","C":"clever","D":"stupid"},"ans":"A","exp":"'Unwitting' means unintentional/unaware; its opposite is 'intentional' (done deliberately).","src":null,"vocab":[]},{"id":"bank-262","q":"Choose the opposite of the underlined word: 'Zenith'","opts":{"A":"final","B":"top","C":"doubt","D":"lowest point"},"ans":"D","exp":"'Zenith' means the highest point/peak; its opposite is 'lowest point' (nadir).","src":null,"vocab":[]},{"id":"bank-263","q":"Match the underlined word or phrase with its best meaning: In comparison to the history of the world, human life is very 'transient'.","opts":{"A":"meaningless","B":"poignant","C":"short-lived","D":"arbitrary"},"ans":"C","exp":"'Transient' means temporary/fleeting, i.e., short-lived.","src":null,"vocab":[]},{"id":"bank-264","q":"Match the underlined word or phrase with its best meaning: The employees who believe that they 'may be affected' by the new policy should contact the authority.","opts":{"A":"will have been effected","B":"may be affected","C":"will be affective","D":"will have been affected"},"ans":"B","exp":"'Affect' (verb, meaning to influence) is correctly used here; 'effect' would be a noun/different verb meaning to bring about.","src":null,"vocab":[]},{"id":"bank-265","q":"Match the underlined word or phrase with its best meaning: Mr. Arman was instigated by his colleagues to speak against the director in the meeting.","opts":{"A":"provoked","B":"followed","C":"restrained","D":"protected"},"ans":"A","exp":"'Instigated' means incited/urged into action, closest to 'provoked.'","src":null,"vocab":[]},{"id":"bank-266","q":"Match the underlined word or phrase with its best meaning: A child of unusual or remarkable talent.","opts":{"A":"scholar","B":"diligent","C":"freak","D":"prodigy"},"ans":"D","exp":"A 'prodigy' is a young person with exceptional talent.","src":null,"vocab":[]},{"id":"bank-267","q":"Match the underlined word or phrase with its best meaning: Some sponges resemble plants.","opts":{"A":"look like","B":"look up","C":"see like","D":"look after"},"ans":"A","exp":"'Resemble' means to look similar to, i.e., 'look like.'","src":null,"vocab":[]},{"id":"bank-268","q":"Choose the underlined word's Synonym: 'REIMBURSE'","opts":{"A":"recollect","B":"renowned","C":"refund","D":"revamp"},"ans":"C","exp":"'Reimburse' means to repay money spent, synonymous with 'refund.'","src":null,"vocab":[]},{"id":"bank-269","q":"Choose the underlined word's Synonym: 'SCANDAL'","opts":{"A":"esteem","B":"disgrace","C":"honor","D":"disobedient"},"ans":"B","exp":"'Scandal' means a shameful/disgraceful action that damages reputation, closest to 'disgrace.'","src":null,"vocab":[]},{"id":"bank-270","q":"Choose the underlined word's Synonym: 'INFINITE'","opts":{"A":"endless","B":"strange","C":"verbal","D":"indefinite"},"ans":"A","exp":"'Infinite' means without limit/boundless, synonymous with 'endless.'","src":null,"vocab":[]},{"id":"bank-271","q":"Fill in the blanks with suitable words: I _____ to hospital last Friday.","opts":{"A":"would go","B":"must go","C":"have to go","D":"had to go"},"ans":"D","exp":"'Last Friday' indicates past time, so the past obligation form 'had to go' is correct.","src":null,"vocab":[]},{"id":"bank-272","q":"Fill in the blanks with suitable words: My brother has no interest _____ music.","opts":{"A":"for","B":"in","C":"with","D":"at"},"ans":"B","exp":"The correct preposition pairing is 'interest in' (something).","src":null,"vocab":[]},{"id":"bank-273","q":"Fill in the blanks with suitable words: Mr. X was walking _____ a wood _____ a rainy day.","opts":{"A":"to, of","B":"through, on","C":"of, through","D":"by, in"},"ans":"B","exp":"'Through' is used for moving across/within an enclosed area (a wood); 'on' is used before specific days (a rainy day).","src":null,"vocab":[]},{"id":"bank-274","q":"Fill in the blanks with suitable words: The teacher suspected cheating as soon as he noticed the student's _____ glances at his classmate's script.","opts":{"A":"rewarding","B":"rare","C":"furtive","D":"cold"},"ans":"C","exp":"'Furtive' means secretive/sneaky, fitting the act of glancing while trying not to be noticed (suggesting cheating).","src":null,"vocab":[]},{"id":"bank-275","q":"Abolish শব্দটির Synonym হলো-","opts":{"A":"Cancel","B":"Perform","C":"Create","D":"Generate"},"ans":"A","exp":"'Abolish' means to formally end/cancel something (a rule, law, or custom).","src":null,"vocab":[]},{"id":"bank-276","q":"Which is similar in meaning of the word 'ENLARGE'?","opts":{"A":"Shrink","B":"Large","C":"Contract","D":"Expand"},"ans":"D","exp":"'Enlarge' (verb) means to make bigger, synonymous with 'expand.'","src":null,"vocab":[]},{"id":"bank-277","q":"Which is the meaning of 'Bona fides'?","opts":{"A":"Bonus","B":"Genuine cultivator","C":"False belief","D":"Good faith"},"ans":"D","exp":"'Bona fides' is a Latin phrase meaning 'good faith' or genuine sincerity.","src":null,"vocab":[]},{"id":"bank-278","q":"Durable means-","opts":{"A":"Enduring","B":"Fragile","C":"Reduce","D":"Duration"},"ans":"A","exp":"'Durable' means long-lasting, synonymous with 'enduring.'","src":null,"vocab":[]},{"id":"bank-279","q":"The opposite of 'hamper' is-","opts":{"A":"obstruct","B":"interfere","C":"prohibit","D":"facilitate"},"ans":"D","exp":"'Hamper' means to hinder; its opposite is 'facilitate' (to make easier).","src":null,"vocab":[]},{"id":"bank-280","q":"'Verdict' এর সমার্থক শব্দ হলো-","opts":{"A":"False","B":"Judgment","C":"Proper","D":"Suitable"},"ans":"B","exp":"'Verdict' refers to a judge/jury's formal decision, synonymous with 'judgment.'","src":null,"vocab":[]},{"id":"bank-281","q":"The meaning of the word 'species' is:","opts":{"A":"ingredient used in cooking","B":"sample of creation","C":"group of human being","D":"group of animals, plants etc"},"ans":"D","exp":"'Species' refers to a biological classification grouping similar organisms together (animals, plants, etc.).","src":null,"vocab":[]},{"id":"bank-282","q":"The meaning of the word 'orchestrate' is:","opts":{"A":"organize a orchestra party","B":"meeting requirements","C":"stage-manage","D":"applying special musical skill"},"ans":"C","exp":"'Orchestrate' (figuratively) means to carefully organize/coordinate a complex event, closest to 'stage-manage.'","src":null,"vocab":[]},{"id":"bank-283","q":"The meaning of the word 'precedence' is:","opts":{"A":"priority","B":"tenure of the President","C":"event that never happened","D":"a matter to deal with"},"ans":"A","exp":"'Precedence' means the condition of being more important and going before others, i.e., priority.","src":null,"vocab":[]},{"id":"bank-284","q":"Choose the word that is the antonym: 'Protract'","opts":{"A":"distract","B":"project","C":"abbreviate","D":"oppose"},"ans":"C","exp":"'Protract' means to prolong/lengthen; its opposite is 'abbreviate' (to shorten).","src":null,"vocab":[]},{"id":"bank-285","q":"Choose the word that is the antonym: 'Currency'","opts":{"A":"note","B":"banknote","C":"still","D":"obsolescence"},"ans":"D","exp":"'Currency' (in the sense of being current/prevalent) is opposite to 'obsolescence' (becoming outdated).","src":null,"vocab":[]},{"id":"bank-286","q":"Choose the word that is a Synonym: 'Laissez Faire'","opts":{"A":"market","B":"let alone","C":"planned","D":"buy and sell"},"ans":"B","exp":"'Laissez Faire' is a French phrase meaning to let people/businesses act without interference, i.e., 'let alone.'","src":null,"vocab":[]},{"id":"bank-287","q":"Which of the following is not a Synonym of 'consent'?","opts":{"A":"concede","B":"Permit","C":"grant","D":"accede","E":"refuse"},"ans":"E","exp":"'Consent' means to agree/permit; 'refuse' is its antonym, not a synonym.","src":null,"vocab":[]},{"id":"bank-288","q":"What is the appropriate meaning of the word 'redundant'?","opts":{"A":"few","B":"many","C":"mostly","D":"abundant","E":"unnecessary"},"ans":"E","exp":"'Redundant' means no longer needed/superfluous, i.e., unnecessary.","src":null,"vocab":[]},{"id":"bank-289","q":"The word 'ecological' is related to-","opts":{"A":"atmospheric","B":"biological","C":"environmental","D":"demographic","E":"geographical"},"ans":"C","exp":"'Ecological' relates to the study of organisms and their environment, i.e., environmental.","src":null,"vocab":[]},{"id":"bank-290","q":"Find the closest matching pair- Entrepreneur : Profit","opts":{"A":"Philanthropist : Charity","B":"Organizer : Union","C":"Hermit : Lonely","D":"Charlatan : Converts","E":"Scholar : Knowledge"},"ans":"E","exp":"An entrepreneur works toward gaining profit as their ultimate goal; similarly, a scholar pursues knowledge as their ultimate goal.","src":null,"vocab":[]},{"id":"bank-291","q":"Find the closest matching pair- Fish : Aquarium","opts":{"A":"Tree : Forest","B":"Plant : Greenhouse","C":"Keeper : Zoo","D":"Hedge : Garden","E":"Star : Planetarium"},"ans":"B","exp":"A fish is kept in an artificial, controlled environment called an aquarium; similarly, a plant is kept in a controlled environment called a greenhouse.","src":null,"vocab":[]},{"id":"bank-292","q":"Choose the most nearly opposite to the word: 'Eligible'","opts":{"A":"idealistic","B":"reasonable","C":"turbulent","D":"unsuitable","E":"pacific"},"ans":"D","exp":"'Eligible' means qualified/suitable; its opposite is 'unsuitable' (not fit/qualified).","src":null,"vocab":[]},{"id":"bank-293","q":"Choose the most nearly opposite to the word: 'Enclose'","opts":{"A":"prevent","B":"begin","C":"take-out","D":"give","E":"endanger"},"ans":"C","exp":"'Enclose' means to put something inside/surround; its closest opposite is 'take-out' (to remove from inside).","src":null,"vocab":[]},{"id":"bank-294","q":"Choose the Synonym of the following words: 'Resort'","opts":{"A":"efficiency","B":"defects","C":"remedy","D":"disadvantages","E":"paradise"},"ans":"C","exp":"'Resort' (as in 'last resort') means a course of action/means used to achieve something, closest to 'remedy.'","src":null,"vocab":[]},{"id":"bank-295","q":"Choose the Synonym of the following words: 'Mandatory'","opts":{"A":"massive","B":"happy","C":"messy","D":"compulsory","E":"reckless"},"ans":"D","exp":"'Mandatory' means required by rule/law, synonymous with 'compulsory.'","src":null,"vocab":[]},{"id":"bank-296","q":"What is the antonym of 'Opacity'?","opts":{"A":"Opaqueness","B":"Impermeability","C":"Density","D":"Transparency","E":"Obscurity"},"ans":"D","exp":"'Opacity' means the quality of blocking light/being unclear; its opposite is 'transparency.'","src":null,"vocab":[]},{"id":"bank-297","q":"What is the analogy of 'Adulterate : Purity'","opts":{"A":"Relax : liberation","B":"inform : knowledge","C":"transfer : recklessness","D":"Mastermind : plot","E":"dilute : concentration"},"ans":"E","exp":"To 'adulterate' is to decrease/destroy purity; similarly, to 'dilute' is to decrease concentration.","src":null,"vocab":[]},{"id":"bank-298","q":"Find the best alternative that has similar analogy as in the pair: 'Hill : Mountain'.","opts":{"A":"grass : rocks","B":"autumn : winter","C":"creek : river","D":"star : sun","E":"cliff : slope"},"ans":"C","exp":"A mountain is a larger version of a hill; similarly, a river is a larger version of a creek — both are small-to-large scale relationships.","src":null,"vocab":[]},{"id":"bank-299","q":"To 'fill the bill' is an expression meaning:","opts":{"A":"To satisfy all requirements","B":"To pay the full price","C":"To equip oneself","D":"To add something","E":"To settle one's choice"},"ans":"A","exp":"'Fill the bill' is an idiom meaning to meet all requirements/be suitable for a purpose.","src":null,"vocab":[]},{"id":"bank-300","q":"Choose the word closest in meaning to the opposite of the capitalized word: 'EXPOSE'","opts":{"A":"Reveal","B":"Uncover","C":"Unearth","D":"Conceal","E":"None of these"},"ans":"D","exp":"'Expose' means to bring into the open; its opposite is 'conceal' (to hide).","src":null,"vocab":[]}]},{"id":"bank-4","title":"Bank Vocabulary [301-400]","questions":[{"id":"bank-301","q":"Due to unforeseen circumstances, the original plans were no longer _____ and were therefore _____.","opts":{"A":"relevant, adaptable","B":"applicable, rejected","C":"appraised, ---","D":"acceptable, appraised","E":"capable, allayed"},"ans":"B","exp":"Since circumstances changed, the plans were no longer 'applicable' (suitable), and so were 'rejected' — a clear cause-and-effect relationship.","src":null,"vocab":[]},{"id":"bank-302","q":"Fill in the blanks: Though _____ towards his own needs, he was always _____ towards others.","opts":{"A":"miserly, magnanimous","B":"charitable, monotonous","C":"profligate, irresistible","D":"improvident, audacious"},"ans":"A","exp":"'Though' signals contrast: he was 'miserly' (stingy) about himself but 'magnanimous' (generous) toward others.","src":null,"vocab":[]},{"id":"bank-303","q":"Fill in the blanks: _____ the businessmen have welcomed the move, there has been strong _____ from many a quarter.","opts":{"A":"While, opposition","B":"When, rivalry","C":"Though, approval","D":"In spite of, non-cooperation"},"ans":"A","exp":"'While' sets up contrast: businessmen welcomed it, but others showed strong 'opposition.'","src":null,"vocab":[]},{"id":"bank-304","q":"Fill in the blanks: The co-ordinator has no choice but to _____ because the committee has votes to _____ his veto.","opts":{"A":"object, dominate","B":"abdicate, overrule","C":"refrain, exceed","D":"compromise, override"},"ans":"D","exp":"Since the committee can 'override' (overrule) his veto, the coordinator has no choice but to 'compromise.'","src":null,"vocab":[]},{"id":"bank-305","q":"Fill in the blanks: His _____ the students was complemented with plenty of _____.","opts":{"A":"stern attitude towards, love","B":"stern, nastiness","C":"of, sternness","D":"malice, affection"},"ans":"A","exp":"His 'stern attitude towards' students was balanced/complemented by plenty of 'love' — a counterbalancing relationship.","src":null,"vocab":[]},{"id":"bank-306","q":"Fill in the blanks: _____ she has a silly and _____ sense of humor.","opts":{"A":"In spite of his young age, mature","B":"Though it was youth, trivial","C":"Despite her age, adolescent","D":"Despite her age, youthful"},"ans":"C","exp":"'Despite her age' (suggesting she should be more mature) contrasts with her humor being silly and 'adolescent' (immature).","src":null,"vocab":[]},{"id":"bank-307","q":"Choose the pair that mirrors the relationship of the capitalized pair: SHRINE : PILGRIM","opts":{"A":"defeat : loser","B":"peak : climber","C":"rescue : danger","D":"election : contestant"},"ans":"B","exp":"A pilgrim travels toward a shrine as their destination; similarly, a climber travels toward a peak as their destination.","src":null,"vocab":[]},{"id":"bank-308","q":"Choose the pair that mirrors the relationship of the capitalized pair: CYGNET : SWAN","opts":{"A":"ring : jewel","B":"gender : goose","C":"stamp : seal","D":"kid : goat"},"ans":"D","exp":"A cygnet is a young swan; similarly, a kid is a young goat.","src":null,"vocab":[]},{"id":"bank-309","q":"Choose the pair that mirrors the relationship of the capitalized pair: ELECTRICITY : WIRE","opts":{"A":"car : highway","B":"fluid : pipe","C":"river : bank","D":"light : bulb"},"ans":"B","exp":"Electricity flows through a wire as its conduit; similarly, fluid flows through a pipe as its conduit.","src":null,"vocab":[]},{"id":"bank-310","q":"Choose the pair that mirrors the relationship of the capitalized pair: HAMMER : CARPENTRY","opts":{"A":"brick : mason","B":"road : driver","C":"knife : butcher","D":"kitchen : cook"},"ans":"C","exp":"A hammer is the primary tool used by a carpenter; similarly, a knife is the primary tool used by a butcher.","src":null,"vocab":[]},{"id":"bank-311","q":"Choose the pair that mirrors the relationship of the capitalized pair: OATH : PROMISE","opts":{"A":"deed : attorney","B":"contract : agreement","C":"title : estate","D":"job : loyalty"},"ans":"B","exp":"An oath is the formal/legal version of a promise; similarly, a contract is the formal/legal version of an agreement.","src":null,"vocab":[]},{"id":"bank-312","q":"The word 'wild' means _____.","opts":{"A":"mild","B":"feeble","C":"untamed","D":"angry"},"ans":"C","exp":"'Wild' means uncontrolled/not tamed.","src":null,"vocab":[]},{"id":"bank-313","q":"The meaning of the word 'unruly' is-","opts":{"A":"discord","B":"compliance","C":"disobedient","D":"disciplined"},"ans":"C","exp":"'Unruly' means hard to control/disobedient.","src":null,"vocab":[]},{"id":"bank-314","q":"The meaning of the word 'adverse' is-","opts":{"A":"hostile","B":"dangerous","C":"unique","D":"favourable"},"ans":"A","exp":"'Adverse' means unfavorable/antagonistic, closest to 'hostile.'","src":null,"vocab":[]},{"id":"bank-315","q":"When a person is 'in deep water' she/he is-","opts":{"A":"profound","B":"busy","C":"in trouble","D":"confused"},"ans":"C","exp":"'In deep water' is an idiom meaning to be in serious trouble/a difficult situation.","src":null,"vocab":[]},{"id":"bank-316","q":"_____ is essential when you send a telegram; you are charged for every word.","opts":{"A":"Gravity","B":"Clarity","C":"Honesty","D":"Brevity"},"ans":"D","exp":"Since one pays per word, conciseness ('brevity') is essential when sending a telegram.","src":null,"vocab":[]},{"id":"bank-317","q":"The opposite of the word 'wide' is-","opts":{"A":"long","B":"broad","C":"large","D":"narrow"},"ans":"D","exp":"'Wide' means broad/spacious; its opposite is 'narrow.'","src":null,"vocab":[]},{"id":"bank-318","q":"The opposite of the word 'flexible' is-","opts":{"A":"obese","B":"tough","C":"rigid","D":"breakable"},"ans":"C","exp":"'Flexible' means bendable/adaptable; its opposite is 'rigid' (stiff, unyielding).","src":null,"vocab":[]},{"id":"bank-319","q":"The analogy of SEDATIVE : DROWSINESS is:","opts":{"A":"epidemic : contagiousness","B":"vaccine : virus","C":"laxative : drug","D":"anesthetic : numbness","E":"therapy : psychiatrist"},"ans":"D","exp":"A sedative causes drowsiness; similarly, an anesthetic causes numbness — both are cause:effect pairs.","src":null,"vocab":[]},{"id":"bank-320","q":"The analogy of CURIOSITY : KNOW is:","opts":{"A":"temptation : conquer","B":"starvation : eat","C":"wanderlust : travel","D":"humor : laugh","E":"survival : live"},"ans":"C","exp":"Curiosity is a desire to know; similarly, wanderlust is a desire to travel — both pair a strong desire with its corresponding action.","src":null,"vocab":[]},{"id":"bank-321","q":"The analogy of POISON : ANTIDOTE is:","opts":{"A":"lethargy : tonic","B":"recovery : cure","C":"sleep : narcotic","D":"relapse : stimulant","E":"breathing : resuscitation"},"ans":"A","exp":"An antidote is used to counteract poison; similarly, a tonic is used to counteract lethargy — both are problem:remedy pairs.","src":null,"vocab":[]},{"id":"bank-322","q":"The antonym of 'DIFFUSE' is:","opts":{"A":"contend","B":"concentrate","C":"imply","D":"pretend","E":"rebel"},"ans":"B","exp":"'Diffuse' means to spread out; its opposite is 'concentrate' (to bring together at one point).","src":null,"vocab":[]},{"id":"bank-323","q":"The antonym of 'MULTIFARIOUS' is:","opts":{"A":"deprived of freedom","B":"deprived of comfort","C":"lacking space","D":"lacking diversity","E":"lacking space (dup)"},"ans":"D","exp":"'Multifarious' means having great diversity/variety; its opposite is 'lacking diversity.'","src":null,"vocab":[]},{"id":"bank-324","q":"The antonym of 'DIVULGE' is:","opts":{"A":"keep secret","B":"evaluate by oneself","C":"refine","D":"restore","E":"copy"},"ans":"A","exp":"'Divulge' means to reveal/disclose secret information; its opposite is 'keep secret.'","src":null,"vocab":[]},{"id":"bank-325","q":"The Synonym of 'PRODIGAL' is:","opts":{"A":"thrifty","B":"erratic","C":"extravagant","D":"spendthrift","E":"proverbial"},"ans":"C","exp":"'Prodigal' means wastefully extravagant, synonymous with 'extravagant.' (Note: 'spendthrift' is also close, but 'extravagant' is the most direct adjective match.)","src":null,"vocab":[]},{"id":"bank-326","q":"The Synonym of 'ADEPT' is:","opts":{"A":"skillful","B":"proficient","C":"expert","D":"practiced","E":"All of these"},"ans":"E","exp":"'Adept' means highly skilled/proficient — all the listed words (skillful, proficient, expert, practiced) are valid synonyms.","src":null,"vocab":[]},{"id":"bank-327","q":"A decrease in the rate of money supply to the economy is most likely to be followed by","opts":{"A":"stagnation","B":"increase in economic activity","C":"recession","D":"inflation","E":"none of these"},"ans":"C","exp":"Decreased money supply reduces spending/demand, leading to reduced economic activity — i.e., a 'recession' (economic downturn).","src":null,"vocab":[]},{"id":"bank-328","q":"Select the closest meaning word: 'PROLIFIC'","opts":{"A":"Plenty","B":"Conceptual","C":"Fertile","D":"Predominant"},"ans":"C","exp":"'Prolific' means producing abundantly, closest to 'fertile' (productive).","src":null,"vocab":[]},{"id":"bank-329","q":"Select the closest meaning word: 'ELICIT'","opts":{"A":"Induce","B":"Extract","C":"Divulge","D":"Instill"},"ans":"B","exp":"'Elicit' means to draw out a response/information, closest to 'extract.'","src":null,"vocab":[]},{"id":"bank-330","q":"Select the closest meaning word: 'MYSTIQUE'","opts":{"A":"Face","B":"Reputation","C":"Admirable quality","D":"Popularity"},"ans":"C","exp":"'Mystique' refers to an aura of mystery/admirable fascinating quality surrounding someone or something.","src":null,"vocab":[]},{"id":"bank-331","q":"Select the closest meaning word: 'NEMESIS'","opts":{"A":"Victory","B":"Adventure","C":"Reward","D":"Punishment"},"ans":"D","exp":"'Nemesis' refers to an inescapable agent of someone's downfall, closest to 'punishment.'","src":null,"vocab":[]},{"id":"bank-332","q":"Select the closest meaning word: 'REIN'","opts":{"A":"Overcome","B":"Fling","C":"Control","D":"Power"},"ans":"C","exp":"'Rein' (verb, as in 'rein in') means to control/restrain.","src":null,"vocab":[]},{"id":"bank-333","q":"Choose the appropriate substitute: A process involving too much official formality","opts":{"A":"Nepotism","B":"Diplomacy","C":"Red-tapism","D":"Bureaucracy"},"ans":"C","exp":"'Red-tapism' refers to excessive bureaucratic formality that delays action.","src":null,"vocab":[]},{"id":"bank-334","q":"Choose the appropriate substitute: An office or post with no work but high pay","opts":{"A":"Honorary","B":"Sinecure","C":"Gratis","D":"Ex-officio"},"ans":"B","exp":"A 'sinecure' is a position that requires little or no work but provides a salary/honor.","src":null,"vocab":[]},{"id":"bank-335","q":"Choose the appropriate substitute: A common place remark","opts":{"A":"Dialogue","B":"Platitude","C":"Epigram","D":"Statement"},"ans":"B","exp":"A 'platitude' is a remark that has been used so often it has become trite/meaningless.","src":null,"vocab":[]},{"id":"bank-336","q":"Choose the appropriate substitute: A person who is always dissatisfied","opts":{"A":"Heretic","B":"Felon","C":"Malcontent","D":"Surrogate"},"ans":"C","exp":"A 'malcontent' is a person who is chronically dissatisfied.","src":null,"vocab":[]},{"id":"bank-337","q":"Choose the appropriate substitute: One who has suddenly gained new wealth, power or prestige","opts":{"A":"Aristocrat","B":"Affluent","C":"Maverick","D":"Parvenu"},"ans":"D","exp":"A 'parvenu' is someone who has recently and suddenly acquired wealth/status without the accompanying social refinement.","src":null,"vocab":[]},{"id":"bank-338","q":"Select the pair related in the same way as the capitalized words: COLOR : SPECTRUM","opts":{"A":"tone : scale","B":"sound : waves","C":"verse : poem","D":"dimension : space","E":"cell : organism"},"ans":"A","exp":"A spectrum is a series of colors; similarly, a scale is a series of musical tones.","src":null,"vocab":[]},{"id":"bank-339","q":"Select the pair related in the same way as the capitalized words: HEADLONG : FORETHOUGHT","opts":{"A":"barefaced : shame","B":"mealy-mouthed : talent","C":"heartbroken : emotion","D":"levelheaded : resolve","E":"single handed : ambition"},"ans":"A","exp":"Someone headlong (rash) lacks forethought; similarly, someone barefaced (shameless) lacks shame.","src":null,"vocab":[]},{"id":"bank-340","q":"Select the pair related in the same way as the capitalized words: SEDATIVE : DROWSINESS","opts":{"A":"epidemic : contagiousness","B":"vaccine : virus","C":"laxative : drug","D":"anesthetic : numbness","E":"therapy : psychosis"},"ans":"D","exp":"A sedative causes drowsiness; similarly, an anesthetic causes numbness.","src":null,"vocab":[]},{"id":"bank-341","q":"Select the pair related in the same way as the capitalized words: LAWYER : COURTROOM","opts":{"A":"participant : team","B":"commuter : train","C":"gladiator : arena","D":"senator : caucus","E":"patient : ward"},"ans":"C","exp":"A lawyer performs their professional duties in a courtroom; similarly, a gladiator performs in an arena.","src":null,"vocab":[]},{"id":"bank-342","q":"Select the pair related in the same way as the capitalized words: WORSHIP : SACRIFICE","opts":{"A":"generation : pyre","B":"burial : mortuary","C":"weapon : centurion","D":"massacre : invasion","E":"prediction : augury"},"ans":"E","exp":"Sacrifice is a traditional means/form of worship; similarly, augury (omen-reading) is a traditional means/form of prediction.","src":null,"vocab":[]},{"id":"bank-343","q":"The practice of storytelling for entertainment and instruction was at one time so widespread that it virtually became _____.","opts":{"A":"rigorous","B":"universal","C":"elevating","D":"uncommon","E":"unknown"},"ans":"B","exp":"Since the practice was 'so widespread,' it logically became 'universal' (found everywhere).","src":null,"vocab":[]},{"id":"bank-344","q":"The advertised property, which _____ vast and unspoiled stretches, will undoubtedly _____ potential buyers.","opts":{"A":"abuts...interfere with","B":"overlooks...infuriate","C":"spans...appeal to","D":"erodes...inspire","E":"precludes...assemble"},"ans":"C","exp":"Property that 'spans' (covers) vast, unspoiled land would naturally 'appeal to' potential buyers.","src":null,"vocab":[]},{"id":"bank-345","q":"Select the pair with a similar relationship: Author : Copyright ::","opts":{"A":"Pilot : Machine","B":"Inventor : Patent","C":"Paper : Metal","D":"Book : Factory"},"ans":"B","exp":"An author protects their work with a copyright; similarly, an inventor protects their invention with a patent.","src":null,"vocab":[]},{"id":"bank-346","q":"Select the Syn of the underlined word(s): We have to enact strict laws to protect migratory birds from hunters.","opts":{"A":"mobile","B":"native","C":"temporary","D":"nomad","E":"None of these"},"ans":"D","exp":"'Migratory' (moving from one region to another seasonally) is closest in meaning to 'nomad' (wandering).","src":null,"vocab":[]},{"id":"bank-347","q":"Select the Synonym of the underlined word(s): Most of the participants did not expect the victory of a dark horse like him.","opts":{"A":"a mischievous person","B":"a strong person","C":"an unknown person","D":"an illiterate","E":"None of these"},"ans":"C","exp":"'Dark horse' refers to a little-known competitor who unexpectedly succeeds, i.e., 'an unknown person.'","src":null,"vocab":[]},{"id":"bank-348","q":"Select the Synonym of the underlined word(s): Mr. Akash deals in pearls.","opts":{"A":"Do business","B":"Costly","C":"Smuggling","D":"Understands","E":"None of these"},"ans":"A","exp":"'Deals in' means trades/does business in (a particular product).","src":null,"vocab":[]},{"id":"bank-349","q":"Select the Synonym of the underlined word(s): The manager looked into the matter.","opts":{"A":"Take decision","B":"Investigate","C":"Neglect","D":"Taking care","E":"None of these"},"ans":"B","exp":"'Look into' means to investigate/examine a matter closely.","src":null,"vocab":[]},{"id":"bank-350","q":"Select the Syn of the underlined word(s): This is his first job, he will have to put up with the inconvenience.","opts":{"A":"endure","B":"adapt","C":"overcome","D":"avoid","E":"None of these"},"ans":"A","exp":"'Put up with' means to tolerate/endure.","src":null,"vocab":[]},{"id":"bank-351","q":"Select the word(s)/phrase(s) that best fill the blanks: Out of countless news items, this one seems to be different as it summarizes stories by the _____ reporters on _____ celebrities from the sports, entertainment, or business areas.","opts":{"A":"affluent…displaying","B":"influential…profiling","C":"effective…parading","D":"dominating…narrating","E":"None of these"},"ans":"B","exp":"'Influential' fits describing reporters of standing, and 'profiling' is the journalism term for summarizing a celebrity's life story.","src":null,"vocab":[]},{"id":"bank-352","q":"Select the word(s)/phrase(s) that best fill the blanks: Once the audience began to applaud and laugh at his jokes, the comedian felt more _____ and his delivery became less _____.","opts":{"A":"professional…engaging","B":"excited…interesting","C":"relaxed…inhibited","D":"uncomfortable…reserved","E":"None of these"},"ans":"C","exp":"Positive audience reaction made the comedian feel more 'relaxed,' and his delivery became less 'inhibited' (less restrained).","src":null,"vocab":[]},{"id":"bank-353","q":"Select the word(s)/phrase(s) that best fill the blanks: Mrs. Rita lives by teaching in a primary school, _____ as he serves in a government organization.","opts":{"A":"so is her brother","B":"but her brother","C":"though does not her brother","D":"so does not her brother"},"ans":"D","exp":"Following the affirmative-agreement structure ('so + auxiliary + subject'), 'so does her brother' would be grammatically correct, though none of the listed options match perfectly; (D) is closest intended per source.","src":null,"vocab":[]},{"id":"bank-354","q":"Select the word(s)/phrase(s) that best fill the blanks: Ratul had never visited the Sundarbans, but he could appreciate the splendor _____ through the _____ of others.","opts":{"A":"vicariously…descriptions","B":"heedlessly…account","C":"innocuously…fascinate","D":"mystically…eyes","E":"None of these"},"ans":"A","exp":"He experienced the beauty indirectly ('vicariously') through other people's 'descriptions' of it.","src":null,"vocab":[]},{"id":"bank-355","q":"Select the word(s)/phrase(s) that best fill the blanks: Doing something _____ the moment is his old habit.","opts":{"A":"all on a sudden of","B":"on the spur of","C":"sine die of","D":"on the instant of","E":"None of these"},"ans":"B","exp":"'On the spur of the moment' is the correct idiom meaning to do something suddenly/without planning.","src":null,"vocab":[]},{"id":"bank-356","q":"Select the correct word for the definition: The piece of string in the centre of a candle","opts":{"A":"Yoke","B":"Wick","C":"Vane","D":"Tenor","E":"None of these"},"ans":"B","exp":"The string in a candle's center that burns is called a 'wick.'","src":null,"vocab":[]},{"id":"bank-357","q":"Select the correct word for the definition: A person who performs the art of making statues using clay","opts":{"A":"Mediator","B":"Arbitrator","C":"Sculptor","D":"Miniature","E":"None of these"},"ans":"C","exp":"A 'sculptor' creates statues/sculptures.","src":null,"vocab":[]},{"id":"bank-358","q":"Select the correct word for the definition: A person who leaves his or her own country to settle in another","opts":{"A":"Emigrant","B":"Immigrant","C":"Foreigner","D":"Traveler","E":"None of these"},"ans":"A","exp":"An 'emigrant' is someone leaving their own country (note: 'immigrant' refers to entering a new country, from that country's perspective).","src":null,"vocab":[]},{"id":"bank-359","q":"Select the correct word for the definition: A dwarfed ornamental tree or shrub grown in a tray or shallow pot","opts":{"A":"Topiary","B":"Fabrication","C":"Gardening","D":"Bonsai","E":"None of these"},"ans":"D","exp":"'Bonsai' is the art of growing miniature, dwarfed trees in shallow pots.","src":null,"vocab":[]},{"id":"bank-360","q":"Select the correct word for the definition: Something that lasts only for a while","opts":{"A":"Perpetual","B":"Vivid","C":"Venal","D":"Transient","E":"None of these"},"ans":"D","exp":"'Transient' means lasting only for a short time.","src":null,"vocab":[]},{"id":"bank-361","q":"Select the best substitute for the underlined word/phrase: Howard Hughes was one of this century's most eccentric personages.","opts":{"A":"Wealthiest","B":"Strangest","C":"Most interesting","D":"Unhappiest"},"ans":"B","exp":"'Eccentric' means unconventional/odd in behavior, closest to 'strangest.'","src":null,"vocab":[]},{"id":"bank-362","q":"Select the best substitute for the underlined word/phrase: The law is very explicit regarding the use of and standards for child safety seats in automobiles.","opts":{"A":"Brief","B":"New","C":"Firm","D":"Clear"},"ans":"D","exp":"'Explicit' means stated clearly and in detail, closest to 'clear.'","src":null,"vocab":[]},{"id":"bank-363","q":"Select the best substitute for the underlined word/phrase: Many employers have discovered that elderly persons are very reliable workers and are actively recruiting them to fill positions.","opts":{"A":"Cooperative","B":"Experienced","C":"Available","D":"Dependable"},"ans":"D","exp":"'Reliable' means trustworthy/can be depended on, synonymous with 'dependable.'","src":null,"vocab":[]},{"id":"bank-364","q":"Select the best substitute for the underlined word/phrase: Although many American men help with work at home, women still take responsibility for 70%.","opts":{"A":"Chores","B":"Budgets","C":"Toddlers","D":"Errands"},"ans":"A","exp":"'Work at home' refers to household tasks, i.e., 'chores.'","src":null,"vocab":[]},{"id":"bank-365","q":"Select the best substitute for the underlined word/phrase: Young people who belong to minority groups need positive role models to try to copy.","opts":{"A":"Interview","B":"Exploit","C":"Sketch","D":"Emulate"},"ans":"D","exp":"'Copy' (in the sense of following a role model) is closest to 'emulate' (to strive to match or imitate).","src":null,"vocab":[]},{"id":"bank-366","q":"Fill in the blanks with the correct word(s): A child should not be _____ as being either very shy or over aggressive.","opts":{"A":"categorized","B":"instructed","C":"intoned","D":"distracted"},"ans":"A","exp":"'Categorized' (classified) fits with labeling a child as one type ('either...or') of personality.","src":null,"vocab":[]},{"id":"bank-367","q":"Fill in the blanks with the correct word(s): Despite assorted effusion to the contrary, there is no necessary link between scientific skill and humanism, and quite possibly, there may be something of a _____ between them.","opts":{"A":"dichotomy","B":"congruity","C":"reciprocity","D":"generosity"},"ans":"A","exp":"Since there's 'no necessary link,' the relationship is more likely a 'dichotomy' (a division/contrast) between the two.","src":null,"vocab":[]},{"id":"bank-368","q":"Fill in the blanks with the correct word(s): Ecology, like economics, concerns itself with the movement of valuable _____ through a complex network of producers and consumers.","opts":{"A":"nutrients","B":"dividends","C":"communications","D":"artifact"},"ans":"A","exp":"In ecology, energy/'nutrients' flow between producers and consumers in a food chain, paralleling economics' flow of value.","src":null,"vocab":[]},{"id":"bank-369","q":"Fill in the blanks with the correct word(s): It would be difficult for one so _____ to be led to believe that men are equal and that we must disregard race, color and creed.","opts":{"A":"tolerant","B":"democratic","C":"broadminded","D":"intolerant"},"ans":"D","exp":"Since it's 'difficult' to convince this person of equality, they must be 'intolerant' (narrow-minded), unlike the other options which describe open-mindedness.","src":null,"vocab":[]},{"id":"bank-370","q":"Choose the pair with a similar relationship: ANGLE : DEGREE","opts":{"A":"area : square inch","B":"milk : quart","C":"society : classes","D":"letter : alphabet"},"ans":"A","exp":"An angle is measured in degrees; similarly, area is measured in square inches — both are geometric quantity:unit pairs.","src":null,"vocab":[]},{"id":"bank-371","q":"Choose the pair with a similar relationship: CONFIRMED : INVETERATE","opts":{"A":"knowledge : supposed","B":"financial : bankrupt","C":"immature : callow","D":"credible : incredible"},"ans":"C","exp":"'Confirmed' (habitual) and 'inveterate' (deep-rooted habit) are synonymous descriptors of an entrenched trait; similarly, 'immature' and 'callow' are synonyms describing inexperience.","src":null,"vocab":[]},{"id":"bank-372","q":"Choose the pair with a similar relationship: ZOOLOGY : ANIMALS","opts":{"A":"ecology : pollution","B":"botany : plants","C":"chemistry : atoms","D":"history : people"},"ans":"B","exp":"Zoology is the study of animals; similarly, botany is the study of plants.","src":null,"vocab":[]},{"id":"bank-373","q":"Choose the pair with a similar relationship: SAW : CARPENTER","opts":{"A":"Scissors : tailor","B":"Wagon : farmer","C":"Brush : painter","D":"Typewriter : author"},"ans":"A","exp":"A saw is the primary cutting tool used by a carpenter; similarly, scissors are the primary cutting tool used by a tailor.","src":null,"vocab":[]},{"id":"bank-374","q":"Choose the pair with a similar relationship: LURK : WAIT","opts":{"A":"boost : elevate","B":"deplete : drain","C":"abscond : depart","D":"bilk : cheat"},"ans":"C","exp":"'Lurk' means to wait secretly; similarly, 'abscond' means to depart secretly — both pair a secretive version of a common action.","src":null,"vocab":[]},{"id":"bank-375","q":"Choose the pair with a similar relationship: NEEDLE : KNIT","opts":{"A":"bait : fish","B":"match : fire","C":"loom : weave","D":"soap : wash"},"ans":"C","exp":"A needle is a tool used to knit; similarly, a loom is a tool used to weave.","src":null,"vocab":[]},{"id":"bank-376","q":"Choose the word/phrase opposite in meaning to the given word: 'TOUT'","opts":{"A":"cast aspersions on","B":"deny the relevance of","C":"withhold consent","D":"misrepresent"},"ans":"A","exp":"'Tout' means to promote/praise excessively; its opposite is 'cast aspersions on' (to criticize/defame).","src":null,"vocab":[]},{"id":"bank-377","q":"Choose the word/phrase opposite in meaning to the given word: 'QUOTA'","opts":{"A":"anonymous remark","B":"decisive action","C":"debatable issue","D":"unlimited number"},"ans":"D","exp":"'Quota' means a fixed/limited allocation; its opposite is 'unlimited number.'","src":null,"vocab":[]},{"id":"bank-378","q":"Choose the word/phrase opposite in meaning to the given word: 'TURBULENCE'","opts":{"A":"immunity","B":"tranquility","C":"meditation","D":"coordination"},"ans":"B","exp":"'Turbulence' means disorder/chaos; its opposite is 'tranquility' (calmness).","src":null,"vocab":[]},{"id":"bank-379","q":"Choose the word/phrase opposite in meaning to the given word: 'OPPORTUNIST'","opts":{"A":"man of principle","B":"fatalist","C":"fledgling","D":"colleague"},"ans":"A","exp":"An 'opportunist' seeks self-gain without regard to principle; opposite is 'man of principle' (someone guided by firm values).","src":null,"vocab":[]},{"id":"bank-380","q":"Choose the word/phrase opposite in meaning to the given word: 'AMBIGUOUS'","opts":{"A":"confusing","B":"lucid","C":"desirous","D":"obfuscate"},"ans":"B","exp":"'Ambiguous' means unclear/having multiple meanings; its opposite is 'lucid' (clear).","src":null,"vocab":[]},{"id":"bank-381","q":"Choose the word/phrase opposite in meaning to the given word: 'PERSISTENCE'","opts":{"A":"irrelevance","B":"inconsistency","C":"inequality","D":"intemperance"},"ans":"B","exp":"'Persistence' means continuing steadily; its opposite is 'inconsistency' (lack of steady continuity).","src":null,"vocab":[]},{"id":"bank-382","q":"Select the antonym of the capitalized word: 'ELOQUENT'","opts":{"A":"Lucid","B":"Ministerial","C":"Wise","D":"Graceful","E":"Inarticulate"},"ans":"E","exp":"'Eloquent' means fluent/persuasive in speech; its opposite is 'inarticulate' (unable to speak clearly).","src":null,"vocab":[]},{"id":"bank-383","q":"Select the antonym of the capitalized word: 'RESILIENT'","opts":{"A":"Elastic","B":"Resinous","C":"Resolute","D":"Inflexible","E":"Malleable"},"ans":"D","exp":"'Resilient' means able to spring back/flexible; its opposite is 'inflexible' (rigid).","src":null,"vocab":[]},{"id":"bank-384","q":"Select the antonym of the capitalized word: 'EUPHORIA'","opts":{"A":"Mandate","B":"Intoxicant","C":"Life","D":"Euthanasia","E":"Gloom"},"ans":"E","exp":"'Euphoria' means intense happiness; its opposite is 'gloom' (deep sadness).","src":null,"vocab":[]},{"id":"bank-385","q":"Select the antonym of the capitalized word: 'EMPATHY'","opts":{"A":"Compassion","B":"Lack of feeling for others","C":"Lack of religious certainty","D":"Lack of credit","E":"Recalcitrance"},"ans":"B","exp":"'Empathy' means understanding/sharing others' feelings; its opposite is 'lack of feeling for others.'","src":null,"vocab":[]},{"id":"bank-386","q":"Select the antonym of the capitalized word: 'INDIGENT'","opts":{"A":"Inconsequential","B":"Non-native","C":"Extraterrestrial","D":"Affluent","E":"Compliant"},"ans":"D","exp":"'Indigent' means poor/destitute; its opposite is 'affluent' (wealthy).","src":null,"vocab":[]},{"id":"bank-387","q":"Select the pair with a similar relationship: ZOOLOGY : ANIMALS","opts":{"A":"ecology : pollution","B":"botany : plants","C":"chemistry : atoms","D":"history : people"},"ans":"B","exp":"Zoology is the study of animals; similarly, botany is the study of plants.","src":null,"vocab":[]},{"id":"bank-388","q":"Select the pair with a similar relationship: SAW : CARPENTER","opts":{"A":"Scissors : tailor","B":"Wagon : farmer","C":"Brush : painter","D":"Typewriter : author"},"ans":"A","exp":"A saw is the primary cutting tool of a carpenter; similarly, scissors are the primary cutting tool of a tailor.","src":null,"vocab":[]},{"id":"bank-389","q":"Select the pair with a similar relationship: ALCHEMY : SCIENCE","opts":{"A":"nostrum : remedy","B":"sideshow : carnival","C":"ploy : tactic","D":"forgery : imitation"},"ans":"A","exp":"Alchemy is a primitive/pseudo-scientific form of science; similarly, a nostrum is an unproven, dubious form of a remedy.","src":null,"vocab":[]},{"id":"bank-390","q":"Select the pair with a similar relationship: NEEDLE : KNIT","opts":{"A":"match : fire","B":"loom : weave","C":"soap : wash","D":"bed : sleep"},"ans":"B","exp":"A needle is a tool used to knit; similarly, a loom is a tool used to weave.","src":null,"vocab":[]},{"id":"bank-391","q":"Select the pair with a similar relationship: CENSUS : POPULATION","opts":{"A":"manifest : debts","B":"roster : audience","C":"itinerary : journeys","D":"inventory : merchandise"},"ans":"D","exp":"A census is an official count/record of population; similarly, an inventory is an official count/record of merchandise.","src":null,"vocab":[]},{"id":"bank-392","q":"Select the pair with a similar relationship: ANGLE : DEGREE","opts":{"A":"area : square inch","B":"milk : quart","C":"society : classes","D":"letter : alphabet"},"ans":"A","exp":"An angle is measured in degrees; similarly, area is measured in square inches.","src":null,"vocab":[]},{"id":"bank-393","q":"Select the antonym of the capitalized word: 'PERSISTENCE'","opts":{"A":"irrelevance","B":"inconsistency","C":"inequality","D":"intemperance"},"ans":"B","exp":"'Persistence' means continuing steadily; its opposite is 'inconsistency.'","src":null,"vocab":[]},{"id":"bank-394","q":"Select the antonym of the capitalized word: 'SKEPTICISM'","opts":{"A":"reason","B":"conviction","C":"plausibility","D":"audacity"},"ans":"B","exp":"'Skepticism' means doubt; its opposite is 'conviction' (firm belief).","src":null,"vocab":[]},{"id":"bank-395","q":"Select the antonym of the capitalized word: 'APPOSITE'","opts":{"A":"parallel","B":"Synous","C":"hostile","D":"inappropriate"},"ans":"D","exp":"'Apposite' means appropriate/well-suited; its opposite is 'inappropriate.'","src":null,"vocab":[]},{"id":"bank-396","q":"Select the antonym of the capitalized word: 'SUBSERVIENT'","opts":{"A":"fawning","B":"obsequious","C":"miserly","D":"omnipresent"},"ans":"D","exp":"'Subservient' means obedient/submissive; its closest opposite here (among unrelated options) is 'omnipresent' (since fawning/obsequious are synonyms, not antonyms, of subservient).","src":null,"vocab":[]},{"id":"bank-397","q":"Select the antonym of the capitalized word: 'QUOTA'","opts":{"A":"Anonymous remark","B":"decisive action","C":"debatable issue","D":"unlimited number"},"ans":"D","exp":"'Quota' means a fixed allocation; its opposite is 'unlimited number.'","src":null,"vocab":[]},{"id":"bank-398","q":"Choose the correct meaning of the following phrases: By and Large","opts":{"A":"Very large","B":"Mostly","C":"Everywhere","D":"false"},"ans":"B","exp":"'By and large' means on the whole/mostly.","src":null,"vocab":[]},{"id":"bank-399","q":"Choose the correct meaning of the following phrases: A hard nut to crack","opts":{"A":"Honest","B":"Active person","C":"false","D":"Far away"},"ans":"B","exp":"'A hard nut to crack' is an idiom meaning a difficult problem or person to deal with; among the given (limited) options, it's matched to describing a determined/challenging person.","src":null,"vocab":[]},{"id":"bank-400","q":"Choose the correct meaning of the following phrases: White elephant","opts":{"A":"Pretty animal","B":"An elephant of white colour","C":"Strong animal","D":"A costly possession"},"ans":"D","exp":"'White elephant' is an idiom for a costly possession that is more burden than benefit.","src":null,"vocab":[]}]},{"id":"bank-5","title":"Bank Vocabulary [401-500]","questions":[{"id":"bank-401","q":"They wasted all the money on purchase of some _____ items.","opts":{"A":"excellent","B":"important","C":"significant","D":"quality","E":"trivial"},"ans":"E","exp":"Money is 'wasted' typically on unimportant/worthless items, i.e., 'trivial' items.","src":null,"vocab":[]},{"id":"bank-402","q":"When he found the wallet his face glowed but soon it faded as the wallet was _____.","opts":{"A":"Empty","B":"Vacant","C":"Recovered","D":"Stolen","E":"Expensive"},"ans":"A","exp":"His excitement faded because the wallet was 'empty' (no money inside). 'Vacant' is used for seats/positions, not objects like wallets.","src":null,"vocab":[]},{"id":"bank-403","q":"Words inscribed on a tomb is an :","opts":{"A":"epitome","B":"epithet","C":"epitaph","D":"episode","E":"epic"},"ans":"C","exp":"An 'epitaph' is an inscription on a tombstone.","src":null,"vocab":[]},{"id":"bank-404","q":"The meaning of 'serene' is:","opts":{"A":"harsh","B":"calm","C":"hard","D":"scenic","E":"wild"},"ans":"B","exp":"'Serene' means calm/peaceful.","src":null,"vocab":[]},{"id":"bank-405","q":"The meaning of 'melancholy' is:","opts":{"A":"magnificent","B":"barren","C":"depressed","D":"harmony","E":"heavenly"},"ans":"C","exp":"'Melancholy' means sad/gloomy, closest to 'depressed.'","src":null,"vocab":[]},{"id":"bank-406","q":"The word opposite to 'skepticism' is:","opts":{"A":"Plausibility","B":"Audacity","C":"Reasoning","D":"Argument","E":"Conviction"},"ans":"E","exp":"'Skepticism' means doubt; its opposite is 'conviction' (firm belief).","src":null,"vocab":[]},{"id":"bank-407","q":"Choose the option that is closest in meaning to the capitalized word: 'ABSTAIN'","opts":{"A":"glorify","B":"withhold","C":"comfort","D":"ease"},"ans":"B","exp":"'Abstain' means to deliberately refrain from doing something, closest to 'withhold.'","src":null,"vocab":[]},{"id":"bank-408","q":"Choose the option that is closest in meaning to the capitalized word: 'SUBLIME'","opts":{"A":"majestic","B":"adore","C":"unsaid","D":"adverse"},"ans":"A","exp":"'Sublime' means of great excellence/grandeur, closest to 'majestic.'","src":null,"vocab":[]},{"id":"bank-409","q":"Choose the option that is closest in meaning to the capitalized word: 'ZEALOT'","opts":{"A":"humble","B":"supporter","C":"artistic","D":"respect"},"ans":"B","exp":"'Zealot' means a fervent, often fanatical, supporter of a cause.","src":null,"vocab":[]},{"id":"bank-410","q":"Choose the option that is closest in meaning to the capitalized word: 'RIGOROUS'","opts":{"A":"scarcity","B":"hard","C":"hostile","D":"alien"},"ans":"B","exp":"'Rigorous' means strict/demanding, closest to 'hard' (difficult, exacting).","src":null,"vocab":[]},{"id":"bank-411","q":"Choose the option that is closest in meaning to the capitalized word: 'SOLICIT'","opts":{"A":"give","B":"seek","C":"bright","D":"advice"},"ans":"B","exp":"'Solicit' means to ask for/request, closest to 'seek.'","src":null,"vocab":[]},{"id":"bank-412","q":"Choose the option that is opposite in meaning to the capitalized word: 'VOLATILE'","opts":{"A":"falter","B":"erratic","C":"fickle","D":"steady"},"ans":"D","exp":"'Volatile' means liable to change rapidly/unpredictably; its opposite is 'steady' (stable).","src":null,"vocab":[]},{"id":"bank-413","q":"Choose the option that is opposite in meaning to the capitalized word: 'WHIMSICAL'","opts":{"A":"dull","B":"grave","C":"thought-provoking","D":"hardworking"},"ans":"B","exp":"'Whimsical' means playfully fanciful/capricious; its opposite is 'grave' (serious, solemn).","src":null,"vocab":[]},{"id":"bank-414","q":"Choose the option that is opposite in meaning to the capitalized word: 'ONEROUS'","opts":{"A":"complex","B":"straight forward","C":"zany","D":"plain"},"ans":"B","exp":"'Onerous' means burdensome/difficult; its opposite is 'straightforward' (simple, easy).","src":null,"vocab":[]},{"id":"bank-415","q":"Choose the option that is opposite in meaning to the capitalized word: 'COMIC'","opts":{"A":"fearful","B":"zany","C":"emotional","D":"tragic"},"ans":"D","exp":"'Comic' means humorous; its opposite is 'tragic' (sorrowful, disastrous).","src":null,"vocab":[]},{"id":"bank-416","q":"Choose the option that is opposite in meaning to the capitalized word: 'NIMBLE'","opts":{"A":"active","B":"prompt","C":"slow","D":"agile"},"ans":"C","exp":"'Nimble' means quick and light in movement; its opposite is 'slow.'","src":null,"vocab":[]},{"id":"bank-417","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'TOUT'","opts":{"A":"cast aspersions on","B":"deny the relevance of","C":"withhold consent","D":"misrepresent"},"ans":"A","exp":"'Tout' means to promote/praise; its opposite is 'cast aspersions on' (to criticize/defame).","src":null,"vocab":[]},{"id":"bank-418","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'QUOTA'","opts":{"A":"anonymous remark","B":"decisive action","C":"debatable issue","D":"unlimited number"},"ans":"D","exp":"'Quota' (a fixed allotment) is opposite to 'unlimited number.'","src":null,"vocab":[]},{"id":"bank-419","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'TURBULENCE'","opts":{"A":"immunity","B":"tranquility","C":"meditation","D":"coordination"},"ans":"B","exp":"'Turbulence' (disorder) is opposite to 'tranquility' (calmness).","src":null,"vocab":[
