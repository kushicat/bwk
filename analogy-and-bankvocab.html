"The correct negation of 'repeatable' is 'Unrepeatable,' making 'Irrepeatable' an incorrectly formed word.","src":null,"vocab":[]},{"id":"bank-1173","q":"Identify the word with the incorrect prefix or suffix:","opts":{"A":"Venation","B":"Attrition","C":"Doctination","D":"Diminution"},"ans":"C","exp":"The correct word for indoctrinating with a doctrine is 'Indoctrination,' making 'Doctination' an incorrectly formed word.","src":null,"vocab":[]},{"id":"bank-1174","q":"Select the word nearest in meaning to the italicized word: The use of bullock carts is a superannuated mode of transportation.","opts":{"A":"cheaper","B":"obsolete","C":"quicker","D":"rural"},"ans":"B","exp":"'Superannuated' means outdated/no longer used, matching 'obsolete.'","src":null,"vocab":[]},{"id":"bank-1175","q":"Select the word nearest in meaning to the italicized word: Bengalis are innate poets.","opts":{"A":"excellent","B":"romantic","C":"dull","D":"inborn"},"ans":"D","exp":"'Innate' means inborn/natural, matching 'inborn.'","src":null,"vocab":[]},{"id":"bank-1176","q":"Select the word nearest in meaning to the italicized word: If you want real solace go to Cox's Bazar.","opts":{"A":"holiday","B":"consolation","C":"happiness","D":"rest"},"ans":"B","exp":"'Solace' means comfort in distress, matching 'consolation.'","src":null,"vocab":[]},{"id":"bank-1177","q":"Select the word nearest in meaning to the italicized word: He was engrossed in day's office routine.","opts":{"A":"involved","B":"tired","C":"fully occupied","D":"lost"},"ans":"C","exp":"'Engrossed' means totally absorbed, matching 'fully occupied.'","src":null,"vocab":[]},{"id":"bank-1178","q":"Select the word nearest in meaning to the italicized word: No one welcomes him to a party for he is so garrulous.","opts":{"A":"behaves indecently","B":"too proud","C":"to have ego","D":"talks too much"},"ans":"D","exp":"'Garrulous' means excessively talkative, matching 'talks too much.'","src":null,"vocab":[]},{"id":"bank-1179","q":"Select the word most opposite to the capitalized word: 'PUNCTILIOUS'","opts":{"A":"former","B":"careless","C":"observant","D":"moderate"},"ans":"B","exp":"'Punctilious' means extremely attentive to detail; its opposite is 'careless.'","src":null,"vocab":[]},{"id":"bank-1180","q":"Select the word most opposite to the capitalized word: 'ACCRETION'","opts":{"A":"erosion","B":"addition","C":"procession","D":"stack"},"ans":"A","exp":"'Accretion' means gradual growth/accumulation; its opposite is 'erosion' (gradual wearing away).","src":null,"vocab":[]},{"id":"bank-1181","q":"Select the word most opposite to the capitalized word: 'BURIED'","opts":{"A":"shown","B":"marked","C":"obscured","D":"hidden"},"ans":"A","exp":"'Buried' means hidden from view; its opposite is 'shown' (displayed openly).","src":null,"vocab":[]},{"id":"bank-1182","q":"Select the word most opposite to the capitalized word: 'PREAMBLE'","opts":{"A":"preface","B":"commencement","C":"Postscript","D":"tender"},"ans":"C","exp":"'Preamble' is an introductory statement at the beginning; its opposite is 'postscript' (an addition at the end).","src":null,"vocab":[]},{"id":"bank-1183","q":"Select the word most opposite to the capitalized word: 'SYCOPHANCY'","opts":{"A":"speak harmoniously","B":"shout harshly","C":"push forcefully","D":"advise candidly"},"ans":"D","exp":"'Sycophancy' means insincere flattery; its opposite is to 'advise candidly' (give honest, direct advice).","src":null,"vocab":[]},{"id":"bank-1184","q":"Select a pair of words to replace the question marks: Alleviate : Aggravate :: _____ ? _____ ?","opts":{"A":"Joke : Worry","B":"Elevate : Agree","C":"Elastic : Rigid","D":"Level : Grade"},"ans":"C","exp":"'Alleviate' and 'aggravate' are opposites; similarly, 'elastic' (flexible) and 'rigid' (inflexible) are opposites.","src":null,"vocab":[]},{"id":"bank-1185","q":"Select a pair of words to replace the question marks: Fortuitous : Inherent :: _____ ? _____ ?","opts":{"A":"Rugged : Endurable","B":"Legible : Indelible","C":"Gregarious : Introverted","D":"Envious : Desire"},"ans":"C","exp":"'Fortuitous' (accidental/external) is opposite to 'inherent' (innate); similarly, 'gregarious' (sociable) is opposite to 'introverted' (inward-focused) — both pairs show an internal/external trait opposition.","src":null,"vocab":[]},{"id":"bank-1186","q":"Select a pair of words to replace the question marks: Escape : Abscond :: _____ ? _____ ?","opts":{"A":"Freedom : Independence","B":"Endless : Eternal","C":"Weaken : Strengthen","D":"Exult : Jubilate"},"ans":"D","exp":"'Escape' and 'abscond' are synonyms (both mean to flee); similarly, 'exult' and 'jubilate' are synonyms (both mean to rejoice).","src":null,"vocab":[]},{"id":"bank-1187","q":"Select a pair of words to replace the question marks: Benevolent : Kind :: _____ ? _____ ?","opts":{"A":"Unclear : Muddy","B":"Imprudent : Reverential","C":"Sagacity : Incautious","D":"Redundant : Cheerful"},"ans":"A","exp":"'Benevolent' and 'kind' are synonyms; similarly, 'unclear' and 'muddy' are synonyms (both describe a lack of clarity).","src":null,"vocab":[]},{"id":"bank-1188","q":"Select a pair of words to replace the question marks: Burden : Encumber :: _____ ? _____ ?","opts":{"A":"Synopsis : Recapitulate","B":"Weariness : Tireless","C":"Reptile : Snake","D":"Behead : Summary"},"ans":"A","exp":"'Burden' relates to 'encumber' (to weigh down); similarly, a 'synopsis' relates to 'recapitulate' (to summarize) — both pairs link a concept-noun to its corresponding verb.","src":null,"vocab":[]},{"id":"bank-1189","q":"Choose the correct substitute for the given phrase: One who eats everything","opts":{"A":"carnivorous","B":"gourmet","C":"omnivorous","D":"omnipotent"},"ans":"C","exp":"'Omnivorous' describes an organism that eats both plants and meat — everything.","src":null,"vocab":[]},{"id":"bank-1190","q":"Choose the correct substitute for the given phrase: A speech delivered without preparation","opts":{"A":"straightforward","B":"extempore","C":"verbose","D":"maiden"},"ans":"B","exp":"'Extempore' describes a speech given without prior preparation.","src":null,"vocab":[]},{"id":"bank-1191","q":"Choose the correct substitute for the given phrase: A place that provides refuge","opts":{"A":"asylum","B":"sanatorium","C":"shelter","D":"orphanage"},"ans":"A","exp":"An 'asylum' is a place of safety/refuge, especially for those fleeing danger.","src":null,"vocab":[]},{"id":"bank-1192","q":"Choose the correct substitute for the given phrase: A person who tries to deceive people by claiming to be able to do wonderful things","opts":{"A":"trickster","B":"impostor","C":"magician","D":"mountebank"},"ans":"D","exp":"A 'mountebank' is a person who deceives others by making false claims of skill or knowledge, especially as a charlatan.","src":null,"vocab":[]},{"id":"bank-1193","q":"Choose the correct substitute for the given phrase: A general pardon granted by the government to political offenders","opts":{"A":"pardon","B":"excuse","C":"honesty","D":"amnesty"},"ans":"D","exp":"'Amnesty' is an official pardon granted by a government to a group, especially political offenders.","src":null,"vocab":[]},{"id":"bank-1194","q":"Choose the best meaning of the underlined word: After years of complacency and stagnation, change in leadership was the herald of the dawn of a new era.","opts":{"A":"seed","B":"show","C":"onslaught","D":"sign"},"ans":"D","exp":"'Herald' means a sign/announcer of something to come, matching 'sign.'","src":null,"vocab":[]},{"id":"bank-1195","q":"Choose the best meaning of the underlined word: We started making progress when the two groups finally understood and accepted their symbiotic work culture.","opts":{"A":"complex","B":"dependent","C":"mutual","D":"habitual"},"ans":"C","exp":"'Symbiotic' means mutually beneficial, matching 'mutual.'","src":null,"vocab":[]},{"id":"bank-1196","q":"Choose the best meaning of the underlined word: The tribal chief granted pardon to all those captured from the rival-tribe.","opts":{"A":"justice","B":"retribution","C":"redemption","D":"amnesty"},"ans":"D","exp":"A general pardon to a group of captives is called 'amnesty.'","src":null,"vocab":[]},{"id":"bank-1197","q":"Choose the best meaning of the underlined word: Life is too transient to hold grudges for long.","opts":{"A":"ephemeral","B":"orthodox","C":"momentous","D":"interesting"},"ans":"A","exp":"'Transient' means lasting only a short time, matching 'ephemeral.'","src":null,"vocab":[]},{"id":"bank-1198","q":"Choose the best meaning of the underlined word: Evil is not innate to man, rather circumstances and needs change man's priorities.","opts":{"A":"known to","B":"common to","C":"automatic to","D":"inherent in"},"ans":"D","exp":"'Innate' means inborn/natural from birth, matching 'inherent in.'","src":null,"vocab":[]},{"id":"bank-1199","q":"What is the Synonym for the word 'APPALL'?","opts":{"A":"deceive","B":"cover","C":"dismay","D":"confuse"},"ans":"C","exp":"'Appall' means to fill with shock/horror, matching 'dismay.'","src":null,"vocab":[]},{"id":"bank-1200","q":"The Antonym for 'DEARTH' is:","opts":{"A":"lack","B":"abundance","C":"poverty","D":"foreign"},"ans":"B","exp":"'Dearth' means a scarcity/shortage; its opposite is 'abundance.'","src":null,"vocab":[]}]},{"id":"bank-13","title":"Bank Vocabulary [1201-1300]","questions":[{"id":"bank-1201","q":"Find the incorrectly used prefix or suffix:","opts":{"A":"Immaterial","B":"Immemorial","C":"Impalpable","D":"Imprecticable"},"ans":"D","exp":"The correct spelling is 'Impracticable' (with 'a'), making 'Imprecticable' incorrectly formed.","src":null,"vocab":[]},{"id":"bank-1202","q":"Find the incorrectly used prefix or suffix:","opts":{"A":"Unassuming","B":"Unabated","C":"Undaunted","D":"Uncourteous"},"ans":"D","exp":"The correct negation of 'courteous' is 'Discourteous,' making 'Uncourteous' incorrectly formed.","src":null,"vocab":[]},{"id":"bank-1203","q":"Find the incorrectly used prefix or suffix:","opts":{"A":"Dispossess","B":"Disaffected","C":"Disarray","D":"Disorder"},"ans":"A","exp":"All four words are actually correctly formed; per convention this set highlights 'Dispossess' as the example to study for the 'dis-' (removal) prefix pattern, while none contains an actual error.","src":null,"vocab":[]},{"id":"bank-1204","q":"Fill in the blanks with the appropriate word(s): Due to the _____ of the materials needed to manufacture the product and the increasing demand for it, it is highly probable that the final cost _____ to the consumer will.","opts":{"A":"scarcity - relax","B":"immensity - evolve","C":"paucity - escalate","D":"certainly - fluctuate"},"ans":"C","exp":"Material 'paucity' (scarcity) combined with rising demand naturally causes the cost to 'escalate' (increase).","src":null,"vocab":[]},{"id":"bank-1205","q":"Fill in the blanks with the appropriate word(s): With the benefit of _____, we can _____ the mistakes we have made earlier in life.","opts":{"A":"prophecy - grasp","B":"insight - understand","C":"nostalgia - disregard","D":"hindsight - comprehend"},"ans":"D","exp":"Looking back on the past to understand earlier mistakes is enabled by 'hindsight,' allowing us to 'comprehend' them.","src":null,"vocab":[]},{"id":"bank-1206","q":"Fill in the blanks with the appropriate word(s): Dolls _____ existed as children's playthings for thousands of years.","opts":{"A":"have","B":"sported","C":"been","D":"used"},"ans":"A","exp":"With 'for thousands of years' indicating an action continuing from the past to the present, Present Perfect Tense ('have existed') is required.","src":null,"vocab":[]},{"id":"bank-1207","q":"Fill in the blanks with the appropriate word(s): Saturn has family of nine satellites _____.","opts":{"A":"the largest is Titan","B":"which is Titan, the largest","C":"the largest of which is Titan","D":"largest is the Titan"},"ans":"C","exp":"When describing one member of a group with extra information, the structure 'the largest of which is...' is grammatically correct.","src":null,"vocab":[]},{"id":"bank-1208","q":"Fill in the blanks with the appropriate word(s): The management's _____ from fiscal _____ has led the company to bankruptcy.","opts":{"A":"avoidance - propensity","B":"avoidance - propensity","C":"retreat - responsibility","D":"devotion - prudence"},"ans":"C","exp":"Management's 'retreat' (withdrawal) from fiscal 'responsibility' (accountability) led to the company's bankruptcy.","src":null,"vocab":[]},{"id":"bank-1209","q":"Fill in the blanks with the appropriate word(s): The couple was so _____ with the interior designing of the apartment that they overlooked the structural _____.","opts":{"A":"carried away - deficiencies","B":"exasperated - amenities","C":"blown away - amenities","D":"carried ahead - ambiguities"},"ans":"A","exp":"Being overly absorbed ('carried away') in design details would naturally lead to overlooking structural 'deficiencies' (flaws).","src":null,"vocab":[]},{"id":"bank-1210","q":"Identify the pair with a similar relationship: MERCENARY : MONEY ::","opts":{"A":"Vindictive : revenge","B":"Scholarly : library","C":"Immaculate : cleanliness","D":"Thirsty : water"},"ans":"A","exp":"A mercenary is motivated by money; similarly, a vindictive person is motivated by revenge — both pairs show a character type and their driving motivation.","src":null,"vocab":[]},{"id":"bank-1211","q":"Identify the pair with a similar relationship: NUMB : INSENSIBLE ::","opts":{"A":"Reflect : luminous","B":"Burnish : lustrous","C":"Heckle : raucous","D":"Repulse : odious"},"ans":"B","exp":"To numb something makes it insensible; similarly, to burnish something makes it lustrous — both pairs show an action and its resulting effect.","src":null,"vocab":[]},{"id":"bank-1212","q":"Identify the pair with a similar relationship: STUDY : LEARN ::","opts":{"A":"Pervade : encompass","B":"Search : find","C":"Gather : win","D":"Agree : keep"},"ans":"B","exp":"Studying leads to learning; similarly, searching leads to finding — both pairs show a process and its intended successful result.","src":null,"vocab":[]},{"id":"bank-1213","q":"Identify the pair with a similar relationship: LULLABY : SONG ::","opts":{"A":"Narrative : volume","B":"Diatribe : discourse","C":"Paragraph : page","D":"Lecture : tutor"},"ans":"B","exp":"A lullaby is a specific type of song; similarly, a diatribe is a specific type of discourse — both pairs show a category and a specific example.","src":null,"vocab":[]},{"id":"bank-1214","q":"Identify the pair with a similar relationship: CHOREOGRAPHY : DANCE ::","opts":{"A":"Ceremony : sermon","B":"Agenda : advertisement","C":"Poetry : recitation","D":"Plot : story"},"ans":"D","exp":"Choreography is the planned structure of a dance; similarly, a plot is the planned structure of a story — both pairs show a design/blueprint and its execution.","src":null,"vocab":[]},{"id":"bank-1215","q":"Fill in each blank with the most appropriate option: At Tuesday's meeting, Corey read a lengthy statement criticizing Busque's lack of _____.","opts":{"A":"nibble","B":"stipulate","C":"decorum","D":"terse"},"ans":"C","exp":"Wearing inappropriate clothing at a formal meeting reflects a lack of 'decorum' (proper formal behavior).","src":null,"vocab":[]},{"id":"bank-1216","q":"Fill in each blank with the most appropriate option: Cars and people don't easily share space, so Gruen strove to get people quickly parked and out of their cars, to _____ the space from cars.","opts":{"A":"gerontocracy","B":"warrant","C":"disencumber","D":"Affirm"},"ans":"C","exp":"Freeing space from the burden of cars means to 'disencumber' (relieve) it of that obstruction.","src":null,"vocab":[]},{"id":"bank-1217","q":"Fill in each blank with the most appropriate option: Today we went shopping for a wine _____. This is a person who selects the wine for each meal.","opts":{"A":"Connoisseur","B":"fluke","C":"pundit","D":"teetotal"},"ans":"A","exp":"An expert in selecting fine wine to pair with meals is called a 'connoisseur.'","src":null,"vocab":[]},{"id":"bank-1218","q":"Fill in each blank with the most appropriate option: I am writing to request that Google _____ web search censorship based on point-of-view.","opts":{"A":"extant","B":"repudiate","C":"foible","D":"rebut"},"ans":"B","exp":"Asking a company to formally reject/disavow censorship policy is asking them to 'repudiate' it.","src":null,"vocab":[]},{"id":"bank-1219","q":"Fill in each blank with the most appropriate option: It is necessary to be _____ while dealing with mounting outstanding loans.","opts":{"A":"confident","B":"active","C":"prudent","D":"bold"},"ans":"C","exp":"Managing financial difficulties carefully and wisely requires being 'prudent.'","src":null,"vocab":[]},{"id":"bank-1220","q":"Select the word or phrase most nearly opposite in meaning: 'GIST'","opts":{"A":"artificial manner","B":"trivial point","C":"informal procedure","D":"eccentric method"},"ans":"B","exp":"'Gist' means the central/essential point of something; its opposite is 'trivial point' (an insignificant detail).","src":null,"vocab":[]},{"id":"bank-1221","q":"Select the word or phrase most nearly opposite in meaning: 'TRACTABILITY'","opts":{"A":"infertility","B":"implausibility","C":"incorrigibility","D":"impenetrability"},"ans":"C","exp":"'Tractability' means being easily managed/controlled; its opposite is 'incorrigibility' (being unmanageable/unable to be corrected).","src":null,"vocab":[]},{"id":"bank-1222","q":"Select the word or phrase most nearly opposite in meaning: 'REPULSION'","opts":{"A":"combination","B":"elongation","C":"attraction","D":"oscillation"},"ans":"C","exp":"'Repulsion' means a force pushing apart; its opposite is 'attraction' (a force pulling together).","src":null,"vocab":[]},{"id":"bank-1223","q":"Select the word or phrase most nearly opposite in meaning: 'EMIT'","opts":{"A":"absorb","B":"demand","C":"mistake","D":"prevent"},"ans":"A","exp":"'Emit' means to release/give off; its opposite is 'absorb' (to take in).","src":null,"vocab":[]},{"id":"bank-1224","q":"Select the word or phrase most nearly opposite in meaning: 'ALLY'","opts":{"A":"mediator","B":"felon","C":"adversary","D":"inventor"},"ans":"C","exp":"'Ally' means a supportive partner; its opposite is 'adversary' (an opponent).","src":null,"vocab":[]},{"id":"bank-1225","q":"'SUNDRY' (Select the word that conveys nearly the same meaning)","opts":{"A":"complex","B":"various","C":"express","D":"unmatched"},"ans":"B","exp":"'Sundry' means of various kinds, matching 'various.'","src":null,"vocab":[]},{"id":"bank-1226","q":"'FUSION' (Select the word closely opposite in meaning)","opts":{"A":"blend","B":"separation","C":"amalgam","D":"synthesis"},"ans":"B","exp":"'Fusion' means merging into one; its opposite is 'separation' (dividing apart).","src":null,"vocab":[]},{"id":"bank-1227","q":"Fill in the blanks: Aunik was the sort of person who always looked on the _____ side of life.","opts":{"A":"clear","B":"broad","C":"bright","D":"illuminated"},"ans":"C","exp":"'Look on the bright side' is the standard idiom for staying optimistic in life.","src":null,"vocab":[]},{"id":"bank-1228","q":"Fill in the blanks: I refused to _____ his rudeness any longer.","opts":{"A":"put up with","B":"put up","C":"put on","D":"put out with"},"ans":"A","exp":"'Put up with' is the phrasal verb meaning to tolerate.","src":null,"vocab":[]},{"id":"bank-1229","q":"Select the pair with a similar relationship: Earnest : Immoral :: _____","opts":{"A":"Land : Evil","B":"Restrained : Wanton","C":"Dissolute : Lascivious","D":"Shore : Reef"},"ans":"B","exp":"'Earnest' (sincere) and 'immoral' are opposites; similarly, 'restrained' (controlled) and 'wanton' (unrestrained) are opposites.","src":null,"vocab":[]},{"id":"bank-1230","q":"Select the pair with a similar relationship: President : Pope :: _____","opts":{"A":"Elected : Chosen","B":"Ballot : Smoke","C":"Temporal : Secular","D":"Proclamation : Bull"},"ans":"D","exp":"A president issues a formal proclamation; similarly, a pope issues a formal papal bull — both pairs show a leader and their type of formal declaration.","src":null,"vocab":[]},{"id":"bank-1231","q":"Select a pair of words to replace the question marks: Fortuitous : Inherent :: ___?___ : ___?___","opts":{"A":"Legible : Indelible","B":"Rugged : Endurable","C":"Envious : Desire","D":"Gregarious : Introverted"},"ans":"D","exp":"'Fortuitous' (external/accidental) is opposite to 'inherent' (innate); similarly, 'gregarious' (sociable) is opposite to 'introverted' (inward-focused).","src":null,"vocab":[]},{"id":"bank-1232","q":"Select a pair of words to replace the question marks: Alleviate : Aggravate :: ___?___ : ___?___","opts":{"A":"Elastic : Rigid","B":"Elevate : Agree","C":"Joke : Worry","D":"Level : Grade"},"ans":"A","exp":"'Alleviate' and 'aggravate' are opposites; similarly, 'elastic' (flexible) and 'rigid' (inflexible) are opposites.","src":null,"vocab":[]},{"id":"bank-1233","q":"Select a pair of words to replace the question marks: Desultory: Methodical :: ___?___ : ___?___","opts":{"A":"Integral : Unified","B":"Dissipated : Concentrated","C":"Unborn : Died","D":"Villian : Mighty"},"ans":"B","exp":"'Desultory' (aimless) is opposite to 'methodical' (orderly); similarly, 'dissipated' (scattered) is opposite to 'concentrated' (focused).","src":null,"vocab":[]},{"id":"bank-1234","q":"Select a pair of words to replace the question marks: Exempt : Obliged :: ___?___ : ___?___","opts":{"A":"Affluent : Fluent","B":"Steadfast : Reputed","C":"Valiant : Mighty","D":"Immune : Susceptible"},"ans":"D","exp":"'Exempt' (free from obligation) is opposite to 'obliged' (bound); similarly, 'immune' (protected) is opposite to 'susceptible' (vulnerable).","src":null,"vocab":[]},{"id":"bank-1235","q":"Select a pair of words to replace the question marks: Opaque : Transparent :: ___?___ : ___?___","opts":{"A":"Concentrated : Dissipated","B":"Tepid : Seething","C":"Intimate : Famous","D":"Turbid : Swollen"},"ans":"B","exp":"'Opaque' and 'transparent' are opposites (degree of clarity); similarly, 'tepid' (mildly warm) and 'seething' (extremely hot) are opposites (degree of intensity).","src":null,"vocab":[]},{"id":"bank-1236","q":"Choose the opposite meaning of the capitalized word: 'ACCRETION'","opts":{"A":"stack","B":"addition","C":"procession","D":"erosion"},"ans":"D","exp":"'Accretion' means gradual growth/accumulation; its opposite is 'erosion' (gradual wearing away).","src":null,"vocab":[]},{"id":"bank-1237","q":"Choose the opposite meaning of the capitalized word: 'APPLAUD'","opts":{"A":"criticise","B":"request","C":"pray","D":"flatter"},"ans":"A","exp":"'Applaud' means to express approval; its opposite is 'criticise.'","src":null,"vocab":[]},{"id":"bank-1238","q":"Choose the opposite meaning of the capitalized word: 'DEFAULT'","opts":{"A":"unlimited","B":"principal","C":"payment","D":"evasion"},"ans":"C","exp":"'Default' (failure to pay a debt) is opposite to 'payment' (fulfilling the obligation).","src":null,"vocab":[]},{"id":"bank-1239","q":"Choose the opposite meaning of the capitalized word: 'PROFOUND'","opts":{"A":"obscure","B":"superficial","C":"intense","D":"hidden"},"ans":"B","exp":"'Profound' means deep/thorough; its opposite is 'superficial' (shallow).","src":null,"vocab":[]},{"id":"bank-1240","q":"Choose the opposite meaning of the capitalized word: 'TRANSMIT'","opts":{"A":"show","B":"reply","C":"televise","D":"withhold"},"ans":"D","exp":"'Transmit' means to send/pass on; its opposite is 'withhold' (to hold back).","src":null,"vocab":[]},{"id":"bank-1241","q":"What is the Synonym for the word 'FIDELITY'?","opts":{"A":"Injurious","B":"Repent","C":"Praise","D":"Loyalty"},"ans":"D","exp":"'Fidelity' means faithfulness, matching 'loyalty.'","src":null,"vocab":[]},{"id":"bank-1242","q":"The Antonym for 'INGENIOUS' is:","opts":{"A":"Crafty","B":"Inane","C":"Incompetent","D":"Skillful"},"ans":"C","exp":"'Ingenious' (clever/inventive); its opposite per this set's key is 'incompetent' (lacking the ability/skill).","src":null,"vocab":[]},{"id":"bank-1243","q":"Find Analogy: REPTILE is to LIZARD as FLOWER is to","opts":{"A":"PETAL","B":"STEM","C":"ALLIGATOR","D":"DAISY"},"ans":"D","exp":"A lizard is a specific reptile; similarly, a daisy is a specific flower — category to example.","src":null,"vocab":[]},{"id":"bank-1244","q":"Select the word most nearly opposite to the given word: 'LUCID'","opts":{"A":"Ornate","B":"Arrogant","C":"Obscure","D":"Embroiled"},"ans":"C","exp":"'Lucid' means clear; its opposite is 'obscure' (unclear).","src":null,"vocab":[]},{"id":"bank-1245","q":"Select the word most nearly opposite to the given word: 'ENIGMATIC'","opts":{"A":"Frenetic","B":"Unambiguous","C":"Genuine","D":"Antagonistic"},"ans":"B","exp":"'Enigmatic' means mysterious; its opposite is 'unambiguous' (clear).","src":null,"vocab":[]},{"id":"bank-1246","q":"Select the word most nearly opposite to the given word: 'ALOOFNESS'","opts":{"A":"Concern","B":"Exaggeration","C":"Complacency","D":"Simplicity"},"ans":"A","exp":"'Aloofness' means cool detachment; its opposite is 'concern' (engaged interest).","src":null,"vocab":[]},{"id":"bank-1247","q":"Select the word most nearly opposite to the given word: 'CONCATENATE'","opts":{"A":"Disclaim","B":"Impede","C":"Derail","D":"Unlink"},"ans":"D","exp":"'Concatenate' means to link together in a chain/series; its opposite is 'unlink' (to separate).","src":null,"vocab":[]},{"id":"bank-1248","q":"Choose the appropriate word to fill in the blank: They fired upon the enemy from behind trees, walls and any other _____ point they could find.","opts":{"A":"conspicuous","B":"definitive","C":"vantage","D":"indefensible"},"ans":"C","exp":"A position offering tactical advantage during a fight is a 'vantage point.'","src":null,"vocab":[]},{"id":"bank-1249","q":"Choose the appropriate word to fill in the blank: Some students are _____ and want to take only the courses for which they see immediate value.","opts":{"A":"theoretical","B":"pragmatic","C":"impartial","D":"idealistic"},"ans":"B","exp":"Valuing only immediately useful courses reflects a 'pragmatic' (practical) mindset.","src":null,"vocab":[]},{"id":"bank-1250","q":"Choose the appropriate word to fill in the blank: The first forty years of life give us the text: the next thirty supply the _____.","opts":{"A":"abridgement","B":"bibliography","C":"epitaph","D":"commentary"},"ans":"D","exp":"Per Schopenhauer's analogy, life's experiences are the 'text,' and later years supply the 'commentary' (interpretation).","src":null,"vocab":[]},{"id":"bank-1251","q":"Choose the appropriate word to fill in the blank: This island is a colony; however, in most matters, it is _____ and receives no orders from the mother country.","opts":{"A":"autonomous","B":"amorphous","C":"distant","D":"submissive"},"ans":"A","exp":"Self-governing without orders from the home country describes being 'autonomous.'","src":null,"vocab":[]},{"id":"bank-1252","q":"Select the word most nearly similar to the capitalized word: 'VOLUBLE'","opts":{"A":"Worthwhile","B":"Serious","C":"Terminal","D":"Loquacious"},"ans":"D","exp":"'Voluble' means speaking fluently and at length, matching 'loquacious' (talkative).","src":null,"vocab":[]},{"id":"bank-1253","q":"Select the word most nearly similar to the capitalized word: 'WANTON'","opts":{"A":"Needy","B":"Passive","C":"Unchaste","D":"Oriental"},"ans":"C","exp":"'Wanton' means lewd/unrestrained sexually, matching 'unchaste.'","src":null,"vocab":[]},{"id":"bank-1254","q":"Select the word most nearly similar to the capitalized word: 'WARRANTY'","opts":{"A":"Threat","B":"Guarantee","C":"Arrest","D":"Issue"},"ans":"B","exp":"'Warranty' means a guarantee/assurance about a product, matching 'guarantee.'","src":null,"vocab":[]},{"id":"bank-1255","q":"Select the word most nearly similar to the capitalized word: 'WELTER'","opts":{"A":"Heat","B":"Greeting","C":"Recovery","D":"Tumult"},"ans":"D","exp":"'Welter' means a disordered mass/confusion, matching 'tumult' (chaos).","src":null,"vocab":[]},{"id":"bank-1256","q":"Select the word most nearly similar to the capitalized word: 'ZEALOT'","opts":{"A":"Beginner","B":"Patron","C":"Fanatic","D":"Murderer"},"ans":"C","exp":"'Zealot' means a person who is fanatically committed to a cause, matching 'fanatic.'","src":null,"vocab":[]},{"id":"bank-1257","q":"Fill in the Blanks (Vocabulary Based): Mr. Mehedi welcomed the delegates ______ the conference.","opts":{"A":"into","B":"to","C":"at","D":"None of these"},"ans":"B","exp":"The correct collocation for welcoming someone to an event is 'welcome...to.'","src":null,"vocab":[]},{"id":"bank-1258","q":"Fill in the Blanks: You must ask apology _____ him _____ your rudeness.","opts":{"A":"to, of","B":"at, for","C":"to, for","D":"None of these"},"ans":"C","exp":"The correct prepositions are 'apology to' (a person) and 'apology for' (a reason/fault).","src":null,"vocab":[]},{"id":"bank-1259","q":"Fill in the Blanks: The principal had an inquiry _____ the case.","opts":{"A":"at","B":"in","C":"into","D":"None of these"},"ans":"C","exp":"'Inquiry into' (a matter) is the correct collocation for investigating something.","src":null,"vocab":[]},{"id":"bank-1260","q":"Fill in the Blanks: On the night before the exam, she was seen pouring _____ the books.","opts":{"A":"into","B":"through","C":"over","D":"None of these"},"ans":"C","exp":"'Pore over' (books) is the phrasal verb meaning to study intently.","src":null,"vocab":[]},{"id":"bank-1261","q":"Fill in the Blanks: He was so exhausted that he decided to _____ down for a while.","opts":{"A":"lay","B":"laid","C":"lie","D":"None of these"},"ans":"C","exp":"Since the subject is resting himself (intransitive), the correct verb form after 'to' is 'lie' (not 'lay,' which requires an object).","src":null,"vocab":[]},{"id":"bank-1262","q":"Fill in the Blanks: Onion prices have _____ too much this month.","opts":{"A":"raised","B":"risen","C":"rise","D":"None of these"},"ans":"B","exp":"'Rise' is intransitive (no object); its past participle 'risen' is correct after 'have.'","src":null,"vocab":[]},{"id":"bank-1263","q":"Fill in the Blanks (Vocabulary Based): The view _____ the open window is very pretty.","opts":{"A":"by","B":"to","C":"along","D":"through"},"ans":"D","exp":"A view seen via a window is described with 'through' (the window).","src":null,"vocab":[]},{"id":"bank-1264","q":"Appropriate Preposition: I could not convince him _____ his mistake.","opts":{"A":"for","B":"from","C":"of","D":"to"},"ans":"C","exp":"'Convince someone of something' is the standard collocation.","src":null,"vocab":[]},{"id":"bank-1265","q":"Appropriate Preposition: He is not interested _____ cycling.","opts":{"A":"in","B":"with","C":"for","D":"at"},"ans":"A","exp":"'Interested in' is the fixed preposition collocation.","src":null,"vocab":[]},{"id":"bank-1266","q":"Appropriate Preposition: Opinion varies _____ man _____ man.","opts":{"A":"from, of","B":"between, and","C":"in, to","D":"from, to"},"ans":"D","exp":"'Vary from...to...' is the correct structure for describing variation between individuals.","src":null,"vocab":[]},{"id":"bank-1267","q":"Appropriate Preposition: You must adhere _____ your principle.","opts":{"A":"to","B":"with","C":"at","D":"in"},"ans":"A","exp":"'Adhere to' is the fixed preposition collocation.","src":null,"vocab":[]},{"id":"bank-1268","q":"Appropriate Preposition: She prides herself _____ her beauty.","opts":{"A":"on","B":"to","C":"of","D":"from"},"ans":"A","exp":"'Pride oneself on' is the fixed reflexive verb collocation.","src":null,"vocab":[]},{"id":"bank-1269","q":"Sentence Correction (Vocabulary Based):","opts":{"A":"Industry is key of success","B":"Industry is key on success","C":"Industry is key into success","D":"Industry is key to success"},"ans":"D","exp":"'Key to success' is the standard idiomatic collocation.","src":null,"vocab":[]},{"id":"bank-1270","q":"Sentence Correction (Vocabulary Based):","opts":{"A":"There is no place for doubt in it","B":"There is no room for doubt in it","C":"There is no suspension in it","D":"There is no misunderstanding in it"},"ans":"B","exp":"'No room for doubt' is the standard idiom meaning no scope for doubt.","src":null,"vocab":[]},{"id":"bank-1271","q":"Sentence Correction (Vocabulary Based):","opts":{"A":"Paper is made of wood","B":"Paper is made from wood","C":"Paper is made by wood","D":"Paper is made on wood"},"ans":"B","exp":"Since wood is chemically transformed and no longer recognizable in paper, 'made from' is correct (vs 'made of' for unaltered materials).","src":null,"vocab":[]},{"id":"bank-1272","q":"Sentence Completion: Considering how long you have been waiting for this news, your reaction is very _____.","opts":{"A":"meditative","B":"confusing","C":"tepid","D":"categorical"},"ans":"C","exp":"After a long wait, an unenthusiastic reaction is unexpectedly 'tepid' (lukewarm/unenthusiastic).","src":null,"vocab":[]},{"id":"bank-1273","q":"Sentence Completion: After a slow start, sales of tablet PC has been gaining _____ the increasing availability of cheap laptop PC.","opts":{"A":"in view of","B":"as a result of","C":"in spite of","D":"despite"},"ans":"C","exp":"Tablet sales rising despite competition from cheap laptops shows contrast best expressed by 'in spite of' (which correctly takes 'of').","src":null,"vocab":[]},{"id":"bank-1274","q":"Sentence Completion: He won the case because the _____ of the evidence was on his side.","opts":{"A":"brunt","B":"insignificance","C":"preponderance","D":"accuracy"},"ans":"C","exp":"Winning because evidence favored him in majority/weight is the 'preponderance' of evidence.","src":null,"vocab":[]},{"id":"bank-1275","q":"Sentence Completion: I told him everything _____ he misunderstand me.","opts":{"A":"would","B":"should","C":"could","D":"must"},"ans":"B","exp":"Following an implied 'lest' construction (avoiding a negative outcome), the modal 'should' is grammatically required.","src":null,"vocab":[]},{"id":"bank-1276","q":"Sentence Completion: Those who assume that no evil can befall them are foolishly _____.","opts":{"A":"apprehensive","B":"complacent","C":"confident","D":"ardent"},"ans":"B","exp":"Assuming nothing bad can happen reflects foolish 'complacency' (excessive self-satisfaction).","src":null,"vocab":[]},{"id":"bank-1277","q":"Missing Word: I asked Razia to come to the cinema ___ me.","opts":{"A":"to","B":"by","C":"into","D":"with"},"ans":"D","exp":"Inviting someone to accompany you uses 'with' (come with me).","src":null,"vocab":[]},{"id":"bank-1278","q":"Missing Word: No problem can be solved ___ violence.","opts":{"A":"through","B":"in","C":"bye","D":"way"},"ans":"A","exp":"Using violence as the means/method of solving a problem is expressed with 'through.'","src":null,"vocab":[]},{"id":"bank-1279","q":"Missing Word: Now a days banking is a sought ___ profession.","opts":{"A":"after","B":"growing","C":"claim","D":"All of these"},"ans":"A","exp":"'Sought after' is the fixed phrase meaning highly desired/in demand.","src":null,"vocab":[]},{"id":"bank-1280","q":"Find the Synonym: 'ABSOLVE'","opts":{"A":"Condemn","B":"Disregard","C":"Pardon","D":"Obey"},"ans":"C","exp":"'Absolve' means to free from blame/guilt, matching 'pardon.'","src":null,"vocab":[]},{"id":"bank-1281","q":"Find the Synonym: 'COHORT'","opts":{"A":"Group","B":"Cooperate","C":"Conspire","D":"Object"},"ans":"A","exp":"'Cohort' means a group/band of people, matching 'group.'","src":null,"vocab":[]},{"id":"bank-1282","q":"Find the Synonym: 'ENCUMBER'","opts":{"A":"Hold","B":"Imply","C":"Hinder","D":"Embrace"},"ans":"C","exp":"'Encumber' means to weigh down/burden, closest among options to 'hinder' (to obstruct).","src":null,"vocab":[]},{"id":"bank-1283","q":"Find the Synonym: 'BEMUSE'","opts":{"A":"Illuminate","B":"Fascinate","C":"Captivate","D":"Amuse"},"ans":"D","exp":"Although 'bemuse' actually means to confuse, the given key marks 'amuse' as the intended answer in this set.","src":null,"vocab":[]},{"id":"bank-1284","q":"Find the Synonym: 'EPHEMERAL'","opts":{"A":"Unimportant","B":"Small","C":"Everlasting","D":"Temporary"},"ans":"D","exp":"'Ephemeral' means lasting a very short time, matching 'temporary.'","src":null,"vocab":[]},{"id":"bank-1285","q":"Fill in the Blanks (Passage Based): Dolls __________ existed as children's playthings for thousands of years.","opts":{"A":"have","B":"sported","C":"been","D":"used"},"ans":"A","exp":"'For thousands of years' signals Present Perfect Tense: 'have existed.'","src":null,"vocab":[]},{"id":"bank-1286","q":"Fill in the Blanks: However, they were first manufactured as _________ in large numbers in Germany.","opts":{"A":"guns","B":"factory","C":"toys","D":"final"},"ans":"C","exp":"Following the context of dolls as children's playthings, they were manufactured as 'toys.'","src":null,"vocab":[]},{"id":"bank-1287","q":"Fill in the Blanks (Passage Based): they were first manufactured as toys in large numbers in Germany in the fifteenth _____.","opts":{"A":"hour","B":"nineteenth","C":"year","D":"century"},"ans":"D","exp":"Historical eras are described in 'centuries,' fitting 'fifteenth century.'","src":null,"vocab":[]},{"id":"bank-1288","q":"Fill in the Blanks: The dolls were primitive and __________ of wood, clay, rags, and wax.","opts":{"A":"fabricated","B":"construction","C":"fabric","D":"made"},"ans":"D","exp":"Describing what material something is composed of uses 'made of.'","src":null,"vocab":[]},{"id":"bank-1289","q":"Fill in the Blanks: They were dressed in clothes to __________ German women of the time.","opts":{"A":"resemblance","B":"be as","C":"look like","D":"appear"},"ans":"C","exp":"'Look like' means to resemble in appearance, fitting dolls dressed to resemble real women.","src":null,"vocab":[]},{"id":"bank-1290","q":"Find the Synonym: 'MELEE'","opts":{"A":"kindness","B":"brawl","C":"simple song","D":"primitive dance"},"ans":"B","exp":"'Melee' means a confused fight, matching 'brawl.'","src":null,"vocab":[]},{"id":"bank-1291","q":"Find the Synonym: 'LIMPID'","opts":{"A":"moist","B":"dear","C":"transparent","D":"dark"},"ans":"C","exp":"'Limpid' means clear/transparent, especially of liquid.","src":null,"vocab":[]},{"id":"bank-1292","q":"Find the Synonym: 'OBTUSE'","opts":{"A":"difficult","B":"interfering","C":"blunt","D":"concealed"},"ans":"C","exp":"'Obtuse' means slow to understand/dull, matching 'blunt' (dull-witted).","src":null,"vocab":[]},{"id":"bank-1293","q":"Find the Synonym: 'MYSTICAL'","opts":{"A":"imaginary","B":"vague","C":"prophetic","D":"spiritually symbolic"},"ans":"D","exp":"'Mystical' means relating to spiritual mysteries beyond ordinary understanding, matching 'spiritually symbolic.'","src":null,"vocab":[]},{"id":"bank-1294","q":"Find the Synonym: 'OSTENTATION'","opts":{"A":"protruding","B":"wealthy","C":"decorative","D":"Showy"},"ans":"D","exp":"'Ostentation' means pretentious/showy display, matching 'showy.'","src":null,"vocab":[]},{"id":"bank-1295","q":"Antonym: 'INDIGENT'","opts":{"A":"inferior","B":"wealthy","C":"subordinate","D":"insolvent"},"ans":"B","exp":"'Indigent' means extremely poor; its opposite is 'wealthy.'","src":null,"vocab":[]},{"id":"bank-1296","q":"Antonym: 'SPOIL'","opts":{"A":"improve","B":"blemish","C":"destroy","D":"blight"},"ans":"A","exp":"'Spoil' means to ruin/make worse; its opposite is 'improve.'","src":null,"vocab":[]},{"id":"bank-1297","q":"Antonym: 'AVARICE'","opts":{"A":"cupidity","B":"conservation","C":"indulgence","D":"generosity"},"ans":"D","exp":"'Avarice' means extreme greed for wealth; its opposite is 'generosity.'","src":null,"vocab":[]},{"id":"bank-1298","q":"Antonym: 'INERT'","opts":{"A":"tight","B":"immobile","C":"moving","D":"void"},"ans":"C","exp":"'Inert' means lacking the ability to move/inactive; its opposite is 'moving.'","src":null,"vocab":[]},{"id":"bank-1299","q":"One Word Substitution: Animals who eat flesh of another animal","opts":{"A":"maneater","B":"beast","C":"carnivorous","D":"cannibal"},"ans":"C","exp":"'Carnivorous' describes animals that eat the flesh of other animals.","src":null,"vocab":[]},{"id":"bank-1300","q":"One Word Substitution: Cessation of arms before a formal treaty is signed during war","opts":{"A":"truce","B":"armistice","C":"accord","D":"retreat"},"ans":"B","exp":"An 'armistice' is a formal agreement to stop fighting before a peace treaty is signed.","src":null,"vocab":[]}]}]},{"id":"ana","name":"GRE Analogy","chapters":[{"id":"ana-1","title":"GRE Analogy Test-1","questions":[{"id":"ana-C1Q1","q":"SEDATIVE : DROWSINESS","opts":{"A":"epidemic : contagiousness","B":"vaccine : virus","C":"laxative : drug","D":"anesthetic : numbness","E":"therapy : psychosis"},"ans":"D","exp":"Relationship: Cause-Effect. Taking a sedative produces drowsiness. Verification sentence: 'A sedative causes drowsiness.' Logic: Just as taking a sedative causes drowsiness in the body, using an anesthetic causes numbness in a specific part or the whole body. In both pairs, the first item creates the second condition. Option elimination: (A) epidemic : contagiousness is a medium-and-quality relationship, not direct cause-effect in the same sequence. (B) vaccine : virus is prevention, not causation - a vaccine prevents a virus, it doesn't cause it. (C) laxative : drug is a type-of relationship (a laxative is a type of drug), not a result relationship. (E) therapy : psychosis is treatment (therapy cures psychosis), not causation. Tip: If the original pair has an 'A causes B' relationship, the answer pair must also show 'X causes Y'.","src":"AB Bank MT-2011; United Commercial Bank (Officer)-2011","vocab":[{"word":"Sedative","meaning":"A calming or sleep-inducing agent","synonyms":"Tranquilizer, Soother"},{"word":"Drowsiness","meaning":"Sleepiness, a dazed state","synonyms":"Sleepiness, Somnolence"},{"word":"Anesthetic","meaning":"A numbing/pain-blocking drug","synonyms":"Painkiller, Narcotic"},{"word":"Numbness","meaning":"Loss of sensation","synonyms":"Insensibility, Torpor"},{"word":"Laxative","meaning":"A medicine that relieves constipation","synonyms":"-"},{"word":"Psychosis","meaning":"A mental disorder or madness","synonyms":"-"}]},{"id":"ana-C1Q2","q":"LAWYER : COURTROOM","opts":{"A":"participant : team","B":"commuter : train","C":"gladiator : arena","D":"senator : caucus","E":"patient : ward"},"ans":"C","exp":"Relationship: Worker : Working Place. Verification sentence: 'A lawyer works in a courtroom.' Logic: Just as a lawyer demonstrates skill in a courtroom, a gladiator displays combat skill in an arena (a designated battlefield). In both cases, the place is specifically designated for that person's professional performance. Option elimination: (A) participant : team is a Member : Group relationship. (B) commuter : train - a commuter merely travels via the train, it isn't a workplace. (D) senator : caucus - a senator attends caucus meetings, but it isn't their defining performance venue. (E) patient : ward - a patient receives service in a ward but doesn't 'work' there (Recipient : Place, not Worker : Place). Tip: When multiple options seem close, check whether the relationship is specifically about 'professional performance' - which is what links gladiator and lawyer here.","src":"United Commercial Bank (Officer)-2011","vocab":[{"word":"Lawyer","meaning":"Legal professional","synonyms":"Attorney, Counsel"},{"word":"Courtroom","meaning":"Room where court is held","synonyms":"-"},{"word":"Gladiator","meaning":"Ancient Roman fighter","synonyms":"Combatant"},{"word":"Arena","meaning":"Battlefield or sports ground","synonyms":"Stadium, Ring"},{"word":"Commuter","meaning":"Regular traveler/passenger","synonyms":"Traveler"},{"word":"Caucus","meaning":"A political party meeting","synonyms":"Meeting"}]},{"id":"ana-C1Q3","q":"CURIOSITY : KNOW","opts":{"A":"temptation : conquer","B":"starvation : eat","C":"wanderlust : travel","D":"humor : laugh","E":"survival : live"},"ans":"C","exp":"Relationship: Desire and Action. Curiosity drives a person to know something. The first word is a mental desire, and the second is the action that fulfills that desire. Verification sentence: 'Curiosity is a desire to know.' Similarly, 'Wanderlust is a desire to travel.' Logic: Just as curiosity makes a person try to 'know,' wanderlust makes a person 'travel.' Option elimination: (A) and (B): Temptation usually makes a person tempted, but 'conquer' is its opposite, not a fulfillment. Starvation makes a person want to eat, but it's a negative physical state rather than a strong desire-action pair. (D) and (E): Humor causes a person to laugh (an action), but humor isn't an intense 'desire.' Survival's goal may be to live, but that's a basic life necessity, not a passion or desire. Tip: Watch the 'degree of intensity' in analogies - curiosity and wanderlust both express an intense longing or desire.","src":"AB Bank MT-2011","vocab":[{"word":"Curiosity","meaning":"Eagerness to know","synonyms":"Inquisitiveness"},{"word":"Wanderlust","meaning":"A strong desire to travel","synonyms":"Roam-thirst"},{"word":"Starvation","meaning":"Severe hunger/famine","synonyms":"Famine"},{"word":"Temptation","meaning":"An enticement","synonyms":"Allurement"}]},{"id":"ana-C1Q4","q":"FRUGAL : MISERLY","opts":{"A":"confident : arrogant","B":"courageous : pugnacious","C":"famous : aggressive","D":"rash : foolhardy","E":"quiet : timid"},"ans":"A","exp":"Relationship: Positive vs. Negative (Degree of Intensity). The first word is the positive form of a quality, and the second is the negative/extreme form of the same quality. Verification sentence: 'A frugal person is careful with money, but a miserly person is excessively so in a negative way.' Logic: In the original pair, 'frugal' is a praiseworthy trait, while 'miserly' is its extreme and negative form. Similarly, being 'confident' is a virtue, but its extreme negative form is being 'arrogant.' Option elimination: (B) and (C): Courageous has no direct intensity link with pugnacious, nor does famous with aggressive. (D) Rash : foolhardy - both words are already negative (reckless : excessively reckless), so there's no positive-to-negative pairing. (E) Quiet : timid - being calm doesn't necessarily mean being timid; there's no direct intensity relationship between them. Tip: When two words seem nearly synonymous, check whether one is 'positive' and the other 'negative' - this 'Degree of Intensity' pattern appears often in BCS and bank exams.","src":"-","vocab":[{"word":"Frugal","meaning":"Economical with money","synonyms":"Economical, Thrifty"},{"word":"Miserly","meaning":"Stingy","synonyms":"Stingy, Parsimonious"},{"word":"Confident","meaning":"Self-assured","synonyms":"Self-assured"},{"word":"Arrogant","meaning":"Haughty","synonyms":"Haughty, Overbearing"},{"word":"Pugnacious","meaning":"Quarrelsome","synonyms":"Quarrelsome"},{"word":"Foolhardy","meaning":"Recklessly bold","synonyms":"Reckless"}]},{"id":"ana-C1Q5","q":"ANTIDOTE : POISON","opts":{"A":"cure : recovery","B":"narcotic : sleep","C":"stimulant : relapse","D":"tonic : lethargy","E":"resuscitation : breathing"},"ans":"D","exp":"Relationship: Remedy-Problem or Counteraction. Verification sentence: 'An antidote counteracts the effect of poison.' Logic: Just as an antidote destroys the effect of poison and restores health, a tonic removes lethargy/fatigue from the body and supplies energy. Option elimination: (A) cure : recovery - curing leads to recovery (cause-effect), but one doesn't destroy the other; this is sequential, not counteractive. (B) narcotic : sleep - a narcotic brings sleep, it doesn't remove it. (C) stimulant : relapse - a stimulant doesn't prevent relapse. (E) resuscitation : breathing - this is the process of restoring breathing, not a relationship of suppressing a negative state. Tip: In analogy, when a positive word removes a negative condition, the answer option must show the same positive-negative counteraction pair.","src":"AB Bank MT-2011","vocab":[{"word":"Antidote","meaning":"A remedy against poison","synonyms":"Countermeasure"},{"word":"Poison","meaning":"A toxic/lethal substance","synonyms":"-"},{"word":"Lethargy","meaning":"Sluggishness, lack of energy","synonyms":"Sluggishness"},{"word":"Tonic","meaning":"A strengthening medicine","synonyms":"Invigorator"},{"word":"Stimulant","meaning":"An agent that excites activity","synonyms":"-"},{"word":"Relapse","meaning":"Falling ill again after recovery","synonyms":"-"}]},{"id":"ana-C1Q6","q":"STYGIAN : DARK","opts":{"A":"abysmal : low","B":"cogent : contentious","C":"fortuitous : accidental","D":"reckless : threatening","E":"cataclysmic : doomed"},"ans":"A","exp":"Relationship: Degree of Intensity. The first word means an extreme form of the second. 'Stygian' means extremely dark. Verification sentence: 'Something that is Stygian is extremely dark.' Logic: Just as Stygian implies an extreme degree of darkness, 'Abysmal' implies an extreme degree of lowness/depth. In both pairs, the first word expresses intensity of the second. Option elimination: (B) cogent : contentious - logical and disputed have no intensity relationship between them. (C) fortuitous : accidental - these two words are synonyms, without an intensity difference. (D) reckless : threatening - being reckless doesn't automatically mean being threatening; no fixed rule connects them. (E) cataclysmic : doomed - catastrophic and cursed are two separate negative concepts. Tip: When the options contain multiple synonym pairs, checking the 'Degree of Intensity' makes finding the correct answer easier.","src":"-","vocab":[{"word":"Stygian","meaning":"Extremely dark/hellish","synonyms":"Gloomy, Murky"},{"word":"Abysmal","meaning":"Extremely deep/very bad","synonyms":"Bottomless, Profound"},{"word":"Fortuitous","meaning":"Happening by chance","synonyms":"Unexpected"},{"word":"Cogent","meaning":"Forceful, convincing","synonyms":"Convincing"}]},{"id":"ana-C1Q7","q":"WORSHIP : SACRIFICE","opts":{"A":"generation : pyre","B":"burial : mortuary","C":"weapon : centurion","D":"massacre : invasion","E":"prediction : augury"},"ans":"E","exp":"Relationship: Part of a Ritual / Action and its Component. In ancient or religious rites, sacrifice/offering is an inseparable part or medium of worship. Verification sentence: 'Sacrifice is a form or part of worship.' Logic: Just as sacrifice is needed for worship, in ancient times 'Augury' (forecasting by observing bird behavior or omens) was used for the purpose of 'prediction.' Option elimination: (A) generation : pyre has no direct procedural connection between generation and a funeral pyre. (B) burial : mortuary is a locational relationship (the body is kept at the mortuary), not procedural. (C) weapon : centurion is a tool-and-user relationship (a centurion uses weapons). (D) massacre : invasion is a negative cause-effect outcome (invasion may cause massacre), but it isn't a religious or ceremonial rite. Tip: When one word in an analogy denotes a 'ritual' or ceremony, look for the same kind of traditional or scriptural relationship in the other pair.","src":"United Commercial Bank (Officer)-2011; JnU (IBA-BBA) Set-1: 2009-10","vocab":[{"word":"Worship","meaning":"Adoration, devotion","synonyms":"Adoration, Devotion"},{"word":"Sacrifice","meaning":"An offering","synonyms":"Offering, Immolation"},{"word":"Augury","meaning":"Foretelling via omens","synonyms":"Omen, Prophecy"},{"word":"Mortuary","meaning":"A place for storing dead bodies","synonyms":"Morgue"},{"word":"Pyre","meaning":"A pile of wood for cremation","synonyms":"-"}]},{"id":"ana-C1Q8","q":"EVANESCENT : DISAPPEAR","opts":{"A":"transparent : penetrate","B":"onerous : struggle","C":"feckless : succeed","D":"illusory : exist","E":"pliant : yield"},"ans":"E","exp":"Relationship: Defining Characteristic. The defining trait of 'evanescent' is that it tends to 'disappear.' Verification sentence: 'Something evanescent tends to disappear.' Logic: Just as the defining trait of something evanescent (short-lived) is that it quickly disappears, the defining trait of something pliant (flexible) is that it easily yields or bends to others. Option elimination: (A) transparent : penetrate - light can pass through a transparent object, but the defining action of 'transparent' isn't 'to penetrate.' (B) onerous : struggle - a burdensome task requires struggle, but 'onerous' itself isn't the struggle. (C) feckless : succeed - this is contradictory; feckless (incompetent) people typically don't succeed. (D) illusory : exist - also contradictory; something illusory by definition does not truly exist. Tip: In analogies where the first word is an adjective and the second a verb, test the relationship by asking 'Is the defining action of [Adjective] to [Verb]?'","src":"-","vocab":[{"word":"Evanescent","meaning":"Short-lived, quickly fading","synonyms":"Ephemeral, Fleeting"},{"word":"Pliant","meaning":"Flexible, adaptable","synonyms":"Flexible, Adaptable"},{"word":"Yield","meaning":"To submit/surrender","synonyms":"Surrender, Submit"},{"word":"Onerous","meaning":"Burdensome","synonyms":"Burdensome"},{"word":"Feckless","meaning":"Ineffective, irresponsible","synonyms":"Irresponsible"}]},{"id":"ana-C1Q9","q":"UPBRAID : REPROACH","opts":{"A":"dote : like","B":"lag : stray","C":"vex : please","D":"earn : desire","E":"recast : explain"},"ans":"A","exp":"Relationship: Degree of Intensity. The first word represents an extreme form of the second. Verification sentence: 'To upbraid is to reproach severely.' Logic: Just as the intense form of 'reproach' is 'upbraid' (harsh scolding), the intense form of 'like' is 'dote' (loving excessively/blindly). In both pairs, the first word is the 'extreme' degree of the second. Option elimination: (B) lag : stray - being slow (lag) and going astray (stray) carry different meanings. (C) vex : please - these words are antonyms. (D) earn : desire - earning and desiring have no direct intensity relationship. (E) recast : explain - reshaping something and explaining it are entirely different actions. Tip: Whenever options contain synonym pairs, check whether there's a 'difference in intensity' between them - this 'Degree of Intensity' concept is heavily tested in BCS and bank exams.","src":"-","vocab":[{"word":"Upbraid","meaning":"To scold severely","synonyms":"Scold severely, Berate"},{"word":"Reproach","meaning":"To blame/scold","synonyms":"Blame, Chide"},{"word":"Dote","meaning":"To love excessively/blindly","synonyms":"Adore"},{"word":"Vex","meaning":"To annoy","synonyms":"Annoy"},{"word":"Recast","meaning":"To remodel","synonyms":"Remodel"}]},{"id":"ana-C1Q10","q":"FRAGILE : BREAK","opts":{"A":"invisible : see","B":"erratic : control","C":"flammable : burn","D":"noxious : escape","E":"industrial : manufacture"},"ans":"C","exp":"Relationship: Property and Tendency / Defining Characteristic. The first word denotes a quality whose natural consequence is the second word. Verification sentence: 'Something fragile is easy to break.' Logic: Just as the main characteristic of something fragile is that it breaks easily, the main characteristic of something flammable is that it burns easily. Option elimination: (A) invisible : see - this is antonymous; what's invisible cannot be seen. (B) erratic : control - erratic things are hard to control; this doesn't denote a natural tendency either. (D) noxious : escape - escaping from something toxic isn't a natural consequence of a quality. (E) industrial : manufacture - though related, this doesn't express an object's 'easy-to-happen' quality. Tip: When a word in analogy ends with '-able' or '-ible,' it denotes a 'capability' or 'easy tendency' for an action - look for a similarly suffixed word in the answer.","src":"Modhumoti Bank Ltd. (PO)-2017","vocab":[{"word":"Fragile","meaning":"Easily broken, brittle","synonyms":"Brittle, Delicate"},{"word":"Flammable","meaning":"Easily catches fire","synonyms":"Inflammable, Combustible"},{"word":"Erratic","meaning":"Unpredictable, irregular","synonyms":"Unpredictable"},{"word":"Noxious","meaning":"Harmful, toxic","synonyms":"Harmful, Toxic"}]},{"id":"ana-C1Q11","q":"MUTTER : INDISTINCT","opts":{"A":"demand : obedient","B":"plead : obligatory","C":"flatter : commendable","D":"drone : monotonous","E":"confirm : proven"},"ans":"D","exp":"Relationship: Defining Characteristic. Verification sentence: 'By definition, a mutter is indistinct.' Logic: Just as the defining trait of muttering is that it is indistinct, the defining trait of droning is that it is monotonous. Option elimination: (A) demand : obedient - demanding and being obedient may even be oppositional, not a defining characteristic. (B) plead : obligatory - pleading is never obligatory; it's voluntary. (C) flatter : commendable - flattering is in no way a commendable act. (E) confirm : proven - confirming and being proven are largely synonymous, but the characteristic-type relationship isn't expressed here. Tip: If an analogy provides the 'manner' of an action (how it sounds or feels), look for the same sensory or qualitative characteristic in the answer.","src":"Modhumoti Bank Ltd. (PO)-2017","vocab":[{"word":"Mutter","meaning":"To speak indistinctly/under one's breath","synonyms":"Mumble, Murmur"},{"word":"Indistinct","meaning":"Unclear, vague","synonyms":"Vague, Unclear"},{"word":"Drone","meaning":"To speak/hum monotonously","synonyms":"Hum, Buzz"},{"word":"Monotonous","meaning":"Tediously uniform","synonyms":"Tedious, Boring"},{"word":"Obligatory","meaning":"Mandatory","synonyms":"Mandatory, Compulsory"}]},{"id":"ana-C1Q12","q":"FAULTFINDER : CRITICIZE","opts":{"A":"luminary : obedient","B":"athlete : cheer","C":"arbitrator : mediate","D":"pharmacist : prescribe","E":"dawdler : toil"},"ans":"C","exp":"Relationship: Person : Function (Agent : Action). The first word designates a person and the second their primary/professional action. Verification sentence: 'A faultfinder is someone who criticizes.' Logic: Just as a faultfinder's habitual action is to criticize, an arbitrator's main job/responsibility is to mediate between two parties. Option elimination: (A) luminary : obedient - 'luminary' means a famous person; there's no direct professional connection with being obedient. (B) athlete : cheer - an athlete's job is to play sports; cheering is mainly the spectators' job. (D) pharmacist : prescribe - pharmacists supply medicine, but 'prescribing' is the physician's job. (E) dawdler : toil - this is contradictory; an idle person never works hard (toils). Tip: When a profession or person's name appears in an analogy, ask yourself - 'What is this person's primary function?' This quickly eliminates wrong options.","src":"-","vocab":[{"word":"Faultfinder","meaning":"A person who finds fault, a critic","synonyms":"Critic, Caviler"},{"word":"Arbitrator","meaning":"A mediator","synonyms":"Mediator, Umpire"},{"word":"Mediate","meaning":"To act as intermediary","synonyms":"Intercede, Arbitrate"},{"word":"Dawdler","meaning":"A person who wastes time, idler","synonyms":"Loiterer"},{"word":"Toil","meaning":"To labor hard","synonyms":"Labor, Struggle"}]},{"id":"ana-C1Q13","q":"PEST : IRKSOME","opts":{"A":"salesclerk : courteous","B":"leader : nondescript","C":"enigma : unexpected","D":"expert : proficient","E":"accuser : indicted"},"ans":"D","exp":"Relationship: Defining Characteristic. Verification sentence: 'A pest is by definition irksome.' Logic: Just as a pest's core identity is being irksome (annoying), an expert's core identity/trait is being proficient (skilled) at their work. Option elimination: (A) salesclerk : courteous - a salesclerk should be courteous, but this isn't a defining or mandatory trait (not all salesclerks are courteous). (B) leader : nondescript - a leader is never nondescript (featureless); this is contradictory. (C) enigma : unexpected - a mystery isn't necessarily 'unexpected,' it's more 'complicated.' (E) accuser : indicted - the accuser and the accused (indicted) are entirely different parties. Tip: When an analogy has a Person and an Adjective, test whether that adjective is a 'must-have quality' for that person - if so, that's the correct answer.","src":"-","vocab":[{"word":"Pest","meaning":"An annoying person/thing","synonyms":"Annoyance, Nuisance"},{"word":"Irksome","meaning":"Annoying, tiresome","synonyms":"Annoying, Wearisome"},{"word":"Proficient","meaning":"Skilled, adept","synonyms":"Skilled, Adept"},{"word":"Enigma","meaning":"A mystery","synonyms":"Mystery, Puzzle"},{"word":"Nondescript","meaning":"Lacking distinctive features","synonyms":"Featureless"}]},{"id":"ana-C1Q14","q":"PROLOGUE : NOVEL","opts":{"A":"preamble : statute","B":"sketch : drawing","C":"movement : symphony","D":"index : book","E":"blueprint : building"},"ans":"A","exp":"Relationship: Introduction : Whole. The first word is the introductory part of the second. Verification sentence: 'A prologue is the introduction to a novel.' Logic: Just as a novel's introductory part is called a prologue, the introductory part or declaration of a statute or constitution is called a preamble. In both cases, the relationship is 'introduction versus the main subject.' Option elimination: (B) sketch : drawing - a sketch is a preliminary form of a drawing, but it isn't the formal introduction of a written work. (C) movement : symphony - a movement is a large section of a symphony, not its introduction but a segment. (D) index : book - an index is usually for locating information, not the 'presentation' or 'introduction' of the main content. (E) blueprint : building - a blueprint is the building's plan made before construction, not a part of the building itself. Tip: Introduction-related words (such as Preface, Foreword, Overture) often appear in exams - remember which specific medium (book, drama, music) each is used for.","src":"-","vocab":[{"word":"Prologue","meaning":"An introduction to a literary work","synonyms":"Introduction, Preface"},{"word":"Preamble","meaning":"The introduction to a law/constitution","synonyms":"Opening statement"},{"word":"Statute","meaning":"A written law","synonyms":"Law, Act"},{"word":"Symphony","meaning":"An orchestral composition","synonyms":"Orchestral composition"},{"word":"Blueprint","meaning":"A design plan","synonyms":"Master plan"}]},{"id":"ana-C1Q15","q":"EXPAND : VOLUME","opts":{"A":"ascend : fight","B":"proliferate : number","C":"bend : flexibility","D":"cool : temperature","E":"deflect : heading"},"ans":"B","exp":"Relationship: Action and Result. Verification sentence: 'To expand is to increase in volume.' Logic: Just as expanding something increases its volume, proliferating something increases its number. Option elimination: (A) ascend : fight - ascending has no direct increase-relationship with fighting. (C) bend : flexibility - bending doesn't increase flexibility; rather, flexibility is what allows bending. (D) cool : temperature - cooling something decreases its temperature, but the question requires an increase relationship. (E) deflect : heading - deflecting means a change in direction, not a quantitative increase. Tip: When an analogy denotes 'increase,' look for an 'increase' pair in the options too; eliminate options about 'decrease' or mere 'change' first.","src":"Bangladesh Bank Officer-(General Side)-2015; One Bank-2012","vocab":[{"word":"Expand","meaning":"To enlarge","synonyms":"Enlarge, Swell"},{"word":"Proliferate","meaning":"To multiply rapidly","synonyms":"Multiply, Mushroom"},{"word":"Deflect","meaning":"To divert","synonyms":"Divert, Deviate"},{"word":"Ascend","meaning":"To climb upward","synonyms":"Climb, Mount"}]},{"id":"ana-C1Q16","q":"CONTIGUOUS : ABUT","opts":{"A":"possible : occur","B":"simultaneous : coincide","C":"comprehensive : expect","D":"synthetic : create","E":"constant : stabilize"},"ans":"B","exp":"Relationship: Adjective : Verb (Defining Action). The first word describes a state, and the second is the verb form/result of that state. Verification sentence: 'Things that are contiguous are said to abut each other.' Logic: Contiguous means adjacency in space, expressed through the action 'abut.' Similarly, simultaneous means adjacency in time, expressed through the action 'coincide.' Option elimination: (A) possible : occur - what's possible may occur, but occurring isn't the sole definition of possibility. (C) comprehensive : expect - expecting something comprehensive has no grammatical/definitional connection. (D) synthetic : create - synthetic things are created, but that's not its inherent action. (E) constant : stabilize - something constant helps stability, but that isn't its defining action. Tip: Words related to 'space' and 'time' often have parallel relationships in analogies, which helps in finding the answer.","src":"-","vocab":[{"word":"Contiguous","meaning":"Adjacent, neighboring","synonyms":"Adjacent, Neighboring"},{"word":"Abut","meaning":"To touch/border","synonyms":"Adjoin, Border"},{"word":"Simultaneous","meaning":"Concurrent","synonyms":"Concurrent, Coexisting"},{"word":"Coincide","meaning":"To happen at the same time","synonyms":"Concur, Synchronize"}]},{"id":"ana-C1Q17","q":"SUITCASE : LUGGAGE","opts":{"A":"gift : package","B":"necklace : garment","C":"room : house","D":"hat : millinery","E":"faucet : sink"},"ans":"D","exp":"Relationship: Type/Category. A suitcase is a specific type of luggage; suitcase is the smaller unit and luggage is the broader category. Verification sentence: 'A suitcase is a specific type of luggage.' Logic: Just as a suitcase is a type of luggage, a hat is an item belonging to millinery (the hat-making trade/category). Option elimination: (A) gift : package - a gift may come in a package, but a package isn't a category of gift; this is more of a containment relationship. (B) necklace : garment - a necklace is jewelry, while garment means clothing; they don't match categorically. (C) room : house is a Part-Whole relationship (a room is part of a house), but a suitcase isn't part of luggage - it's a type of luggage. (E) faucet : sink - a faucet is attached to a sink, expressing a kind of attachment relationship. Tip: When the original word pair is a Countable Noun (Suitcase) and an Uncountable/Collective Noun (Luggage), the answer usually follows the same pattern.","src":"-","vocab":[{"word":"Suitcase","meaning":"A travel bag","synonyms":"-"},{"word":"Luggage","meaning":"Baggage","synonyms":"Baggage"},{"word":"Millinery","meaning":"Hat-making trade/business","synonyms":"Hat-making"},{"word":"Faucet","meaning":"A water tap","synonyms":"Tap"}]},{"id":"ana-C1Q18","q":"PROHIBITIVE : PURCHASE","opts":{"A":"preventive : heal","B":"laudatory : praise","C":"admonitory : fear","D":"peremptory : dispute","E":"imperative : comply"},"ans":"D","exp":"Relationship: Prevention/Preclusion. Here, 'the first blocks the second.' Verification sentence: 'Something prohibitive precludes a purchase' (if a price is excessively prohibitive, it blocks or makes a purchase impossible). Logic: Just as a prohibitive price makes a purchase impossible, if a decision is peremptory (absolute/final), there's no longer any room for dispute about it. Option elimination: (A) preventive : heal - preventive measures may aid recovery, but they don't block recovery. (B) laudatory : praise - laudatory words encourage praise, they don't block it (this is a synonym relationship). (C) admonitory : fear - a warning may instill fear, but it doesn't block fear. (E) imperative : comply - something mandatory must be complied with; this mainly dictates an action rather than blocking one. Tip: When the question involves a 'Negative Constraint' or 'blocking' relationship, look for an option pair where the first word negates the possibility of the second happening.","src":"-","vocab":[{"word":"Prohibitive","meaning":"Excessively costly/forbidding","synonyms":"Excessive, Forbidding"},{"word":"Peremptory","meaning":"Final and not open to question","synonyms":"Absolute, Imperious"},{"word":"Dispute","meaning":"An argument/disagreement","synonyms":"Argument, Challenge"},{"word":"Admonitory","meaning":"Warning","synonyms":"Warning"},{"word":"Laudatory","meaning":"Expressing praise","synonyms":"Complimentary"}]}]},{"id":"ana-2","title":"GRE Analogy Test-2","questions":[{"id":"ana-C2Q1","q":"JUDGE : GAVEL","opts":{"A":"detective : uniform","B":"doctor : stethoscope","C":"referee : whistle","D":"soldier : insignia","E":"lecture : podium"},"ans":"C","exp":"Relationship: Person : Tool of Authority. Verification sentence: 'A Judge uses a gavel to signal for order or to make a ruling,' and similarly, 'A referee uses a whistle to signal a foul or start/stop play.' Logic: A judge uses a gavel-like mallet to draw attention (order, order!). Both the judge and the referee use their respective tools (gavel/whistle) to enforce a decision or draw everyone's attention. Option elimination: (A) detective : uniform - a detective may wear a uniform, but they don't issue any signal or command with it. (B) doctor : stethoscope - a doctor diagnoses illness with a stethoscope, but doesn't issue authority or commands with it; it's a diagnostic tool. (D) soldier : insignia - insignia/badges indicate a soldier's rank, not a tool they use to issue commands. (E) lecture : podium - here 'lecturer' (person) is missing, only 'lecture' (subject) is given; also a podium is just a location, not a tool of use. Tip ('The Authority Tool' strategy): If the analogy is a Person : Tool relationship, check whether that person issues a specific 'signal' with the tool (as with Gavel and Whistle here). Similar past questions include 'Hammer : Carpenter' or 'Scalpel : Surgeon' types in bank and BCS exams.","src":"-","vocab":[{"word":"Judge","meaning":"A justice/arbiter","synonyms":"Justice, Arbiter"},{"word":"Gavel","meaning":"A small mallet used by a judge","synonyms":"Mallet, Hammer"},{"word":"Referee","meaning":"An umpire/official","synonyms":"Umpire, Official"},{"word":"Insignia","meaning":"A badge or emblem of rank","synonyms":"Badge, Emblem"},{"word":"Podium","meaning":"A platform for speaking","synonyms":"Lectern, Platform"}]},{"id":"ana-C2Q2","q":"ORGAN : KIDNEY","opts":{"A":"skeleton : kneecap","B":"bone : rib","C":"neuron : synapse","D":"abdomen : stomach","E":"blood : aorta"},"ans":"B","exp":"Relationship: General : Specific, or Category : Example. Verification sentence: 'A kidney is a specific type of organ.' Logic: Kidney is an internal organ of the body. A rib is a specific type of bone. Option elimination: (A) skeleton : kneecap - a skeleton is a collection of many bones, so this is Whole-Part. (C) neuron : synapse - a neuron and a synapse are two different parts of the nervous system; one isn't an example of the other. (D) abdomen : stomach - the stomach is located within the abdomen, which is a Location relationship. (E) blood : aorta - the aorta is a blood vessel, not blood itself; this is a container-and-content relationship. Tip: Whenever you see a general name (e.g., Bird, Tool, Organ) paired with a specific name (e.g., Parrot, Hammer, Kidney), understand it's a Classification relationship, and 'General Category : Example' should follow the same order in the answer.","src":"-","vocab":[{"word":"Organ","meaning":"A body part with a specific function","synonyms":"-"},{"word":"Kidney","meaning":"An internal excretory organ","synonyms":"-"},{"word":"Synapse","meaning":"A junction between neurons","synonyms":"-"},{"word":"Aorta","meaning":"The main artery of the body","synonyms":"-"}]},{"id":"ana-C2Q3","q":"SOOT : COMBUSTION","opts":{"A":"lint : brushing","B":"gravel : crushing","C":"gristle : tenderizing","D":"rubbish : housecleaning","E":"sawdust : woodcutting"},"ans":"E","exp":"Relationship: Product : Process, or By-product : Source. The second item's process produces the first item as a by-product or residue. Verification sentence: 'Soot is the by-product produced by the process of combustion.' Logic: Combustion (burning) produces soot. Cutting wood (woodcutting) produces sawdust. Option elimination: (A) lint : brushing - brushing clothes removes lint, it doesn't produce it; this is a removal process. (B) gravel : crushing - crushing large rocks produces gravel, but this isn't a chemical/natural by-product process. (C) gristle : tenderizing - tenderizing meat doesn't produce gristle (cartilage). (D) rubbish : housecleaning - cleaning a house removes rubbish, cleaning doesn't create it. (E) sawdust : woodcutting - cutting wood automatically produces sawdust as a residue, exactly matching the original relationship. Tip: This type of analogy is called 'Result of an Action.' It always helps to try constructing a sentence to test the relationship - testing options with sentences also helps determine the answer.","src":"JnU-E Unit (BBA): 2015-16","vocab":[{"word":"Soot","meaning":"Black powder from smoke","synonyms":"-"},{"word":"Combustion","meaning":"The process of burning","synonyms":"-"},{"word":"Sawdust","meaning":"Wood powder/shavings","synonyms":"-"},{"word":"Gristle","meaning":"Cartilage","synonyms":"Cartilage"}]},{"id":"ana-C2Q4","q":"PURIFY : IMPERFECTION","opts":{"A":"align : adjustment","B":"weary : boredom","C":"disagree : controversy","D":"verify : doubtfulness","E":"hone : sharpness"},"ans":"D","exp":"Relationship: Action : Object of Removal. The first word is an action performed for the purpose of removing/eliminating the second word (a negative state). Verification sentence: 'To purify something is to remove its imperfection.' Logic: Just as purifying something removes imperfection, verifying something removes doubtfulness from our minds. Option elimination: (A) align : adjustment - adjustment is needed in order to align something; it isn't the thing being removed. (B) weary : boredom - boredom may lead to weariness, which is a cause-effect relationship. (C) disagree : controversy - disagreeing creates controversy, it doesn't end it. (E) hone : sharpness - honing increases sharpness; this is an 'addition' relationship, not removal. Tip: If you notice the first word is an action and the second is a problem, use the formula 'How to solve [Problem]?' or '[Action] removes [Problem].'","src":"-","vocab":[{"word":"Purify","meaning":"To refine/cleanse","synonyms":"Refine, Cleanse"},{"word":"Imperfection","meaning":"A flaw/defect","synonyms":"Flaw, Defect"},{"word":"Verify","meaning":"To confirm/authenticate","synonyms":"Confirm, Authenticate"},{"word":"Doubtfulness","meaning":"Uncertainty","synonyms":"Uncertainty"},{"word":"Hone","meaning":"To sharpen","synonyms":"Sharpen"}]},{"id":"ana-C2Q5","q":"CENTRIFUGE : SEPARATE","opts":{"A":"thermometer : calibrate","B":"statue : chisel","C":"floodgate : overflow","D":"colander : drain","E":"television : transmit"},"ans":"D","exp":"Relationship: Tool : Function. Verification sentence: 'A centrifuge is a tool used to separate substances.' Logic: Just as a centrifuge separates liquid from solid or different components, a colander is used to drain liquid from something. Option elimination: (A) thermometer : calibrate - a thermometer measures temperature; 'calibrate' is something done TO the thermometer to ensure accuracy, not its function. (B) statue : chisel - a chisel is used to make a statue; this is Tool used before the Object exists, reversed order. (C) floodgate : overflow - a floodgate is used to prevent overflow, not cause it. (E) television : transmit - a television receives signals and displays them; it's not itself a transmitting device (the transmitter sends signals). Tip: When solving Tool : Function analogies, note whether the tool creates something (like Chisel : Carve) or changes/processes something (like Centrifuge : Separate).","src":"-","vocab":[{"word":"Centrifuge","meaning":"A device that separates substances by spinning","synonyms":"-"},{"word":"Colander","meaning":"A perforated bowl used to drain","synonyms":"-"},{"word":"Drain","meaning":"To empty/filter liquid","synonyms":"Empty, Filter"},{"word":"Calibrate","meaning":"To set a precise measurement standard","synonyms":"-"}]},{"id":"ana-C2Q6","q":"MOCK : IMITATE","opts":{"A":"Satirize : Charm","B":"Condense : Summarize","C":"Placate : Assuage","D":"Adapt : Duplicate","E":"Taunt : Challenge"},"ans":"E","exp":"Relationship: Degree of Intensity with Negative Connotation. Verification sentence: 'To mock is to imitate someone in a negative or insulting way.' Logic: 'Challenge' means inviting someone to compete; when that challenge is made with intent to insult or belittle, it becomes 'taunt.' So just as imitation becomes negative when it's 'mock,' a challenge becomes negative when it's 'taunt.' Option elimination: (A) Satirize : Charm are completely opposite words. (B) Condense : Summarize are near-synonyms with no negative-degree difference here. (C) Placate : Assuage are also mutually synonymous, both meaning to calm. (D) Adapt : Duplicate - adapting something and exactly duplicating it are not the same thing. Tip: When both words in an analogy denote an action, pay attention to their connotation (emotional shading).","src":"-","vocab":[{"word":"Mock","meaning":"To ridicule/imitate insultingly","synonyms":"-"},{"word":"Taunt","meaning":"To jeer or provoke","synonyms":"-"},{"word":"Satirize","meaning":"To mock through satire","synonyms":"-"},{"word":"Placate","meaning":"To calm/appease","synonyms":"Assuage"}]},{"id":"ana-C2Q7","q":"MALADROIT : SKILL","opts":{"A":"intemperate : anger","B":"unreasonable : intuition","C":"sluggish : fatigue","D":"glib : profundity","E":"morose : depression"},"ans":"D","exp":"Relationship: Lack of Property. Verification sentence: 'A maladroit person lacks skill.' Logic: Maladroit means clumsy/awkward, lacking skill. A glib (fluent but shallow) person's speech lacks profundity (depth). So just as someone who is glib lacks profundity, someone maladroit lacks skill. Option elimination: (A) intemperate : anger - an intemperate person doesn't lack anger; rather they lack control over it. (B) unreasonable : intuition - an unreasonable person lacks logic, not necessarily intuition. (C) sluggish : fatigue - sluggishness may be a result of fatigue, not an absence of it. (E) morose : depression - a morose person IS in a state of depression; this is near-synonymous, not an absence relationship. Tip: Constructing a short sentence using 'Lacks' or 'Without' to test each option quickly reveals the correct answer.","src":"-","vocab":[{"word":"Maladroit","meaning":"Clumsy, awkward","synonyms":"Clumsy"},{"word":"Glib","meaning":"Fluent but shallow","synonyms":"Fluent but shallow"},{"word":"Profundity","meaning":"Depth of thought","synonyms":"-"},{"word":"Intemperate","meaning":"Lacking self-control","synonyms":"Lacking self-control"},{"word":"Sluggish","meaning":"Inactive, slow","synonyms":"Inactive"}]},{"id":"ana-C2Q8","q":"EQUIVOCATION : AMBIGUOUS","opts":{"A":"mitigation : serve","B":"contradiction : peremptory","C":"platitude : banal","D":"explanation : unintelligible","E":"precept : obedient"},"ans":"C","exp":"Relationship: Noun : Adjective (Defining Characteristic). The first word is a noun and the second is the adjective expressing its core nature. Verification sentence: 'An equivocation is by nature ambiguous.' Logic: Just as equivocation's core trait is ambiguity, a platitude's (cliché) core trait is being banal (commonplace, trite). Option elimination: (A) mitigation : serve has no direct characteristic connection. (B) contradiction : peremptory - something contradictory isn't always peremptory (final/absolute). (D) explanation : unintelligible - an explanation's purpose is to make something clear, so this is an oppositional relationship. (E) precept : obedient - a precept may be obeyed, but obedience isn't its inherent trait. Tip: Apply the test 'Is always' or 'Is characterized by' - e.g., 'Equivocation is always Ambiguous' and 'Platitude is always Banal.' Whichever option satisfies this sentence is correct.","src":"-","vocab":[{"word":"Equivocation","meaning":"Va
