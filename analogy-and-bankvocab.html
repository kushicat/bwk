]},{"id":"ana-C5Q12","q":"DART : MISSILE","opts":{"A":"skiff : boat","B":"planet : star","C":"page : volume","D":"finger : thumb","E":"car : truck"},"ans":"A","exp":"Relationship: Specific : General/Category. Verification sentence: 'A dart is a type of small missile,' and similarly, 'A skiff is a type of small boat.' Logic: A missile refers to any throwable/launchable weapon, of which a dart is a small form. Similarly, a boat is a general category, of which a skiff (a small boat usually for one person) is a specific small form. In both, the first is a small version belonging within the second's category. Option elimination: (B) planet : star - a planet and a star are two different celestial objects; a planet isn't a 'type' of star. (C) page : volume - a page is a Part to Whole relationship with a volume/book, not a 'Type' of it. (D) finger : thumb - thumb is a type of finger, but here the order is reversed (this option goes Specific:General rather than the required General:Specific... actually re-check: the order here is finger:thumb, which is General:Specific, the reverse of the original Specific:General order). (E) car : truck - both car and truck are vehicles, but one isn't a type of the other; they're co-hyponyms (siblings in the same category). Tip: When a 'Type of' relationship exists, paying attention to word order is crucial. The 'small version of a larger category' pattern appears often in exams.","src":"-","vocab":[{"word":"Skiff","meaning":"A small light boat","synonyms":"-"},{"word":"Missile","meaning":"A launched weapon/projectile","synonyms":"-"}]},{"id":"ana-C5Q13","q":"DECIBEL : SOUND","opts":{"A":"gallon : water","B":"lumen : light","C":"band : signal","D":"weight : mineral","E":"scale : music"},"ans":"B","exp":"Relationship: Unit : Subject of Measurement. Verification sentence: 'A decibel is a unit of sound,' and similarly, 'A lumen is a unit of light.' Logic: Just as sound intensity is measured in decibels, light's brightness or intensity is measured in lumens. Both are specific units in physics. Option elimination: (A) gallon : water - a gallon does measure water, but it's a unit of volume, not of intensity; also, sound and light are both wave-based forms of energy, which doesn't match well with 'water.' (C) band : signal - a band is a range or frequency range of a signal, not a unit. (D) weight : mineral - weight itself isn't a unit; it's a property. The unit would be 'gram' or 'kilogram.' (E) scale : music - a scale is the arrangement of notes in music, not a unit of scientific measurement. Tip: It's important to keep basic scientific units in mind, particularly Sound : Decibel, Light : Lumen/Candela, Power : Watt, Pressure : Pascal, and Heat : Joule.","src":"-","vocab":[{"word":"Decibel","meaning":"A unit of sound intensity","synonyms":"-"},{"word":"Lumen","meaning":"A unit of luminous flux (light)","synonyms":"-"}]},{"id":"ana-C5Q14","q":"STICKLER : APPROXIMATION","opts":{"A":"leader : guidance","B":"connoisseur : anachronism","C":"sluggard : indolence","D":"purist : adulteration","E":"scientist : theorizing"},"ans":"D","exp":"Relationship: Person : Thing They Oppose/Dislike. Verification sentence: 'A stickler is someone who wants exactness and refuses approximation,' and similarly, 'A purist is someone who wants purity and refuses adulteration.' Logic: Just as a stickler wants precision and doesn't tolerate 'approximation' or rough estimates, a purist always wants the genuine/original thing and never tolerates adulteration (impurity/contamination) in it. This is a relationship of principled intolerance. Option elimination: (A) leader : guidance - a leader provides guidance; this is a positive relationship, not one of refusal/opposition. (B) connoisseur : anachronism - a connoisseur (art expert) might notice an anachronism (an inconsistency in time period), but this isn't directly connected as their defining opposite characteristic like with 'purist.' (C) sluggard : indolence - a sluggard (lazy person) likes indolence (laziness); this is a synonym/supportive relationship, not one of refusal. (E) scientist : theorizing - a scientist does theorize; this is part of their work, not something they oppose. Tip: This type of analogy is called 'Character vs. Avoidance' - i.e., a person hates or refuses something specific because of their principles/ideals.","src":"-","vocab":[{"word":"Stickler","meaning":"One who insists on exactness","synonyms":"-"},{"word":"Purist","meaning":"One who insists on purity/correctness","synonyms":"-"},{"word":"Adulteration","meaning":"Contamination of something pure","synonyms":"-"}]},{"id":"ana-C5Q15","q":"SYNONYMOUS : MEANING","opts":{"A":"interchangeable : function","B":"equivocal : interpretation","C":"coincidental : cause","D":"ambidextrous : skill","E":"bilingual : language"},"ans":"A","exp":"Relationship: Identical/Same : Category of Identity. Verification sentence: 'Words that are synonymous have the same meaning,' and similarly, 'Things that are interchangeable have the same function.' Logic: Just as synonymous words express identical meaning, interchangeable things perform the same function. Substituting one for the other causes no change in outcome. This is fundamentally a relationship of 'Functional Equality.' Option elimination: (B) equivocal : interpretation - equivocal means something with multiple possible interpretations; this indicates ambiguity, not sameness. (C) coincidental : cause - something coincidental has no specific cause; this is about randomness, not sameness. (D) ambidextrous : skill - ambidextrous means having the skill to use both hands; this denotes a type of skill, not identity/sameness. (E) bilingual : language - bilingual means knowing two languages; this relates to the count of languages, not sameness. Tip: Whenever 'sameness' or 'identical' is being expressed, look for that same equivalence in the options. This is logically an Equivalence relationship.","src":"-","vocab":[{"word":"Interchangeable","meaning":"Able to be substituted for one another","synonyms":"-"},{"word":"Equivocal","meaning":"Open to multiple interpretations","synonyms":"-"},{"word":"Ambidextrous","meaning":"Able to use both hands equally","synonyms":"-"}]},{"id":"ana-C5Q16","q":"INSIPID : INVENTION","opts":{"A":"ironic : gravity","B":"realistic : originality","C":"generic : artistry","D":"foppish : affection","E":"prosaic : imagination"},"ans":"E","exp":"Relationship: Lack of Quality : Quality. Verification sentence: 'Something that is insipid lacks invention,' and similarly, 'Something that is prosaic lacks imagination.' Logic: Insipid means dull or lacking variety, where there's no invention (new thinking). Similarly, prosaic means dull or commonplace, where there's not a trace of imagination. Both essentially express a lack of creativity. The first word denotes the absence of the second. Option elimination: (A) ironic : gravity - ironic means sarcastic and gravity means seriousness/weight; there's no direct lack-relationship between them. (B) realistic : originality - realistic means true-to-life; this doesn't denote a lack of originality. (C) generic : artistry - generic means common/ordinary, but it expresses being 'common' more than directly expressing a lack of artistry. 'Prosaic' is a much better fit for expressing a lack of 'imagination.' (D) foppish : affection - foppish means a person preoccupied with fashion/style; this has no relationship with affection. Tip: When a negative-sounding adjective relates to a positive noun, understand that this is a 'Lack of' relationship.","src":"BIBM Evening MBM 19th Batch-2010","vocab":[{"word":"Insipid","meaning":"Dull, lacking flavor/character","synonyms":"-"},{"word":"Prosaic","meaning":"Dull, lacking imagination","synonyms":"-"},{"word":"Foppish","meaning":"Excessively concerned with fashion","synonyms":"-"}]},{"id":"ana-C5Q17","q":"STREAM : EDDY","opts":{"A":"trend : anomaly","B":"shove : punch","C":"assault : defeat","D":"force : motion","E":"illness : symptom"},"ans":"A","exp":"Relationship: General Direction : Small Deviation. Verification sentence: 'An eddy is a small current that goes against the main stream,' and similarly, 'An anomaly is a small deviation that goes against the main trend.' Logic: When a river's stream flows in a fixed direction, small eddies sometimes form, disrupting that rhythm. Similarly, when something follows a general trend, an anomaly or exception within it causes a deviation from that general direction. In both, the second is an 'exception' or minor deviation from the first. Option elimination: (B) shove : punch - both are types of striking, but there's no deviation relationship between one and the other. (C) assault : defeat - defeat may result from assault; this is a 'Cause and Effect' relationship, not 'Deviation.' (D) force : motion - applying force creates motion; this is also a cause-and-effect relationship. (E) illness : symptom - a symptom is a sign of illness; this is a 'Sign' relationship. Tip: Keep the 'Generalization vs. Exception' pattern in mind.","src":"-","vocab":[{"word":"Eddy","meaning":"A small circular current","synonyms":"-"},{"word":"Anomaly","meaning":"A deviation from the norm","synonyms":"-"}]},{"id":"ana-C5Q18","q":"PIRATE : TAKE","opts":{"A":"burgle : steal","B":"forget : copy","C":"renege : promise","D":"liberate : free","E":"retreat : withdraw"},"ans":"A","exp":"Relationship: Specific Illegal Action : General Action. Verification sentence: 'To pirate is to take something illegally,' and similarly, 'To burgle is to steal something illegally.' Logic: Take is a general action, but when done through piracy/theft, it's called pirating. Similarly, stealing is a general criminal act, but when done by breaking into someone's house illegally, it's called burgling. The first word is a special 'illegal' or 'more severe illegal' form of the second word. Option elimination: (B) forget : copy - forgetting and copying have no meaningful or legal relationship between them. (C) renege : promise - reneging means failing to keep a promise; this expresses an 'opposite' relationship, not 'Specific-General.' (D) liberate : free - liberate and free are synonyms, but there's no 'illegal' element between them. (E) retreat : withdraw - retreat and withdraw are synonyms, but again no special type of illegal action is expressed here. Tip: When a general verb is given alongside its specific illegal or negative legal form, look for the same pattern in the answer.","src":"-","vocab":[{"word":"Burgle","meaning":"To illegally enter and steal","synonyms":"-"},{"word":"Renege","meaning":"To fail to keep a promise","synonyms":"-"}]}]},{"id":"ana-6","title":"GRE Analogy Test-6","questions":[{"id":"ana-C6Q1","q":"SKELETON : ANIMAL","opts":{"A":"ivory : piano","B":"peel : fruit","C":"ore : mine","D":"mast : ship","E":"farming : building"},"ans":"D","exp":"Relationship: Part-Whole, more specifically a Structural Internal Support relationship. Logic: The relationship here is fundamentally about a 'Core Support Structure.' Just as a skeleton holds together an animal's body's main framework, a mast holds up a ship's sails and helps form its structure. Option elimination: (A) ivory : piano - ivory is used to make piano keys, but ivory isn't the piano's core structure (Skeleton). (B) peel : fruit - peel is the fruit's outer layer (Outer layer), meant for protection, not for structure. (C) ore : mine - ore is found in a mine (Source relation), not structural. (E) farming : building - there's no visible structural relationship between these. Tip: When the original pair denotes something's 'Internal Framework,' look for something in the answer that provides stability or a foundation.","src":"-","vocab":[{"word":"Mast","meaning":"A vertical pole on a ship supporting sails","synonyms":"-"}]},{"id":"ana-C6Q2","q":"OUTSKIRTS : TOWN","opts":{"A":"rung : ladder","B":"trunk : tree","C":"water : goblet","D":"margin : page","E":"hanger : airplane"},"ans":"D","exp":"Relationship: Boundary-Whole. Logic: 'Outskirts' means the boundary or outlying areas at the edge of a town. Similarly, 'Margin' means the bordering area around the edges of a page. Option elimination: (A) rung : ladder - this is a Part-Whole relationship, but it's the inner step of a ladder, not the outer boundary. (B) trunk : tree - the trunk is the tree's main part; it doesn't denote a boundary or edge. (C) water : goblet - this is a 'Content-Container' relationship (the liquid and its holding vessel). (E) hanger : airplane - this is a 'Storage' relationship; a place where a plane is kept is called a hangar. Tip: When the original word pair denotes an 'Outer Edge' or outer boundary, look for something in the answer that denotes the end edge or border of an object.","src":"Pubali Bank Senior Officer-2011, IBA (MBA) Admission: 2001-02","vocab":[{"word":"Outskirts","meaning":"The outer areas of a town","synonyms":"-"},{"word":"Margin","meaning":"The border area of a page","synonyms":"-"}]},{"id":"ana-C6Q3","q":"AMORPHOUSNESS : DEFINITION","opts":{"A":"lassitude : energy","B":"spontaneity : awareness","C":"angularity : intricacy","D":"rectitude : drabness","E":"precision : uniformity"},"ans":"A","exp":"Relationship: Antonym/Lack of relationship. Logic: The question pair expresses an 'absence' (A lacks B). 'Just as amorphousness lacks definition or specificity, lassitude (sluggishness/exhaustion) lacks energy in the body.' 'Lassitude' means exhaustion or weariness, in which there is a lack of 'energy.' Option elimination: (B) spontaneity : awareness - spontaneity has no direct relationship with a lack of awareness; it can even happen subconsciously. (C) angularity : intricacy - angularity has no direct lack-relationship with complexity. (D) rectitude : drabness - moral rectitude has no relationship with dullness. (E) precision : uniformity - precision and uniformity aren't a lack-relationship; in many cases they're complementary. Tip: If the pair contains a word meaning 'deficiency' or 'lack' (such as Amorphousness, Lack, Void), look for a pair in the options where the first word expresses the absence of the second.","src":"-","vocab":[{"word":"Amorphousness","meaning":"Lack of definite form","synonyms":"-"},{"word":"Lassitude","meaning":"Weariness, lack of energy","synonyms":"-"}]},{"id":"ana-C6Q4","q":"COLLUSION : CONSPIRATORS","opts":{"A":"conclusion : messengers","B":"revision : correspondents","C":"identification : Arbitrator's","D":"attribution : interpreters","E":"cooperation : partners"},"ans":"E","exp":"Relationship: Action-Actor, i.e., the relationship between a task and the doer. Logic: When 'Conspirators' carry out some secret or illegal act together, it's called 'Collusion.' Similarly, when 'Partners' work together to achieve a goal, it's called 'Cooperation.' Option elimination: (A) conclusion : messengers - messengers don't 'conclude' anything; they carry messages. (B) revision : correspondents - revision isn't the core task of a correspondent. (C) identification : Arbitrator's - an arbitrator's job is to judge or provide resolution, not merely identify something. (D) attribution : interpreters - interpreters translate; attributing the source of something isn't their main job. Tip: Checking whether words starting with 'C' (e.g., Collusion, Conspiracy, Collaboration, Cooperation) are used in a positive or negative sense makes finding the answer easier.","src":"-","vocab":[{"word":"Collusion","meaning":"Secret cooperation for deceitful purposes","synonyms":"-"},{"word":"Conspirators","meaning":"People who conspire together","synonyms":"-"}]},{"id":"ana-C6Q5","q":"DIVERT : SHUNT","opts":{"A":"file : collate","B":"collide : dent","C":"guess : calibrate","D":"retard : brake","E":"inspect : magnify"},"ans":"D","exp":"Relationship: Synonym, where the second word denotes a mechanical or specific method of the first. Logic: One means of diverting is shunting, just as one means of reducing speed is braking. 'Divert' means to change direction, and the specific method of changing a railway track's direction is called 'Shunt.' Similarly, 'Retard' means to slow down or decelerate, and 'Brake' is the specific method or device for reducing speed. Option elimination: (A) file : collate - filing and collating, though related, aren't a mechanical relationship like deceleration or direction-change. (B) collide : dent - colliding causes a dent; this is a Cause-Effect relationship. (C) guess : calibrate - guessing and precisely calibrating are opposite types of action. (E) inspect : magnify - magnifying something doesn't always mean inspecting it; it may only assist. Tip: When two words both mean 'removing' or 'stopping,' matching their field of application (e.g., mechanical or technical field) makes finding the correct answer easier.","src":"-","vocab":[{"word":"Shunt","meaning":"To divert onto a side track","synonyms":"-"},{"word":"Retard","meaning":"To slow down","synonyms":"-"}]},{"id":"ana-C6Q6","q":"EQUIVOCATE : COMMITMENT","opts":{"A":"procrastinate : action","B":"implicate : exposition","C":"expostulate : confusion","D":"corroborate : falsification","E":"fabricate : explanation"},"ans":"A","exp":"Relationship: Avoidance relationship. Logic: 'Just as people equivocate (speak vaguely) to avoid commitment, they procrastinate to avoid action.' 'Equivocate' means to speak ambiguously in order to avoid a 'Commitment' (obligation or responsibility). Similarly, 'Procrastinate' means to delay or be lazy, through which an 'Action' (task) is avoided or postponed. Option elimination: (B) implicate : exposition - implicating someone in an event and explaining have no avoidance relationship. (C) expostulate : confusion - protesting and confusion have no direct avoidance-type relationship. (D) corroborate : falsification - this could be oppositional, but it isn't a 'methodological' relationship like avoiding commitment. (E) fabricate : explanation - fabricating falsehoods and explanation have no strong analogy link.","src":"-","vocab":[{"word":"Equivocate","meaning":"To speak ambiguously to avoid commitment","synonyms":"-"},{"word":"Procrastinate","meaning":"To delay doing something","synonyms":"-"}]},{"id":"ana-C6Q7","q":"ARMADA : VEHICLES","opts":{"A":"drill : recruits","B":"planning : logistics","C":"infantry : cavalry","D":"fusillade : projectiles","E":"supply : munitions"},"ans":"D","exp":"Relationship: Group-Member, a collective relationship. Logic: 'Just as an Armada (naval fleet) is formed from many warships or Vehicles, a Fusillade is formed from many Projectiles or bullets fired together.' The unit of a naval fleet is the ship, just as the unit of a fusillade (volley of gunfire) is the projectile. Option elimination: (A) drill : recruits - this is a training-and-trainee relationship, not a collective relationship. (B) planning : logistics - planning and supply logistics may be causally connected, but this doesn't directly indicate a collective. (C) infantry : cavalry - both are separate branches of an army (opposite or parallel), one isn't the collective of the other. (E) supply : munitions - supply and munitions show a task-and-object relationship, but not a collective. Tip: Words like 'Armada,' 'Fleet,' 'Flotilla' are generally used to denote a large collective; in the options, always look for something that denotes many things 'coming together.'","src":"-","vocab":[{"word":"Armada","meaning":"A fleet of warships","synonyms":"-"},{"word":"Fusillade","meaning":"A rapid simultaneous discharge of firearms","synonyms":"-"}]},{"id":"ana-C6Q8","q":"LACONIC : SPEECH","opts":{"A":"believable : excuse","B":"unyielding : attitude","C":"austere : design","D":"somber : projectiles","E":"supply : munitions"},"ans":"C","exp":"Relationship: Characteristic relationship. Logic: 'Just as a brief speech free of unnecessary words is called Laconic Speech, a plain design free of unnecessary ornamentation is called Austere Design.' Here, the first word expresses a 'Minimalist' or brief, non-redundant form of the second word. That is, speaking little makes speech laconic, and a design with little or plain ornamentation makes it austere. Option elimination: (A) believable : excuse - a believable excuse may be a characteristic, but it doesn't denote 'brevity' or 'lack of excess.' (B) unyielding : attitude - an unyielding attitude is a stubborn or rigid characteristic, but it has no relationship with 'minimalism.' (D) somber : projectiles - somber (gloomy) and projectiles have no logical relationship. (E) supply : munitions - this is an 'Action-Object' relationship. Tip: In characteristic-based analogies, paying attention to the 'Tone' (positive/negative/concise) of the words is essential.","src":"-","vocab":[{"word":"Laconic","meaning":"Using very few words","synonyms":"-"},{"word":"Austere","meaning":"Severely simple, without ornamentation","synonyms":"-"}]},{"id":"ana-C6Q9","q":"GROW : BURGEON","opts":{"A":"beat : palpitate","B":"transport : enrapture","C":"flourish : thrive","D":"rot : decay","E":"evolve : multiply"},"ans":"A","exp":"Relationship: Degree of Intensity. Logic: Just as 'Burgeon' is an intense or more rapid state of 'Grow,' 'Palpitate' is an intense or more rapid state of 'Beat.' Here, a normal state versus an extreme state (Normal vs. Extreme) is being expressed. 'Beat' means a normal pulse, and 'Palpitate' means an abnormally rapid pulse. Option elimination: (C) flourish : thrive - these two words are synonymous, with no difference in intensity here. (D) rot : decay - these two words are also nearly synonymous, expressing no extreme form. (E) evolve : multiply - evolution and multiplication are words for different processes. Note: Grow and Burgeon are both related to organic growth; Beat and Palpitate are both related to the heart's biological action. Transport : Enrapture doesn't fit because it's a purely emotional pair, while the original question is about physical or natural growth. Tip: In analogy, when both words are positive or both negative, checking whether there's 'intensity' (Intensity) between them is essential.","src":"-","vocab":[{"word":"Burgeon","meaning":"To grow/flourish rapidly","synonyms":"-"},{"word":"Palpitate","meaning":"To beat rapidly/irregularly (heart)","synonyms":"-"}]},{"id":"ana-C6Q10","q":"GADGETS : TOOLS","opts":{"A":"blankets : linen","B":"leaflets : posters","C":"trinkets : jewelry","D":"sockets : bulbs","E":"ringlets : hair"},"ans":"C","exp":"Relationship: Specific-General, i.e., 'a small/lesser version versus the main form within the same category.' Logic: 'Just as a small device is called a Gadget (a small form of Tools), a small or cheap ornament is called a Trinket (a small form of Jewelry).' The first word denotes a small, specialized, or sometimes less significant version of the second. Option elimination: (A) blankets : linen - blankets and linen (fabric) may be related materials, but this isn't a Gadget-Tool type categorization. (B) leaflets : posters - both are means of publicity, but one isn't a smaller version or subcategory of the other. (D) sockets : bulbs - this is a 'Complementary' relationship (one is used with the other). (E) ringlets : hair - this is a 'Part-Whole' relationship (ringlets are made of hair). Tip: When the original pair denotes a 'Type of' relationship, check in the options which item falls under which, or in which category. Both 'Trinket' and 'Gadget' are small or miscellaneous versions of their main category.","src":"-","vocab":[{"word":"Trinket","meaning":"A small/cheap ornament","synonyms":"-"}]},{"id":"ana-C6Q11","q":"LISTEN : RECORDING","opts":{"A":"crave : statue","B":"reproduce : plan","C":"review : book","D":"frame : painting","E":"view : photograph"},"ans":"E","exp":"Relationship: Action-Object. Logic: 'Just as we listen to a recording with our ears, we view a photograph with our eyes.' The act of hearing a 'Recording' is called 'Listen.' Similarly, the act of seeing a 'Photograph' is called 'View.' That is, enjoying a particular medium through a particular sense (ear/eye). Option elimination: (A) crave : statue - craving a statue has no logical or regular relationship. (B) reproduce : plan - a plan can be reproduced, but this isn't a natural sense-based action like listening. (C) review : book - we review or critique a book, but the act of reading isn't called 'Review.' (D) frame : painting - this is a 'Border-Object' relationship; framing a picture isn't directly connected to viewing it. Tip: If a sense-related action is given (e.g., Listen, Smell, Taste), looking for another sense-related action (e.g., View, Touch) in the answer is a wise approach.","src":"Premier Bank Ltd.-2012; Bangladesh Bank-2006","vocab":[{"word":"View","meaning":"To look at/observe","synonyms":"-"}]},{"id":"ana-C6Q12","q":"CENSORSHIP : INFORMATION","opts":{"A":"frugality : constraint","B":"sampling : measurement","C":"sanitation : disease","D":"cultivation : erosion","E":"philanthropy : generosity"},"ans":"C","exp":"Relationship: Prevention/Control relationship. Logic: 'Just as Censorship prevents the spread of unnecessary or harmful Information, Sanitation prevents the spread of harmful Disease.' The first word is a process that reduces or completely stops the negative effect or spread of the second word. Information control means censorship, and disease control means sanitation. Option elimination: (A) frugality : constraint - frugality and constraint carry similar meanings, but neither suppresses the other. (B) sampling : measurement - sampling is merely a part or method of measurement, with no preventive element. (D) cultivation : erosion - cultivation often reduces (rather than increases) erosion (e.g., by planting trees), but this isn't a directly 'controlling' institutional arrangement like censorship. (E) philanthropy : generosity - philanthropy and generosity are synonyms. Tip: 'Censorship' functions as a process of removing something negative. Look for a pair in the options where the first 'checks' or 'stops' the second.","src":"-","vocab":[{"word":"Sanitation","meaning":"Conditions/practices for public health and hygiene","synonyms":"-"}]},{"id":"ana-C6Q13","q":"DELUGE : DROPLET","opts":{"A":"beach : wave","B":"desert : oasis","C":"blizzard : icicle","D":"landslide : pebble","E":"cloudburst : puddle"},"ans":"D","exp":"Relationship: Massive-Tiny, i.e., a relationship between something huge and something extremely tiny. Logic: 'Just as countless tiny Droplets combine to create a huge Deluge (flood), countless Pebbles combine to create a Landslide.' 'Deluge' means a great flood, formed from the collective accumulation of countless 'Droplets.' Similarly, 'Landslide' means a collapse of earth, occurring from the massive collective force of countless 'Pebbles' or soil particles. Option elimination: (A) beach : wave - the relationship between beach and wave is 'location-object,' not a relationship of the smallest unit. (B) desert : oasis - water exists at an oasis; this is a relationship of opposite or rare elements. (C) blizzard : icicle - a blizzard happens through snowfall, not through hanging icicles. (E) cloudburst : puddle - a puddle may form from a cloudburst (sudden heavy rain), but it isn't its smallest unit. Tip: When a huge natural disaster (e.g., Flood, Storm) is given, check whether another option has a disaster and its component unit (e.g., Pebble, Snowflake, Spark).","src":"-","vocab":[{"word":"Deluge","meaning":"A great flood","synonyms":"-"},{"word":"Droplet","meaning":"A tiny drop","synonyms":"-"}]},{"id":"ana-C6Q14","q":"SPEAK : RETICENT","opts":{"A":"spend : parsimonious","B":"excel : audacious","C":"commend : irate","D":"work : servile","E":"invent : diffident"},"ans":"A","exp":"Relationship: Action vs. Reluctance, i.e., an action and a person's reluctance to do that action. Logic: A 'Reticent' (taciturn/quiet) person doesn't want to easily 'Speak.' Similarly, a 'Parsimonious' (excessively stingy/cost-averse) person doesn't want to easily 'Spend' money. Being restrained in speech is reticent, and being restrained in spending is parsimonious. Option elimination: (B) excel : audacious - being audacious may help someone excel, but this isn't a reluctance relationship. (C) commend : irate - praising and becoming angry have no direct 'action-reluctance' relationship. (D) work : servile - a servile (subservient) person works, but this doesn't denote reluctance to do that work. (E) invent : diffident - a person lacking confidence may be hesitant about inventing something new, but this isn't as regular and direct a characteristic opposition as spending or speaking is.","src":"-","vocab":[{"word":"Reticent","meaning":"Reluctant to speak, reserved","synonyms":"-"},{"word":"Parsimonious","meaning":"Excessively frugal/stingy","synonyms":"-"}]},{"id":"ana-C6Q15","q":"PATRIOTIC : CHAUVINISTIC","opts":{"A":"impudent : intolerant","B":"furtive : surreptitious","C":"incisive : trenchant","D":"receptive : gullible","E":"verbose : prolix"},"ans":"D","exp":"Relationship: Positive vs. Negative Extreme. Verification sentence: 'Just as the extreme or negative form of Patriotic (patriotism) is Chauvinistic, the extreme or negative form of Receptive (open-mindedness) is Gullible.' Logic: 'Patriotic' is a positive quality, but when this patriotism takes an extreme or blind form, it's called 'Chauvinistic' (extreme nationalist). Similarly, being 'Receptive' (open-minded or flexible) is a good quality, but when someone is excessively receptive and believes everything too easily, they're called 'Gullible' (overly credulous or foolish). Here, the first word is a moderate, good quality, and the second is an excessive or blind form of that same quality regarded as negative. Tip: When an analogy expresses the 'excessive or blind' (Blind/Excessive) form of a quality, look for a pair in the answer where the first is good but the second is its excess.","src":"-","vocab":[{"word":"Chauvinistic","meaning":"Excessively/blindly patriotic","synonyms":"-"},{"word":"Gullible","meaning":"Easily deceived","synonyms":"-"}]},{"id":"ana-C6Q16","q":"BOUQUET : FLOWERS","opts":{"A":"forest : trees","B":"husk : corn","C":"mist : rain","D":"woodpile : logs","E":"drift : snow"},"ans":"D","exp":"Relationship: Group-Member, an arranged collective relationship. Logic: When many 'Flowers' are carefully arranged together, it's called a 'Bouquet.' Similarly, when many 'Logs' are stacked together in a pile, it's called a 'Woodpile.' Here, the relationship isn't merely a collection of many things, but specifically denotes things 'arranged for a purpose' (an arranged stack). Option elimination: (A) forest : trees - this is also a collective, but a forest forms naturally, unlike a bouquet or pile which is specifically arranged/stacked. (B) husk : corn - this is an 'Outer layer-Internal part' relationship (husk and kernel). (C) mist : rain - mist and rain are both forms of water, but one isn't an arranged collective of the other. (E) drift : snow - this is indeed a snow pile, but it forms naturally due to wind, not stacked by humans. Tip: When something denotes a collective, checking whether it's 'Natural' or a 'Man-made arrangement' makes finding the correct answer easier.","src":"BIBM-Evening MBM 19th Batch-2010; IBA-BBA Admission Test: 2003-04","vocab":[{"word":"Woodpile","meaning":"A stacked pile of logs","synonyms":"-"}]},{"id":"ana-C6Q17","q":"ENDEMIC : REGION","opts":{"A":"homogeneous : population","B":"inborn : individual","C":"hybrid : species","D":"aberrant : norm","E":"sporadic : time"},"ans":"B","exp":"Relationship: Inherent-Entity, i.e., 'the inherent or innate characteristic of something.' Logic: 'Endemic' refers to a disease or characteristic confined to or innate within a specific 'Region.' Similarly, 'Inborn' refers to a characteristic that has existed innately in an 'Individual' since birth. The relationship here is 'something naturally present within a specific boundary.' Option elimination: (A) homogeneous : population - homogeneous population is a description, but not as deep a relationship as 'innately present.' (C) hybrid : species - hybrid is a mixture of two different species, not something innate within one. (D) aberrant : norm - aberrant means deviation from the norm, which is the opposite of an 'innate' relationship. (E) sporadic : time - sporadic denotes an irregular state in time.","src":"-","vocab":[{"word":"Endemic","meaning":"Native/confined to a particular region","synonyms":"-"},{"word":"Inborn","meaning":"Present from birth, innate","synonyms":"-"}]},{"id":"ana-C6Q18","q":"PECCADILLO : SIN","opts":{"A":"provocation : instigation","B":"anxiety : fear","C":"perjury : corruption","D":"penury : poverty","E":"admonishment : castigation"},"ans":"E","exp":"Relationship: Minor vs. Severe. Verification sentence: 'Just as a small or minor sin is called a Peccadillo, a mild reprimand or warning is called an Admonishment.' Logic: The relationship here is one of intensity. The first word is much less severe or lighter compared to the second. 'Peccadillo' means a small or minor fault, an extremely trivial form of 'Sin.' Similarly, 'Admonishment' means a mild warning or light reprimand, a mild form of 'Castigation' (harsh punishment or severe rebuke). Option elimination: (A) provocation : instigation - provocation and incitement are nearly synonymous, with no significant difference in intensity here. (B) anxiety : fear - anxiety and fear may complement each other, but this isn't a direct mild-to-severe proportion. (C) perjury : corruption - giving false testimony may be part of corruption, but this isn't a small-to-large relationship. (D) penury : poverty - penury itself means extreme poverty; here the first word is actually stronger or more intense, the opposite of what's needed. Tip: When the analogy involves a minor offense versus a major offense (Misdemeanor vs. Felony), look for a similarly mild-versus-severe action in the answer.","src":"-","vocab":[{"word":"Peccadillo","meaning":"A minor sin/fault","synonyms":"-"},{"word":"Castigation","meaning":"Severe criticism/punishment","synonyms":"-"},{"word":"Penury","meaning":"Extreme poverty","synonyms":"-"}]}]},{"id":"ana-7","title":"GRE Analogy Test-7","questions":[{"id":"ana-C7Q1","q":"SCALPEL : SURGEON","opts":{"A":"laser : agronomist","B":"magnet : ecologist","C":"syringe : geologist","D":"telescope : astronomer","E":"microscope : geometrician"},"ans":"D","exp":"Relationship: Tool : Professional. Logic: Just as a surgeon cannot operate without a scalpel, an astronomer cannot observe space without a telescope. A scalpel is a special surgical knife used in operations. Option elimination: (A) laser : agronomist - lasers are used in various fields, but it isn't the primary tool of an agronomist. (B) magnet : ecologist - a magnet isn't the primary tool of an ecologist, whose work centers on nature and biodiversity. (C) syringe : geologist - a syringe is used in medicine; it has no role in a geologist's research into rocks. (E) microscope : geometrician - a microscope is mainly used by biologists or doctors; it's irrelevant for a geometrician's work. Tip: When a profession and its tool are given, check whether that tool is 'iconic' or essential to that profession.","src":"-","vocab":[{"word":"Scalpel","meaning":"A surgical knife","synonyms":"-"},{"word":"Agronomist","meaning":"A specialist in soil/crop science","synonyms":"-"}]},{"id":"ana-C7Q2","q":"APPLE : FRUIT","opts":{"A":"egg : chicken","B":"rung : chair","C":"wool : fabric","D":"fuse : dynamic","E":"wick : candle"},"ans":"C","exp":"Relationship analysis: Apple is a type of Fruit. That is, the relationship is 'A is a type of B.' Option elimination: (A) egg : chicken - a chicken comes from an egg, but an egg isn't a 'type' of chicken. (Wrong) (B) rung : chair - a rung (ladder step) is part of a ladder, but it isn't a 'type' of chair. (Wrong) (C) wool : fabric - wool is one type of fabric. This exactly follows the original pair's 'Type of' relationship. (Correct) (D) fuse : dynamic - there's no direct categorical relationship between these. (Wrong) (E) wick : candle - a wick is only one part of a candle, not a type. (Wrong) Therefore, just as an apple is an example of a fruit, wool is also an example of fabric. Tip: In bank job analogy questions, sometimes a question seems very simple but contains subtle logic. 'Apple : Fruit' is a 'Class-Member' relationship.","src":"Bangladesh Bank-2006","vocab":[{"word":"Wool","meaning":"Fiber from sheep used for fabric","synonyms":"-"},{"word":"Fabric","meaning":"Cloth material","synonyms":"-"}]},{"id":"ana-C7Q3","q":"ENVELOPE : LETTER","opts":{"A":"scarf : hat","B":"box : bag","C":"crate : produce","D":"neck : head","E":"blood : heart"},"ans":"C","exp":"Relationship: Container : Content. Logic: Just as a letter sits inside an envelope, agricultural goods or vegetables (Produce) are kept inside a crate (a wooden case). Both are containers related to commerce or transport. Verification sentence: 'An envelope is used to hold and carry a letter,' and similarly, 'A crate is used to hold and carry produce.' Option elimination: (A) scarf : hat - both scarf and hat are wearable items, but one doesn't hold the other. (B) box : bag - both box and bag are containers, but there's no holder-and-held relationship between them specifically. (D) neck : head - the head sits above the neck, but the neck doesn't hold the head 'inside' it. (E) blood : heart - the heart pumps or holds blood, but here the order given is reversed (Content : Container). Tip: When a 'Container : Content' relationship exists, check whether the contained object is placed there for a specific purpose (such as transport or protection).","src":"Bangladesh Bank-2006","vocab":[{"word":"Crate","meaning":"A wooden case for transporting goods","synonyms":"-"},{"word":"Produce","meaning":"Agricultural goods","synonyms":"-"}]},{"id":"ana-C7Q4","q":"PANEGYRIC : EULOGIZE","opts":{"A":"ballad : stigmatize","B":"ode : criticize","C":"lampoon : satirize","D":"tirade : entertain","E":"treatise : dispute"},"ans":"C","exp":"Relationship: Noun : Related Verb. Logic: A panegyric is an essay or speech written in praise of someone, whose purpose is to praise or extol (Eulogize). The first word is a literary work or genre, and the second is that genre's main action or purpose. Similarly, a lampoon is a satirical piece written to criticize a person or institution, whose main purpose is to mock or satirize (Satirize). Verification sentence: 'The purpose of a panegyric is to eulogize someone,' and similarly, 'The purpose of a lampoon is to satirize someone.' Option elimination: (A) ballad : stigmatize - a ballad is a song or poem; stigmatize (to label/disgrace) has no direct functional relationship with it. (B) ode : criticize - an ode is a praise-poem, whose purpose is to praise, not to criticize. (D) tirade : entertain - a tirade is an attacking speech, not given to entertain someone. (E) treatise : dispute - a treatise explains a subject in detail; it isn't a specific literary medium used directly for disputing. Tip: Literary terms appear often in this type of analogy. Check whether the first word means 'work' or 'type of work.' Here the first is a noun and the second is the verb of that work.","src":"-","vocab":[{"word":"Panegyric","meaning":"A speech/writing in praise of someone","synonyms":"-"},{"word":"Lampoon","meaning":"A satirical attack in writing","synonyms":"-"},{"word":"Tirade","meaning":"A long angry speech of criticism","synonyms":"-"}]},{"id":"ana-C7Q5","q":"OVERDOSE : PRESCRIPTION","opts":{"A":"deprivation : materialism","B":"indiscretion : convention","C":"affliction : sympathy","D":"adventure : sympathy","E":"drug : medicine"},"ans":"B","exp":"Relationship: Violation : Rule/Boundaries. Logic: Just as violating the limits or rules set by a doctor (Prescription) creates a physical risk (Overdose), violating the rules of etiquette or custom (Convention) that society expects people to follow is called indiscreet or imprudent behavior (Indiscretion). In both, the first denotes exceeding the boundary set by the second. Verification: 'An overdose is a violation of prescription,' and similarly, 'An indiscretion is a violation of social convention or standards.' Option elimination: (A) deprivation : materialism - deprivation and materialism may be opposite, but this doesn't express any 'rule-violation' relationship. (C) and (D) affliction/adventure : sympathy - sympathy isn't a rule or boundary that can be violated. (E) drug : medicine - drug and medicine are nearly synonymous or one is the source of the other, but there's no boundary-crossing logic here. Tip: When a negative action relates to a 'guideline' or 'norm,' understand this is a question about Boundaries. Just as Prescription is medicine's boundary, Convention is behavior's boundary.","src":"-","vocab":[{"word":"Indiscretion","meaning":"Lack of good judgment in behavior","synonyms":"-"},{"word":"Convention","meaning":"An accepted social custom/norm","synonyms":"-"}]},{"id":"ana-C7Q6","q":"FRESCO : WALL","opts":{"A":"fountain : courtyard","B":"parquetry : floor","C":"thatch : roof","D":"statuary : passage","E":"gargoyle : gutter"},"ans":"B","exp":"Relationship: Artistic Decoration : Surface. Logic: A fresco is a kind of special painting or plaster artwork made on a wall. Just as a fresco is an art form created to decorate a wall, parquetry is the geometric woodwork design used to enhance a floor's beauty. Both are decorative work. Verification: 'A fresco is a decorative artwork on wall,' and similarly, 'Parquetry is a decorative woodwork on floor.' Option elimination: (A) fountain : courtyard - a fountain may sit in a courtyard, but it isn't a decorative painting or permanent craft applied onto the courtyard's surface. (C) thatch : roof - thatch is a material of the roof, not an artistic decoration; rather it's an essential structural element. (D) statuary : passage - a statue may sit in a passage, but it isn't an inseparable surface decoration like a fresco. (E) gargoyle : gutter - a gargoyle sits at a drain or gutter's mouth; it isn't a decorative craft applied onto a surface. Tip: Remember some common pairs about 'Surface Decoration': Fresco : Wall, Mosaic : Surface, Parquetry : Floor, and Embroidery : Cloth.","src":"-","vocab":[{"word":"Fresco","meaning":"A painting done on wet plaster","synonyms":"-"},{"word":"Parquetry","meaning":"Geometric woodwork flooring","synonyms":"-"},{"word":"Gargoyle","meaning":"A carved grotesque figure on a building","synonyms":"-"}]},{"id":"ana-C7Q7","q":"HAMMER : ANVIL","opts":{"A":"knocker : door","B":"stick : gong","C":"hand : drum","D":"pestle : mortar","E":"gavel : lectern"},"ans":"D","exp":"Relationship: Matching Pair of Tools. The first is a tool for striking, and the second is the base against which the striking happens. Logic: Just as a hammer and anvil work as an inseparable pair in a blacksmith's shop, a pestle and mortar work as a pair for grinding something in a kitchen. When striking an object with a hammer, the heavy iron base or surface placed beneath it is called an anvil (a heavy block of iron). Option elimination: (A) knocker : door - a door knocker may be part of a door, but it isn't a mechanical pair for a specific craft or task like hammer-anvil. (B) stick : gong - a stick is used to strike a gong, but this is a musical instrument, not a tool for shaping or crushing something. (C) hand : drum - hands are used to play a drum, but a hand isn't an artificial Tool. (E) gavel : lectern - a judge's gavel is generally used to strike a desk, but a lectern is mainly for giving speeches; it's the gavel's 'Matching Base' in a different sense. Tip: When two tools are given, check what type of work they do and whether they're mutually complementary.","src":"-","vocab":[{"word":"Anvil","meaning":"A heavy iron block for hammering metal","synonyms":"-"},{"word":"Pestle","meaning":"A grinding tool used with a mortar","synonyms":"-"},{"word":"Mortar","meaning":"A bowl for grinding with a pestle","synonyms":"-"}]},{"id":"ana-C7Q8","q":"RELEVANT : CRUCIAL","opts":{"A":"marginal : unique","B":"perceptible : obvious","C":"apparent : real","D":"peripheral : central","E":"possible : desirable"},"ans":"B","exp":"Relationship: Degree of Intensity. Logic: Something being relevant means it's important, but when it becomes extremely important or essential, it's called crucial. Similarly, 'Perceptible' means something that can be sensed or noticed in some way (perceivable). And 'Obvious' means something as clear as daylight and easily caught by the eye. Here, the relationship denotes going from 'relevant to extremely important,' or an increasing degree of intensity. Option elimination: (A) marginal : unique - marginal means insignificant and unique means distinctive; there's no intensity gradation between these. (C) apparent : real - apparent means something that seems so on the surface (but may not be) and real means actual. This falls along the true-false axis, not intensity. (D) peripheral : central - peripheral means less important/edge-related and central means core; these are essentially antonyms. (E) possible : desirable - possible means feasible and desirable means wanted; one's intensity doesn't express the other. Tip: Common intensity-based analogies include Warm : Hot, Bright : Blinding, or Relevant : Crucial. In these cases, remember that both words point in the same direction, but the second is much more powerful.","src":"One Bank-2012; Bangladesh Bank-2006; IBA MBA Admission Test 2001-02","vocab":[{"word":"Perceptible","meaning":"Able to be perceived/sensed","synonyms":"-"},{"word":"Obvious","meaning":"Clearly apparent","synonyms":"-"}]},{"id":"ana-C7Q9","q":"PERFUNCTORILY : INSPIRATION","opts":{"A":"insolently : veneration","B":"ardently : passion","C":"phlegmatically : composure","D":"surreptitiously : obsession","E":"haltingly : reluctance"},"ans":"A","exp":"Relationship: Lack of Quality. Logic: PERFUNCTORILY means doing a routine task without any interest, where there's no creative Inspiration. Similarly, behaving Insolently or arrogantly means there isn't a trace of respect or Veneration there. Verification: 'To do something perfunctorily is to do it without any inspiration,' and similarly, 'To act insolently is to act without any veneration.' Option elimination: (B) ardently : passion - this is a synonym relationship. Working with great enthusiasm means there's passion present there. (C) phlegmatically : composure - this is also a synonym relationship. Being emotionless or calm means maintaining mental composure. (D) surreptitiously : obsession - doing something secretly has no direct lack-relationship with obsession. (E) haltingly : reluctance - doing something haltingly (stopping and starting) means there's reluctance present there. This too is nearly a synonym relationship. Tip: The 'Lack of' relationship appears often in bank and BCS exam analogies. For solving this type of abstract analogy, thinking in terms of the words' antonym meanings makes finding the answer easier.","src":"-","vocab":[{"word":"Perfunctorily","meaning":"Done without interest/care, routinely","synonyms":"-"},{"word":"Veneration","meaning":"Deep respect/reverence","synonyms":"-"}]},{"id":"ana-C7Q10","q":"ADULT : CHILD","opts":{"A":"horse : mare","B":"human : animal","C":"swine : sow","D":"cat : kitten","E":"cow : herd"},"ans":"D","exp":"Relationship analysis: The relationship between Adult and Child is 'an animal and its young version.' Option elimination: (A) horse : mare - the relationship between horse and mare is male and female gender. (Wrong) (B) human : animal - humans belong within the animal kingdom, but this isn't an age-based relationship. (Wrong) (C) swine : sow - the relationship between swine and sow is male and female gender. (Wrong) (D) cat : kitten - in adulthood it's called a Cat, and its baby is called a Kitten. This exactly matches the original question's adult-and-child relationship. (Correct) (E) cow : herd - a group of cows is called a herd; this is a collective relationship. (Wrong) Therefore, as adult versus young/offspring, cat : kitten is the correct pair.","src":"-","vocab":[{"word":"Kitten","meaning":"A baby cat","synonyms":"-"}]},{"id":"ana-C7Q11","q":"CLOT : DISSOLVED","opts":{"A":"enthusiast : influenced","B":"cartoon : distorted","C":"crowd : dispersed","D":"chain : disengaged","E":"disciple : inspired"},"ans":"C","exp":"Relationship: Entity : Action of Breaking Up. Logic: A Clot is a clumped mass of blood or another substance. When this clumped state breaks apart or dissolves, it's called Dissolved. Similarly, when a Crowd of people disperses, it's called Dispersed. Both are excellent examples of going from 'a gathered state' to 'scattering apart.' Option elimination: (A) enthusiast : influenced - an enthusiast may be influenced, but this isn't a physical or mechanical concept of 'breaking from a clumped state.' (B) cartoon : distorted - cartoons are generally distorted, but this isn't a relationship of going from a coherent state to scattering. (D) chain : disengaged - a chain or link may become disconnected, but a chain isn't a 'clumped mass' (Mass); it's a linear structure. (E) disciple : inspired - a disciple becomes inspired; this is a mental state, not a structural change. Tip: When a physical state change of a substance is given, look for the same kind of structural change in the answer.","src":"-","vocab":[{"word":"Dispersed","meaning":"Scattered in different directions","synonyms":"-"}]},{"id":"ana-C7Q12","q":"GLOSSARY : TEXT","opts":{"A":"bibliography : source","B":"abstract : dissertation","C":"legend : map","D":"index : catalog","E":"abbreviation : footnote"},"ans":"C","exp":"Relationship: Explanatory Key : Main Body. Logic: When reading a text and encountering an unknown word, we look it up in the glossary to understand its meaning. Similarly, when looking at a map, to understand what various symbols mean, we need the help of a legend or key. In both, the first helps decode the second. Verification: 'A glossary is used to explain the specialized terms within a text,' and similarly, 'A legend is used to explain the symbols within a map.' Option elimination: (A) bibliography : source - a bibliography has a list of sources, but it isn't a guide explaining 'symbols' or 'words' like the text. (B) abstract : dissertation - an abstract is a summary of a research paper; it's a smaller form of the whole work, not an explanatory 'Key.' (D) index : catalog - index and catalog are nearly synonymous types of lists; there's no 'explanation-providing' relationship between them. (E) abbreviation : footnote - abbreviations and footnotes may be parts of a book, but there's no direct mechanical relationship of 'guide versus main subject' between them. Tip: When a part of a book or document is given, think about what its function is. Glossary-Text and Legend-Map - both pairs function as 'explanatory aids to information.'","src":"Begum Rokeya University (B Unit) 2013-14","vocab":[{"word":"Legend","meaning":"A key explaining map symbols","synonyms":"-"}]},{"id":"ana-C7Q13","q":"FERVOR : ZEALOT","opts":{"A":"antipathy : philanthropist","B":"improvidence : spendthrift","C":"concision : politician","D":"determination : ecology","E":"nonchalance : acrobat"},"ans":"B","exp":"Relationship: Defining Characteristic : Person. Logic: Just as a zealot (a fanatic or zealous person) always works with intense passion or zeal (Fervor), a spendthrift (a person who wastes money) is defined by their improvidence, or lack of foresight regarding savings. That is, the first word expresses the second person's essential character. Verification: 'Fervor is the defining characteristic of a zealot,' and similarly, 'Improvidence is the defining characteristic of a spendthrift.' Option elimination: (A) antipathy : philanthropist - a philanthropist's defining trait is love for people, not antipathy (aversion). This is an opposite relationship. (C) concision : politician - a politician's characteristic is usually talkativeness or verbosity, not concision (brevity). (D) determination : ecology - determination might be a person's characteristic, but ecology isn't a person; it's a branch of science. (E) nonchalance : acrobat - an acrobat must stay very alert; indifference (nonchalance) cannot be their characteristic. Tip: When a characteristic quality relates to a person, pay attention to whether the word is negative or positive.","src":"-","vocab":[{"word":"Zealot","meaning":"A fanatically committed person","synonyms":"-"},{"word":"Improvidence","meaning":"Lack of foresight/thrift","synonyms":"-"}]},{"id":"ana-C7Q14","q":"SHARD : POTTERY","opts":{"A":"flint : stone","B":"flange : wheel","C":"cinder : coal","D":"fragment : bone","E":"tare : grain"},"ans":"D","exp":"Relationship: Specific Fragment : Original Whole Object. Logic: When a pot or clay vessel breaks, the sharp piece that comes off is specifically called a 'Shard.' Similarly, when a bone breaks, the small piece is called a 'Fragment.' In both, the first is a broken remnant of the second. Verification: 'A shard is a broken piece of pottery,' and similarly, 'A fragment is a broken piece of bone.' Option elimination: (A) flint : stone - flint is a type of stone, not a broken piece of stone, but rather a category. (B) flange : wheel - a flange is the projecting edge or rim of a wheel; it isn't a broken piece, but a structural part. (C) cinder : coal - cinder is what's left after coal burns; this is a result of chemical change, not mechanical breakage. (E) tare : grain - tare is weeds mixed in with grain, or the weight of the container; it has no relationship with a broken piece. Tip: When something relates to 'breakage,' check whether the word is specific. For example, 'Shard' is heavily used for glass or clay pottery, and 'Fragment' for bone or stone.","src":"Pubali Bank Ltd Officer/JO(Cash)-2014","vocab":[{"word":"Shard","meaning":"A sharp broken piece of pottery/glass","synonyms":"-"},{"word":"Fragment","meaning":"A small broken piece","synonyms":"-"},{"word":"Tare","meaning":"Weeds mixed with grain","synonyms":"-"}]},{"id":"ana-C7Q15","q":"FERTILIZE : GROW","opts":{"A":"immunize : resist","B":"nourish : enrich","C":"heat : burn","D":"graft : multiply","E":"prune : dwarf"},"ans":"A","exp":"Relationship: Cause : Intended Result. Logic: Just as fertilizing's main goal is to accelerate growth, immunizing or vaccinating's main goal is to build the body's disease-resistance capacity (Resist). Both pairs are scientific or natural processes undertaken to achieve a specific positive result. Verification: 'One fertilizes a plant to make it grow,' and similarly, 'One immunizes a person to make them resist disease.' Option elimination: (B) nourish : enrich - feeding nourishes the body, but 'Enrich' is generally used more for increasing quantity or wealth. This isn't a directly required physical growth result like 'Fertilize-Grow.' (C) heat : burn - heating can burn something, but this isn't a desirable or positive purpose; rather it could be an accidental outcome. (D) graft : multiply - grafting means creating a new sapling, but this is done more for qualitative change than directly for multiplying numbers. (E) prune : dwarf - pruning keeps a plant small (Dwarf); this could also be a purpose, but it's the exact opposite of growth (negative growth). Tip: When a 'Cause-Effect' relationship exists, check whether the result is positive or negative. 'Fertilize' and 'Immunize' are both protective and growth-promoting processes.","src":"Bangladesh Bank-2006","vocab":[{"word":"Immunize","meaning":"To make resistant to disease via vaccination","synonyms":"-"},{"word":"Graft","meaning":"To join plant tissue to grow as one","synonyms":"-"}]},{"id":"ana-C7Q16","q":"ATTENTIVE : OFFICIOUS","opts":{"A":"doubtful : ambiguous","B":"absorbed : engrossed","C":"refined : snobbish","D":"magisterial : authoritative","E":"impromptu : spontaneous"},"ans":"C","exp":"Relationship: Positive Quality : Excessive/Negative Form. Logic: Being attentive is a good quality, but when someone becomes overly enthusiastic and interferes in others' affairs without authorization, they're called Officious. Similarly, being refined or cultured is praiseworthy, but when someone shows excessive pride about their own taste and looks down on others, they're called Snobbish. Here, both pairs follow the logic of 'a good quality turning into a bad habit.' Verification: 'Being too attentive can become officious,' and similarly, 'Being too refined can become snobbish.' Option elimination: (A) doubtful : ambiguous - doubtful means a person's uncertain state and ambiguous means a subject's unclear state; there's no relationship of excess of quality between them. (B) absorbed : engrossed - these two are synonyms and both can be positive or neutral. This isn't a 'good versus excessive-bad' relationship. (D) magisterial : authoritative - both these words mean authoritative or commanding; here too there's a lack of negative excess. (E) impromptu : spontaneous - impromptu means spontaneous; this too is a synonym pair. Tip: In bank job analogies, pairs often exist where the excess of a quality turns into a fault, the 'Too much of a good thing' pattern. For example: Frugal : Miserly, Confident : Arrogant, and Refined : Snobbish.","src":"-","vocab":[{"word":"Officious","meaning":"Excessively eager to give unwanted help/advice","synonyms":"-"},{"word":"Snobbish","meaning":"Showing excessive pride in one's taste/status","synonyms":"-"}]},{"id":"ana-C7Q17","q":"EXORBITANT : MODERATION","opts":{"A":"dispassionate : equanimity","B":"macabre : interest","C":"perfidious : loyalty","D":"brilliant : gullibility","E":"lavish : extravagance"},"ans":"C","exp":"Relationship: Lack of Quality, or an opposite state. Logic: Just as something excessive (Exorbitant) has no moderation in it, a perfidious (treacherous) person has no loyalty in them. Both pairs follow the 'characteristic versus its absence' logic. Verification: 'Something that is exorbitant lacks moderation,' and similarly, 'Someone who is perfidious lacks loyalty.' Option elimination: (A) dispassionate : equanimity - this is a synonym relationship. An unemotional person has mental composure or equanimity. (B) macabre : interest - people may or may not have interest in something macabre; this isn't a fixed lack-relationship. (D) brilliant : gullibility - brilliant (intelligent) and gullibility (easily deceived) have no direct mechanical or lack-relationship between them. (E) lavish : extravagance - this is also a synonym relationship. Being lavish means engaging in extravagance. Tip: Antonym or 'Lack of' relationships are very important in bank job analogies. Knowing the deeper meaning of words is essential for solving vocabulary-based analogies.","src":"-","vocab":[{"word":"Perfidious","meaning":"Treacherous, disloyal","synonyms":"-"},{"word":"Equanimity","meaning":"Mental calmness/composure","synonyms":"-"}]},{"id":"ana-C7Q18","q":"BLANDISHMENT : COAX","opts":{"A":"medal : honor","B":"budget : save","C":"diary : reminisce","D":"concert : play","E":"plea : threaten"},"ans":"A","exp":"Relationship: Tool/Means : Purpose. Logic: Just as flattery (Blandishment) is a means of enticing or persuading someone (Coax), a medal is a means of expressing honor to someone. In both, the first acts as a symbol or instrument to accomplish the second action. Option elimination: (B) budget : save - a budget may lead to saving (Save), but a budget itself isn't a 'gift' or 'means' that directly represents saving; it's a plan. (C) diary : reminisce - a diary preserves memory, but a diary itself isn't the sole purpose or means of reminiscing. (D) concert : play - music is played (Play) at a concert, but this doesn't fully satisfy the 'means versus purpose' logic. (E) plea : threaten - pleading and threatening are completely opposite actions. Tip: When the means of an abstract action is given, look for the same kind of 'Action-Result' pairing in the answer.","src":"-","vocab":[{"word":"Blandishment","meaning":"Flattery used to persuade","synonyms":"-"},{"word":"Coax","meaning":"To persuade gently","synonyms":"-"}]}]},{"id":"ana-8","title":"GRE Analogy Test-8","questions":[{"id":"ana-C8Q1","q":"MICROSCOPE : SMALL","opts":{"A":"telescope : distant","B":"monocle : single","C":"lens : refracted","D":"camera : photographic","E":"periscope : military"},"ans":"A","exp":"Relationship: Instrument : Purpose/Target. Logic: A microscope is used to see Small objects. Similarly, a telescope is used to see Distant objects. Option elimination: (B) monocle : single - a monocle is used for one eye; 'Single' isn't a characteristic of the target viewed. (C) lens : refracted - light refracts through a lens, but a lens doesn't denote any specific characteristic (such as small or large) of the viewing target. (D) camera : photographic - a camera is used to take pictures, but 'photographic' doesn't denote the target's size or distance. (E) periscope : military - the military (User) uses a periscope, but this doesn't denote the characteristic of what kind of object is being viewed through it. Tip: When a viewing instrument is mentioned, check what kind of object or situation that instrument is specially built to view.","src":"-","vocab":[{"word":"Periscope","meaning":"An instrument for viewing over an obstruction","synonyms":"-"}]},{"id":"ana-C8Q2","q":"EXHIBITION : PAINTING","opts":{"A":"concert : symphony","B":"accompaniment : melody","C":"audition : chorus","D":"improvisation : solo","E":"rehearsal : orchestra"},"ans":"A","exp":"Relationship: Event : Primary Content. Logic: At an Exhibition, Painting (artwork) is primarily displayed. Similarly, at a Concert, primarily Symphony (orchestral music) is performed. Tip: When the name of a public event is given, find out what audiences/listeners go there to see or hear. Just as the place to view a painting is an exhibition, the place to hear a symphony is a concert.","src":"-","vocab":[{"word":"Symphony","meaning":"An orchestral musical composition","synonyms":"-"},{"word":"Audition","meaning":"A trial performance/test","synonyms":"-"},{"word":"Rehearsal","meaning":"A practice session","synonyms":"-"},{"word":"Improvisation","meaning":"Spontaneous creation without preparation","synonyms":"-"}]},{"id":"ana-C8Q3","q":"STERILIZATION : MICROORGANISMS","opts":{"A":"amnesty : deserters","B":"defamation : enemies","C":"inoculation : vaccine","D":"deforestation : trees","E":"assassination : murderers"},"ans":"D","exp":"Relationship: Action : Result of Removal/Elimination. Logic: Through the process of Sterilization, Microorganisms are completely destroyed or eliminated. Similarly, through the process of Deforestation, Trees are completely eliminated or removed. Option elimination: (A) amnesty : deserters - amnesty doesn't eliminate deserters; rather it frees them from punishment. (B) defamation : enemies - defamation doesn't eliminate enemies; rather it damages someone's reputation. (C) inoculation : vaccine - vaccination prevents disease; this isn't a process of eliminating the vaccine itself. (E) assassination : murderers - assassination isn't a method for eliminating murderers; rather it's a criminal act usually committed against important people. Tip: When the name of a process is given, check whether its target is being only partially damaged or completely eliminated.","src":"-","vocab":[{"word":"Deforestation","meaning":"Clearing of forests","synonyms":"-"},{"word":"Amnesty","meaning":"An official pardon","synonyms":"-"}]},{"id":"ana-C8Q4","q":"RUFFLE : SHIRT","opts":{"A":"rafter : roof","B":"molding : cabinet","C":"gate : path","D":"curb : sidewalk","E":"shade : window"},"ans":"B","exp":"Relationship: Decorative Attachment : Object. Logic: The frill or extra fabric attached to enhance a Shirt's appearance is called a Ruffle. Similarly, the decorative carved wood piece attached to enhance a Cabinet's edge appearance is called Molding. Option elimination: (A) rafter : roof - a rafter is the roof's structural framework, not an additional decorative piece. (C) gate : path - a gate is a path's entrance, not a border added for the path's beauty. (D) curb : sidewalk - a curb is the sidewalk's edge or boundary, not a decorative element but a structural part. (E) shade : window - a shade is used to block a window; it isn't a permanent decorative trim attached to a window's border. Tip: When a small attachment relates to a larger object, check whether the attachment is 'essential' (Structural) or 'decorative' (Decorative).","src":"-","vocab":[{"word":"Ruffle","meaning":"A decorative gathered frill of fabric","synonyms":"-"},{"word":"Molding","meaning":"Decorative trim on furniture/woodwork","synonyms":"-"}]},{"id":"ana-C8Q5","q":"EMIGRATE : EXILE","opts":{"A":"select : organize","B":"appoint : nominate","C":"capture : imprison","D":"enlist : conscript","E":"contribute : deduct"},"ans":"D","exp":"Relationship: Voluntary Action : Involuntary Action. Logic: If leaving one's own country for another is voluntary, it's called Emigrate; if forced to leave the country as punishment, it's called Exile. Similarly, if someone voluntarily joins the military, it's called Enlist; if forced by state law to join the military, it's called Conscript. Option elimination: (A) select : organize - selecting and organizing have no such voluntary-versus-mandatory opposite relationship between them. (B) appoint : nominate - appointment and nomination are usually sequential steps of a process, with no opposition in compulsion here. (C) capture : imprison - capturing and imprisoning are both mandatory or forceful acts; here the first has no opportunity to be voluntary. (E) contribute : deduct - contributing and deducting are somewhat like an addition-and-subtraction relationship, but it doesn't align with the type of human action (Voluntary vs Forced). Tip: When two words seem like synonyms, check whether there's a 'subtle difference' between them. The 'voluntary versus mandatory' (Free will vs Coercion) relationship is extremely important for exams.","src":"-","vocab":[{"word":"Emigrate","meaning":"To leave one's country voluntarily","synonyms":"-"},{"word":"Exile","meaning":"Forced banishment from one's country","synonyms":"-"},{"word":"Conscript","meaning":"To compulsorily enlist","synonyms":"-"}]},{"id":"ana-C8Q6","q":"BARRAGE : EXPLOSIVES","opts":{"A":"cacophony : sounds","B":"deluge : rain","C":"vista : sights","D":"grenade : bombs","E":"volcano : lava"},"ans":"B","exp":"Relationship: Intensity/Overwhelming Quantity. Logic: When many Explosives are launched simultaneously or continuously, it's called a Barrage. Similarly, when an excessive amount of Rain falls, it's called a Deluge. Option elimination: (A) cacophony : sounds - cacophony is a mixture of many discordant sounds, but it doesn't denote an 'onslaught' or 'barrage' of something the way Barrage or Deluge does; it's a qualitative characteristic of sound. (C) vista : sights - a vista is a beautiful or expansive view; there's no relationship of excessive quantity or a heavy downpour of something here. (D) grenade : bombs - a grenade is a type of bomb. This is fundamentally a classification, not an intense barrage of something. (E) volcano : lava - lava emerges from a volcano (Source : Product), but a volcano itself isn't the name for a 'heavy barrage' or 'downpour' of lava. Tip: When a word's meaning denotes 'an excessive amount' or 'a continuous downpour,' look for the same kind of intensity in the options.","src":"-","vocab":[{"word":"Barrage","meaning":"A concentrated artillery bombardment","synonyms":"-"},{"word":"Deluge","meaning":"A great flood/downpour","synonyms":"-"}]},{"id":"ana-C8Q7","q":"WARY : GULLED","opts":{"A":"passionate : moved","B":"taciturn : goaded","C":"loquacious : befriended","D":"vigilant : ambushed","E":"shrill : satisfied"},"ans":"D","exp":"Relationship: Quality : Prevention of Negative Action. Logic: A person who is Wary cannot easily be Gulled (deceived). Similarly, a person who is Vigilant or extremely alert cannot easily be taken by surprise (Ambushed). Option elimination: (A) passionate : moved - an emotional person can easily be Moved by something; this is the exact opposite of the original analogy's relationship. (B) taciturn : goaded - it may be hard to provoke (goad) a quiet person, but 'Goaded' is mainly used in the context of making someone angry, which isn't a direct opposition like deception or attack. (C) loquacious : befriended - a talkative person may be likable, but talkativeness isn't an obstacle or barrier to becoming friends. (E) shrill : satisfied - there's no logical or direct relationship between a shrill or harsh voice and being satisfied. Tip: When a quality relates to a negative event, check whether that quality 'Prevents' that event.","src":"-","vocab":[{"word":"Gulled","meaning":"Deceived/duped","synonyms":"-"},{"word":"Ambushed","meaning":"Attacked by surprise","synonyms":"-"},{"word":"Taciturn","meaning":"Reserved, saying little","synonyms":"-"}]},{"id":"ana-C8Q8","q":"WILLFULNESS : HEADSTRONG","opts":{"A":"glibness : astute","B":"determination : attentive","C":"elegance : grandiose","D":"subservience : fawning","E":"anxiety : pessimistic"},"ans":"D","exp":"Relationship: Noun : Adjective, expressing a synonymous or characteristic trait. Logic: Willfulness or stubbornness is called Willfulness, and such a person is called Headstrong. Similarly, the tendency toward servility or excessive flattery is called Subservience, and such a person is called Fawning. Option elimination: (A) glibness : astute - having glibness doesn't make someone Astute (shrewd); rather it denotes cunning speech in a negative sense. (B) determination : attentive - having determination doesn't necessarily mean someone is Attentive; there's no direct characteristic or synonymous relationship here. (C) elegance : grandiose - being Elegant and being Grandiose (showy) aren't the same; Grandiose is usually used to denote negative ostentation. (E) anxiety : pessimistic - having Anxiety doesn't necessarily mean someone is Pessimistic; there's no direct grammatical or characteristic synonymy here. Tip: When a noun's characteristic is given, check whether the word is positive or negative.","src":"-","vocab":[{"word":"Headstrong","meaning":"Stubbornly self-willed","synonyms":"-"},{"word":"Subservience","meaning":"Excessive obedience/submissiveness","synonyms":"-"},{"word":"Fawning","meaning":"Excessively flattering/servile","synonyms":"-"}]},{"id":"ana-C8Q9","q":"UNTENABLE : DEFENDED","opts":{"A":"valuable : insured","B":"fordable : crossed","C":"unjustifiable : forgiven","D":"unpretentious : admired","E":"invulnerable : injured"},"ans":"E","exp":"Relationship: Characteristic : Impossibility of Action. Logic: What is Untenable (not defensible) cannot be Defended. Similarly, what is Invulnerable (unable to be harmed) cannot be Injured. Option elimination: (A) valuable : insured - valuable items can be Insured; this doesn't denote impossibility of an action. (B) fordable : crossed - a shallow river (Fordable) can be Crossed; this is the exact opposite of the original analogy (impossibility). (C) unjustifiable : forgiven - what is unjust may be hard to forgive, but no direct meaning of 'impossible' to forgive is expressed here. (D) unpretentious : admired - people Admire a modest person; this expresses possibility, not impossibility. Tip: When words with negative prefixes (such as Un-, In-) appear, check whether they denote an 'incapability' or 'impossibility' for some action. Untenable and Invulnerable both denote states where the subsequent action (Defend/Injure) is bound to fail.","src":"-","vocab":[{"word":"Untenable","meaning":"Unable to be defended/maintained","synonyms":"-"},{"word":"Invulnerable","meaning":"Unable to be harmed","synonyms":"-"},{"word":"Fordable","meaning":"Able to be crossed (a river)","synonyms":"-"}]},{"id":"ana-C8Q10","q":"OSTRICH : BIRD","opts":{"A":"caterpillar : moth","B":"lizard : frog","C":"bud : leaf","D":"tiger : cat","E":"guest : storm"},"ans":"D","exp":"Relationship: Specific : General Family. Verification: 'An ostrich is a specific type of bird,' and similarly, 'A tiger is a specific type of cat.' Logic: Taxonomy is used here. Just as an ostrich belongs to the bird family (Aves), a tiger belongs to the cat family (Big Cat). No other option has this kind of direct 'taxonomic' relationship. Option elimination: (A) caterpillar : moth - a caterpillar later transforms into a moth; this is a stage of metamorphosis or life cycle, not a direct taxonomic classification. (B) lizard : frog - a lizard is a reptile and a frog is an amphibian; they're different classes. (C) bud : leaf - a bud becomes a leaf; this is a stage of plant growth, not animal classification. (E) guest : storm - there's no logical or scientific classificatory relationship between these. Tip: When a larger family (e.g., Fish, Bird, Mammal) is given, check whether an option exists belonging to that same family. Remember, tiger, lion, cat - all are scientifically members of the 'Cat' family.","src":"Agrani Bank (SO)-2013","vocab":[{"word":"Taxonomy","meaning":"Scientific classification of organisms","synonyms":"-"}]},{"id":"ana-C8Q11","q":"WARDROBE : CLOTHES","opts":{"A":"stove : crockery","B":"bookcase : books","C":"drawer : shelves","D":"pantry : medicine","E":"necklace : earrings"},"ans":"B","exp":"Relationship: Storage : Object. Logic: We use a Wardrobe to organize and keep Clothes. Similarly, we use a Bookcase to organize and keep Books. Option elimination: (A) stove : crockery - cooking is done on a stove, but crockery isn't permanently stored or organized there. (C) drawer : shelves - both drawer and shelf are parts of storage furniture, but there's no holder-and-held relationship here about what specific item is kept where. (D) pantry : medicine - a pantry mainly stores food or kitchen items; medicine is usually kept in a medicine cabinet. (E) necklace : earrings - both necklace and earrings are jewelry. There's no storage-and-stored relationship between them. Tip: When the name of storage or a container is given, check whether it's 'dedicated' to a specific object. Wardrobe and Bookcase - both are furniture specifically built to keep specific items (clothing and books) in an organized way.","src":"Bangladesh Bank-2006","vocab":[{"word":"Crockery","meaning":"Dishes/tableware","synonyms":"-"},{"word":"Pantry","meaning":"A storage room for food","synonyms":"-"}]},{"id":"ana-C8Q12","q":"PRACTICING : EXPERTISE","opts":{"A":"thinking : logic","B":"writing : clarity","C":"growing : health","D":"exercising : strength","E":"eating : nutrition"},"ans":"D","exp":"Relationship: Process : Result. Logic: Just as regular Practicing gains Expertise, regular Exercising gains physical Strength. Option elimination: (A) thinking : logic - thinking doesn't always lead to logic; logic may be a framework for thinking, but as a direct result it isn't as inevitable as exercise's strength. (B) writing : clarity - writing may bring clarity, but writing's purpose or sole result isn't 'clarity'; it's a qualitative characteristic. (C) growing : health - growing is a natural process that may be related to maintaining health, but growing's direct result isn't 'health.' (E) eating : nutrition - eating yields nutrition, but this is a metabolic process. 'Practice' and 'Exercise' are both active and consistent efforts that increase a specific capability. Tip: When a result or achievement relates to an action, check whether performing that action increases that specific quality. 'Practice' increases skill and 'Exercise' increases strength - both are directly and scientifically proven cause-effect relationships.","src":"Agrani Bank SO-2013; Bangladesh Bank-2006","vocab":[{"word":"Expertise","meaning":"Skill/mastery in something","synonyms":"-"}]},{"id":"ana-C8Q13","q":"ARTERY : PLAQUE","opts":{"A":"river : levee","B":"track : switch","C":"channel : silt","D":"information : flow","E":"tunnel : wall"},"ans":"C","exp":"Relationship: Passage : Obstruction. Logic: When fat or wax accumulates inside an Artery and creates an obstruction to blood flow, it's called Plaque. Similarly, when sand or mud accumulates inside a Channel or waterway and creates an obstruction to water flow, it's called Silt. Option elimination: (A) river : levee - a levee is a riverbank embankment that prevents water from overflowing. It isn't an obstruction accumulated inside the river, but rather a protective structure. (B) track : switch - a railway switch is a mechanism for changing tracks; it isn't a substance that blocks or clogs a passage. (D) information : flow - information and flow have no obstruction-relationship here; rather a positive motion is being described. (E) tunnel : wall - a tunnel's wall is a structural part of it, not an obstruction accumulated inside the tunnel. Tip: When the passage of a flow (e.g., Pipe, Vein, River) is given, check whether the second word keeps that passage open or blocks it.","src":"-","vocab":[{"word":"Plaque","meaning":"Fatty deposit inside an artery","synonyms":"-"},{"word":"Silt","meaning":"Fine sediment in a waterway","synonyms":"-"},{"word":"Levee","meaning":"An embankment preventing river overflow","synonyms":"-"}]},{"id":"ana-C8Q14","q":"ANECDOTE : STORY","opts":{"A":"film : theater","B":"chapter : novel","C":"lyric : song","D":"joke : parody","E":"skit : play"},"ans":"E","exp":"Relationship: Small/Short Version : Large/Full Version. Verification: 'An anecdote is a short or brief version of a story,' and similarly, 'A skit is a short or brief version of a play.' Logic: A short or brief story is called an Anecdote, which is essentially a small form of a larger Story. Similarly, a short or brief drama is called a Skit, which is a small form of a full-length Play. Option elimination: (A) film : theater - a film is the displayed object and theater is the venue of display; there's no small-versus-large version relationship here. (B) chapter : novel - a chapter is an inseparable part of a novel (Part to Whole); it isn't itself a separate short novel. (C) lyric : song - lyric is the song's words, merely a part of the song, not a brief version of it. (D) joke : parody - joke and parody may both be humorous, but there's no categorical similarity between them regarding brief versus full version. Tip: When something's 'Miniature' or short form is given, check whether the options also have a similar small-versus-large comparison.","src":"-","vocab":[{"word":"Anecdote","meaning":"A short interesting story/account","synonyms":"-"},{"word":"Skit","meaning":"A short comic performance/scene","synonyms":"-"}]},{"id":"ana-C8Q15","q":"SUPPLANT : REPLACE","opts":{"A":"snatch : take","B":"beg : invite","C":"convict : accuse","D":"savor : gulp","E":"miss : lose"},"ans":"A","exp":"Relationship: Intense/Forced Action : General Action. Logic: Removing someone and seizing their place is called Supplant, which is essentially a forceful or scheming form of Replace. Similarly, forcefully snatching something away is called Snatch, which is essentially a forceful or aggressive form of general grasping or Take. Option elimination: (B) beg : invite - pleading and inviting have no sequential relationship between forceful and general action. (C) convict : accuse - after accusing (Accuse) someone, they're found guilty (Convict). This is a step in a legal process, not a comparison of intensity. (D) savor : gulp - savor means eating with relish, and gulp means swallowing quickly. This is a different type of action, but there's no 'forceful versus general' relationship. (E) miss : lose - missing and losing can be synonymous, but there's no difference in intensity of action or use
