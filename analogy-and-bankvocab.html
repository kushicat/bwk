of force between them. Tip: When two words seem synonymous, check their 'Intensity' or 'Method.'","src":"-","vocab":[{"word":"Supplant","meaning":"To take the place of, often by force/scheming","synonyms":"-"},{"word":"Snatch","meaning":"To grab forcefully","synonyms":"-"}]},{"id":"ana-C8Q16","q":"ALLERGY : REACTION","opts":{"A":"rash : body","B":"lancet : instrument","C":"antihistamine : symptom","D":"cocoon : skeleton","E":"pollen : flower"},"ans":"B","exp":"Relationship: Specific : General Classification. Logic: An Allergy is a special type of Reaction of the body. Similarly, a Lancet is a special type of surgical Instrument. Option elimination: (A) rash : body - a rash appears on the body (Location), but a rash isn't a 'type' or 'category' of the body. (C) antihistamine : symptom - antihistamine is a medicine name used for treating a symptom. This isn't a 'classification' relationship. (D) cocoon : skeleton - there's no direct taxonomic or categorical similarity between a cocoon or pupa's shell and a skeleton. (E) pollen : flower - pollen is a part of a flower (Part to Whole); it isn't a 'type' or category of flower. Tip: When the name of a disease or medical term is given, check whether it denotes a 'symptom' or its 'category.'","src":"-","vocab":[{"word":"Lancet","meaning":"A small surgical instrument","synonyms":"-"}]},{"id":"ana-C8Q17","q":"APHORISTIC : TERSE","opts":{"A":"eloquent : ornate","B":"esoteric : important","C":"hyperbolic : exaggerated","D":"metaphorical : fantastic","E":"equivocal : straightforward"},"ans":"C","exp":"Relationship: Characteristic : Definition (essentially a synonym pair). Logic: A proverbial or concise, pithy remark is called Aphoristic, whose main characteristic is that it's extremely brief or Terse. Similarly, an exaggerated or overstated remark is called Hyperbolic, whose main characteristic is that it's exaggerated or Exaggerated. Option elimination: (A) eloquent : ornate - eloquent speech isn't always ornate (decorated); rather it denotes clarity and fluency. (B) esoteric : important - something mysterious or obscure (Esoteric) being important (Important) has no direct definitional similarity. (D) metaphorical : fantastic - being metaphorical doesn't mean being wonderful or fantastical (Fantastic); a metaphor can be quite realistic too. (E) equivocal : straightforward - ambiguous and straightforward are completely opposite relationships (Antonyms), not synonyms. Tip: When a mode of expression or literary language (Literary terms) is given, think about its 'definition.'","src":"-","vocab":[{"word":"Aphoristic","meaning":"Expressed concisely and pointedly","synonyms":"-"},{"word":"Terse","meaning":"Brief and to the point","synonyms":"-"},{"word":"Hyperbolic","meaning":"Exaggerated","synonyms":"-"}]},{"id":"ana-C8Q18","q":"ZEALOUS : ENTHUSIASTIC","opts":{"A":"pedantic: educated","B":"flamboyant : stylish","C":"cautious : prudent","D":"pious : virtuous","E":"idolatrous : devoted"},"ans":"E","exp":"Relationship: Extreme Degree : Moderate Degree. Logic: If someone is excessively enthusiastic or passionate, they're called Zealous, which is an extreme stage of Enthusiastic. Similarly, if someone is blindly or excessively devoted to something, they're called Idolatrous, which is an extreme or negative stage of Devoted. Option elimination: (A) pedantic : educated - showing off learning (Pedantic) isn't an extreme stage of being educated; rather it's a negative or tiresome manifestation of education. (B) flamboyant : stylish - the extreme stage of being stylish can be flamboyant, but this mainly denotes outward showiness, not the same kind of mental intensity or devotion seen here. (C) cautious : prudent - cautious and prudent are nearly synonymous, with no difference in extreme degree here. (D) pious : virtuous - being pious and being virtuous have no sequential relationship of intensity; they're two separate good qualities. Tip: When two words seem synonymous, check whether there's any 'degree' difference between them.","src":"-","vocab":[{"word":"Idolatrous","meaning":"Excessively/blindly devoted, worshipful","synonyms":"-"},{"word":"Pedantic","meaning":"Excessively concerned with minor details/rules","synonyms":"-"}]}]},{"id":"ana-9","title":"GRE Analogy Test-9","questions":[{"id":"ana-C9Q1","q":"MISER : STINGY","opts":{"A":"porter : strong","B":"rebel : ideal","C":"sage : docile","D":"friend : snide","E":"loner : solitary"},"ans":"E","exp":"Relationship: Noun : Defining Characteristic. Verification: 'A miser is, by definition, stingy,' and similarly, 'A loner is, by definition, solitary.' Logic: A miser's main characteristic is being excessively stingy or Stingy. Similarly, a lonely or solitary person's (Loner) main characteristic is that they prefer to remain Solitary. Option elimination: (A) porter : strong - a porter may be Strong, but this isn't their defining characteristic; a weak person could be a porter too. This is merely a possible quality. (B) rebel : ideal - a rebel may be inspired by some Ideal, but 'ideal' isn't a characteristic adjective describing them. (C) sage : docile - a wise person (Sage) may be calm, but their primary or defining characteristic is 'Wisdom,' not 'Docility.' (D) friend : snide - a friend's characteristic should be sincerity; being Snide (mocking or nasty) isn't a friend's defining characteristic, rather it's oppositional. Tip: When a quality relates to a specific person (Person), check whether that person can be defined by that quality alone.","src":"-","vocab":[{"word":"Loner","meaning":"A person who prefers being alone","synonyms":"-"},{"word":"Snide","meaning":"Mocking, derogatory","synonyms":"-"}]},{"id":"ana-C9Q2","q":"AQUEDUCT : WATER","opts":{"A":"capillary : saliva","B":"artery : blood","C":"esophagus : breath","D":"corridor : aircraft","E":"tanker : fluids"},"ans":"B","exp":"Relationship: Conduit : Substance. Logic: Through an artificial channel or Aqueduct, Water flows from one place to another. Similarly, through an Artery, the body's Blood flows. Verification: 'An aqueduct is used to convey water,' and similarly, 'An artery is used to convey blood.' Option elimination: (A) capillary : saliva - blood flows through capillaries (fine vessels), not saliva. Saliva flows through the salivary glands or salivary duct. (C) esophagus : breath - food travels to the stomach through the esophagus; breath travels through the trachea (windpipe). (D) corridor : aircraft - people travel through a corridor, not aircraft. This is entirely illogical. (E) tanker : fluids - a tanker is a 'vessel' or 'vehicle' (Storage/Vehicle) for holding liquids, not a 'permanent flow channel' (Conduit). Tip: When the path of a flow (Channel/Pipe/Vein) is given, check whether the correct substance flows through that path.","src":"-","vocab":[{"word":"Aqueduct","meaning":"An artificial channel for conveying water","synonyms":"-"},{"word":"Capillary","meaning":"A tiny blood vessel","synonyms":"-"}]},{"id":"ana-C9Q3","q":"ENZYME : CATALYST","opts":{"A":"vaccine : allergy","B":"bacterium : microbe","C":"gland : muscle","D":"vein : organ","E":"neuron : corpuscle"},"ans":"B","exp":"Relationship: Specific : General Classification. Verification: 'An enzyme is a specific type of catalyst,' and similarly, 'A bacterium is a specific type of microbe.' Logic: An Enzyme is a type of biological reaction-accelerating agent or Catalyst. Similarly, Bacterium is a type of microorganism or Microbe. Option elimination: (A) vaccine : allergy - a vaccine doesn't create allergies; rather it's used to prevent disease. There's no categorical similarity between them. (C) gland : muscle - gland and muscle are two different types of tissue or organ in the body. One isn't a subtype of the other. (D) vein : organ - a vein is part of the circulatory system, directly classified as an 'organ' (Organ) rather than the tissue inside an organ. Tip: When a scientific or biological term appears, check the 'Biological Classification' or taxonomy.","src":"-","vocab":[{"word":"Catalyst","meaning":"A substance that speeds up a chemical reaction","synonyms":"-"},{"word":"Corpuscle","meaning":"A blood cell","synonyms":"-"}]},{"id":"ana-C9Q4","q":"LIEN : CLAIM","opts":{"A":"brief : investigation","B":"mortgage : interest","C":"foreclosure : pleading","D":"garnishment : presumption","E":"supposition : proposals"},"ans":"B","exp":"Relationship: Specific Type : General Category. Logic: Both these terms are legal and financial. The legal right or claim held over someone's property for debt recovery purposes is called a Lien. This is fundamentally a special kind of claim or Claim. Similarly, the legal right or pledge held over property against a loan is called a Mortgage. This is fundamentally a type of financial stake or Interest. Option elimination: (A) brief : investigation - a brief is a summary of facts, which can be part of an investigation, but it isn't a 'type' of investigation. (C) foreclosure : pleading - foreclosure means seizing property, and pleading means a court submission. There's no direct categorical similarity between them. (D) garnishment : presumption - garnishment means seizing assets, and presumption means assuming or taking something for granted. There's no logical relationship between them. (E) supposition : proposals - supposition and proposal are different matters; there's no relationship of legal right here. Tip: When legal terms appear, try to understand their general meaning. Look for a similar legal category in the answer.","src":"-","vocab":[{"word":"Lien","meaning":"A legal right to retain property for debt","synonyms":"-"},{"word":"Mortgage","meaning":"A legal pledge of property against a loan","synonyms":"-"},{"word":"Garnishment","meaning":"Legal seizure of wages/assets","synonyms":"-"}]},{"id":"ana-C9Q5","q":"VERBOSITY : WORDS","opts":{"A":"harmoniousness : relationships","B":"floridness : embellishments","C":"interrogation : answers","D":"condemnation : acts","E":"supposition : proposals"},"ans":"B","exp":"Relationship: State of Excess : Substance. Logic: Here a negative excess is being expressed. The state of using more Words than necessary is called Verbosity (wordiness). Similarly, the state of using excessive ornamentation or Embellishments in something is called Floridness (over-ornamentation). Option elimination: (A) harmoniousness : relationships - harmony in relationships is a positive quality; this doesn't denote any 'excess' or 'negative surplus' of something. (C) interrogation : answers - answers are sought through interrogation, but this isn't 'excessive use' or 'surplus' of answers. (D) condemnation : acts - condemnation is voiced for Acts (deeds). There's no relationship of excess here. (E) supposition : proposals - supposition and proposal have no direct similarity in substance or excess between them. Tip: When a word's meaning denotes 'excess' or 'more than needed,' look for the same kind of negative excess in the options. Verbosity and Floridness both fundamentally denote unnecessary excess.","src":"-","vocab":[{"word":"Floridness","meaning":"Excessive ornamentation/elaborateness","synonyms":"-"},{"word":"Embellishments","meaning":"Decorative additions","synonyms":"-"}]},{"id":"ana-C9Q6","q":"QUIXOTIC : IDEALISTIC","opts":{"A":"churlish : polite","B":"whimsical : steady","C":"disinterested : impartial","D":"touchy : sensitive","E":"central : random"},"ans":"D","exp":"Relationship: Extreme Degree : Moderate Degree. Logic: The intensity difference between two words is shown here. If someone is excessively idealistic to an impractical degree, they're called Quixotic, an extreme or negative stage of Idealistic. Similarly, if someone becomes excessively sensitive or touchy over small matters, they're called Touchy, an extreme stage of Sensitive. Option elimination: (A) churlish : polite - rude and polite is an oppositional relationship (Antonyms). (B) whimsical : steady - whimsical and steady is also an oppositional relationship. (C) disinterested : impartial - neutral and unbiased are synonyms, but there's no particular intensity difference between them. (E) central : random - central and random have no logical or degree-based similarity between them. Tip: When two words seem synonymous, check whether there's a difference in 'emotional intensity' or 'practicality' between them. Quixotic and Touchy both denote an extreme stage of their core quality (Idealism/Sensitivity) which often becomes problematic.","src":"-","vocab":[{"word":"Quixotic","meaning":"Extremely/impractically idealistic","synonyms":"-"},{"word":"Touchy","meaning":"Easily upset/oversensitive","synonyms":"-"}]},{"id":"ana-C9Q7","q":"PREEMPT : PRECEDENCE","opts":{"A":"dissemble : diplomacy","B":"superintend : culpability","C":"preside : arbitration","D":"acquire : possession","E":"divest : implication"},"ans":"D","exp":"Relationship: Verb : Resulting State. Logic: Here an action and what is directly gained through that action are shown. Doing or acquiring something before others (Preempt) results in gaining priority or Precedence. Similarly, obtaining or getting something (Acquire) results in gaining ownership or Possession over it. Option elimination: (A) dissemble : diplomacy - concealing the truth may be part of diplomacy, but it doesn't directly mean acquiring diplomacy. (B) superintend : culpability - supervising doesn't result in gaining Culpability (guilt); rather it's connected with fulfilling responsibility. (C) preside : arbitration - presiding over a meeting and arbitration have no direct action-and-result relationship. (E) divest : implication - divesting (giving up) something and becoming implicated (Implication) could be oppositional, but not a result. Tip: When a specific action (Verb) is given, think about what 'reward' or 'state' you would gain upon successfully completing that action. By 'Preempt'-ing, you gain Precedence, and by 'Acquire'-ing, you become its owner (Possession).","src":"-","vocab":[{"word":"Preempt","meaning":"To act first to prevent others","synonyms":"-"},{"word":"Precedence","meaning":"Priority over others","synonyms":"-"},{"word":"Divest","meaning":"To give up/sell off","synonyms":"-"}]},{"id":"ana-C9Q8","q":"MALINGER : AIL","opts":{"A":"study : learn","B":"qualify : achieve","C":"sneer : respect","D":"flatter : appreciate","E":"clash : resolve"},"ans":"D","exp":"Relationship: False Pretense : Genuine Action. Logic: The first word is a false or pretended outward expression of the second. Pretending to be ill to avoid work is called Malinger; that is, here one pretends to Ail (be ill). Similarly, falsely praising someone to please them is called Flatter; that is, here one pretends to Appreciate. Verification: 'To malinger is to pretend to ail,' and similarly, 'To flatter is to pretend to appreciate.' Option elimination: (A) study : learn - studying gains knowledge. This is a genuine effort and its result, with no 'pretense' relationship here. (B) qualify : achieve - gaining qualification and achieving are both positive and realistic actions. (C) sneer : respect - mocking and respecting are an oppositional relationship (Antonyms). (E) clash : resolve - conflict and resolution are a problem and its subsequent stage's relationship. Tip: When a word's meaning denotes 'pretending' (Pretend/Feign), look for something in the answer that's done for show rather than from genuine feeling. Malinger and Flatter are both specific kinds of behavior used to deceive others.","src":"-","vocab":[{"word":"Malinger","meaning":"To pretend illness to avoid duty","synonyms":"-"},{"word":"Ail","meaning":"To be sick/unwell","synonyms":"-"}]},{"id":"ana-C9Q9","q":"ARBOREAL : TREES","opts":{"A":"terrestrial: plains","B":"amphibious : rivers","C":"herbaceous : plants","D":"subterranean : caves","E":"sidereal : stars"},"ans":"E","exp":"Relationship: Adjective : Related Entity. Logic: Just as everything related to trees is 'Arboreal,' the astronomical term related to stars is 'Sidereal.' Things related to trees, or animals living in trees, are called Arboreal; that is, this is an adjective related to Trees. Similarly, matters related to the position and movement of stars or celestial bodies are called Sidereal, related to Stars. Vocabulary: Arboreal: tree-related or tree-dwelling. Sidereal: star-related. Terrestrial: land or earth-related. Option elimination: (A) terrestrial : plains - terrestrial means land, related to the entire surface of the earth, not just plains specifically. (B) amphibious : rivers - amphibious animals live both on land and water, not exclusively connected to rivers alone. (C) herbaceous : plants - herbaceous means soft-stemmed plants. This is a type of plant, but it's not as broadly connected as 'arboreal' is to trees. (D) subterranean : caves - subterranean means underground. This could be inside a cave, but it denotes any place beneath the ground. Tip: When a scientific adjective is given, try to find its original source or what it's directly connected to. Arboreal and Sidereal are both terminologically connected to a specific natural element (trees and stars).","src":"-","vocab":[{"word":"Sidereal","meaning":"Relating to stars/measured by stars","synonyms":"-"},{"word":"Terrestrial","meaning":"Relating to land/earth","synonyms":"-"}]},{"id":"ana-C9Q10","q":"ORCHESTRA : INSTRUMENTAL","opts":{"A":"choir : vocal","B":"pianist : discordant","C":"trio : harmonic","D":"singer : sacred","E":"band : martial"},"ans":"A","exp":"Relationship: Group of Performers : Medium of Performance. Verification: 'An orchestra is a group that specializes in instrumental music,' and similarly, 'A choir is a group that specializes in vocal music.' Logic: Here, a music ensemble's name is given alongside whether they primarily perform through a specific method or medium. An Orchestra is a group of instrumentalists whose primary medium is Instrumental music. Similarly, a Choir is a group of singers whose primary medium is Vocal music. Option elimination: (B) pianist : discordant - a pianist and dissonance have no positive professional or medium-related similarity between them. (C) trio : harmonic - trio means a group of three. They may be harmonic, but 'harmonic' isn't a specific medium (such as vocal or instrumental). (D) singer : sacred - singer and sacred are about a person with a quality, but this isn't a group's medium. (E) band : martial - a band can play martial music, but not all bands are martial; this isn't a general medium or classification. Tip: When music or performance art is mentioned, the distinction between 'instrument' versus 'voice' is often important. Orchestra and Choir are the two primary organizational forms of instrumental and vocal music respectively.","src":"-","vocab":[{"word":"Choir","meaning":"A group of singers","synonyms":"-"}]},{"id":"ana-C9Q11","q":"TROPHY : CONTESTANT","opts":{"A":"baton : runner","B":"pride : parent","C":"book : bibliography","D":"loan : cashier","E":"honors : student"},"ans":"E","exp":"Relationship: Award : Recipient. Logic: The first word is the person who receives recognition for their achievement. When a Contestant achieves extraordinary success in a competition, they're given a Trophy. Similarly, when a Student achieves extraordinary results or success in their academic life, they're given recognition or Honors. Option elimination: (A) baton : runner - a baton is an item used by relay runners; it isn't an 'award' for any achievement. (B) pride : parent - pride (Pride) is a feeling; it isn't an official award or tangible recognition like a trophy. (C) book : bibliography - a bibliography is a book's list. It isn't an award given for any achievement. (D) loan : cashier - a cashier may provide a loan, but a loan isn't a 'reward for a cashier's success.' Tip: When an award is mentioned, paying attention to which 'field' it's given in is important. Trophy is connected to sports or competitions, and Honors is connected to education or academia. Both are ultimate recognition for achievement.","src":"-","vocab":[{"word":"Honors","meaning":"Academic distinction/recognition","synonyms":"-"}]},{"id":"ana-C9Q12","q":"LISTENER : EAVESDROPPER","opts":{"A":"spectator : game","B":"viewer : gazer","C":"observer : spy","D":"speaker : chatterbox","E":"leader : demagogue"},"ans":"C","exp":"Relationship: General : Negative/Secretive Version. Logic: Just as listening is a general action and eavesdropping is its secretive form, observing/watching is a general action and spying is its secretive form. Anyone who hears something is called a Listener. But when someone secretly or unethically listens to others' conversation, they're called an Eavesdropper. Similarly, anyone who observes something is called an Observer. But when someone secretly or unethically observes something, they're called a Spy. Option elimination: (A) spectator : game - this is a person-and-subject relationship, not a type of secretive action. (B) viewer : gazer - a viewer and a person staring fixedly - there's no direct negative or secretive relationship between them. (D) speaker : chatterbox - here being talkative (chatterbox) is a characteristic trait (excessive talking), but it isn't a 'secret' action. (E) leader : demagogue - this could be a good option, but the basis of eavesdropping or spying is 'secrecy,' which isn't applicable to a demagogue. Tip: When the 'secretive' or 'unethical' aspect of an action is highlighted, check that same 'secrecy' or 'unethical' angle in the answer.","src":"-","vocab":[{"word":"Eavesdropper","meaning":"One who secretly listens to conversations","synonyms":"-"},{"word":"Demagogue","meaning":"A leader who appeals to popular emotion/prejudice","synonyms":"-"}]},{"id":"ana-C9Q13","q":"FIDGET : NERVOUSNESS","opts":{"A":"cringe : dread","B":"stall : frustration","C":"regale : amusement","D":"doubt : consternation","E":"nag : annoyance"},"ans":"A","exp":"Relationship: Physical Expression : Emotion. Logic: Just as a person fidgets (Fidget) when anxious, a person cringes (Cringe) when in extreme fear or dread. Vocabulary: Fidget: to move restlessly. Nervousness: anxiety. Cringe: to shrink back in fear. Dread: extreme fear. Option elimination: (B) stall : frustration - frustration may make someone stall (pause work), but this isn't a direct physical reaction like 'fidgeting.' (C) regale : amusement - this is a positive relationship. Giving someone amusement is to regale them. This isn't an 'involuntary' physical trait. (D) doubt : consternation - doubt and alarm (consternation) are both mental states; neither is a physical expression. (E) nag : annoyance - when annoyed, a person nags, but this is a verbal action, not a physical gesture like 'Cringe' or 'Fidget.' Tip: When a physical gesture and an emotion relate, check whether that gesture is spontaneous. Fidget and Cringe are both reactions the body performs without conscious control, becoming a vent for the underlying emotion.","src":"-","vocab":[{"word":"Cringe","meaning":"To recoil/shrink in fear or distaste","synonyms":"-"},{"word":"Dread","meaning":"Extreme fear/apprehension","synonyms":"-"}]},{"id":"ana-C9Q14","q":"DORMANT : INACTIVITY","opts":{"A":"stark : ornateness","B":"malleable : plasticity","C":"prone : uprightness","D":"infuriating : tedium","E":"slack : excess"},"ans":"B","exp":"Relationship: Adjective : Defining Noun/Quality. Logic: When something is in a dormant or inactive state, it's called Dormant; that is, Inactivity is Dormant's core defining characteristic. Similarly, if something can easily be shaped or molded, it's called Malleable; that is, Plasticity (malleability) is the malleable substance's core defining characteristic. Option elimination: (A) stark : ornateness - stark means plain or without decoration. So it's the opposite of Ornateness (decoration), not its characteristic. (C) prone : uprightness - prone means lying face down, and uprightness means standing erect. This is an opposite relationship (Antonyms). (D) infuriating : tedium - irritating (Infuriating) and tediousness (Tedium) - neither is the other's defining characteristic. (E) slack : excess - loose (Slack) and excess (Excess) - there's no logical qualitative similarity between them. Tip: When the physical or chemical characteristic of a substance is given (such as Malleability, Plasticity, Solubility), understand it's a fixed and defining quality of that substance.","src":"-","vocab":[{"word":"Malleable","meaning":"Able to be shaped/molded easily","synonyms":"-"},{"word":"Plasticity","meaning":"Capacity to be molded","synonyms":"-"}]},{"id":"ana-C9Q15","q":"WAFT : PLUMMET","opts":{"A":"skim : glide","B":"dream : captivate","C":"toss : catch","D":"flail : assault","E":"meander : dash"},"ans":"E","exp":"Relationship: Slow/Gentle Movement : Fast/Violent Movement. Logic: Something lightly floating on the breeze is called Waft, which is an extremely slow-moving action. On the other hand, falling straight down from above with great force and speed is called Plummet. Similarly, walking lazily or slowly along a winding path is called Meander, and running quickly with great speed is called Dash. Option elimination: (A) skim : glide - both skim and glide are smooth, slow movements. There's no opposite relationship of intensity between them. (B) dream : captivate - dreaming and captivating have no relationship to movement or motion. (C) toss : catch - throwing and catching are a relationship between an action's start and end, not a difference in intensity of motion. (D) flail : assault - flailing arms and legs disorderedly (Flail) and attacking (Assault) - there's no correspondence in slow versus fast degree of motion between them. Tip: When words related to movement appear, always compare their 'Speed' and 'Pattern.' Waft and Meander express slow or lazy movement, while Plummet and Dash express swift movement.","src":"-","vocab":[{"word":"Plummet","meaning":"To fall straight down rapidly","synonyms":"-"},{"word":"Meander","meaning":"To wander slowly along a winding path","synonyms":"-"},{"word":"Dash","meaning":"To run quickly","synonyms":"-"}]},{"id":"ana-C9Q16","q":"PRUDISH : SINCERITY","opts":{"A":"fanatical : violence","B":"authoritative : evidence","C":"finicky : quality","D":"obstinate : accuracy","E":"fearful : comfort"},"ans":"C","exp":"Relationship: Excessive/Negative Degree : Positive Trait. Logic: Modesty or sincerity is a good quality, but when someone overdoes it or becomes hypocritical about it, they're called Prudish (excessively prim/priggish). That is, this is a negative or excessive stage of Sincerity. Similarly, checking the quality of something is good, but when someone becomes excessively fussy about trivial matters, they're called Finicky. Option elimination: (A) fanatical : violence - fanaticism can lead to violence (Violence), but this isn't an 'excessively fussy' stage of violence. (B) authoritative : evidence - evidence may be needed to be authoritative, but this isn't a characteristic excess. (D) obstinate : accuracy - a stubborn person may like accuracy (Accuracy), but stubbornness and accuracy aren't complementary to each other or a degree-based form of one another. (E) fearful : comfort - a fearful person may seek comfort (Comfort), but there's no negative excess of quality between them. Tip: When a negative nature relates to a positive quality, check whether that nature 'spoils' that quality.","src":"-","vocab":[{"word":"Prudish","meaning":"Excessively proper/modest, priggish","synonyms":"-"},{"word":"Finicky","meaning":"Excessively fussy about details","synonyms":"-"}]},{"id":"ana-C9Q17","q":"POSER : SINCERITY","opts":{"A":"brat : insolence","B":"flirt : decency","C":"grouch : patience","D":"recluse : gregariousness","E":"rouge : empathy"},"ans":"D","exp":"Relationship analysis: Poser means a fraud/pretender, and Sincerity means genuineness or candor. The relationship: a Poser lacks Sincerity. (D) recluse : gregariousness: Recluse means a person who prefers to stay alone (a hermit). Gregariousness means sociability or the tendency to mingle with people. The relationship: a Recluse, or a person who avoids people, completely lacks the quality of Gregariousness or sociability. Why is (D) the best fit? In the original pair, a Poser is someone who isn't genuine (lack: Sincerity). Similarly, a Recluse is someone who avoids the company of others (lack: Gregariousness). This directly denotes a straightforward absence of a defining characteristic trait. Option elimination: (A) brat : insolence - brat means a spoiled child and insolence means rudeness/disobedience, but a brat often does display insolence rather than lacking it - this is more characteristic than a lack relationship. (B) flirt : decency - flirt means someone who lightly pretends at romance and decency means propriety; the lack-relationship here is weaker than recluse/gregariousness. (C) grouch : patience - grouch means an irritable or dissatisfied person and patience means tolerance; a grouch does lack patience, making this a plausible but less precise match than (D). Tip: In analogy, always check: what relationship exists - has/lacks/opposite/cause-effect?","src":"-","vocab":[{"word":"Recluse","meaning":"A person who lives in seclusion","synonyms":"-"},{"word":"Gregariousness","meaning":"Sociability, fondness for company","synonyms":"-"}]},{"id":"ana-C9Q18","q":"MORALISTIC : PRINCIPLED","opts":{"A":"simplistic : unsophisticated","B":"pedantic : learned","C":"positivistic : empirical","D":"dogmatic : prejudiced","E":"fantastic : imaginative"},"ans":"B","exp":"Relationship: Negative/Excessive Degree : Positive Quality. Logic: When morality becomes a source of annoyance through excess, it's called 'Moralistic,' and when scholarliness becomes a source of annoyance through excess, it's called 'Pedantic.' Verification: 'To be moralistic is to be excessively principled,' and similarly, 'To be pedantic is to be excessively learned.' Vocabulary: Moralistic: excessively concerned with morality (over-righteous). Principled: ethical, upright. Pedantic: showing off scholarliness in a tiresome way (bookish, overly precise). Learned: scholarly, erudite.","src":"-","vocab":[{"word":"Moralistic","meaning":"Excessively concerned with morality","synonyms":"-"},{"word":"Pedantic","meaning":"Excessively concerned with minutiae of learning","synonyms":"-"},{"word":"Simplistic","meaning":"Oversimplified","synonyms":"-"}]}]},{"id":"ana-10","title":"GRE Analogy Test-10","questions":[{"id":"ana-C10Q1","q":"FEAR : COWER","opts":{"A":"calmness : fret","B":"anger : rant","C":"disappointed : console","D":"gladness : satisfy","E":"embarrassment : speak"},"ans":"B","exp":"Relationship: Emotion : Expression. Logic: Just as fear makes a person cower (a physical reaction), anger makes a person rant or shout aggressively (a verbal reaction). Verification: 'When someone feels extreme fear, they tend to cower,' and similarly, 'When someone feels extreme anger, they tend to rant.' Option elimination: (A) calmness : fret - if someone is calm, they don't become Fretful (irritated); this is oppositional. (C) disappointed : console - when someone is disappointed, they are consoled. This is someone else's reaction to that emotion, not the spontaneous outward expression of the emotion itself. (D) gladness : satisfy - being glad and being satisfied are nearly synonymous, not an outward expression. (E) embarrassment : speak - when embarrassed, a person generally speaks less or becomes tongue-tied. Speaking itself isn't its special expression. Tip: When a specific emotion is mentioned, think about what kind of 'abnormal' or 'intense' behavior a person displays as a result of that emotion.","src":"-","vocab":[{"word":"Cower","meaning":"To crouch in fear","synonyms":"Cringe, Shrink"},{"word":"Rant","meaning":"To speak loudly and angrily","synonyms":"-"}]},{"id":"ana-C10Q2","q":"BACTERIA : DECOMPOSITION","opts":{"A":"lava : eruption","B":"penicillin : injection","C":"yeast : fermentation","D":"oxygen : respiration","E":"plants : deforestation"},"ans":"C","exp":"Relationship: Agent : Natural Process. Logic: Bacteria are the main medium or cause of the Decomposition process. Similarly, Yeast is the main medium of the Fermentation process. Verification: 'Bacteria cause the process of decomposition,' and similarly, 'Yeast causes the process of fermentation.' Option elimination: (A) lava : eruption - lava results from a volcano's eruption; this isn't a biologically related natural process. (B) penicillin : injection - penicillin is a drug given via injection; this isn't the name of a natural or chemical transformation process. (D) oxygen : respiration - oxygen is required for respiration, but oxygen itself isn't an 'Agent' that causes respiration; rather it's a gas. (E) plants : deforestation - deforestation destroys plants; this is a destructive human action, not a natural creative process. Tip: When a biological relationship is described, check whether one thing's existence naturally causes the other. Bacteria and Yeast are both microorganisms, essential for the processes of Decomposition and Fermentation respectively.","src":"-","vocab":[{"word":"Fermentation","meaning":"Chemical breakdown by microorganisms (e.g. yeast)","synonyms":"-"},{"word":"Decomposition","meaning":"Breaking down of organic matter","synonyms":"-"}]},{"id":"ana-C10Q3","q":"PALATE : MOUTH","opts":{"A":"curb : sidewalk","B":"star : sky","C":"stream : dam","D":"mountain : range","E":"ceiling : room"},"ans":"E","exp":"Relationship: Upper Surface/Boundary : Enclosed Space. Logic: The upper part inside the mouth cavity is called the Palate. Similarly, the upper part inside a Room is called the Ceiling. Verification: 'The palate is the top surface of the mouth,' and similarly, 'The ceiling is the top surface of a room.' Option elimination: (A) curb : sidewalk - a curb is the raised edge of a sidewalk, not an overhead covering or ceiling. (B) star : sky - the sky has no specific 'ceiling,' and a star exists within the sky, but it isn't a structural upper boundary. (C) stream : dam - a stream and dam relationship is about blocking a flow, with no relation to top and bottom here. (D) mountain : range - mountain and range is a Member : Group relationship. Tip: When a body part is mentioned, pay attention to its location and function. Palate and Ceiling - both function as the 'upper boundary' or 'top' within their respective enclosed structures.","src":"-","vocab":[{"word":"Palate","meaning":"The roof of the mouth","synonyms":"-"},{"word":"Ceiling","meaning":"The upper interior surface of a room","synonyms":"-"}]},{"id":"ana-C10Q4","q":"SLAKE : THIRST","opts":{"A":"perspire : exertion","B":"moan : voice","C":"shiver : muscle","D":"satiate : hunger","E":"dream : sleep"},"ans":"D","exp":"Relationship: Action : Satisfaction of Need. Logic: Quenching Thirst (Thirst) by drinking water is called Slake. Similarly, quenching Hunger (Hunger) or completely satisfying it by eating food is called Satiate. Verification: 'To slake is to satisfy one's thirst,' and similarly, 'To satiate is to satisfy one's hunger.' Option elimination: (A) perspire : exertion - excessive exertion makes a person Perspire (sweat). This is a cause-and-effect relationship, not satisfying a need. (B) moan : voice - voice is used while moaning. This doesn't denote satisfying any biological need. (C) shiver : muscle - muscles (Muscle) shiver from cold or fear. This is merely a physical reaction. (E) dream : sleep - a person dreams during sleep. This isn't a process of satisfying any deficiency or need. Tip: When a physical deficiency (such as Hunger, Thirst) and a word relieving it are given, look for the same kind of 'need and satisfaction' pairing in the answer.","src":"-","vocab":[{"word":"Slake","meaning":"To quench/satisfy (thirst)","synonyms":"-"},{"word":"Satiate","meaning":"To satisfy fully (hunger/appetite)","synonyms":"-"}]},{"id":"ana-C10Q5","q":"FOIBLE : FAULT","opts":{"A":"perjury : testimony","B":"reputation : disrepute","C":"vagary : notion","D":"feud : hostility","E":"quibble : objection"},"ans":"E","exp":"Relationship: Minor : Serious. Logic: A small flaw or weakness in someone's character is called a Foible, a trivial form of a major fault or Fault. Similarly, raising a very minor objection about something is called a Quibble, a trivial form of a general objection or Objection. Verification: 'A foible is a minor fault,' and similarly, 'A quibble is a minor objection.' Option elimination: (A) perjury : testimony - perjury means lying or false testimony, which is a major crime. This isn't a 'minor' or 'trivial' form of testimony (Testimony); rather it's entirely oppositional (Antonym) and an illegal form. (B) reputation : disrepute - good reputation and bad reputation are directly opposite words (Antonyms). (C) vagary : notion - vagary means a whimsical thought, and notion means a general idea. The difference between them is more about type than about degree or intensity. (D) feud : hostility - feud means a prolonged dispute, and hostility means enmity. Here the relationship is reversed - the first word (Feud) is much more intense or serious than the second. Tip: When a small matter (Minor/Trivial) and its larger form relate, look for a pair in the answer where the first word denotes something 'unnecessary' or 'insignificant.' Foible and Quibble are both things that can usually be overlooked.","src":"-","vocab":[{"word":"Foible","meaning":"A minor weakness/quirk","synonyms":"-"},{"word":"Quibble","meaning":"A trivial objection","synonyms":"-"},{"word":"Vagary","meaning":"An unpredictable/whimsical notion","synonyms":"-"}]},{"id":"ana-C10Q6","q":"IMPORTUNE : REQUEST","opts":{"A":"pry : inquiry","B":"balk : obstacle","C":"fulminate : silence","D":"discountenance : plea","E":"vitiate : punishment"},"ans":"A","exp":"Relationship: Negative/Excessive : General. Logic: Asking someone something generally or saying something is called Request, but when someone makes an excessively annoying or persistent request, it's called Importune. Similarly, generally wanting to know about something or looking into something is called Inquiry, but when someone is excessively curious about others' personal matters or pries into their affairs, it's called Pry. Option elimination: (B) balk : obstacle - balking (refusing) and an obstacle are an action-and-its-effect relationship, but this doesn't denote a degree like 'Inquiry' or 'Request.' (C) fulminate : silence - denouncing loudly and silence could be oppositional, but there's no similarity in intensity of action. (D) discountenance : plea - disapproving or discouraging (Discountenance) and a plea (Plea) - this isn't an excessive degree of an action. (E) vitiate : punishment - corrupting or spoiling (Vitiate) and punishment (Punishment) - there's no logical analogy between them. Tip: When a word's meaning denotes 'excessive curiosity' or 'excessive request,' look for behavior in the answer that could be annoying to others.","src":"-","vocab":[{"word":"Importune","meaning":"To persistently/annoyingly request","synonyms":"-"},{"word":"Pry","meaning":"To intrusively inquire","synonyms":"-"}]},{"id":"ana-C10Q7","q":"MILL : GRAIN","opts":{"A":"loom : cloth","B":"bazaar : wares","C":"factory : furniture","D":"hospital : medicine","E":"forge : metal"},"ans":"E","exp":"Relationship: Place of Processing : Raw Material. Logic: At a Mill, Grain is milled or processed. Similarly, at a Forge (blacksmith's workshop), Metal is heated and shaped through processing. Verification: 'A mill is a place where grain is processed,' and similarly, 'A forge is a place where metal is processed.' Option elimination: (A) loom : cloth - Cloth is made at a Loom. Here cloth is the 'finished product,' not the raw material. But in the question, 'Grain' is the raw material. (B) bazaar : wares - goods (Wares) are sold at a Bazaar; no processing happens there. (C) factory : furniture - furniture is made at a factory. Here furniture is the finished product, not the raw material (wood). (D) hospital : medicine - treatment is given at a hospital; it isn't the primary place where medicine is manufactured or processed. Tip: When the name of a place is given, check whether an object is being 'manufactured' there (Finished product) or 'processed' (Processed raw material). Mill and Forge both prepare raw material for a subsequent stage.","src":"-","vocab":[{"word":"Forge","meaning":"A workshop for heating/shaping metal","synonyms":"-"}]},{"id":"ana-C10Q8","q":"DAGUERREOTYPE : PHOTOGRAPH","opts":{"A":"bust : statue","B":"pastiche : painting","C":"narrative : novel","D":"hieroglyphic : papyrus","E":"musket : firearm"},"ans":"E","exp":"Relationship: Early/Primitive Version : General Category. Logic: A Daguerreotype is an extremely early or original form of photography. That is, it's an ancient type of Photograph. Similarly, a Musket is an early version of a gun or Firearm, used before modern rifles. Verification: 'A daguerreotype is an early type of photograph,' and similarly, 'A musket is an early type of firearm.' Option elimination: (A) bust : statue - a bust is a type of statue, but it isn't an 'early form' of statues. (B) pastiche : painting - a pastiche is an artistic style; it isn't an early version of painting. (C) narrative : novel - narrative could be a part or type of a novel, but it isn't the novel's early form. (D) hieroglyphic : papyrus - hieroglyphics were written on papyrus; this is a relationship of medium and material, not evolution. Tip: When the name of an ancient technology or device is given (such as Abacus, Musket, Daguerreotype), try to find its modern or general name in the options. This is fundamentally an Evolutionary relationship.","src":"-","vocab":[{"word":"Daguerreotype","meaning":"An early photographic process","synonyms":"-"},{"word":"Musket","meaning":"An early type of firearm","synonyms":"-"}]},{"id":"ana-C10Q9","q":"INDISTINGUISHABLE : CONFOUND","opts":{"A":"exceptional : overlook","B":"impregnable : attack","C":"ostentatious : consume","D":"equivalent : interchange","E":"occluded : reveal"},"ans":"D","exp":"Relationship: Characteristic : Resulting Action. Logic: When things can't be told apart at all (Indistinguishable), it's quite natural to mix them up or become confused (Confound). Similarly, when two things are of equal or the same value (Equivalent), it becomes possible to use or substitute them interchangeably (Interchange) in place of each other. Verification: 'Things that are indistinguishable are likely to confound,' and similarly, 'Things that are equivalent can be easily interchanged.' Option elimination: (A) exceptional : overlook - what's exceptional doesn't usually escape (Overlook) people's notice. This is an opposite relationship. (B) impregnable : attack - something can be impregnable yet still be attacked (Attack), just not conquered. This doesn't directly provide a result or benefit like 'Indistinguishable' does. (C) ostentatious : consume - showy (Ostentatious) things have no direct functional relationship with consuming (Consume). (E) occluded : reveal - something closed or covered (Occluded) is hard to reveal (Reveal). This is an oppositional relationship. Tip: When a quality makes some action easy or unavoidable, apply that pattern in the answer. Just as being 'Indistinguishable' carries a risk of being 'Confound'-ed, being 'Equivalent' carries an opportunity for being 'Interchange'-d.","src":"-","vocab":[{"word":"Indistinguishable","meaning":"Unable to be told apart","synonyms":"-"},{"word":"Confound","meaning":"To confuse/mix up","synonyms":"-"},{"word":"Impregnable","meaning":"Unable to be captured/penetrated","synonyms":"-"}]},{"id":"ana-C10Q10","q":"SCRIBBLE : WRITE","opts":{"A":"limb : walk","B":"draw : print","C":"mumble : talk","D":"float : swim","E":"say : sing"},"ans":"C","exp":"Relationship: Indistinct Version : Standard Action. Logic: Just as Scribble (scrawling) is an unclear form of Write, Mumble (muttering) is an unclear form of Talk. Option elimination: (A) limb : walk - a person walks using a Limb (leg). This is a body part-and-action relationship, not one of unclarity. (B) draw : print - drawing and printing are two different types of action. (D) float : swim - floating and swimming, though close, don't express the kind of unclarity relationship seen in 'Scribble-Write.' (E) say : sing - this is a relationship between speaking normally versus speaking in tune. Tip: When a question concerns the manner of an action (Manner of Action), check how 'clear' or 'precise' the action is. Scribble and Mumble both express a lack of clarity in writing and speaking respectively.","src":"-","vocab":[{"word":"Scribble","meaning":"To write hastily/illegibly","synonyms":"-"},{"word":"Mumble","meaning":"To speak unclearly/indistinctly","synonyms":"-"}]},{"id":"ana-C10Q11","q":"DETOXIFICATION : POISON","opts":{"A":"surge : current","B":"diet : reduction","C":"refinement : ore","D":"adjustment : focus","E":"neutralization : acid"},"ans":"E","exp":"Relationship: Process : Removal/Counteraction. Logic: The process of removing Poison from the body or a place, or destroying the effectiveness of the poison, is called Detoxification. Similarly, the process of destroying an Acid's intensity or its acidic quality, thereby neutralizing it, is called Neutralization. Option elimination: (A) surge : current - a sudden increase in current or flow is called a surge. This isn't a process of removing something. (B) diet : reduction - dieting may lead to weight reduction, but reduction isn't a 'substance' that's directly destroyed through the diet process. (C) refinement : ore - the process of removing impurities from Ore to purify it is called refinement. This could be a strong option, but both 'Detoxification' and 'Neutralization' specifically mean 'neutralizing' a harmful effect, whereas refinement means extracting the 'core substance' by removing unnecessary parts from raw material. (D) adjustment : focus - adjustment is needed to fix focus. This isn't about neutralizing a toxic or active substance. Tip: When a negative or harmful element (Poison, Acid, Bacteria) and the process of removing it are given, check their chemical or biological compatibility.","src":"-","vocab":[{"word":"Detoxification","meaning":"Removal of toxins","synonyms":"-"},{"word":"Neutralization","meaning":"Counteracting acidity/effect","synonyms":"-"}]},{"id":"ana-C10Q12","q":"GRAVEL : PEBBLE","opts":{"A":"river : water","B":"seasoning : salt","C":"crowd : person","D":"legislature : bill","E":"typewriter : key"},"ans":"C","exp":"Relationship: Collective : Individual. Logic: When many small Pebbles exist together, that collective is called Gravel. Similarly, when many Persons exist together, that collective is called Crowd. Verification: 'Gravel is a collection of pebbles,' and similarly, 'A crowd is a collection of people/persons.' Option elimination: (A) river : water - a river contains water, but a river isn't the 'collective name' for water. Water is a substance (Material), not a countable individual unit. (B) seasoning : salt - salt may be one type of seasoning, but many salts together don't form a seasoning. This is a Category : Example relationship. (D) legislature : bill - bills are introduced in a legislature, but a legislature isn't formed from many bills. A legislature is formed from its members. (E) typewriter : key - a key is part of a typewriter. This is a Whole : Part relationship. Tip: When a collective of small objects is meant, look for something formed from countable individual units (such as: people forming a crowd, trees forming a forest).","src":"-","vocab":[{"word":"Gravel","meaning":"A collection of small stones/pebbles","synonyms":"-"}]},{"id":"ana-C10Q13","q":"STOCKADE : ENCLOSURE","opts":{"A":"moat : bridge","B":"doorway : wall","C":"brick : building","D":"pillar : support","E":"keyhole : lock"},"ans":"D","exp":"Relationship: Specific Object : Function/Purpose. Logic: The main purpose of building a Stockade (a fence made of wooden logs) is to enclose an area, functioning as an Enclosure. Similarly, the main purpose of building a Pillar (column) is to provide assistance or a foundation to a structure, called Support in English. Verification: 'The purpose of a stockade is to provide an enclosure,' and similarly, 'The purpose of a pillar is to provide support.' Option elimination: (A) moat : bridge - a moat and a bridge function as an obstacle, and a bridge helps cross that obstacle. This doesn't align with the purpose of the action. (B) doorway : wall - the opening through a wall is a doorway. This isn't an action's purpose or function, but rather a location within something. (C) brick : building - a building is made from bricks. This is a Part : Whole relationship. A building isn't made of brick; rather a collection of bricks is a building. (E) keyhole : lock - the hole for inserting a key is part of a lock. This is also a Part : Whole relationship. Tip: When architectural or structural words are given, think 'Why was this object built?' Stockade and Pillar are both defined by their specific use (Enclosure and Support).","src":"-","vocab":[{"word":"Stockade","meaning":"A defensive barrier of wooden stakes","synonyms":"-"},{"word":"Pillar","meaning":"A vertical structural support","synonyms":"-"}]},{"id":"ana-C10Q14","q":"SEDATIVE : PACIFY","opts":{"A":"scalpel : cauterize","B":"analgesic : discomfit","C":"surgery : operate","D":"antiseptic : Sterilize","E":"stimulant : induce"},"ans":"D","exp":"Relationship: Object : Its Primary Function. Logic: A Sedative's main function is to calm someone or induce sleep, expressed in one word as Pacify. Similarly, an Antiseptic's main function is to make something germ-free or clean, called Sterilize. Verification: 'The function of a sedative is to pacify,' and similarly, 'The function of an antiseptic is to sterilize.' Option elimination: (A) scalpel : cauterize - a Scalpel is used for cutting, but closing a wound by burning it (Cauterize) isn't its primary function; that's usually the job of an electro-cautery machine. (B) analgesic : discomfit - an Analgesic reduces pain, but 'Discomfit' means putting into discomfort. This is opposite or inconsistent. (C) surgery : operate - surgery and operate are nearly synonymous, but surgery itself isn't an 'object' that performs the action of 'operating'; rather surgery itself is a process. (E) stimulant : induce - a Stimulant can induce something, but this isn't a specific medical function like 'Sterilize' or 'Pacify.' Tip: When the name of a medicine is given, pay attention to its function or 'Pharmacological effect.' A Sedative's function is Pacifying, and an Antiseptic's function is Sterilizing.","src":"-","vocab":[{"word":"Pacify","meaning":"To calm/soothe","synonyms":"-"},{"word":"Sterilize","meaning":"To make germ-free","synonyms":"-"},{"word":"Discomfit","meaning":"To put into a state of unease","synonyms":"-"}]},{"id":"ana-C10Q15","q":"AUTHORITATIVE : ACCEPTANCE","opts":{"A":"conspicuous : attention","B":"nebulous : validation","C":"congruous : appropriation","D":"maudlin : passion","E":"tangible : substances"},"ans":"A","exp":"Relationship: Characteristic : Natural Result. Logic: When something is Authoritative, i.e., reliable and well-evidenced, it gains people's Acceptance. Similarly, when something is Conspicuous, i.e., extremely clear and eye-catching, it gains people's Attention. Vocabulary: Authoritative: reliable, evidence-based, or commanding (Reliable). Acceptance: recognition. Conspicuous: very noticeable (Noticeable). Attention: observation. Nebulous: vague or cloudy. Maudlin: excessively sentimental. Tip: When something gains a particular result because of a quality, pay attention to that flow. Just as being Authoritative ensures Acceptance, being Conspicuous ensures Attention. Both are the natural outward expression of a specific quality.","src":"-","vocab":[{"word":"Conspicuous","meaning":"Easily noticed","synonyms":"-"},{"word":"Nebulous","meaning":"Vague, unclear","synonyms":"-"},{"word":"Maudlin","meaning":"Excessively sentimental","synonyms":"-"}]},{"id":"ana-C10Q16","q":"ALACRITY : PROMPT","opts":{"A":"service : kind","B":"aggravation : temperamental","C":"intuition : impulsive","D":"acumen : shrewd","E":"sentiment : thoughtful"},"ans":"D","exp":"Relationship: Quality (trait) : Person possessing it. Logic: Just as someone with great eagerness or alacrity to do work is 'Prompt,' someone with sharp intelligence is 'Shrewd.' If a person has Alacrity (eagerness/readiness), they're called Prompt (quick to act). Similarly, if someone has Acumen (sharp intelligence/insight), they're called Shrewd (perceptive/cunning). Option elimination: (A) service : kind - service and kind have no direct grammatical or qualitative obligation requiring that performing service must mean being kind. (B) aggravation : temperamental - aggravation and being temperamental (moody) - a temperamental person can become aggravated, but this isn't a direct positive quality-and-adjective pairing like 'Alacrity-Prompt.' (C) intuition : impulsive - intuition is inner knowledge, but being impulsive means acting without thought. There's no direct match between them. (E) sentiment : thoughtful - sentiment means emotion, and thoughtful means contemplative. Having emotion doesn't guarantee being thoughtful; in fact the opposite is often the case. Tip: When a Noun and an Adjective are given, check whether that adjective is the 'core source' of that noun. Having Acumen makes a person Shrewd, just as having Alacrity makes a person Prompt. This is fundamentally an analogy about human intellect and efficiency.","src":"-","vocab":[{"word":"Alacrity","meaning":"Brisk eagerness/readiness","synonyms":"-"},{"word":"Acumen","meaning":"Sharp insight/judgment","synonyms":"-"},{"word":"Shrewd","meaning":"Astute, sharp-witted","synonyms":"-"}]},{"id":"ana-C10Q17","q":"UNDERSCORE : EMPHASIS","opts":{"A":"eradicate : destruction","B":"stigmatize : confrontation","C":"quantify : assessment","D":"brand : ownership","E":"log : record"},"ans":"E","exp":"Relationship: Action : Purpose, or fundamentally a Verb : Noun relationship. Logic: The purpose of marking a line under a piece of writing, or Underscoring it, is to give it importance or Emphasis. Similarly, the purpose of keeping a written note of information or an event in a diary or book, i.e., Logging it, is to keep a permanent proof or record of it, i.e., to Record it. Vocabulary: Underscore: to underline or give importance. Emphasis: stress, importance. Log: to record/register. Record: a document. Eradicate: to completely eliminate/destroy. Stigmatize: to label negatively. Option elimination: (A) eradicate : destruction - eradicate and destruction are nearly synonymous, expressing more the type or synonymy of the action than its purpose. Tip: Pay attention to this same pattern: Verb → Result (noun).","src":"Agrani Bank (SO)-2013","vocab":[{"word":"Underscore","meaning":"To underline/emphasize","synonyms":"-"},{"word":"Log","meaning":"To record formally","synonyms":"-"}]},{"id":"ana-C10Q18","q":"PREEMINENCE : IMPORTANCE","opts":{"A":"predestination : belief","B":"prefiguration : reality","C":"premeditation : execution","D":"predisposition : preference","E":"preponderance : weight"},"ans":"E","exp":"Relationship: Higher/Greater Degree : General Quality. Logic: When something's importance is far greater than others, or it stands above everything else, it's called Preeminence (excellence/supremacy). Similarly, when something's weight or influence is far greater in number or amount, it's called Preponderance (predominance in weight/number). Verification: 'Preeminence is a high degree of importance,' and similarly, 'Preponderance is a high degree of weight or amount.' Option elimination: (A) predestination : belief - predestination may be a belief, but it isn't a 'higher degree' of belief. (B) prefiguration : reality - prefiguration means a foreshadowing, and this is a relationship of something happening earlier versus later. (C) premeditation : execution - premeditation and execution denote a sequence of an action. (D) predisposition : preference - predisposition means an inclination toward something; this isn't an 'extreme form' of preference but rather something closer in meaning to it. Tip: Analogy solving strategy: 'Identify the relation → place the arrow → eliminate → apply to the abstract pair.'","src":"-","vocab":[{"word":"Preeminence","meaning":"Superiority, supremacy","synonyms":"-"},{"word":"Preponderance","meaning":"Superiority in weight/number","synonyms":"-"}]}]},{"id":"ana-11","title":"GRE Analogy Test-11","questions":[{"id":"ana-C11Q1","q":"DENTURE : TEETH","opts":{"A":"scarf : head","B":"toupee : hair","C":"fingernail : hand","D":"eyebrow : eye","E":"bandage : wound"},"ans":"B","exp":"Relationship: Artificial Substitute : Natural Body Part. A denture is the artificial replacement for natural teeth; a toupee is the artificial replacement for natural hair. (A) A scarf is just worn accessory, not a substitute for any missing body part. (C) A fingernail is a natural part of the hand (Part-Whole), not artificial. (D) An eyebrow is a natural feature above the eye, not a replacement for it. (E) A bandage protects a wound but doesn't replace or substitute for anything that's missing.","src":"-","vocab":[{"word":"Denture","meaning":"An artificial replacement for teeth","synonyms":"-"},{"word":"Toupee","meaning":"A wig/hairpiece covering baldness","synonyms":"-"}]},{"id":"ana-C11Q2","q":"PROFESSIONAL : ROOKIE","opts":{"A":"player : fan","B":"ranger : cowhand","C":"prisoner : thief","D":"soldier : recruit","E":"conductor : musician"},"ans":"D","exp":"Relationship: Experienced : Inexperienced, within the same field. A professional is experienced in their work; a rookie is the new, inexperienced version of that same role. A soldier is experienced and trained; a recruit is the inexperienced newcomer to military life - the exact same pattern. (A) Player and fan aren't the same role at different experience levels; a fan doesn't play. (B) Ranger and cowhand are simply two different professions, not stages of the same one. (C) A prisoner might be a thief, but that's not an experience-level relationship. (E) A conductor and musician are different roles within an orchestra, not the same role at different skill levels. Words like Rookie, Recruit, Neophyte, Tyro, and Novice all generally mean 'inexperienced newcomer' in the same field as an expert.","src":"-","vocab":[{"word":"Rookie","meaning":"A newcomer/novice","synonyms":"Neophyte, Tyro, Novice"}]},{"id":"ana-C11Q3","q":"SCRIPT : PLAY","opts":{"A":"refrain : song","B":"assignment : course","C":"score : symphony","D":"collection : story","E":"debate : candidate"},"ans":"C","exp":"Relationship: Written Blueprint : Performed Work. A script is the written text required to stage a play; a score is the written musical notation required to perform a symphony. Both are the essential written preparation behind a live performance. (A) A refrain is just one repeated part within a song (Part-Whole), not the song's full written blueprint. (B) An assignment is one piece of a course, not the entire course's written plan. (D) A collection is many stories grouped together (Group-Member), unrelated to a blueprint relationship. (E) Candidates participate in a debate, but there's no written-blueprint relationship between them.","src":"IBA (BBA) Admission 2005-06; IFIC Bank (PO)-2011","vocab":[{"word":"Score","meaning":"Written musical notation for a performance","synonyms":"-"}]},{"id":"ana-C11Q4","q":"BUOYANT : SINK","opts":{"A":"frozen : melt","B":"liquid : evaporate","C":"brittle : cleave","D":"insoluble : dissolve","E":"gaseous : expand"},"ans":"D","exp":"Relationship: Property : Impossible Result. Something buoyant cannot sink; something insoluble cannot dissolve. The first word's defining property makes the second word's action impossible. (A) Something frozen CAN melt with heat - this doesn't block the action, it's just a precondition. (B) Liquid CAN evaporate - no blocking relationship. (C) Brittle things actually DO cleave/break easily - this is a supporting relationship, not a blocking one. (E) Gaseous substances naturally DO expand - again supportive, not blocking. Watch for 'In-', 'Un-', 'Non-' prefixed words signaling that an action is being made impossible, e.g., Impermeable : Penetrate.","src":"-","vocab":[{"word":"Insoluble","meaning":"Incapable of being dissolved","synonyms":"-"},{"word":"Buoyant","meaning":"Able to float","synonyms":"-"}]},{"id":"ana-C11Q5","q":"CRAWL : PROCEED","opts":{"A":"plummet : descend","B":"nature : grow","C":"inundate : flood","D":"rampage : destroy","E":"dwindle : decrease"},"ans":"E","exp":"Relationship: Slow Manner of an Action. To crawl is to proceed slowly; to dwindle is to decrease slowly. Both pairs share the same 'gradual, slow' quality. (A) Plummet means descending very fast - this is the opposite speed (fast vs. crawl's slow). (B) Nature and grow have no direct verb-manner relationship here. (C) Inundate and flood are near-synonyms with no slowness implied. (D) Rampage means destroying violently and fast - again the opposite intensity. When options share the same general meaning-type, check the speed/intensity to find the real match.","src":"-","vocab":[{"word":"Dwindle","meaning":"To gradually decrease","synonyms":"-"}]},{"id":"ana-C11Q6","q":"ELEGY : SORROW","opts":{"A":"paean : distress","B":"encomium : criticism","C":"requiem : euphoria","D":"tirade : joy","E":"eulogy : admiration"},"ans":"E","exp":"Relationship: Medium of Expression : Emotion Conveyed. An elegy is a poem used to express sorrow; a eulogy is a speech used to express admiration/praise. (A) A paean is sung for joy or victory, not distress - opposite emotion. (B) An encomium means praise, but is paired here with criticism - opposite. (C) A requiem is music for the peace of the dead's soul, not for euphoria - mismatched emotion. (D) A tirade is an angry, bitter speech, the opposite of joy. Group these by emotion: sorrow = Elegy, Dirge, Threnody; praise = Eulogy, Panegyric, Paean; anger/blame = Tirade, Diatribe.","src":"-","vocab":[{"word":"Elegy","meaning":"A mournful poem","synonyms":"-"},{"word":"Eulogy","meaning":"A speech of praise","synonyms":"-"},{"word":"Paean","meaning":"A song of praise/triumph","synonyms":"-"}]},{"id":"ana-C11Q7","q":"FRIEZE : ORNAMENT","opts":{"A":"arch : divide","B":"relief : from","C":"arabesque : accentuate","D":"nave : border","E":"pillar : support"},"ans":"E","exp":"Relationship: Architectural Element : Its Primary Purpose. A frieze is an architectural feature whose main job is decoration/ornament; a pillar is an architectural feature whose main job is structural support. (A) An arch isn't built to divide anything - it's built for structural strength and aesthetics, so the pairing doesn't fit. (C) An arabesque is decorative, but its main job is beautifying, not 'accentuating' as a distinct function - the pillar/support link is far cleaner. (D) A nave is the main interior space of a church, not a border. Tip: in architecture analogies, identify each element's primary function.","src":"-","vocab":[{"word":"Frieze","meaning":"A decorative architectural band","synonyms":"-"},{"word":"Arabesque","meaning":"Intricate decorative ornamentation","synonyms":"-"}]},{"id":"ana-C11Q8","q":"DECELERATE : SPEED","opts":{"A":"desiccate : dryness","B":"extinguish : oxygen","C":"interpolate : interval","D":"decontaminate : sterility","E":"enervate : vitality"},"ans":"E","exp":"Relationship: Action that Reduces a Quality. To decelerate is to reduce speed; to enervate is to drain/reduce vitality. Both verbs decrease the noun that follows. (A) Desiccate means to dry out, which INCREASES dryness, not decreases it - opposite direction. (B) Extinguishing fire doesn't reduce oxygen; actually fire goes out from a LACK of oxygen, so the causal direction is reversed. (C) Interpolate means inserting something new into a gap, unrelated to reducing an interval. (D) Decontaminating INCREASES sterility, not decreases it - same directional problem as (A). Watch for 'De-' prefixed words (Decelerate, Decontaminate, Devalue) - they usually mean reducing or removing something, but check the direction carefully since some 'De-' words increase a quality instead.","src":"IBA-BBA Admission Test: 2005-06","vocab":[{"word":"Enervate","meaning":"To drain of energy/vitality","synonyms":"-"},{"word":"Desiccate","meaning":"To dry out thoroughly","synonyms":"-"}]},{"id":"ana-C11Q9","q":"DESPOTIC : TYRANNY","opts":{"A":"authoritarian : superiority","B":"skillful : celebrity","C":"generous : liberality","D":"suspect : illegality","E":"peaceful : benevolence"},"ans":"C","exp":"Relationship: Adjective : Defining Noun. A despotic ruler practices tyranny; a generous person practices liberality (generosity). The adjective and noun describe the exact same core trait. (A) Being authoritarian doesn't necessarily mean displaying 'superiority' as a direct defining trait. (B) Being skillful doesn't automatically make someone a celebrity - that's an achieved status, not an inherent quality. (D) Being suspected of something doesn't mean illegality is your defining characteristic. (E) Peaceful and benevolent are both positive but aren't necessarily the same trait (you can be peaceful without being especially kind). Check whether options form a clean Adjective : matching-Noun pair - here, (C) does so perfectly.","src":"-","vocab":[{"word":"Despotic","meaning":"Tyrannically ruling","synonyms":"-"},{"word":"Liberality","meaning":"Generosity","synonyms":"-"}]},{"id":"ana-C11Q10","q":"RUST : CORROSION","opts":{"A":"vapor : flammability","B":"dew : condensation","C":"crystal : purification","D":"solution : precipitation","E":"mold : disinfection"},"ans":"B","exp":"Relationship: Result : Natural Process. Rust forms as a result of the corrosion process; dew forms as a result of the condensation process. (A) Vapor has no process-and-result relationship with flammability here. (C) A crystal might result from a purification process, but this doesn't match the simple natural-physical-change pattern of rust/dew. (D) Precipitation actually removes solid material FROM a solution, which inverts the relationship rather than matching it. (E) Disinfection destroys mold rather than creating it - opposite direction entirely. Science analogies often follow 'Process and Result' logic: Condensation→Dew, Evaporation→Vapor, Corrosion→Rust.","src":"-","vocab":[{"word":"Corrosion","meaning":"Gradual destruction of metal","synonyms":"-"},{"word":"Condensation","meaning":"Vapor turning into liquid","synonyms":"-"}]},{"id":"ana-C11Q11","q":"CLAIM : LEGITIMATED","opts":{"A":"hypothesis : confirmed","B":"verdict : appealed","C":"counter argument : doubted","D":"proposition : repeated","E":"speculation : disbelieved"},"ans":"A","exp":"Relationship: Initial Unproven State : Validated Final State. A claim becomes legitimated once it's proven; a hypothesis becomes confirmed once it's tested and proven. (B) Appealing a verdict means challenging it, not validating it - opposite direction. (C) A counter-argument creates doubt about the original claim, the opposite of validation. (D) Simply repeating a proposition doesn't make it proven/accepted. (E) Speculation typically gets disbelieved, not validated - again opposite. Whenever the second word represents a 'success status' or 'final validated result' of the first, look for that same positive end-state in the answer.","src":"-","vocab":[{"word":"Legitimated","meaning":"Made legally/formally valid","synonyms":"-"}]},{"id":"ana-C11Q12","q":"ENCLOSE : PARENTHESES","opts":{"A":"abbreviate : brackets","B":"emphasize : hyphen","C":"separate : comma","D":"join : period","E":"omit : colon"},"ans":"C","exp":"Relationship: Function : Punctuation Mark. Parentheses are used to enclose extra information; a comma is used to separate parts of a sentence. (A) Brackets aren't mainly used to abbreviate - they're used to add extra/clarifying information, similar to parentheses, not to shorten text. (B) A hyphen connects words; emphasis is usually shown with italics or underlining, not a hyphen. (D) A period ends a sentence; it doesn't join anything. (E) A colon introduces a list or explanation; it doesn't denote omission. Know your punctuation marks' actual grammatical functions - e.g., Apostrophe : Possession.","src":"Warid Telecom-2006, Mercantile Bank-2006, Eastern Bank-2005","vocab":[{"word":"Parentheses","meaning":"Punctuation marks () enclosing extra info","synonyms":"-"}]},{"id":"ana-C11Q13","q":"ANTENNA : SIGNAL","opts":{"A":"bread : grain","B":"story : reporter","C":"stem : flower","D":"net : fish","E":"telegram : sender"},"ans":"D","exp":"Relationship: Tool : Thing it Captures. An antenna is used to capture a signal; a net is used to capture fish. (A) Bread is made FROM grain (Source-Product), not a tool that 'captures' grain. (B) A reporter creates a story, but a reporter is not a tool, and 'capturing' doesn't fit. (C) A stem supports a flower (Part-Whole), not a capturing tool. (E) A sender sends a telegram, but a sender isn't a tool used to 'capture' anything. Whenever a device/tool relates to something, ask: what is this tool's primary function? An antenna's job is to receive/capture signals, exactly matching a net's job of capturing fish.","src":"Bangladesh Bank (AD)-2013; CU (B-Unit) 2013-14; Eastern Bank-2005","vocab":[{"word":"Antenna","meaning":"A device for receiving signals","synonyms":"-"}]},{"id":"ana-C11Q14","q":"WAG : HUMOROUS","opts":{"A":"ruffian : frightened","B":"spendthrift : inattentive","C":"dolt : stupid","D":"pirate : merciless","E":"sinner : repentant"},"ans":"C","exp":"Relationship: Person : Defining Trait. A wag (a witty/joking person) is by definition humorous; a dolt (a foolish person) is by definition stupid. (A) A ruffian (thug) generally makes others frightened, not himself - this is reversed/opposite. (B) A spendthrift's defining trait is wasting money, not inattentiveness - mismatched trait. (D) A pirate may be merciless, but that's not the word's strict defining feature the way 'humorous' defines a wag. (E) A sinner may or may not be repentant - it's not an inherent defining quality. Check whether the second word is truly the FIRST word's built-in dictionary definition, not just a common associated trait.","src":"-","vocab":[{"word":"Wag","meaning":"A witty, joking person","synonyms":"-"},{"word":"Dolt","meaning":"A stupid person","synonyms":"-"}]},{"id":"ana-C11Q15","q":"FIRM : IRONCLAD","opts":{"A":"bruised : broken","B":"polished : shining","C":"smart : brilliant","D":"hard : stiff","E":"jovial : merry"},"ans":"C","exp":"Relationship: Degree of Intensity. Ironclad is an extreme, unbreakable form of firm; brilliant is an extreme, exceptional form of smart. (A) Bruised and broken are different and unrelated states of injury, not a normal-to-extreme scale of the same quality. (B) Polished causing shine is more cause-and-effect than a simple intensity upgrade. (D) Hard and stiff are near-synonyms without one being a clearly 'extreme' version of the other. (E) Jovial and merry are also near-synonyms at roughly the same intensity level. When two words express the same quality but one feels noticeably 'stronger,' that's the intensity pattern to match - e.g., Warm:Hot, Smart:Brilliant.","src":"-","vocab":[{"word":"Ironclad","meaning":"Extremely firm, unbreakable","synonyms":"-"}]},{"id":"ana-C11Q16","q":"FOIL : METAL","opts":{"A":"pebble : concrete","B":"suede : leather","C":"glaze : pottery","D":"veneer : wood","E":"paper : cardboard"},"ans":"D","exp":"Relationship: Thin Layer/Form : Original Material. When metal is pressed into an extremely thin sheet, it's called foil; when wood is sliced into an extremely thin sheet, it's called veneer. Both terms describe the same material in an ultra-thin sheet form, often used as a surface covering. (A) A pebble is a piece of concrete's raw material, not a thin-sheet form of finished concrete. (C) Glaze is a coating applied ON pottery, not a thin form of the pottery's own clay material. (E) Paper and cardboard are different, separate products (though both made from pulp), not a thin-vs-thick form of the same single material.","src":"IBA-BBA Admission Test: 2005-06","vocab":[{"word":"Veneer","meaning":"A thin decorative layer of wood","synonyms":"-"},{"word":"Foil","meaning":"A very thin sheet of metal","synonyms":"-"}]},{"id":"ana-C11Q17","q":"LEAVE : ABSCOND","opts":{"A":"take : steal","B":"evacuate : flee","C":"interest : astound","D":"build : renovate","E":"evaluate : downgrade"},"ans":"A","exp":"Relationship: Neutral/Legal Action : Illegal/Secretive Version of Same Action. To leave is the normal, permitted version; to abscond is to leave illegally/secretly. To take is the normal, permitted version; to steal is to take illegally. Both pairs show the same base action turning illegal in the second word. (B) Evacuate and flee are both about escaping danger - neither is specifically the 'illegal' version of the other. (C) Interest and astound are unrelated, with no legal/illegal contrast. (D) Build and renovate are both constructive, neither secretive nor illegal. (E) Evaluate and downgrade have no legal-vs-illegal logic between them. This pattern is called 'Legal vs. Illegal' or 'Open vs. Secret' - other examples include Eat : Guzzle or Walk : Amble.","src":"IBA-BBA Admission Test: 2005-06","vocab":[{"word":"Abscond","meaning":"To leave secretly/illegally","synonyms":"-"}]},{"id":"ana-C11Q18","q":"QUAFF : SIP","opts":{"A":"bolt : run","B":"punch : hit","C":"gnaw : nibble","D":"trudge : plod","E":"stride : march"},"ans":"C","exp":"Relationship: Excessive/Vigorous Action : Mild/Gentle Action. To quaff is to drink a large amount quickly; to sip is to drink in small, gentle amounts. To gnaw is to bite hard and aggressively; to nibble is to bite in small, gentle amounts - the exact same big-vs-small contrast. (A) Bolt and run are both fast actions with no big-vs-small food/drink-style contrast. (B) Punch is one forceful hit-type, with no gentle counterpart implied. (D) Trudge and plod are near-synonyms (both tired, slow walking) - no intensity contrast. (E) Stride and march are also both about confident, larger walking - no big-vs-small contrast. For eating/drinking analogies, remember the scale: Quaff (a lot) > Drink (normal) > Sip (a little); Guzzle/Gorge (a lot) > Eat (normal) > Nibble (a little).","src":"-","vocab":[{"word":"Quaff","meaning":"To drink heartily","synonyms":"-"},{"word":"Gnaw","meaning":"To bite/chew persistently","synonyms":"-"}]}]},{"id":"ana-12","title":"GRE Analogy Test-12","questions":[{"id":"ana-C12Q1","q":"ABSORB : SPONGE","opts":{"A":"spin : wool","B":"stain : detergent","C":"pump : gasoline","D":"seal : caulk","E":"sharpen : pencil"},"ans":"D","exp":"Relationship: Tool : Its Primary Function. A sponge's main job is to absorb liquid; caulk's main job is to seal gaps. (A) Wool is spun into yarn, but wool itself doesn't 'spin' anything - reversed roles. (B) Detergent removes stains; it doesn't act as a holder/absorber of stains the way a sponge absorbs liquid - actually opposite function. (C) Gasoline is moved by a pump, but gasoline itself has no pumping function. (E) A pencil is sharpened by a sharpener; the pencil doesn't sharpen itself.","src":"Warid Telecom-2006","vocab":[{"word":"Caulk","meaning":"A sealant for gaps/joints","synonyms":"-"}]},{"id":"ana-C12Q2","q":"DALLY : TIME","opts":{"A":"trespass : land","B":"squander : money","C":"shirk : task","D":"achieve : victory","E":"harbor : safety"},"ans":"B","exp":"Relationship: Wasteful Action : Resource Wasted. To dally is to waste time; to squander is to waste money. (A) Trespass means illegally entering land, not wasting it. (C) Shirk means avoiding a task, not wasting it through overuse - different kind of negative action. (D) Achieving victory is positive, the opposite of wasting something. (E) Harbor means sheltering/protecting, not wasting anything.","src":"-","vocab":[{"word":"Dally","meaning":"To waste time idly","synonyms":"-"},{"word":"Squander","meaning":"To waste money/resources","synonyms":"-"}]},{"id":"ana-C12Q3","q":"KNIT : YARN","opts":{"A":"darn : sock","B":"plait : hair","C":"crochet : hook","D":"braid : knot","E":"weave : loom"},"ans":"B","exp":"Relationship: Action : Material Used. Yarn is knitted to make fabric; hair is plaited (braided) to make a hairstyle. Both pairs show an action performed ON a specific raw material. (A) Darn means repairing a sock, not the action of creating fabric from a raw material. (C) Crochet uses a hook, which is a TOOL, not the raw material being worked - mismatched relationship type. (D) Braid and knot are both actions/results, but knot itself is not a raw material like yarn or hair. (E) Loom is the TOOL used to weave, not the material being woven - same tool/material mismatch as (C).","src":"-","vocab":[{"word":"Plait","meaning":"To braid","synonyms":"Braid"}]},{"id":"ana-C12Q4","q":"DECIBEL : LOUDNESS","opts":{"A":"circumference : circle","B":"spectrum : color","C":"light-year : distance","D":"meter : mile","E":"clock : duration"},"ans":"C","exp":"Relationship: Unit : Quantity Measured. A decibel measures loudness; a light-year measures distance. (A) Circumference is a circle's own boundary measurement, not a separate unit applied to something else. (B) Spectrum is the range of colors, not a unit used to measure color. (D) Meter and mile are BOTH units of the same thing (length) - no unit-and-measured-quantity relationship here. (E) A clock is an instrument, not a unit itself; the actual unit of duration is seconds/minutes. Remember key units: Richter scale:Intensity, Ampere:Current, Joule:Energy, Knot:Speed.","src":"-","vocab":[{"word":"Decibel","meaning":"Unit of sound loudness","synonyms":"-"}]},{"id":"ana-C12Q5","q":"EMBEZZLE : FUNDS","opts":{"A":"wield : influence","B":"exploit : victim","C":"usurp : power","D":"overcome : combatant","E":"impede : obstacle"},"ans":"C","exp":"Relationship: Illegal Seizure : Thing Seized. To embezzle is to illegally take funds; to usurp is to illegally take power. (A) Wielding influence is a normal, legitimate action, not an illegal seizure. (B) Exploiting a victim is negative, but it's not specifically about illegally 'taking over' something the way embezzlement and usurpation are. (D) Overcoming a combatant is a competitive win, not an illegal takeover. (E) Impeding an obstacle doesn't fit - you don't 'take' an obstacle.","src":"CU (B-Unit): 2013-14, EMBA-April-2010: 16th Batch, Evening MBM-16th Batch","vocab":[{"word":"Embezzle","meaning":"To steal entrusted funds","synonyms":"-"},{"word":"Usurp","meaning":"To seize power illegally","synonyms":"-"}]},{"id":"ana-C12Q6","q":"NEOPHYTE : EXPERIENCE","opts":{"A":"diplomat : negotiation","B":"misanthrope : cynicism","C":"umpire : reconciliation","D":"guru : respect","E":"boor : sensitivity"},"ans":"E","exp":"Relationship: Person : Quality They Lack. A neophyte (beginner) lacks experience; a boor (rude person) lacks sensitivity/manners. (A) A diplomat's defining job IS negotiation - they have it, not lack it. (B) A misanthrope has PLENTY of cynicism - this is a quality they possess, not lack. (C) An umpire's job involves making calls/decisions, not specifically reconciliation, and that's not framed as a lack. (D) A guru typically EARNS respect - again a quality gained, not lacked. Useful 'lacks' pairs: Agnostic:Belief, Amateur:Skill, Neophyte:Experience, Guiltless:Sin.","src":"-","vocab":[{"word":"Boor","meaning":"A rude, insensitive person","synonyms":"-"}]},{"id":"ana-C12Q7","q":"REFINE : PURIFICATION","opts":{"A":"deflect : conformity","B":"attenuate : rarefaction","C":"regene
