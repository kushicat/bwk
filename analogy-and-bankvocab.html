]},{"id":"bank-420","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'OPPORTUNIST'","opts":{"A":"man of principle","B":"fatalist","C":"fledgling","D":"colleague"},"ans":"A","exp":"An 'opportunist' acts for self-gain without principle; opposite is 'man of principle.'","src":null,"vocab":[]},{"id":"bank-421","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'AMBIGUOUS'","opts":{"A":"confusing","B":"lucid","C":"desirous","D":"Obfuscate"},"ans":"B","exp":"'Ambiguous' (unclear) is opposite to 'lucid' (clear).","src":null,"vocab":[]},{"id":"bank-422","q":"Choose the word or phrase that is closest in opposite meaning to the given word: 'PERSISTENCE'","opts":{"A":"irrelevance","B":"inconsistency","C":"inequality","D":"intemperance"},"ans":"B","exp":"'Persistence' (continuing steadily) is opposite to 'inconsistency.'","src":null,"vocab":[]},{"id":"bank-423","q":"The Synonym of 'genesis' is:","opts":{"A":"Generalized","B":"Beginning","C":"Ending","D":"Magnanimous","E":"Greater"},"ans":"B","exp":"'Genesis' means origin/the beginning of something.","src":null,"vocab":[]},{"id":"bank-424","q":"Before adapting to changes in value, many prefer to _____, to _____ the universally agreed on principles that have been upheld for centuries.","opts":{"A":"innovate….protect","B":"resist….defend","C":"ponder….subvert","D":"vacillate.....publicize","E":"revert….ignore"},"ans":"B","exp":"People 'resist' change in order to 'defend' long-held traditional principles.","src":null,"vocab":[]},{"id":"bank-425","q":"Which of the following would be analogous to 'Refinery-Petroleum'?","opts":{"A":"mill : grain","B":"mine : ore","C":"warehouse : merchandise","D":"generator : electricity","E":"forest : lumber"},"ans":"A","exp":"A refinery processes raw petroleum into usable products; similarly, a mill processes raw grain into usable flour.","src":null,"vocab":[]},{"id":"bank-426","q":"Find out the appropriate ANTONYMS: 'Gargantuan'","opts":{"A":"fearful","B":"tiny in size","C":"eager","D":"success","E":"rare"},"ans":"B","exp":"'Gargantuan' means enormous; its opposite is 'tiny in size.'","src":null,"vocab":[]},{"id":"bank-427","q":"Find out the appropriate ANTONYMS: 'Vacillate'","opts":{"A":"irritate","B":"hesitate","C":"determine","D":"debate","E":"amplify"},"ans":"C","exp":"'Vacillate' means to waver/be indecisive; its opposite is 'determine' (to decide firmly).","src":null,"vocab":[]},{"id":"bank-428","q":"Match the best alternative to the underlined words: Dwelling taxes are based on an estimate of the value of one's property.","opts":{"A":"appraisal","B":"forecast","C":"diagnosis","D":"outline","E":"load"},"ans":"A","exp":"'Estimate' (of property value) is closest to 'appraisal' (a formal valuation).","src":null,"vocab":[]},{"id":"bank-429","q":"Choose the opposite of the capitalized word: 'ABATE'","opts":{"A":"praise","B":"grant","C":"soothe","D":"increase","E":"irritate"},"ans":"D","exp":"'Abate' means to reduce/lessen; its opposite is 'increase.'","src":null,"vocab":[]},{"id":"bank-430","q":"Choose the opposite of the capitalized word: 'FROWN'","opts":{"A":"appreciate","B":"criticize","C":"regret","D":"accept","E":"reject"},"ans":"A","exp":"'Frown' shows disapproval; its opposite is 'appreciate' (to value positively).","src":null,"vocab":[]},{"id":"bank-431","q":"Choose a lettered word similar in meaning to the capitalized one: 'Head and Ears'","opts":{"A":"effective","B":"close","C":"complete","D":"attention","E":"sink"},"ans":"C","exp":"'Head and ears' (as in 'head over ears in love') is an idiom meaning completely/thoroughly.","src":null,"vocab":[]},{"id":"bank-432","q":"Choose a lettered word similar in meaning to the capitalized one: 'Eat into vitals'","opts":{"A":"life","B":"escape","C":"interrupt","D":"unveil","E":"swallow"},"ans":"E","exp":"'Eat into vitals' is an idiom meaning to consume/destroy something essential from within, closest to 'swallow' (to consume/destroy).","src":null,"vocab":[]},{"id":"bank-433","q":"Fill in the Blanks with appropriate words: The property is the _____ among the brothers.","opts":{"A":"apple of discord","B":"orange of discord","C":"apple and orange","D":"discord of apple","E":"discord of orange"},"ans":"A","exp":"'Apple of discord' is an idiom meaning the cause/subject of a dispute.","src":null,"vocab":[]},{"id":"bank-434","q":"Fill in the Blanks with appropriate words: The person is nothing more than _____.","opts":{"A":"rank and file","B":"rank profile","C":"square meal","D":"white elephant","E":"mare's nest"},"ans":"A","exp":"'Rank and file' is an idiom meaning ordinary members/common people, without special status.","src":null,"vocab":[]},{"id":"bank-435","q":"'Odds and ends' means.","opts":{"A":"excuse","B":"difficulty","C":"dispute","D":"small things","E":"sad ending"},"ans":"D","exp":"'Odds and ends' is an idiom meaning miscellaneous small items/things.","src":null,"vocab":[]},{"id":"bank-436","q":"'Dead and buried' means.","opts":{"A":"dull","B":"complete stop","C":"exhausted","D":"closed","E":"Completely forgotten"},"ans":"E","exp":"'Dead and buried' is an idiom meaning something is completely finished and forgotten forever.","src":null,"vocab":[]},{"id":"bank-437","q":"Select the appropriate Idioms: He looks very tough, but he is a nice man.","opts":{"A":"at length","B":"in length","C":"of length","D":"at last","E":"at bottom"},"ans":"E","exp":"'At bottom' is an idiom meaning fundamentally/in one's true nature, fitting the contrast between his appearance and true character.","src":null,"vocab":[]},{"id":"bank-438","q":"Fill in the blanks with appropriate Idioms: I was very offended by his _____ attitude.","opts":{"A":"flat","B":"smooth","C":"hot and cold","D":"cut and dried","E":"fore and sword"},"ans":"D","exp":"'Cut and dried' is an idiom meaning fixed/routine and inflexible, fitting an offensive, rigid attitude.","src":null,"vocab":[]},{"id":"bank-439","q":"His dealings are clear and _____.","opts":{"A":"above board","B":"in course","C":"on course","D":"at large","E":"at wit's end"},"ans":"A","exp":"'Above board' is an idiom meaning honest and legitimate, fitting with 'clear' dealings.","src":null,"vocab":[]},{"id":"bank-440","q":"Choose the word which is most nearly similar: 'DILIGENT'","opts":{"A":"laid back","B":"large","C":"Industrious","D":"Lethargic","E":"None of them"},"ans":"C","exp":"'Diligent' means hard-working, synonymous with 'industrious.'","src":null,"vocab":[]},{"id":"bank-441","q":"Choose the word which is most nearly similar: 'INFLATED'","opts":{"A":"exorbitant","B":"reasonable","C":"sensible","D":"low","E":"None of them"},"ans":"A","exp":"'Inflated' (prices) means excessively high, closest to 'exorbitant.'","src":null,"vocab":[]},{"id":"bank-442","q":"Choose the word which is most nearly similar: 'INGENUOUS'","opts":{"A":"sophisticated","B":"clever","C":"cunning","D":"devious","E":"None of them"},"ans":"E","exp":"'Ingenuous' means naive/simple, opposite of all the listed (clever/cunning/devious) options.","src":null,"vocab":[]},{"id":"bank-443","q":"Choose the word which is most nearly similar: 'ENHANCE'","opts":{"A":"doubt","B":"improve","C":"indolent","D":"agree","E":"None of them"},"ans":"B","exp":"'Enhance' means to improve/increase quality, synonymous with 'improve.'","src":null,"vocab":[]},{"id":"bank-444","q":"Choose the word which is most nearly similar: 'HYPOTHETICAL'","opts":{"A":"logical","B":"alternative","C":"assumed","D":"reasonable","E":"None of them"},"ans":"C","exp":"'Hypothetical' means based on an assumption, closest to 'assumed.'","src":null,"vocab":[]},{"id":"bank-445","q":"Choose the word closest in opposite meaning: 'DEBACLE'","opts":{"A":"decide","B":"success","C":"discord","D":"debate","E":"None of them"},"ans":"B","exp":"'Debacle' (sudden total failure) is opposite to 'success.'","src":null,"vocab":[]},{"id":"bank-446","q":"Choose the word closest in opposite meaning: 'BONA-FIDE'","opts":{"A":"honest","B":"pure","C":"similar","D":"spurious","E":"None of them"},"ans":"D","exp":"'Bona-fide' (genuine) is opposite to 'spurious' (fake).","src":null,"vocab":[]},{"id":"bank-447","q":"Choose the word closest in opposite meaning: 'UNTENABLE'","opts":{"A":"indefensible","B":"weak","C":"maintainable","D":"shaky","E":"None of them"},"ans":"C","exp":"'Untenable' (cannot be defended) is opposite to 'maintainable' (able to be supported).","src":null,"vocab":[]},{"id":"bank-448","q":"Choose the word closest in opposite meaning: 'EXPEDITE'","opts":{"A":"accelerate","B":"advance","C":"rush","D":"impede","E":"None of them"},"ans":"D","exp":"'Expedite' (to speed up) is opposite to 'impede' (to hinder).","src":null,"vocab":[]},{"id":"bank-449","q":"Choose the word closest in opposite meaning: 'LETHARGIC'","opts":{"A":"energetic","B":"lazy","C":"indifferent","D":"bored","E":"None of them"},"ans":"A","exp":"'Lethargic' (sluggish) is opposite to 'energetic.'","src":null,"vocab":[]},{"id":"bank-450","q":"Choose the pair that best matches the relationship of the capitalized words: RACQUET : TENNIS","opts":{"A":"Driver : Springboard","B":"Horse : Polo","C":"Bat : Cricket","D":"Gun : Hunting","E":"None of them"},"ans":"C","exp":"A racquet is the equipment used to play tennis; similarly, a bat is the equipment used to play cricket.","src":null,"vocab":[]},{"id":"bank-451","q":"Choose the pair that best matches the relationship of the capitalized words: SQUARE : CUBE","opts":{"A":"triangle : hexagon","B":"trapezoid : quadrangle","C":"circle : sphere","D":"addition : subtraction","E":"None of them"},"ans":"C","exp":"A cube is the 3D version of a square; similarly, a sphere is the 3D version of a circle.","src":null,"vocab":[]},{"id":"bank-452","q":"Choose the pair that best matches the relationship of the capitalized words: CLOTHES : LUGGAGE","opts":{"A":"Baggage : train","B":"Package : post office","C":"Documents : briefcase","D":"Airmail : mail carrier","E":"None of them"},"ans":"C","exp":"Clothes are carried inside luggage; similarly, documents are carried inside a briefcase.","src":null,"vocab":[]},{"id":"bank-453","q":"Choose the pair that best matches the relationship of the capitalized words: GOVERNMENT : TAX","opts":{"A":"Student : fees","B":"Orange : price","C":"Company : profit","D":"chairman : parliament","E":"None of them"},"ans":"C","exp":"A government's core revenue source is tax; similarly, a company's core revenue/goal is profit.","src":null,"vocab":[]},{"id":"bank-454","q":"Choose the pair that best matches the relationship of the capitalized words: DEGREE : TEMPERATURE","opts":{"A":"Ounce : Weight","B":"Fathom : Volume","C":"Mass : Energy","D":"Light: Heat","E":"None of them"},"ans":"A","exp":"Degree is a unit used to measure temperature; similarly, ounce is a unit used to measure weight.","src":null,"vocab":[]},{"id":"bank-455","q":"Choose the word that best substitutes the given sentence(s): A Person who helps you break the law-","opts":{"A":"Spy","B":"Collaborator","C":"Ally","D":"Accomplice"},"ans":"D","exp":"An 'accomplice' is someone who helps another commit a crime/break the law.","src":null,"vocab":[]},{"id":"bank-456","q":"Choose the word that best substitutes the given sentence(s): One who uses fear as a weapon of power-","opts":{"A":"Terrorist","B":"Militant","C":"Extremist","D":"Anarchist"},"ans":"A","exp":"A 'terrorist' uses fear/terror as a tool for political power.","src":null,"vocab":[]},{"id":"bank-457","q":"Choose the word that best substitutes the given sentence(s): One who plays a game for pleasure and not professionally-","opts":{"A":"Veteran","B":"Player","C":"Connoisseur","D":"Amateur"},"ans":"D","exp":"An 'amateur' plays for love of the activity, not as a profession.","src":null,"vocab":[]},{"id":"bank-458","q":"Choose the word that best substitutes the given sentence(s): The branch of medical science which deals with the problems of the old-","opts":{"A":"Oncology","B":"Obstetric","C":"Geriatrics","D":"Endocrinology"},"ans":"C","exp":"'Geriatrics' is the branch of medicine dealing with health issues of elderly people.","src":null,"vocab":[]},{"id":"bank-459","q":"Choose the word that best substitutes the given sentence(s): Explicit undertaking to do something-","opts":{"A":"Agreement","B":"Decision","C":"Settlement","D":"Promise"},"ans":"D","exp":"An explicit undertaking to do something is a 'promise.'","src":null,"vocab":[]},{"id":"bank-460","q":"Fill in the blanks with the most appropriate word pair: He is so _____ that everyone is always _____ to help him in his work.","opts":{"A":"helpful, reluctant","B":"aloof, cooperative","C":"adamant, enthusiastic","D":"miserly, ignorant","E":"magnanimous, eager"},"ans":"E","exp":"He is 'magnanimous' (generous), so people are naturally 'eager' to help him — a positive cause-and-effect relationship.","src":null,"vocab":[]},{"id":"bank-461","q":"Fill in the blanks with the most appropriate word pair: Due to _____ rainfall this year, there will be _____ cut in water supply.","opts":{"A":"enough, substantial","B":"meager, least","C":"sufficient, no","D":"surplus, abundant","E":"abundant, considerable"},"ans":"C","exp":"If rainfall is 'sufficient' (adequate), there will be 'no' cut in water supply — a logical cause-effect relationship.","src":null,"vocab":[]},{"id":"bank-462","q":"Fill in the blanks with the most appropriate word pair: We can _____ to travel by air, but we _____ train journey.","opts":{"A":"plan, enjoy","B":"aspire, commute","C":"afford, prefer","D":"decide, undertook","E":"decline, accepted"},"ans":"C","exp":"'But' signals contrast: they can 'afford' air travel yet still 'prefer' train journeys.","src":null,"vocab":[]},{"id":"bank-463","q":"Fill in the blanks with the most appropriate word pair: I shall _____ him if he _____ to me for his misconduct.","opts":{"A":"pardon, commits","B":"forgive, apologizes","C":"reprimand, commands","D":"punish, abuses","E":"forgive, refrains"},"ans":"B","exp":"Forgiveness logically follows if he 'apologizes' for his misconduct.","src":null,"vocab":[]},{"id":"bank-464","q":"Fill in the blanks with the most appropriate word pair: The Deputy Manager _____ to resign because all his proposals were _____ down by his superiors.","opts":{"A":"offered, thrown","B":"gave, held","C":"began, kept","D":"willing, knocked","E":"threatened, turned"},"ans":"E","exp":"His proposals were 'turned down' (rejected) by superiors, so he 'threatened' to resign.","src":null,"vocab":[]},{"id":"bank-465","q":"Choose the pair that best matches the relationship of the capitalized words: SYMPHONY : COMPOSER","opts":{"A":"rain : flood","B":"light : switch","C":"novel : author","D":"song : music","E":"brag : braggart"},"ans":"C","exp":"A symphony is created by a composer; similarly, a novel is created by an author — both are product:creator pairs.","src":null,"vocab":[]},{"id":"bank-466","q":"Choose the pair that best matches the relationship of the capitalized words: CIRCLE : ARC","opts":{"A":"line : segment","B":"part : whole","C":"percent : fraction","D":"small : big","E":"mass : volume"},"ans":"A","exp":"An arc is a part of a circle; similarly, a segment is a part of a line.","src":null,"vocab":[]},{"id":"bank-467","q":"Choose the pair that best matches the relationship of the capitalized words: FACADE : BUILDING","opts":{"A":"fence : garden","B":"dial : watch","C":"neck : bottle","D":"page : book","E":"veneer : exterior"},"ans":"B","exp":"A facade is the visible front face of a building; similarly, a dial is the visible front face of a watch.","src":null,"vocab":[]},{"id":"bank-468","q":"Choose the pair that best matches the relationship of the capitalized words: Listen : Recording","opts":{"A":"Carve : statue","B":"reproduce : plan","C":"review : book","D":"frame : painting","E":"view : photograph"},"ans":"E","exp":"We listen (sense) to a recording; similarly, we view (sense) a photograph — both pair an action of perception with its medium.","src":null,"vocab":[]},{"id":"bank-469","q":"Choose the pair that best matches the relationship of the capitalized words: UNEQUIVOCAL : CLEAR","opts":{"A":"frisky : playful","B":"gloss : agile","C":"excuse : barrier","D":"genuine : invisible","E":"acrimonious : blase"},"ans":"A","exp":"'Unequivocal' and 'clear' are synonyms; similarly, 'frisky' and 'playful' are synonyms.","src":null,"vocab":[]},{"id":"bank-470","q":"Choose the best replacement for the underlined part: The new ambassador offered his credentials to the president.","opts":{"A":"gave","B":"notified","C":"Bio-data","D":"presented"},"ans":"D","exp":"In diplomatic contexts, 'presenting credentials' is the standard formal expression.","src":null,"vocab":[]},{"id":"bank-471","q":"Choose the best replacement for the underlined part: The man did the work in the nick of time.","opts":{"A":"right on time","B":"after deadline","C":"long before deadline","D":"very last minute"},"ans":"D","exp":"'In the nick of time' means at the very last possible moment.","src":null,"vocab":[]},{"id":"bank-472","q":"Choose the best replacement for the underlined part: His poor health is the main road block to his promotion.","opts":{"A":"obstacle","B":"worry","C":"danger","D":"disaster"},"ans":"A","exp":"'Road block' (used metaphorically) means an obstacle/barrier.","src":null,"vocab":[]},{"id":"bank-473","q":"Find Synonym- By and large:","opts":{"A":"Very large","B":"Mostly","C":"Everywhere","D":"Far away","E":"Very far away"},"ans":"B","exp":"'By and large' means on the whole/mostly.","src":null,"vocab":[]},{"id":"bank-474","q":"Find Synonym- In black and white:","opts":{"A":"Not colorful","B":"Ugly","C":"Simple","D":"in writing","E":"Plain"},"ans":"D","exp":"'In black and white' is an idiom meaning written down formally (as evidence/proof).","src":null,"vocab":[]},{"id":"bank-475","q":"Fill in the blank with the best option: You should _____ swimming.","opts":{"A":"start up","B":"get up","C":"get off","D":"take up","E":"take off"},"ans":"D","exp":"'Take up' means to begin a new hobby/activity.","src":null,"vocab":[]},{"id":"bank-476","q":"Fill in the blank with the best option: The president assented _____ the bill.","opts":{"A":"at","B":"by","C":"to","D":"into","E":"with"},"ans":"C","exp":"'Assent to' is the correct preposition pairing meaning to give consent/approval to something.","src":null,"vocab":[]},{"id":"bank-477","q":"The Antonym of the word 'extrinsic' is:","opts":{"A":"plenty","B":"extreme","C":"behind","D":"internal","E":"Outside"},"ans":"D","exp":"'Extrinsic' means external/coming from outside; its opposite is 'internal.'","src":null,"vocab":[]},{"id":"bank-478","q":"Find the Synonym of the word 'Remote':","opts":{"A":"automatic","B":"distant","C":"savage","D":"mean","E":"great"},"ans":"B","exp":"'Remote' means far away/isolated, synonymous with 'distant.'","src":null,"vocab":[]},{"id":"bank-479","q":"What is the opposite of 'Magnify'?","opts":{"A":"Forgive","B":"Reduce","C":"Extract","D":"Electrify"},"ans":"B","exp":"'Magnify' means to enlarge; its opposite is 'reduce.'","src":null,"vocab":[]},{"id":"bank-480","q":"What is the meaning of 'deficit'?","opts":{"A":"Defeat","B":"Discourage","C":"Shortage","D":"Describe"},"ans":"C","exp":"'Deficit' means an amount by which something falls short, i.e., shortage.","src":null,"vocab":[]},{"id":"bank-481","q":"What is the Synonym of 'ensure'?","opts":{"A":"Make progress","B":"Encourage","C":"Effect","D":"Make certain"},"ans":"D","exp":"'Ensure' means to make certain that something will occur.","src":null,"vocab":[]},{"id":"bank-482","q":"Fill in the gaps: Life, as the film demonstrates, is too complex for _____ endings.","opts":{"A":"superficial","B":"intricate","C":"Straightforward","D":"occult","E":"None of these"},"ans":"C","exp":"Since life is 'too complex,' it does not lend itself to simple/'straightforward' endings.","src":null,"vocab":[]},{"id":"bank-483","q":"Fill in the gaps: In the days of the last owner, the stately home was run on a _____ scale; no guest left without remarking on the quality and _____ of food and drink.","opts":{"A":"lavish...profusion","B":"ornate...paucity","C":"modest...plenty","D":"Opulent...dearth","E":"None of these"},"ans":"A","exp":"A stately home would be run on a 'lavish' (extravagant) scale, with guests remarking on the 'profusion' (abundance) of food and drink.","src":null,"vocab":[]},{"id":"bank-484","q":"Fill in the gaps: When he was young, he _____ ideas of becoming a doctor, however, he was _____ by his father who wanted him to join the family business.","opts":{"A":"harbored...backed","B":"entertained...dissuaded","C":"produced...critical","D":"repudiated...deterred","E":"None of these"},"ans":"B","exp":"He 'entertained' (considered) the idea of becoming a doctor but was 'dissuaded' (discouraged) by his father — a contrast signaled by 'however.'","src":null,"vocab":[]},{"id":"bank-485","q":"Fill in the gaps: For several days she had a feeling of tiredness and general _____ and feared that these vague symptoms might _____ the onset of something more serious.","opts":{"A":"pain...indicate","B":"malaise...portend","C":"weakness...tender","D":"senility...reflect","E":"None of these"},"ans":"B","exp":"'Malaise' (general discomfort/unease) fits with tiredness, and 'portend' (forewarn of) fits with fearing something more serious.","src":null,"vocab":[]},{"id":"bank-486","q":"Fill in the gaps: Waste management is a _____ problem for the modern city, a problem that is never likely to be addressed unless we change our _____ attitude to recycling.","opts":{"A":"growing...flexible","B":"minor...positive","C":"trivial...ambivalent","D":"perennial...lax","E":"None of these"},"ans":"D","exp":"Since the problem is 'never likely to be addressed,' it must be 'perennial' (persistent), and the unaddressed attitude is 'lax' (careless).","src":null,"vocab":[]},{"id":"bank-487","q":"Choose the word that best fits the definition: A person who performs the art of making statues using clay","opts":{"A":"Mediator","B":"Arbitrator","C":"Sculptor","D":"Miniature","E":"None of these"},"ans":"C","exp":"A 'sculptor' creates statues/sculptures.","src":null,"vocab":[]},{"id":"bank-488","q":"Choose the word that best fits the definition: Incapable of being seen through","opts":{"A":"Ductile","B":"Opaque","C":"Obsolete","D":"Potable","E":"None of these"},"ans":"B","exp":"'Opaque' means not able to be seen through.","src":null,"vocab":[]},{"id":"bank-489","q":"Choose the word that best fits the definition: Having superior or intellectual interest and tastes","opts":{"A":"Elite","B":"Highbrow","C":"Sophisticated","D":"Fastidious","E":"None of these"},"ans":"B","exp":"'Highbrow' describes someone with intellectually superior tastes (especially in art/literature).","src":null,"vocab":[]},{"id":"bank-490","q":"Choose the word that best fits the definition: The part of the government which is concerned with making of rules","opts":{"A":"Court","B":"Legislature","C":"Tribunal","D":"Bar","E":"None of these"},"ans":"B","exp":"The 'legislature' is the branch of government responsible for making laws/rules.","src":null,"vocab":[]},{"id":"bank-491","q":"Choose the word that best fits the definition: The piece of string in the centre of a candle","opts":{"A":"Yoke","B":"wick","C":"Vane","D":"Tenor","E":"None of these"},"ans":"B","exp":"The string at the center of a candle that burns is called a 'wick.'","src":null,"vocab":[]},{"id":"bank-492","q":"Find the odd word from each list.","opts":{"A":"Recalcitrant","B":"Stubborn","C":"Obstinate","D":"Pliable","E":"Intractable"},"ans":"D","exp":"Recalcitrant, stubborn, obstinate, and intractable all mean 'unyielding/disobedient'; 'pliable' means flexible/easily yielding — the odd word out.","src":null,"vocab":[]},{"id":"bank-493","q":"Find the odd word from each list.","opts":{"A":"Hasten","B":"Accelerate","C":"Rush","D":"Expedite","E":"Impede"},"ans":"E","exp":"Hasten, accelerate, rush, and expedite all mean 'speed up'; 'impede' means to hinder — the odd word out.","src":null,"vocab":[]},{"id":"bank-494","q":"Find the odd word from each list.","opts":{"A":"Friendless","B":"Solitary","C":"Lonely","D":"Introverted","E":"Verbose"},"ans":"E","exp":"Friendless, solitary, lonely, and introverted all relate to being alone/withdrawn; 'verbose' means talkative/wordy — the odd word out.","src":null,"vocab":[]},{"id":"bank-495","q":"Find the odd word from each list.","opts":{"A":"August","B":"Dignified","C":"Venerable","D":"Esteemed","E":"Corpulent"},"ans":"E","exp":"August, dignified, venerable, and esteemed all relate to respect/dignity; 'corpulent' means overweight — the odd word out.","src":null,"vocab":[]},{"id":"bank-496","q":"Find the odd word from each list.","opts":{"A":"Intimidate","B":"Formalize","C":"Frighten","D":"Terrify","E":"Threatened"},"ans":"B","exp":"Intimidate, frighten, terrify, and threatened all relate to causing fear; 'formalize' means to make official — the odd word out.","src":null,"vocab":[]},{"id":"bank-497","q":"The teacher did not make students _____ their essays.","opts":{"A":"to type","B":"type","C":"typed","D":"Typing","E":"have typed"},"ans":"B","exp":"After the causative verb 'make' + person, the base form of the verb (bare infinitive) is used: 'make students type.'","src":null,"vocab":[]},{"id":"bank-498","q":"Choose the appropriate word as 'antonym': 'Comfort'","opts":{"A":"uncomfort","B":"noncomfort","C":"discomfort","D":"miscomfort","E":"incomfort"},"ans":"C","exp":"The correct antonym formation uses the prefix 'dis-': 'discomfort.' The other options are not valid English words.","src":null,"vocab":[]},{"id":"bank-499","q":"Choose the appropriate word as 'antonym': 'Unlimited'","opts":{"A":"poverty","B":"squalor","C":"scarce","D":"few","E":"small"},"ans":"C","exp":"'Unlimited' (boundless in quantity) is opposite to 'scarce' (very limited in quantity).","src":null,"vocab":[]},{"id":"bank-500","q":"Choose the appropriate word as 'antonym': 'Famous'","opts":{"A":"opaque","B":"obscure","C":"illiterate","D":"immature","E":"generous"},"ans":"B","exp":"'Famous' (well-known) is opposite to 'obscure' (unknown).","src":null,"vocab":[]}]},{"id":"bank-6","title":"Bank Vocabulary [501-600]","questions":[{"id":"bank-501","q":"Choose the appropriate word as 'Antonym': 'Famous'","opts":{"A":"opaque","B":"obscure","C":"illiterate","D":"immature","E":"generous"},"ans":"B","exp":"'Famous' (well-known) is opposite to 'obscure' (unknown).","src":null,"vocab":[]},{"id":"bank-502","q":"Choose the appropriate word as Synonym: 'Urgency'","opts":{"A":"pressing","B":"preliminary","C":"pressurizing","D":"urge","E":"accident"},"ans":"A","exp":"'Urgency' means the need for immediate action, synonymous with 'pressing' (requiring prompt attention).","src":null,"vocab":[]},{"id":"bank-503","q":"Choose the appropriate word as Synonym: 'Perplexed'","opts":{"A":"angry","B":"annoyed","C":"aroused","D":"unhappy","E":"confused"},"ans":"E","exp":"'Perplexed' means confused/puzzled.","src":null,"vocab":[]},{"id":"bank-504","q":"Choose the appropriate word as Synonym: 'Postulate'","opts":{"A":"false","B":"lie","C":"claim","D":"question","E":"prove"},"ans":"C","exp":"'Postulate' means to assume something as true for an argument, closest to 'claim.'","src":null,"vocab":[]},{"id":"bank-505","q":"Choose the opposite word: 'NAIVE'","opts":{"A":"Cunning","B":"Wealthy","C":"Sophisticated","D":"Complicated"},"ans":"C","exp":"'Naive' means simple/inexperienced; its opposite is 'sophisticated' (experienced, worldly).","src":null,"vocab":[]},{"id":"bank-506","q":"Choose the opposite word: 'LENIENT'","opts":{"A":"Obstinate","B":"Annoyed","C":"Rude","D":"Harsh"},"ans":"D","exp":"'Lenient' means merciful/gentle; its opposite is 'harsh' (strict, severe).","src":null,"vocab":[]},{"id":"bank-507","q":"Choose the opposite word: 'CLARITY'","opts":{"A":"Exaggeration","B":"Candour","C":"Confusion","D":"Reserve"},"ans":"C","exp":"'Clarity' means clearness; its opposite is 'confusion' (lack of clarity).","src":null,"vocab":[]},{"id":"bank-508","q":"A Mediator is-","opts":{"A":"A thoughtful Person","B":"A Middle man","C":"A media expert","D":"A settler of disputes"},"ans":"D","exp":"A 'mediator' is someone who helps settle disputes between parties.","src":null,"vocab":[]},{"id":"bank-509","q":"The appropriate meaning of the phrase 'smell a rat' is-","opts":{"A":"Bad smell","B":"presence of a thief","C":"suspect something","D":"make difficult"},"ans":"C","exp":"'Smell a rat' is an idiom meaning to suspect something is wrong.","src":null,"vocab":[]},{"id":"bank-510","q":"A Synonym for 'celebrity' is-","opts":{"A":"Superstar","B":"politician","C":"Amicable person","D":"Efficient officer"},"ans":"A","exp":"'Celebrity' means a famous person, synonymous with 'superstar.'","src":null,"vocab":[]},{"id":"bank-511","q":"'Bibliography' means-","opts":{"A":"History of books","B":"List of books","C":"Worshiper of books","D":"Books on biology"},"ans":"B","exp":"A 'bibliography' is a list of books/sources referenced or related to a topic.","src":null,"vocab":[]},{"id":"bank-512","q":"Which is not a reptile?","opts":{"A":"Crocodile","B":"Leopard","C":"Anaconda","D":"Viper"},"ans":"B","exp":"Crocodile, anaconda, and viper are all reptiles; 'leopard' is a mammal.","src":null,"vocab":[]},{"id":"bank-513","q":"Choose the word opposite in meaning to the capitalized word: 'FERTILE'","opts":{"A":"useful","B":"isolated","C":"barren","D":"gloomy","E":"None of them"},"ans":"C","exp":"'Fertile' (productive land) is opposite to 'barren' (unproductive).","src":null,"vocab":[]},{"id":"bank-514","q":"Choose the word opposite in meaning to the capitalized word: 'COSMOPOLITAN'","opts":{"A":"unnatural","B":"inexpensive","C":"ideal","D":"provincial","E":"None of them"},"ans":"D","exp":"'Cosmopolitan' (worldly/international) is opposite to 'provincial' (narrow/local in outlook).","src":null,"vocab":[]},{"id":"bank-515","q":"Choose the word opposite in meaning to the capitalized word: 'VACILLATE'","opts":{"A":"determined","B":"hesitate","C":"amplify","D":"extol","E":"None of them"},"ans":"A","exp":"'Vacillate' (to waver) is opposite to 'determined' (firmly decided).","src":null,"vocab":[]},{"id":"bank-516","q":"Choose the word opposite in meaning to the capitalized word: 'DELETERIOUS'","opts":{"A":"toxic","B":"spurious","C":"harmless","D":"lethal","E":"None of them"},"ans":"C","exp":"'Deleterious' (harmful) is opposite to 'harmless.'","src":null,"vocab":[]},{"id":"bank-517","q":"Choose the word opposite in meaning to the capitalized word: 'MONOTONOUS'","opts":{"A":"speedy","B":"interesting","C":"cheap","D":"success","E":"None of them"},"ans":"B","exp":"'Monotonous' (boring/repetitive) is opposite to 'interesting.'","src":null,"vocab":[]},{"id":"bank-518","q":"Fill in the blank with suitable words: Many cultures have special ceremonies to celebrate a person's _____ of passage into adulthood.","opts":{"A":"right","B":"rite","C":"writ","D":"write","E":"None of them"},"ans":"B","exp":"'Rite of passage' is the fixed idiomatic phrase for a ceremony marking transition into a new life stage.","src":null,"vocab":[]},{"id":"bank-519","q":"Choose the Synonym of the word: 'Franchise'","opts":{"A":"Privilege","B":"Utility","C":"French","D":"Frankness"},"ans":"A","exp":"'Franchise' means a special right/privilege granted (e.g., the right to vote or operate a business).","src":null,"vocab":[]},{"id":"bank-520","q":"Choose the Synonym of the word: 'Panoramic'","opts":{"A":"Narrow","B":"Limited","C":"Restricted","D":"Scenic"},"ans":"D","exp":"'Panoramic' means having an unbroken wide view, closest to 'scenic.'","src":null,"vocab":[]},{"id":"bank-521","q":"Choose the Synonym of the word: 'Thrive'","opts":{"A":"To survive","B":"To exist","C":"To do well","D":"To die"},"ans":"C","exp":"'Thrive' means to grow/develop successfully, closest to 'to do well.'","src":null,"vocab":[]},{"id":"bank-522","q":"Choose the Synonym of the word: 'Competent'","opts":{"A":"Circumspect","B":"Discrete","C":"Capable","D":"Prudent"},"ans":"C","exp":"'Competent' means having the necessary skill/ability, synonymous with 'capable.'","src":null,"vocab":[]},{"id":"bank-523","q":"Choose the analogous pair of words: 'Entrepreneur : Enterprise'","opts":{"A":"Conspirator : Secrecy","B":"Egoistic : Conceit","C":"Dilettante : Ignorance","D":"Connoisseur : Taste"},"ans":"D","exp":"An entrepreneur is defined by their skill in running an enterprise; similarly, a connoisseur is defined by their refined taste/judgment.","src":null,"vocab":[]},{"id":"bank-524","q":"Choose the analogous pair of words: 'Interest : Usury'","opts":{"A":"Anger : wrath","B":"Frugality : parsimony","C":"Test : Training","D":"Glossary : Meaning"},"ans":"B","exp":"Interest (normal) becomes usury (excessive/exploitative); similarly, frugality (normal thriftiness) becomes parsimony (excessive stinginess) — both pairs show a normal-to-excessive degree relationship.","src":null,"vocab":[]},{"id":"bank-525","q":"Choose the analogous pair of words: 'Ranch : Horses'","opts":{"A":"Museum : Artifact","B":"Apiary : Bees","C":"Aviary : Birds","D":"Garden : Plants"},"ans":"B","exp":"A ranch is a place where horses are kept/raised; similarly, an apiary is a place where bees are kept/raised.","src":null,"vocab":[]},{"id":"bank-526","q":"Choose the analogous pair of words: 'Earth : Planet'","opts":{"A":"May : Month","B":"Asia : Continent","C":"Detached : Indifferent","D":"Moon : Satellite"},"ans":"D","exp":"Earth is a specific example of a planet; similarly, the Moon is a specific example of a satellite — both in the astronomy domain.","src":null,"vocab":[]},{"id":"bank-527","q":"Choose the analogous pair of words: 'Rigid : Resilient'","opts":{"A":"Candid : Plain","B":"Essential : Redundant","C":"Detached : Indifferent","D":"Indolent : Agile"},"ans":"D","exp":"'Rigid' and 'resilient' are antonyms; similarly, 'indolent' (lazy) and 'agile' (energetic) are antonyms.","src":null,"vocab":[]},{"id":"bank-528","q":"Choose the analogous pair of words: 'Devotee : Religion'","opts":{"A":"Employee : Company","B":"Patriot : Nation","C":"Alumnus : College","D":"Linguist : Language"},"ans":"B","exp":"A devotee is deeply devoted to their religion; similarly, a patriot is deeply devoted to their nation.","src":null,"vocab":[]},{"id":"bank-529","q":"Choose the analogous pair of words: 'Attentive : Officious'","opts":{"A":"Citizen : Authority","B":"Nurse : Physician","C":"Help : Interference","D":"Subject : Job"},"ans":"C","exp":"'Officious' is an excessive/unwelcome form of being attentive; similarly, 'interference' is an excessive/unwelcome form of 'help.'","src":null,"vocab":[]},{"id":"bank-530","q":"Choose the analogous pair of words: 'Carpenter : Saw'","opts":{"A":"stenographer : typewriter","B":"painter : brush","C":"lawyer : brief","D":"seamstress : scissors"},"ans":"D","exp":"A saw is a carpenter's primary cutting tool; similarly, scissors are a seamstress's primary cutting tool.","src":null,"vocab":[]},{"id":"bank-531","q":"Find the Antonym: 'HATRED'","opts":{"A":"Love","B":"Loathing","C":"Worship","D":"Antipathy"},"ans":"A","exp":"'Hatred' is opposite to 'love.'","src":null,"vocab":[]},{"id":"bank-532","q":"Find the Antonyms: 'IMMUNE'","opts":{"A":"Untouched","B":"Susceptible","C":"Disposed","D":"Hurt"},"ans":"B","exp":"'Immune' (protected from harm) is opposite to 'susceptible' (vulnerable to harm).","src":null,"vocab":[]},{"id":"bank-533","q":"Find the Antonyms: 'SELDOM'","opts":{"A":"Infrequently","B":"Rarely","C":"Often","D":"Hardly ever"},"ans":"C","exp":"'Seldom' (rarely) is opposite to 'often' (frequently).","src":null,"vocab":[]},{"id":"bank-534","q":"Find the Antonyms: 'ROUGH'","opts":{"A":"Uneven","B":"Bumpy","C":"Jagged","D":"Smooth"},"ans":"D","exp":"'Rough' is opposite to 'smooth.'","src":null,"vocab":[]},{"id":"bank-535","q":"Find the Antonyms: 'CLEVER'","opts":{"A":"Bright","B":"Witty","C":"Quick","D":"Stupid"},"ans":"D","exp":"'Clever' is opposite to 'stupid.'","src":null,"vocab":[]},{"id":"bank-536","q":"Find the Antonym: 'STRANGE'","opts":{"A":"Odd","B":"Weird","C":"Peculiar","D":"Familiar"},"ans":"D","exp":"'Strange' (unusual/unfamiliar) is opposite to 'familiar' (well-known).","src":null,"vocab":[]},{"id":"bank-537","q":"Find the Antonyms: 'OPPORTUNIST'","opts":{"A":"Man of attitude","B":"pessimist","C":"colleague","D":"enemy"},"ans":"A","exp":"An opportunist lacks fixed principles; opposite is a 'man of attitude/principle' (someone with firm values).","src":null,"vocab":[]},{"id":"bank-538","q":"Choose the word most nearly opposite in meaning: 'ABHOR'","opts":{"A":"Condense","B":"Unite","C":"Love","D":"Confirm"},"ans":"C","exp":"'Abhor' (to detest) is opposite to 'love.'","src":null,"vocab":[]},{"id":"bank-539","q":"Choose the word most nearly opposite in meaning: 'COWARD'","opts":{"A":"Brave","B":"Merciless","C":"Relevant","D":"Cursory"},"ans":"A","exp":"'Coward' is opposite to 'brave.'","src":null,"vocab":[]},{"id":"bank-540","q":"Choose the word most nearly opposite in meaning: 'MASSIVE'","opts":{"A":"Everlasting","B":"Spare","C":"Tiny","D":"Inane"},"ans":"C","exp":"'Massive' (huge) is opposite to 'tiny' (very small).","src":null,"vocab":[]},{"id":"bank-541","q":"Choose the word most nearly opposite in meaning: 'DISPUTE'","opts":{"A":"Diminish","B":"Agree","C":"Abdicate","D":"Bloom"},"ans":"B","exp":"'Dispute' (to disagree) is opposite to 'agree.'","src":null,"vocab":[]},{"id":"bank-542","q":"Choose the word most nearly opposite in meaning: 'ENMITY'","opts":{"A":"Sturdy","B":"Durable","C":"Amity","D":"Agreed"},"ans":"C","exp":"'Enmity' (hostility) is opposite to 'amity' (friendship).","src":null,"vocab":[]},{"id":"bank-543","q":"Choose the word closest in meaning: 'WAVER'","opts":{"A":"Assuage","B":"Aggravate","C":"Vacillate","D":"Chastise"},"ans":"C","exp":"'Waver' (to hesitate) is synonymous with 'vacillate.'","src":null,"vocab":[]},{"id":"bank-544","q":"Choose the word closest in meaning: 'TRANSPARENT'","opts":{"A":"Lively","B":"Clear","C":"Roomy","D":"Muddy"},"ans":"B","exp":"'Transparent' means see-through, synonymous with 'clear.'","src":null,"vocab":[]},{"id":"bank-545","q":"Choose the word closest in meaning: 'TANGIBLE'","opts":{"A":"Ingenious","B":"Feeble","C":"Palpable","D":"Succinct"},"ans":"C","exp":"'Tangible' means touchable/perceptible, synonymous with 'palpable.'","src":null,"vocab":[]},{"id":"bank-546","q":"Choose the word closest in meaning: 'TREACHERY'","opts":{"A":"Worldly","B":"Tiny","C":"Betrayal","D":"Poverty"},"ans":"C","exp":"'Treachery' means disloyalty/betrayal of trust, synonymous with 'betrayal.'","src":null,"vocab":[]},{"id":"bank-547","q":"Choose the word closest in meaning: 'VIGILANT'","opts":{"A":"Watchful","B":"Fickle","C":"Wicked","D":"Tired"},"ans":"A","exp":"'Vigilant' means alert/watchful, synonymous with 'watchful.'","src":null,"vocab":[]},{"id":"bank-548","q":"Choose the correct words/phrases to fill the blanks: Scientists have not been entirely successful in _____ fears that genetically modified crops pose a threat to consumers, although the issue does not seem as _____ as it once was.","opts":{"A":"mitigating - simple","B":"arousing - poisonous","C":"dispelling - controversial","D":"generating - frightening","E":"None of these"},"ans":"C","exp":"Scientists try to 'dispel' (remove) fears, and the issue is now less 'controversial' (disputed) than before.","src":null,"vocab":[]},{"id":"bank-549","q":"Choose the correct words/phrases to fill the blanks: In the days of the last owner, the stately home was run on a _____ scale; no guest left without remarking on the quality and _____ of food and drink.","opts":{"A":"lavish - profusion","B":"ornate - paucity","C":"modest - plenty","D":"opulent - dearth","E":"None of these"},"ans":"A","exp":"A stately home being run extravagantly fits 'lavish,' and guests remarking on the food/drink fits 'profusion' (abundance).","src":null,"vocab":[]},{"id":"bank-550","q":"Choose the correct words/phrases to fill the blanks: A two-year old child is without _____ or _____; she reacts simply and instinctively to the people around her.","opts":{"A":"guile - artifice","B":"insight - intuition","C":"caprice - illusion","D":"fear - tremulousness","E":"None of these"},"ans":"A","exp":"Since the child reacts 'simply and instinctively,' she lacks deceptive qualities, i.e., 'guile' (cunning) and 'artifice' (trickery).","src":null,"vocab":[]},{"id":"bank-551","q":"Choose the correct words/phrases to fill the blanks: With such a _____ of options, it is difficult for a high school student to choose which colleges to apply to, and choosing a course from a _____ excess of options can place the student in a dilemma.","opts":{"A":"variety - divergent","B":"plethora - similar","C":"range - same","D":"number - alike","E":"None of these"},"ans":"B","exp":"'Plethora' (excess of options) fits with 'excess,' and the dilemma arises when options are too 'similar' to distinguish between.","src":null,"vocab":[]},{"id":"bank-552","q":"Choose the correct words/phrases to fill the blanks: Your classmate insulted you to _____","opts":{"A":"pay off old scores","B":"host in himself","C":"worth yours","D":"hang in balance","E":"None of these"},"ans":"A","exp":"'Pay off old scores' is an idiom meaning to take revenge for a past grievance.","src":null,"vocab":[]},{"id":"bank-553","q":"Choose the word matching the definition: Something that is perceptible by touch-","opts":{"A":"Contagious","B":"Tenacious","C":"Tangible","D":"Contingent","E":"None of these"},"ans":"C","exp":"'Tangible' means perceptible by touch/having a real, physical existence.","src":null,"vocab":[]},{"id":"bank-554","q":"Choose the word matching the definition: The part of the government which is concerned with making of rules-","opts":{"A":"Court","B":"Legislature","C":"Tribunal","D":"Bar","E":"None of these"},"ans":"B","exp":"The 'legislature' is the branch of government responsible for making laws.","src":null,"vocab":[]},{"id":"bank-555","q":"Choose the word matching the definition: One who believes that all things and events in life are predetermined-","opts":{"A":"Egoist","B":"Puritan","C":"Tyrant","D":"Fatalist","E":"None of these"},"ans":"D","exp":"A 'fatalist' believes all events are predetermined by fate.","src":null,"vocab":[]},{"id":"bank-556","q":"Choose the word matching the definition: A name adopted by an author in his writings-","opts":{"A":"Pseudonym","B":"Nickname","C":"Nomenclature","D":"Title","E":"None of these"},"ans":"A","exp":"A 'pseudonym' is a fictitious name adopted by an author for their writings.","src":null,"vocab":[]},{"id":"bank-557","q":"Choose the word matching the definition: The policy of extending a country's empire and influence-","opts":{"A":"Communism","B":"Capitalism","C":"Internationalism","D":"Imperialism","E":"None of these"},"ans":"D","exp":"'Imperialism' is the policy of extending a country's power/influence through colonization or military force.","src":null,"vocab":[]},{"id":"bank-558","q":"Identify the missing word: The examiner will look _____ the examination scripts.","opts":{"A":"check","B":"on","C":"to","D":"over","E":"No word is missing"},"ans":"D","exp":"'Look over' is the correct phrasal verb meaning to examine/review something.","src":null,"vocab":[]},{"id":"bank-559","q":"Fill in the gaps: He must always be the center of attention; he would rather be criticized than _____.","opts":{"A":"ignored","B":"selfish","C":"remembered","D":"praised","E":"different"},"ans":"A","exp":"Someone who craves attention would rather be criticized (still noticed) than 'ignored' (not noticed at all).","src":null,"vocab":[]},{"id":"bank-560","q":"Fill in the gaps: Whales hurt nothing and no one in their peaceful migrations through the earth's seas, yet are savagely hunted by man, who _____ superior need.","opts":{"A":"assumes","B":"perpetuates","C":"retains","D":"assimilates","E":"manifests"},"ans":"A","exp":"Man unjustifiably 'assumes' (presumes, without real basis) that his needs are superior, justifying the hunting.","src":null,"vocab":[]},{"id":"bank-561","q":"Fill in the gaps: Because of his inherent _____ Harry steered clear of any job that he suspected could turn out to be a travail.","opts":{"A":"impudence","B":"insolence","C":"eminence","D":"indolence","E":"integrity"},"ans":"D","exp":"Avoiding hard work ('travail') is explained by inherent 'indolence' (laziness).","src":null,"vocab":[]},{"id":"bank-562","q":"Fill in the gaps: During their famous clash, Jung was ambivalent about Freud so he attacked the father of modern psychoanalysis even as he _____ him.","opts":{"A":"Enlightened","B":"chastened","C":"revered","D":"Despised","E":"understood"},"ans":"C","exp":"Being 'ambivalent' means holding two opposite feelings; he attacked Freud while also deeply 'revering' (respecting) him.","src":null,"vocab":[]},{"id":"bank-563","q":"Fill in the gaps: Her concerns for the earthquake victims _____ her reputation as a callous person.","opts":{"A":"restored","B":"rescinded","C":"created","D":"proved","E":"belied"},"ans":"E","exp":"Showing concern contradicted/disproved her reputation as callous, i.e., 'belied' (gave a false impression of) that reputation.","src":null,"vocab":[]},{"id":"bank-564","q":"Choose the pair with a similar relationship- Realist : Quixotic ::","opts":{"A":"Scholar : pedantic","B":"Fool : Idiotic","C":"Idler : Lethargic","D":"Tormentor : Sympathetic","E":"Diner : Dyspeptic"},"ans":"D","exp":"A realist is never quixotic (impractically idealistic) — an antonym relationship; similarly, a tormentor is never sympathetic — also an antonym relationship.","src":null,"vocab":[]},{"id":"bank-565","q":"Choose the pair with a similar relationship- Shard : Glass ::","opts":{"A":"Grain : Sand","B":"Morsel : Meal","C":"Strand : Rope","D":"Scrap : Quilt","E":"Splinter : Wood"},"ans":"E","exp":"A shard is a broken, sharp piece of glass; similarly, a splinter is a broken, sharp piece of wood.","src":null,"vocab":[]},{"id":"bank-566","q":"Choose the pair with a similar relationship- Paraphrase : Verbatim ::","opts":{"A":"Approximation : Precise","B":"Description : Vivid","C":"Quotation : Apt","D":"Interpretation : Valid","E":"Significance : Uncertain"},"ans":"A","exp":"'Paraphrase' (approximate restatement) is opposite to 'verbatim' (exact wording); similarly, 'approximation' is opposite to 'precise.'","src":null,"vocab":[]},{"id":"bank-567","q":"Choose the pair with a similar relationship- Oncology : Tumor ::","opts":{"A":"Chronology : Time","B":"Theology : Tenet","C":"Oral : Sound","D":"Philology : Religion","E":"Taxonomy : Classification"},"ans":"A","exp":"Oncology is the scientific study of tumors; similarly, chronology is the study of time/dates.","src":null,"vocab":[]},{"id":"bank-568","q":"Choose the pair with a similar relationship- Bouquet : Flower ::","opts":{"A":"Humidor : Tobacco","B":"Mosaic : Tile","C":"Tapestry : Color","D":"Pile : Block","E":"Sacristy : Vestment"},"ans":"B","exp":"A bouquet is an artistic arrangement made of flowers; similarly, a mosaic is an artistic arrangement made of tiles.","src":null,"vocab":[]},{"id":"bank-569","q":"Find the odd word from the following list of words.","opts":{"A":"Bustling","B":"Tranquil","C":"Serene","D":"Halcyon","E":"Placid"},"ans":"A","exp":"Tranquil, serene, halcyon, and placid all mean 'calm'; 'bustling' means busy/noisy — the odd word out.","src":null,"vocab":[]},{"id":"bank-570","q":"Choose the correct Synonym of 'Abeyance'.","opts":{"A":"Obedience","B":"Discussion","C":"Excitement","D":"Editorial","E":"Suspended Act"},"ans":"E","exp":"'Abeyance' means a state of temporary suspension/inactivity.","src":null,"vocab":[]},{"id":"bank-571","q":"Choose the correct Antonym of 'Adulation'.","opts":{"A":"Youth","B":"Brightness","C":"Defense","D":"Obedience","E":"Criticism"},"ans":"E","exp":"'Adulation' means excessive flattery/praise; its opposite is 'criticism.'","src":null,"vocab":[]},{"id":"bank-572","q":"Choose the words/phrases to fill the gaps: Some commit suicide because they are unable to tolerate _____ changes in their lives though some are born with a _____ to commit suicide.","opts":{"A":"Sentiment/unfavorable","B":"resolution/adverse","C":"Tendency/catastrophic","D":"forecast/miserable","E":"None of these"},"ans":"E","exp":"None of the given word orderings correctly fit (the first blank needs a word like 'adverse/catastrophic' changes, and the second blank needs 'tendency'); since no option has this correct order, the answer is 'None of these.'","src":null,"vocab":[]},{"id":"bank-573","q":"Choose the words/phrases to fill the gaps: In life there are few situations that appear before us with a hard, practical edge which raise issues of life-threatening _____ and therefore demand to be addressed with cool, clear-headed _____.","opts":{"A":"existence/involvement","B":"immediacy/practicality","C":"evidence/cognizance","D":"illustrations/expedience","E":"None of these"},"ans":"B","exp":"Life-threatening situations create 'immediacy' (urgency), which must be addressed with 'practicality' (pragmatic, level-headed action).","src":null,"vocab":[]},{"id":"bank-574","q":"Choose the words/phrases to fill the gaps: The invigilating team entered the country with _____ notions of the country as _____ country where many parents are alleged to have sold their children in exchange for food.","opts":{"A":"Paradoxical/an abounding","B":"incongruous/an opulent","C":"Preconceived/an impoverished","D":"unwarranted/an impotent","E":"None of these"},"ans":"C","exp":"They entered with 'preconceived' (formed in advance) notions of the country as 'impoverished' (extremely poor), matching the story of parents selling children for food.","src":null,"vocab":[]},{"id":"bank-575","q":"Choose the words/phrases to fill the gaps: Today, plastic has proved to be a _____ to the environment; around the world, steps are being taken to ban the _____ and non-recyclable material, which has silently taken over our lives.","opts":{"A":"boon/ominous","B":"threat/jeopardizing","C":"menace/non-eco-friendly","D":"inauspicious/disastrous","E":"None of these"},"ans":"C","exp":"Plastic is a 'menace' (danger) to the environment, and it is banned for being 'non-eco-friendly' and non-recyclable.","src":null,"vocab":[]},{"id":"bank-576","q":"Identify the missing word from the options: A person pretending to be somebody he is not =","opts":{"A":"Magician","B":"Rogue","C":"Liar","D":"Imposter","E":"None of these"},"ans":"D","exp":"An 'imposter' is someone pretending to be another person to deceive others.","src":null,"vocab":[]},{"id":"bank-577","q":"Identify the missing word from the options: One who possesses many talents =","opts":{"A":"Versatile","B":"Nubile","C":"Exceptional","D":"Gifted","E":"None of these"},"ans":"A","exp":"'Versatile' describes someone with many different skills/abilities.","src":null,"vocab":[]},{"id":"bank-578","q":"Identify the missing word from the options: One who cannot be corrected =","opts":{"A":"Incurable","B":"Incorrigible","C":"Hardened","D":"Invulnerable","E":"None of these"},"ans":"B","exp":"'Incorrigible' means a person/behavior that cannot be corrected or reformed.","src":null,"vocab":[]},{"id":"bank-579","q":"Identify the missing word from the options: List of the items or subjects to be considered at a meeting =","opts":{"A":"Schedule","B":"Timetable","C":"Agenda","D":"Plan","E":"None of these"},"ans":"C","exp":"An 'agenda' is the list of items to be discussed at a meeting.","src":null,"vocab":[]},{"id":"bank-580","q":"Select an analogous pair: 'Month : March'","opts":{"A":"Play : Shakespeare","B":"Cinema : Name","C":"Novel : Title","D":"City : Tokyo"},"ans":"D","exp":"March is a specific example of a month; similarly, Tokyo is a specific example of a city.","src":null,"vocab":[]},{"id":"bank-581","q":"Select an analogous pair: 'Bench : Stool'","opts":{"A":"Room : Veranda","B":"Cup : Saucer","C":"Yardstick : Foot rule","D":"Table : Cupboard"},"ans":"C","exp":"A bench and a stool are both seating items differing in size/scale; similarly, a yardstick and a foot rule are both measuring tools differing in size/scale.","src":null,"vocab":[]},{"id":"bank-582","q":"Select an analogous pair: 'Skill : Virtuosity'","opts":{"A":"Brightness : Gloom","B":"Momentum : lethargy","C":"Insight : Profundity","D":"Mendacity : Sincerity"},"ans":"C","exp":"'Virtuosity' is an extreme/advanced degree of 'skill'; similarly, 'profundity' is an extreme/advanced degree of 'insight' — both are degree-of-intensity relationships, unlike the other antonym pairs.","src":null,"vocab":[]},{"id":"bank-583","q":"Select an analogous pair: 'Money : Misappropriation'","opts":{"A":"Writing : Plagiarism","B":"Gold : Theft","C":"Confidence : Deception","D":"Germ : Diseases"},"ans":"A","exp":"Misusing/stealing money is called misappropriation; similarly, stealing someone's writing is specifically called plagiarism.","src":null,"vocab":[]},{"id":"bank-584","q":"Select an analogous pair: 'Tooth : Gum'","opts":{"A":"Chest : Ribs","B":"Bone : Joint","C":"Heart : Aorta","D":"Eye : Socket"},"ans":"D","exp":"A tooth is embedded/held in the gum; similarly, an eye is set into the socket — both are object-fixed-in-place relationships.","src":null,"vocab":[]},{"id":"bank-585","q":"Select an analogous pair: 'Diamond : Necklace'","opts":{"A":"Cars : Roads","B":"Flowers : Bouquet","C":"Gold : Bangle","D":"Books : Shop"},"ans":"B","exp":"A necklace is made up of many diamonds; similarly, a bouquet is made up of many flowers — both are component:whole relationships.","src":null,"vocab":[]},{"id":"bank-586","q":"Choose the appropriate words for each blank: We lost confidence in him because he never _____ the grandiose promises he had made.","opts":{"A":"Tired of","B":"reneged on","C":"forget about","D":"delivered on"},"ans":"D","exp":"Losing confidence implies he never fulfilled ('delivered on') his promises.","src":null,"vocab":[]},{"id":"bank-587","q":"Choose the appropriate words for each blank: If you are trying to make a strong impression on your audience, you can not do so by being understated, tentative or _____.","opts":{"A":"hyperbolic","B":"restrained","C":"argumentative","D":"authoritative"},"ans":"B","exp":"'Restrained' fits the series of weak/unconfident traits (understated, tentative) that prevent making a strong impression.","src":null,"vocab":[]},{"id":"bank-588","q":"Choose the appropriate words for each blank: The reasoning in this editorial is so _____ that we cannot see how anyone can be deceived by it.","opts":{"A":"coherent","B":"astute","C":"cogent","D":"specious"},"ans":"D","exp":"'Specious' (seemingly true but false) fits with reasoning that deceives people.","src":null,"vocab":[]},{"id":"bank-589","q":"Choose the appropriate words for each blank: If you are seeking _____ that will resolve all our arguments, you are undertaking an impossible task.","opts":{"A":"a precedent","B":"a panacea","C":"an abstraction","D":"a direction"},"ans":"B","exp":"A 'panacea' (cure-all solution) matches the idea of resolving all arguments, an impossible task.","src":null,"vocab":[]},{"id":"bank-590","q":"Choose the appropriate words for each blank: The young man was quickly promoted when his employers saw how _____ he was.","opts":{"A":"indigent","B":"indifferent","C":"assiduous","D":"lethargic"},"ans":"C","exp":"'Assiduous' (hard-working) is the logical reason for quick promotion.","src":null,"vocab":[]},{"id":"bank-591","q":"Choose the appropriate words for each blank: Because it arrives so early in the season, before many of the birds, the robin has been called the _____ of spring.","opts":{"A":"hostage","B":"autocrat","C":"harbinger","D":"new comer"},"ans":"C","exp":"'Harbinger' means something that signals the imminent arrival of something else (here, spring).","src":null,"vocab":[]},{"id":"bank-592","q":"Choose the appropriate words for each blank: Although the economy suffers down trends, it also has strong _____ and self correction tendencies.","opts":{"A":"unstable","B":"recidivist","C":"inauspicious","D":"recuperative"},"ans":"D","exp":"'Recuperative' (able to recover) fits with 'self correction' as a positive counterbalance to downturns.","src":null,"vocab":[]},{"id":"bank-593","q":"Find the ANTONYM of the following words: 'ABRIDGE'","opts":{"A":"Distend","B":"attack","C":"release","D":"weaken"},"ans":"A","exp":"'Abridge' means to shorten/condense; its opposite is 'distend' (to expand/swell).","src":null,"vocab":[]},{"id":"bank-594","q":"Find the ANTONYM of the following words: 'FANATICISM'","opts":{"A":"Vision","B":"repression","C":"doubt","D":"indifference"},"ans":"D","exp":"'Fanaticism' (extreme zeal) is opposite to 'indifference' (lack of concern).","src":null,"vocab":[]},{"id":"bank-595","q":"Find the ANTONYM of the following words: 'NASCENT'","opts":{"A":"Faithful","B":"vanishing","C":"unnamed","D":"false"},"ans":"B","exp":"'Nascent' means just beginning to emerge; its opposite is 'vanishing' (disappearing).","src":null,"vocab":[]},{"id":"bank-596","q":"Find the ANTONYM of the following words: 'TURBULENCE'","opts":{"A":"Resistance","B":"quiet","C":"deliberation","D":"co-ordination"},"ans":"B","exp":"'Turbulence' (disorder) is opposite to 'quiet' (calm).","src":null,"vocab":[]},{"id":"bank-597","q":"Find the ANTONYM of the following words: 'OBLIVIOUS'","opts":{"A":"Noticeable","B":"subtle","C":"lively","D":"clever"},"ans":"A","exp":"'Oblivious' means unaware; its opposite is 'noticeable' (capable of being observed/aware of).","src":null,"vocab":[]},{"id":"bank-598","q":"Find the ANTONYM of the following words: 'GERMINAL'","opts":{"A":"Clean","B":"planned","C":"fully urbanized","D":"primitive"},"ans":"C","exp":"'Germinal' means in an early/initial stage of development; its opposite is 'fully urbanized' (fully developed).","src":null,"vocab":[]},{"id":"bank-599","q":"Find the ANTONYM of the following words: 'OPPORTUNIST'","opts":{"A":"Man of attitude","B":"pessimist","C":"hatchling","D":"colleague"},"ans":"A","exp":"An opportunist lacks fixed principles; opposite is a 'man of attitude' (one guided by firm principles/beliefs).","src":null,"vocab":[]},{"id":"bank-600","q":"Choose the word closest in meaning to the capitalized word: 'EXPOSE'","opts":{"A":"Reveal","B":"Discover","C":"Display","D":"Conceal","E":"None of these"},"ans":"A","exp":"'Expose' means to uncover/bring into the open, synonymous with 'reveal.'","src":null,"vocab":[]}]},{"id":"bank-7","title":"Bank Vocabulary [601-700]","questions":[{"id":"bank-601","q":"Choose the word closest in meaning to the capitalized word: 'GRATIS'","opts":{"A":"Gratifying","B":"Free","C":"Gracious","D":"Subscribe"},"ans":"B","exp":"'Gratis' means without charge, i.e., free.","src":null,"vocab":[]},{"id":"bank-602","q":"Choose the word closest in meaning to the capitalized word: 'MENTOR'","opts":{"A":"Mental","B":"Guide","C":"Muse","D":"Oracle"},"ans":"B","exp":"A 'mentor' is an experienced advisor/guide, from the Odyssey character entrusted with guiding Telemachus.","src":null,"vocab":[]},{"id":"bank-603","q":"Choose the word closest in meaning to the capitalized word: 'PLETHORA'","opts":{"A":"Pompous","B":"Excess","C":"Cunning","D":"Devious"},"ans":"B","exp":"'Plethora' means an excess/abundance of something, matching 'excess.'","src":null,"vocab":[]},{"id":"bank-604","q":"Choose the word closest in meaning to the capitalized word: 'EQUIVOCAL'","opts":{"A":"Ambiguous","B":"Obstacle","C":"Confusing","D":"Valorous"},"ans":"A","exp":"'Equivocal' means ambiguous/unclear, from Latin 'equal voice' — giving two things equal weight so neither is clearly indicated.","src":null,"vocab":[]},{"id":"bank-605","q":"Choose the word opposite in meaning to: 'DENOUNCE'","opts":{"A":"Condemn","B":"Innocuous","C":"Accidental","D":"Intentional"},"ans":"A","exp":"'Denounce' means to publicly condemn or accuse, closest among options to 'condemn' (as a near-synonym test of recognizing the word's core meaning).","src":null,"vocab":[]},{"id":"bank-606","q":"Choose the word opposite in meaning to: 'GLORIOUS'","opts":{"A":"Superb","B":"Amazing","C":"Wonderful","D":"Disgraceful"},"ans":"D","exp":"'Glorious' means splendid/full of honor; its opposite is 'disgraceful' (shameful).","src":null,"vocab":[]},{"id":"bank-607","q":"Choose the word opposite in meaning to: 'ABLE'","opts":{"A":"Willful","B":"Inept","C":"Adept","D":"Feasible"},"ans":"B","exp":"'Able' means capable/skilled; its opposite is 'inept' (incompetent), from Latin 'not fit.'","src":null,"vocab":[]},{"id":"bank-608","q":"Choose the word opposite in meaning to: 'HASTE'","opts":{"A":"Delay","B":"Frugal","C":"Debauchery","D":"Hesitant"},"ans":"A","exp":"'Haste' means quickness/hurry; its opposite is 'delay' (slowness). Recall the proverb 'Haste makes waste.'","src":null,"vocab":[]},{"id":"bank-609","q":"Choose the word opposite in meaning to: 'DENOUNCE'","opts":{"A":"Abhor","B":"Praise","C":"Blame","D":"Deplore"},"ans":"B","exp":"'Denounce' means to publicly criticize/condemn; its opposite is 'praise' (to express approval).","src":null,"vocab":[]},{"id":"bank-610","q":"Choose the pair of words that best expresses a relationship similar to: 'BRICK : RECTANGULAR'","opts":{"A":"cow : milk","B":"camel : desert","C":"bee : honey","D":"egg : oval"},"ans":"D","exp":"A brick's typical/defining shape is rectangular; similarly, an egg's typical shape is oval — both describe an object's inherent geometric form.","src":null,"vocab":[]},{"id":"bank-611","q":"Choose the pair of words that best expresses a relationship similar to: 'ANTHROPOLOGY : HUMAN KIND'S DEVELOPMENT'","opts":{"A":"science : facts","B":"petrology : transportation","C":"biology : life system","D":"graphology : law"},"ans":"C","exp":"Anthropology is the study of humankind's development; similarly, biology is the study of life systems — both pairs show a field of study and its subject.","src":null,"vocab":[]},{"id":"bank-612","q":"Choose the pair of words that best expresses a relationship similar to: 'GOVERNMENT : TAX'","opts":{"A":"student : fees","B":"orange : price","C":"company : profit","D":"chairman : parliament"},"ans":"C","exp":"A government earns its operating funds through tax; similarly, a company earns its funds through profit — both pairs show an entity and its primary source of income.","src":null,"vocab":[]},{"id":"bank-613","q":"Choose the pair of words that best expresses a relationship similar to: 'IMPECCABLE : FLAW'","opts":{"A":"immovable : choice","B":"intolerable : defect","C":"irreversible : cure","D":"Infallible : error"},"ans":"D","exp":"'Impeccable' means having no flaw; similarly, 'infallible' means making no error — both describe an absence of a particular shortcoming.","src":null,"vocab":[]},{"id":"bank-614","q":"Choose the pair of words that best expresses a relationship similar to: 'SQUARE : CUBE'","opts":{"A":"triangle : hexagon","B":"trapezoid : quadrangle","C":"circle : sphere","D":"addition : subtraction"},"ans":"C","exp":"A square is the 2D shape that becomes a cube in 3D; similarly, a circle is the 2D shape that becomes a sphere in 3D.","src":null,"vocab":[]},{"id":"bank-615","q":"Choose the word which is OPPOSITE to the given word: 'Authentic'","opts":{"A":"Adept","B":"Brief","C":"Counterfeit","D":"Swift"},"ans":"C","exp":"'Authentic' means genuine/original; its opposite is 'counterfeit' (fake).","src":null,"vocab":[]},{"id":"bank-616","q":"Choose the word which is OPPOSITE to the given word: 'Proper'","opts":{"A":"Exact","B":"Swift","C":"Wide","D":"Unsuitable"},"ans":"D","exp":"'Proper' means suitable/appropriate; its opposite is 'unsuitable' (inappropriate).","src":null,"vocab":[]},{"id":"bank-617","q":"Choose the word which is OPPOSITE to the given word: 'Pardon'","opts":{"A":"Separate","B":"Anger","C":"Blame","D":"Hate"},"ans":"C","exp":"'Pardon' means to forgive; its opposite is 'blame' (to accuse/condemn).","src":null,"vocab":[]},{"id":"bank-618","q":"Choose the word which is most SIMILAR to the given word: 'Greedy'","opts":{"A":"Risky","B":"Creative","C":"Elastic","D":"Selfish"},"ans":"D","exp":"'Greedy' means avaricious/excessively wanting; closest synonym is 'selfish' (self-centered).","src":null,"vocab":[]},{"id":"bank-619","q":"Choose the word which is most SIMILAR to the given word: 'Lazy'","opts":{"A":"Sensible","B":"Indolent","C":"Uniform","D":"Bona-fide"},"ans":"B","exp":"'Indolent' means lazy/averse to exertion, from Latin 'not feeling pain' (avoiding the pain of effort).","src":null,"vocab":[]},{"id":"bank-620","q":"Choose the word which is most SIMILAR to the given word: 'Perishable'","opts":{"A":"Temporary","B":"Hopeless","C":"Trustworthy","D":"Unusual"},"ans":"A","exp":"'Perishable' means liable to decay/spoil (e.g., fresh vegetables); closest synonym is 'temporary,' since perishable things don't last.","src":null,"vocab":[]},{"id":"bank-621","q":"Choose the word or phrase that best replaces the underlined part: It was sound advice but the researchers paid little attention to it.","opts":{"A":"Good","B":"Sensitive","C":"Noisy","D":"Disruptive"},"ans":"A","exp":"'Sound' before an abstract noun like 'advice' means reliable/good, as in 'a sound mind in a sound body.'","src":null,"vocab":[]},{"id":"bank-622","q":"Find Antonym: 'Meticulous'","opts":{"A":"moral","B":"colossal","C":"careless","D":"harsh"},"ans":"C","exp":"'Meticulous' means extremely careful; its opposite is 'careless' (negligent).","src":null,"vocab":[]},{"id":"bank-623","q":"Find Antonym: 'Alleviate'","opts":{"A":"scatter","B":"approve","C":"aggravate","D":"alter"},"ans":"C","exp":"'Alleviate' means to relieve/ease; its opposite is 'aggravate' (to worsen).","src":null,"vocab":[]},{"id":"bank-624","q":"Find Antonym: 'Proximate'","opts":{"A":"complete","B":"distant","C":"insincere","D":"inquisitive"},"ans":"B","exp":"'Proximate' means nearby/immediate (e.g., proximate cause); its opposite is 'distant' (far).","src":null,"vocab":[]},{"id":"bank-625","q":"Choose the correct Synonym: 'Evasive'","opts":{"A":"elusive","B":"serene","C":"pensive","D":"autocrat"},"ans":"A","exp":"'Evasive' means avoiding directness; closest synonym is 'elusive' (hard to pin down).","src":null,"vocab":[]},{"id":"bank-626","q":"Choose the correct Synonym: 'Lucid'","opts":{"A":"lucky","B":"acidity","C":"stupid","D":"clear"},"ans":"D","exp":"'Lucid' means clear/transparent (from Latin 'light'); closest synonym is 'clear.'","src":null,"vocab":[]},{"id":"bank-627","q":"Choose the correct Synonym: 'Affluence'","opts":{"A":"fluent","B":"affinity","C":"wealthy","D":"acute"},"ans":"C","exp":"'Affluence' means great wealth/prosperity; closest synonym among options is 'wealthy.'","src":null,"vocab":[]},{"id":"bank-628","q":"My father will discipline me for my action. Here 'discipline' means:","opts":{"A":"reward","B":"systemize","C":"approve","D":"punish"},"ans":"D","exp":"Used as a verb regarding a negative action, 'discipline' here means to punish/correct.","src":null,"vocab":[]},{"id":"bank-629","q":"The meaning of the word 'dearth' is:","opts":{"A":"death","B":"dark","C":"blank","D":"scarcity"},"ans":"D","exp":"'Dearth' means a shortage or scarcity of something.","src":null,"vocab":[]},{"id":"bank-630","q":"The meaning of the word 'amass' is:","opts":{"A":"invent","B":"accrue","C":"disperse","D":"animate"},"ans":"B","exp":"'Amass' means to accumulate/pile up; closest synonym is 'accrue' (to build up).","src":null,"vocab":[]},{"id":"bank-631","q":"Choose the word most nearly opposite in meaning to the capitalized word: 'PAUCITY'","opts":{"A":"glut","B":"sufficiency","C":"artifice","D":"precinct"},"ans":"A","exp":"'Paucity' means scarcity; its strongest opposite is 'glut' (excessive abundance), more intense than mere 'sufficiency.'","src":null,"vocab":[]},{"id":"bank-632","q":"Choose the word most nearly opposite in meaning to the capitalized word: 'FEASIBLE'","opts":{"A":"plausible","B":"rudimentary","C":"impracticable","D":"None of these"},"ans":"C","exp":"'Feasible' means practical/achievable (from Latin 'doable'); its opposite is 'impracticable' (cannot be done in practice).","src":null,"vocab":[]},{"id":"bank-633","q":"Choose the word most nearly opposite in meaning to the capitalized word: 'SPURIOUS'","opts":{"A":"fake","B":"pertinent","C":"genuine","D":"cautious"},"ans":"C","exp":"'Spurious' means fake/not genuine; its opposite is 'genuine' (authentic).","src":null,"vocab":[]},{"id":"bank-634","q":"Choose the word most nearly opposite in meaning to the capitalized word: 'EXPEDITE'","opts":{"A":"accelerate","B":"advance","C":"rush","D":"impede"},"ans":"D","exp":"'Expedite' means to speed up; its opposite is 'impede' (to obstruct/slow down).","src":null,"vocab":[]},{"id":"bank-635","q":"Choose the word most nearly opposite in meaning to the capitalized word: 'LETHARGIC'","opts":{"A":"energetic","B":"lazy","C":"indifferent","D":"bored"},"ans":"A","exp":"'Lethargic' means sluggish/lacking energy; its opposite is 'energetic.'","src":null,"vocab":[]},{"id":"bank-636","q":"Choose the pair of words that best matches the relationship: 'ZOOLOGY : ANIMALS'","opts":{"A":"ecology : pollution","B":"botany : plants","C":"chemistry : atoms","D":"history : people"},"ans":"B","exp":"Zoology is the study of animals; similarly, botany is the study of plants — both are major branches of biology with a defined subject.","src":null,"vocab":[]},{"id":"bank-637","q":"Choose the pair of words that best matches the relationship: 'NEEDLE : KNIT'","opts":{"A":"bait : fish","B":"match : fire","C":"loom : weave","D":"soap : wash"},"ans":"C","exp":"A needle is the tool used to knit; similarly, a loom is the tool used to weave — both are durable tools that create fabric from thread.","src":null,"vocab":[]},{"id":"bank-638","q":"Choose the pair of words that best matches the relationship: 'PARENTHESIS : EXPLANATION'","opts":{"A":"ellipsis : omission","B":"asterisk : exaggeration","C":"synopsis : affectation","D":"apostrophe : annotation"},"ans":"A","exp":"A parenthesis is a punctuation mark used to indicate an explanation; similarly, an ellipsis is a punctuation mark used to indicate an omission of words.","src":null,"vocab":[]},{"id":"bank-639","q":"Choose the pair of words that best matches the relationship: 'CENSUS : POPULATION'","opts":{"A":"manifest : debts","B":"roster : audience","C":"itinerary : journeys","D":"inventory : merchandise"},"ans":"D","exp":"A census is an official count/list of the population; similarly, an inventory is an official count/list of merchandise in stock — both are quantitative listings.","src":null,"vocab":[]},{"id":"bank-640","q":"Choose the pair of words that best matches the relationship: 'GEM : TURQUOISE'","opts":{"A":"lettuce : delicious","B":"flower : violet","C":"stone : magenta","D":"vine : cherry"},"ans":"B","exp":"Turquoise is a specific type of gem; similarly, violet is a specific type of flower — both pairs show a category and its specific example.","src":null,"vocab":[]},{"id":"bank-641","q":"Find Synonym: 'মানবতাবাদী' (humanitarian)","opts":{"A":"innocent","B":"kind","C":"humanitarian","D":"flatter"},"ans":"C","exp":"The given Bengali term directly translates to 'humanitarian' (one devoted to human welfare).","src":null,"vocab":[]},{"id":"bank-642","q":"Find Synonym: 'স্থগিত' (suspended/postponed)","opts":{"A":"opponent","B":"postpone","C":"obvious","D":"election"},"ans":"B","exp":"The Bengali term means to delay or suspend something, matching 'postpone.'","src":null,"vocab":[]},{"id":"bank-643","q":"Find Synonym: 'পর্যাপ্ত' (sufficient)","opts":{"A":"lack","B":"unwanted","C":"sharpener","D":"adequate"},"ans":"D","exp":"The Bengali term means sufficient/enough, matching 'adequate.'","src":null,"vocab":[]},{"id":"bank-644","q":"Find Synonym: 'শান্ত' (calm)","opts":{"A":"foolish","B":"simple","C":"calm","D":"flatter"},"ans":"C","exp":"The Bengali term directly means 'calm' or 'peaceful.'","src":null,"vocab":[]},{"id":"bank-645","q":"Find Synonym: 'ক্লান্তিকর' (exhausting)","opts":{"A":"enrollment","B":"sociable","C":"grueling","D":"plethora"},"ans":"C","exp":"The Bengali term means exhausting/strenuous, matching 'grueling' (backbreaking).","src":null,"vocab":[]},{"id":"bank-646","q":"Find Synonym: 'Bed of roses'","opts":{"A":"bed made of roses","B":"comfortable situation","C":"small bed","D":"rose garden"},"ans":"B","exp":"'Bed of roses' is an idiom meaning a comfortable, easy situation. (Contrast: 'a bed of thorns' = a difficult situation.)","src":null,"vocab":[]},{"id":"bank-647","q":"Find Synonym: 'Apex'","opts":{"A":"opponent","B":"postpone","C":"obvious","D":"top"},"ans":"D","exp":"'Apex' means the highest point/summit, matching 'top.'","src":null,"vocab":[]},{"id":"bank-648","q":"Find Synonym: 'Ideal'","opts":{"A":"perfect","B":"bulky","C":"weak","D":"magnitude"},"ans":"A","exp":"'Ideal' means representing the highest standard, matching 'perfect.'","src":null,"vocab":[]},{"id":"bank-649","q":"Find Synonym: 'Kith and kin'","opts":{"A":"relatives","B":"rivers and canals","C":"rivalry","D":"rivalry"},"ans":"A","exp":"'Kith and kin' is an idiom meaning friends and relatives — i.e., 'relatives' broadly.","src":null,"vocab":[]},{"id":"bank-650","q":"Find Synonym: 'Blue blood'","opts":{"A":"foolish","B":"simple","C":"aristocracy","D":"flatter"},"ans":"C","exp":"'Blue blood' is an idiom meaning noble birth/aristocracy, originating from the visibly pale, blue-veined skin of European nobility.","src":null,"vocab":[]},{"id":"bank-651","q":"Find Antonym: 'BONA-FIDE'","opts":{"A":"honest","B":"spurious","C":"bondage","D":"similar"},"ans":"B","exp":"'Bona-fide' means genuine/authentic; its opposite is 'spurious' (fake).","src":null,"vocab":[]},{"id":"bank-652","q":"Find Antonym: 'GRANDIOSE'","opts":{"A":"proud","B":"ideal","C":"simple","D":"false"},"ans":"C","exp":"'Grandiose' means pompous/extravagantly impressive; its opposite is 'simple' (plain).","src":null,"vocab":[]},{"id":"bank-653","q":"Find Antonym: 'DEBACLE'","opts":{"A":"debate","B":"discord","C":"decide","D":"success"},"ans":"D","exp":"'Debacle' means a sudden, ignominious failure/disaster; its opposite is 'success.'","src":null,"vocab":[]},{"id":"bank-654","q":"Find Antonym: 'UNTENABLE'","opts":{"A":"maintainable","B":"temporary","C":"rented","D":"occupied"},"ans":"A","exp":"'Untenable' means indefensible/cannot be maintained; its opposite is 'maintainable' (defensible).","src":null,"vocab":[]},{"id":"bank-655","q":"Find Antonym: 'AMALGAMATE'","opts":{"A":"generate","B":"materialize","C":"separate","D":"equip"},"ans":"C","exp":"'Amalgamate' means to combine/merge; its opposite is 'separate' (to divide).","src":null,"vocab":[]},{"id":"bank-656","q":"Find Analogy: 'HYGROMETER : BAROMETER'","opts":{"A":"rain : snow","B":"water : mercury","C":"humidity : pressure","D":"temperature : weather"},"ans":"C","exp":"A hygrometer measures humidity; a barometer measures pressure — both name an instrument's measured quantity.","src":null,"vocab":[]},{"id":"bank-657","q":"Find Analogy: 'ENTREPRENEUR : LABORER'","opts":{"A":"mediator : conflict","B":"capitalism : communism","C":"profit : wages","D":"arbitrator : capitalist"},"ans":"C","exp":"An entrepreneur earns profit for risk and investment; a laborer earns wages for physical work — both pairs match a person type to their form of income.","src":null,"vocab":[]},{"id":"bank-658","q":"Find Analogy: 'CONDUIT : WATER'","opts":{"A":"behavior : liquid","B":"electricity : television","C":"artery : blood","D":"wire : sound"},"ans":"C","exp":"A conduit is a channel through which water flows; similarly, an artery is a vessel through which blood flows — both are carrier-content pairs.","src":null,"vocab":[]},{"id":"bank-659","q":"Find Analogy: 'SAW : CARPENTER'","opts":{"A":"scissors : tailor","B":"wagon : farmer","C":"brush : painter","D":"typewriter : author"},"ans":"A","exp":"A saw is the primary cutting tool used by a carpenter; similarly, scissors are the primary cutting tool used by a tailor.","src":null,"vocab":[]},{"id":"bank-660","q":"Find Analogy: 'EXEMPTION : EXCLUSION'","opts":{"A":"discharge : elimination","B":"debarment : prevention","C":"immunity : isolation","D":"forgive : condone"},"ans":"B","exp":"Exemption and exclusion are synonymous (both mean keeping something separate/free from); similarly, debarment and prevention are near-synonyms (both block something from happening).","src":null,"vocab":[]},{"id":"bank-661","q":"In his address the principal exhorted the teacher to discover and _____ each student's _____ talents.","opts":{"A":"suppress, unrecognized","B":"redirect, spurious","C":"belittle, dormant","D":"develop, intrinsic"},"ans":"D","exp":"After discovering students' talents, the logical next step is to 'develop' them; since talent is innate, 'intrinsic' (inherent) fits the second blank.","src":null,"vocab":[]},{"id":"bank-662","q":"You must get some fresh _____ for our visitors, this loaf terribly _____.","opts":{"A":"milk, salty","B":"bread, stale","C":"fruits, sweet","D":"butter, good"},"ans":"B","exp":"'Loaf' specifically refers to a unit of bread; since fresh bread is needed, the existing loaf must be 'stale' (no longer fresh).","src":null,"vocab":[]},{"id":"bank-663","q":"Choose the Synonym of the word: 'Franchise'","opts":{"A":"Privilege","B":"Utility","C":"French","D":"Frankness"},"ans":"A","exp":"'Franchise' means a special right or privilege granted (e.g., a business franchise), matching 'privilege.'","src":null,"vocab":[]},{"id":"bank-664","q":"Choose the Synonym of the word: 'Panoramic'","opts":{"A":"Narrow","B":"Limited","C":"Restricted","D":"Scenic"},"ans":"D","exp":"'Panoramic' means offering a wide, unbroken view; closest synonym is 'scenic' (picturesque view).","src":null,"vocab":[]},{"id":"bank-665","q":"Choose the Synonym of the word: 'Thrive'","opts":{"A":"To survive","B":"To exist","C":"To do well","D":"To die"},"ans":"C","exp":"'Thrive' means to prosper/flourish, matching 'to do well.'","src":null,"vocab":[]},{"id":"bank-666","q":"Choose the Synonym of the word: 'Competent'","opts":{"A":"Circumspect","B":"Discrete","C":"Capable","D":"Prudent"},"ans":"C","exp":"'Competent' means having sufficient skill/ability, matching 'capable.'","src":null,"vocab":[]},{"id":"bank-667","q":"Choose the words that best fill the blanks: Few could have _____ the _____ results of our season; we won seven games and lost only two.","opts":{"A":"meditated - presumptuous","B":"appropriated - lackluster","C":"predicted - stellar","D":"identified - elastic"},"ans":"C","exp":"Given the outstanding record (7 wins, 2 losses), few could have 'predicted' such 'stellar' (excellent) results.","src":null,"vocab":[]},{"id":"bank-668","q":"Choose the words that best fill the blanks: Because of past abrasion with his superiors, some _____ if he would be willing to _____ at all.","opts":{"A":"speculated - validate","B":"doubted - obey","C":"liquidated - acquiesce","D":"questioned - provide"},"ans":"B","exp":"Past friction (abrasion) with superiors would make people 'doubt' whether he would 'obey' them at all.","src":null,"vocab":[]},{"id":"bank-669","q":"Choose the words that best fill the blanks: Having inherited a staff known for _____ resources, the new chairman had no choice but to introduce a number of more _____ practices.","opts":{"A":"Defining - fraudulent","B":"harboring - diverse","C":"Neglecting - proficient","D":"squandering - efficient"},"ans":"D","exp":"A staff known for 'squandering' (wasting) resources forces the new chairman to introduce more 'efficient' practices to stop the waste.","src":null,"vocab":[]},{"id":"bank-670","q":"Choose the words that best fill the blanks: Iodine deficiency is _____ in the remote mountain regions; however, it is no longer _____ in the lowlands where iodized salt is available.","opts":{"A":"recorded - unusual","B":"rare - sporadic","C":"eradicated - common","D":"endemic - prevalent"},"ans":"D","exp":"'However' signals contrast: deficiency is 'endemic' (localized) to mountain regions, but no
